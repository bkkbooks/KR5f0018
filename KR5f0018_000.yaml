body:
  text: 淮南鴻烈解叙動一淮南王名安厲王長子也長高皇帝之子也其母趙氏女為趙王張敖美人高皇帝七年討韓信於銅鞮信亡走胸奴上遂北至樓煩還過趙不禮趙王趙王獻美女趙氏女得幸有身趙王不敢內之於宫為築舍于外及貫高等謀反發覺并逮治王盡收王家及美人趙氏女亦與焉吏以得幸有身聞上上方怒趙王未理也趙美人弟兼因辟陽侯審食其言之吕后吕后不肯白辟陽侯亦不强爭及趙美人生男恚而自殺吏奉男詣上上命吕后母之封為淮南王暨孝文皇帝即位長弟上書願相見詔至長安日從游宴驕蹇如家人兄弟怨辟陽侯不爭其母於吕后因椎殺之上非之肉袒北闕謝罪奪四縣還歸國為黃屋左纛稱東帝坐徙蜀嚴道死於雍上閔之封其四子為列侯時民歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容上聞之曰以我貪其地邪乃召四侯而封之其一人病薨長子安襲封淮南王次為衡山王次為廬江王太傅賈誼諫曰怨讎之人不可貴也後淮南衡山卒反如賈誼言初安為辨達善屬文皇帝為從父數上書召見孝文皇帝甚重之詔使為離騷賦自旦受詔日早食已上愛而祕之天下方術之士多往歸焉於是遂與蘇飛李尚左吳田由雷被毛被伍被𣈆昌等八人及諸儒大山小山之徒共講論道德總統仁義而著此書其㫖近老子淡泊無為蹈虛守靜出入經道言其大也則燾天載地說其細也則淪於無垠及古今治亂存亡禍福世間詭異瓌竒之事其義也著其文也富物事其類無所不載然其大較歸之於道號曰鴻烈鴻大也烈明也以為大明道之言也故夫學者不論淮南則不知大道之深也是以先賢通儒述作之士莫不援采以驗經傳以父諱長故其所著諸長字皆曰修光祿大夫劉向校定撰具名之淮南又有十九篇者謂之淮南外篇自誘之少從故侍中同縣盧君受其句讀誦舉大義會遭兵災天下棊峙亡失書傳廢不尋修二十餘載建安十年辟司空掾除東郡濮陽令覩時人少為淮南者懼遂陵遲於是以朝餔事畢之間乃深思先師之訓參以經傳道家之言比方其事為之注解悉載本文并舉音讀典農中郎將辨揖借八卷刺之會揖身喪遂亡不得至十七年遷監河東復更補足淺學寡見未能備悉其所不達注以未聞唯博物君子覽而詳之以勸後學者云爾
