front:
  text: 淮南鴻烈解卷之一
  hash: sha256:2b78d6d4b486d4e15bc43e9eb1ca49b57fef3c8e0032c204efc79aa139d71de5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_001-001a, image: hfl/0863/0863-009.png}
body:
  text: 太尉祭酒臣許愼記上原道訓上原本也本道根真包裹天地以歷萬物故曰原道因以題篇夫道者覆天載地道無形而大也廓四方柝八極廓張也柝開也八極八方之極也言其遠柝讀重門擊柝之柝也高不可際深不可測際至也度深曰測一曰盡也包裹天地稟授無形稟給也授豫也無形萬物之未形也皆生於道故曰稟授無形也源流泉浡沖而徐盈混混汨汨濁而徐清源泉之始所出也浡涌也沖虛也始出虛徐流不止能所盈滿以喻於道亦然也汩讀曰骨也故植之而塞于天地橫之而彌于四海施之無窮而無所朝夕植立也塞滿也彌猶絡也施用也用之無窮竭也無所朝夕盛衰舒之幎於六合卷之不盈於一握舒散也幎覆也孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合故曰六合言滿天地間也一曰四方上下為六合不盈一握言微妙也約而能張幽而能明言道能小能大能昧能明弱而能強柔而能剛道之性也橫四維而含隂陽橫讀桄車之桄紘宇宙而章三光紘綱也若小車蓋四維謂之紘繩之類也四方上下曰宇古往今來曰宙以論天地章明也三光日月星甚淖而滒甚纖而微歌亦淖也夫饘粥多瀋者謂滒滒讀歌謳之歌山以之高淵以之深獸以之走鳥以之飛日月以之明星歷以之行麟以之遊鳳之以翔以用也遊出也大飛不動曰翔也泰古二皇得道之柄立於中央二皇伏犧神農也指説隂陽故不言三也神與化遊以撫四方撫安也四方謂之天下也是故能天運地滯輪轉而無廢運行也滯止也廢休也水流而不止與萬物終始風與雲蒸事無不應應當也雷聲雨降並應無窮窮已也鬼出電入龍興鸞集鬼出言無蹤迹也電入言其疾也鈞旋轂轉周而復匝鈞陶人作瓦器法下轉旋者一曰天也已雕已琢還反於朴無為為之而合于道無為言之而通乎德言二三之化無為為之也而言合於道也無所為言之而適自通於德也恬愈無矜而得于和恬愈無所好憎也無矜不自大也有萬不同而便于性萬事不同能於便性者性不欲也神託于秋毫之末言微妙也而大宇宙之總宇宙諭天地總合也其德優天地而和隂陽優柔也和調也節四時而調五行五行金木水火士也詬諭覆育萬物群生詬諭溫恤也育長也潤于草木浸于金石禽獸碩大毫毛潤澤羽翼奮也奮壯角觡生也角鹿角也觡麋角也觡讀曰格獸胎不贕鳥卵不毈胎不成獸曰贕卵不成鳥曰毈言不者明其成父無喪子之憂兄無哭弟之哀言無夭死童子不孤婦人不孀無父曰孤寡婦曰孀也虹霓不出賊星不行賊星妖星也含德之所致含懷也夫太上之道生萬物而不有不以為己有者也成化像而弗宰宰主也跂行喙息蠉飛蠕動待而後生莫之知德不因德之待之後死莫之能怨不怨虐之得以利者不能譽用而敗者不能非收聚畜積而不加富收斂畜積國有常賦也不加冨者為百姓不以為己有也布施稟授而不益貧布施稟授匡困乏豫不足也以公家之資故不益貧也旋縣而不可究纖微而不可勤縣猶小也勤猶盡也纍之而不高墮之而不下益之而不衆損之而不寡斫之而不薄殺之而不殘鑿之而不深填之而不淺忽兮恍兮不可為象兮恍兮忽兮用不屈兮忽恍無形貌也故曰不可為像也屈竭也恍讀人空頭扣之恍屈讀秋雞無尾屈之屈也幽兮冥兮應無形兮遂兮洞兮不虛動兮洞達也道動有所應故曰不虛動也與剛柔卷舒兮與隂陽俯仰兮卷舒猶屈申也俯仰猶升降也昔者馮夷大丙之御也夷或作遲也丙或作白皆古之得道能御隂陽者也乘雲車入雲霓遊微霧以雲霓為其馬也遊行也微霧天之微氣也鶩恍忽歷遠彌高以極往鶩馳也恍忽無之象也往行也經霜雪而無迹照日光而無景行霜雪中無有迹為日所照無影柱也扶搖抮抱羊角而上扶攀也搖動也抱了戾也扶搖如羊角轉如曲縈行而上也抮讀與左傳憾而能眕者同也抱讀詩克歧克嶷之嶷也經紀山川蹈騰崑崙排閶闔淪天門經行也紀通也蹈躡也騰上也崑崙山名也在西北其高萬九千里河之所出排猶斥也淪入也閶闔始升天之門也天門上帝所居紫微宫門也馮夷大丙之御其能如此也末世之御雖有輕車良馬徑策利煆不能與之爭先徑強也策箠也未之感也言不能與馮夷大丙爭在前也鍛讀炳燭之炳是故大丈夫恬然無思淡然無慮以天為蓋以地為輿四時為馬隂陽為御騶御乘雲陵霄與造化者俱大丈夫諭體道者也造化天地一曰道也霄讀消息之消縱志舒節以馳大區區宅也大宅謂天也可以步而步可以驟而驟令雨師灑道使風伯掃塵雨師畢星也詩云月歷于畢俾滂沱矣風伯箕星也月麗于箕風揚沙也電以為鞭策電激氣也故以為鞭策雷以為車輪雷轉氣也故以為車輪上遊于霄雿之野下出于無垠之門霄雿高峻貌也無垠無形狀之貌霄讀紺綃雿讀翟氏之翟劉覽偏照復守以全劉覽回觀也劉讀留連之留非劉氏之劉也經營四隅還反於樞隅猶方也樞本也故以天為蓋則無不覆也以地為輿則無不載也四時為馬則無不使也隂陽為御則無不備也隂陽次敘以成萬物無所缺也故曰無不備是故疾而不搖遠而不勞四支不動聰明不損損減也而知八紘九野之形埒者何也八紘天之八維也九野八方中央也執道要之柄而遊於無窮之地是故天下之事不可為也為后也因其自然而推之推求也舉也萬物之變不可究也秉其要歸之趣趣亦歸也夫鏡水之與形接也不設智故而方圓曲直弗能逃也智故巧飾也鏡水不施巧飾之形人之形好醜以實應之故曰方圓曲直不能逃也是故響不肆應而景不一設叫呼仿佛默然自得得叫呼仿佛之聲狀也人生而靜天之性也感而後動性之害也物至而神應知之動也物事也知與物接而好憎生焉接交也情欲也好憎成形而知誘於外不能反己而天理滅矣形見也誘感也不能反己本所受天清淨之性故曰天理滅也猶衰也故達於道者不以人易天天性也不以人事易其天性也一説曰天身也不以人間利欲之事易其身也外與物化而內不失其情言通道之人雖外貌與物化內不失其無欲之本清也至無而供其求時騁而要其宿言天時自聘道要其宿會也小大修短各有其具具猶備也萬物之至騰踴肴亂而不失其數不失其數各應其度是以處上而民弗重居前而衆弗害言民戴仰而愛之也天下歸之姦邪畏之以其無爭於萬物也故莫敢與之爭夫臨江而釣曠日而不能盈羅雖有鉤針芒距距爪也讀距守之距也微綸芳餌加之以詹何娟嬛之數猶不能與網罟爭得也詹何娟嬛古善釣人名數術也射者扞烏號之弓彎棋衛之箭扞張也彎引也棋美箭所出地名也衛利也烏號柘桑其材堅徑烏時其上及其將飛枝必撓下徑能復起巢鳥隨之烏不敢飛號呼其上伐其枝以為弓因曰烏號之弓也一説黃帝鑄鼎於荆山鼎湖得道而仙秉龍上其臣援弓射龍欲下黃帝不能也烏於也號呼也於是抱弓而號因名其弓為烏號之弓也重之羿逄蒙子之巧以要飛鳥猶不能與羅者競多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取競逐也何則以所持之小也張天下以為之籠因江海以為罟又何亡魚失鳥之有乎罟魚網也詩云施罟濊濊故矢不若繳繳不若無形之像言其矢也夫釋大道而任小數無以異於使蟹捕鼠蟾蜍捕蚤不足以禁姦塞邪亂乃逾滋以艾灼蟹巨上內置穴中延熱走窮穴適於禽一鼠也蟾蜍䗐也跳行舒遲捕蚤亦不能悉得故曰不足以禁姦也諭道益甚也昔者夏鯀作三仞之城諸侯背之海外有狡心鯀帝顓頊五世孫禹之父也八尺曰仞鯀作城郭以其役勞故諸侯背之四海之外皆有狡猾之心也禹知天下之叛也乃壞城平池散財物焚甲兵施之以德海外賔伏四夷納職四夷海外也職貢也合諸侯於塗山執玉帛者萬國塗山在九江當塗縣玉圭帛玄纁也故機械之心藏於胸中則純白不粹神德不全機械巧詐也藏之於胸臆之內故純白之道不粹精神專一之德不全也粹讀禍祟之祟也在身者不知何遠之所能懷懷來也是故革堅則兵利城成則衝生言攻戰之備於此生也若以湯沃沸亂乃逾甚是故鞭噬狗策蹄馬而欲教之雖伊尹造父弗能化伊尹名摯殷湯之賢相也造父周穆王之臣也而善御雖此二人不能化之欲寅之心亡於中則飢虎可尾何況狗馬之類乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠策繁用者非致遠之術也繁數也離朱之明察針末於百步之外離宋者黃帝臣明目人也不能見淵中之魚師曠之聰合八風之調師曠晉平公樂師子野也八風八卦之風聲也而不能聽十里之外故任一人之能不足以治三畒之宅也修道理之數因天地之自然則六合不足均也均平也是故禹之決瀆也因水以為師神農之播榖也因苗以為教禹鯀之子名文命受禪成功曰禹因以水性自下決使東流以為後世師法也神農少典之子炎帝也農植嘉榖神而化之故號曰神農也播布也布種百穀因苗之生而長育之以為後世之常教也夫萍樹根於水萍大蘋也木樹根於土鳥排虛而飛獸跖實而走跖足也實地也跖讀捂托之撫蛟龍水居虎豹山處天地之性也蛟水蛟其皮有珠世人以為刀剱之口是也蛟讀人情性交易之交緩氣言乃得耳兩木相摩而然金火相守而流流釋也貟者常轉窾者主浮自然之勢也員輪丸之屬也窾空也舟船之屬也故曰自然之勢也窾讀科條之科也是故春風至則甘雨降生育萬物明堂月令曰清風至則穀雨是也育長也風或作分合羽者嫗伏毛者孕育嫗伏以氣剖卵也孕者懷胎育生也草木榮華鳥獸卵胎莫見其為者而功既成矣既已也秋風下霜到生挫傷草木首地而生故曰到生挫傷者雕落也鷹雕搏鷙昆蟲蟄藏鷙讀什伍之十草水注根魚鱉湊淵莫見其為者滅而無形滅沒也形見也木處榛巢水居窟穴聚木曰榛禽獸有芃芃蓐人民有室陸處宜牛馬舟行冝多水胸奴出穢裘胸奴獫狁北胡也干越生葛絺于吳也絺細葛也各生所急以備燥溼各因所處以御寒暑並得其冝物便其所由此觀之萬物固以自然聖人又何事焉事治也九疑之南陸事寡而水事衆九疑山名也在蒼梧虞舜所葬也於是民人被髮文身以像鱗蟲被翦也文身刻畫其體內默其中為蛟龍之狀以入水蛟龍不害也故曰以像鱗蟲也短綣不褲以便涉遊短袂攘卷以便刺舟因之也卷卷臂也因之因水之宜也雁門之北狄不榖食賤長貴壯俗尚氣力人不弛弓馬不解勒便之也不穀食肉酪而已北狄鮮卑也弛舍也便習也故禹之祼國解衣而入衣帶而出因之也祼國在南方聖人治禮不求變俗故曰因之也今夫徙樹者失其隂陽之性則莫不枯稿失猶易也故橘樹之江北則化而為枳鴝鵒不過濟貈渡汶而死見於周禮故春秋傳曰鴝鵒來巢言非中國之禽所以為魯昭公仁異也形性不可易勢居不可移也是故達於道者反於清淨反本也天本授人清靜之性故曰反也究於物者終於無為無為者不為物為也以恬養性以漠處神則入于天門所謂天者純粹朴素質直皓白未始有與雜糅者也所謂人者偶䁟智故曲巧偽詐所以俯仰於世人而與俗交者故牛歧蹄而戴角馬被髦而全足者天也絡馬之口穿牛之鼻者人也循天者與道遊者也循隨也遊行也隨人者與俗交者也夫井魚不可與語大拘於隘也夏蟲不可與語寒言蜩蟬不知寒雪也篤於時也曲士不可與語至道拘於俗束於教也故聖人不以人滑天不以欲亂情天身也不以人事滑亂其身也不以欲亂其情濁之性者也不謀而當不言而信不慮而得不為而成詩云不識不知順帝之則故曰不謀而當不慮而得也精通于靈府與造化者為人為治也夫善遊者溺善騎者墮各以其所好反自為禍禍害也是故好事者未嘗不中中傷也好為情欲之事者未嘗不自傷也爭利者未嘗不窮也昔共工之力觸不周之山使地東南傾共工以水行霸於伏犧神農間者也非堯時共工也不周山崑崙西北傾猶下也天文言天傾西北地傾東南先言傾高也此言東南後言傾明其下也與高辛爭為帝高辛帝嚳有天下之號也嚳黃帝之曾孫遂潛于淵宗族殘滅繼嗣絶祀謂共工也越王翳逃山穴越人熏而出之遂不得已已止也翳越太子也賢不欲為王逃於山穴之中越人以火熏出而立之故曰還不得已在春秋後故不書于經也由此觀之得在時不在爭治在道不在聖治為也雖聖不得為故曰在道孔子是也土處下不爭高故安而不危水下流不爭先故疾而不遲昔舜耕於歷山期年而田者爭處墝埆以封壤肥饒相讓歷山在濟隂成陽也一曰濟南歷城山也墝埆讀人相墝椽之墝釣於河瀆期年而漁者爭處湍瀨以曲隈深潭相豫漁讀告語湍瀨水淺流急少魚之處也曲隈崖岸委曲深潭四流饒魚之處覃讀葛覃之覃當此之時口不設言手不指麾口不設不信之言也手不指麾不妄有所規擬也執玄德於心而化馳若神玄天也馳行也若神若有神化之也使舜無其志雖口辨而户説之不能化一人志王天下之志也一曰人心之志也是故不道之道莽乎大哉道不可道故曰不道之道夫能理三苗朝羽民三苗堯時所放渾敦窮竒叨餮之等理治也羽民南方羽國之民使之朝者德以懷遠也從祼國納肅愼未發號施令而移風易俗者其唯心行者乎祼國在南方禹所入也從化也肅愼北方遠也傅曰肅愼燕亳吾北土也唯仁化為能然也法度刑罰何足以致之也言不足以致之也明不如仁心化之為大是故聖人內修其本而不外飾其末保其精神偃其智故漠然無為而無不為也能無為故物無不為之化淡然無治也而無不治也所謂無為者不先物為也所謂不為者因物之所為順物之性也所謂無治者不易自然也所謂無不治者因物之相然也然猶冝也淮南鴻烈解卷之一
