front:
  text: 淮南鴻烈解卷之三動三
  hash: sha256:d1e896d57d73df94f6aceb9cb156c8b007a558d1764563caf90a393be0b2ab0a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_003-001a, image: hfl/0863/0863-060.png}
body:
  text: 太尉祭酒臣許愼記上俶真訓上俶始也真實說道之實始於無有化育于有故曰俶真因以題篇有始者天地開闢之始也有未始有有始者言萬物萌兆未始有始者始成形也有未始有夫未始有有始者言天地合氣寂寞蕭條未始有也夫未始有始倣佛也有有者言萬物始有形兆也有無者言天地浩大言無可名也有未始有有無者有未始有夫未始有有無者所謂有始者繁憤未廢萌兆牙糵未有形埒垠堮無無蠕蠕將欲生興而未成物類繁憤衆積之貌發憤也有未始有有始者天氣始下地氣始上隂陽錯合相與優游競暢于宇宙之間被德含和繽紛蘢蓯欲與物接而未成兆朕競逐也暢達也和氣也繽紛雜糅也蘢蓰聚會也兆朕形怪也有未始有夫未始有有始者天含和而未降地懷氣而未揚虛無寂寞蕭條霄雿無有仿佛氣遂而大通冥冥者也霄讀紺綃之綃雿翟氏之翟也有有者言萬物摻落根莖枝葉青葱苓蘢雚蔰炫煌蠉飛蠕動蚑行噲息可切循把握而有數量摻讀參星之參雚蔰炫煌采色貌也蚑讀車蚑轍之蚑噲讀不說懌外之噲切摩也循順也雚讀曰唯也蔰讀曰扈有無者視之不見其形聽之不聞其聲捫之不可得也望之不可極也儲與扈治儲與扈治褒大意也浩浩瀚瀚不可隱儀揆度而通光耀者浩浩瀚瀚廣大貌也光耀無形有未始有有無者包裹天地陶冶萬物大通混冥深閎廣大不可為外析豪剖芒不可為內無環堵之宇而生有無之根混真人冥之中謂道也有未始有夫未始有有無者天地未剖隂陽未判剖判混分四時未分萬物未生汪然平靜寂然清澄莫見其形汪讀傳尸諸周氏之汪同若光耀之間於無有退而自失也自失沒不見也曰豫能有無而未能無無也能有無為也未能本性自無為也故曰未能無也及其為無無至妙何從及此哉夫大塊載我以形勞我以生大塊天地之間也逸我以老休我以死莊子曰生乃徭役死乃休息也故曰休我以死善我生者乃所以善吾死也善吾生之樂乃欲善吾死之樂也明死變化有知欲勸人同死生也夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨趨走寐者不知猶有所遁夜半有力者負舟與山走故寐者不知也若藏天下於天下則無所遁其形矣大丈夫以天下為室以藏萬物物豈可謂無大揚攉乎揚攉無慮大數名也攉讀鎬京之鎬一範人之形而猶喜範猶遇也遭也說範法也言物一法效人形尚由善也若人者千變萬化而未始有極也言死生變化而夢故曰末始有極也弊而復新其為樂也可勝計邪譬若㝱為鳥而飛於天㝱為魚而沒於淵方其㝱也不知其㝱也覺而後知其㝱也今將有大覺然後知今此之為大㝱也始吾未生之時焉知生之樂也今吾未死又焉知死之不樂也昔公牛哀轉病也七日化為虎轉病易病也江淮之間公牛氏有易病化為虎若中國有狂疾者發作有時也其為虎者便還食人食人者因作真虎不食人者更復化為人公牛氏韓人淮南之人因牛食芻謂之芻豢有驗于此其兄掩户而入覘之則虎搏而殺之殺其兄掩讀曰奄也覘視也是故文章成獸爪牙移易移易人爪牙為虎爪牙也志與心變神與形化志心皆變神形皆化方其為虎也不知其嘗為人也方其為人不知其且為虎也二者代謝舛馳各樂其成形代更也謝叙也舛牙也形謂成虎形人舛讀舛賣之舛也狡猾鈍惛是非無端孰知其所萌萌生也夫水嚮冬則凝而為氷氷迎春則泮而為水氷水移易于前後若周貟而趨孰暇知其所苦樂乎泮釋也趨歸也是故形傷于寒暑燥濕之虐者形苑而神壯苑枯病也壯傷也苑讀南陽苑神傷乎喜怒思慮之患者神盡而形有餘故罷馬之死也剝之若槁罷老氣力竭盡故若槁也狡狗之死也割之猶濡狡少也濡濡溼氣力未盡是故傷死者其鬼嬈嬈煩嬈善行病祟人時既者其神漠既盡也時既當老者則神寂漠漠定也是皆不得形神俱沒也道家養形養神皆以壽終形神俱沒不俱漠而已也老子曰以道涖天下其鬼不神此謂俱沒也夫聖人用心杖性依神相扶而得終始是故其寐不㝱其覺不憂精神無所思慮故不㝱志存仁義患不得至故不憂也古之人有處混冥之中神氣不蕩于外萬物恬漠以愈靜攙搶衡杓之氣莫不彌靡攙搶彗孛也杓北斗柄第七星而不能為害當此之時萬民猖狂不知東西含哺而游鼓腹而熙鼓擊也熙戲也交被天和食于地德交俱也和氣也地德五穀不以曲故是非相尤茫茫沈沈是謂大治曲故曲巧也尤過也茫茫沈沈盛貌也茫讀王莽也沈讀水出沈沈沈白之沈於是在上位者左右而使之毋淫其性鎮撫而有之毋遷其德是故仁義不布而萬物蕃殖古者抱盛德上質朴不待仁義而萬物蕃殖也賞罰不施而天下賔服服其德也其道可以大美興而難以算計舉也言大性萬物但可以大美興而育之難以算計具也是故日計之不足而歲計之有餘以限計之故有餘也譬若梅矣百梅足以為百人酸一梅不足為百人酸也夫魚相忘於江湖人相忘於道術言各得其志故相忘也古之真人立於天地之本中至優游抱德煬和而萬物雜纍焉煬炙也抱其志德而炙於和氣故萬物雜纍言成熟也煬讀供養之養也孰肯解構人間之事以物煩其性命乎解構猶合會也煩辱也夫道有經紀條貫得一之道連千枝萬樂一者道本得其根本故能連理千枝萬葉以少正多也是故貴有以行令賤有以忘卑貧有以樂業困有以處危夫大寒至霜雪降然後知松柏之茂也據難履危利害陳于前陳列也然後知聖人之不失道也是故能戴大貟者履大方言能戴天履地之道鏡太清者視大明立太平者處大堂太平天下之平也大堂明堂所以告朔行令也能游冥冥者與日月同光光明也論德道者能與日月明也是故以道為竿以德為綸禮樂為鉤仁義為餌投之於江浮之於海萬物紛紛孰非其有夫梜依於跂躍之術跂躍猶齟齬不正之道也提挈人間之際撢掞挺挏世之風俗撢引掞利也挺挏猶上下也以求利便也以摸蘇牽連物之微妙摸蘇猶摸索微妙猶細小猶得肆其志充其欲何況懷瓌瑋之道忘肝膽遺耳目獨浮游無方之外不與物相弊摋弊摋猶雜揉也弊讀跂涉之跋也摋讀楚人言殺也中徙倚無形之域而和以天地者乎若然者偃其聰明而抱其太素素朴性也以利害為麈垢塵垢諭輕也以死生為晝夜是故日觀玉輅琬象之狀耳聽白雪清角之聲不能以亂其神玉輅王者所乘有琬琰象牙之飾白雪師曠所奏大一五弦之琴樂曲神物為下降者清角商聲也登千仞之溪臨猿眩之岸不足以滑其和猿臨其岸而目眩言滑滑亂和適也譬若鐘山之玉炊以罏炭三日三夜而色澤不變則至德天地之精也鐘山崑侖也是故生不足以使之利何足以動之死不足以禁之害何足以恐之明於死生之分達於利害之變雖以天下之大易骭之一毛無所槩於志也骭自膝以下脛以上也骭讀閈收之閈也夫貴賤之於身也猶條風之時麗也條風鳴條言其迅也麗過也毁譽之於己猶蚉之一過也夫秉皓白而不黑行純粹而不糅處玄冥而不暗休于天鈞而不僞僞敗也天鈞北極之地積寒之野休之輒敗唯體道能不敗也孟門終隆之山不能禁孟門山名太行之隘也終隆則終南山在扶風皆險塞也唯體道能不敗湍瀨旋淵吕梁之深不能留也湍瀨急流也旋淵深淵也吕梁水名也在彭城皆水險留滯也太行石澗飛狐句望之險不能難也太行在野王北上黨關也石澗深溪飛孤在代郡句望在鴈門皆隘險也是故身處江海之上而神游魏闕之下魏闕王者門外闕也所以縣教象之書於象魏也巍巍高大曰魏闕言真人雖在遠方心存王也一曰心下巨闕神內守也非得一原孰能至於此哉一原道之原也是故與至人居使家忘貧使王公簡其貴冨而樂卑賤勇者衰其氣貪者消其欲坐而不教立而不議虛而往者實而歸故不言而能飲人以和諭道如川不言而能飲人以和適也是故至道無為一龍一蛇龍能化蛇能解脫故道以為譬盈縮卷舒與時變化外從其風內守其性耳目不耀思慮不營營或也其所居神者臺簡以游太清臺猶持也簡大也引楯萬物群美萌生引楯拔擢也楯讀若允恭之允也是故事其神者神去之事治也休其神者神居之不動擾道出一原通九門九門天之門也散六衢散布於六合之衢也設於無垓坫之宇設施也垓坫垠堮也垓讀人飲食大多以思下垓坫讀為管氏有反坫之坫寂漠以虛無非有為於物也物以有為於己也非有為於物者不為之也物以有為於己者物己為也是故舉事而順于道者非道之所為也道之所施也夫天之所覆地之所載六合所包隂陽所詬雨露所濡道德所扶此皆生一父母而閲一和也父母天地閲總也和氣也道所貴也詬讀以口相吁之吁是故槐榆與橘柚合而為兄弟言道能化同異物也有苗與三危通為一家有苗國在南方彭蠡舜時不服者三危在西極山名在辰州通為一家道所化也夫目視鴻鵠之飛耳聽琴瑟之聲而心在雁門之間一身之中神之分離剖判六合之內一舉而千萬里是故自其異者視之肝膽胡越肝膽諭近胡越諭遠自其同者視之萬物一圈也圈陬百家異說各有所出若夫墨楊申商之於治道墨墨翟也其術兼愛非樂摩頂放踵而利國者為之楊楊朱其術全性保貞雖拔骭一毛而利天下弗為也申申不害也韓昭侯相著三符之命而尚刻削商者魏公孫鞅也為秦孝公制相坐之法嚴猛聞故封之為商君也因謂之商鞅猶蓋之無一橑而輪之無一輻有之可以備數無之木有害於用也己自以為獨擅之不通之于天地之情也今夫治工之鑄器鑄讀如唾祝之祝也金踴躍于爐中必有波溢而播棄者其中地而凝滯亦有以象於物者矣其形雖有所小周哉然未可以保於周室之九鼎也有況比於規形者乎其與道相去亦遠矣今夫萬物之疏躍枝舉百事之莖葉條梓皆本於一根而條循千萬也疏躍布散也梓讀詩頌苞有三葉同若此則有所受之矣而非所授者所受者無授也而無不受也無不受也者譬若周雲之蘢蓰遼巢彭濞而為雨周雲密雨雲也籠蓰聚合也遼巢彭濞藴積貌也濞榆莢之濞沈溺萬物而不與為濕焉不與萬物俱濕今夫善射者有儀表之度如工匠有規矩之數此皆所得以至於妙有所得儀表規矩之巧也然而奚仲不能為逄蒙奚仲巧為車逄蒙善於射言未能相兼也造父不能為伯樂者造父善御馬事周穆王伯樂善相馬事秦繆公是曰諭於一曲而不通于萬方之際也今以涅染緇則黑於涅以藍染青則青於藍涅非緇也青非藍也兹雖遇其母而無能復化已涅礬石也母本也是何則以諭其轉而益薄也何況夫未始有涅藍造化之者乎其為化也雖鏤金石書竹帛何足以舉其數鏤讀婁數之婁由此觀之物莫不生於有也有猶住也小大優游矣言饒多也夫秋豪之末淪於無間而復歸於大矣秋豪微妙故能入於無間間孔言道無形以豪末比道猶復為大也蘆符之厚通於無𡏴而復反於敦龐厚猶薄蘆葦也符蘆之中白符言其薄柯則歸於葦故曰反於敦龐矣符讀麵麩之麩也若夫無秋毫之微蘆符之厚四達無境通于無圻道貫無形秋毫蘆符已有形故曰無秋豪之微蘆符之厚四達無境通於無圻圻垠字也而莫之要御夭遏者其襲微重妙挺挏萬物揣丸變化道之所能天地之間何足以論之言道所化者大夫疾風㪍木而不能拔毛髮㪍亦拔也雲臺之高墮者折脊碎腦而蚊虻適足以翺翔臺高際於雲因曰雲臺也蚊虻微細故曰翺翔而無傷毁之患道所貴也夫與蚑嶢同乘天機蚑行蟯動諭微細也天機神馬天受形於一圈飛輕微細者猶足以脫其命又況未有類也類形象也未有形象道所尚也由此觀之無形而生有形亦明矣是故聖人託其神於靈府而歸於萬物之初視於冥冥聽於無聲冥冥之中獨見曉焉曉明也寂漠之中獨有照焉其用之也以不用其不用也而後能用之其知也乃不知其不知也而後能知之也夫天不定日月無所載載行也地不定草木無所植植立也所立於身者不寧是非無所形形見也是故有真人然後有真知知不詐故曰真也其所持者不明庸愚詎知吾所謂知之非不知歟今夫積惠重厚纍愛襲恩以聲華嘔符嫗掩萬民百姓使知之欣欣然人樂其性者仁也舉大功立顯名體君臣正上下明親疏等貴賤存危國繼絶世決拿治煩興毁宗立無後者義也閉九竅藏心志棄聰明反無識芒然仿佯于塵埃之外而消搖于無事之業含隂吐陽而萬物和同者德也是故道散而為德德溢而為仁義仁義立而道德廢矣百圍之木斬而為犧尊犧讀日月猶疏鏤之尊鏤之以剞𠜾雜之以青黃剞巧工鈎刀也𠜾者規度刺畫墨邊箋也所以刻鏤之具也青黃采色之飾也剞讀枝之技𠜾讀詩蹶角之蹶也華藻鎛鮮龍蛇虎豹曲成文章華藻華文也鎛今之金尊也鮮明好也龍蛇虎豹者刻尊彝為蟠龍伏虎之狀故曰曲成文章也然其斷在溝中一比犧尊溝中之斷則醜美有間矣間遠也方其好醜相去遠也然而失木性鈞也鈞等是故神越者其言華越散也言不守也故華而不實德蕩者其行僞蕩逸僞不成也至精亡於中而言行觀於外此不免以身役物矣與物為役夫趨舍行僞者為精求于外也精有湫盡而行無窮極則滑心濁神而惑亂其本矣其所守者不定於外淫於世俗之風風化也所斷差跌者而內以濁其清明是故躊躇以終而不得須臾恬淡矣是故聖人內修道術而不外飾仁義不知耳目之宣而游于精神之和若然者下揆三泉上尋九天橫廓六合揲貫萬物此聖人之游也若夫真人則動溶于至虛而游于滅亡之野騎蜚廉而從敦圄蜚廉獸名長毛有翼敦圄也虎而小一曰仙人名也馳於方外休乎宇內燭十日而使風雨臣雷公役夸父夸父仙人棄其策而為鄧林也妾宓妃妻織女天地之間何足以留其志是故虛無者道之舍平易者道之素素性也淮南鴻烈解卷之三
