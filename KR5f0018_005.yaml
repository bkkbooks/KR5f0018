front:
  text: 淮南鴻烈解卷之五
  hash: sha256:ca89f1c463caa5c2f4faf0b435ec151894401c2de3c5c1c9b16f9f99a6c4d7a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_005-001a, image: hfl/0863/0863-104.png}
body:
  text: 太尉祭酒臣許愼記上天文訓上文者象也天先垂文象日月五星及彗孛皆謂以譴告一人故曰天文因以題篇天墜未形馮馮翼翼洞洞灟灟故曰太昭馮翼洞灟無形之貌洞讀挺桐之桐灟讀以鐵頭斫地之鐲也道始于虚霩虚霩生宇宙宇宙生氣氣有漢垠守四方上下也宙往古來今也將成天地之貌也漢垠重安之貌也清陽者薄靡而爲天薄靡者若埃飛揚之貌重濁者凝滯而爲地清妙之合專一作尃易重濁之凝竭難故天先成而地後定天地之襲精爲隂陽襲合也精氣也隂陽之專精爲四時四時之散精爲萬物積陽之熱氣生火火氣之精者爲日積隂之寒氣者爲水水氣之精者爲月日月之淫爲精者爲星辰天受日月星辰地受水潦塵埃昔者共工與顓頊爭爲帝怒而觸不周之山共工官名伯於虙羲神農之問其後子孫任智刑以强故與顓頊黄帝之孫爭位不周山在西北也天柱折地維絶天傾西北故日月星辰移焉傾高也原道言地東南傾傾下也此先言傾西北明其高也地不滿東南故水潦塵埃歸焉天道曰圓地道曰方方者主幽圓者主明明者吐氣者也是故火曰外景幽者含氣者也是故水曰内景吐氣者施含氣者化是故陽施隂化天之偏氣怒者爲風天地之含氣和者爲雨隂陽相薄感而爲雷薄迫也感動也激而爲霆亂而爲霧陽氣勝則散而爲雨露散霧散也隂氣勝則凝而爲霜雪毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於隂日者陽之主也是故春夏則群獸除除冬毛微墮也日至而麋鹿解日冬至麋角解日夏至鹿角解月者隂之宗也是以月虛而魚腦減月死而蠃硥膲宗本也減少也膲肉不滿言應隂氣也膲讀若物醮妙之醮也火上蕁水下流故鳥飛而高魚動而下物類相動本標相應蕁讀葛覃之覃標讀刀末之末故陽燧見日則燃而爲火陽燧金也取金杯無縁者熟摩令熱日中時以當日下以艾承之則燃得火也方諸見月則津而爲水方諸隂遂大蛤也熟磨拭令熱月盛時以向月下則水生以銅盤受之下水數滴先師說然也虎嘯而谷風至龍舉而景雲屬虎土物也風木風也木生於土故虎嘯而谷風至龍水也雲生水故龍舉而景雲屬屬會也麒麟鬭而日月食鯨魚死而彗星出蠶珥絲而商弦絶蠶老絲成自中徹外然視之如金精珥表裏見故曰珥絲一曰弄絲於口商音清弦細而急故先絶也賁星墜而勃海決賁星客星也又作孛星墜隕也勃大也决溢也人主之情上通于天故誅暴則多飄風暴虐也飄風迅也枉法令則多蟲螟食心曰螟穀之災也殺不辜則國赤地赤地旱也令不收則多淫雨干時之令不收納則久雨爲災四時者天之吏也日月者天之使也星辰者天之期也期會也虹蜺彗星者天之忌也雄爲虹雌爲蜺也虹者雜色也忌禁也天有九野九千九百九十九隅去地五億萬里九野九天之野也一野千一百一十一隅也五星八風二十八宿五星歲星熒惑鎮星太白辰星也八風八卦之風也二十八宿東方角亢氐房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼柳星張翼軫也五官六府五官五行之官六府加以穀紫宫太微軒轅咸池四守天阿皆星名下自解何謂九野中央曰鈞天其星角亢氐韓鄭之分野也東方曰蒼天其星房心尾東北曰變天陽氣始作萬物萌芽故曰變天其星箕斗牽牛尾箕一名折木燕之分野斗吴之分野牽牛一名星紀越分野北方曰玄天其星須女虚危營室虚危一名玄枵齊之分野西北方曰幽天幽隂也西方季秋將即於隂故曰幽天也其星東璧奎婁營室東璧一名承委衛之分野奎婁一名降婁魯之分野西方曰皓天皓白也西方金色白故曰皓天或作吴其星胃昴畢昴畢一名大梁趙之分野西南方曰朱天朱陽也西南爲少陽故曰朱天其星觜巂參東井觜巂參一名實沈晋之分野南方曰炎天其星輿鬼柳七星柳七星張周之分野一名鶉火東南方曰陽天東南純乾用事故曰陽天其星張翼軫翼軫一名鶉尾楚之分野何謂五星東方木也其帝太皡太皡伏羲氏有天下號也死託祀於東方之帝也其佐句芒執圭而治春其神爲歲星其獸蒼龍其音角其日甲乙木色蒼蒼龍順其色也角木也甲乙皆木也南方火也其帝炎帝炎帝少典之子也以火德王天下號曰神農死託祀於南方之帝其佐朱明舊說云祝融執衡而治夏其神爲熒惑其獸朱鳥熒惑五星之一也朱鳥朱雀也其音徵其日丙丁徵火也丙丁皆火也中央土也其帝黄帝黄帝少典之子也以土德王天下號曰軒轅氏死託祀於中央之帝其佐后土執繩而制四方其神爲鎮星其獸黄龍土色黄也其音宫其日戊己宫土戊己士也西方金也其帝少昊少昊黄帝之子青陽也以金德王號曰金天氏死託祀於西方之帝其佐蓐收執矩而治秋其神爲太白其獸白虎其音商其日庚辛商金也庚辛皆金也北方水也其帝顓頊顓頊黄帝之孫以水德王天下號曰高陽氏死託祀於北方之帝也其佐玄㝠執權而治冬其神爲辰星其獸玄武其音羽其日壬癸羽水也壬癸皆水也太隂在四仲則歲星行三宿仲中也四中謂太隂在卯酉子午四面之中也太隂在四鉤則歲星行二宿丑鉤辰申鉤已寅鉤亥未鉤戌謂太隂在四角二八十六三四十二故十二歲而行二十八宿日月行十二分度之一歲行三十度十六分度之七十二歲而周周徧熒惑常以十月入太微受制而出行列宿司無道之國爲亂爲賊爲疾爲喪爲饑爲兵出入無常辯變其色時見時匿此皆所以譴告人君鎮星以甲寅元始建斗歲鎮行一宿當居而弗居其國亡土未當居而居之其國益地歲熟日行二十八分度之一歲行十三度百一十二分度之五十八歲而周鎮星一偏太白元始以正月甲寅與熒惑晨出東方二百四十日而入入百二十日而夕出西方二百四十日而入入三十五日而復出東方出以辰戌入以丑未當出而不出未當入而入天下偃兵當入而不入當出而不出天下興兵辰星正四時常以二月春分效奎婁以五月夏至效東井輿鬼以八月秋分效角亢以十一月冬至效斗牽牛效見出以辰戌入以丑未出二旬而入晨候之東方夕候之西方一時不出其時不和四時不出天下大飢榖不熟爲飢也何謂八風距日冬至四十五日條風至艮卦之風一名融爲笙也條風至四十五日明庶風至震卦之風也爲管也明庶風至四十五日清明風至巽卦之風也爲柷也清明風至四十五日景風至萬卦之風也爲絃也景風至四十五日凉風至坤卦之風也爲塤也凉風至四十五日閶闔風至兊卦之風也爲鍾也閶闔風至四十五日不周風至乾卦之風也爲磬也不周風至四十五日廣莫風至坎卦之風也爲鼓也條風至則出輕繫去稽留立春故出輕繫明庶風至則正封疆脩田疇春分播穀故正封疆治田疇也清明風至則出幣帛使諸侯立夏長善布恩惠故幣帛聘問諸侯也景風至則爵有位賞有功夏至隂氣在下陽盛於上象陽布施故賞有功封建侯也凉風至則報地德祀四郊立秋節農乃登穀常祭故報地德祀四方神也閶闔風至則收縣垂琴瑟不張秋分殺氣國君憯愴故去鐘磬縣垂之樂也不周風至則脩宫室繕邊城立冬節土工其始故治宫室繕脩邊城備寇難也廣莫風至則閉關梁決刑罰象冬閉歲不通關梁也罰刑疑者於是順時而決之何謂五官東方爲田南方爲司馬西方爲理北方爲司空中央爲都田主農司馬主兵理主獄司空主土都爲四方最也何謂六府子午丑未寅申卯酉辰戌巳亥是也太微者太一之庭也太微星名也太一天神也紫宫者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也咸池星名水魚天神天阿者群神之闕也闕猶門也四宫者所以爲司賞罰四官紫宫軒轅咸池天阿太微者主朱鳥主猶典也紫宫執斗而左旋日行一度以周於天日冬至峻狼之山南極之山日移一度月行百八十二度八分度之五而夏至牛首之山牛首北極之山反覆三百六十五度四分度之一而成一歲天一元始正月建寅日月俱入營室五度天一以始建七十六歲日月復以正月入營室五度無餘分名曰一紀凡二十紀一千五百二十歲大終日月星辰復始甲寅元日行一度而歲有竒四分度之一故四歲而積千四百六十一日而復合故舍八十歲而復故曰子午卯酉爲二繩繩直丑寅辰巳未申戌亥爲四鉤東北爲報德之維也報復也隂氣極於北方陽氣發於東方自隂復陽故曰報德之維四角爲維也西南爲背陽之維西南已過陽將復隂故曰背陽之維東南爲常羊之維常羊不進不退之貌東南純陽用事不盛不衰常如此故曰常羊之維西北爲𨂜通之維西北純隂陽氣閉結陽氣將萌𨂜始通之故曰𨂜通之維日冬至則斗北中繩隂氣極陽氣萌故曰冬至爲德德始生也日夏至則斗南中繩陽氣極隂氣萌故曰夏至爲刑刑始殺也隂氣極則下至黄泉北至北極故不可以鑿地穿井萬物閉藏蟄蟲首穴故曰德在室陽氣極則南至南極上至朱天故不可以夷丘上屋萬物蕃息五穀兆長故曰德在野日冬至則水從之日夏至則火從之故五月火正而水漏火正火王也故水滲漏一說火星正中地漏濕也十一月水正而隂勝水正水王也故隂勝也一說營室正中於南方陽氣爲火隂氣爲水水勝故夏至溼火勝故冬至燥燥故炭輕溼故炭重日冬至井水盛盆水溢羊脫毛麋角解鵲始巢八尺之脩日中而景丈三尺日夏至而流黄澤石精出流黄土之精也隂氣作於下故流澤面出也石精五色之精也蟬始鳴半夏生半夏藥草蟁蝱不食駒犢鵞鳥不搏黄口五月微隂在下未成駒犢黄口肌血跪弱未成故蟁鷙鳥應隂不食不搏也八尺之景脩徑尺五寸景脩則隂氣勝景短則陽氣勝隂氣勝則爲水陽氣勝則爲旱隂陽刑德有七舍何謂七舍室堂庭門巷術野十二月德居室三十日先日至十五日後日至十五日而徙所居各三十日德在室則刑在野德在堂則刑在術德在庭則刑在巷隂陽相德則刑德合門八月二月隂陽氣均日夜分平故曰刑德合門德南則生刑南則殺故曰二月會而萬物生八月會而草木死兩維之間九十一度也自東北至東南爲兩維匝四維三百六十五度一度者二千九百三十二里十六分度之五而升日行一度十五日爲一節以生二十四時之變斗指子則冬至音比黄鍾黄鍾十一月也鍾者聚也陽氣聚於黄泉之下也加十五日指癸則小寒音比應鍾應鍾十月也言隂應於陽轉成其功萬物應時聚藏故曰應鍾加十五日指丑則大寒音比無射無射九月也隂氣上升陽氣下降萬物隨陽而藏無有射出見也故曰無射加十五日指報德之維則越隂在地故曰距日冬至四十六日而立春陽氣凍解音比南吕南吕八月也南任也言陽氣内藏隂吕於陽任成其功故曰南吕也加十五日指寅則雨水音比夷則夷則七月也夷傷則法也言陽衰隂發萬物彫傷應法成性故曰夷則也加十五日指甲則雷驚蟄音比林鍾林鍾六月也林衆中聚也陽極隂生萬物衆聚而盛故曰林鍾加十五日指卯中繩故曰春分則雷行音比蕤賔蕤賔五月也隂氣萎蕤在下似主人陽在上似賔客故曰蕤賔也加十五日指乙則清明風至音比仲吕仲吕四月也陽在外隂在中所以吕申於陽助成功也故曰仲吕也加十五日指辰則穀雨音比姑洗姑洗三月也姑故也洗新也陽氣養生去故就新故曰姑洗也加十五日指常羊之維則春分盡故曰有四十六日而立夏大風濟濟止音比夾鍾夾鍾二月也夾夾也萬物去隂夾陽地而生故曰夾鍾也加十五日指巳則小滿小滿四月也音比太蔟太蔟正月律也蔟蔟也言隂衰陽發萬物蔟地而生故曰太蔟加十五日指丙則芒種音比大吕大吕十二月律也吕侣也萬物萌動於下未能達見故曰大吕所以配黄鐘助陽宣功也加十五日指午則陽氣極故曰有四十六日而夏至音比黄鍾加十五日指丁則小暑音比大吕加十五日指未則大暑音比太簇加十五日指背陽之維則夏分盡故曰有四十六日而立秋凉風至音比夾鍾加十五日指申則處暑音比姑洗加十五日指庚則白露降音比仲吕加十五日指酉中繩故曰秋分雷戒蟄蟲北郷音比蕤賔加十五日指辛則寒露音比林鍾加十五日指戌則霜降音比夷則加十五日指𨂜通之維則秋分盡故曰有四十六日而立冬草木畢死音比南吕加十五日指亥則小雪音比無射加十五日指壬則大雪音比應鍾加十五日指子故曰陽生於子隂生於午陽生於子故十一月日冬至鵲始加巢人氣鍾首隂生於午故五月爲小刑薺麥亭歷枯冬生草木必死斗杓爲小歲斗第一星至第四爲魁第五至第七爲杓也正月建寅月從在行十二辰咸池爲太歲二月建卯月從右行四伸終而復始太歲迎者辱背者强左者衰右者昌小歲東南則生西北則殺不可迎也而可背也不可左也而可右也其此之謂也大時者咸池也小時者月建也天維建元常以寅始起右徙一歲不移十二歲而大周天終而復始淮南鴻烈解卷之五
