front:
  text: 淮南鴻烈解卷之八
  hash: sha256:552ab5087d12822d9b28800f50a6a2721c34540d1142899cb2aae1777c80ab6b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_008-001a, image: hfl/0863/0863-178.png}
body:
  text: 太尉祭酒臣許愼記上地形訓下東方川谷之所注日月之所出其人兊形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉蒼色主肝長大早知而不壽其地宜麥多虎豹南方陽氣之所積暑濕居之其人修形兊上大口決眥竅通於耳血脈屬焉赤色主心早壯而夭其地宜稻多兕象西方高土川谷出焉日月入焉其人面末僂修頸卬行竅通於鼻末猶脊也皮革屬焉白色主肺勇敢不仁其地宜黍多旄犀旄讀近綢繆之繆急氣言乃得之北方幽晦不明天之所閉也寒水之所積也蟄蟲之所伏也其人翕形短頸翕讀脅幹之脅大肩下尻竅通於隂骨幹屬焉黑色主腎其人憃愚禽獸而壽憃讀人謂憃然無知之憃也籠口言乃得其地宜菽菽豆也多犬馬傳曰冀之北土馬之所生言燕代出馬也中央四達風氣之所通雨露之所會也其人大面短頤美鬚惡肥竅通於口膚肉屬焉黃色主胃慧聖而好治其地宜禾多牛羊及六畜木勝土土勝水水勝火火勝金金勝木故禾春生秋死禾者木春木王而生秋金王而死菽夏生冬死豆火也夏火王而生冬水王四死麥秋生夏死麥金也金王而生火王而死也薺冬生中夏死薺水也水王而生土王而死也木壯水老火生金囚土死火壯木老土生水囚金死土壯火老金生木囚水死金壯土老水生火囚木死水壯金老木生土囚火死音有五聲宫其主也五聲宫商角徵羽也宫在中央故為主也色有五章黃其主也味有五變甘其主也位有五材土其主也是故鍊土生木鍊木生火鍊火生雲雲金氣所生也鍊雲生水鍊水反土鍊甘生酸鍊酸生辛鍊辛生苦鍊苦生鹹鍊鹹反甘鍊猶治也變宫生徵變徵生商變商生羽變羽生角變角生宫變猶化也是故以水和土以土和火以火化金以金治木木復反土五行相治所以成器用土本也故曰五行相生所以成器用凡海外三十六國自西北至西南方有修股民天民肅愼民修長也股腳也天民肅愼皆有國名也傳曰肅愼燕毫吾北土是云西方黨獨西方之國自復有之邪一曰肅敬也愼畏也白民沃民女子民丈夫民白民白身民被髮髮亦白女子民其貌無有鬚皆如女子也丈夫民其狀皆如丈夫衣竒股民一臂民黃衣冠帶劍皆西方之國也三身民竒隻也股腳也言其人一臂一手一鼻也三身民蓋一頭有三身皆西方之國也自西南至東南方結胸民歡頭國民裸國民三苗民交股民不死民穿胸民反舌民三苗國名也在豫章之彭蠡交股民腳相交切不死民不食也穿胸胸前穿孔達背反舌民不可知而自相曉一説舌本在前不向喉故曰反舌也南方之國名也豕喙民鑿齒民三頭民修臂民豕喙民其喙如豕鑿齒民吐一齒出口下長三尺也三頭民身有三頭也修臂民一國民皆長臂臂長於身也皆南方之國也自東南至東北方有大人國君子國東南壚土故人大也君子國已説在上章也黑齒民玄股民其人黑齒食稻啖蛇在湯上谷玄股民其股黑兩鳥夾之見山海經也毛民勞民其人體半生毛若矢鏇也勞民正理躁擾不定也皆東方國也自東北至西北方有跂踵民句嬰民跂踵民踵不至地以五指行也句嬰讀為九嬰北方之國也深目民無腸民柔利民皆北方之國也一目民無繼民一目民目在面中央無繼民其人蓋無嗣也北方之國也雒棠武人在西北陬皆日所入之山名也硥魚在其南硥魚如鯉魚也有神聖者乘行九野在無繼民之南硥讀如蚌也有神二人連臂為帝候夜在其西南方連臂大呼夜行三珠樹在其東北方有玉樹在赤水之上崑崙華丘在其東南方在無繼民之東南也爰有遺玉青馬視肉其人不知言也楊桃甘樝甘革百果所生皆異物也在木曰果在地曰蓏也和丘在其東北陬四方而高曰丘鸞所自歌鳳所自舞故曰和丘在無繼民東北陬也三桑無枝在其西夸父耽耳在其北方耽耳耳垂在肩上耽讀褶衣之褶或作攝以兩手攝耳居海中夸父棄其策是為鄧林夸父神獸也飲河渭不足將飲西海未至道渴死見山海經策杖也其杖生木而成林鄧猶木也一曰仙人也昆吾丘在南方昆吾楚之祖祝融之孫陸終之子為夏伯也詩云昆吾夏桀也軒轅丘在西方軒轅黃帝有天下之號也巫咸在其北方巫咸知天道明吉凶立登保之山暘谷榑桑在東方暘谷日之所出也榑桑在登保之山東北方也有娀在不周之北長女簡翟少女建疪有娀國名也不周山名也娀讀如嵩高之嵩姊妹二人在瑶臺也帝嚳之妃也天使玄鳥降卯簡翟吞之以生契是為玄王殷之祖也詩云天命玄鳥降而生商也西王母在流沙之瀕地理志曰西王石室在金城臨羌西北塞外也樂民拏閭在崑崙弱水之洲水中可居曰州三危在樂民西三危西極之山名也宵明燭光在河洲所照方千里洲水中所居者燭光所照者方千里龍門在河淵湍池在崑崙龍門在河中馮翊夏隂界也玄耀不周玄耀水名一曰山名申池在海隅海隅藪也孟諸在沛孟諸宋澤也在睢陽東北少室太室在冀州少室太室在陽城嵩高山之别名冀堯都冀州冀為天下之號也燭龍在雁門北蔽于委羽之山不見日其神人面龍身而無足蔽至也委羽北方山名也一日龍銜燭以照太隂蓋長千里視為書暝為夜吹為冬呼為夏后稷壠在建木西建木在都廣都廣南方澤名説其山説其澤壠家也其人死復蘇其半魚在其間南方人死復生或化為魚在都廣建木間流黃沃民在其北方三百里狗國在其東雷澤有神龍身人頭鼓其腹而熙雷澤大澤也鼓擊也熙戲也地理志曰於禹貢雷澤在濟隂城陽西北城陽有堯冢江出岷山東流絶漢入海左還北流至于開母之北右還東流至于東極岷山在蜀西激水絶猶過也開母山名也在東海中河出積石睢出荆山河源出崑崙伏流地中方三千里禹導而通之故出積石積石山在金城郡河關縣西南荆山禹貢北條荆山在左馮翊懷得縣之南下有荆漂原雍州浸也淮出桐柏山睢出羽山桐柏山在上黨清漳出楬戾濁漳出發包楬戾山在上黨治發包山一名鹿苦山亦在上黨長子二漳合流經魏郡入清河也濟出王屋時泗沂出臺台術王屋山在河東垣縣東北時泗沂皆水名臺台術皆山名處則未聞也洛出獵山獵山在北地西北夷中洛東南流入渭詩云瞻彼洛矣惟水泱泱是也汶出弗其流合於濟弗其山在北海朱虛縣東也漢出嶓冢涇出薄落之山嶓冢山漢縣西界漢水所出南入廣漢東南至雍州入江薄落之山一名笄頭山安定臨涇縣西禹貢涇水所出東南至陽陵大渭渭出鳥鼠同穴伊出上魏鳥鼠同穴山在瀧西首陽西南直渭水出東會于澧又入河雍州川也上魏山名也處則未聞雒出熊耳熊耳山在京師止維之西北也浚出華竅維出覆舟汾出燕京燕京山名也在太原汾陽汾水所出西南至汾陽冀州浸𥘛出濆熊淄出目飴目飴山名丹水出高褚高褚一名冢領山在京兆上雒丹水所出東至均入沔也股出嶕山鎬出鮮于涼出茅盧石梁鮮于茅盧石梁皆山名也汝出猛山淇出大號猛山一名高陵山在南定陵縣汝水所出東南至新蔡入淮大號山在河內卭縣北或曰在臨慮西也晉出龍山結給合出封羊結給合一名也龍山在晉陽之西北晉水所出東入汾封羊山名也遼出砥石釜出景砥石山名在塞外遼水所出南入海景山在邯鄲西南釜水所出南澤入漳其原浪沸湧正勢如釜中湯故曰釜今謂之釜口岐出石橋呼池出魯平魯平山名也呼池并州之浸也今中山漢昌呼沱河是也泥塗淵出樠山樠讀人姓樠氏之樠維濕北流出於燕流於北燕北塞外也諸稽攝提條風之所生也諸稽攝提天神之名也艮為條風也通視明庶風之所生也通視天神也明庶風震卦之所生也赤奮若清明風之所生也赤奮若天神也巽為清明風也共工景風之所生也共工天神也人面蛇身離為景風也諸比涼風之所生也諸比天神也坤為涼風也臯稽閶闔風之所生也皋稽天神也兊為閶闔風隅強不周風之所生也隅強天神也乾為不周風窮竒廣莫風之所生也窮竒天神也在北方道足乘雨龍其形如虎坎為廣莫風也突生海人突人之先人海人生若菌菌讀下群之群若菌生聖人聖人生庶人凡容者生於庶人羽嘉生飛龍飛龍羽嘉飛蟲之先飛龍有翼飛龍生鳳凰鳳凰生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生於庶獸介鱗生蛟龍介鱗鱗蟲之先蛟龍有鱗甲之龍也蛟龍生鯤鯁鯤鯁生建邪建邪生庶魚凡鱗者生於庶魚介潭生先龍介國也龜之先潭讀談國之談先龍生玄黿玄黿生靈龜靈龜生庶龜凡介者生庶於龜暖濕生容暖一讀膜當風乾燥之貌也暖濕生於毛風毛風生於濕玄濕玄生羽風羽風生暖介暖介生鱗薄鱗薄生暖介五類雜種興乎外肖形而蕃肖像也言相代象而蕃多也曰馮生陽閼曰馮木之先也陽閼生喬如喬如生幹木幹木生庶木凡根拔木者生於庶木根拔生程若根拔根生之草先也程若生玄玉玄玉生醴泉醴泉生皇辜皇辜生庶草凡根茇草者生於庶草海閭生屈龍海閭浮草之先生屈龍遊龍鴻也詩云隰有遊龍言屈字之誤屈龍生容華容華芙蓉草花容華生蔈蔈流也無根水中草也蔈生萍藻萍藻生浮草凡浮生不根茇者生於萍藻正土之氣也御乎埃天埃天五百歲生缺缺五百歲生黃埃黃埃五百歲生黃澒黃澒五百歲生黃金黃金惟石名也中央數五故五百歲而一化澒水銀也黃金千歲生黃龍入藏生黃泉黃泉之埃上為黃雲隂陽相薄為雷激揚為電上者就下流水就通而合于黃海黃海中央之海偏土之氣御乎清天清天八百歲生青曾青曾八百歲生青澒青澒八百歲生青金青金八百歲生青龍東方木色青其數八故八百歲而一化也青龍入藏生清泉清泉之埃上為青雲隂陽相薄為雲雷激揚為電上者就下流水就通而合于青海東方之海壯土之氣御于赤天赤天七百歲生赤丹赤丹七百歲生赤澒赤澒七百歲生赤金南方火其色赤其數七故七百歲而一化也赤金千歲生赤龍赤龍入藏生赤泉赤泉之埃上為赤雲隂陽相薄為雷激揚為電上者就下流水就通而合于赤海南方之海弱土之氣御于白天白天九百歲生白礜白礜九百歲生白澒白澒九百歲生白金白金白礜礜石也白澒水銀也西方金色白其數九故九百歲而一化也白金千歲生白龍白龍入藏生白泉白泉之埃上為白雲隂陽相薄為雷激揚為電上者就下流水就通而合于白海西方之海牝土之氣御于玄天玄天六百歲生玄砥玄砥黑石玄砥六百歲生玄澒玄澒六百歲生玄金北方水其色黑其數六故六百歲而一化也玄金千歲生玄龍玄龍入藏生玄泉玄泉之埃上為玄雲隂陽相薄為雷激揚為電上者就下流水就通而合于玄海北方之海上者就下天氣復從天流下也其道流之水皆入于海也淮南鴻烈解卷之八
