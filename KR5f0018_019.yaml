body:
  text: 太尉祭酒臣許愼記上道應訓道之所行物動而應考之禍福以知驗符也太清問於無窮太清元氣之清者也無窮無形也曰子知道乎無窮曰吾弗知也又問於無為無為有形而不為也曰子知道乎無為曰吾知道無為有形故知道也子之知道亦有數乎無為曰吾知道有數曰其數奈何無為曰吾知道之可以弱可以強可以柔可以剛可以隂可以陽可以窈可以明可以包裹天地可以應待無方此吾所以知道之數也太清又問於無始無始未始有之氣也曰鄉者吾問道於無窮曰吾弗知之又問於無為無為曰吾知道曰子之知道亦有數乎無為曰吾知道有數曰其數奈何無為曰吾知道之可以弱可以強可以柔可以剛可以隂可以陽可以窈可以明可以包裹天地可以應待無方吾所以知道之數也若是則無為知與無窮之弗知孰是孰非無始曰弗知之深而知之淺弗知內而知之外弗知精而知之粗太清仰而嘆曰然則不知乃知邪知乃不知邪孰知知之為弗知弗知之為知邪無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也孰知形之不形者乎故老子曰天下皆知善之為善斯不善也故知者不言言者不知也白公問於孔子曰人可以微言白公楚平王孫太子建勝也建見殺白公怨而欲復讎故問微言也孔子不應知白公有隂謀故不應也白公曰若以石投水中何如曰吳越之善沒者能取之矣曰若以水投水何如孔子曰災澠之水合易牙嘗而知之災澠齊二水也白公曰然則人固不可與微言乎孔子曰何謂不可誰知言之謂者乎夫知言之謂者不以言言也不以言心知之爭魚者濡逐獸者趍非樂之也故至言去言至為無為夫淺知之所爭者末矣白公不得也故死於浴室楚殺白公於浴室之地也故老子曰言有宗事有君夫唯無知是以不吾知也白公之謂也惠子為惠王為國法惠王梁惠王惠子惠施也已成而示諸先生先生皆善之奏之惠王惠王甚説之以示翟煎曰善惠王曰善可行乎翟煎曰不可惠王曰善而不可行何也翟煎對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若此其宜也治國有禮不在文辨故老子曰法令滋彰盜賊多有此之謂也田駢以道術説齊王田駢齊人齊臣王應之曰寡人所有齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以為政譬之若林木無材而可以為村願王察其所謂而自取齊國之政焉已雖無除其患天地之間六合之內可陶而變化也齊國之政何足問哉此老聃之所謂無狀之狀無物之象者也若王之所問者齊也田駢所稱者材也材不及林林不及雨雨然後材乃得生也雨不及隂陽隂陽不及和和不及道道者末之由生之本也白公勝得荆國不能以府庫分人白公篡得楚國貪其材而不分人也得積七日也七日石乙入曰石乙白公之黨也不義得之又不能布施患必至矣不能豫人不若焚之毋令人害我白公弗聽也九日葉公入葉公楚大夫子高自方城之外入殺白公也乃發大府之貨以豫衆出高庫之兵以賦民因而攻之十有九日而擒白公葉公殺白公也夫國非其有也而欲有之可謂至貪也不能為人又無以自為可謂至愚矣譬白公之嗇也何以異於梟之愛其子也梟子長食其母故老子曰持而盈之不如其已揣而鋭之不可長保也趙簡子以襄子為後董閼子曰無恤賤董閼子趙氏臣也無恤襄子之名簡子之庶子也今以為後何也簡子曰是為人也能為社稷忍羞襄子能柔能忍耻也異日知伯與襄子飲而批襄子之首大夫請殺之襄子曰先君之立我也曰能為社稷忍羞豈曰能刺人哉處十月知伯圍襄子於晉陽襄子疏隊而擊之疏分也隊軍二百人為一隊分斯隊卒擊之大敗知伯破其首以為飲器故老子曰知其雄守其雌其為天下溪齧缺問道於被衣齧缺被衣皆堯時老人也被衣曰正女形一女視天和將至攝女知正女度神將來舍德將來附若美而道將為女居蠢乎若新生之犢而無求其故言未卒齧缺繼以讎夷讎夷熟視不言被衣行歌而去曰形若稿骸心如死灰直實知不以故自持墨墨恢恢無心可與謀彼何人哉故老子曰明白四達能無以知乎趙襄子攻翟而勝之尤人終人尤人終人翟之二邑使者來謁之襄子方將食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰江河之大也不過三日三日而滅飄風暴雨日中不須臾言其不終日今趙氏之德行無所積今一朝兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也賢主以此持勝故其福及後世齊楚吳越皆嘗勝矣然而卒取亡焉不通乎持勝也唯有道之主能持勝孔子徑杓國門之關杓引也古者縣門下從上杓引之者難也而不肯以力聞墨子為守攻公輸般服而不肯以兵知墨子雖善為兵而不肯以知兵聞也善持勝者以強為弱故老子曰道沖而用之又弗盈也惠孟見宋康王蹀足謦咳疾言曰寡人所説者勇有功也不説為仁義者也客將何以教寡人惠孟對曰臣有道於此人雖勇刺之不入雖巧有力擊之不中大王獨無意邪宋王曰善此寡人之所欲聞也惠孟曰夫刺之而不入擊之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人本無其意也夫無其意未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之心此其賢於勇有力也四纍之上也此上九四事皆纍於世而男六莫不歡然為上也大王獨無意邪宋王曰此寡人所欲得也惠孟對曰孔墨是已孔丘墨翟無地而為君無官而為長無地為君以道冨也無官為長以德尊也天下丈夫女子莫不延頸舉踵而願安利之者今大王萬乘之主也誠有其忘則四境之內皆得其利矣此賢於孔墨也遠矣宋王無以應惠孟出宋王謂左右曰辨矣客之以説勝寡人也故老子曰勇於不敢則活由此觀之大勇反為不勇耳昔堯之佐九人謂禹罪陶稷契伯夷倕益夔龍也舜之佐七人皆與堯同臣其七人也武王之佐五人謂周公召公太公畢公毛公也堯舜武王於九七五者不能一事焉然而垂拱受成功焉善乘人之資也故人與驥逐走則不勝驥託於車上則驥不能勝人北方有獸其名曰蹶鼠前而菟後鼠前足短菟後足長故謂之蹶趨則頓走則顛常為蛩蛩駏驉取甘草以與之蛩蛩駏驉前足長後足短故能乘虛而走不能上也蹶有患害蛩蛩駏驉必負而走此以其能託其所不能故老子曰夫代大匠斫者希不傷其手薄疑説衛嗣君以王術嗣君衛國君也嗣君應之曰豫所有者千乘也願以愛教薄疑對曰烏獲舉千鈞又況一斤乎杜赫以安天下説周昭文君昭文君周襄衰分為西東各自立其君也文君謂杜赫曰願學所以安周赫對曰臣之所言不可則不能安周臣之所言可則周自安矣此所謂弗安而安者也故老子曰大制無割故致數輿無輿也魯國之法魯人為人妾於諸候有能贖之者取金於府子贛贖魯人於諸候來而辭不受金孔子曰賜失之矣夫聖人之舉事也可以移風易俗而受教順可施後世非獨以適身之行也今國之富者寡而貧者衆贖而受金則為不廉不受金則不復贖人自今以來魯人不復贖人於諸候矣孔子亦可謂知禮矣故老子曰見小曰明魏武侯問於李克李克武候之相曰吳之所以亡者何也李克對曰數戰而數勝武侯曰數戰數勝國之福其獨以亡何故也對曰數戰則民罷數勝則主憍以憍主使罷民而國不亡者天下鮮矣憍則恣恣則極慮上下俱極吳之亡猶晚矣夫差之所以自剄於干遂也越伐具夫差所自殺也故老子曰功成名遂身退天之道也寧越欲干齊桓公困窮無以自達於是為商旅將任車任載也詩曰我任我輦以商於齊暮宿於郭門之外桓公郊迎客夜問門辟任車爝火甚盛爝炬火也從者甚衆寧越飯牛車下望見桓公而悲擊牛角而疾商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之桓公及至從者以請桓公贛之衣冠而見説以為天下桓公大説將任之羣臣爭之曰客衛人也衛之去齊不遠君不若使人問之而故賢者也用之未晚桓公曰不然問之患其有小惡也以人之小惡而忘人之大美此人主之所以失天下之士也凡聽必有驗一聽而弗復問合其所以也合己聽知之意所以用之且人固難合也權而用其長者而已矣當是舉也桓公得之矣故老子曰天大地大道大王亦大域中有四大而王處其一焉以言其能包裹之也大王亶父居邠翟人攻之事之以皮帛珠玉而弗受曰翟人之所求者地無以財物為也大王亶父曰與人之兄居而殺其弟與人之父處而殺其子弗為皆勉處矣為吾臣與翟人奚以異且吾聞之也不以其所養害其養杖策而去民相連而從之遂成國於岐山之下岐山今之美陽北也其下有周地因是以為天下號也大王亶父可謂能保生矣雖富貴不以養傷身雖貧賤不以利纍形今受其先人之爵祿則必重失之所自來者久矣而輕失之豈不惑哉故老子曰貴以身為天下焉可以託天下愛以身為天下焉可以寄天下矣中山公子牟中山鮮虞之國謂詹子曰身處江海之上心在魏闕之下為之奈何江海之上言忠在於己身心之魏闕也言內守詹子曰重生重生則輕利重生己之性也中山公子牟曰雖知之猶不能自勝則從之從之神無怨乎言不勝己之情欲則當縱心意則己神無怨也不能自勝而強弗從者此之謂重傷之人無壽類矣故老子曰知和曰常知常曰明益生曰祥心使氣曰強是故用其光復歸其明也楚莊王問詹何曰治國奈何對曰何明於治身而不明於治國楚王曰寡人得立宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也未嘗聞身亂而國治者也故本任於身不敢對以末楚王曰善故老子曰修之身其德乃真也桓公讀書於堂桓公齊君輪人斫輪於堂下釋其椎鑿而問桓公曰君之所讀書者何書也桓公曰聖人之書輪扁曰其人在焉輪扁之名問作書之人何在也桓公曰已死矣輪扁曰是直聖人之糟粕耳糟酒滓也粕已漉之精也桓公悖然作色而怒曰寡人讀書工人焉得而譏之哉有説則可無説則死輪扁曰然有説臣誠以臣之斫輪語之大疾則苦而不入苦急意也大徐則甘而不固甘緩意也不甘不苦應於手猒于心而可以至妙者臣不能以教臣之子而臣之子亦不能得之於臣是以行年六十老而為輪今聖人之所言者亦以懷其實窮而死獨其糟粕在耳故老子曰道可道非常道名可名非常名昔者司城子罕相宋謂宋君曰夫國家之危安百姓之治亂在君行賞罰夫爵賞賜豫民之所好也君自行之殺戮刑罰民之所怨也臣請當之宋君曰善寡人當其美子受其怨寡人自知不為諸侯笑矣國人皆知殺戮之專制在子罕也大臣親之百姓畏之居不至期年子罕遂却宋君而專其政故老子曰魚不可脫于淵國之利器不可以示人王壽負書而行見徐馮於周王壽古好書之人徐馮周之隱者也徐馮曰事者應變而動變生於時故知時者無常行書者言之所出也言出於知者知者藏書於是王壽乃焚書而舞之自喜焚其書故舞之也故老子曰多言數窮不如守中令尹子佩請飲莊王子佩楚莊王之相請飲請置酒也莊王許諾子佩疏揖北面立於殿下疏徒跣也揖舉手也曰昔者君王許之今不果往果誠也意者臣有罪乎莊王曰吾聞子具於強臺強臺者南望料山以臨方皇料山名方皇水名也一曰山名左江而右淮其樂忘死若吾薄德之人不可以當此樂也恐留而不能反故老子曰不見可欲使心不亂晉公子重耳出亡過曹無禮焉曹共公聞重耳駢脅使袒而捕魚設薄以觀之釐負羇之妻謂釐負羇曰君無禮於晉公子吾觀其從者皆賢人也從者狐偃趙衰之屬也若以相夫子反晉國必伐曹子何不先加德焉釐負羇遺之壺餕而加璧焉重耳受其餕而反其璧及其反國起師伐曹剋之令三軍無入釐負羇之里故老子曰曲則全枉則直越王勾踐與吳戰而不勝國破身亡困於會稽忿心張膽氣如涌泉選練甲卒赴火若滅然而請身為臣妻為妾親執戈為吳兵先馬走先馬走先馬前果擒之於千遂故老子曰柔之勝剛也弱之勝強也天下莫不知而莫之能行越王親之故霸中國趙簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻圍之未合而城自壞者十丈襄子擊金而退之軍法鼓以進衆鉦以退之軍吏諫曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使之治城城治而後攻之中牟聞其義乃請降故老子曰夫唯不爭故天下莫能與之爭秦繆公請伯樂曰子之年長矣子姓有可使求馬者乎子姓謂伯樂子對曰良馬者可以形容筋骨相也相天下之馬者若滅若失若亡若滅其相不可見也若失乍入乍出也若亡髣佛不及也其一若此馬者絶塵弭徹絶塵不及也弭徹引迹疾也臣之子皆下林也可告以良馬而不可告以天下之馬臣有所與供儋纏采薪者九方堙纏索也九方堙人姓名也此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得馬矣在於沙丘穆公曰何馬也對曰牡而黃使人往取之牝而驪穆公不説召伯樂而問之曰敗矣子之所使求者毛物牝牡弗能知又何馬之能知伯樂喟然大息曰一至此乎是乃其所以千萬臣而無數者也若堙之所觀者天機也得其精而忘其粗在內而忘其外見其所見而不見其所不見視其所視而遺其所不視若彼之所相者乃有貴乎馬者馬至而果千里之馬故老子曰大直若屈大巧若拙吳起為楚令尹適魏問屈宜若屈宜若楚大夫亡在魏者也曰王不知起之不肖而以為令尹先生試觀起之為人也屈子曰將奈何吳起曰將衰楚國之爵而平其制祿損其有餘而綏其不足砥礪甲兵時爭利於天下屈子曰宜若聞之昔善治國家者不變其故不易其常今子將衰楚國之爵而平其制祿損其有餘而綏其不足是變其故易其常也行之者不利宜若聞之曰怒者逆德也兵者凶器也爭者人之所本也今子隂謀逆德好用凶器始人之所本本者謂兵爭也逆之至也且子用魯兵不宜得志於齊而得志焉吳起為將伐齊敗之子用魏兵不宜得志於秦而得志焉吳起為魏西河守秦兵不敢東下也宜若聞之非禍人不能成禍吾固惑吾王之數逆天道戾人理至今無禍差須夫子也差須猶意須也吳起惕然曰尚可更乎屈子曰成形之徒不可更也成刑之徒刑禍已成於衆子不若敦愛而篤行之老子曰挫其鋭解其紛和其光同其塵晉伐楚三舍不止大夫請擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請三擊之王俯而泣涕沾襟起而拜君大夫晉人聞之曰君臣爭以過為在己且輕下其臣不可伐也夜還師而歸老子曰能受國之垢是謂社稷主宋景公之時熒惑在心公懼召子韋而問焉子韋司星者也曰熒惑在心何也子韋曰熒惑天罰也心宋分野宋之分野上屬房心之星禍且當君雖然可移於宰相公曰宰相所使治國家也而移死焉不祥子韋曰可移於民公曰歲民之命歲飢民必死矣為人君而欲殺其民以自活也其誰以我為君者乎是寡人之命固已盡矣子韋無復言矣子韋還走北面再拜曰敢賀君天之處高而聽卑君有君人之言三天必有三賞君今夕星必徙三舍君延年二十一歲公曰子奚以知之對曰君有君人之言三故有三賞星必三徙舍舍行七里三七二十一故君移年二十一歲臣請伏於陛下以司之星不徙臣請死之公曰可是夕也星果三徙舍故老子曰能受國之不祥是謂天下王昔者公孫龍在趙之時謂弟子曰人而無能者龍不能與遊有客衣褐帶索而見曰臣能呼公孫龍顧謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之籍後數日往説燕王至於河上而航在一汜汜水涯也使善呼之一呼而航來故曰聖人之處世不逆有伎能之士故老子曰人無棄人物無棄物是謂襲明子發攻蔡踰之子發楚宣王之將軍踰越勝之也宣王郊迎列田百頃而封之執圭楚爵功臣賜以圭謂之執圭比附庸之君也子發辭不受曰治國立政諸候入賔此君之德也發號施令師未合而敵循此將軍之威也兵陳戰而勝敵者此庶民之力也夫乘民之功榮而取其爵祿者仁義之道也故辭而弗受故老子曰功成而不居夫唯不居是以不去晉文公伐原原周邑周襄王以原賜文公原叛伐也與大夫期三日三日而原不降文公令去之軍吏曰原不過一二日將降矣君曰吾不知原三日而不可得下也以與大夫期盡而不罷失信得原吾弗為也原人聞之曰有君若此可弗降也遂降溫人聞亦請降時周人亦以溫豫文公溫相連皆叛故老子曰窈兮冥兮其中有精其精甚真其中有信故美言可以市尊美行可以加人公儀休相魯公儀休故魯博士也而嗜魚一國獻魚公儀子不受其弟子諫曰夫子嗜魚弗受何也答曰夫唯嗜魚故弗受夫受魚而免於相雖嗜魚不能自給魚毋受魚而不免於相則能長自給魚此眀於為人為己者也故老子曰後具身而身先外其身而身存非以其無私邪故能成其私一曰知足不辱狐丘丈人謂孫叔敖丈人老而杖於人者曰人有三怨子知之乎孫叔敖曰何謂也對曰爵高者士妬之官大者主惡之祿厚者怨處之孫叔敖曰吾爵益高吾志益下吾官益大吾心益小吾祿益厚吾施益博是以免三怨可乎故老子曰貴必以賤為本高必以下為基大司馬捶視果反鈎者年八十矣捶鍛擊也鈎釣鈎也而不失鈎芒大司馬曰子巧邪有道邪曰臣有守也臣年二十好捶鈎於物無視也非鈎無察也是以用之者必假於弗用也而以長得其用而況持不用者乎物孰不濟焉故老子曰從事於道者同於道文王砥德修政三年而天下二垂歸之砥礪也文王三分天下有其二紂聞而患之曰余夙興夜寐與之競行則苦心勞形縱而置之恐伐余一人崇侯虎曰周伯昌行仁義而善謀太子發勇敢而不疑中子旦恭儉而知時若與之從則不堪其殃縱而赦之身必危亡冠雖弊必加於頭及未成請圖之屈商乃拘文王於羑里屈商紂臣也羑里地名也在河內湯隂於是散宜生乃以千金求天下之珍怪得騶虞雞斯之乘騶虞白虎黑文而仁食自死之獸日行千里雞斯神馬也玄玉百工二玉為一工也大貝百朋五貝為一朋也玄豹黃羆青犴音岸杆胡地野犬也白虎文皮千合以獻於紂因費仲而通費仲紂佞臣也紂見而説之乃免其身殺牛而賜之文王歸乃為玉門築靈臺相女童擊鐘鼓玉門以玉飾門為柱樞也相女童相視之一曰相匠也以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃為炮烙剖比干剔孕婦殺諫者文王乃遂其謀故老子曰知其榮守其辱為天下谷成王問政於尹佚曰吾何德之行尹佚史佚而民親其上對曰使之時而敬順之王曰其度安至曰如臨深淵如履薄冰王曰懼哉王人乎尹佚曰天地之間四海之內善之則吾畜也不善則吾讎也昔夏商之臣反讎桀紂而臣湯武宿沙之民皆自攻其君而歸神農伏羲神農之間有共工宿沙霸天下者也此世之所明知也如何其無懼也故老子曰人之所畏不可不畏也跖之徒問跖曰盜亦有道乎跖曰奚適其無道也夫意而中藏者聖也入先者勇也出後者義也分均者仁也知可否者智也五者不備而能成大盜者天下無之由此觀之盜賊之心必託聖人之道而後可行故老子曰絶聖棄智民利百倍楚將子發好求技道之士楚有善為偷者往見曰聞君求技道之士臣偷也願以技齎一卒齎備卒足子發聞之衣不給帶冠不暇正出見而禮之左右諫曰偷者天下之盜也何為之禮君曰此非左右之所得與後無幾何齊興兵伐楚子發將師以當之兵三却楚賢良大夫皆盡其計而悉其誠齊師愈強於是市偷進請曰臣有薄技願為君行之子發曰諾不問其辭而遺之偷則夜解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明又復往取其枕子發又使人歸之明日又復往取其簪子發又使歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚君恐取吾頭則還師而去故曰無細而能薄在人君用之耳故老子曰不善人善人之資也顔回謂仲尼曰回益矣仲尼曰何謂也曰回忘禮樂矣回忘禮樂絶聖棄知入於無為也仲尼曰可矣猶未也異日復見曰回益矣仲尼曰何謂也曰回忘仁義矣仲尼曰可矣猶未也異日復見曰回坐忘矣言坐自忘其身以至道也仲尼造然曰何謂坐忘顔回曰隳支體黜聰明離形去知洞於化通是謂坐忘仲尼曰洞則無善也化則無常矣而夫子薦賢薦先也回入賢丘請從之後故老子曰載營魄抱一能無離乎專氣至柔能如嬰兒乎秦穆公興師將以襲鄭蹇叔曰不可臣聞襲國者以車不過百里以人不過三十里為其謀未及發泄也甲兵未及鋭弊也糧食未及乏絶也人民未及罷病也皆以其氣之高與其力之盛至是以犯敵能威今行數千里又數絶諸侯之地以襲國臣不知其可也君重圖之穆公不聽蹇叔送師衰絰而哭之師遂行過周而東鄭賈人弦高矯鄭伯之命以十二牛勞秦師而賔之三帥乃懼而謀曰吾行數千里以襲人未至而人已知之其備必先成不可襲也還師而去當此之時晉文公適薨未葬先軫言於襄公先軫晉大夫也襄公晉文公子曰昔吾先君與穆公交天下莫不聞諸候莫不知今吾君薨未葬而不弔吾喪而不假道是死吾君而弱吾孤也請擊之襄公許諾先軫舉兵而與秦師遇於大破之擒其三軍以歸穆公聞之素服廟臨以説於衆説解故老子曰知而不知尚矣不知而知病也齊王后死王欲置后而未定使群臣議薛公欲中王之意薛公田嬰也因獻十珥而美其一旦日因問美珥之所在因勸立以為王后齊王大説遂尊重薛公故人主之意欲見於外則為人臣之所制故老子曰塞其兊閉其門終身不勤盧敖遊乎北海盧敖燕人秦始皇召以為博士使求神仙亡而不反也經乎太隂入乎玄闕太隂北方也玄闕北方之山也至於蒙穀之上蒙穀山名見一士焉深目而玄鬢淚注淚水而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂慢然止舞也遁逃乎碑匿於碑隂盧敖就而視之方倦龜殼楚人謂倨為倦龜殼龜甲也而食蛤梨蛤梨海蚌盧敖與之語曰唯敖為背群離黨窮觀於六合之外者非敖而已乎敖幼而好遊至長不渝周行四極唯北隂之未窺今卒覩夫子於是子殆可與敖為友乎若士者齤音拳然而笑曰嘻子中州之民寧肯而遠至此此猶光乎日月言太隂之地尚見日月也而載列星隂陽之所行四時之所生其比夫不名之地猶窔奧也言我所遊不可字名之地以盧敖而所行比之則如窔奧奧室中也若我南遊乎岡㝗之野北息乎沉墨之鄉西窮冥冥之黨東開鴻濛之光此其下無地而上無天聽焉無聞視焉無昫此其外猶有汰沃之汜汰沃四海子天之際水流聲也汜涯也其餘一舉而千萬里千萬里汰汜之外也吾猶未能之在吾尚未至此地今子遊始於此乃語窮觀豈不亦遠哉然子處矣吾與汗漫期于九垓之外汗漫不可知之也九垓九天之外吾不可以久駐若士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕之車止柸治楚人謂恨不得為柸治也悖若有喪也曰吾比夫子猶黃鵠與蠰蟲也蠰蟲蟲之幼也終日行不離咫尺八寸為咫十寸為尺而自以為遠豈不悲哉故莊子曰小人不及大人小知不及大知朝菌不知晦朔朝菌朝生暮死之蟲也生水上狀似蠶蛾一名孳母海南謂之蟲邪蟪蛄不知春秋蟪蛣貂蟟此言明之有所不見也季子治亶父三年季子子賤而巫馬期絻衣短褐巫馬期孔子弟子也易容貌往觀化焉易服而往微以視之見夜魚釋之巫馬期問焉曰凡子所為魚者欲得也今得而釋之何也漁者對曰季子不欲人取小魚也古者魚不盈尺不上俎也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣使人暗行若有嚴刑在其側者季子何以至於此孔子曰丘嘗問之以治言曰誡於此者刑於彼季子必行此術也故老子曰去彼取此罔兩問於景罔兩水之精物也景日月水光晷也曰昭昭者神明也罔兩恍惚之物見景光明以為神也景曰非也罔兩曰子何以知之景曰扶桑受謝日照宇宙扶桑日所出之木也受謝扶桑受日旦澤出之也照照之光輝燭四海闔户塞牖則無由入矣若神明四通並流無所不及上際於天下蟠於地化育萬物而不可為象俯仰之間而撫四海之外照照何足以明之故老子曰天下之至柔馳騁天下之至堅光耀問於無有光耀可見而無有至虛者曰子果有乎其果無有乎有形生於無形何以能生物故問果有乎其無有也無有弗應也光耀不得問而就視其狀貌冥然忽然視之不見其形聽之不聞其聲搏之不可得望之不可極也光耀曰貴矣哉孰能至于此乎豫能有無矣未能無無也言我能使形不可得未能殊無形也及其為無無又何從至於此哉故老子曰無有入于無間吾是以知無為之有益也白公勝慮亂白公將為父復讎起兵亂因思慮之也罷朝而立到杖策錣音針上貫頤策馬捶端有針以刺馬謂之錣到杖策故錣貫頤也血流至地而弗知也鄭人聞之曰頤之忘將何不忘哉白公之父死鄭預之故懼之也此言精神之越於外智慮之蕩於內則不能漏理其形也漏補空也是故神之所用者遠則所遺者近也近謂身也故老子曰不出户知天下不窺牖以見天道其出彌遠其知彌少此之謂也秦皇帝得天下恐不能守發邊戍築長城修關梁設障塞具傳車置邊吏然劉氏奪之若轉閉錘閉錘格也上之錘所以編薄席反覆之易昔武王伐紂破之牧野乃封比干之墓表商容之閭柴箕子之門紂死箕子亡之朝鮮舊居空故柴護之朝成湯之廟發巨橋之粟散鹿臺之錢破鼓折抱弛弓絶絃去舍露宿以示平易解劍帶笏以示無仇於此天下歌謡而樂之諸候執弊相朝三十四世不奪故老子曰善閉者無關鍵而不可開也善結者無繩約而不可解也尹需學御三年而無得焉私自苦痛常寢想之寢堅思之中夜夢受秋駕於師秋駕善御之術明日往朝師望之謂之曰吾非受道於子也恐子不可豫也今日教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之故老子曰致虛極守靜篤萬物并作吾以觀其復也昔孫叔敖三得令尹無喜志三去令尹無憂色延陵季子吳人願一以為王而不肯許由讓天下而弗受晏子與崔杼盟臨死地不變其儀此皆有所遠通也精神通於死生則物孰能惑之荆有佽非得寶劍於干隊干音寒干國在今臨淮出寶劍蓋為莫邪洞鄂之形也還反度江至於中流陽侯之波兩蛟俠繞其船蛟龍屬也魚漏二千五百斤蛟未為之主也佽非謂枻船者枻棹曰嘗有如此而得活者乎對曰未嘗見也於是佽非瞑目勃然攘臂拔劍曰武士可以仁義之禮説也不可劫而奪也此江中之腐肉朽骨棄劍而已余有奚愛焉赴江刺蛟遂斷其頭船中人盡活風波畢除荆爵為執圭孔子聞之曰夫善載腐肉朽骨棄剱者飲非之謂乎故老子曰夫唯無以生為者是賢於貴生焉齊人淳于髠以從説魏王魏王辨之約車十乘將使荆辭而行人以為從未足也復以衡説其辭若然從説説諸候之計當相從也衡説從之非是當橫更計也魏王乃止其行而疏其身失從心志而有不能成衡之事是其所以固也夫言有宗事有本失其宗本技能雖多不若其寡也故周鼎著倕而使齕其指先王以見大巧之不可也故愼子曰匠人知為門能以門愼子名到齊人所以不知門也不知門之要也故必杜然後能門門之要在門外墨者有田鳩者田鳩學墨子之術也欲見秦惠王約車申轅申束留於秦周年不得見客有言之楚王者往見楚王楚王甚悅之豫以節使於秦至因見豫之將軍之節惠王而説之出舍喟然而歎告從者曰吾留秦三年不得見不識道之可以從楚也物故有近之而遠遠之而近者故大人之行不掩以繩掩猶憚也至所極而已矣此所謂管子梟飛而維繩者言為士者上下無常進退無恆不可繩也以喻飛梟從下繩維之而欲翺翔則不可也豐水之深千仞而不受塵垢投金鐵針焉則形見於外非不深且清也魚鱉龍蛇莫肯之歸也是故石上不生五穀秃山不遊麋鹿無所隂蔽隱也昔趙文子問於叔向曰晉六將軍其孰先亡乎六將軍韓魏趙范中行知伯也對曰中行知氏文子曰何乎對曰其為政也以苛為察以切為明以刻下為忠以計多為功譬之猶廓革者也廓之大則大矣裂之道也故老子曰其政悶悶其民純純其政察察其民缺缺景公謂太卜曰子之道何能對曰能動地動震晏子往見公公曰寡人問太卜曰子之道何能對曰能動地地可動乎晏子默然不對出見太卜曰昔吾見句星在房心之間地其動乎句星客星也駟房句星守房心則地動也太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子陽聞之田子陽齊臣也曰晏子默然不對者不欲太卜之死往見太卜者恐公之欺也晏子可謂忠於上而惠於下矣故老子曰方而不割廉而不劌魏文侯觴諸大夫於曲陽飲酒酣文侯喟然嘆曰吾獨無豫讓以為臣子豫讓事知伯而死其難故文侯思以為臣蹇重舉白而進之蹇重文侯臣也舉白進酒曰請浮君浮猶罰也以酒罰君也君曰何也對曰臣聞之有命之父母不知孝子有道之君不知忠臣夫豫讓之君亦何如哉豫讓相其君而君見殺亦何如不足貴也文侯受觴而飲釂不獻釂盡曰無管仲鮑叔以為臣故有豫讓之功故老子曰國家昏亂有忠臣孔子觀桓公之廟桓公魯君也有器焉謂之宥巵宥庒坐右孔子曰善哉乎得見此器顧曰弟子取水水至灌之其中則正中水半巵中也其盈則覆孔子造然革容曰善哉持盈者乎子貢在側曰請問持盈曰揖而損之曰何謂揖而損之曰夫物盛而衰樂極則悲日中而移月盈而虧是故聰明睿知守之以愚多聞博辨守之以儉武力毅勇守之以畏富貴廣大守之以陋德施天下守之以讓此五者先王所以守天下而弗失也反此五者未嘗不危也故老子曰保此道者不欲盈夫唯不盈故能弊而不新成武王問太公曰寡人伐紂天下是臣殺其主而下伐其上也吾恐後世之用兵不休鬪爭不已為之奈何太公曰甚善王之問也夫未得獸者唯恐其創之小也獵禽恐之能殺故恐其創小也已得之惟恐傷肉之多也王若欲久持之則塞民於兊兊耳目鼻口也老子也曰塞其兊也道全為無用之事煩擾之教彼皆樂其業供其情昭昭而道冥冥於是乃去其瞀而載之木瞀被髮也水驚鳥冠也知文者冠鶩解其劍而帶之笏為三年之喪令類不蕃高辭卑讓使民不爭酒肉以通之竽瑟以娛之鬼神以畏之繁文滋禮以弇其質厚葬久喪以亶音丹其家含珠鱗施綸組以貧其財深鑿高壟以盡其力家貧族少慮患者貧以此移風可以持天下弗失故老子曰化而欲作吾將鎮之以無名之朴也淮南鴻烈解卷之十八
