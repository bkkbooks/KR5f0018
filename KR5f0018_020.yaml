  text: 淮南鴻烈解卷之十九神五
  hash: sha256:35b89e722e1fab822be20e500be8cd41818da6da2ca0f7145ef39b15022d56b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_020-001a, image: hfl/0866/0866-004.png}
body:
  text: 太尉祭酒臣許愼記上泛論訓上博説世間古今得失以道為化大歸於一故曰泛論因以題篇古者有鍪而綣領以王天下者矣古者蓋三皇以前也鍪頭著兜鍪帽言未知制冠也綣領皮衣屈而紩之如今胡家韋襲反槢以為領也一説鍪放髮也綣繞頸而已皆無飾德生而不辱刑楷不用也豫而不奪豫豫無財也不奪無所徵求於民也天下不非其服同懷其德非猶譏呵也懷歸也當此之時隂陽和平風雨時節萬物蕃息政不虐生無夭折烏鵲之巢可俯而探也禽獸可羈而從也從猶牽也豈必褒衣博帶句襟委章甫哉褒衣謂方與之衣如今吏人之左衣也博帶大帶詩云垂帶若厲句襟今之曲領曲領褎衣也委委貌冠章甫亦冠之名也古者民澤處復穴處居也復穴重窟一説穴毁隄防崖岸之中以為窟室也冬日則不勝霜雪夏日則不勝暑熱昏虻虻讀詩云言來其𦯶之𦯶也聖人乃作作起也為之築土構木以為宫室構架也謂材木相乘架也上棟下宇以蔽風雨棟屋穩也宇屋之垂以避寒暑而百姓安之安樂也伯余之初作衣也伯余黃帝臣也世本曰伯余制衣裳一曰伯余黃帝緂麻索縷手經指挂其成猶網羅緂鋭索功也緂讀恬然不動之恬後世為之機杼勝復以便其用而民得以掩形御寒掩蔽御止古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩令利用之耨耨除苗穢也木鉤而樵抱甀而汲鉤鎌也鉤讀濟隂句陽之句樵薪蒸甀武今兖州曰小武為甀幽州曰瓦也民勞而利薄後世為之耒耜耰鋤斧柯而樵桔臯而汲耰讀曰優椓塊椎也三輔謂之儓所以覆種也民逸而利多焉古者大川名谷衝絶道路不通往來也乃為窬木方版以為舟航窬空也方並也舟相連為航也故地勢有無得相委輸運所有輸所無乃為靻蹻而超千里肩負儋之勤也靻蹻靻靸也勤勞也而作為之楺輪建輿駕馬服牛民以致遠而不勞代負儋故不勞也為鷙禽猛獸之害傷人而無以禁御也而作為之鑄金鍛鐵以為兵刃猛獸不能為害以兵刃備之故不得為人害也故民迫其難則求其便困其患則造其備人各以其所知去其所害就其所利常故不可循器械不可因也循隨也當時之可改則改之故曰不可也則先王之法度有移易者矣古之制婚禮不稱主人當婚者之身不稱其名也稱諸父兄師友舜不告而娶非禮也堯知舜賢以二女妻舜不告父父頑常欲殺舜舜知告則不得娶也不孝莫大於無後故孟子曰舜不告猶告可立子以長文王舍伯邑考而用武王非制也禮三十而娶三十而娶者隂陽未分時俱生於子男從子數左行三十年立於巳女從子數右行二十年亦立於巳合夫婦故聖人因是制禮使男三十而娶女二十而嫁共男子自巳數左行十得寅故人十月而生於寅故男子數從寅起女自巳數右行得申亦十月而生於申故女子數從申起也伯邑考武王兄廢長立聖以庶代嫡聖人之權耳文王十五而生武王非法也歲星十二歲而周天天道十二而備故國君十二歲而冠冠而娶十五生子重國嗣也不從故制也上句言之宜伯邑考娶也夏后氏殯於阼階之上禮飯于牖下小斂於户內大斂於阼階在牀曰尸在棺曰柩殯於賔位祖於庭葬於墓也於阼階猶在主位未忍以賔道遠之殷人殯於兩楹之間楹柱也記曰殷殯之於堂上兩柱之間賔主共周人殯於西階之上蓋以賔道遣之此禮之不同者也有虞氏用瓦棺有虞氏舜世也瓦棺陶瓦也夏后氏聖周夏后氏禹世無棺槨以瓦廣二尺長四尺側身纍之以蔽土曰聖周也殷人用槨用柏為槨厚之宜以棺為制也周人墻置翣此葬之不同者也周人兼用棺槨故墻設翣狀如今要扇畫文插置棺車箱以為飾多少之差各從其爵命之數也夏后氏祭於暗於室中中夜祭之也殷人祭於陽於堂上日平且祭也周人祭於日出以朝於日出時祭於庭中朝者庭也此祭之不同者也堯大章堯樂也舜九韶舜樂也書曰簫韶九成是也禹大夏禹樂也湯大濩湯樂也周武象武王樂也此樂之不同者也故五帝異道而德覆天下三王殊事而名施後世此皆因時變而制禮樂者譬猶師曠之施瑟柱也所推移上下者無寸尺之度而靡不中音故通於禮樂之情者能作音有本主於中而以知矩彠之所周者也矩方也彠度法也魯昭公有慈母而愛之死為之練冠故有慈母之服慈母者父所命養己者比大夫之妾士之妻謂之女母禮為緦麻三月昭公獨練言其記禮之所由興也陽侯殺蓼侯而竊其夫人故大饗廢夫人之禮陽伐陽陵國侯也蓼侯皋陶之後偃姓之國侯也今在廬江古者大饗飲酒君執爵夫人執豆陽侯見蓼侯夫人美艷因殺蓼侯而娶夫人由是廢致夫人之禮記所由廢也先王之制不宜則廢之末世之事善則著之是故禮樂未始有常也故聖人制禮樂而不制於禮樂聖人能作禮樂不為禮樂所制治國有常而利民為本本要政教有經而令行為上經常也上最也苟利於民不必法古苟周於事不必循舊舊常也傳曰舊不必良舊或作咎也夫夏商之衰也不變法而亡亡謂桀紂三代之起也不相襲而王三代禹湯武也襲因也故聖人法與時變禮與俗化化易衣服器械各便其用法度制令各因其宜故變古未可非而循俗未足多也循隨也俗常也百川異源而皆歸於海以海為宗百家殊業而皆務於治業事也以治為要也王道缺而詩作詩所以刺王道周室廢禮義壞而春秋作春秋所以絶不由禮義也詩春秋學之美者也皆衰世之造也儒者循之以教導於世豈若三代之盛哉以詩春秋為古之道而貴之又有未作詩春秋之時失道之缺也不若道其全也誦先王之詩書不若聞得其言聞得其言不若得其所以言聞聖人之言不如得其未言時本竟得其所以言者言弗能言也聖人所言不妙凡人雖得之口不能以言故道可道者非常道也常道深隱幽冥不可道也猶聖人之言微妙不可言周公事文王也行無專制專獨制斷事無由己請以後行身若不勝衣言若不出口有奉持於文王洞洞屬屬如將不能恐失之洞洞屬屬婉順貌也而將不能勝之恐失之愼至也洞讀挻桐之桐屬讀犁𢺡之𢺡也可謂能子矣武王崩成王幼少周公繼文王之業履天子之籍聽天下之政籍圖籍也政治也籍或作阼也平夷狄之亂夷狄滑夏平除之也誅管蔡之罪蔡叔周公兄也管叔周公弟也二叔監殷而導紂子祿父為流言欲以亂周周公誅之為國故也傳曰大義滅親也負扆而朝諸侯負背也扆户牖之間也言南面也誅賞制斷無所顧問決之於心威動天地聲懾海內懾服也服四海之內可謂能武矣成王既壯周公屬籍致政北面委質而臣事之以圖籍付屬成王致猶歸北面委玉帛之質執臣之禮也請而後為復而後行每事必請復白無擅恣之志無伐矜之色不自伐其功勞也不自矜大其善也可謂能臣矣故一人之身而三變者所以應時矣何况乎君數易世國數易君人以其位達其好憎人人以其寵位行其所好憎其所憎也以其威勢供嗜欲而欲以一行之禮一定之法應時偶變其不能中權亦明矣一行之禮非隨時禮也一定之法非隨時法也故曰不能中權權則因事制宜不失中道也故聖人所由曰道所為曰事道猶金石一調不更事猶琴瑟每絃改調金石鐘聲也故曰調而不更琴瑟絃有數急往有前却故調事亦如之也故法制禮義者治人之具也而非所以為治也言法制禮義可以為治之基耳非所以為治治在其人之德猶弓矢射之具也非能必中也中在其人之功也故仁以為經義以為紀此萬世不更者也若乃人考其身才而時省其用雖日變可也言人能考度其才時省其行擇其善者而崇用之不必循常故曰雖曰變可也唯仁義不可改耳故萬世不更矣天下豈有常法哉隨其時於其宜當於世事得於人理順於天地祥於鬼神則可以正治矣當合也祥順也古者人醇工龐商撲女重醇厚不虛華也工龐氣堅緻也商撲不為詐也女重貞正無邪也是以政教易化風俗易移也今世德益衰民俗益薄欲以朴重之法治既弊之民是猶無鏑銜橛策錣而御馯馬也鏑銜口中央鐵大如雞子中黃所制馬口也鍛揣頭針也馯馬突馬也昔者神農無制令而民從無制令結繩以治之唐虞有制令而無刑罰有制令焕乎其有文章也其政常仁義民無犯法干誅故曰無刑也夏后氏不負言言而信也殷人誓以言語要誓亦不違周人盟有事而會不協而盟盟者殺牲歃血以為信也逮至當今之世謂淮南王作此書時忍詬而輕辱貪得而寡羞欲以神農之道治之則其亂必矣伯成子高辭為諸侯而耕天下高之伯成子高蓋堯時人也詬讀夏后之后也今之時人辭官而隱處為鄉邑之下豈可同哉古之兵弓劍而已矣槽柔無擊修戟無别槽柔木矛也無擊無鐵刃也刺鋒也槽讀領如蠐螬之螬也晚世之兵隆衝以攻渠幨以守隆高也衝所以臨敵城衝突壞之渠漸也一曰渠甲名也國語曰奉文渠之甲是也幨幰所以禦矢也連弩以射銷車以鬪連車弩通一絃以牛挽之以刃著左右為機開發之曰銷車銷讀絙綃之綃也古之伐國不殺黃口不獲二毛黃口幼也二毛有白髮於古為義於今為笑古之所以為榮者伯成子高今之所以為辱也為鄉邑之下也古之所以為治者今之所以為亂也夫神農伏羲不施賞罰而民不為非然而立政者不能廢法而治民不能及神農伏羲舜干戚而服有苗舜之初有苗叛舜執干戚而舞於兩階之間有苗服從之以德化懷來也然而征伐者不能釋甲兵而制強暴不能及舜由此觀之法度者所以論民俗而節緩急也器械者因時變而制宜適夫聖人作法而萬物制焉制猶從也賢者立禮而不肖者拘焉拘猶檢也制法之民不可與遠舉拘禮之人不可使應變耳不知清濁之分者不可令調音心不知治亂之源者不可令制法必有獨聞之耳獨見之明然後能擅道而行矣夫殷變夏周變殷春秋變周變改三代之禮不同何古之從大人作而弟子循循隨知法治所由生則應時而變不知法治之源雖循古終亂今世之法籍與時變禮義與俗易為學者循先襲業據籍守舊教以為非此不治是猶持方枘而周員鑿也欲得宜適致固焉則難矣今儒墨者稱三代文武而弗行是言其所不行也不能行但言之而已非今時之世而弗改是行其所非也稱其所是行其所非是以盡日極慮而無益於治勞形竭智而無補於主也今夫圖工好畫鬼魁而憎圖狗馬者何也鬼魅不世出而狗馬可日見也夫存危治亂非智不能道而先稱古雖愚有餘故不用之法聖王弗行不驗之言聖王弗聽聽受天地之氣莫大於和和故能生萬物和者隂陽調日夜分而生物春分而生秋分而成生之與成必得和之精精氣故聖人之道寬而栗嚴而溫柔而直猛而仁言剛柔寬猛相濟也太剛則折太柔則卷聖人正在剛柔之間乃得道之本本源也積隂則沉積陽則飛隂陽相接乃能成和夫繩之為度也可卷而伸也引而伸之可直而晞晞望故聖人以身體之體行夫修而不橫短而不窮直而不剛久而不忘者其唯繩乎故恩椎則懦懦則不威椎猶移也嚴推則猛猛則不和愛推則縱縱則不令縱放刑椎則虐虐則無親虐害也喜害人人無親之昔者齊簡公釋其國家之柄而專任其大臣簡公悼公陽生之子任也一德不解曰簡大臣陳成子也將相攝威擅勢私門成黨而公道不行黨羣故使陳成田常鴟夷子皮得成其難難殺簡公之難使吕氏絶祀太公姓吕簡公其後也絶祀陳氏代之而陳氏有國者此柔懦所生也鄭子陽剛毅而好罰子陽鄭君也一曰鄭相其於罰也執而無赦舍人有折弓者畏罪而恐誅則因猘狗之驚以殺子陽舍人家臣也國人逐猘狗以亂擾舍人因之以殺子陽畏其嚴也此剛猛之所致也今不知道者見柔懦者侵則矜為剛毅見剛毅者亡則矜於為柔懦此本無主於中而見聞舛馳於外者也舛乖故終身而無所定趨安定也趨歸也譬猶不知音者之歌也濁之則鬱而無轉鬱湮也轉讀傳譯之傳也清之則燋而不謳憔悴也謳和也及至韓娥秦青薛談之謳三人皆善謳侯同曼聲之歌二人善歌一曰曼長憤於志積於內盈而發音則莫不比於律而和於人心何則中有本主以定清濁不受於外而自為儀表也今夫盲者行於道人謂之左則左謂之右則右遇君子則易道遇小人則陷溝壑何則目無以接物也見髮故魏兩用樓翟吳起而亡西河魏文侯任撲翟吳起不用他賢秦伐喪其西河之地湣王專用淖齒而死于東廟湣讀汶水之汶湣王田常之後代吕氏為齊侯也春秋之後僣號稱王淖齒楚將奔齊為臣泯王無道淖齒殺之擢其筋懸廟門之梁三日死見戰國策也無術以御之也文王兩用吕望召公奭而王吕望太公吕尚也善用兵謀奭召康公善理民物有甘棠之歌也楚莊王專任孫叔敖而霸有術以御之也孫叔敖楚大夫蒍賈伯盈子或曰童子也任其賢故致於霸也夫弦歌鼓舞以為樂盤旋揖讓以修禮厚葬久喪以送死孔子之所立也而墨子非之非猶譏也兼愛上賢右鬼非命墨子之所立也而楊子非之兼三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右猶尊也順四時而行是以非命皆楊子所不貴故非也全性保真不以物纍形楊子之所立也而孟子非之全性保真謂不拔骭毛以利天下弗為不以物纍己身形也孟子受業於子思之門成唐虞三代之德敘詩書孔子之意塞楊墨淫辭故非之也趨捨人異各有曉心故是非有處得其處則無非失其處則無是丹穴太蒙反踵空同大夏北户竒肱修股之民是非各異習俗相反丹穴南方當日下之地太蒙四方日所入處也反踵國名其人南行武迹北面空同戴勝極下之地大夏在西方其户在南方竒肱修股之民在西南方凡此八者皆九州之外八寅之域者也君臣上下夫婦父子有以相使也此之是非彼之是也此之非非彼之非也此近諭諸華也彼遠諭八寅也於諸華之所是八寅之所非而廢也於諸華所非八寅所是而行也譬若斤斧椎鑿之各有所施也施宜禹之時以五音聽治禹顓頊後五世鯀之子也名文命受禪成功曰禹五音宫商角徵羽也懸鐘鼓磬鐸置鞀以待四方之士為號曰教寡人以道者擊鼓道和隂陽鼓一聲以調五音故擊之論寡人以事者振鐸鐸鈴金口木舌合為音聲事者非一品故振之語寡人以憂者擊磬磬石也聲急憂亦急務故擊磬有獄訟者搖鞀獄亦訟訟一辨於事故取小鞀搖當此之時一饋而十起一沐而三捉髮饋者食也以勞天下之民勞猶憂也勞讀勞來之勞也此而不能達善效忠者則才不足也當此之時不能達其善效致其忠自為無有其才也秦之時高為臺榭大為苑囿遠為馳道鑄金人秦皇帝二十六年初兼天下有長人見於臨洮其高五丈足迹六尺放寫其形鑄金人以象之翁仲君何是也發適戍入芻稿戍守長城也入芻稿之稅以徘供國用也頭會箕賦輸於少府頭會隨民口數人青其稅箕賦似箕然斂民財多取意也少府官名如今司農丁壯丈夫西至臨洮狄道臨洮壟西之縣洮水出北狄道漢陽之縣是也東至會稽浮石會稽山名也浮石隨水高下言不沒皆在遼西界一説會稽山在太山下封于太山禪於會稽是也會稽或作滄海南至豫章桂林豫章豫章郡桂林鬱林郡也北至飛狐陽原飛狐蓋在代郡南飛狐山也陽原蓋在太原或曰代郡廣昌東五阮門是也道路死人以溝量言滿溝也當此之時忠諫者謂之不祥而道仁義者謂之狂逮至高皇帝存亡繼絶漢高祖劉季也舉天下之大義身自奮袂執鋭以為百姓請命于皇天執利兵伐無道以求百姓之命祈之於皇天也當此之時天下雄雋豪英暴露于野澤才過千人為雋百人為豪萬人為英也前蒙矢石而後墮溪壑出百死而紿一生以爭天下之權墮入也紿至也紿讀仍代之代也奮武厲誠以決一旦之命當此之時豐衣博帶而道儒墨者以為不肖言尚武也逮至暴亂已勝勝暴亂也海內大定繼文之業立武之功繼文王受命之業武王誅無道之功履天子之圖籍造劉氏之貌冠高祖於新豐下作竹皮冠也之曰委貌冠總鄒魯之儒墨通先聖之遺教戴天子之旗乘大路建九斿撞大鐘擊鳴鼓奏咸池揚干戚周禮天子五路大路上路也王者功成作樂故撞鐘擊鼓咸池黃帝樂也干楯也戚斧也春夏舞者所執當此之時有立武者見疑疑怪也一世之間而文武代為雌雄有時而用也今世之為武者則非文也為文者則非武也文武更相非而不知時世之用也此見隅曲之一指而不知八極之廣大也隅曲室中之區隅言狹小八極八方之極言廣大也故東面而望不見西墻南面而視不覩北方唯無所嚮者則無所不通無所向則可以見四方故曰無所不通國之所以存者道德也道德施行民説其化故國存也家之所以亡者理塞也理道堯無百户之郭舜無置錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處岐周之間也地方不過百里而立為天子者有王道也堯舜禹湯文王皆王有天下孟子曰以德行仁者身王不待亦是也夏桀殷紂之盛也人迹所至舟車所通莫不為郡縣然而身死人手而為天下笑者有亡形也孟子曰惡死亡樂不仁不仁必死亡故曰有亡形也故聖人見化以觀其徵徵成德有盛衰風先萌焉風氣也萌見也有盛德者謂文王也伯夷太公先見之有衰德者謂桀太史令終古及向藝先去之也故得王道者雖小必大湯武是也有亡形者雖成必敗桀紂是也夫夏之將亡太史令終古先奔於商三年而桀乃亡湯滅之也殷之將敗也太史令向藝先歸文王期年而紂乃亡武王滅之故聖人之見存亡之迹成敗之際也非乃鳴條之野甲子之日也湯伐桀禽於鳴條武王誅紂以甲子尅之今謂強者勝則度地計衆富者利則量粟稱金若此則千乘之君無不霸王者而萬乘之國無不破亡者矣存亡之迹若此其易知也愚夫蠢婦皆能論之蠢亦愚無智之貌也趙襄子以晉陽之城霸智伯以三晉之地擒智伯智繇襄子無恤也三晉智氏兼有韓魏智伯帥韓魏之君圍趙襄子於晉陽趙襄子使張孟談與韓魏通謀韓魏反而擊之大破智伯之軍獲其首以為飲器故曰以三晉之地擒也湣王以大齊亡為淖齒所殺也田單以即墨有功燕伐齊而代之得七十城唯即墨未下田單以市吏率即墨市民以擊燕師破之故能有功也故國之亡也雖大不足恃大猶亡智伯是道之行也雖小不可輕湯以七十里文王以百里皆有天下故雖小不可輕也由此觀之存在得道而不在於大也得道之君雖小為善而能王天下故曰不在於大也亡在失道而不在於小也無道之君雖小以為惡無傷而弗革積必亡故曰不在於小也詩云乃眷西顧此惟與宅言去殷而遷于周也紂治朝歌在東文王國於岐周在西天乃眷然顧西土此唯居周言我宅也故曰去殷而遷于周也故亂國之君務廣其地而不務仁義務高其位而不務道德是釋其所以存而造其所以亡也故桀囚於焦門而不能自非其所行不自非行之惡而悔不殺湯於夏臺臺或作宫紂拘於宣室而不反其過反悔而悔不誅文王於羑里悔恨也羑里今河內湯隂是也羑古牖守二君處強大勢位修仁義之道湯武救罪之不給何謀之敢當二君桀紂也當其君也強大之勢不能自知所行之非也假令能修仁義之道則湯武不敢生誅之謀也若上亂三光之明下失萬民之心三光日月星辰也失萬民心施民所惡也雖微湯武孰弗能奪也言遭人能奪之不必湯武也今不審其在己者而反備之于人言不愼行己之德而乃反備天下之人來誅也天下非一湯武也殺一人則必有繼之者也且湯武之所以處小弱而能以王者以其有道也桀紂之所以處強大而見奪者以其無道也今不行人之所以王者而反益己之所以奪是趨亡之道也武王剋殷欲築宫於五行之山五行山今太行山也在河內野王縣北上黨關也周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者回也回迂難也回或作固固必也使我有暴亂之行則天下之伐我難矣周公言我有暴亂之行則天下當來伐我無為於五行之山使天下來伐我者難也言其依德不恃險也此所以三十六世而不奪也周公可謂能持滿矣滿滿而不溢也故曰能持滿也昔者周書有言曰周史之書上言者下用也下言者上用也可否相濟上言者常也為君常也下言者權也此存亡之術也權謀也謀度事宜不失其道也唯聖人為能知權言而必信期而必當天下之高行也直躬其父攘羊而子證之直躬楚葉縣人也葉公子高謂孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣凡六畜自來而取之曰攘之尾生與婦人期而死之尾生魯人與婦人期於梁下水至溺死也直而證父信而溺死雖有直信孰能貴之夫三軍矯命過之大者也秦穆公興兵襲鄭過周而東以兵伐國不擊鼓密聲曰襲周者王城也公羊傳曰王城者河西周也今河南縣也鄭賈人弦高將西販牛道遇秦師於周鄭之間乃矯鄭伯之命犒以十二牛賔秦師而却之非君命也而稱君命曰矯酒肉曰嚮牛羊曰犒芬其枯稿也秦師曰行千里而襲之遠主有備而師無繼不如還遂還師而去也故曰却之以存鄭國故事有所至信反為過誕反為功信為過者尾生是誕為功者弦高是也何謂失禮而有大功昔楚恭王戰於隂陵恭王與晉厲戰於隂陵吕錡射於恭王中厥目而擒之過而能改故曰恭也潘尪養由基黃衰微公孫丙相與篡之四子楚大夫篡晉取恭王衰讀繩之維微讀抆誠之抆也恭王懼而失體威儀不如常坐不能起也黃衰微舉足蹴其體恭王乃覺怒其失禮奮體而起四大夫載而行失禮謂舉足蹴君也昔蒼吾繞娶妻而美以讓兄此所謂忠愛而不可行者也蒼吾繞孔子時人以妻美好推與其兄於兄則愛矣而違親近曲顧之義故曰不可行也是故聖人論事之扃曲直與之屈伸偃仰無常儀表時屈時伸卑弱柔如蒲韋非攝奪也剛強猛毅志厲青雲非本矜也以乘時應變也夫君臣之接屈膝卑拜以相尊禮也至其迫於患也則舉足蹴其體天下莫能非也是故忠之所在禮不足以難之也孝子之事親和顔卑體奉帶運履運正回也至其溺也則捽其髮而拯拯升也出溺曰拯也非敢驕侮以救其死也故溺則捽父祝則名君孟子曰嫂溺而不拯是豺狼也而况父兄乎故溺則拯之祝則名君周人以諱事神敬至也勢不得不然也此權之所設也故孔子曰可以共學矣而未可以適道也適之道仁義之善道可與適道未可以立也立德立功立言可以立未可與權權者聖人之所獨見也故忤而後合者謂之知權忤逆不合也權因事制宜權量輕重無常形勢能合醜反善合於宜適故聖人獨見之也合而後舛者謂之不知權不知權者善反醜矣故禮者實之華而偽之文也方於卒迫窮遽之中也則無所用矣無所用於禮也是故聖人以文交於世而以實從事於宜不結於一迹之塗凝滯而不化是故敗事少而成事多號令行于天下而莫之能非矣結猶衆也猩猩知往而不知來猩猩北方獸名人面獸身黃色禮記曰猩猩能言不離走獸見人往走則知人姓字此知往也又嗜酒人以酒搏之飲而不能息不知當醉以擒其身故曰不能知來也乾鵠知來而不知往乾鵠鵲也人將有來事憂喜之徵則鳴此知來也知歲多風多巢於木枝人皆探其卵故曰不知往也乾讀乾燥之乾鵠讀告退之告此修短之分也昔者萇弘周室之執數者也萇弘周景王之大夫也數曆術天地之氣日月之行風兩之變律曆之數無所不通然而不能自知車裂而死晉范中行氏之難以畔其君也周劉氏與晉范氏世為婚姻萇弘事劉文公故周人助范氏至敬王二十八年晉人讓周周為殺萇弘以釋之故曰而不能自知車裂而死也蘇秦匹夫徒步之人也靻蹻嬴蓋經營萬乘之主服諾諸侯然不自免於車裂之患蘇秦洛陽人也嬴籯囊也蓋步蓋也蘇秦相趙趙封之為武安君初帶籯囊襜步蓋歷説萬乘之君合東山之從利病之勢無所不下使諸侯服從無有不服諾者故曰服諾諸侯不自免於車裂之患説在詮言之篇淮南鴻烈解卷之十九
