front:
  text: 淮南鴻烈解卷之二十二神八
  hash: sha256:484100f55d40e74cbab9776f1382a861ed286d75870ac436ac258133512a1503
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_023-001a, image: hfl/0866/0866-111.png}
body:
  text: 太尉祭酒臣許愼記上兵略訓兵防也防亂之萌皆在略謀解喻至論用師之意也古之用兵者非利土壤之廣而貪金玉之略略獲得也將以存亡繼絶平天下之亂而除萬民之害也凡有血氣之蟲含牙帶角前爪後距有角者觸有齒者噬有毒者螫有蹄者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也故羣居雜處分不均求不贍則爭爭則强脅弱而勇侵怯人無筋骨之强爪牙之利故割革而為甲爍鐵而為刃貪昧叨餮之人殘賊天下萬人搔動莫寧其所有聖人勃然而起乃討强暴平亂世夷險除穢以濁為清以危為寧故不得不中絶中絶謂若殷王中相絶滅兵之所由來者遠矣黃帝嘗與炎帝戰矣炎帝神農之末世也與黃帝戰於阪泉黃帝滅之顓頊嘗與共工爭矣共工與顓頊爭為帝觸不周山故黃帝戰於涿鹿之野黃帝與蚩尤戰於涿鹿涿鹿在上谷堯戰於丹水之浦堯以楚伯受命滅不義於丹水丹水在南陽舜伐有苗有苗三苗啓攻有扈禹之丁啓伐有扈於甘甘在右扶風郡自五帝而弗能偃也又况衰世乎夫兵者所以禁暴討亂也炎帝為火災故黃帝擒之共工為水害故顓頊誅之教之以道導之以德而不聽則臨之以威武臨之威武而不從則制之以兵革故聖人之用兵也若櫛髮耨苗所去者少而所利者多殺無罪之民而養無義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉使夏桀殷紂有害於民而立被其患不至於為炮烙晋厲宋康行一不義而身死國亡不至於侵奪為暴此四君者皆有小過而莫之計也故至於攘天下攘亂害百姓肆一人之邪而長海內之禍此大論之所不取也所為立君者以禁暴討亂也今乘萬民之力而反為殘賤是為虎傅翼曷為弗除夫畜池魚者必去猵獺猵獺之類養禽獸者也必去豺狼又况治人乎故霸王之兵以論慮之以策圖之以義扶之非以亡存也將以存亡也故聞敵國之君有加虐於民者則舉兵而臨其境責之以不義刺之以過行兵至其郊乃令軍師曰無伐樹木毋扣墳墓毋𤑔五穀𤑔燒毋焚積聚毋捕民虜毋收六畜乃發號施令其國之君傲天侮鬼决獄不辜殺戮無罪此天之所以誅也民之所以仇也兵之來也以廢不義而復有德也有逆天之道帥民之賊者身死族滅以家聽者祿以家以里聽者賞以里以鄉聽者封以鄉以縣聽者侯以縣尅國不及其民廢其君而易其政尊其秀士而顯其賢良振其孤寡恤其貧窮出其囹圄賞其有功百姓開門而待之淅米而儲之淅漬唯恐其不來也此湯武之所以致王而齊桓晋文之所以成霸也故君為無道民之思兵也若旱而望雨渴而求飲夫有誰與交兵接刃乎故義兵之至也至於不戰而止晚世之兵君雖無道莫不設渠塹傳堞而守傅守也堞城上女墻攻者非以禁暴除害也欲以侵地廣壤也是故至於伏尸流血相支以日而霸王之功不世出者自為之故也夫為地戰者不能成其王為身戰者不能立其功舉事以為人者衆助之舉事以自為者衆去之衆之所助雖弱必强衆之所去雖大必亡兵失道而弱得道而强將失道而拙得道而工國得道而存失道而亡所謂道者體圓而法方背隂而抱陽左柔而右剛履幽而戴明變化無常得一之原以應無方是謂神明夫圓者天也方者地也天圓而無端故不可得而觀地方而無垠故莫能窺其門天化育而無形象地出長而無計量渾渾沉沉孰知其藏凡物有朕唯道無朕言萬物可朕也而道不可朕也所以無朕者以其無常形勢也輪轉而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制刑而無刑故功可成物物而不物故勝而不屈刑兵之極也至於無刑可謂極之矣是故大兵無創與鬼神通五兵不厲天下莫之敢當建鼓不出庫諸侯莫不懾㥄沮膽其處故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也修政於境內而遠方慕其德制勝於未戰而諸侯服其威內政治也古得道者靜而法天地動而順日月喜怒而合四時叫呼而比雷霆音氣不戾八風詘伸不獲五度獲誤也五度五行也下至介鱗上及毛羽修修葉貫萬物百族由本至末莫不有序是故入小而不逼逼迫處大而不窕浸乎金石潤乎草木宇中六合振毫之末或曰宇中四宇也六合六合內莫不順比道之浸洽滒淖纖微無所不在是以勝權多也夫射儀度不得則格的不中格射之椹質也的射准也驥一節不用而千里不至夫戰而不勝者非鼓之日也鼓之日謂陳兵擊鼓聞之日素行無刑久矣故得道之兵車不發軔軔車不支騎不被鞍鼓不振塵旗不解卷卷束也甲不離矢刃不嘗血朝不易位賈不去肆農不離野招義而責之大國必朝小城必下因民之欲乘民之力而為之去殘除賊也故同利相死同情相成同欲相助順道而動天下為嚮因民而慮天下為鬭獵者逐禽車馳人趍各盡其力無刑罰之威而相為斥闉要遮者斥候也闉塞也同所利也同舟而濟於江卒遇風波百族之子捷椊招杼船捷疾取也若左右手不以相得其憂同也故明王之用兵也為天下除害而與萬民共享其利民之為用猶子之為父弟之為兄威之所加若崩山决塘敵孰敢當故善用兵者用其自為用也不能用兵者用其為己用也用其自為用則天下莫不可用也用其為己用所得者鮮矣兵有三詆為大詆要事也治國家理境內行仁義布德惠立正法塞邪隧群臣親附百姓和輯上下一心君臣同力諸侯服其威而四方懷其德修政廟堂之上而折衝千里之外拱揖指撝而天下響應此用兵之上也地廣民衆主賢將忠國富兵强約束信號令明兩軍相當鼓錞相望錞錞于太鐘也未至兵交接刃而敵人奔亡此用兵之次也知土地之宜習險隘之利明竒政之變察行陳解贖之數維抱綰而鼓之綰貫抱係於臂以擊鼓也白刃合流矢接涉血屬腸輿死扶傷流血千里暴骸盈場乃以决勝此用兵之下也今夫天下皆知事治其末而莫知務修其本釋其根而樹其枝也夫兵之所以佐勝者衆而所以必勝者寡甲堅兵利車固馬良畜積給足士卒殷軫殷衆軫乘輪多盛貌此軍之大資也而勝亡焉明於星辰日月之運刑德竒賌之數竒賌隂陽竒祕之要非常之術背鄉左右之便此戰之助也而全亡焉良將之所以必勝者恆有不原之智不道之道難以衆同也夫論除謹論除為賢除吏謹愼也動靜時吏卒辨兵甲治正行五連什伯明鼓旗此尉之官軍尉所以尉鎮衆也前後知險易見敵知難易發斥不忘遺發有所見斥斥度使視也此侯之官也軍侯侯望者也隧路亟隧道也亟言治軍遂道疾行輜治行輜道路輜重賦丈均賦治軍壘尺丈均平處軍輯井竈通此司空之官也軍司空補空修繕者收藏於後遷舍不離無淫輿無遺輜此輿之官也輿衆也候領輿衆在軍之後者凡此五官之於將也猶身之有股肱手足也必擇其人枝能其才使官勝其任人能其事告之以政申之以令使之若虎豹之有爪牙飛鳥之有六翮莫不為用然皆佐勝之具也非所以必勝也兵之勝敗本在於政政勝其民下附其上則兵强矣民勝其政下畔其上則兵弱矣故德義足以懷天下之民事業足以當天下之急選舉足以得賢士之心謀慮足以知强弱之勢此必勝之本也地廣人衆不足以為强堅甲利兵不足以為勝高城深池不足以為固嚴令繁刑不足以為威為存政者雖小必存為亡政者雖大必亡昔者楚人地南卷沅湘卷屈取也沅湘二水名北繞潁泗潁泗二水名也西包巴蜀東裹郯淮巴蜀郯淮地名穎汝以為洫洫溝江漢以為池垣之以鄧林鄧林沔水上險綿之以方城綿落也方城楚北塞也在南陽葉也山高尋雲溪肆無景肆極也極溪之深不見景地利形便卒民勇敢蛟革犀兕以為甲胄修鍛短鏦鏦小矛也齊為前行積弩陪後積弩連弩錯車衛旁疾如錐矢錐金蔟箭羽之矢也合如雷電解如風雨然而兵殆於垂沙垂沙地名衆破於柏舉楚國之强大地計衆中分天下然懷王北畏孟嘗君脅於齊也背社稷之守而委身强秦懷王入秦秦留之藍田也兵挫地削身死不還二世皇帝二世秦始皇少子胡亥也勢為天子富有天下人迹所至舟楫所通莫不為郡縣然縱耳目之欲窮侈靡之變不顧百姓之飢寒窮匱也興萬乘之駕而作阿房之宫阿房地名秦所築也發閭左之戍秦皆發閭左民未及發而秦亡也收太半之賦資民之三而稅二百姓之隨逮肆刑挽輅首路死者隨逮應召也肆刑極刑輅挽輦橫木也一旦不知千萬之數天下敖然若焦熱傾然若苦烈上下不相寧吏民不相憀憀賴戍卒陳勝興於大澤攘臂袒右陳勝字涉汝隂人也大澤沛蘄縣袒右脫右臂衣也稱為大楚而天下響應當此之時非有牢甲利兵徑弩强衝也伐棘棗而為矜棘棗酸棗也矜矛柄同周錐鑿而為刃周內也撚矜以內鑽鑿也剡摲筡奮儋钁摲剡鋭也钁斫也以當修戟强弩攻城略地莫不降下天下為之麋沸蟻動雲徹席卷方數千里勢位至賤而器械甚不利然一人唱而天下應之者積怨在於民也武王伐紂東面而迎歲太歲在寅至汜而水汜地名也水有大雨水也至共頭而墜共頭山名在河曲共山墜隕也彗星出而授殷人其柄時有慧星柄在東方可以掃西人也當戰之時十日亂於上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢拔而天下得矣是故善守者無與御而善戰者無與鬪明於禁舍開塞之道乘時勢因民欲而取天下故善為政者積其德善用兵者畜其怒德積而民可用怒畜而威可立也故文之所以加者淺則勢之所勝者小德之所施者傳則威之所制者廣威之所制者廣則我强而敵弱矣故善用兵者先弱敵而後戰者也故費不半而功自倍也湯之地方七十里而王者修德也智伯有千里之地而亡者窮武也故千乘之國行文德者王萬乘之國好用兵者亡故全兵先勝而後戰德先勝之而後乃戰湯武是也敗兵先戰而後求勝德均則衆者寡力敵則智者勝愚者侔則有數者禽無數侔等凡用兵者必先自廟戰主孰賢將孰能民孰附國孰治蓄積孰多士卒孰精甲兵孰利器備孰便故運籌於廟堂之上而决勝乎千里之外矣夫有形埒者天下訟見之有篇籍者世人傳學之世此皆以形相勝者也善形者弗法也所貴道者貴其無形也無形則不可制迫不可度量也不可巧詐也不可規慮也智見者人為之謀形見者人為之功衆見者人為之伏器見者人為之備動作周還倨句詘伸可巧詐者皆非善者也善者之動也神出而鬼行星耀而玄逐進退詘伸不見朕整鸞舉麟振鳳飛龍騰發如秋風疾如駭龍龍魚也飛之疾者也當以生繫死以盛乘衰以疾掩遲以飽制飢若以水滅火若以湯沃雪何往而不遂何之而不用達在中虛神在外漠志運於無形出於不意與飄飄往與忽忽來莫知其所之與條出與間入莫知其所集卒如雷霆疾如風雨若從地出若從天下獨出獨入莫能應圉疾如鏃矢何可勝偶一晦一明孰知其端緒未見其發固已至矣故善用兵者見敵之虛乘而勿假也追而勿舍也迫而勿去也擊其猶猶陵其與與疾雷不及塞耳用疾雷之聲不暇復塞耳疾霆不暇掩目善用兵若聲之與響若鏜之與鞈鞈鼓鞞聲眯不給撫呼不給吸當此之時仰不見天俯不見地手不麾戈兵不盡拔擊之若雷薄之若風炎之若火陵之若波敵之靜不知其所守動不知其所為故鼓鳴旗麾當者莫不廢滯崩阤天下孰敢厲威抗節而當其前者故淩人者勝待人者敗為人杓者死杓所擊也兵靜則固專一則威分决則勇心疑則北力分則弱故能分人之兵疑人之心則錙銖有餘不能分人之兵疑人之心則數倍不足故紂之卒百萬之心武王之卒三阡人皆專而一故千人同心則得千人力萬人異心則無一人之用將卒吏民動靜如身乃可以應敵合戰故計定而發分决而動將無疑謀卒無二心動無墮容口無虛言事無嘗試應敵必敏發動必亟故將以民為體而民以將為心心誠則支體親刃心疑則支體撓北心不專一則體不節動將不誠必則卒不勇敢故良將之卒若虎之牙若兕之角若鳥之羽若蚈之足研馬蠸也可以行可以舉可以噬可以觸强而不相敗衆而不相害一心以使之也故民誠從其令雖少無畏民不從令雖衆為寡故下不親上其心不用卒不畏將其刑不戰守有必固而攻有必勝不待交兵接刃而存亡之機固以形矣兵有三勢有二權有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷霆誠積踰而威加敵人此謂氣勢硤路津關大山名塞龍蛇蟠蟠寃屈也却笠居却偃覆也笠登羊腸道羊腸一屈一伸發笱門發笱竹笱所以捕魚其門可入而不得出一人守隘而千人弗敢過也此謂地勢因其勞倦怠亂飢渴凍暍椎其摿摿擠其揭揭擠排也摿摿欲卧也褐褐欲拔也此謂因勢善用間諜人軍之反間也審錯規慮設蔚施伏草木盛曰蔚隱匿其形出於不意敵人之兵無所適備此謂知權陳卒正前行選進退俱什伍摶前後不相撚撚揉蹈也左右不相干受刃者少傷敵者衆此謂事權權勢必形吏卒專精選良用才官得其人計定謀决明於死生舉錯得失莫不振驚故攻不待衝隆雲梯而城拔雲梯可依雲而立所以瞰敵之城中戰不至交兵接刃而敵破明於必勝之攻也故兵不必勝不苟接刃攻不必取不為苟發故勝定而後戰鈴縣而後動故衆聚而不虛散兵出而不徒歸唯無一動無且則凌天振地抗泰山蕩四海鬼神移徙鳥獸驚駭如此則野無校兵敵家之兵不來相交復也國無守城矣靜以合躁治以持亂無形而制有形無為而應變雖未能得勝於敵敵不可得勝之道也敵先我動則是見其形也彼躁我靜則是罷其力也形見則勝可制也力罷則威可立也視其所為因與之化觀其邪正以制其命餌之以所欲以罷其足彼若有間急填其隙極其變而束之盡其節而朴之敵若反靜為之出竒彼不吾應獨盡其調言我盡之調以待敵也若動而應有見所為彼持後節彼謂敵持持後節敵在後使先己與之推移彼有所積必有所虧精若轉左陷其右陂右陂西也敵潰而走後必可移敵迫而不動名之曰奄遲擊之如雷霆斬之若草木耀之若火電欲疾以遫人不及步鋗車不及轉轂兵如植木弩如羊角人雖衆多勢莫敢格諸有象者莫不可勝也諸有形者莫不可應也是以聖人藏形於無而遊心於虛風雨可障蔽而寒暑不可開閉以其無形故也夫能滑淖精微貫金石窮至遠放乎九天之上放寄蟠乎黃盧之下唯無形者也善用兵者當擊其亂不攻其治是不襲堂堂之寇不擊填填之旗填填旗立牢端容未可見以數相持彼有死形因而制之敵人執數動則就隂以虛應實必為之禽虎豹之動不入陷阱麋鹿不動不離罝罘飛鳥不動不絓網羅魚鱉不動不擐脣喙物未有不以動而制者也是故聖人貴靜靜則能應躁後則能應先數則能勝疏博則能禽缺故良將之用卒也同其心一其力勇者不得獨進怯者不得獨退止如丘山發如風雨所淩必破靡不毁沮動如一體莫之應圉是故傷敵者衆而手戰者寡矣夫五指之更彈不若捲手之一桎挃搗也萬人之更進更代也不如百人之俱至也今夫虎豹便捷熊羆多力然而人食其肉而席其革者不能通其知而一其力也夫水勢勝火章華之臺燒章華楚之高臺以升勺沃而救之雖涸井而竭池無奈之何也舉壺榼盆盎而以灌之其滅可立而待也今人之與人非有水火之勝也而欲以少耦衆不能成其功亦明矣兵家或言曰少可以耦衆此言之所將非言所戰也或將衆而用寡者勢不齊也勢不齊士不同力也將寡而用衆者用力諧也若乃人盡其才悉用其力以少勝衆者自古及今未嘗聞也神莫貴於天勢莫便於地動莫急於時用莫利於人凡此四者兵之幹植也然必待道而後行可一用也夫地利勝天時巧舉勝地利勢勝人故任天者可迷也任地者可束也任時者可迫也任人者可惑也夫仁勇信廉人之美才也然勇者可誘也仁者可奪也信者易欺也廉者易謀也將衆者有一見焉則為人禽矣由此觀之則兵以道理制勝而不以人才之賢亦自明矣是故為麋鹿者則可以罝罘設也麋鹿有兵而不能以鬭無術之軍也為魚鱉者則可以網罟取也魚鱉之兵散而不集為鴻鵠者則可以矰繳加也鴻鵠之兵高而無被唯無形者無可奈也是故聖人藏於無原故其情不可而觀運於無形故其陳不可得而經無法無儀來而為之宜無名無狀變而為之象深哉晭晭遠哉悠悠且冬且夏且春且秋上窮至高之末下測至深之底變化消息無所凝滯建心乎窈冥之野而藏志乎九旋之淵九旋九回之淵至深者也雖有明目孰能窺其情兵之所隱議者天道也所圖畫者地形也所明言者人事也所以决勝者鈐勢也故上將之用兵也上得天道下得地利中得人心乃行之以機發之以勢是以無破軍敗兵及至中將上不知天道下不知地利專用人與勢雖未必能萬全勝鈐必多矣下將之用兵也博聞而自亂多知而自疑居則恐懼發則猶豫是以動為人禽矣今使兩人接刃巧拙不異而勇澄必勝者何也其行之誠也夫以巨斧擊桐薪不待利時良日而後破之加巨斧於桐薪之上而無人刃之奉雖順招搖挾刑德招搖斗扚也刑干二辰也德十日也而弗能破者以其無勢也故水激則悍矢激則遠夫栝淇衛箘簵栝前括也淇衛箘簵箭之所出也載以銀錫載飾也飾箭以銀雖有薄縞之幨縞細繒也腐荷之矰荷連華也矰猶矢也然猶不能獨射也假之筋角之力弓弩之勢則貫兕甲而徑於革盾矣夫風之疾至於飛屋折木虛舉之下大遲自上高丘虛舉不駕也風疾飛之下大遲復上高丘也人之有所椎也是故善用兵者勢如决積水於千仞之隄若轉貟石於萬丈之溪天下見吾兵之必用也則孰敢與我戰者故百人之必死也賢於萬人之必北也况以三軍之衆赴水火而不還踵乎雖誂合刃於天下誰敢在於上者誂卒也雖卒然合與天下爭人誰敢在其上者所謂天數者左青龍右白虎前朱雀後玄武角亢為青龍參井為白虎星張為朱鳥斗牛為玄武用兵者右參井左角亢背斗牛鄉星張此順北斗之銓衡也所謂地利者後生而前死左牡而右牝高者為生下者為死丘陵為牡溪谷為牝所謂人事者慶賞信而刑罰必動靜時舉錯疾此世傳之所以為儀表者因也然而非所以生儀表者因時而變化者也是故處於堂上之隂而知日月之次序見瓶中之冰而知天下之寒暑夫物之所以相形者微唯聖人達其至故鼓不與於五音而為五音主水不與於五味而為五味調將軍不與於五官之事而為五官督故能調五音者不與五音者也能調五味者不與五味者也能治五官之事者不可揆度者也是故將軍之心淹淹如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正於冬也因形而與之化隨時而與之移夫景不為曲物直響不為清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩節而斷割掩覆也覆其節制斷割也因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走夫飛鳥之摯也俯其首猛獸之攫也匿其爪虎豹不外其爪而噬不見齒故用兵之道示之以柔而迎之以剛示之以弱而乘之以强為之以歙而應之以張將欲西而示之以東先忤而後合前冥而後明若鬼之無迹若水之無創故所鄉非所之也所見非所謀也舉措動靜莫能識也若雷之擊不可為備所用不復故勝可百全與玄明通莫知其門是謂至神兵之所以强者民也民之所以必死者義也義之所以能行者威也是故合之以文齊之以武是謂必取威儀並行是謂至强夫人之所樂者生也而所憎者死也然而高城深池矢石若雨平原廣澤白刃交接而卒爭先合者彼非輕死而樂傷也為其賞信而罰明也是故上視下如子則下視上如父上視下如弟則下視上如兄上視下如子則必王四海下視上如父則必正天下上親下如弟則不難為之死下事上如兄則不難為之亡是故父子兄弟之寇不可與鬪者積恩先施也故四馬不調造父不能以致遠弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武吳王闔閭之將軍也是故內修其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死若歸故將必與卒同甘苦俟飢寒故其死可得而盡也故古之善將者必以其身先之暑不張蓋寒不被裘所以程寒暑也險隘不乘上陵必下所以齊勞佚也軍食熟然後敢食軍井通而後敢飲所以同飢渴也合戰必立矢射之所及以共安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民為之勞也欲民為之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民以償其二積而上失其三望國雖衆兵猶且弱也若苦者必得其樂勞者必得其利斬首之功必全死事之後必賞死事以軍事死賞其後子孫四者既信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鐘竽敦六博敦者致也投高壺兵猶且强令猶且行也是故上足仰則下可用也德足慕則威可立也將者必有三隧四義五行十守所謂三隧者上知天道下習地形中察人情凡此三事者人所從蹊隧所謂四義者便國不負兵負程為主不顧身見難不畏死决疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可凌也所謂十守者神清而不可濁也謀遠而不可慕也操固而不可遷也知明而不可蔽也不貪於貨不淫於物不嚂於辨不推於方不可喜也不可怒也是謂至於窈窈冥冥孰知其情發必中詮言必合數動必順時解必中揍揍理通動靜之機明開塞之節審舉措之利害若合符節疾如彍弩勢如發矢一龍一蛇動無常體莫見其所中莫知其所窮攻則不可守守則不可攻蓋聞善用兵者必先修諸己而後求諸人先為不可勝而後求勝修己於人求勝於敵己未能治也而攻人之亂是猶以火救火以水應水也何所能制令使陶人化而為埴則不能成盆盎陶人化為埴陶人復變為埴土不能化埴土也工女化而為絲則不能織文錦同莫足以相治也故以異為竒兩爵相與鬪未有死者也鸇鷹至則為之解以其異類也故靜為躁竒有出於人治為亂竒飽為飢竒佚為勞竒竒正之相應若水火金木之代為雌雄也善用兵者持五殺以應五殺五行故能全其勝拙者處五死以貪故動而為人擒兵貴謀之不測也形之隱匿也出於不意不可以設備也謀見則窮形見則制故善用兵者上隱之天下隱之地中隱之人隱之天者無不制也何謂隱之天大寒甚暑疾風暴雨大霧冥晦因此而為變者也何謂隱之地山陵丘阜林叢險阻可以伏匿而不見形者也何謂隱之人蔽之於前望之於後出竒行陳之間發如雷霆疾如風雨𢷘巨旗𢷘卷取也止鳴鼓而出入無形莫知其端緒者也故前後正齊四方如繩出入解贖不相越淩翼輕邊利翼軍之翼之邊而利或前或後離合散聚不失行伍此善修行陳者也明於竒正賌隂陽刑德五行望氣候星龜策機祥此善為天道者也設規慮施蔚伏見用水火出珍怪鼓譟軍所以營其耳也曳梢肆柴揚塵起堨梢小柴也堨埃所以營其目者此善為詐祥者也錞鉞牢重固植而難恐勢利不能誘死亡不能動此善為充幹者也充盈幹强剽疾輕悍勇敢輕敵疾若滅沒此善用輕出竒者也相地形處次舍治壁壘審煙斥居高陵舍出處此善為地形者也因其飢渴凍暍勞倦怠亂恐懼窘步乘之以選卒擊之以宵夜此善因時應變者也易則用車易平地也險則用騎涉水多弓水中不可引弩故以弓便隘則用弩隘可以手弩以為距晝則多旌夜則多火晦冥多鼓此善為設施者也凡此八者不可一無也然而非兵之貴者也夫將者必獨見獨知獨見者見人所不見也獨知者知人所不知也見人所不見謂之明知人所不知謂之神明者先勝者也先勝者守不可攻戰不可勝者攻不可守虛實是也上下有隙將吏不相得所持不直卒心積不服積怨不服之也所謂虛也主明將良上下同心氣意俱起所謂實也若以水投火所當者陷所薄者移牢柔不相通而勝相竒者虛實之謂也故善戰者不在少善守者不在小勝在得威敗在失氣夫實則鬭虛則走盛則强衰則北吳王夫差地方二千里帶甲七十萬南與越戰棲之會稽北與齊戰破之艾陵西遇晋公擒之黃池晋公謂平侯也擒之服晋此用民氣之實也其後驕溢縱欲拒諫喜諛憢悍遂過憢勇急也不可正喻大臣怨懟百姓不附越王選卒三千人擒之于隧因制其虛也夫氣之有虛實也若明之必晦也故勝兵者非常實也敗兵者非常虛也善者能實其民氣以待人之虛也不能者虛其民氣以待人之實也故虛實之氣兵之貴者也凡國有難君自宫召將詔之曰社稷之命在將軍即今國有難願請子將而應之將軍受命乃令祝史太卜齊宿三日之太廟鑽靈龜卜吉日以受鼓旗君入廟門西面而立將入廟門趍至堂下北面而立主親操鉞持頭授將軍其柄曰從此上至天者將軍制之復操斧持頭授將軍其柄曰從此下至淵者將軍制之將已受斧鉞答曰國不可從外治也軍不可從中御也二心不可以事君凝志不可以應敵臣既以受制於前矣鼓旗斧鉞之威臣無還請願君亦以垂一言之命於臣也君若不許臣不敢將君若許之臣辭而行乃爪鬋鬋爪送終之禮去手足爪設明衣也明衣喪衣也在於暗冥故言明鑿凶門而出凶門北出門也將軍之出以喪禮處之以其必死也乘將軍車載旌旗斧鉞纍若不勝其臨敵决戰不顧必死無有二心是故無天於上無地於下無敵於前無主於後進不求名退不避罪唯民是保利合於主國之實也上將之道也如此則智者為之慮勇者為之鬭氣厲青雲疾如馳騖是故兵未交接而敵人恐懼若戰勝敵奔畢受功賞吏遷官益爵祿割地而為調决於封外卒論斷於軍中言有罪而誅顧反於國放旗以入斧鉞報畢於君曰軍無後治乃縞素辟舍請罪於君君曰赦之退齊服大勝三年反舍大勝敵者還三年乃反故舍也中勝二年下勝期年兵之所加者必無道之國也故能戰勝而不報取地而不反民不疾疫將不夭死五穀豐昌風雨時節戰勝於外福生於內是故名必成而後無餘害矣淮南鴻烈解卷之二十二
