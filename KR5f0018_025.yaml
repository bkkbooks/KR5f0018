body:
  text: 太尉祭酒臣許愼記上説林訓木叢生曰林説萬物承阜若林之聚矣故曰説林因以題篇也以一世之度制治天下譬猶客之乘舟中流遺其劍遽契其舟桅契刻桅船弦板墮劍於中流刻下船弦言其於此下失劍桅讀如左傳襄王出居鄭地汜之汜也暮薄而求之其不知物類亦甚矣日暮薄岸而止求劍於其所刻桅下故曰不知物類夫隨一隅之迹而不知因天地以遊惑莫大焉隨一隅之迹刻桅之類或無有大於此也雖時有所合然而不足貴也譬若旱歲之土龍疾疫之芻靈是為帝者也土龍以求雨芻狗以求福時見貴也曹氏之裂布蛷者貴之然非夏后氏之璜楚人名命為曹今俗間以始織布繫著其旁謂之曹布燒以傳蝫蛷瘡則愈故蛷者貴之半壁曰璜璜以發衆國家之寶故曰然非夏后氏之璜也無古無今無始無終未有天地而生天地至深微廣大矣言其深微廣大故能生天地也足以蹍者淺矣然待所不蹍而後行蹍履待所履而行者則不得行故曰待所不履而後行智所知者褊矣然待所不知而後明福狹知所知所不知以成明矣遊者以足蹶以手㧊不得其數愈蹶愈敗愈益敗猶沒也及其能遊者非手足者矣不用手足而自遊也鳥飛反鄉兔走歸窟狐死首丘寒將翔水各哀其所生寒將水鳥哀猶憂也毋貽盲者鏡毋豫躄者履毋賞越人章甫非其用也賞遺章甫冠越人斷髮無用冠為椎固百柄不能自椓目見百步之外不能自見其眥喻人能有所為而不能自為也狗彘不擇甂甌而食偷肥其體而顧近其死偷取也顧反肥則烹之故近其死也鳳凰高翔千仞之上故莫之能致七尺曰仞非聖德君不致故曰莫之能致也月照天下蝕於詹諸騰蛇遊霧而殆於蝍蛆詹諸月中蝦蟇食月故曰食於詹諸殆猶畏蝍蛆蟋蟀爾雅謂之蜻蛚之大腹也上蛇蛇不敢動故曰殆於蝍蛆也烏力勝日而服於隼禮能有修短也烏在日中而見故曰勝日服猶畏隼禮爾雅謂裨苙秦人謂之祀視間蠶時晨鳴人舍者鴻鳥皆畏之故曰能有修短也莫壽於殤子而彭祖為夭矣生寄死歸殤子去所寄歸所卜故曰以為壽彭祖蓋楚先壽四百歲不早歸故曰以為夭論語曰竊比於我老彭蓋謂是一説彭祖益黃帝時學仙者言不如殤子早歸神明矣短綆不可以汲深器小不可以盛大非其任也任讀甚任之任怒出於不怒為出於不為不怒乃是怒不為乃是為也視於無形得其所見矣聽於無聲則得其所聞矣言皆易恤無聲故得有聞至味不慊至言不文至樂不笑至音不叫大匠不斫大豆不且大勇不鬭慊快叫譟呼不斷不自斫削豆簠簋籩豆之器大勇人聞自畏之不復鬭也得道而德從之矣譬若黃鐘之比宫太簇之比商無更調焉更改也以瓦鉒者全以金鉒者跋以玉鉒者發鉒讀象金之銅柱餘之鉒鉒者提馬雒家謂之投翩金者金步除跋者刺跋走發者疾迅發讀射百發之發是故所重者在外則內為之掘所重謂金與玉掘律氣不安祥逐獸者目不見太山見獸而已嗜欲在外則明所蔽矣蔽者見利之物不見其害也聽有音之音者聾聽無音之音者聰不聾不聰與神明通卜者操龜筮者端策以問於數安所問之哉策四十九策可以占吉凶可以問於數數欲卜筮者也舞者舉節坐者不期而拚皆如一所極同也日出湯谷入于虞淵莫知其動須臾之間俯人之頸俯猶戾也人莫欲學御龍而皆欲學御馬莫欲學治鬼而皆欲學治人急所用也御龍治鬼不益世用故以御馬治人為急務矣解門以為薪塞井以為臼人之從事或時相似或有也相似似於愚水火相憎鏏在其間五味以和鏏小鼎一曰鼎無耳為鏏鏏讀曰慧鏏受水而火炊之故曰在其間骨肉相愛讒賊間之而父子相危楚平王晉獻公是也夫所以養而害所養譬猶削足而適履殺頭而便冠所以養喻讒賊害在養喻骨肉殺亦履之頭大冠小不相宜削殺其頭以便冠愚之殺頭或作賾昌羊去𧎇虱而來蚙窮昌羊昌蒲蚙窮蜒入耳之蟲也除小害而致大賊故小快而害大利墻之壞也不若無也然逾屋之覆不若其無為墻屋之覆為敗屋墻之壞更為土歸於本故曰逾屋之覆璧瑗成器礛諸之功礛諸治玉之石詩云他山之石可以為錯礛讀一曰廉氏之廉鏌邪斷割砥礪之力力亦功玄文也狡兔得而獵犬烹高鳥盡而強弩藏烹猶殺藏猶殘喻不復用也虻與驥致千里而不飛無糗糧之資而不飢失火而遇雨失火則不幸遇雨則幸也故禍中有福也鬻棺者欲民之疾病也畜粟者欲歲之荒飢也荒大飢粟不熟水靜則平平則清清則見物之形弗能匿也故可以為正匿猶逃也川竭而谷虛虛無水也丘夷而淵塞夷平塞滿唇竭而齒寒河水之深其壤在山言非一朝一夕鈞之縞也一端以為冠一端以為𥿉冠則戴致之𥿉則蹍履之知己者不可誘以物物不能感明於死生者不可却以危危無能懼之故善遊者不可懼以涉涉不能溺親莫親於骨肉節族之屬連也骨肉謂一人之身故曰節族之連也心失其制乃反自害言心失制度則自害身也况疏遠乎疏遠喻他人也聖人之於道猶葵之與日也雖不能與終始哉其鄉之誠也鄉仰誠實宫池涔則溢旱則涸涔多雨也江水之原淵泉不能竭竭盡也蓋非橑不能蔽日輪非輻不能追疾然而橑輻未足恃也金勝木者非以一刀殘林也土勝水者非以一墣塞江也躄者見虎而不走非勇勢不便也傾者易覆也倚者易軵也幾易助也濕易雨也幾近軵讀軵濟之軵近也設鼠者機動釣魚者泛杭任動者車鳴也動發發則得鼠泛釣浮杭動動則得魚任者輦詩云我任我輦芻狗能立而不能行蛇牀似麋蕪而不能芳蛇牀臭麋蕪香謂許由無德鳥獲無力莫不醜於色醜猶怒一曰愧也人莫不奮于其所不足奮厲也以兔之走使大如馬則逮曰歸風言其疾也及其為馬是又不能走矣冬有雷電夏有霜雪然而寒暑之勢不易小變不足以防大節黃帝生隂陽黃帝古天神也始造人之時化生隂陽上駢生耳目桑林生臂手上駢桑林皆神名此女媧所以七十化也女媧王天下者也七十變造化此言造化治世非一人之功也終日言必有聖之事百發之中必有羿逢蒙之巧然而世不與也其守節非也非者非其真也牛蹄彘顱亦骨也而世弗灼必問吉凶於龜者以其歷歲久矣近敖倉者不為之多飯臨江河者不為之多飲其滿腹而已敖倉古常滿倉在榮陽北蘭芝以芳未嘗見霜芳香鼓造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟇令世人五月望作梟焚亦作蝦蟇莫言物不當為用舌之與齒孰先隴也隴摩盡也錞之與刃孰先斃也矜下銅鐏也錞不朽而刃先弊錞讀頓首之頓繩之與矢敦先直也矢箭今鱓之與蛇蠶之與蠋狀相類而愛憎異人愛鱓與蠶畏蛇與蠋故曰異也晉以垂棘之璧得虞虢説在齊俗篇也驪戎以美女亡晉國美女驪姬也亡猶亂聾者不歌無以自樂盲得不觀無以接物接猶見也觀射者遺其藝藝事觀書者忘其愛意有所在則忘其所守古之所為不可更則推車至今無蟬匷蟬匷車類讀如孔子射於矍相氏之矍使但吹竽使氐厭竅雖中節而不可聽但古不知吹人但讀燕無言鉏同也無其君形者也君官主也與死者同病難為良醫與亡國同道難與為謀謀或作豫也為客治飯而自藜藿名尊於實尊重享仁義之名重於治飯之實也乳狗之噬虎也伏雞之搏狸恩之所加不量其力使景曲者形也形曲則影曲也使響濁者聲也聲濁則響濁也情泄者中易測不閉其情欲發泄于外故其中心測度知也華不時者不可食也華實若今八九月食晚瓜令人病瘧此之類故曰不食喻人多言不時適不可聽用也跖越者或以舟或以車雖異路所極一也跖至極亦至玄互文耳一同也佳人不同體美人不同面而皆説於目佳美梨橘棗栗不同味而皆調於口調適人有盜而富者富者未必盜有廉而貧者貧者未必廉蔏苖類絮而不可為絮蔏苗荻秀楚人謂之蔏蔏讀敵戰之敵幽冀謂之荻苕也黂不類布而可以為布黂麻之有實者黂讀左傳有蜚不為災之蜚也出林者不得直道行險者不得履繩繩道亦直羿之所以射遠中微者非弓矢也造父之所以追速致遠者非轡銜也海內其所出故能大雷雨出於海後隨溝溝還入故曰內其所出輪復其所過故能遠其所過轉不止羊肉不慕蟻蟻慕於羊肉羊肉羶也醯酸不慕蚋蚋慕於醯酸嘗一臠肉而知一鑊之味懸羽與炭知燥濕之氣以小見大以近喻遠十頃之陂可以灌四十頃畜水曰陂而一頃之陂可以灌四頃大小之衰然衰差也明月之光可以遠望而不可以細書甚霧之朝可以細書而不可以遠望尋常之外畫者謹毛而失貌謹悉微毛留意於小則失其大貌射者儀小而遺大儀望小處而射之故能中事各有宜治鼠穴而壞里閭漬小皰而發痤疽皰面氣也痤疽癰也若珠之有類玉之有瑕置之而全去之而虧置其類瑕榛巢者處林茂安也窟穴者託埵防者便也埵坊高處防隄也王子慶忌足躡麋鹿手搏兕虎置之冥室之中不能搏龜鱉勢不便也慶忌吳王僚之子也湯放其主而有榮名湯契後十三世王癸之子履放其主謂伐紂為民除害故有榮名也崔杼弒其君而被大謗崔杼齊大夫崔野之子殺君齊莊公也所以為之則同其所以為之則異所以為則同湯殺君以利與民抒以利與身故曰異吕望使老者奮吕望鼓刀釣魚年七十始學讀書九十為文王作師佐武王伐紂成王封之於齊故老者慕之而自奮厲項託使嬰兒矜以類相慕項託年七歲窮難孔子而為之作師故使小人之疇自矜大也使葉落者風搖之使水濁者魚撓之虎豹之文來射虎豹以有文章來使人射取之猿狖之捷來乍猿狖屬仰鼻而長尾乍暫疾以其操捷來使疾擊而取之行一棋不足以見智彈一弦不足以見悲三寸之管而無當當猶底也天下弗能滿十石而有塞百斗而足矣以篙測江篙終而以水為測惑矣篙擲船以篙渡江篙沒因以江水為盡故曰惑也漁者走淵漁讀論語之語也木者走山所急者存也朝之市則走過市則步所求者亡也走讀奏記之奏豹裘而雜不若狐裘之粹粹純白璧有考不得為寶考虋污也言至純之難也戰兵死之鬼憎神巫兵死之鬼善行病人巫能祝劾殺之憎神巫憎畏也盜賊之醜吠狗醜猶惡也無鄉之社易為黍肉無國之稷易為求福無祀不禋於神而卒祝之故易為黍肉易為求福鱉無耳而目不可以瞥精於明也不可以瞥瞥之則見也瞽無目目無所見而耳不可以察精於聰也不可以察察之則聞遺腹子不思其父無貌於心也不知父貌不夢見像無形於目也目初不見像故曰無形於目也蝮蛇不可為足虎豹不可使緣木蝮蛇皆有毒螫人不為足為足益甚虎猛獸不可使能緣木也馬不食脂桑扈不啄粟非廉也桑扈青雀馬不竊脂秦通崤塞而魏築城也魏徙都於大梁聞秦通治崤關知欲來東兼之故築城設守備也飢馬在廄寂然無聲投芻其傍爭心乃生引弓而射非弦不能發矢引張引也發遣也弦之為射百分之一也道德可常權不可常故遁關不可復亡犴不可再遁逃也獄常以權變於關塞野犴亡逃不可復由其入故曰權不常也環可以喻員不可以輪絛可以為繶不必以紃紃亦繶婉轉數也日月不並出狐不二雄神龍不匹猛獸不群鷙鳥不雙循繩而斫則不過懸衡而量不差衡稱植表而望則不惑損年則嫌於弟益年則疑於兄不如循其理若其當理道當猶實也人不見龍之飛舉而能高者風雨奉之奉助蠹衆則木折隙大則墻壞懸垂之類有時而隧隧墮枝格之屬有時而弛弛落當凍而不死者不失其適死乃為失適又死故曰不失其適也當暑而不暍者不亡適亡亦失之未嘗適亡適亡無言不凍不暍何適之有也湯沐具而蟣虱相吊大厦成而燕雀相賀厦屋憂樂别也柳下惠見飴曰可以養老盜跖見飴曰可以黏牡見物同而用之異柳下惠魯大夫展無駭之子名獲字禽家有大柳樹惠德因號柳下惠一曰柳下邑牡門户籥牡蠶食而不飲二十二日而化蟬飲而不食三十日而蛻蜉蝣不食不飲三日而死人食礜石而死蠶食之而不飢魚食巴菽而死鼠食之而肥類不可必推椎猶知也瓦以火成不可以得火竹以水生不可以得水瓦得火則破竹得水浸則死矣楊堁而欲弭塵被裘而以翣翼豈若適衣而已哉堁土塵楚人謂之堁翣扇楚人謂之翣也稿竹有火弗鑽不土中有水弗掘無泉掘猶窮也蠬象之病人之寶也蠬大蛤中有珠象牙還以自疾故人得以為寶也人之病將有誰寶之者乎人之利欲為病無人寶之故曰將有誰寶也為酒人之利而不酤則竭為車人之利而不僦則不達握火提人反先之熱皆一介之人物思自守者不欲使酒人車人得利不酤僦而先自竭先不達猶以火援人先自熱自爛也鄰之母死往哭之妻死而不泣有所劫以然也嫌猶哀嫌於情色故曰有所劫迫之然如是也西方之倮國鳥獸弗辟與為一也一同也倮國在西南方一膊炭熯一膊一挺也掇之則爛指萬石俱熯去之十步而死百二十斤為石同氣異積大勇小勇有似於此今有六尺之廣卧而越之下材弗難植而踰之上材弗易勢施異也百梅足以為百人酸一梅不足以為一人和喻衆能濟少少不能有所成也有以飯死者而禁天下之食有以車為敗者禁天下之乘則悖矣申生雉經晉不絶繩子胥自沉吳不斷水也釣者靜之𦋯者扣舟罩者抑之罣者舉之為之異得魚一也𦋯者以柴積水中以取魚扣擊魚聞擊舟聲藏柴下壅而取之𦋯讀沙糝今兖州人積柴水搏魚為罛幽州名之為涔也見象牙乃知其大於牛見虎尾而知其大於狸一節見而百節知也吳伐越至會稽獨獲骨節敷車見一節大餘節不得小故曰百節知小國不鬭於大國之間長見嫌也兩鹿不鬭於伏兕之旁畏見食也佐祭者得嘗救鬭者得傷蔭不祥之木為雷電所撲蔭木影也撲擊也或謂冢或謂隴或謂笠或謂簦頭風與空木之瑟名同實異也頭中風空木瑟其音同其實則異也日月欲眀而浮雲蓋之蓋猶蔽也蘭芝欲修而秋風敗之修長虎有子不能搏攫者輒殺之為墮武也墮廢也武威之也龜紐之璽賢者以為佩龜紐之璽衣印也紐係佩服也土壤布在田能者以為富能動者播植嘉穀以為饒富也豫拯溺者金玉不若尋常之纏索金玉雖寶非拯溺之具故曰不如尋常之纏索視書上有酒者下必有肉上有年者下必有月以類而取之類猶事也蒙塵而眯固其理也為其不出户而堁之也為不出户而塵堁眯之非其道屠者羹藿為車者步行陶者用盆匠人處狹盧為者不得用用者弗肯為為者不得用以利動用者不肯為以富寵也轂立三十輻各盡其力不得相害使一輻獨入衆輻皆棄豈能致千里哉夜行者掩目而前其手涉水者解其馬載之舟事有所宜而有所不施橘柚有鄉雚葦有叢獸同足者相從遊鳥同翼者相從翔以類聚也田中之潦流入於海附耳之言聞於千里也附近近耳之言謂竊語聞於千里千里知之語曰欲人不知莫如一為蘇秦步步徐行也曰何故人問何故趍曰何趍馳有為則議多事固苛蘇秦為多事之人故見議見苛也皮將弗覩毛將何顧畏首畏尾身凡有幾畏始畏終中身不畏凡有幾何言常畏也欲觀九州之土足無千里之行心無政教之原而欲為萬民之上則難無其術故曰難也的的者獲提提者射的的名為衆所見故獲提提安言譬若鳥不飛獸不走提提安時故為人所射故大白若辱大德若不足若辱自同於衆人若不足者實若虛之未嘗稼穡粟滿倉未嘗桑蠶絲滿囊得之不以道用之必橫橫放海不受流胔太山不上小人骨有肉曰胔有不義之祥流入海海神蕩而出之故曰不受太山東嶽也王者所封禪處不令凶亂小人得上其上也旁光不升俎旁光胞也俎豆之實唯肩髀而脅肋不得升駠駮不入牲犧牲以純色也中夏用箑快之至冬而不知去褰衣涉水至陵而不知下未可以應變有山無林有谷無風有石無金林生於山山未必皆有林風出於谷谷王未必皆有風金生於石石未必皆有金喻聖人出衆人衆人未必皆聖賢也滿堂之坐視鉤各異滿堂坐人規其鉤各異形於環帶一也鉤與環帶一法也類雖異所用者同獻公之賢欺於孋姬殺申生也叔孫之知欺於堅牛三日不食而餓死也故鄭詹入魯春秋曰佞人來佞人來鄭詹鄭文公大夫以齊桓公卒不使鄭伯朝齊朝於楚齊人執之自齊逃至魯謂之佞人以方孋姬堅牛故曰佞人來佞人來君子有酒鄙人鼓缶雖不見好亦不見醜醜惡人性便絲衣帛或射之則被鎧甲為其所不便以得所便便利輻之入轂各值其鑿不得相通猶人臣各守其職不得相干干亂也嘗被甲而免射者被而入水嘗抱壺而度水者抱而蒙火可謂不知類矣君子之居民上若以腐索御奔馬雍容恐失民之意若蹍薄冰蛟在其下蛟魚屬皮有珠能害人故曰蛟在其下若入林而遇乳虎言常驚懼恐也化不治於民民不附善用人者若蚈之足衆而不相害蚈馬蚈幽州謂之秦渠蚈讀蹊徑之蹊也若脣之與齒堅柔相摩而不相敗摩近敗毁清醠之美始於耒耜醠清酒周禮醠齊是醠讀甕盎之盎也黼黻之美在於杼柚白與黑為黼青與赤為黻皆文衣也布之新不如紵紵之弊不如布或善為新或惡為故善猶宜也靨酺在頰則好在顙則醜靨酺箸頰上窐窐者在顙以盤故醜繡以為裳則宜以為冠則譏詩云衮衣繡裳故曰宜譏人譏非之也馬齒非牛蹄檀根非椅枝故見其一本而萬物知知猶别也石生而堅蘭生而芳少自其質長而愈明質性也明猶盛也扶之與提謝之與讓故之與先諾之與已也之與矣相去千里汗準而粉其顙腐鼠在壇楚人謂中庭為壇燒薰於宫入水而憎濡懷臭而求芳雖善者弗能為工善或作巧再生者不穫華大旱者不胥時落胥時不待秋時而零落也毋曰不幸甑終不墮井抽簪招磷有何為驚磷血精似野火招之應聲而至血灑汗人以簪招則不至故曰何驚也使人無度河可中河使無度不可不可言不能也見虎一文不知其武見驥一毛不知善走水蠆為蟌孑孑為蚊水蠆化為蟌蟌青蜓孑孑結蠆水上到跂蟲讀廉兔齧為螚兔所齧草靈在其心中化為螚螚讀能而心之惡一説免齧蟲名物之所為出於不意弗知者驚知者不怪怪惑也銅英青金英黃玉英白黂燭捔膏燭澤也燭光捔澤喻光明有明珠也以微知明以外知內象肉之味不知於口鬼神之貌不著於目捕景之説不形於心皆所不嘗見之冬冰可折夏木可結時難得而易失木方茂盛終日采而不知秋風下霜一夕而殫殫盡病熱而強之餐救暍而飲之寒救經而引其索拯溺而授之石欲救之反為惡惡猶害也雖欲謹亡馬不發户轔言馬亡不可發户限而求雖欲豫就酒不懷蓐轔户限楚人謂之轔轔讀似鄰惡氣言乃得之也孟賁探鼠穴鼠無時死必噬其指失其勢孟賁勇士為探鼠於穴故曰失其勢山雲蒸柱礎潤礎柱下石礩也伏苓掘兔絲死所生者亡故死一家失熛百家皆燒讒夫隂謀百姓暴骸論語曰惡利口之覆邦家故曰百姓暴骸粟得水濕而熱甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之勢湯沐之於河有益不多流潦注海雖不能益猶愈於已已止一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴有然之者也然如是也鶴壽千歲以極其遊蜉䖻朝生而暮死而盡其樂修短各得其志紂醯梅伯文王與諸侯構之構謀桀辜諫者湯使人哭之哭猶吊也狂馬不觸木猘狗不自投於河雖聾蟲而不自陷又况人乎聾無知也愛熊而食之鹽愛獺而飲之酒雖欲養之非其道熊食鹽而死獺飲酒而敗故曰非其道也心所説毁舟為杖心所欲毁鐘為鐸鐸大鈴金口木舌為木鐸金舌為金鐸杕舟尾讀詩有杕之社也管子以小辱成大榮管仲相子糾不能死為魯所囚是其辱卒相桓公以至霸是其大榮也蘇秦以百誕成一誠誠信質的張而弓矢集林木茂而斧斤入非或召之形勢所致者也待利而後拯溺人亦必以利溺人矣利溺人者利人之溺得其利也舟能沉能浮愚者不足加舟船能載浮物愚者不敢加足畏其沉詩云泛泛揚舟載沉載浮是也騏驥驅之不進引之不止人君不以取道里刺我行者欲與我交訾我貨者欲與我市刺猶非訾毁也以水和水不可食一弦之瑟不可聽以其失和故不可聽刺專用也駿馬以抑死直士以正窮賢者擯於朝美女擯於宫擯棄也行者思於道而居者夢於牀慈母吟於巷適子懷於荆精相往來赤肉縣則烏鵲集鷹隼鷙則衆鳥散物之散聚交感以然食其食者不毁其器食其實者不折其枝塞其源者竭背其本者枯交畫不暢連環不解其解之不以解暢達不得達至交止解連環言此不可解則説德解法也臨河而羡魚不如歸家織網羡顧明月之珠蠬之病而我之利虎爪象牙禽獸之利而我之害我猶人也易道良馬使人欲馳飲酒而樂使人欲歌是而行之故謂之斷非而行之必謂之亂斷猶治也矢疾不過二里也步之遲百舍不休千里可致聖人處於隂衆人處於陽聖人行於水衆人行於霜水有形而不可毁故聖人行之無迹霜雪履有迹故衆人行之也異音者不可聽以一律異形者不可合於一體合同農夫勞而君子養焉君子國君養焉以化澤懊休之愚者言而智者擇焉擇可用者而用之也捨茂林而集于枯不弋鵠而弋烏難與有圖圖謀也言其愚寅丘無壑泉源不溥言汙小潦水名寅寅之丘無大壑故泉流不得溥尋常之溪灌千頃之澤言有源也見之明白處之如玉石見之暗晦必留其謀玉之與石言可别也暗晦不明留猶思謀也以天下之大託於一人之才譬若懸千鈞之重於木之一枝言不能任負子而登墻謂之不祥為其一人隕而兩人殤負抱也隕墜也善舉事者若乘舟而悲歌一人唱而千人和言能得衆人之心也不能耕而欲黍梁不能織而喜采裳無事而求其功難矣有榮華者必有憔悴有羅紈者必有麻蒯言有成必有衰鳥有沸波者河伯為之不潮畏其誠也鳥大鵬也翱翔水上扇魚令出沸波玃而食之故河伯深藏於淵畏其精誠為不見故一夫出死千乘不輕主術篇曰兵莫僭於志莫邪為下言匹夫志意出死必戰故雖大國兵車千乘不輕之也蝮蛇螫人傅以和堇則愈和堇野葛毒樂物故有重而害反為利者聖人之處亂世若夏暴而待暮夏日中甚熱暮涼時言聖人居亂世忍以待涼桑榆之間逾易忍也言亂世將盡如日在西方桑榆間將夕故曰易忍水雖平必有波衡雖正必有差尺寸雖齊必有詭詭不同非規矩不能定方圓非準繩不能正曲直用規矩準繩者亦有規矩準繩焉準平繩直之人能平直耳故曰亦有規矩準繩舟覆乃見善遊馬奔乃見良御善遊故覆舟不溺良御馬奔車不敗故見之嚼而無味者弗能內於喉視而無形者不能思於心形象無形於目不能思之於心兕虎在於後隨侯之珠在於前弗及掇者先避患而後就利隨國在漢東姬姓之後出遊於野見大蛇斷在地隨侯令醫以續傅斷蛇蛇得愈去後銜大珠報蓋明月之珠因號隨侯之珠世以為寶也逐鹿者不顧兔決千金之貨者不爭銖兩之價言在大不顧小弓先調而後求徑馬先馴而後求良徑強馴擾人先信而後求能人非信不立也陶人棄索車人掇之屠者棄銷而煆者拾之所緩急異也百星之明不如一月之光十牖畢開不若一户之明矢之於十步貫兕甲及其極不能入魯縞言勢有極太山之高背而弗見秋毫之末視之可察察别言用明矣山生金反自刻木生蠹反自食人生事反自賊賊敗也害也物自然也巧冶不能鑄木工匠不能斫金者形性然也白玉不琢美珠不文質有餘也性自然不復飾故跬步不休跛鱉千里跬猶咫尺纍積不輟可成丘阜輟止城成於上木直於下非有事焉所緣使然凡用人之道若以燧取火疏之則弗得疏猶遲也數之則弗中數猶疾也正在疏數之間得其節火乃生從朝視夕者移從枉準直者虧枉邪聖人之偶物也若以鏡視形曲得其情偶猶同也楊子見逵路而哭之為其可以南可以北道九達曰逵閔其别也墨子見練絲而泣之為其可以黃可以黑練白憫其化也趍舍之相合猶金石之一調相去千歲合一音也金曰鐘石曰磐雖久不變故曰相去千歲合一音也鳥不干防者雖近弗射鳥無之屬是也其當道雖遠弗釋當道為作防害者故曰不釋也酤酒而酸買肉而臭然酤酒買肉不離屠沽之家故求物必於近之者以詐應詐以譎應譎若被簑而救火毁瀆而止水乃愈益多西施毛嬙狀貌不可同世稱其好美鈞也堯舜禹湯法籍殊類得民心一也俱一於人聖人者隨時而舉事因資而立功涔則具擢對旱則修土龍擢對貯水器十龍致雨物臨災之女織紈而思行者為之悖戾臨災齊都悖粗惡室有美容繒為之纂繹不密緻志有感故纂讀曰淩繹纂之纂徵羽之操不入鄙人之耳徵羽正音小人不知不入其耳抮和切適舉坐而善抮轉轉其和更作急調淑楚之音非正樂故舉坐而善之過府而負手者希不有盜心府藏貨所生也故侮人之鬼者過社而搖其枝侮猶病也晉陽處父代楚以救江故解椊者不在於捌格在於批沉批擊伔推擊其要夾木大者根擢山高者基扶其下跐也跖巨者志遠體大者節疏狂者傷人莫之怨也嬰兒詈老莫之疾也賊心𡵍賊害尾生之信不如隨牛之誕尾生效信於婦人信之失隨牛弦高矯君命為誕雖然以存國故不如隨牛之誕而又况一不信者乎一猶常况常不為信不為誕乎一或作一一猶待也憂父之疾者子治之者醫論語曰父母唯其疾之憂故曰憂之者子進獻者祝治祭者疱疱宰也淮南鴻烈解卷之二十四
