front:
  text: 淮南鴻烈要畧間詁卷之二十八疲五
  hash: sha256:06881e48f2d22bfa80d18d69df303d0faf4194520142ca0336b4a8b2b928fcc1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_029-001a, image: hfl/0867/0867-212.png}
body:
  text: 大尉祭酒臣許愼記上要畧凡鴻烈之書二十篇畧數其要明其所指序其微妙論其大體夫作爲書論者所以紀綱道德經緯人事上考之天下揆之地中通諸理雖未能抽引玄妙之中才繁然足以觀終始矣緫要舉凡而語不剖判純樸靡散大宗純樸太素也大宗事本也則爲人之惛惛然弗能知也故多爲之辭博爲之說又恐人之離本就末也故言道而不言事則無以與世浮沉言事而不言道則無以與化遊息故著二十篇有原道有俶眞有天文有地形有時則有覽㝠有精神有本經有主術有繆稱有齊俗有道應有氾論有詮言有兵畧有說山有說林有人間有脩務有泰族也原道者盧牟六合盧牟猶規模也混沌萬物象太一之容太一之容北極之氣合爲一體也測窈㝠之深以翔虚無之軫軫道畛也託小以苞大守約以治廣使人知先後之禍福動靜之利害誠通其志浩然可以大觀矣欲一言而寤寤覺時則尊天而保眞欲再言而通則賤物而貴身欲參言而究則外欲而反情執其大指以内洽洽潤五藏瀸濇肌膚被服法則而與之終身所以應待萬方覽耦耦通百變也若轉丸掌中足以自樂也俶眞者窮逐終始之化嬴垀有無之精嬴繞帀也垀靡煩也離别萬物之變合用死生之形使人遺物反己審仁義之間通同異之理觀至德之統知變化之紀說符玄妙之中通迴造化之母也造化之母元氣太一之初天文者所以和隂陽之氣理日月之光節開塞之時列星辰之行知逆順之變避忌諱之殃順時運之應法五神之常使人有以仰天承順而不亂其常者也地形者所以窮南北之脩極東西之廣經山陵之形區川谷之居明萬物之主知生類之衆列山淵之數規遠近之路使人通迵周備不可動以物不可驚以怪者也時則者所以上因天時下盡地力據度行當合諸人則形十二節一月爲人一節也以爲法式終而復始歲終十二月從正月始也轉於無極因循倣依以知禍福操舍開塞各有龍忌中國以鬼神之事日忌北胡南越皆謂之請龍發號施令以時教期使君人者知所以從事覽㝠者所以言至精之通九天也至微之淪無形也純粹之入至清也昭昭之通㝠㝠也乃始攬物物引類覽取撟掇撟取也掇拾也浸想宵類浸微視也宵物似也類衆也物之可以喻意象形者乃以穿通窘滯决瀆壅塞引人之意繫之無極乃以明物類之感同氣之應隂陽之合形埒之朕所以令人遠觀博見者也精神者所以原本人之所由生而曉寤其形骸九竅取象於天合同其血氣與雷霆風雨比類其喜怒與晝宵宵夜寒暑並明審死生之分别同異之跡節動靜之機以反其性命之宗所以使人愛養其精神撫靜其䰟𩲸不以物易己而堅守虚無之宅者也本經者所以明大聖之德通維初之道埒畧衰世古今之變以褒先聖之隆盛而貶末世之曲政也所以使人黜耳目之聦明精神之感動樽流遁之觀樽止也流遁披散也節養性之和分帝王之操列小大之差者也主術者君人之事也所以因作任督責使群臣各盡其能也明攝權操柄以制群下提名提挈也責實考之參伍所以使人主秉數持要不妄喜怒也其數直施而正邪外私而立公使百官條通而輻凑名務其業人致其功此主術之明也繆稱者破碎道德之論差次仁義之分畧雜人間之事緫同乎神明之德假象取耦以相譬喻斷短爲節以應小具所以曲說攻論應感而不匱者也匱乏齊俗者所以一群生之短脩同九夷之風氣通古今之論貫萬物之理財制禮義之宜擘畫人事之終始者也擘分道應者攬掇遂事之蹤追觀往古之跡察禍福利害之反考驗乎老莊之術而以合得失之勢者也氾論者所以箴縷繺之間綃煞也擮揳唲之郄也擮也揳塞也唲齲錯梧也接徑直施施邪以推本樸而兆見得失之變利病之文所以使人不妄没於勢利不誘惑於事態有符曮晲兼稽時世之變而與化推移者也詮言者所以譬類人事之指解喻治亂之體也差擇微言之𦕈詮以至理之文而補縫過失之闕者也兵畧者所以明戰勝攻取之數形機之勢詐譎之變體因循之道操持後之論也持後者不敢爲主而爲客也所以知戰陣分爭之非道不行也知攻取堅守之非德不强也誠明其意進退左右無所擊危乘勢以爲資清靜以爲常避實就虚若驅群羊此所以言兵也說山說林者所以竅窕穿鑿百事之壅遏而通行貫扃萬物之窒塞者也假譬取象異類殊形以領理人之意懈墮結細說捍摶囷摶圓也囷芼也而以明事埒事者也埒兆朕也人間者是以觀禍福之變察利害之反鑽脉得失之跡標舉終始之壇也標末也壇場也分别百事之微敷陳存亡之機使人知禍之爲福亡之爲得成之爲敗利之爲害也誠喻至意則有以傾側偃仰世俗之間而無傷乎讒賊螫毒者也脩務者所以爲人之於道未淹味論未深見其文辭反之以清淨爲常恬惔爲本則懈墮分學縱欲適情欲以偷自佚而塞於大道也今夫狂者無憂聖人亦無憂聖人無憂和以德也狂者無憂不知禍福也故通而無爲也與塞而無爲也同其無爲則通其所以無爲則異故爲之浮稱流說其所以能聽所以使學者孳孳以自幾也幾庶幾也泰族者橫八極致高崇上明三光下和水土經古今之道治倫理之序緫萬方之指而歸之一本以經緯治道紀綱王事乃原心術理情性以館清平之靈館舍澄澈神明之精澄清也澈澄别清濁也以與天和相嬰薄嬰繞抱也所以覽五帝三王懷天氣抱天心執中含和德形於内以晉凝天地發起隂陽序四時之正流方綏之斯寧推之斯行乃以陶冶萬物遊化群生唱而和動而隨四海之内一心同歸故景星見景星在月之旁則助月之明也祥風至風不鳴條也黄龍下鳳巢列樹麟止郊野德不内形而行其法藉用制度神祇弗應福祥不歸四海弗賔兆民弗化故德形於内治之大本此鴻烈之泰族也鴻大也烈功也凡二十篇緫謂之鴻烈凡屬書者所以窺道開塞庶後世使知舉錯取捨之宜適外與物接而不眩内有以處神養氣宴煬至和而己自樂所受乎天地者也故言道而不明終始則不知所倣依言終始而不明天地四時則不知所避諱言天地四時而不引譬援類則不識精微言至精而不原人之神氣則不知養生之機原人情而不言大聖之德則不知五行之差言帝道而不言君事則不知小大之衰言君事而不爲稱喻則不知動靜之宜以稱喻而不言俗變則不知合同大指已言俗變而不言往事則不知道德之應知道德而不知世曲則無以耦萬方知汜論而不知詮言則無以從容通書文而不知兵指則無以應卒已知大畧而不知譬諭則無以推明事知公道而不知人間則無以應禍福知人間而不知脩務則無以使學者勸力欲强省其辭覽緫其要弗曲行區入則不足以窮道德之意故著書二十篇則天地之理究矣人間之事接矣帝王之道備矣其言有小有巨有微有粗指奏卷異各有爲語今專言道則無不在焉然而能得本知末者其唯聖人也今學者無聖人之才而不爲詳說則終身顛頓乎混溟之中而不知覺寤乎昭明之術矣今易之乾坤足以窮道通意也八卦可以識吉凶知禍福矣然而伏羲爲之六十四變八八變爲六十四卦伏羲示其象周室增以六爻周室謂文王也所以原測淑清之道而𢹲逐萬物之祖也夫五音之數不過宫商角徴羽而五絃之琴不可鼓也必有細大駕和而後可以成曲今畫龍首觀者不知其何獸也具其形則不疑矣今謂之道則多謂之物則少謂之術則博謂之事則淺推之以論則無可言者所以爲學者固欲致之不言而已也夫道論至深故多爲之辭以抒其情萬物至衆故博爲之說以通其意辭雖壇卷連僈絞紛遠援所以洮汰滌蕩至意洮汰潤也使之無凝竭底滯捲握而不散也夫江河之腐胔不可勝數然祭者汲馬大也一盃酒白蠅漬其中匹夫弗嘗者小也誠通乎二十篇之論睹凡得要以通九野九野八方中央也徑十門八方上下也外天地捭山川捭屏去也其於逍遥一世之間宰匠萬物之形亦優游矣若然者挾日月而不烑挾至也烑光也潤萬物而不耗曼兮洮兮足以覽矣藐兮浩浩曠曠兮可以游矣文王之時紂爲天子賦歛無度戮殺無止康梁沉湎宫中成巿康梁耽樂也沉湎淫酒也成巿言集者多作爲炮烙之刑刳諫者剔孕婦天下同心而苦之文王四世纍善太王王季文王武王凡四世也脩德行義處岐周之間地方不過百里天下二垂歸之文王欲以卑弱制强暴以爲天下去殘除賊而成王道故太公之謀生焉太公謂周陳隂符兵謀也文王業之而不卒武王繼文王之業用太公之謀悉索薄賦薄少也賦兵也躬擐甲冑擐貫著也以伐無道而討不義誓師牧野以踐天子之位天下未定海内未輯武王欲昭文王之令德使夷狄各以其賄來貢遼遠未能至故治三年之喪殯文王於兩楹之間殯大歛也兩楹堂柱之間賔主夾之以俟遠方武王立三年而崩成王在褓襁之中未能用事蔡叔管叔輔公子禄父禄父紂之兄子周封之以爲殷後使管蔡監之也而欲爲亂周公繼文王之業持天子之政以股肱周室輔翼成王懼爭道之不塞臣下之危上也故縱馬華山放牛桃林敗鼓折枹搢笏而朝以寧靜王室鎮撫諸候成王既壯能從政事周公受封於魯以此移風易俗孔子脩成康之道述周公之訓以教七十子使服其衣冠脩其篇籍故儒者之學生焉墨子學儒者之業受孔子之術以爲其禮煩擾而不悅悅易也厚葬靡財而貧民服傷生而害事故背周道而用夏政禹之時天下大水禹身執虆垂以爲民先剔河而道九岐剔洩去也九岐河水播岐爲九以入海也鑿江而通九路江水通則爲九辟五湖使水辟人而相從也而定東海當此之時燒不暇撌撌排去也濡不給扢扢拭也死陵者葬陵死澤者葬澤故節財薄葬閑服生焉齊桓公之時天子卑弱諸侯力征南夷北狄交伐中國中國之不絶如綫綫曰絲也齊國之地東負海而北鄣河地狹田少而民多智巧桓公憂中國之患苦夷狄之亂欲以存亡繼絶崇天子之位廣文武之業故管子之書生焉齊景公内好聲色外好狗馬獵射亡歸好色無辨辨別也作爲路寢之臺族鑄大鐘族聚也撞之庭下郊雉皆呴大鍾聲似雷震雉應而句鳴也一朝用三千鍾贛鍾十斛也贛賜也一朝賜群臣之費三萬斛也梁丘據子家噲導於左右二人景公臣也導諫也故晏子之諫生焉晩世之時六國諸侯谿異谷别水絶山隔各自治其境内守其分地握其權柄擅其政令下無方伯上無天子力征爭權勝者爲右恃連與國恃怙連與之國約重致剖信符結遠援以守其國家持其社稷故縱橫脩短生焉申子者韓昭釐之佐韓𣈆别國也地墽民險而介於大國之間晋國之故禮未滅韓國之新法重出先君之令未收後君之令又下新故相反前後相繆百官背亂不知所用故刑名之書生焉秦國之俗貪狼狼荒也强力寡義而趍利可威以刑而不可化以善可勸以賞而不可厲以名被險而帶河四塞以爲固地利形便畜積殷富孝公欲以虎狼之勢而吞諸侯故商鞅之法生焉若劉氏之書淮南王自謂也觀天地之象通古今之事權事而立制度形而施宜原道之心合三王之風以儲與扈冶儲與猶攝業扈冶廣大也玄眇之中精揺靡覽楚人謂精進爲精摇靡小皆覽之棄其畛挈楚人謂澤濁爲畛挈也斟其淑靜以統天下理萬物應變化通殊類非循一跡之路守一隅之指拘繁牽連於物而不與世推移也故置之尋常而不塞布之天下而不窕窕緩也布之天下雖大不窕也淮南鴻烈要畧間詁卷之二十八
