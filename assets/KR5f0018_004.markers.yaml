  - {type: variant, offset: 3750, length: 322, content: 勢利也古之聖人其和愉寧靜性也其志得道行命也命天命也是故性遭命而後能行命得性而後能明得其本清靜之性故能明鳥號之弓谿子之弩不能無弦而射鳥號柘桑也谿子爲弩所出國名也或曰谿蠻夷也以柘桑爲弩因曰谿子之弩也一曰谿子陽鄭國善爲弩匠因以爲名也越舲蜀艇不能無水而浮舲小船也蜀船一版之舟若今豫章是也雖越人所便習若無其水不能獨浮也今矰繳機而在上𦉾罟張而在下雖欲翺翔其勢焉得矰弋射身短矢也機發也翺翔鳥之高飛翼上下曰翺直刺不動曰翔也故詩云采采卷耳不盈傾筐嗟我懷人寘彼周行以言慕遠世也詩周南卷耳篇也言采采易得之菜不滿易盈之器以言君子爲國執心不精不能以成其道采易得之菜不能盈易滿之器也嗟我懷人寘彼周行言我思古君子官賢人置之列位也誠古之賢人各得其行列故曰慕遠也淮南鴻烈解卷之四, CK-KZ: ''}
