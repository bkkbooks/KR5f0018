  - {type: variant, offset: 3398, length: 352, content: 寢居直夢磁石上飛雲母來水土龍致雨燕鷹代飛湯遭旱作土龍以像龍雲從龍故致雨也燕玄鳥也春分而來雁春分而北詣漠中也燕秋分而去雁秋分而南詣彭蠡故曰代飛也代更也蛉蟹珠龜與月盛衰與猶隨也是故堅土人剛弱土人肥壚土人大沙土人細壚讀纑繩之纑也細小也息土人美耗土人醜食水者善游能寒魚鼈鷖鶩之屬是也食土者無心而慧丘蚓之屬是也食木者多力而奰態羆之屬是也奰煩腸黄理也奰讀内奰干中國之奰近鼻也食草者善走而愚麋鹿之屬是也食葉者有絲而蛾蠶是也食肉者勇敢而捍虎豹鷹鸇之屬是也食氣者神明而壽仙人松喬之屬是也食穀者知慧而夭不食者不死而神凡人民禽獸萬物貞蟲各有以生貞蟲諸細要之屬也或竒或偶或飛或走莫知其情唯知通道者能原本之天一地二人三一陽二隂也人生於天地故曰三也三三而九九九八十一一主日曰數十十從甲至癸也日主人人故十月而生八九七十二二主偶偶以承竒, SBCK: ''}
