  - {type: variant, offset: 2854, length: 428, content: 孟夏之月招摇指巳昏翼中旦婺女中翼南方朱鳥之宿是月昏時中於南方婺女一曰須女北方玄武之宿是月平旦中於南方也其位南方其日丙丁盛德在火炎帝之神治南方也丙丁火日也盛德在火火王南方也其蟲羽其音徵盛陽用事鱗散羽羽蟲鳳之長徵音火也律中仲吕其數七是月陽散在外隂實在中所以旅陽成功故曰仲吕其數七生數五火第二故曰七也其味苦其臭焦火味苦也焦火香焦其祀竈祭先胏祝融吴回爲高辛氏火正死爲火神託祀於竈是月火王故祀竈胏胏金也祭祀之肉先用所勝也一曰胏火自用其藏也螻蟈鳴丘螾出螻螻蛄也蟈蝦蟇也四月隂氣始動於下故類應鳴也丘螾蠢蝡也王瓜生苦菜秀王瓜栝樓也爾雅曰不榮而實曰秀苦菜宜言榮也天子衣赤衣乘赤騮服赤玉建赤旗煩火德也食菽與鷄菽豆連皮也鷄豆皆屬火之所養也服八風水爨柘燧火南宫御女赤色衣赤采吹竿笙火王南方故處南宫也竿笙空中像陽故吹之其兵戟戟有枝榦象陽布散也戟或作弩也其畜雞朝于明堂左个以出夏令南向堂當盛陽故曰明堂也東頭室故曰左个居是室行是月之令也雞羽蟲陽也故畜之立夏之日天子親率三公九卿大夫以迎歲, SBCK: 歳}
