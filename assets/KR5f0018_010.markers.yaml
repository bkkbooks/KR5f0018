  - {type: variant, offset: 5773, length: 269, content: 也其令曰審用法誅必辜備盜賊禁姦邪飾群牧謹著聚修城郭補决竇塞蹊徑遏溝瀆止流水雝谿谷守門閭陳兵甲選百官誅不法應金斷也北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤群水之野顓頊玄㝠之所司者萬二千里顓頊黄帝之孫也以水德王天下號高陽氏死爲北方水德之帝也其神玄㝠者金天氏有適子曰昧爲玄瞑師死而祀爲主水之神也其令曰申群禁固閉藏脩障塞繕關梁禁外徙斷罰刑殺當罪閉關閭大搜客止交游禁夜樂蚤閉晏開以塞姦人己德執之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋罪應隂殺也六合孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合, SBCK: ''}
