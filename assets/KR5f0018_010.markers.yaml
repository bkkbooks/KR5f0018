  - {type: variant, offset: 538, length: 407, content: 子嘗新先薦寢廟升成薦進也命百官始收歛孟秋始内也完隄防謹障塞以備水潦修城郭繕宫室是月月麗于畢俾滂沲矣故備水潦也毋以封侯立太官行重幣出大使行是月令凉風至三旬封侯列土封邑也大官九命之爵也重幣金帛之幣也大使命卿使之金氣收歛皆近不宜行也故言毋也孟秋行冬令則隂氣大勝介蟲敗穀戎兵乃來孟秋隂也復行冬水王之令故隂氣勝也其介蟲敗穀也隂氣并故戎兵來也行春令則其國乃旱陽氣復還五穀無實春陽亢燥而行其令故旱也陽氣還者此月凉風而反行温風之令故敗穀令無實也行夏令則冬多火災寒暑不節民多瘧疾夏火王而行其令故多火災寒暑相干故不節使瘧疾瘧疾寒暑所生也七月官庫其樹楝庫兵府也秋節整兵故官庫也其樹楝楝實鳳凰所食也今雒城旁有樹楝實秋熟故其樹楝也楝讀練染之練也仲秋之月招摇指酉昏牽牛中旦觜嶲中牽牛北方玄武之宿是月月昏時中於南方觜雋西方白虎之宿也是月平旦時中於南方也其位西方其日庚辛其蟲毛其音商律中南吕其數九南任也言陽氣吕旅而志助隂隂任成萬物也庚辛金日也其味, SBCK: 朱}
