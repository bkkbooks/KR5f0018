  - {type: variant, offset: 2063, length: 406, content: 縣言百舉全數耳五家爲鄰五鄰爲里四里爲酇四酇爲鄙四鄙爲縣然則縣二千五百家也爲來歲受朔日與諸侯所稅於民輕重之法貢歲之數以遠近土地所宜爲度來歲明年受朔日如今計吏朝賀豫明年之曆日也度者職貢多少有常也乃教於田獵以習五戎戎兵也刀劍予戟矢故曰五戎也命太僕及七騶咸駕戴荏授車以級皆正設于屏外級等也授當車者以高下各隨其等級正立設陳也天子外屏屏樹垣也爾雅曰門内之垣謂之樹垣者也司徒搢朴北嚮以贊之搢插也朴以教導也插置帶間贊相威儀也司徒主衆教導之也天子乃厲服廣飾執弓操矢以獵是月天子尚武乃服猛厲之服廣其所佩之飾以取禽也命主祠祭禽四方命教也主祠典祀之官也祭禽四方祀始設禽獸者於四方報其功不知其神所在故博求之於四方也是月草木黄落乃伐薪爲炭蟄蟲咸俛乃趨獄刑毋留有罪俛伏也青州爲伏爲俛也無留言當斷也收禄秩之不當供養之不宜者不當謂無德受禄也不宜謂不孝也一曰所養者無勳於國其先人又無賢德所不宜養故收也通路除道從境始至國而后已是月天子乃以犬嘗麻先薦寢, SBCK: ''}
