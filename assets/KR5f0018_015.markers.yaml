  - {type: variant, offset: 7491, length: 261, content: 之所以生者行善是也國無義雖大必亡桀紂是也人無善志雖勇必傷論語曰勇而無禮則亂亂則傷也治國上使不得與焉使不得與亡傷之危是上術也孝於父母弟於兄嫂信於朋友不得上令而可得爲也釋己之所得爲而責于其所不得制悖矣士處卑隱欲上達必先反諸己上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽於友有道事親不說不信於友不能說親朋反不信之也說親有道修身不誠不能事親矣誠身有道心不專一不能專誠道在易而求之難易謂反己先修其本也不修其本而欲得說親誠身之名皆難也故曰道在易而求之難也驗在近而求之遠故弗得也驗效也近謂本遠謂末也故不能得之也淮南鴻烈解卷之十五, CK-KZ: ''}
