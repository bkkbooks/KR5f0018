  - {type: variant, offset: 0, length: 8859, content: 淮南鴻烈解卷之十七神三太尉祭酒臣許愼記上齊俗訓齊一也四宇之風世之衆理皆混其俗令爲一道也率性而行謂之道得其天性謂之德性失然後貴仁道失然後貴義是故仁義立而道德遷矣禮樂飾則純樸散矣是非形則百姓眩矣珠玉尊則天下爭矣凡此四者衰世之造也末世之用也夫禮者所以别尊卑異貴賤義者所以合君臣父子兄弟夫妻朋友之際也今世之爲禮者恭敬而忮忮害也音寘爲義者布施而德君臣以相非骨肉以生怨則失禮義之本也故搆而多責搆謂以權相交權盡而交疏搆搆然也夫水積則生相食之魚土積則生自穴之獸禮義飾則生僞匿之本夫吹灰而欲無眯涉水而欲無濡不可得也古者民童蒙不知東西貌不羨乎情而言不溢乎行其衣致煖而無文其兵戈銖而無刃楚人謂刃頓爲銖其歌樂而無轉其哭哀而無聲鑿井而飲耕田而食無所施其美亦不求得親戚不相毁譽朋友不相怨德及至禮義之生貨財之貴而詐僞萌興非譽相紛怨德並行於是乃有曾參孝己之美而生盜跖莊蹻之邪故有大路龍旂羽蓋垂緌大路天子車也龍旂龍旗結駟連騎則必有穿窬拊揵抽箕踰備之姦抽握也備後垣有詭文繁繡弱緆羅紈弱緆細在也羅穀紈素也必有菅屩跐音此踦短褐不完者菅茅也跐偶也踦適也楚人謂袍爲短褐大布故高下之相傾也短脩之相形也亦明矣夫蝦蟇爲鶉鶉鸙也水蠆爲𧐟莣青蛉也音予音務皆生非其類唯聖人知其化其化視隂入陽從陽入隂夫胡人見黂黂麻子也不知其可以爲布也越人見毳不知其可以爲旃也故不通於物者難與言化昔太公望周公旦受封而相見太公望問周公曰何以治魯周公曰尊尊親親太公曰魯從此弱矣尊尊親親仁者弱也周公問太公曰何以治齊太公曰舉賢而上功周公曰後世必有劫殺之君舉賢上功則民競故劫殺其後齊日以大至於霸二十四世而田氏代之齊臣田氏奪其君位而代魯日以削至三十二世而亡魯禄去公室至楚考烈王滅之故易曰履霜堅氷至聖人之見終始微言故糟丘生乎象𣛰紂爲長夜之飲積糟成丘者起於象𣛰炮烙生乎熱升庖人進羹於紂熱以爲惡以熱升殺之趙國升可以殺人故起炮烙子路撜溺而受牛謝撜舉也升出溺人主謝以牛也孔子曰魯國必好救人於患子贛贖人而不受金於府魯國之法贖人於他國者受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善孔子之明以小知大以近知遠通於論者也由此觀之廉有所在而不可公行也故行齊於俗可隨也事周於能易爲也矜僞以惑世伉行以違衆聖人不以爲民俗廣厦闊屋連闥通房人之所安也鳥入之而憂高山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲皆黄帝樂九韶舜樂六英帝顓頊樂人之所樂也鳥獸聞之而驚深谿峭岸峻木尋枝猨狖之所樂也人上之而慄形殊性詭所以爲樂者乃所以爲哀所以爲安者乃所以爲危也乃至天地之所覆載日月之所照誋音告使各便其性安其居處其宜爲其能故愚者有所脩智者有所不足柱不可以樀齒筐不可以持屋筐小簪也馬不可以服重牛不可以追速鈆不可以爲刀銅不可以爲弩鐵不可以爲舟木不可以爲釜各用之於其所適施之於其所宜即萬物一齊而無由相過夫明鏡便於照形其於以函食不如簞犠牛粹毛宜於廟性其於以致雨不若黑蜧黑蜧神蛇也潜於神淵蓋能興雲雨由此觀之物無貴賤因其所貴而貴之物無不貴也因其所賤而賤之物無不賤也夫玉璞不猒厚角䚩魚沼反不猒薄角䚩刀劍羽間之覆角也漆不猒黑粉不猒白此四者相反也所急則均其用一也今之裘與蓑孰急見雨則裘不用升堂則蓑不御此代爲常者也譬若舟車楯肆窮廬故有所冝也水固冝舟陸地冝車沙地冝肆泥地宣楯草野宜窮廬故老子曰不上賢者言不致魚於木沉鳥於淵物各因其冝故不須用賢也故堯之治天下也舜爲司徒契爲司馬禹爲司空后稷爲大田師奚仲爲工其導萬民也水處者漁山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用冝其人澤臯織岡陵阪耕田得以所有易所無以所工易所拙是故離叛者寡而聽從者衆譬若播棋丸於地員者走澤方者處高各從其所安夫有何上下焉若風之遇簫簫籟忽然感之各以清濁應矣夫猨狖得茂木不舍而穴狟狢得埵防弗去而縁狟狟豚也埵水埒也防隄物莫避其所利而就其所害是故鄰國相望雞狗之音相聞而足迹不接諸侯之境車軌不結千里之外者皆各得其所安故亂國若盛治國若虚亡國若不足存國若有餘虚者非無人也皆守其職也盛者非多人也皆徼於末也有餘者非多財也欲節事寡也不足者非無貨也民躁而費多也故先王之法籍非所作也其所因也其禁誅非所爲也其所守也凡以物治物者不以物以睦治睦者不以睦以人治人者不以人以君治君者不於君以欲治欲者不於欲以性治性者不於性以德治德者不以德以道原人之性蕪濊而不得清明者物或堁之也堁紛塵也羌氐僰翟嬰兒生皆同聲羌束戎氐南夷僰西夷也翟北胡也及其長也雖重象狄騠象狄騠驛也象傳狄騠之語也不能通其言教俗殊也今今三月嬰兒生而徙國則不能知其故俗由此觀之衣服禮俗者非人之性也所受於外也夫竹之性浮殘以爲牒束而投之水則沉失其體也金之性沉託之於舟上則浮勢有所枝也夫素之質白染之以涅則黑縑之性黄染之以丹則赤人之性無邪久湛於俗則易易而忘本合於若性若性合於他性自若本性故日月欲明浮雲蓋之河水欲清沙石濊之人性欲平嗜欲害之惟聖人能遺物而反己夫乘舟而惑者不知東西見斗極則寤矣夫性亦人之斗極也以有自見也則不失物之情無以自見則動而惑營譬若隴西之遊愈躁愈沉孔子謂顔回曰吾服汝也忘孔子謙自謂無知而服回此忘行也而汝服於我也亦忘雖然汝雖忘乎吾猶有不忘者存孔子知其本也夫縱欲而失性動未嘗正也以治身則危以治國則亂以入軍則破是故不聞道者無以反性故古之聖王能得諸已故令行禁止名傳後世德施四海是故凡將舉事必先平意神清意平物乃可正若璽之抑埴璽印也埴泥也正與之正印正而封正也傾與之傾故堯之舉舜也决之於目桓公之取寗戚也斷之於耳而已矣爲是釋術數而任耳目其亂必甚矣夫耳目之可以斷也反情性也聽失於誹譽而目淫於采色而欲得事正則難矣夫載哀者聞歌聲而泣載樂者見哭者而笑哀可樂者笑可哀者載使然也是故貴虚虛者心無所載於哀樂也故水擊則波興氣亂則智昏智昏不可以爲政波水不可以爲平故聖王執一而勿失萬物之情既矣四夷九州服矣夫一者至貴無適於天下聖人記於無適故民命繫矣爲仁者必以哀樂論之爲義者必以取予明之目所見不過十里而欲遍照海内之民哀樂弗能給也無天下之委財而欲遍贍萬民利不能足也且喜怒哀樂有感而自然者也故哭之發於口涕之出於目此皆憤於中而形於外者也譬若水之下流煙之上尋也夫有孰推之者故强哭者雖病不哀强親者雖笑不和情發於中而聲應於外故釐負羈之壼餐愈於晋獻公之垂棘獻公以垂棘滅虞虢趙宣孟之束脯賢於智伯之大鐘智伯以大鐘滅仇由故禮豐不足以效愛而誠心可以懷遠故公西華之養親也若與朋友處公西華孔子弟子也與朋友處睦而少敬曾參之養親也若事嚴主烈君烈酷也曾子事親其敬多其於養一也故胡人彈骨胡人之盟約置酒人頭中飲以相詛越人契臂刻臂出血中國歃血也殺牲歃血相與爲信所由各異其於信一也三苗髽首三苗之國在彭蠡洞庭之野髮以枲束髮也羌人括領括結中國冠笄笄簪越人酇髮劗斷其於服一也帝顓頊之法婦人不辟男子於路者拂之於四達之衢拂仿今之國都男女切踦踦足肩摩於道其於俗一也故四夷之禮不同皆尊其主而愛其親敬其兄獫狁之俗相反獫狁北胡也其俗物與中國相反也皆慈其子而嚴其上夫鳥飛成行獸處成羣有孰教之故魯國服儒者之禮行孔子之術地削名卑不能親近來遠越王句踐酇髮文身無皮弁搢笏之服皮弁以爲爵冠也搢佩紟笏佩玉也長三尺抒上終葵首拘罷拒折之容拘罷園也拒折方也然而勝夫羌於五湖南面而霸天下泗上十二諸侯皆率九夷以朝胡貉匈奴之國縱體拖髮拖縱也箕倨反言而國不亡者未必無禮也楚莊王裾衣博袍裾襄也衣裾令行乎天下遂霸諸侯晋文君大布之衣大布粗布䍧羊之裘韋以帶劍威立于海内豈必鄒魯之禮之謂禮乎鄒孟軻邑魯孔子邑是故入其國者從其俗入其家者避其諱不犯禁而入不迕逆而進雖之夷狄徒倮之國徒倮不衣結軌乎遠方之外而無所困矣禮者實之文也仁者恩之效也故禮困人情而爲之節文而仁發恲以見容恲色也禮不過實仁不溢恩也治世之道也夫三年之喪是强人所不及也而以僞輔情也三月之服是絶哀而迫切之性也三月之服夏后氏禮夫儒墨不原人情之終始而務以行相反之制五縗之服五縗謂三年暮九月五月三月服也悲哀抱於情葬薶稱於養不强人之所不能爲不絶人之所能已度量不失於適誹譽無所由生古者非不知繁升降槃還之禮也蹀采齊肆夏之容也采齊肆夏皆樂名也以爲曠日煩民而無所用故制禮足以佐實喻意而已矣古者非不能陳鐘鼓盛筦簫揚干戚奮羽旄以爲費財亂政制樂足以合歡宣意而已喜不羨於音非不能竭國麋民虚府殫財含珠鱗施綸組節束鱗施王田也綸絮也束縛也追送死也以爲窮民絶業而無益於槁骨腐肉也故葬薶足以收歛蓋藏而已昔舜葬蒼梧市不變其肆舜南巡狩死蒼梧墓紟道九嶷山不煩於市有所廢禹葬會稽之山農不易其畒禹會羣臣於會稽墓山隂之陽不煩農人之田畒明乎死生之分通乎侈儉之適者也亂國則不然言與行相悖情與貌相反禮飾以煩樂優以淫崇死以害生久喪以招行是以風俗濁於世而誹譽萌於朝是故聖人廢而不用也義者循理而行宜也禮者體情制文者也義者宜也禮者體也昔有扈氏爲義而亡有扈夏啓之庶兄也以堯舜舉賢禹獨與子故伐啓啓亡之知義而不知宜也魯治禮而削知禮而不知體也有虞氏之祀其社用土封土爲社祀中霤葬成畝田畝而葬其樂咸池承雲九韶舜兼用黄帝樂九韶舜所作也其服尚黄舜土德也故尚黄夏后氏其社用松所樹之木皆所生地之所宜也祝尸春祭先尸夏木德也葬墻置翣翣棺衣飾也其樂夏籥九成六佾六列六英九成變也六列六六爲行列也六英禹兼用顓頊之樂也其服尚青木德故尚青也殷人之禮其社用石以石爲社主也祀門秋祭先門殷金德也葬樹松其樂大護晨露大護晨露湯所作樂其服尚白金德故尚白也周人之禮其社用栗祀竈夏祭先竈周火德也鄒子曰吾德之次從此不勝故虞土夏木殷金周火葬樹栢其樂大武三象棘下三象棘下武象樂也其服尚赤火德故尚赤也禮樂相詭服制相反然而皆不失親䟽之恩上下之倫今握一君之法籍以非傳代之俗譬由膠柱而調琴也故明主制禮義而爲衣分節行而爲帶衣足覆形從典墳虚循撓便身體適行步不務於竒麗之容隅眥之削帶足以結紐收衽束牢連固不亟於爲文句䟽短之鞵故制禮義行至德而不拘於儒墨所謂明者非謂其見彼也自見而已所謂聦者非謂聞彼也自聞而已所謂達者非謂知彼也自知而已是故身者道之所託身德則道得矣道之得也以視則明以聽則聦以言則公以行則從故聖人財制物也猶工匠之斲削鑿芮也宰庖之切割分别也曲得其宜而不折傷拙工則不然大則塞而不入小則窕而不周動於心枝於手而愈醜夫聖人之斲削物也剖之判之離之散之已淫已失復揆以一既出其根復歸其門已雕已琢遂反於樸合而爲道德離而爲儀表其轉入玄㝠其散應無形禮義節行又何以窮至治之本哉世之明事者多離道德之本曰禮義足以治天下此未可與言術也所謂禮義者五帝三王之法藉風俗一世之迹也譬若芻狗土龍之始成芻狗束芻爲狗以謝過求福土龍以請雨文以青黄絹以綺繡纏以朱絲尸祝袀袨袀純服袨墨齋衣也大夫端冕端冕冠也以送迎之及其已用之後則壤土草剟音出而已夫有孰貴之言弃之不貴也故當舜之時有苗不服於是舜脩政偃兵執干戚而舞之禹之時天下大兩禹令民聚土積薪擇丘陵而處之武王伐紂載尸而行武王伐紂伯夷曰父死未葬爰及干戈可謂孝乎海内未定故不爲三年之喪始三年之喪於武王禹遭洪水之患陂塘之事故朝死而暮葬此皆聖人之所以應時耦變見形而施宜者也今之脩干戚而笑钁插钁斫屬知三年非一日是從牛非馬以徵笑羽也以此應化無以異於彈一絃而會棘下棘下樂石一絃會之不可成也夫以一世之變欲以耦化應時譬猶冬被葛而夏被裘夫一儀不可以百發儀弩招顔也射百發遠近不可皆以一儀也一衣不可以出歲儀必應乎高下衣必適乎寒暑是故世異即事變時移則俗易故聖人論世而立法隨時而舉事尚古之王封於泰山禪於梁父七十餘聖法度不同非務相反也時世異也是故不法其以成之法而法其所以爲法所以爲法者與化推移者也夫能與化推移爲人者至貴在焉爾故狐梁之歌可隨也其所以歌者不可爲也聖人之法可觀也其所以作法不可原也辯士言可聽也其所以言不可形也淳均之劍不可愛也而歐冶之巧可貴也今夫王喬王喬蜀武陽人也爲伯人令得道而仙也赤誦子赤誦子上谷人也病厲入山導引輕舉吹嘔呼吸吐故内新遺形去智抱素反眞以遊玄眇上通雲天今欲學其道不得其養氣處神而放其一吐一吸時詘時伸其不能乘雲升假亦明矣假上也五帝三王經天下細萬物齊死生同變化抱大聖之心以鏡萬物之情上與神明爲友下與造化爲人令欲學其道不得其清明玄聖而守其法籍憲令不能爲治亦明矣故曰得十利劍不若得歐冶之巧得百走馬不若得伯樂之數樸至大者無形狀道至眇者無度量故天之員也不得規地之方也不得矩往古來今謂之宙四方上下謂之宇道在其間而莫知其所故其見不遠者不可與語大其智不閎者不可與論至昔者馮夷得道以潛大川馮夷河伯也華隂潼鄉隄首里人服八石得水仙鉗且得道以處崑崙鉗且得仙道升居崑崙山扁鵲以治病扁鵲盧人姓秦名越人趙簡子時人也造父以御馬羿以之射倕以之斲倕堯巧功所爲者各異而所道者一也夫禀道以通物者無以相非也譬若同陂而溉田其受水鈞也今屠牛而烹其肉或以爲酸或以爲甘煎敖燎炙齊味萬方其本一牛之體伐楩柟豫樟而剖梨之剖判梨分或爲棺槨或爲柱梁披斷撥檖披解也撥析理遂順所用萬方然一木之樸也故百家之言指奏相反其合道一體也譬若絲竹金石之會樂同也其曲家異而不失於體伯樂韓風秦牙管青四子皆古善相馬者所相各異其知馬一也故三皇五帝法籍殊方其得民心鈞也故湯入夏而用其法武王入殷而行其禮桀紂之所以亡而湯武之所以爲治故剞劂銷音削鋸陳非良工不能以制木鑪橐埵坊設鑪橐埵皆治具也坊土刑也非巧治不能以治金屠牛吐齊之大屠一朝解九牛而刀以剃毛剃截髮也庖丁用刀十九年庖丁齊屠伯也而刀如新剖刑剖始石也硎磨刀石何則游乎衆虚之間衆虛之間剖中理也若夫規矩鉤繩者此巧之具也而非所以巧也故瑟無絃雖師文不能以成曲師文樂師徒絃則不能悲故絃悲之具也而非所以爲悲也若夫工匠之爲連鐖運開隂閉眩錯連饑饑發也運開相通也隂閉獨閉也眩因而相錯也入於冥冥之眇神調之極游乎心手衆虚之間而莫與物爲際者父不能以教子瞽師之放意相物寫神愈舞而形乎絃者兄不能以喻弟今夫爲平者準也爲直者繩也若夫不在於繩準之中可以平直者此不共之術也故叩宫而宫應彈角而角動此同音之相應也其於五音無所比而二十五絃皆應此不傳之道也故蕭條者形之君蕭條深靜而寂漠者音之主也微音生於寂漠天下是非無所定世各是其所是而非其所非所謂是與非各異皆自是而非人由此觀之事有合於己者而未始有是也有忤於心者而未始有非也故求是者非求道理也求合於己者也去非者非批邪施施微曲也去忤於心者也忤於我未必不合於人也合於我未必不非於俗也至是之是無非之非至非無是此眞是非也若夫是於此而非於彼非於此而是於彼者此之謂一是一非也此一是非隅曲也夫一是非宇宙也今吾欲擇是而居之擇非而去之不知世之所謂是非者不知孰是孰非老子曰治大國若烹小鮮爲寬裕者曰勿數撓裕饒也爲刻削者日致其醎酸而已矣晋平公出言而不當師曠舉琴而撞之跌衽宫壁跌衽至平公衣衽中宫壁左右欲塗之欲塗師曠所敗壁也平公曰舍之以此爲寡人失孔子聞之曰平公非不痛其體也欲來諫者也韓子聞之韓子韓公子非曰羣臣失禮而弗誅是縱過也有以也夫平公之不霸也故賔有見人於密子者密子子賤者也賔出密子曰子之賔獨有三過望我而笑是攓也攓慢也談語而不擇師是返也交淺而言深是亂也賔曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也故賔之容一體也或以爲君子或以爲小人所自是之異也故趣舍合即言忠而益親身疏即謀當而見疑母親爲其子治扢秃而血流至耳見者以爲其愛之至也使在於繼母則過者以爲嫉也事之情一也所從觀者異也從城上視牛如羊視羊如豕所居高也闚面於盤水則員於杯則隨面形不變其故有所員有所隨者所自闚之異也今吾雖欲正身而待物庸遽知世之所自窺我者乎若轉化而與世競走譬猶逃雨也無之而不濡常欲在於虛則有不能爲虚矣爲者失之執者敗之若夫不爲虚而自虛者性自然也此所慕而不能致也故通於道者如車軸不運於己而與轂致千里轉無窮之原也不通於道者若迷惑告以東西南北所居聆聆聆聆意曉解也一曲而辟小邪僻也然忽不得復迷惑也故終身隸於人辟若倪之見風也倪侯風雨也世所謂五雨者也無須臾之間定矣故聖人體道反性不化以待化無爲以待有爲則幾於免矣近於免世難也治世之體易守也其事易爲也其禮易行也其責易償也是以人不兼官官不兼事士農工商鄉别州異是故農與農言力士與士言行工與工言巧商與商言數是以士無遺行農無廢功工無苦事商無折貨各安其性不得相干故伊尹之興土功也脩脛者使之跖钁長脛以蹋插者使而入深强脊者使之負土脊强者任負重眇者使之准目不正因令晞傴者使之塗傴人塗地因其俛也各有所宜而人性齊矣胡人便於馬越人便於舟異形殊類易事而悖失處而賤得勢而貴聖人緫而用之其數一也夫先知遠見達視千里人才之隆也而治世不以責於民言民不以己求備於下也博聞强志口辯辭給人智之美也而明主不以求於下敖世輕物不汙於俗士之伉行也而治世不以爲民化神機隂閉剞劂無迹人巧之妙也而治世不以爲民業故萇弘師曠先知禍福言無遺策而不可與衆同職也公孫龍折辯抗辭别同異離堅公孫龍趙人好分析詭異之言以白馬不得合爲一物離而爲二也不可以衆同道也北人無擇非舜而自投清冷之淵北人無擇古隱士也非舜非其德之衰也不可以爲世儀魯般墨子以木爲鳶而飛之三日不集而不可使爲工也故高不可及者不可以爲人量行不可逮者不可以爲國俗夫契輕重不失殊兩聖人弗用而縣之乎銓衡視高下不差尺寸明主弗任而求之乎浣準浣準水望之平何則人才不可專用而度量可世傳也故國治可與愚守也而軍制可與權用也夫待騕裊飛兔而駕之騕裊良馬飛兔其子裊兔走蓋皆一日萬里也則世莫乘車待西施毛嬙而爲配西施毛嬙古好女也則終身不家矣然非待古之英俊而人自足者因所有而並用之夫騏驥千里一日而通駑馬十舍旬亦至之旬十日也由是觀之人材不足專恃而道術可公行也亂世之法高爲量而罪不及重爲任而罰不勝危爲禁而誅不敢民困於三責則飾智而詐上犯邪而干免干求也故雖峭法嚴刑不能禁其姦何力不足也故諺曰鳥窮則噣獸窮則𧢻人窮則詐此之謂也道德之論譬猶日月也江南河北不能易其指馳騖千里不能易其處趍舍禮俗猶室宅之居也東家謂之西家西家謂之東家雖臯陶爲之理不能定其處故趍舍同誹譽在俗意行鈞窮達在時湯武之累行積善可及也其遭桀紂之世天授也今有湯武之意而無桀紂之時而欲成霸王之業亦不幾矣昔武王執戈秉鉞以伐紂勝殷搢笏杖殳以臨朝殳木杖也武王既没殷民叛之周公踐東宫東宫太子宫也履乘石人君升車有乘石也攝天子之位負扆而朝諸侯户牖之間謂之扆放蔡叔誅管叔周公兄也克殷殘商殘商誅紂紂子禄父祀文王于明堂七年而致政成王夫武王先武而後文非意變也以應時也周公放兄誅弟非不仁也以匡亂也故事周於世則功成務合於時則名立昔齊桓公合諸侯以乘車退誅於國以斧鉞晋文公合諸侯以革車退行於國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審於勢之變也顔闔魯君欲相之顔闔魯隱士也而不肯使人以幣先焉鑿培而遁之培屋後墻爲天下顯武楚人謂士爲武使遇商鞅申不害刑及三族又況身乎世多稱古之人而高其行並世有與同者而弗知貴也非才下也時弗宜也故六騏驥駟駃騠駃騠北翟之良馬也以濟江河不若窾木便者窾空處世然也是故立功之人簡於行而謹於時今世俗之人以功成爲賢以勝患爲智以遭難爲愚以死節爲贛吾以爲各致其所極而已王子比干非不智箕子被髮佯狂以免其身也然而樂直行盡忠以死節故不爲也伯夷叔齊非不能受禄任官以致其功也然而樂離世伉行以絶衆故不務也許由善卷非不能撫天下寧海内以德民也然而羞以物滑和故弗受也豫讓要離豫讓智伯臣要離吴王闔閭臣非不知樂家室安妻子以偷生也然而樂椎誠行必以死主故不留也今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戇矣從伯夷視管晏則貪矣趍舍相非嗜欲相反而各樂其務將誰使正之曾子曰擊舟水中鳥聞之而高翔魚聞之而淵藏故所趍各異而皆得所便故惠子從車百乘以過孟諸惠子名施仕爲梁相從車百乘志尚未足孟諸宋澤莊子見之弃其餘魚莊子名周蒙人隱而不仕見惠施之不足故弃餘魚也鵜胡飲水數斗而不足鵜胡鳥汙澤鳥鱓鮪入口若露而死鱓鮪魚名智伯有三晋而欲不贍三晋智伯有范中行之地瞻足林類榮啓期衣若縣衰林類榮啓期皆隱賢意不慊慊恨由此觀之則趣行各異何以相非也夫重生者不以利害己立節者見難不苟免貪禄者見利不顧身而好名者非義不苟得此相爲論譬猶氷炭鈎繩也何時而合若以聖人爲之中則兼覆而并之未有可是非者也夫飛烏主巢狐狸主穴巢者巢成而得棲焉穴者穴成而得宿焉趍舍行義亦人之所棲宿也各樂其所安致其所蹠謂之成人故以道論者緫而齊之治國之道上無令官無煩治士無僞仁上工無淫巧其事經而不擾其器完而不飾亂世則不然爲行者相揭以高揭舉爲禮者相矜以僞車輿極於雕琢器用遽於刻鏤求貨者爭難得以爲寳詆文者處煩撓以爲慧爭爲佹辯久積而不訣無益於治工爲竒器歷歲而後成不周於用故神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以爲天下先其導民也不貴難得之貨不器無用之物是故其耕不强者無以養生其織不强者無以揜形有餘不足各歸其身衣食饒溢姦邪不生安樂無事而天下均平故孔丘曾參無所施其善孟賁成荆無所行其威成荆古勇士也衰世之俗以其知巧詐僞飾衆無用貴遠方之貨珍難得之財不積於養生之具澆天下之淳澆薄也淳厚也析天下之樸牿服馬牛以爲牢滑萬民以清爲濁性命飛揚皆亂以營貞信漫瀾人失其情性於是乃有翡翠犀象黼黻文章以亂其目芻豢黍梁荆吴芬馨以音藍其口荆吴國也芬珍味也嚂貪求也鐘鼓管簫絲竹金石以淫其身趍舍行義禮節謗議以營其心於是百姓縻沸豪亂暮行遂利煩挐澆淺淺薄也既薄尚澆也法與義相非行與利相反雖十管仲弗能治也且富人則車輿衣纂錦纂繪馬飾傅旄象帷幕茵席綺繡條組青黄相錯不可爲象貧人則夏被褐帶索啥菽飲水以充腸以支暑熱冬則羊裘解札解札裘敗解也短褐不掩形而煬竈口煬炙故其爲編户齊民無以異然貧富之相去也猶人君與樸虜不足以論之夫乘竒技僞邪施者自足乎一世之間守正脩理不苟得者不免乎飢寒之患而欲民之去末反本由是發其原而壅其流也夫雕琢刻鏤傷農事者也錦繡纂組害女工者也農事廢女工傷則飢之本而寒之原也夫飢寒並至能不犯法干誅者古今之未聞也故仕鄙在時不在行利害在命不在智夫敗軍之卒勇武遁逃將不能止也勝軍之陳怯者死行懼不能走也故江河决沉一鄉父子兄弟相遺而走爭升陵阪上高丘輕足先升不能相顧也世樂志平見鄰國之人溺尚猶哀之又況親戚乎故身安則恩及鄰國志爲之滅身危則忌其親戚而人不能解也游者不能拯溺手足有所急也灼者不能救火身體有所痛也夫民有餘即讓不足則爭讓則禮義生爭則暴亂起扣門求水莫弗與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物豈則欲省求贍則爭止秦王之時或人葅子生子殺葅之利不足也劉氏持政劉氏謂漢也獨夫收孤財有餘也故世治則小人守政而利不能誘也世亂則君子爲姦而法弗能禁也, YP-C: ''}
