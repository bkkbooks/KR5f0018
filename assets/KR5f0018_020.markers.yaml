  - {type: variant, offset: 5965, length: 745, content: 歸文王期年而紂乃亡武王滅之故聖人之見存亡之迹成敗之際也非乃鳴條之野甲子之日也湯伐桀禽於鳴條武王誅紂以甲子尅之今謂彊者勝則度地計衆富者利則量粟稱金若此則千乘之君無不霸王者而萬乘之國無不破亡者矣存亡之迹若此其易知也愚夫惷婦皆能論之惷亦愚無智之貌也趙襄子以晋陽之城霸智伯以三晋之地擒智伯智繇襄子無恤也三晋智氏兼有韓魏智伯帥韓魏之君圍趙襄子於晋陽趙襄子使張孟談與韓魏通謀韓魏反而擊之大破智伯之軍獲其首以爲飲器故曰以三晋之地擒也湣王以大齊亡爲淖齒所殺也田單以即墨有功燕伐齊而代之得七十城唯即墨未下田單以市吏率即墨市民以擊燕師破之故能有功也故國之亡也雖大不足恃大猶亡智伯是道之行也雖小不可輕湯以七十里文王以百里皆有天下故雖小不可輕也由此觀之存在得道而不在於大也得道之君雖小爲善而能王天下故曰不在於大也亡在失道而不在於小也無道之君雖小以爲惡無傷而弗革積必亡故曰不在於小也詩云乃眷西顧此惟與宅言去殷而遷于周也紂治朝歌在東文王國於岐周在西天乃眷然顧西土此唯居周言我宅也故曰去殷而遷于周也故亂國之君務廣其地而不務仁義務高其位而不務道德是釋其所以存而造其所以亡也故桀囚於焦門而不能自非其所行不自非行之惡而悔不殺湯於夏臺臺或作宫紂拘於宣室而不反其過反悔而悔不誅文王於羑里悔恨也羑里今河内湯隂是也羑古牖守二君處彊大勢位脩仁義之道湯武救罪之不給何謀之敢當二君桀紂也當其君也彊大之勢不能自知所行之非也假令能修仁義之道則湯武不敢生誅之謀也若上亂三光之明下失萬民之心三光日月星辰也失萬民心施民所惡也雖微湯武孰弗能奪也言遭人能奪之不必湯武也今不審其在己者而反備之于人言不愼行己之德而乃反備天下之人來誅也天下非一湯武也殺一人則必有繼之者也且湯武之所以處小弱而能以王者以其有道也桀紂之所以處彊大而見奪者以其無道也今不行人之所以王者, SBCK: 㱕}
