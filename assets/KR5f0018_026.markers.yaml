  - {type: variant, offset: 11470, length: 138, content: 人之心者也若使人之所懷於内者與所見於外者若合符節則天下無亡國破家矣夫狐之捕雉也必先卑體彌耳以待其來也雉見而信之故可得而擒也使狐瞋目植覩植覩枉尾見必殺之勢雉亦知驚憚遠飛以避其怒矣夫人僞之相欺也非直禽獸之詐計也物類相似若然而不可從外論者衆而難識矣是故不可不察也淮南鴻烈解卷之二十五, CK-KZ: ''}
