  - {type: variant, offset: 1435, length: 333, content: 公不可諫而去轉行自賣於秦爲穆公相而秦興也管仲束縛管仲傅相齊公子糾不死子糾之難而奔魯束縛以歸齊桓公用之而霸也孔子無默突墨子無煖席默言其突竈不至於黑坐席不至於温歷行諸國汲汲施行道也是以聖人不高山不廣河蒙恥辱以干世主非以貪禄慕位欲事起天下利而除萬民之害聖人蓋謂禹稷不以山爲高不以河爲廣言必踰渡之事治也蓋聞傳書曰神農憔悴堯瘦臞舜黴黑禹胼胝由以觀之則聖人之憂勞百姓甚矣甚重也故自天子以下至於庶人四肢不動思慮不用事治求贍者未之聞也夫地勢水東流人必事焉然後水潦得谷行水勢東流人必事而通之使得循谷而行也禾稼春生人必加功焉故五穀得遂長加功謂是藨是蓘耘耔之也遂成也聽其自流待其自生則鯀禹之功不立而后稷之智不用若吾所謂無爲者私志不得入公道嗜欲不得枉正術循理而舉事因資而立權自然之勢而曲故不, SBCK: ''}
