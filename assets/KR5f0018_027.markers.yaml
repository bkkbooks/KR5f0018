  - {type: variant, offset: 7544, length: 397, content: 未始知音者也知非李竒所作而皆棄之故未始知也鄙人有得玉璞者喜其狀以爲寳而藏之鄙人小人以示人人以爲石也因而棄之此未始知玉者也故有符於中則貴是而同今古符驗驗者有明也是實也言中心能明實是者則貴之古今一也故曰同也無以聽其說則所從來者遠而貴之耳言無中心眀驗無以聽人說之是否但見其言遠古之事便珍貴之耳近世之事有可貴者亦有不貴之也此和氏之所以泣血於荆山之下荆人和氏得美玉之璞於荆山之下獻楚武王武王以爲石刖其右趾及文王即位復獻之如是乃泣血證之爲寳文王曰先王輕於刖足而重剖石遂爲剖之畢如和言因號爲和氏之璧也今剱或絶側羸文齧缺卷銋而稱以頃襄之剱則貴之爭帶之絶無側羸無文齧齒卷銋鈍弊無刃託之爲楚頃襄王所服剱故貴人慕而爭帶之一說頃襄王善爲劍人名銋讀豐之稔也琴或撥刺枉橈闊解漏越而稱以楚莊之琴側室爭鼓之撥刺不正枉撓曲弱闊解壞漏越音聲散託之爲楚莊王琴則側室之寵人爭鼓之也側室或作廟堂也苗山之鋌羊頭之銷雖水斷龍舟陸剸兕甲莫之服, SBCK: ''}
