front:
  text: 勢利也古之聖人其和愉甯靜性也其志得道行命也命天命也是故性遭命而後能行命得性而後能明得其本清靜之性故能明鳥號之弓谿子之弩不能無弦而射鳥號柘桑也谿子爲弩所出國名也或曰谿蠻夷也以柘桑爲弩因曰谿子之弩也一曰谿子陽鄭國善爲弩匠因以爲名也越舲蜀艇不能無水而浮舲小船也蜀船一版之舟若今豫章是也雖越人所便習若無其水不能獨浮也今矰繳機而在上𦉾罟張而在下雖欲翺翔其勢焉得矰弋射身短矢也機發也翺翔鳥之高飛翼上下曰翺直刺不動曰翔也故詩云采采卷耳不盈傾筐嗟我懷人寘彼周行以言慕遠世也詩周南卷耳篇也言采采易得之菜不滿易盈之器以言君子爲國執心不精不能以成其道采易得之菜不能盈易滿之器也嗟我懷人寘彼周行言我思古君子官賢人置之列位也誠古之賢人各得其行列故曰慕遠也
  hash: sha256:ad07714ed4c3dee6cac3011bf171239c22d93dc8e797226254b7c17375b04b62
body:
  text: 天墜未形馮馮翼翼洞洞灟灟故曰太昭馮翼洞灟無形之貌洞讀挺桐之桐灟讀以鐵頭斫地之鐲也道始於虛霩虛霩生宇宙宇宙生氣氣有漢垠宇四方上下也宙往古來今也將成天地之貌也漢垠重安之貌也清陽者薄靡而爲天薄靡者若埃飛揚之貌重濁者凝滯而爲地清妙之合專一作專易重濁之凝竭難故天先成而地後定天地之襲精爲陰陽襲合也精氣也陰陽之專精爲四時四時之散精爲萬物積陽之熱氣生火火氣之精者爲日積陰之寒氣者爲水水氣之精者爲月日月之淫爲精者爲星辰天受日月星辰地受水潦塵埃昔者共工與顓頊爭爲帝怒而觸不周之山共工官名伯於宓羲神農之問其後子孫任智刑以强故與顓頊黃帝之孫爭位不周山在西北也天柱折地維絶天傾西北故日月星辰移焉傾高也原道言地東南傾傾下也此先言傾西北明其高也地不滿東南故水潦塵埃歸焉天道曰圓地道曰方方者主幽圓者主明明者吐氣者也是故火曰外景幽者含氣者也是故水曰內景吐氣者施含氣者化是故陽施陰化天之偏氣怒者爲風天地之含氣和者爲雨陰陽相薄感而爲雷薄迫也感動也激而爲霆亂而爲霧陽氣勝則散而爲雨露散霧散也陰氣勝則凝而爲霜雪毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於陰日者陽之主也是故春夏則羣獸除除冬毛微墮也日至而麋鹿解日冬至麋角解日夏至鹿角解月者陰之宗也是以月虛而魚腦減月死而蠃硥膲宗本也減少也膲肉不滿言應陰氣也膲讀若物醮妙之醮也火上蕁水下流故鳥飛而高魚動而下物類相動本標相應蕁讀葛覃之覃標讀刀末之末故陽燧見日則燃而爲火陽燧金也取金杯無緣者熟摩令熱日中時以當日下以艾承之則燃得火也方諸見月則津而爲水方諸陰遂大蛤也熟磨拭令熱月盛時以向月下則水生以銅盤受之下水數滴先師說然也虎嘯而谷風至龍舉而景雲屬虎土物也風木風也木生於土故虎嘯而谷風至龍水也雲生水故龍舉而景雲屬屬會也麒麟鬭而日月食鯨魚死而彗星出蠶珥絲而商弦絶蠶老絲成自中徹外然視之如金精珥表裏見故曰珥絲一曰弄絲於口商音清弦細而急故先絶也賁星墜而勃海決賁星客星也又作孛星墜隕也勃大也快溢也人主之情上通於天故誅暴則多飄風暴虐也飄風迅也枉法令則多蟲螟食心曰螟穀之災也殺不辜則國赤地赤地旱也令不收則多淫雨干時之令不收納則久雨爲災四時者天之吏也日月者天之使也星辰者天之期也期會也虹蜺彗星者天之忌也雄爲虹雌爲蜺也虹者雜色也忌禁也天有九野九千九百九十九隅去地五億萬里九野九天之野也一野千一百一十一隅也五星八風二十八宿五星𡻕星熒惑鎮星太白辰星也八風八卦之風也二十八宿東方角亢氏房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼柳星張翼軫也五官六府五官五行之官六府加以穀紫宮太微軒轅咸池四守天阿皆星名下自解何謂九野中央曰鈞天其星角亢氏韓鄭之分野也東方曰蒼天其星房心尾東北曰變天陽氣始作萬物萌芽故曰變天其星箕斗牽牛尾箕一名折木燕之分野斗吳之分野牽牛一名星紀越分野北方曰玄天其星須女虛危營室虛危一名玄枵齊之分野西北方曰幽天幽陰也西方季秋將卽於陰故曰幽天也其星東璧奎婁營室東璧一名承委衛之分野奎婁一名降婁魯之分野西方曰皓天皓白也西方金色白故曰皓天或作昊其星胃昴畢昴畢一名大梁趙之分野西南方曰朱天朱陽也西南爲少陽故曰朱天其星觜巂參東井觜巂參一名實沈晉之分野南方曰炎天其星輿鬼柳七星柳七星張周之分野一名鶉火東南方曰陽天東南純乾用事故曰陽天其星張翼軫翼軫一名鶉尾楚之分野何謂五星東方木也其帝太皥太皥伏羲氏有天下號也死託祀於東方之帝也其佐句芒執圭而治春其神爲𡻕星其獸蒼龍其音角其日甲乙木色蒼蒼龍順其色也角木也甲乙皆木也南方火也其帝炎帝炎帝少典之子也以火德王天下號曰神農死託祀於南方之帝其佐朱明舊說云祝融執衡而治夏其神爲熒惑其獸朱鳥熒惑五星之一也朱鳥朱雀也其音徵其日丙丁徵火也丙丁皆火也中央土也其帝黃帝黃帝少典之子也以土德王天下號曰軒轅氏死託祀於中央之帝其佐后土執繩而制四方其神爲鎮星其獸黃龍土色黃也其音宮其日戊己宮土戊己土也西方金也其帝少昊少昊黃帝之子青陽也以金德王號曰金天氏死託祀於西方之帝其佐蓐收執矩而治秋其神爲太白其獸白虎其音商其日庚辛商金也庚辛皆金也北方水也其帝顓頊顓頊黃帝之孫以水德王天下號曰高陽氏死託祀於北方之帝也其佐玄冥執權而治冬其神爲辰星其獸玄武其音羽其日壬癸羽水也壬癸皆水也太陰在四仲則𡻕星行三宿仲中也四中謂太陰在卯酉子午四面之中也太陰在四鉤則𡻕星行二宿丑鉤辰申鉤已寅鉤亥未鉤戌謂太陰在四角二八十六三四十二故十二𡻕而行二十八宿日月行十二分度之一𡻕行三十度十六分度之七十二𡻕而周周徧熒惑常以十月入太微受制而出行列宿司無道之國爲亂爲賊爲疾爲喪爲饑爲兵出入無常辯變其色時見時匿此皆所以譴告人君鎮星以甲寅元始建斗𡻕鎭行一宿當居而弗居其國亡土未當居而居之其國益地𡻕熟日行二十八分度之一𡻕行十三度百一十二分度之五十八𡻕而周鎮星一偏太白元始以正月甲寅與熒惑晨出東方二百四十日而入入百二十日而夕出西方二百四十日而入入三十五日而復出東方出以辰戌入以丑未當出而不出未當入而入天下偃兵當入而不入當出而不出天下興兵辰星正四時常以二月春分效奎婁以五月夏至效東井輿鬼以八月秋分效角亢以十一月冬至効斗牽牛効見出以辰戌入以丑未出二旬而入晨候之東方夕候之西方一時不出其時不和四時不出天下大飢穀不熟爲饑也何謂八風距日冬至四十五日條風至艮卦之風一名融爲笙也條風至四十五日明庶風至震卦之風也爲管也明庶風至四十五日清明風至巽卦之風也爲祝也清明風至四十五日景風至離卦之風也爲絃也景風至四十五日涼風至坤卦之風也爲塤也涼風至四十五日閶闔風至兌卦之風也爲鍾也閶闔風至四十五日不周風至乾卦之風也爲磬也不周風至四十五日廣莫風至坎卦之風也爲鼓也條風至則出輕繫去稽留立春故出輕繫明庶風至則正封疆脩田疇春分播穀故正封疆治田疇也清明風至則出幣帛使諸侯立夏長善布恩惠故幣帛聘問諸侯也景風至則爵有位賞有功夏至陰氣在下陽盛於上象陽布施故賞有功封建侯也涼風至則報地德祀四郊立秋節農乃登穀常祭故報地德祀四方神也閶闔風至則收縣垂琴瑟不張秋分殺氣國君憯愴故去鐘磬縣垂之樂也不周風至則脩宮室繕邊城立冬節土工其始故治宫室繕脩邊城備寇難也廣莫風至則閉關梁決刑罰象冬閉𡻕不通關梁也罰刑疑者於是順時而決之何謂五官東方爲田南方爲司馬西方爲理北方爲司空中央爲都田主農司馬主兵理主獄司空主土都爲四方最也何謂六府子午丑未寅申卯酉辰戌巳亥是也太微者太一之庭也太微星名也太一天神也紫宫者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也咸池星名水魚天神天阿者羣神之闕也闕猶門也四宫者所以爲司賞罰四宫紫宫軒轅咸池天阿太微者主朱鳥主猶典也紫宫執斗而左旋日行一度以周於天日冬至峻狼之山南極之山日移一度月行百八十二度八分度之五而夏至牛首之山牛首北極之山反覆三百六十五度四分度之一而成一𡻕天一元始正月建寅日月俱入營室五度天一以始建七十六𡻕日月復以正月入營室五度無餘分名曰一紀凡二十紀一千五百二十𡻕大終日月星辰復始甲寅元日行一度而𡻕有奇四分度之一故四𡻕而積千四百六十一日而復合故舍八十𡻕而復故曰子午卯酉爲二繩繩直丑寅辰巳未申戌亥爲四鉤東北爲報德之維也報復也陰氣極於北方陽氣發於東方自陰復陽故曰報德之維四角爲維也西南爲背陽之維西南已過陽將復陰故曰背陽之維東南爲常羊之維常羊不進不退之貌東南純陽用事不盛不衰常如此故曰常羊之維西北爲蹏通之維西北純陰陽氣閉結陽氣將萌𨂜始通之故曰𨂜通之維日冬至則斗北中繩陰氣極陽氣萌故曰冬至爲德德始生也日夏至則斗南中繩陽氣極陰氣萌故曰夏至爲刑刑始殺也陰氣極則下至黃泉北至北極故不可以鑿地穿井萬物閉藏蟄蟲首穴故曰德在室陽氣極則南至南極上至朱天故不可以夷邱上屋萬物蕃息五穀兆長故曰德在野日冬至則水從之日夏至則火從之故五月火正而水漏火正火王也故水滲漏一說火星正中地漏濕也十一月水正而陰勝水正水王也故陰勝也一說營室正中於南方陽氣爲火陰氣爲水水勝故夏至濕火勝故冬至燥燥故炭輕溼故炭重日冬至井水盛盆水溢羊脫毛麋角解鵲始巢八尺之脩日中而景丈三尺日夏至而流黃澤石精出流黃土之精也陰氣作於下故流澤面出也石精五色之精也蟬始鳴半夏生半夏藥草蟁蝱不食駒犢鷙鳥不搏黃口五月微陰在下未成駒犢黃口肌血跪弱未成故蟁鷙鳥應陰不食不搏也八尺之景脩徑尺五寸景脩則陰氣勝景短則陽氣勝陰氣勝則爲水陽氣勝則爲旱陰陽刑德有七舍何謂七舍室堂庭門巷術野十二月德居室三十日先日至十五日後日至十五日而徙所居各三十日德在室則刑在野德在堂則刑在術德在庭則刑在巷陰陽相德則刑德合門八月二月陰陽氣均日夜分平故曰刑德合門德南則生刑南則殺故曰二月會而萬物生八月會而草木死兩維之間九十一度也自東北至東南爲兩維匝四維三百六十五度一度者二千九百三十二里十六分度之五而升日行一度十五日爲一節以生二十四時之變斗指子則冬至音比黃鍾黃鍾十一月也鍾者聚也陽氣聚於黃泉之下也加十五日指癸則小寒音比應鍾應鍾十月也言陰應於陽轉成其功萬物應時聚藏故曰應鍾加十五日指丑則大寒音比無射無射九月也陰氣上升陽氣下降萬物隨陽而藏無有射出見也故曰無射加十五日指報德之維則越陰在地故曰距日冬至四十六日而立春陽氣凍解音比南呂南呂八月也南任也言陽氣內藏陰吕於陽任成其功故曰南呂也加十五日指寅則雨水音比夷則夷則七月也夷傷則法也言陽衰陰發萬物彫傷應法成性故曰夷則也加十五日指甲則雷驚蟄音比林鍾林鍾六月也林眾中聚也陽極陰生萬物眾聚而盛故曰林鍾加十五日指卯中繩故曰春分則雷行音比蕤賔蕤賔五月也陰氣萎蕤在下似主人陽在上似賔客故曰蕤賔也加十五日指乙則清明風至音比仲呂仲呂四月也陽在外陰在中所以呂中於陽助成功也故曰仲呂也加十五日指辰則穀雨音比姑洗姑洗三月也姑故也洗新也陽氣養生去故就新故曰姑洗也加十五日指常羊之維則春分盡故曰有四十六日而立夏大風濟濟止音比夾鍾夾鍾二月也夾夾也萬物去陰夾陽地而生故曰夾鍾也加十五日指巳則小滿小滿四月也音比太蔟太蔟正月律也蔟蔟也言陰衰陽發萬物蔟地而生故曰太蔟加十五日指丙則芒種音比大呂大呂十二月律也呂侶也萬物萌動於下未能達見故曰大呂所以配黃鐘助陽宣功也加十五日指午則陽氣極故曰有四十六日而夏至音比黃鍾加十五日指丁則小暑音比大呂加十五日指未則大暑音比太簇加十五日指背陽之維則夏分盡故曰有四十六日而立秋涼風至音比夾鍾加十五日指申則處暑音比姑洗加十五日指庚則白露降音比仲呂加十五日指酉中繩故曰秋分雷戒蟄蟲北鄉音比蕤賔加十五日指辛則寒露音比林鍾加十五日指戌則霜降音比夷則加十五日指𨂜通之維則秋分盡故曰有四十六日而立冬草木畢死音比南呂加十五日指亥則小雪音比無射加十五日指壬則大雪音比應鍾加十五日指子故曰陽生於子陰生
