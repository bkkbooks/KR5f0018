front:
  text: 民乃遷徙春木王木性墮落陽發多風而行其令故穀實解落民疾病風欬嗽上氣像春陽布散民遷徙者也行秋令則邱隰水潦稼穡不熟乃多女災邱高也隰卑也言高下皆有水潦故殺稼令不熟也陰氣遇差故多女災女災生子不育也行冬令則風寒不時鷹隼蚤摯四鄙入保冬陰蕭殺而行其令故寒風不節鷹隼蚤摯擊四界之民皆入城郭自保守也六月官少內其樹梓六月植稼成熟故官少內也梓說未聞也
  hash: sha256:892e63f23374534666b7d9f42864ef234116fd57f0d1e886d28693620eff1801
body:
  text: 孟秋之月招摇指申昏斗中旦畢中斗北方玄武之宿是日昏時中於南方畢西方白虎之宿是月平旦時中於南方也其位西方其日庚辛盛德在金少皥之神治西方也庚辛金也盛德在金金王西方也其蟲毛其音商金氣寒蠃者衣毛毛蟲虎爲之長商金也位在西方律中夷則其數九夷傷也則法也是月陽衰陰盛萬物凋傷應法成性故曰夷則也其數九五行數五金第四故曰九也其味辛其臭腥金味辛也金臭腥也其祀門祭先肝孟秋始內入由門故祀門也肝木也祭祀之用所勝也一曰肝沈金自用其藏也涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮是月鷹搏鷙殺鳥於大澤之中四面陳之世謂之祭鳥用是時乃始行殺戮刑罰順秋氣也天子衣白衣乘白駱服白玉建白旗白順金色也白馬黑毛曰駱也食麻與犬服八風水爨柘燧火西宫御女白色衣白采撞白鍾金王西故處西宫也其兵戈其畜狗朝於總章左个以出秋令總章西向堂也西方總成萬物而章明之故曰總章左个南頭室也居是室行是月之令狗金畜也求不孝不悌戮暴傲悍而罰之以助損氣損氣陰氣立秋之日天子親率三公九卿大夫以迎秋於西郊西郊七里之外郊也還乃賞軍率武人於朝軍率軍將也武勇者功名也命將率選卒厲兵簡練桀俊專任有功以征不義詰誅暴慢順彼四方順循也四方天下也命有司修法制繕囹圄禁姦塞邪審決獄平詞訟決斷也平治也天地始肅不可以贏肅殺也殺氣始行也贏盛也故曰不可也是月農始升穀天子嘗新先薦寢廟升成薦進也命百官始收歛孟秋始內也完隄防謹障塞以備水潦修城郭繕宫室是月月麗於畢俾滂沲矣故備水潦也毋以封侯立太官行重幣出大使行是月令涼風至三旬封侯列土封邑也大官九命之爵也重幣金帛之幣也大使命卿使之金氣收歛皆近不宜行也故言毋也孟秋行冬令則陰氣大勝介蟲敗穀戎兵乃來孟秋陰也復行冬水王之令故陰氣勝也其介蟲敗穀也陰氣并故戎兵來也行春令則其國乃旱陽氣復還五穀無實春陽亢燥而行其令故旱也陽氣還者此月涼風而反行温風之令故敗穀令無實也行夏令則冬多火災寒暑不節民多瘧疾夏火王而行其令故多火災寒暑相干故不節使瘧疾瘧疾寒暑所生也七月官庫其樹楝庫兵府也秋節整兵故官庫也其樹楝楝實鳳凰所食也今雒城旁有樹楝實秋熟故其樹楝也楝讀練染之練也仲秋之月招搖指酉昏牽牛中旦觜嶲中牽牛北方玄武之宿是月月昏時中於南方觜巂西方白虎之宿也是月平旦時中於南方也其位西方其日庚辛其蟲毛其音商律中南呂其數九南任也言陽氣呂旅而志助陰陰任成萬物也庚辛金日也其味辛其臭腥其祀門祭先肝涼風至候鴈來玄鳥歸羣鳥翔時候之鴈從北漠中來過周雒南至彭蠡也玄鳥歸秋分後歸蟄所也羣鳥翔寒氣至羣鳥肥盛試其羽翼而高翔翔者六翮不動也或作養養育其羽毛也天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戈其畜犬朝於總章太廟總章西向堂也太廟中央室也命有司申嚴百刑斬殺必當無或枉撓枉曲也撓弱也言平直也決獄不當反受其殃反還是月也養長老授几杖行稃鬻飲食乃命宰祝行犧牲案芻豢草養曰芻穀養曰豢案其簿書閱租之豢讀宦學之宦視肥臞全粹全無虧缺也粹毛色純也粹讀禍祟之祟察物色課比類量小大視少長莫不中度天子乃儺以御秋氣儺猶除也御止也止秋氣不使爲害也儺讀躁難之難氣或作兵也以犬嘗麻先薦寢廟是月可以築城郭建都邑國有先君之宗廟曰都無曰邑都曰城邑曰築穿竇窖修囷倉穿竇所以通水不欲地濕也穿窖可以盛穀也窖讀窖藏人物之窖也乃命有司趣民收歛畜菜多積聚勸種宿麥若或失時行罪無疑是月也雷乃始收蟄蟲培戸殺氣浸盛陽氣日衰水始涸涸凝竭涸或作盛盛言陰勝也日夜分一度量平權衡正鈞石角斗稱理關市來商旅理通也入貨財以便民事四方來集遠方皆至財物不匱上無乏用百事乃遂遂成也仲秋行春令則秋雨不降草木生榮國有大恐春陽氣而行其令故雨不降又温煦之仁故草木生榮華也氣相干必有災咎故國大惶恐行夏令則其國乃旱蟄蟲不藏五穀皆復生行炎陽之令故旱涸氣熱故蟄蟲不藏使五穀復生行冬令則風災數起收雷先行草木早死冬行寒氣激之令故有風災又冬閉藏故收雷先行草木早死也八月官尉其樹柘尉戎官也是月治兵故官尉傳曰羊舌大夫爲中軍尉柘說未聞也季秋之月招搖指戌昏虛中旦柳中虛北方玄武之宿是月昏時中於南方柳南方朱雀之宿也是月平旦中於南方也其位西方其日庚辛其蟲毛其音商律中無射陰氣上升陽氣下降萬物隨陽而藏無射出見也其數九其味辛其臭腥其祀門祭先肝侯鴈來賔雀入大水爲蛤是月時侯之鴈從北漠中來南之彭蠡蓋以爲八月者其父母也是月來者蓋其子也羽翼稚弱故在後耳賔雀者老雀也栖宿人家堂宇之間如賔客者也故謂之賔大水海水也傳曰雀入海爲蛤也菊有黃華豺乃祭獸戮禽豺似狗而長尾其色黃是月時豺殺獸四面陳之世謂之祭獸戮猶殺也天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戈其畜犬朝於總章右个西向堂北頭室故謂右个也命有司申嚴號令百官貴賤無不務入以會天地之藏無有宣出乃命冢宰農事備收舉五穀之要冢大也宰治也卿官也要簿書也藏帝籍之收於神倉天子籍田千畝故曰帝籍之收籍田所收之穀也神倉倉也是月也霜始降百工休霜降天寒朱漆難成故百工休止不復作器也乃命有司曰寒氣總至民力不堪其皆入室詩曰入此室處是也上丁入學習吹大饗帝嘗犧牲合諸侯制百縣是月上旬丁日入學官吹笙竽習禮樂饗上帝用犧牲合諸侯之制度車服之差各兩其命數也百縣畿內之縣言百舉全數耳五家爲鄰五鄰爲里四里爲酇四酇爲鄙四鄙爲縣然則縣二千五百家也爲來𡻕受朔日與諸侯所稅於民輕重之法貢𡻕之數以遠近土地所宜爲度來𡻕明年受朔日如今計吏朝賀豫明年之曆日也度者職貢多少有常也乃教於田獵以習五戎戎兵也刀劍予戟矢故曰五戎也命太僕及七騶咸駕戴荏授車以級皆正設於屏外級等也授當車者以高下各隨其等級正立設陳也天子外屏屏樹垣也爾雅曰門內之垣謂之樹垣者也司徒搢朴北嚮以贊之搢插也朴以教導也插置帶間贊相威儀也司徒主衆教導之也天子乃厲服廣飾執弓操矢以獵是月天子尚武乃服猛厲之服廣其所佩之飾以取禽也命主祠祭禽四方命教也主祠典祀之官也祭禽四方祀始設禽獸者於四方報其功不知其神所在故博求之於四方也是月草木黃落乃伐薪爲炭蟄蟲咸俛乃趨獄刑毋留有罪俛伏也青州爲伏爲俛也無留言當斷也收祿秩之不當供養之不宜者不當謂無德受祿也不宜謂不孝也一曰所養者無勳於國其先人又無賢德所不宜養故收也通路除道從境始至國而后已是月天子乃以犬嘗麻先薦寢廟孝之至也季秋行夏令則其國大水冬藏殃敗民多鼽窒季秋陰氣而行夏月霖雨之令故大水火氣故冬藏殃敗也火金相干故民鼽窒鼻不通利也鼽讀怨仇之仇也行冬令則國多盜賊邊境不寧土地分裂冬水純陰姦謀所生故多盜賊使邊境之民不安寧也則土地見侵削爲鄰國所分裂也行春令則煗風來至民氣解隋師旅並興春氣陽温故煗風至民氣解墮也木干金故師旅並興也二千五百人爲師五百人爲旅也九月官候其樹槐侯望也是月繕修守備故曰官候也槐懷也可以懷來遠人也孟冬之月招搖指亥昏危中旦七星中危北方玄武之宿也是月昏時中於南方七星南方朱鳥之宿也是月平旦時中於南方者也其位北方其日壬癸盛德在水顓頊之神治北方也壬癸水日也盛德在水王北方也其蟲介其音羽介甲也像冬閉固皮漫胡也甲蟲龜爲之長羽屬水也律中應鍾其數六陰應於陽轉成其功萬物聚成故曰應鍾其數六五行數五水第一故曰六也其味鹹其臭腐水味咸也水臭腐也其祀井祭先腎井水給人故祀也井或作行行門內地冬守在內故祀也腎水自開其藏也水始冰地始凍雉入大水爲蜃虹藏不見蜃蛤也大水淮也傳曰雉入于淮爲蜃虹陰中之陽也是月陰盛故不見也天子衣黑衣乘玄驪服玄玉建玄旗順水德也熊與虎曰旗也食黍與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石水王北方故處北宫也其兵鍛其畜彘鍛者卻內像陰閉彘水畜朝於玄堂左个以出冬令北向堂西頭室故曰左个居是室行此月令也命有司修羣禁順陰閉諸所當禁皆使有司禁也禁外徙閉門閭大搜客傳曰禁舊客爲露情也有新客搜出之爲觀釁也門城門之閭里門也嚴閉之守備也斷罰刑殺當罪諸罰刑當決也當罰正罪故殺之也阿上亂法者誅阿意曲從取容於上以亂法度也誅治也立冬之日天子親率三公九卿大夫以迎𡻕於北郊還乃賞死事存孤寡有忠節蹈義死王事者賞其子孫也幼無父曰孤無夫曰寡皆存慰矜恤之是月命太祝禱祀神位占龜策審卦兆以察吉凶於是天子始裘命百官謹蓋藏命司徒行積聚修城郭警門閭修楗閉愼管籥固封璽封門也璽印也修邊境完要塞絶蹊徑飾喪紀審棺槨衣衾之薄厚飾治也紀數也二十五月之數也棺槨衣衾薄厚各有差等故審之營邱壠之小大高庳使貴賤卑尊各有等級營度也邱壟冢也小大高下各有度量也是月也工師效功陳祭器案度呈堅致爲上案視也度法也堅致功牢也爲故也上盛也工事苦慢作爲淫巧必行其罪苦惡也慢不牢也淫巧非常之巧也故行其罪苦謂監會之監也是月也大飲蒸天子祈來年於天宗蒸冬祭也於是時大飲酒而祭求明年之福祥也凡屬天子之神日月星辰皆爲天宗也大禱祭於公社畢饗先祖禱求也公社也后土之祭也生爲上公死爲貴神故曰公也畢饗先祖先公後私之義也勞農夫以休息之命將率講武律射御角力勁律習也角平地也勁强貌也乃命水虞漁師收水泉池澤之賦虞掌水官也師長也賦稅也毋或侵牟牟多孟冬行春令則凍閉不密地氣發泄民多流亡春陽氣散越故凍閉不密地氣發泄也民多流亡像陽氣布散行夏令則多暴風方冬不寒蟄蟲復出冬當閉藏方行夏盛陽之令故多暴疾陽氣温故盛冬不寒令蟄伏之蟲復出也行秋令則雪霜不時小兵時起土地侵削秋氣干冬大寒不當雪而雪不當霜而霜故曰不時也小兵數起鄰國來伐侵削其土地十月官司馬其樹檀冬間講武故官司馬也檀陰木也仲冬之月招搖指子昏壁中旦軫中東壁北方玄武之宿是月昏時中於南方軫南方朱鳥之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中黃鍾其數六黃鍾者陽氣聚於下陰氣盛於上萬物黃萌於地中故曰黃鍾也其味鹹其臭腐其祀井祭先腎水益壯地始坼鳱鴡不鳴虎始交鳱鴡山鳥陽是月陰盛故不鳴也虎陽中之陰也陰氣盛以類發也交讀將校之校也天子衣黑衣乘鐵驪服玄玉建玄旗食黍與彘服八風水爨松燧火北宫御女黑色衣黑采擊磬石其兵鎩其畜彘朝於玄堂太廟北向堂中央室故曰太廟也命有司曰土事無作無發室居及起大眾是謂發天地之藏諸蟄則死民必疾疫有隨以喪急捕盜賊誅淫泆詐僞之人命曰畼月陰氣在上民人空間故命曰畼月命奄尹申宮令奄官也尹正也申宮令重戒敕也審門閭謹房室必重閉助陰氣也省婦事乃命大酋秫稻必齊麴糵必時酋主沽酒官也醖釀米麴使化熟故謂之酋酋讀酋豪之酋齊讀齊和之齊也作麴糵當得其時不時則不成也湛熺必潔水泉必香湛漬也熺炊必令圭潔也水泉者則酒善也湛讀審釜之審熺炊熾火之熾也陶器必良火齊必得無有差忒陶器瓦器也炊享必得其適故曰無有差忒也天子乃命有司祀四海大川名澤能興雲雨故祀之也是月也農有不收藏積聚牛馬畜獸有放失者取之不詰詰呵問也山林藪澤有能取疏食田獵禽獸者野虞教導之其有相侵奪罪之不赦大加刑也是月也日短至陰陽爭君子齋戒處必掩身欲靜去聲色禁嗜欲聲絲竹金石之聲也色美色也有貪欲濫求者禁之寧身體安形性閉情欲也是月也荔挺出芸始生邱螾結麋角解荔馬荔草也芸芸蒿菜名也邱螾蟲名也結屈結也麋角解墮皆應微陽氣也水泉動則伐樹木取竹箭罷官之無事器之無用者罷省涂闕庭門閭築囹圄所以助天地之閉仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲夏氣炎陽故其國旱也清濁相干故氛霧㝠㝠也十一月雷發聲非其時也故言乃也行秋令則其時雨水瓜瓠不成國有大兵秋金氣水之母也故雨水水金用事故有大兵也行春令則蟲螟爲敗水泉咸竭民多疾癘春陽氣蟄伏生故蟲螟敗穀水泉竭也陽干陰氣不和故多疾癘也十一月官都尉其樹棗冬成軍師故官都尉棗取其赤心也季冬之月招搖指丑昏婁中旦氐中婁西方白虎之宿是月昏時中於南方氐東方蒼龍之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中大呂呂旅也萬物萌動於黃泉未能達見所以旅旅去陰卽陽助其成功故曰大呂其數六其味鹹其臭腐其祀井祭先腎鴈北鄉鵲加巢鴈在彭蠡之水皆北嚮將至北漠中也鵲感陽而動上加巢也雉雊雞呼卵詩云雉之朝雊尚求其雌是也雞呼鳴求卵也天子衣黑衣乘鐵驪服玄玉建玄旗食麥與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鍛其畜彘朝於玄堂右个右个東頭室也命有司大儺旁磔出土牛大儺今之逐陰驅疫爲陽導也旁磔四面皆磔犬羊以禳四方之疾疫也出土牛今鄉縣出勸農耕之土牛於外是也命漁師始漁是月將捕魚故命其長也漁讀論語之語天子親往射漁先薦寢廟令民出五種令農計耦耕事修耒耜具田器耦合命樂師大合吹而罷乃命四監收秩薪以供寢廟及百祀之薪燎是月也日窮於次月窮於紀星周於天十二次窮於牽牛中也紀道窮於故宿也星周于天謂二十八舍更見南方至是月周匝也𡻕將更始令靜農民無有所使天子乃與公卿大夫飾國典論時令以待嗣𡻕之宜乃命太史次諸侯之列賦之犧牲賦布以供皇天上帝社稷之芻享乃命同姓女國供寢廟之芻豢卿士大夫至於庶民供山林名川之祀季冬行秋令則白露早降介蟲爲妖四鄙入保秋節白露故白露早降介甲之蟲爲妖災金氣爲兵故四境之民入城郭自保守也行春令則胎夭傷國多痼疾命之曰逆季冬大寒而行春温之令氣不和則胎養夭傷國多篤疾逆風氣之由也故命之曰逆故也行夏令則水潦敗國時雪不降氷凍消釋夏氣炎陽有多霖雨故水潦敗國也時雪當降而不降氷凍不當消釋而消釋皆干時之徵也十二月官獄其樹櫟十二月𡻕盡刑斷故獄官也櫟可以爲車轂木不出火唯櫟爲然亦應除氣也五位東方之極自碣石山過朝鮮貫大人之國碣石在遼西界海水西畔朝鮮樂浪之縣也貫通也大人國在其東也東至日出之次扶榑木之地青土樹木之野榑木榑桑太皡句芒之所司者萬二千里太皡庖犧氏東方木德之帝也句芒木神司主也其令曰挺羣禁開閉闔通窮窒達障塞行優游棄怨惡解役罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛强剛强侵陵人不循軌度者禁止之也南方之極自北戸孫之外北戸孫國名也日在其北皆爲北向戸以日故北戸貫顓頊之國南至委火炎風之野赤帝祝融之所司者萬二千里赤帝炎帝少典之子號爲神農南方火德之帝也祝融顓頊之孫老童之子吳回也一名黎爲高辛氏火正號爲祝融死爲火神也其令曰爵有德賞有功惠賢良救饑渴舉力農賑貧窮惠孤寡憂罷疾出大祿行大賞起毀宗立無後封建侯立賢輔應陽施也中央之極自崑崙東絶兩桓山自從也絶猶過也恒山常也言兩未聞也日月之所道江漢之所出日月照其所經過之道江出岷山漢出番冢山眾民之野五穀之所宜龍門河濟相貫以息壤堙洪水之州東至於碣石黃帝后土之所司者萬二千里黃帝少典之子以土德正天下號爲軒轅氏死爲中央土德之帝后土者勾龍氏之子名曰后土能平九土死祀爲土神也其令曰平而不阿明而不苛包裹覆露露潤無不囊懷溥汜無私正靜以和行稃鬻養老衰弔死問疾以送萬物之歸土四方之主也故曰萬物之所歸也西方之極自崑崙絶流沙沈羽西至三危之國流沙蓋在崑崙之西南耳石城金室飲氣之民不死之野少皡蓐收之所司者萬二千里少皡黃帝之子青陽也名摯以金德王天下號爲金天氏死爲西方金德之帝也蓐收金天氏之裔子曰修禮死爲金神也其令曰審用法誅必辜備盜賊禁姦邪飾羣牧謹著聚修城郭補決竇塞蹊徑遏溝瀆止流水雝谿谷守門閭陳兵甲選百官誅不法應金斷也北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤羣水之野顓頊玄冥之所司者萬二千里顓頊黃帝之孫也以水德王天下號高陽氏死爲北方水德之帝也其神玄冥者金天氏有適子曰昧爲玄瞑師死而祀爲主水之神也其令曰申羣禁固閉藏脩障塞繕關梁禁外徙斷罰刑殺當罪閉關閭大搜客止交游禁夜樂蚤閉晏開以塞姦人己德執之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋罪應陰殺也六合孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合孟夏與孟冬爲合仲夏與仲冬爲合季夏與季冬爲合孟春始贏孟秋始縮贏長也縮短也仲春始出仲秋始內出二月播種內八月收歛季春大出季秋大內孟夏始緩孟冬始急緩四月陽安急十月寒肅仲夏至脩仲冬至短夏至北極冬至南極短脩皆在至前也季夏德畢季冬刑畢德畢陽施結刑畢刑獄盡故正月失政七月涼風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其鄉六月失政十二月草木不脫不脫葉槁著樹不零落也七月失政正月大寒不解東風不解凍也八月失政二月雷不發不發聲也九月失政三月春風不濟濟止十月失政四月草木不實實長十一月失政五月下雹霜十二月失政六月五穀疾狂疾狂不華而實也春行夏令泄象盛陽發泄也行秋令水水生於中申故水也行冬令肅象氣肅急夏行春令風象春木氣多也行秋令蕪象秋氣蕪穢生行冬令格格歧也象冬斷刑恩澤致格不流下秋行夏令華象夏氣樹華茂行春令榮象春氣生榮華行冬令耗耗零落也冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣陰故亂霧製度陰陽大制有六度天爲繩地爲準春爲規夏爲衡秋爲矩冬爲權繩者所以繩萬物也繩正準者所以準萬物也規者所以貟萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也繩之爲度也直而不爭修而不窮久而不弊遠而不忘與天合德與神合明所欲則得所惡則亡自古及今不可移匡厥德孔密廣大以容眾是故上帝以爲物宗宗本準之爲度也平而不險均而不阿廣大以容寬裕以和柔而不剛銳而不挫銳利也挫折也流而不滯流行也滯止也易而不穢發通而有紀紀道周密而不泄準平而不失萬物皆平民無險謀怨惡不生是故上帝以爲物平平正讀評議之平也規之爲度也轉而不復貟而不垸復遏也垸轉也優而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起優簡寬舒之貌規度不失生氣乃理氣類理達衡之爲度也緩而不後平而不怨施而不德弔而不責常平民祿以繼不足勃勃陽陽唯德是行養長化育萬物蕃昌以成五穀以實封疆其政不失天地乃明明理矩之爲度也肅而不悖剛而不憒取而無怨內而無害威厲而不懾令行而不廢殺伐旣得仇敵乃克矩正不失百誅乃服權之爲度也急而不贏殺而不割充滿以實周密而不泄敗物而弗取罪殺而不赦誠信以必堅慤以固冀除苛慝不可以曲故冬正將行必弱以强必柔以剛權正而不失萬物乃藏明堂之制靜而法準動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥溼寒暑以節至甘雨膏露以時降
