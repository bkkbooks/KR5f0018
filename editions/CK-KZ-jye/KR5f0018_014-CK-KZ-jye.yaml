body:
  text: 人主之術處無爲之事而行不言之教教令也謂不言而事辦也清靜而不動一度而不搖因循而任下責成而不勞成辦而不自勞是故心知規而師傅諭導規謀也師者所從取法則也傅相也諭導以正道也口能言而行人稱辭足能行而相者先導相儀耳能聽而執正進諫諫或作謀也其世子時也是故慮無失策謀無過事過猶誤也言爲文章行爲儀表於天下爲天下人所法則也進退應時動靜循理不爲醜美好憎不爲賞罰喜怒名各自名類各自類事猶自然莫出於己故古之王者冕而前旒所以蔽明也冕王者冠也前旒前後垂珠飾遂筵也下自目故曰蔽明也天子玉縣十二公侯挂珠九卿點珠六伯子各應隨其命數也黈纊塞耳所以掩聰不欲其妄聞也黈讀而買黈益之黈也天子外屏所以自障屏樹垣也爾雅曰門內之垣謂之樹論語曰國君樹塞門諸侯在內天子在外故曰所以自障也故所理者遠則所在者邇所治者大則所守者少夫目妄視則淫耳妄聽則惑口妄言則亂夫三關者不可不愼守也若欲規之乃是離之言嗜欲有所規合乃是離散也若欲飾之乃是賊之飾好也賊敗也天氣爲魂地氣爲魄反之玄房各處其宅守而勿失上通太一太一之精通於天道天道玄默無容無則大不可極深不可測測盡尚與人化知不能得天道至大非人智慮所能得也昔者神農之治天下也神不馳於胷中言釋神安靜不躁動也智不出於四域信身在中懷其仁成之心懷思甘雨時降五穀蕃植蕃茂植長春生夏長秋收冬藏月省時考茂成𡻕終獻功以時嘗穀嘗之新穀薦之明堂祀於明堂明堂之制有蓋而無四方風雨不能襲寒暑不能傷遷延而入之養民以公遷延猶倘佯也已說在本經也其民樸重端慤端直也慤成也不忿爭而財足不勞形而功成因天地之資而與之和同是故威厲而不殺刑錯而不用法省而不煩省約也煩多也故其化如神其地南至交阯北至幽都幽冥之都東至暘谷日所出也西至三危三危西極之山莫不聽從當此之時法寬刑緩囹圄空虛而天下一俗一同其俗莫懷姦心末世之政則不然上好取而無量下貪狼而無讓民貧苦而忿爭事力勞而無功智詐萌興盜賊滋彰上下相怨號令不行執政有司不務反道矯拂其本而事修其末事治削薄其德曾累其刑而欲以爲治無以異於執彈而來鳥𢮅梲而狎犬也亂乃逾甚逾益夫水濁則魚噞魚短氣出口於水喘息之諭也政苛則民亂言無聊也故夫養虎豹犀象者爲之圈檻供其嗜欲適其饑飽違其怒恚然而不能終其天年者刑有所劫也是以上多故則下多詐故巧上多事則下多態上煩擾則下不定不定不知所從上多求則下交爭不直之於本而事之於末譬猶揚堁而弭塵抱薪以救火也堁塵麽也楚人謂之堁堁動塵之貌弭止也故聖人事省而易治求寡而易贍瞻給不施而仁不言而信不求而得不爲而成塊然保眞抱德推誠誠實天下從之如響之應聲景之像形其所修者本也詹何曰未聞身治而國亂故曰其所修者本也刑罰不足以移風殺戮不足以禁姦唯神化爲貴至精爲神夫疾呼不過聞百步志之所在踰於千里踰猶通也冬日之陽夏之陰萬物歸之而莫使之然冬日人物歸陽夏日猛物歸陰莫使之自然如是也故至精之像弗招而自來不麾而自往窈窈冥冥不知爲之者誰而功自成智者弗能誦辯者弗能形昔孫叔敖恬臥而郢人無所害其鋒郢楚國都也孫叔敖楚大夫也蓋乘馬三年不知其牝牡言其賢也但恬臥養德折衝千里之外敵國不敢犯害故郢人不舉兵出伐無所害其鋒於四方也市南宜遼弄丸而兩家之難無所關其辭宜遼姓也名熊勇士居楚市南楚平王太子建爲費無極所逐奔鄭鄭人殺之其子勝在吳令尹子西召之以爲白公請伐鄭以報讎子西許之而未出師晉人伐鄭以報讎子西救之勝怒曰鄭人在此讎不遠矣欲殺子西其臣石乞曰市南熊宜遼得之可以當五百人乃往視之告其故不從舉之以劍而不動而弄丸不輟心志不懼曰不能從子爲亂亦不泄子之事曰公遂殺子西兩雖有難不怨宜遼故曰無所關其辭也鞅鞈鐵鎧瞋目扼𢮝其於以御兵刃縣矣縣遠也比於德不及之遠券契束帛刑罰斧鉞其於以解難薄矣薄於德也待目而照見待言而使令其於爲治難矣蘧伯玉爲相子貢往觀之曰何以治國曰以弗治治之蘧伯玉衛大夫蘧瑗也子貢衛人也姓端木名賜孔子弟子也簡子欲伐衛使是史黯往覿焉簡子晉卿趙氏也史黯史墨也覿觀之也還報曰蘧伯玉爲相未可以加兵以其賢也固塞險阻何足以致之致猶勝也故臯陶瘖而爲大理天下無虐刑有貴於言者也雖瘖平獄理訟能得人之情故貴於多言者也師曠瞽而爲太宰晉無亂政有貴於見者雖盲而大治晉國使無有亂政故貴於有所見故不言之令不視之見不言之令臯陶瘖也不視之見師曠瞽也此伏犧神農之所以爲師也以用師法故民之化也不從其所言而從所行從其志意之所行故齊莊公好勇不使鬪爭而國家多難其漸至於崔杼之亂莊公齊靈公之子光崔杼齊大夫也亂殺莊公也傾襄好色不使風議而民多昏亂其積至昭奇之難楚傾襄王昭奇楚大夫也故至精之所動若春氣之生秋氣之殺也雖馳傳騖置不若此其亟亟疾故君人者其猶射者乎於此毫末於彼尋常矣故愼所以感之也夫榮啟期一彈而孔子三日樂感於和鄒忌一徽而威王終夕悲感於憂徽騖彈也威王齊宣王之父也在春秋後徽讀紛麻縗車之縗也動諸琴瑟形諸音聲而能使人爲之哀樂哀威王也樂孔子也縣法設賞而不能移風易俗者其誠心弗施也甯戚商歌車下桓公喟然而寤矣至精入人深矣故曰樂聽其音則知其俗見其俗則知其化孔子學鼓琴於師襄師襄魯樂大師也而諭文王之志見微以知明矣諭教教之鼓文王操也延陵季子聽魯樂而知殷夏之風論近以識遠也作之上古施及千𡻕而文不滅況於並世化民乎湯之時七年旱以身禱於桑林之際而四海之雲凑凑會也或作蒸蒸升也千里之雨至抱質效誠感動天地神諭方外令行禁止豈足爲哉古聖王至精形於內而好憎忘於外形見好憎情欲已充出言以嗣情發號以明旨陳之以禮樂風之以歌謠業貫萬世而不壅貫通壅塞橫局四方而不窮禽獸昆蟲與之陶化化從昆蟲或作鬼神又況於執法施令乎故太上神化其次使不得爲非其次賞賢而罰暴暴虐亂也衡之於左右無私輕重故可以爲平衡銓衡也繩之於內外無私曲直故可以爲正人主之於用法無私好憎故可以爲命夫權輕重不差蟁首蟁首猶微細也扶撥枉橈不失針鋒直施矯邪不私辟險姦不能枉讒不能亂德無所立立見怨無所藏是任術而釋人心者也故爲治者不與焉治在道不在智故曰不與焉夫舟浮於水車轉於陸此勢之自然也木擊折轊水戾破舟不怨木石而罪巧拙者罪御者刺舟者之巧拙也知故不載焉言木石無巧詐故不怨也是故道有智則惑言道智則惑也德有心則險心有目則眩眩於物也兵莫憯於志而莫邪爲下寇莫大於陰陽而抱鼓爲小小細憯猶利也以志意精誠伐人爲利老子曰重積德則無不尅故以莫邪爲下也寇亦兵也推陰陽虛實之道爲大故以抱鼓爲小也今夫權衡規矩一定而不易不爲秦楚變節不爲胡越改容常一而不邪方行而不流一日刑之萬世傳之而以無爲爲之言無所爲爲之爲自爲之故國有亡主而世無廢道亡主桀紂是也湯武以其民主故曰無廢道也人有困窮而理無不通理道由此觀之無爲者道之宗宗本故得道之宗應物無窮任人之才難以至治才智湯武聖主也而不能與越人乘幹舟而浮於江湖幹舟小船也危險越人習水自能乘之故湯武不能也一曰大舟也伊尹賢相也而不能與胡人騎騵馬而服騊駼黃馬白腹曰騵詩曰四騵彭祖騊駼野馬也胡人所習伊尹雖賢不能與服也孔墨博通而不能山居者入榛薄險阻也孔孔子也墨墨翟也聚木爲榛深草爲薄山居者所習故孔墨不能也阻或作塗也由此觀之則人知之於物也淺矣而欲以徧照海內存萬方不因道之數而專己之能則其窮不達矣故智不足以治天下也桀之力別觡伸鉤索鐵歙金推移大犧水殺黿鼉陸捕熊羆觡角也索絞也歙讀協然湯革車三百乘困之鳴條擒之焦門焦或作巢由此觀之勇力不足以持天下矣智不足以爲治勇不足以爲强則人材不足任明也而君人者不下廟堂之上而知四海之外者因物以識物因人以知人也故積力之所舉則無不勝也衆智之所爲則無不成也埳井之無黿鼉隘也園中無脩木小也夫舉重鼎者力少而不能勝也及至其移徙之不待其多力者故千人之羣無絶梁萬人之聚無廢功夫華騮緑耳一日而至千里然其使之搏兔不如豺狼伎能殊也殊異鴟夜撮蚤蚊察分秋毫晝日顛越不能見邱山形性詭也鴟鴟鵂也謂之老菟夜鳴人屋上也夜則目明合聚人爪以著其巢中故曰察分秋毫晝則無所見故曰情性詭也夫螣蛇游霧而動應龍乘雲而舉猨得木而捷魚得水而鶩鶩疾故古之爲車也漆者不畫鑿者不斵工無二伎士不兼官各守其職不得相姦姦亂人得其宜物得其安是以器械不苦而職事不嫚苦讀監嫚捕器嫚讀慢緩之慢夫責少者易償職寡者易守寡少任輕者易權權謀上操約省之分下效易爲之功是以君臣彌久而不相厭厭欺君人之道其猶零星之尸也尸祭主也尸食飽以知神之食亦飽詩曰公尸宴飲在宗載考儼然玄默而吉祥受福尸不言語故曰玄默是故得道者不爲醜飾不爲僞善不飾爲美亦不極爲善也一人被之而不褒褒大萬人蒙之而不褊蒙冒也褊小也是故重爲惠若重爲暴則治道通矣通猶順也爲惠者而布施也無功而厚賞無勞而高爵則守職者懈於官而游居者亟於進矣爲暴者妄誅也無罪者而死亡行直而被刑則修身者不勸善而爲邪者輕犯上矣言不可不愼也故爲惠者生姦而爲暴者生亂姦亂之俗亡國之風風化是故明主之治國有誅者而主無怒焉因法而行故不怒也朝有賞者而君無與焉因功而行故不與也誅者不怨君罪之所當也賞者不德上功之所致也民知誅賞之來皆在於身也故務功修業不受贛於君贛物是故朝廷蕪而無迹田野辟而無草故太上下知有之言太上之世下知之人皆能有此術令夫橋直植立而不動俛仰取制焉橋桔臯上衡也植柱權衡者行之俛仰取制於柱也以諭君人主靜漠而不躁躁動百官得修焉譬而軍之持麾者妄指則亂矣慧不足以大甯智不足以安危與其譽堯而毁桀也不如掩聰明而反修其道也不足以大甯者小惠也不足以安危者小智也如此人者欲譽堯而毁桀以成善善惡惡之名人猶有强知之人耳不如掩聰明而本脩大道成名之速也人君之道亦如此也清靜無爲則天與之時廉儉守節則地生之財人君德行如此故天與之時地生之財天與之時湯武是也地生之財神農后稷也處愚稱德則聖人之爲謀若伊尹爲湯謀傳說爲高宗謀是孟子曰伊尹之任國語曰武丁以像旁求聖人得傅說於傅巖也是故下者萬物歸之虛者天下遺之遺與夫人主之聽治也清明而不暗虛心而弱志是故羣臣輻凑並進無愚智賢不肖莫不盡其能於是乃始陳其禮建以爲基建立也基業也是乘眾勢以爲車御眾智以爲馬雖幽野險塗則無由惑矣幽深也險猶遠也人主深居隱處以避燥溼閨門重襲以避姦賊內不知閭里之情外不知山澤之形惟幕之外目不能見十里之前耳不能聞百步之外天下之物無不通者通知其灌輸之者大而斟酌之者眾也是故不出戸而知天下不窺牖而知天道乘眾人之智則天下之不足有也專用其心則獨身不能保也保猶守也是故人主覆之以德不行其智而因萬人之所利夫舉踵天下而得所利故百姓之上弗重也錯之前而弗害也舉之而弗高也推之而弗厭尊重舉之不自覺高也推求也奉也主道員者運轉而無端端涯化育如神虛無因循常後而不先也臣道員者運轉而無方者論是而處當爲事先倡守職分明以立成功也是故君臣異道則治不易奪言相和同道則亂君所謂可臣亦曰可君所謂否臣亦曰否是同也莫相臣匡弼故曰亂也各得其宜處其當則上下有以相使也君得君道臣得臣道故曰得其宜也夫人主之聽治也虚心而弱意清明而不闇是故羣臣輻凑並進無愚智賢不肖莫不盡其能者則君得所以制臣臣得所以事君治國之道明矣文王智而好問故聖好問欲與人同其功武王勇而好問故勝勝殷夫乘眾人之智則無不任也用眾人之力則無不勝也千鈞之重烏獲不能舉也千鈞三萬斤也烏獲秦武王之力士也武王試其力使舉大鼎腕脫而不任故曰不能舉也眾人相一則百人有餘力矣是故任一人之力者則烏獲不足恃不能勝故不恃也乘眾人之制者則天下不足有也人眾力强以天下爲小故曰不足有也禹決江疏河以爲天下興利而不能使水西流稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也夫推而不可爲之勢而不修道理之數推行雖神聖人不能以成其功而況當世之主乎夫載重而馬羸雖造父不能以致遠造父周穆王之善御臣也車輕馬良雖中工可使追速是故聖人舉事也豈能拂道理之數詭自然之性拂戾也詭違也以曲爲直以屈爲伸哉未嘗不因其資而用之也資是以積力之所舉無不勝也而眾智之所爲無不成也聾者可令嗺䈥而不可使有聞也瘖者可使守圉而不可使言也形有所不周而能有所不容也是故有一形者處一位有一能者服一事力勝其任則舉之者不重也能稱其事則爲之者不難也毋小大脩短各得其宜則天下一齊無以相過也聖人兼而用之故無棄才人主貴正而尚忠忠正在上位執正營事營典則讒佞姦邪無由進矣譬猶方員之不相蓋而曲直之不相入入中夫鳥獸之不可同羣者其類異也虎鹿之不同游者力不敵也是故聖人得志而在上位讒佞姦邪而欲犯主者譬猶雀之見鸇而鼠之遇狸也亦必無餘命矣是故人主之一舉也不可不愼也所任者得其人則國家治上下和羣臣親百姓附附從所任非其人則國家危上下乖羣臣怨百姓亂故一舉而不當終身傷傷病也亦敗也得失之道權要在主是故繩正於上木直於下非有事焉事治也非治之使宜所緣以修者然也故人主誠正則直士任事而姦人伏匿矣人主不正則邪人得志忠者隱蔽矣夫人之所以莫㧓玉石而㧓瓜瓠者何也玉石堅㧓不能入故不㧓無得於玉石弗犯也使人主執正持平如從繩準高下則羣臣以邪來者猶以卵投石以火投水故靈王好細腰而民有殺食自飢也靈王蓋楚靈王殺食省食越王好勇而民皆處危爭死越王勾踐由此觀之權勢之柄其以移風易俗矣堯爲匹夫不能仁化一里桀在上位令行禁止由此觀之賢不足以爲治而勢可以易俗明矣書曰一人有慶萬民賴之此之謂也天下多眩於名聲而寡察其實寡少也察明也實眞僞之實是故處人以譽尊處人隱居也以名譽見尊也而游者以辯顯游行之人以辯辭自顯達察其所尊顯無他故焉人主不明分數利害之地而賢眾口之辯也治國則不然然如是也言事者必究於法而爲行者必治於官上操其名以責其實臣守其業業事以效其功效致言不得過其實行不得踰其法羣臣輻凑莫敢專君專制事不在法律中而可以便國佐治必參五行之陰考以觀其歸並用周聽以察其化不偏一曲不黨一事是以中立而徧運照海內中正羣臣公正莫敢爲邪公方正直百官述職務致其公迹也主精明於上官勸力於下姦邪滅迹庶功日進庶眾是以勇者盡於軍盡力於軍功也亂國則不然有眾咸譽者無功而賞守職者無罪而誅主上聞而不明羣臣黨而不忠說談者游於辯修行者競於往往自益也主上出令則非之以與法令所禁則犯之邪以黨與非謗上令自邪姦也爲智者務爲巧詐爲勇者務於鬪爭大臣專權下吏持勢朋黨周比以弄其上國雖若存古之人曰亡矣且夫不治官職而被甲兵不隨南畝而有賢聖之聲者非所以都於國也騏驥騄駬天下之疾馬也驅之不前引之不止雖愚者不加體焉加猶止也今治亂之機轍迹可見也而世主莫之能察此治道之所以塞塞猶閉也權勢者人主之車輿爵祿者人臣之轡銜也是故人主處權勢之要而持爵祿之柄審緩急之度而適取予之節是以天下盡力而不倦夫臣主之相與也非有父子之厚骨肉之親也而竭力殊死不辭其軀者何也勢有使之然也昔者豫讓中行文子之臣文子晉大夫中行穆子之子荀寅也智伯伐中行氏并吞其地豫讓背其主而臣智伯智伯與趙襄子戰於晉陽之下身死爲戮國分爲三韓魏趙三分有之此之福也豫讓欲報趙襄子欲爲智伯報讎殺趙襄子漆身爲厲吞炭變音擿齒易貌夫以一人之心而事兩主或背而去或欲身徇之豈其趨捨厚薄之勢異哉人之恩澤使之然也紂兼天下朝諸侯人迹所及舟檝所通莫不賓服然而武王甲卒三千人擒之於牧野豈周民死節而殷民背叛哉其主之德義厚而號令行也夫疾風而波興木茂而鳥集相生之氣也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣是故君不能賞無功之臣臣亦不能死無德之君君德不下流於民而欲用之如鞭蹏馬矣是猶不待雨而求熟稼必不可之數也數術
