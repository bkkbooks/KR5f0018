seq: 21
front:
  text: 囊也蓋步蓋也蘇秦相趙趙封之爲武安君初帶籯囊襜步蓋厯說萬乘之君合東山之從利病之勢無所不下使諸侯服從無有不服諾者故曰服諾諸侯不自免於車裂之患說在詮言之篇
  hash: sha256:d98950fd966105a96150a9741715f29421ec3d82f0efe5fc4868333c13e020fa
body:
  text: 徐偃王被服慈惠身行仁義陸地之朝者三十二國然而身死國亡子孫無類偃王於衰亂之世修行仁義不設武備楚王滅之故身死國亡也七諫篇曰荆文誤而徐亡是也大夫種輔翼越王句踐而爲之報怨雪恥擒夫差之身開地數千里然而身伏屬鏤而死句踐奮計報怨於吳王夫差獲千里之地而越王終已疑之賜其屬鏤以死也屬鏤利劍也一曰長劍摽施鹿盧鋒曳地屬錄而行之也此皆達於治亂之機機要也而未知全性之具者故萇弘知天道而不知人事蘇秦知權謀而不知禍福徐偃王知仁義而不知時大夫種知忠而不知謀不自知爲身謀聖人則不然論世而爲之事權事而爲之謀是以舒之天下而不窕內之尋常而不塞不窕在大能大也八尺曰尋倍尋曰常在小能小不塞急也使天下荒亂禮義絶綱紀廢彊弱相乘力征相攘臣主無差貴賤無序甲胃生蟣虱乘加也攘平除生蟣虱不離體也燕雀處帷幄幄幕也處猶巢也而兵不休息而乃始服屬臾之貌謹也恭儉之禮則必滅抑而不能興矣天下安甯政教和平百姓肅睦上下相親而乃始立氣矜矜自大也奮勇力則必不免於有司之法矣是故聖人者能陰能陽能弱能彊隨時而動靜因資而立功物動而知其反事萌而察其變化則爲之象運則爲之應是以終身行而無所困故事有可行而不可言者有可戰而不可行者有易爲而難成者有難成而易敗者所謂可行而不可言者趨舍也可言而不可行者僞詐也易爲而難成者事也難成而易敗者名也此四策者聖人之所獨見而留意也誳寸而伸尺聖人爲之寸小尺大小枉而大直君子行之枉曲也直直其道也周公有殺弟之累誅管蔡也齋桓有爭國之名自莒先入殺子糺也然而周公以義補缺謂翼成王以致太平七年歸政北面爲臣故曰以義補缺也桓公以功滅醜立九合一匡之功以滅爭國之惡而皆爲賢今以人之小過揜其大美則天下無聖王賢相矣故目中有疵不害於視不可灼也疵贅灼燃喉中有病無害於息不可鑿也鑿穿河上之邱冢不可勝數猶之爲易也言河上本非邱壟之處有易之地猶多以大言之也以諭萬事多覆於少水激興波高下相臨差以尋常猶之爲平雖有激波猶以爲平平者多也猶橘柚冬生人曰冬死者衆也薺麥夏死人曰夏生者多也昔者曹子爲魯將兵三戰不勝亡地千里使曹子計不顧後足不旋踵刎剄於陳中則終身破軍擒將矣然而曹子不羞其敗恥死而無功柯之盟榆三尺之刃造桓公之胷三戰所亡一朝而反之勇聞於天下功立於魯國復汶陽之田也管仲輔公子糾而不能遂遂成也不可謂智遁逃奔走不死其難不死子糾之難也不可謂勇束縛桎梏不諱其恥不可謂貞當此三行者布衣弗友人君弗臣布衣之士不以爲益友也人君不以爲義臣也然而管仲免於累紲之中立齊國之政九合諸侯一匡天下使管仲出死損軀不顧後圖豈有此霸功哉今人君論其臣也不計其大功總其略行而求小善則失賢之數也略大也小善忠也數術也故人有厚德無問其小節而有大譽無疵其小故夫牛蹏之涔不能生鱣鮪涔雨水也滿牛蹏迹中言其小也故不能生鱣鮪也鱣大魚長丈餘細鱗黃首白身短頭口在腹下鮪大魚亦長丈餘仲春二月從河西上得過龍門便爲龍先師說云也而蜂房不容鵠卵房巢小形不足以包大體也夫人之情莫不有所短誠其大略是也雖有小過不足以爲累誠其實略其行若其大略非也雖有閭里之行未足大舉舉用夫顏喙聚梁父之大盜也梁父齊邑今屬太山而爲齊忠臣段干木晉國之大駔也而爲文侯師駔驕怚一曰駔市儈也言魏國之大儈也孟卯妻其嫂有五子焉然而相魏甯其危解其患孟卯齊人也及爲魏能安其危國類其勳也戰國策曰芒卯也景陽淫酒被髮而御於婦人威服諸侯景陽楚將此四人者皆有所短然而功名不滅者其略得也略猶道也季襄陳仲子立節抗行不入洿君之朝不食亂世之食遂餓而死季襄魯人孔子弟子陳仲子齊人孟子弟子居於陵也不能存亡接絶者何小節伸而大略屈伸用屈廢故小謹者無成功訾行者不容於眾好揜人之善揚人之短訾毀人行自獨卑藏眾人所疾而不容之也一說訾毀也行有毀缺者不爲眾人所容體大者節疏蹠距者舉遠疏長也蹠足也距大也自古及今五帝三王未有能全其行者也故易曰小過亨利貞言人莫不有過而不欲其大也夫堯舜湯武世主之隆也隆盛齊桓晉文五霸之豪英也然堯有不慈之名謂天下不以予子丹朱也舜有卑父之謗謂瞽叟降在庶人也湯武有放弑之事殷湯放桀南巢周武弑紂宣室也五伯有暴亂之謀齊桓晉文宋襄楚莊秦穆德末能純皆有爭奪之驗故曰有暴亂之謀也是故君子不責備於一人方正而不以割廉直而不以切博通而不以訾文武而不以責文武以備具而不責備於人求於一人則任以人力任其力所能任也自脩則以道德責人以人力易償也自脩以道德難爲也難爲則行高矣易償則求贍矣夫夏后氏之璜不能無考半圭曰章夏后氏之珍玉也考瑕釁也明月之珠不能無纇夜光之珠有似月光故曰明月纇磐若絲之結纇也然而天下寶之者何也其小惡不足妨大美也今志人之所短而志人之所脩而求得其賢乎天下則難矣夫百里奚之飯牛伊尹之負鼎伊尹負鼎俎調五味以干湯卒爲賢相太公之鼓刀太公河內汲人有屠鉤之困卒爲文王佐翼武王伐紂也甯戚之商歌甯戚衛人也商旅於齊宿郭門外疾世商歌以干桓公夜出迎客聞之舉以爲大田其歌曲在道應說也其美有存焉者矣眾人見其位之卑賤事之洿辱而不知其大略以爲不肖及其爲天子三公而立爲諸侯賢相乃始信於異眾也信知夫發於鼎俎之間伊尹出於屠酤之肆肆列也謂太公呂尚也解於累紲之中累紲所以束縛人謂管仲興於牛頷之下興起也謂百里奚也頷讀合索之合洗之以湯沐祓之以爟火立之於本朝之上倚之於三公之位爟火取火於日之官也周禮司爟掌行火之正令火所以祓除祥也立置也本朝國朝也內不慙於國家外不愧於諸侯符勢有以內合內合於君故未有功而知其賢者堯之知舜功成事立而知其賢者市人之知舜也爲是釋度數而求之於朝肆草莽之中其失人也必多矣爲上自任耳目聰明以得賢人之故不復用度量之術取人而亟求賢於朝肆之列草莽之中失賢人必多矣何言求賢何則能效其求而不知其所以取人也夫物之相類者世主之所亂惑也嫌疑肖象者眾人之所眩耀牀似象也嫌疑謂白骨之肖象牙也碧盧似玉蛇牀似麋蕪也故狠者類知而非知狠者自用像有知非眞知愚者類仁而非仁愚者不能斷割有似於仁非眞仁也戇者類勇而非勇戇者不知畏危難有似於勇非眞勇使人之相去也若玉之與石美之與惡則論人易矣夫亂人者芎藭之與藁本也蛇牀之與麋蕪也此皆相似言其相類但其芳臭不同猶小人類君子但其仁與不仁異也故劍工或劍之似莫邪者唯歐冶能名其種歐冶良工玉工眩玉之似碧盧者惟猗頓不失其情碧盧或云碔砆猗頓魯之富人能知玉理不失其情也闇主亂於姦臣小人之疑君子者唯聖人能見微以知明故蛇舉首尺而脩短可知也象見其牙而大小可論也薜燭庸子見若狐甲於劍而利鈍識矣薜齊邑也燭庸氏子通利劍臾兒易牙淄澠之水合者嘗一哈水而甘苦知矣臾兒易牙皆齊之知味者也哈口也故聖人之論賢也見其一行而賢不肖分矣孔子辭廪邱中不盜刀鉤禀邱齊邑今屬濟陰齊景公養孔子以言未見從道未得行不欲虛祿辭而不受故不復利人刀鉤也許由讓天子終不利封侯許由隱者陽成人堯欲以天下與之洗耳而不就故曰不利於封侯也故未嘗灼而不敢握火者見其有所燒也未嘗傷而不敢握刃者見其有所害也由此觀之見者可以論未發也而觀小節足以知大體矣故論人之道貴則觀其所舉富則觀其所施窮則觀其所不受賤則觀其所不爲貧則觀其所不取視其更難以知其勇動以喜樂以觀其守委以財貨以論其人振以恐懼以知其節則人情備矣古之善賞者費少而勸眾趙襄子行之是善罰者刑省而姦禁齊威王行之是也善予者用約而爲德秦穆公行之是善取者入多而無怨齊桓公行之也趙襄子圍於晉陽罷圍而賞有功者五人高赫爲賞首左右曰晉陽之難赫無大功今爲賞首何也智伯求地於趙襄子不與智伯率韓魏以圍之三月不尅趙氏之臣張孟談潛與韓魏通謀反智伯而殺之張孟談之力也故曰高赫無大功也襄子曰晉陽之園寡人社稷危國家殆羣臣無不有驕侮之心唯赫不失君臣之禮故賞一人而天下爲忠之臣者莫不終忠於其君此賞少而勸善者眾也齊威王設大鼎於庭中而數無鹽令曰子之譽日聞吾耳察子之事田野蕪倉廪虛囹圄實子以姦事我者也乃烹之齊以此三十二𡻕道路不拾遣此刑省姦禁者也秦穆公出遊而車敗右服失馬服中失馬野人得之穆公追而及之岐山之陽野人方屠而食之穆公曰夫食駿馬之肉而不還飲酒者傷人吾恐其傷汝等徧飲而去之處一年與晉惠公爲韓之戰處一年者謂飲食肉人酒之明年也晉惠公夷吾倍秦納己之賂秦興兵伐晉戰於晉地韓原也晉師圍穆公之車梁由靡扣穆公之驂獲之梁由靡晉大夫扣猶牽也將獲穆公食馬肉者三百餘人皆出死爲穆公戰於車下遂克晉虜惠公以歸此用約而爲得者也齊桓公將欲征伐甲兵不足令有重罪者出犀甲一戟犀甲取其堅也戟車戟也長丈六尺犀或作三直出三甲也有輕罪贖以金分輕小以金分出金隨罪輕重有分兩訟而不勝者出一束箭不勝猶不直也箭十二爲束也百姓皆說乃矯箭爲矢治箭之笄好者也鑄金而爲刃刃五刃也刀劍矛戟矢也以伐不義而征無道遂霸天下此入多而無怨者也故聖人因民之所喜而勸善因民之所惡以禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費賞當賞不虛費至刑不濫刑當刑不傷善濫讀收歛之歛也孔子誅少正卯而魯國之邪塞少正官卯其名也魯之諂人孔子相魯七日誅之於東觀之下刑不濫也子產誅鄧析而鄭國之姦禁鄧析詭辯姦人之雄也子產誅之故姦止也傳曰鄭駟遄殺鄧析而用其竹刑鄧析制刑書之於竹鄭國用不以人廢言也以近諭遠以小知大也故聖人守約而治廣者此之謂天下莫易於爲善而莫難於爲不善也爲善靜身無欲信仁而已愼其天性故易爲不善貪欲無厭毀人自成戾其天性故難也所謂爲善者靜而無爲也所謂爲不善者躁而多欲也適情辭無所誘或循性保眞無變於己故曰爲善易越城郭踰險塞姦符節盜管金篡弑矯誣非人之性也姦私亦盜也符節成信也而盜取之管壯籥也金印封亦所以爲信也固閉藏也篡弑下謀上也矯擅作君命誣以惡覆人也皆非人本所受天之善性也故曰爲不善難今人所以犯囹圄之罪而陷於刑戮之患者由嗜欲無厭不循度量之故也何以知其然天下縣官法曰發墓者誅竊盜者刑此執政之所司也夫法令者罔其姦邪勤率隨其蹤跡勤者問吏率大任也無愚夫惷婦皆知爲姦之無脫也犯禁之不得免也然而不材子不勝其欲蒙死亡之罪而被刑戮之羞蒙冒然而立秋之後司寇之徒繼踵於門而死市之人血流於路何則惑於財利之得而蔽於死亡之患也夫今陳卒設兵兩軍相當將施令曰斬首拜爵而屈撓者要斬然而隊階之卒皆不能前遂斬首之功遂成而後被要斬之罪是去恐死而就必死也故利害之反禍福之接不可不審也事或欲之適足以失之或避之適足以就之楚人有乘船而遇大風者波至而自投於水非不貪生而畏死也或於恐死而反忘生也故人之嗜欲亦猶此也齊人有盜金者當市繁之時至掇而走勒問其故曰而盜金於市中何也繁眾也勒主問吏故猶意也而汝也對曰吾不見人徒見金耳志所欲則忘其爲矣是故聖人審動靜之變而適受與之度理好憎之情和喜怒之節夫動靜得則患弗過也受與適則罪弗累也好憎理則憂弗近也喜怒節則怨弗犯也故達道之人不苟得不讓福其有弗棄非其有弗索常滿而不溢恒虛而易足虛無欲也今夫霤水足以溢壺榼而江河不能實漏巵故人心猶是也自當以道術度量食充虛衣御寒則足以養七尺之形矣若無道術度量而以自儉約則萬乘之勢不足以爲尊天下之富不足以爲樂矣諭若桀與紂無道術度量不得爲匹夫何尊樂之有乎孫叔敖三去令尹而無憂色爵祿不能累也不以爵祿累其身也荆佽非兩蛟夾繞其船而志不動怪物不能驚也勇而不惑聖人心平志易精神內守物莫足以惑之夫醉者俛入城門以爲七尺之閨也超江淮以爲尋常之溝也酒濁其神也怯者夜見立表以爲鬼也見寢石以爲虎也懼揜其氣也揜奪又况無天地之怪物乎夫雌雄相接陰陽相薄羽者爲雛鷇毛者爲駒犢柔者爲皮肉堅者爲齒角人弗怪也水生蠬蜄山生金玉人弗怪也老槐生火久血爲燐人弗怪也血精在地暴露百日則爲燐遙望烱烱若燃火也山出嘄陽嘄陽山精也人形長大面黑色身有毛若反踵見人而笑水生罔象水之精也國語曰龍罔象也木生畢方木之精也狀如鳥青色赤腳一足不食五穀也井生墳羊土之精也魯季子穿井獲土缶其中有羊也人怪之聞見鮮而識物淺也天下之怪物聖人之所獨見利害之反覆知者之所獨明達也同異嫌疑者世俗之所眩惑也夫見不可布於海內聞不可明於百姓是故因鬼神機祥而爲之立禁機祥吉凶禁戒總形推類而爲之變象何以知其然也世俗言曰饗大高者而彘爲上牲大高祖一曰上帝葬死人者裘不可以藏相戲以刃者太祖軵其肘軵擠也讀近茸急察言之枕戸橉而臥者鬼神蹠其首此皆不著於法令而聖人之所不口傳也夫饗大高而彘爲上牲者非彘能賢於野獸麋鹿也而神明獨饗之何也以爲彘者家人所常畜而易得之物也故因其便以尊之裘不可以藏者非能其綈綿曼帛温煖於身也世以爲裘者難得貴賈之物也曼帛細帛也裘狐之屬也故曰貴賈之物而可傳於後世無益於死者而足以養生故因其資以讋之資用也讋忌恐相戲以刃太祖軵其肘者夫以刃相戲必爲過失過失相傷其患必大無涉血之仇爭忿鬭而以小事自內於刑戮愚者所不知忌也故因太祖以累其心累恐枕戸橉而臥鬼神履其首者使鬼神能玄化則不待戸牖之行若循虛而出入則亦無能履也虛孔竅也夫戸牖者風氣之所從往來而風氣者陰陽粗捔者也離者必病離遭故託鬼神以伸誡之也凡此之屬皆不可勝著於書策竹帛而藏於官府者也故以機祥明之爲愚者之不知其害乃借鬼神之威以聲其教所由來者遠矣而愚者以爲機祥而狠者以爲非唯有道者能通其志今世之祭井竈門戸箕箒臼杵者非以其神爲能饗之也恃賴其德煩苦之無已也是故以時見其德所以不忘其功也觸石而出膚寸而合不崇朝而雨天下者唯太山崇終也日旦至食時爲終朝也赤地三年而不絶流澤及百里而潤草木者唯江河也是以天子秩而祭之故馬免人於難者其死也葬之牛其死也葬以大車爲薦牛馬有功猶不可忘又况人乎此聖人所以重仁襲恩襲亦重累故炎帝於火死而爲竈炎帝神農以火德王天下死託祀於竈神禹勞天下死爲社勞力謂天下治水之功也託祀於后土之神后稷作稼穡而死爲稷稷周弃也羿除天下之害死而爲宗布此鬼神之所以立羿古之諸侯河伯溺殺人羿射其左目風伯壞人屋室羿射中其膝又誅九嬰窫穴孤之屬有功於天下故死託於宗布祭田爲宗布謂出也一曰今人室中所祀之宗布是也或曰司命傍布也此堯時羿非有窮后羿北楚有任俠者其子孫數諫而止之不聽也縣有賊大搜其廬事果發覺夜驚而走追道及之其所施德者皆爲之戰得免而遂反語其子曰汝數止吾爲俠今有難果賴而免身而諫我不可用也所以知免於難而不知所以無難論事如此豈不惑哉宋人有嫁子者告其子曰嫁未必成也有如出不可不私藏私藏而富其於以復嫁易其子聽父之計竊而藏之君公之其盜也逐而去之其父不自非也而反得其計知爲出藏財而不知藏財所以出也爲論如此豈不悖哉今夫僦載者救一車之任極一牛之力爲軸之折也有如轅軸其上以爲造不知軸轅之趣軸折也楚王之佩玦而遂
