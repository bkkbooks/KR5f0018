seq: 26
front:
  text: 謌激楚之音非正樂故舉坐而善之過府而負手者希不有盜心府藏貨所生也故侮人之鬼者過社而搖其枝侮猶病也晉陽處父代楚以救江故解椊者不在於捌格在於批伉批擊伔推擊其要夾木大者根擢山高者基扶其下跐也蹠巨者志遠體大者節疏狂者傷人莫之怨也嬰兒詈老莫之疾也賊心𡵍賊害尾生之信不如隨牛之誕尾生效信於婦人信之失隨牛弦高矯君命爲誕雖然以存國故不如隨牛之誕而又況一不信者乎一猶常況常不爲信不爲誕乎一或作一一猶待也憂父之疾者子治之者醫論語曰父母唯其疾之憂故曰憂之者子進獻者祝治祭者庖庖宰也
  hash: sha256:a9b4c695cbf9bef7adec383b75fab5aced96fa8eaddc181ab4d6b40ef06fa37d
body:
  text: 清淨恬愉人之性也儀表規矩事之制也知人之性其自養不悖知事之制其舉錯不惑發一端散無竟周八極總一筦謂之心見本而知末觀指而睹歸執一而應萬握要而治詳謂之術居智所謂行智所之事智所秉動智所由謂之道道者置之前而不𨎌錯之後而不軒內之尋常而不塞布之天下而不窕是故使人高賢稱譽己者心之力也使人卑下誹謗己者心之罪也夫言出於口者不可止於人行發於邇者不可禁於遠事者難成而易敗也名者難立而易廢也千里之隄以螻螘之穴漏百尋之屋以突隙之烟焚突竈突也堯戒曰戰戰慄慄日愼一日人莫蹪於山而蹪於蛭蹪躓也蛭蟻也是故人者輕小害易微事以多悔患至而後憂之是由病者已惓惓劇而索良醫也雖有扁鵲俞跗之巧猶不能生也俞夫黃帝時醫夫禍之來也人自生之福之來也人自成之禍與福同門利與害爲鄰非神聖人莫之能分凡人之舉事莫不先以其知規慮揣度揣商量高下也而後敢以定謀其或利或害此愚智之所以異也曉自然以爲智知存亡之樞機禍福之門戶舉而用之陷溺於難者不可勝計也使知所爲是者事必可行則天下無不達之塗矣是故知慮者禍福之門戶也動靜者利害之樞機也百事之變化國家之治亂待而後成是故不溺於難者成是故不可不愼也天下有三危少德而多寵一危也才下而位高二危也身無大功而有厚祿三危也故物或損之而益或益之而損何以知其然也昔者楚莊王旣勝晉於河雍之間莊王敗晉荀林父之師於邲邲河雍地也歸而封孫叔敖而不辭受病疽將死謂其子曰吾則死矣王必封女女必讓肥饒之地而受沙石之間有寢邱者其地硧石之名醜寑邱今汝南固始地前有垢谷後有莊邱名醜荆人鬼好事鬼也越人禨禨祥人莫之利也孫叔敖死王果封其子以肥饒之地其子辭而不受請有寑之邱楚國之俗功臣二世而爵祿唯孫叔敖獨存此所謂損之而益也何謂益之而損昔晉厲公南伐楚東伐齊西伐秦北伐燕兵橫行天下而無所綣綣屈威服四方而無所詘遂合諸侯於嘉陵氣充志驕淫侈無度暴虐萬民內無輔拂之臣外無諸侯之助戮殺大臣親近導諛明年出遊匠驪氏欒書中行偃劫而幽之欒書中行偃皆大夫諸侯莫之救百姓莫之哀三月而死夫戰勝攻取地廣而名尊此天下之所願也然而終於身死國亡此所謂益之而損者也夫孫叔敖之請有寢之邱沙石之地所以累世不奪也晉厲公之合諸侯於嘉陵所以身死於匠驪氏也眾人皆知利利而病病也唯聖人知病之爲利知利之爲病也夫再實之木根必傷掘藏之家必有殃掘藏謂發冢得伏藏無功受財以言大利而反爲害也張武教智伯奪韓魏之地而擒於晉陽張武智伯臣也擒於晉陽爲趙襄子所殺申叔時教莊王封陳氏之後而霸天下申叔時楚大夫也莊王滅陳已乃復之也孔子讀易至損益未嘗不憤然而歎曰益損者其王者之事與事或欲以利之適足以害之或欲害之乃反以利之利害之反禍福之門戶不可不察也陽虎爲亂於魯陽虎季氏之臣也陽虎季氏專魯國也魯君令人閉城門而捕之得者有重賞失者有重罪圍三匝而陽虎將舉劍而伯頤伯迫門者止之曰天下探之不窮不窮言深遠我將出子陽虎因赴圍而逐揚劎提戈而走門者出之顧反取其出之者以戈推之攘祛薄腋祛袂出之者怨之曰我非故與子反也爲之蒙死被罪而乃反傷我宜矣其有此難也魯君聞陽虎失大怒問所出之門使有司拘之以爲傷者受大賞而不傷者被重罪此所謂害之而反利者也何謂欲利之而反害之楚恭王與晉人戰於鄢陵戰酣晉人晉厲公恭王傷晉人射恭王中目也而休司馬子反渴而求飲竪陽穀奉酒而進之竪小使也陽穀其名子反之爲人也嗜酒而甘之不能絶於口遂醉而卧恭王欲復戰使人召司馬子反子反辭以心痛王駕而往視之入幄中而聞酒臭恭王大怒曰今日之戰不穀親傷不穀不祿也人君謙以自稱也所恃者司馬也而司馬又若此是亡楚國之社稷而不率吾眾也不穀無與復戰矣於是罷師而去之斬司馬子反爲僇故竪陽穀之進酒也非欲禍子反也誠愛而欲快之也而適足以殺之此所謂欲利之而反害之者也夫病温而强之食病暍而飲之寒此眾人之所以爲養也而良醫之所以爲病也悅於目悅於心愚者之所利也然而有論者之所辟也故聖人先忤而后合眾人先合而后忤有功者人臣之所務也有罪者人臣之所辟也或有功而見疑或有罪而益信何也則有功者離恩義有罪者不敢失仁心也魏將樂羊攻中山樂羊文侯之將其子執在城中城中縣其子以示樂羊樂羊曰君臣之義不得以子爲私攻之愈急中山因烹其子而遺之鼎羹與其首樂羊循而泣之曰是吾子己爲使者跪而啜三杯使者歸報中山曰是伏約死節者也不可忍也遂降之爲魏文侯大開地有功自此之後日以不信此所謂有功而見疑者也何謂有罪而益信孟孫獵孟孫魯大夫也而得麑使秦西巴持歸烹之麑母隨之而嗁秦西巴弗忍縱而子之孟孫歸求麑安在秦西巴對曰其母隨而嗁臣誠弗忍竊縱而予之孟孫怒逐秦西巴居一年取以爲子傅左右曰秦西巴有罪於君今以爲子傅何也孟孫曰夫一麑而不忍又何況於人乎此謂有罪而益信者也故趨舍不可不審也此公孫鞅之所以抵罪於秦而不得入魏也公孫鞅商君也爲秦伐魏欺魏公子印而殺之後有罪走魏魏人不入也功非不大也然而累足無所踐者不義之故也事或奪之而反與之或與之而反取之智伯求地於魏宣子宣子弗欲與之任登曰智伯之强威行於天下求地而弗與是爲諸侯先受禍也不若與之宣子曰求地不已爲之柰何任登曰與之使喜必將復求地於諸侯諸侯必植耳植耳竦耳而聽也與天下同心而圖之一心所得者非直吾所亡也魏宣子裂地而授之又求地於韓康子韓康子不敢不予諸侯皆恐又求地於趙襄子襄子弗與於是智伯乃從韓魏圍襄子於晉陽三國通謀擒智伯而三分其國此所謂奪人而反爲人所奪者何謂與之而反取之晉獻公欲假道於虞以伐虢遺虞垂棘之壁與屈產之乘虞公惑於璧與馬而欲與之道宮之奇諫宮之奇虞臣也曰不可夫虞之與虢若車之有輪輪依於車車亦依輪虞之與虢相恃而勢也若假之道虢朝亡而虞夕從之矣虞公弗聽遂假之道荀息伐虢遂克之荀息晉大夫還反伐虞又拔之此所謂與之而反取者也聖王布德施惠非求其報於百姓也郊望禘嘗郊祭天望祭日月星辰山川也禘嘗祭宗廟也非求福於鬼神也山致其高而雲起焉水致其深而蛟龍生焉君子致其道而福祿歸焉夫有陰德者必有陽報有陰行者必有昭名古有溝防不脩水爲民害禹鑿龍門辟伊闕平治水土使民得陸處百姓不親五品不愼契教以君臣之義父子之親夫妻之辯長幼之序田野不脩民食不足后稷乃教之辟地墾草糞土種穀令百姓家給人足故三后之後無不王者謂夏殷周有陰德也周室衰禮義廢孔子以三代之道教導於世其後繼嗣至今不絶者有隱行也秦王趙政兼吞天下而已趙政始皇生於趙故名趙政智伯侵地而滅商鞅支解李斯車裂李斯上蔡人也爲秦相趙高譖之二世車裂之於雲陽三代種德而王齊桓繼絶而霸故樹黍者不獲稷樹怨者無報德昔者宋人好善者三世不解家無故而黑牛生白犢以問先生先生曰此吉祥以饗鬼神先生凡先人生者也以鄉鬼神白犢純色可以爲犧牲也居一年其父無故而盲牛又復生白犢其父又復使其子以問先生其子曰前聽先生言而失明今又復問之柰何其父曰聖人之言先忤而後合其事未究固試往復問之其子又復問先生先生曰此吉祥也復以饗鬼神歸致命其父其父曰行先生之言也居一年其子又無故而盲其後楚攻宋圍其城楚莊王時圍宋九月當此之時易子而食析骸而炊之丁壯者死老病童兒皆上城牢守而不下楚王大怒城已破諸城守者皆屠之此獨以父子盲之故得無乘城軍罷圍解則父子俱視夫禍福之轉而相生其變難見也近塞上之人有善術者馬無故亡而入胡人皆弔之其父曰此何遽不爲福乎居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不能爲禍乎家富良馬其子好騎墮而折其髀人皆弔之其父曰此何不遽爲福乎居一年胡人大入塞丁壯者引絃而戰近塞之人死者十九此獨以跛之故父子相保故福之爲禍禍之爲福化不可極深不可測也或直於辭而不害於事者或虧於耳以忤於心而合於實者高陽魋或曰高陽魋宋大夫將爲室問匠人匠人對曰未可也木尚生加塗其上必將撓以生材任重塗今雖成後必敗高陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡后必善匠人窮於辭無以對受令而爲室其始成竘然善也竘高壯類而後果敗此所謂直於辭而不可用者也何謂虧於耳忤於心而合於實靖郭君將城薛靖郭君齊威王之子也封於薛賓客多止之弗聽靖郭君謂謁者曰無爲賓通言齊人有請見者曰臣請道三言而已過三言請烹郭君聞而見之賓趨而進再拜而興因稱曰海大魚則反走靖郭君止之曰願聞其說賓曰臣不敢以死爲熙熙戲靖郭君曰先生不遠道而至此爲寡人稱之賓曰海大魚網弗能止也釣弗能牽也蕩而失水則螻螘皆得志焉今夫齊君之淵也君失齊則薛能自存乎靖郭君曰善乃止不城薛此所謂虧於耳忤於心而得事實者也夫以無城薛止城薛其於以行說乃不若海大魚故物或遠之而近或近之而遠或說聽計當而身疏或言不用計不行而益親何以明之三國伐齊圍平陸三國韓魏趙也括子以報於牛子括子牛子齊臣曰三國之地不接於我踰鄰國而圍平陸利不足貪也然則求名於我也請以齊侯往牛子以爲善括子出無害子入無害子亦齊臣牛子以括子言告無害子無害子曰異乎臣之所聞牛子曰國危而不安患結而不解何謂貴智無害子曰臣聞之有裂壤土以安社稷者聞殺身破家以存其國者不聞出其君以爲封疆者牛子不聽無害子之言而用括子之計三國之兵罷而平陸之地存自此之后括子日以䟽無害子日以進故謀患而患解圖國而國存括子之智得矣無害子之慮無中於策謀無益於國然而心調於君有義行也今人待冠而飾首待履而行地冠履之於人也寒不能煖煖温風不能障暴不能蔽也然而冠冠履履者其所自託者然也夫咎犯戰勝城濮而雍季無尺寸之功然而雍季先賞而咎犯後存者其言有貴者也故義者天下之所賞也百言百當不如擇趨而審行也或無功而先舉或有功而後賞何以明之昔晉文公將與楚戰城濮問於咎犯曰爲柰何咎犯曰仁義之事君子不厭忠信戰陳之事不厭詐僞君其許之而已矣辭咎犯問雍季雍季對曰焚林而獵愈多得獸後必無獸以詐僞遇人雖愈利後亦無復君其正之而已矣於是不聽雍季之計而用咎犯之謀與楚人戰大破之還歸賞有功者先雍季而後咎犯左右曰城濮之戰也君行賞先雍季何也文公曰咎犯之言一時之權也雍季之言萬世之利也吾豈可以先一時之權而後萬世之利也哉智伯率韓魏二國伐趙圍晉陽決晉水而灌之城下緣木而處縣釜而炊襄子謂於張孟談曰城中力已盡糧食匱乏大夫病爲之奈何張孟談曰亡不能存危弗能安無爲貴智伯臣請試潛行潜行伏出也見韓魏之君而約之乃見韓之君說之曰臣聞之脣亡而齒寒今智伯率二國而伐趙趙將亡矣趙亡則君爲之次矣不及今而圖之禍將及二君二君曰智伯之爲人也粗中而少親我謀而泄事必敗爲之柰何張孟談曰言出君之口入臣之耳人孰知之者乎且同情相成同利相死君其圖之二君乃與張孟談陰謀與之期張孟談乃報襄子至其日之夜趙氏殺其守隄之吏決水灌智伯智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗智伯軍敗殺其身而三分其國襄子乃賞有功者而高赫爲賞首羣臣請曰晉陽之存張孟談之功也而赫爲賞首何也襄子曰晉陽之圍也寡人國家危社稷殆羣臣無不有驕侮之心者唯赫不失君臣之禮吾是以先之由此觀之義者人之大本也雖有戰勝存亡之功不如行義之隆故君子曰美言可以市尊美行可以加人或有罪而可賞也或有功而可罪也西門豹治鄴豹文侯臣廪無積粟府無儲錢庫無甲兵官無計會人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能道則可不能將加誅於子西門豹曰臣聞王主富民霸主富武亡國富庫今王欲爲霸王者也臣故稸積於民君以爲不然臣請升城鼓之一鼓甲兵粟米可立具也於是乃升城而鼓之一鼓民被甲括矢甲鎧也括箭也操兵弩而出再鼓負輦粟而至服駕牛也輦擔也文侯曰罷之西門豹曰與民約信非一日之積也一舉而欺之後不可復用也燕常侵魏八城臣請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞也解扁爲束封解扁魏臣治東封者上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益眾也入何以三倍對曰以冬伐木而積之於春浮之河而鬻之文侯曰民春以力耕暑以强耘秋以收歛冬間無事以伐林而積之負軛而浮之河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功可罪者賢主不苟得忠臣不苟利何以明之中行穆伯攻鼓弗能下中行穆伯晉大夫鼓北翟餽聞倫曰鼓之嗇夫聞倫知之餽聞倫晉人也請無罷武大夫而鼓可得也穆伯弗應左右曰不折一戟不傷一卒而鼓可得也君奚爲弗使穆伯曰聞倫爲人佞而不仁若使聞倫之下吾可以勿賞乎若賞之是賞佞人佞人得志是使晉國之武舍仁而爲佞雖得鼓將何所用之攻城者欲以廣地也得地不取者見其本而知其末也秦穆公使孟盟舉兵襲鄭孟盟伯里奚之子也過周以東鄭之賈人弦高蹇他蹇他弦高之黨相與謀曰師行數千里數絶諸侯之地其勢必襲鄭凡襲國者以爲無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三率相與謀三率秦將白乙孟明西乙曰凡襲人者以爲弗知今已知之矣守備必固進必無功乃還師而反晉先軫舉兵擊之先軫晉大夫也大破之殽鄭伯乃以存國之功賞弦高弦高辭之曰誕而得賞則鄭國之信廢矣爲國而無信是俗敗也賞一人敗國俗者弗爲也以不信得厚賞義者弗爲也遂以其屬徙東夷終身不反故仁者不以俗傷生知者不以利害義聖人之思脩愚人之思敠叕短忠臣者務崇君之德諂臣者務廣君之地何以明之陳夏徵舒弑其君楚莊王伐之陳人聽令莊王以討有罪遣卒戍陳戍守也守欲有陳也大夫畢賀申叔時使於齊反還而不賀莊王曰陳爲無道寡人起九軍以討之征暴亂誅罪人羣臣皆賀而子獨不賀何也申叔時曰牽牛蹊人之田田主殺其人而奪之牛罪則有之罰亦重矣今君王以陳爲無道興兵而攻因以誅罪人遣人戍陳諸侯聞之以王爲非誅罪人也貪陳國也蓋聞君子不棄義以取利王曰善乃罷陳之戍立陳之後諸侯聞之皆朝於楚此務崇君之德者也張武爲智伯謀曰張武晉人晉六將軍中行文子最弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏趙韓魏裂地而授之趙氏不與乃率韓魏而伐趙圍之晉陽三年三國陰謀同計以擊智氏遂滅之此務爲君廣地夫爲君崇德者霸爲君廣地者滅故千乘之國行文德者王湯武是也萬乘之國好廣地者亡智伯是也非其事者勿仞也非其名者勿就也無故有顯名者勿處也無功而富貴者勿居也夫就人之名者廢仞人之事者敗無功而大利者後將爲害譬猶緣高木而望四方也雖愉樂哉然而疾風至未嘗不恐也患及身然後憂之六驥追之弗能及也是故忠臣事君也計功而受賞不爲苟得積力而受官不貪爵祿其所能者受之勿辭也其所不能者與之勿喜也辭而能則匿欲所不能則惑亂所不能而受所能則得無損墮之勢而無不勝之任昔者智伯驕伐范中行而克之又劫韓魏之君而割其地尚以爲未足遂興兵伐趙韓魏反之軍敗晉陽之下身死高梁之東頭爲飲器國分爲三爲天下笑此不知足之禍也老子曰知足不辱知止不殆可以修久此之謂也或譽人而適足以敗之或毀人而乃反以成之何以知其然也費無忌復於荆平王費無忌楚臣復白也曰晉之所以霸者近諸夏也近諸夏國在諸夏也而荆之所以不能與之爭者以其避遠也楚王若欲從諸侯不若大城城父而令太子建守焉以來北方王自收其南是得天下也楚王悅之因命太子建守城父命伍子奢傅之居一年伍子奢遊人於王側伍子奢遣說於王之左側言太子甚仁且勇能得民心王以告費無忌無忌曰臣固聞之太子內撫百姓外約諸侯齊晉又輔之將以害楚其事已構矣王曰爲我太子又尚何求曰以秦女之事怨王王因殺太子建而誅伍子奢此所謂見譽而爲禍者也何謂毀人而反利之唐子短陳駢子於齊威王唐子齊大夫也威王欲殺之陳駢子與其屬出亡奔薛孟嘗君聞之孟嘗君封於薛使人以車迎之至而豢以芻豢黍梁五味之膳日三至冬日被裘罽夏日服絺紵出則乘牢車駕良馬孟嘗君問之曰夫子生於齊長於齊夫子亦何思於齊對曰臣思夫唐子者孟嘗君曰唐子者非短子者耶曰是也孟嘗君曰子何爲思之對曰臣之處於齊也糲粢之飯藜藿之羹冬日則寒凍夏日則暑傷自唐子之短臣也以身歸君食芻豢飯黍粢服輕煖乘牢良臣故思之此謂毀人而反利之者也是故毀譽之言不可不審也或貪生而反死或輕死而得生或徐行而反疾何以知其然也魯人有爲父報讎於齊者刳其腹而見其心坐而正冠起而更衣徐行而出門上車而步馬顏色不變其御欲驅撫而止之曰今日爲父報讎以出死非爲生也今事已成矣又何去之追者曰此有節行之人不可殺也解圍而去之使被衣不暇帶冠不及正蒲伏而走上車而馳必不能自免於千步之中矣今坐而正冠起而更衣徐徐而出門上車而步馬顏色不變此眾人所以爲死也而乃反以得活此所謂徐而馳遲於步也夫走者人之所以爲疾也步者人之所以爲遲也今反乃以人之所爲遲者反爲疾明於分也有知徐之爲疾遲之爲速者則幾於道矣故黃帝亡其玄珠使離朱剟索之離朱明目物㨗疾利搏善拾於物二人皆黃帝臣也而弗能得之也於是使忽怳而後能得之忽怳黃帝臣也忽怳善亡之人聖人敬小愼微動不失時百射重戒射象禍乃不滋計福勿及慮禍過之同日被霜蔽者不傷愚者有備與知者同功夫爝火在縹烟之中也一指之所能息也塘漏若鼷穴一撲之所能塞也及至火之燔孟諸而炎雲臺孟諸宋大澤雲臺高至雲也而水決九江而漸荆州雖起三軍之眾弗能救也夫積愛成福積怨成禍若癰疽之必潰也所浼者多矣浼污諸御鞅復於簡公諸御鞅齊臣簡公齊君曰陳成常宰予二子者甚相憎也宰予孔子弟子仕於齊臣恐其搆難而危國也君不如去一人簡公不聽居無幾何陳成常果攻宰予於庭中而弑簡公於朝此不知敬小之所生也魯季氏與郈氏鬭雞季氏郈氏皆魯大夫郈氏介其雞介以芥菜塗其雞翅而季氏爲之金距金距施金芒於距也季氏之雞不勝季平子怒因侵郈氏之宮而築之郈昭伯怒傷之魯昭公傷毀譖也曰禱於襄公之廟舞者二人而已時魯禱先君襄公六佾之舞庭者凡二人也其餘盡舞於季氏季氏之無道無上久矣弗誅必危社稷公以告子家駒子家駒魯大夫子家駒曰季氏之得眾三家爲一三家孟氏叔孫季氏其德厚其威强君胡得之昭公弗聽使郈昭伯將卒以攻之仲孫氏季孫氏相與謀曰無季氏死亡無日矣遂興兵以救之郈昭伯不勝而死魯昭公出奔齊故禍之所從生者如於雞定及其大也至於亡社稷故蔡女蕩舟齊師大侵楚齊桓公與蔡姬乘舟姬蕩舟公懼上之公怒歸之蔡蔡人嫁之公伐楚至召陵而勝之也兩人搆怨廷殺宰予簡公遇殺身死無後陳氏伐之齊乃無吕兩家鬭雞季氏金距郈公作難魯昭公出走故師之所處生以棘楚楚大夫也禍生而不蚤滅若火之得燥水之得濕浸而益大癰疽發於指其痛遍於體故蠹啄剖梁柱蟁蝱走牛羊此之謂也人皆務於救患之備而莫能知使患無生夫得患無生易於救患而莫能加務焉則未可與言術也晉公子重耳過曹曹君欲見其骿脇使之袒而捕魚釐負羈止之曰公子非常也從者三人皆霸王之佐也三人謂狐偃趙衰胥臣遇之無禮必爲國憂君弗聽重耳反國起師而伐曹遂滅之身死人手社稷爲墟禍生於袒而捕魚齊楚欲救曹不能存也聽釐負羈之言則無亡患矣今不務使患無生患生而救之雖有聖知弗能爲謀耳患禍之所由來者萬端無方是故聖人深居以避辱靜安以待時小人不知禍福之門戶妄動而絓羅網雖曲爲之備何足以全其身譬猶失火而鑿池被裘而用蓮也耳塘有萬穴北設随隄之有萬穴塞有十魚何遽無由出室有百戶閉其一盜遽無從入夫牆之壞也於隟劍之折必有齧齧缺聖人見之密故萬物莫能傷也太宰子朱侍飯於令尹子國子朱子國皆楚大夫令尹子國啜羹而熱投巵漿而沃之明曰太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百郎尹主郎官之尹也夫仕者先避之見終始微矣夫鴻鵠之未孚於卵也一指篾之則靡而無形矣其至其筋骨之已就而羽翮之所成也則奮翼揮䎚䎚六翮之末也淩乎浮雲背負青天膺摩赤霄赤霄飛雲翱翔乎忽荒之上析惕乎虹蜺之間雖有勁弩利矰微繳蒲沮之子巧亦弗能加也江水之始出於岷山也可攓衣而越也及至乎下洞庭騖石城洞庭在長沙石城在丹陽經丹徒丹徒在會稽起波濤潮者涌起還者爲濤舟杭一日不能濟也是故聖人者常從事於無形之外而不留思盡慮於成事之內是故患禍弗能傷也人或問孔子曰顏回何如人也曰仁人也邱弗如也子貢何如人也曰辯人也邱弗如也子路何人也曰勇人也邱弗如也賓曰三人皆賢夫子而爲夫子役何也孔子曰邱能仁且忍辯且訥勇且怯以三子之能易邱一道邱弗爲也孔子知所施之也秦牛缺徑於山中牛缺隱士也而遇盜奪之車馬解其橐笥施其衣被施奪盜還反顧之無懼色憂志驩然有以自得也盜遂問之曰吾奪子財貨劫子以刀而志不動何也秦牛缺曰車馬所以載身也衣被所以揜形也聖人不以所養害其養盜相視而笑曰夫不以欲傷生不以利累形者世之聖人也以此而見王者必且以我爲事也還反殺之此能以知知矣而未能以知不知也能勇於敢而未能勇於不敢也凡有道者應卒而乏遭難而能免故天下貴之今知所以自行也而未知所以爲人行也其所論未知究者也人能由昭昭於冥冥則幾於道矣詩曰人亦有言無哲不愚此之謂也事或爲之適足以敗之或備之適足以致之何以知其然也秦皇挾錄圖挾銷也秦博士盧生使入海還秦錄圖書於始皇帝見其傳曰亡秦者胡也因發卒五十萬使蒙公楊翁蒙公蒙恬也楊翁子秦將將築修城西屬流沙起隴西臨洮縣北擊遼水遼水遼東東結朝鮮朝鮮樂浪中國內郡輓車而餉之又利越之犀角象齒翡翠翡赤雀翠青雀珠璣員者爲珠顓者爲璣乃使尉屠睢尉屠睢秦將發卒五十萬爲五軍一軍塞鐔城之嶺鐔城在武陵西南接鬱林一軍守九嶷之塞九嶷在零陵也一軍處番禺之都番禺南海一軍守南野之界南野在豫章一軍結餘干之水餘干在豫章三年不解甲弛弩使監祿無以轉餉又以卒鑿渠監祿秦將也鑿通湘水離水之渠也而通糧道以與越人戰殺西嘔君譯吁宋西嘔越人譯吁宋西嘔君名也而越人皆入叢薄中與禽獸處莫肯爲秦虜相置桀駿以爲將而夜攻秦人大破之殺尉屠睢伏尸流血數十萬乃發適戍以備之當此之時男子不得修農畝婦人不得剡麻考縷考成羸弱服格於道大夫箕會於衢箕會以箕於衢會歛病者不得養死者不得葬於是陳勝起於大澤奮臂大呼天下席卷而至於戲戲地名在新豐劉項興義兵隨而定若折槁振落遂失天下禍在備胡而利越也欲知築脩城以備亡不知築修城之所以亡也發適戌以備越而不知難之從中發也夫鵲先識𡻕之多風也去高木而巢扶枝扶旁大人過之則探鷇嬰兒過之則挑其卵知備遠難而忘近患故秦之設備也烏鵲之智也或爭利而反强之或聽從而反止之何以知其然也魯哀公欲西益宅史爭之以爲西益宅不祥西益宅築舊居之西更以爲田宅不止益哀公作色而怒左右數諫不聽乃以問其傅宰折睢宰折睢傅名姓曰吾欲益宅而史以爲不祥子以爲何如宰折睢曰天下有三不祥西益宅不與焉哀公大悅而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾無止二不祥也不聽强諫三不祥也哀公默然深念憤然自反遂不西益宅夫史以爭爲可以止之而不知不爭而反取之也智者離路而得道愚者守道而失路夫兒說之巧於閉結無不解兒說宋大夫也非能閉結而盡解之也不解不可解也至乎以弗解之者可與及言論矣或明禮義推道禮而不行或解構妄言而反當何以明之孔子行遊馬失食農夫之稼野人怒取馬而繫之子貢往說之卑辭而不能得也孔子曰夫以人之所不能聽說人譬以以大牢享野獸大牢三牲以九韶樂飛鳥也予之罪也非彼人之過也乃使馬圉往說之圉養馬者至見野人曰子耕於東海至於西海吾馬之失安得不食子之苗野人大喜解馬而與之說若此其無方也而反行事有所至而巧不若拙故聖人量鑿而正枘夫歌采菱發陽阿鄙人聽之不若此延路陽局延路陽局鄙歌曲也非歌者拙也聽者異也故交畫不暢暢申連環不解物之不通者聖人不爭也仁者百姓之所慕也義者眾庶之所高也爲人之所慕行人之所高此嚴父之所以教子而忠臣之所以事君也然世或用之而身死國亡者不同於時也昔徐偃王好行仁義陸地之朝者三十二國王孫厲謂楚莊王王孫厲楚臣也曰王不伐徐必反朝徐王曰偃王有道之君也好行仁義不可伐王孫厲曰臣聞之大之與小强之與弱也猶石之投卵虎之啗豚又何疑焉且也爲文而不能達其德爲武而不能任其力亂莫大焉楚王曰善乃舉兵而伐徐遂滅之知仁義而不知世變者也申菽杜茞申菽杜茞皆香草也美人之所懷服也及漸之於滫滫臭汁也則不能保其芳矣古者五帝貴德三王用義五霸任力今取帝王之道而施之五霸之世是由乘驥逐人於榛薄而蓑笠盤旋也今霜降而樹穀冰洋而求穫欲其食則難矣故易曰潜龍勿用者言時之不可以行也故君子終日乾乾夕惕若厲無咎終日乾乾以陽動也夕惕若厲以陰息也因日以動因夜以息唯有道者能行之夫徐偃王爲義而滅燕子噲行仁而亡子噲燕王也蘇代說子噲讓國遂專政齊伐燕大敗之噲死也哀公好儒則削哀公魯君代君爲墨而殘代君趙之別國滅亡削殘暴亂之所致也而四君獨以仁義儒墨而亡者遭之時務異也非仁義儒墨不行非其世而用之則爲之擒矣夫戟者所以攻城也鏡者所以照形也宮人得戟則以刈葵宮人官侍盲者得鏡則以蓋巵不知所施之也故善鄙不同誹譽在俗趍舍不同逆順在君狂譎不受祿而誅狂譎東海之上人也耕田而食讓不受祿大公以爲飾虛亂民而誅段干木辭相而顯所行同也而利害異者時使然也故聖人雖有其志不遇其世僅足以容身何功名之可致也知天之所爲知人之所行則有以任於世矣知天而不知人則無以與俗交知人而不知天則無以與道遊單豹倍世離俗單豹隱士巖居谷飲不衣絲麻不食五穀行年七十猶有童子之色卒而遇饑虎殺而食之張毅好恭張毅好禮之人過宮室廊廟必趍見門閭聚眾必下斯徒馬圉皆與伉禮不終其壽內熱而死豹養其內而虎食其外毅脩其外而疾攻其內故直意適情堅强賊之以身役物則陰陽食之此皆載務而戲乎其調者也得道之士外化而內不化外化所以入人也內不化所以全其身也故內有一定之操而外能詘伸贏縮卷舒與物推移故萬舉而不陷所以貴聖人者以其能龍變也今捲捲然守一節推一行雖以毀碎滅沉猶且弗易也此察於小好而塞於大道也趙宣孟活饑人於委桑之下而天下稱仁焉荆佽非犯河中之難不失其守而天下稱勇焉故見小行則可以論大體矣田子方曰少而貪其力老而弃其身仁者弗爲也束帛以贖之罷武聞之知所歸心矣齊莊公出獵有一蟲舉足將搏其輪問其御曰此何蟲也對曰此螳蜋者也其爲蟲也知進而不知卻不量力而輕敵莊公曰此爲人而必爲天下勇武矣迴車而避之勇武聞之知所盡死矣故田子方隱一老馬隱定而魏國載之齊莊公避一螳蜋而勇武歸之湯教祝網者而四十國朝昔湯自見四向張網者湯教去其三面祝曰欲上者上欲下者下無入吾網文王葬死人之骸而九夷歸之文王治靈臺得死人之骨夜夢人呼而請葬於旦文王反葬以五大夫之禮武王蔭暍人於樾下武王哀暍者之熱故蔭之於樾下樾下眾樹之虛也左擁而右扇之而天下懷其德越王句踐一決獄不辜援龍淵而切其股血流至足以自罰也而戰武士必其死故聖人行之於小則可以覆大矣審之於近則可以懷遠矣孫叔敖決期思之水而灌雩婁之野雩婁今廬江是莊王知其可以爲令尹也子發辨擊劇而勞佚齊辨次第也擊劇次第罷勞之賞各有齊等也或曰子發辨擊之勞佚齊子發築設勞佚之節是以楚知可爲兵齊同楚國知其可以爲兵主也此皆形於小微而通於大理者也聖人之舉事不加憂焉察其所以而已矣今萬人調鐘不能比之律誠得知者一人而足矣說者之論亦猶此也誠得其數則無所用多矣夫車之所以能轉千里者以其要在三寸之轄夫勸人而弗能使也禁人而弗能止也其所由者非理也昔者衛君朝於吳衛君衛侯輒也吳王囚之吳王夫差欲流之於海者說者冠蓋相望而弗能止魯君聞之魯君哀公撤鐘鼓之縣縞素而朝仲尼入見曰君胡爲有憂色魯君曰諸侯無親以諸侯爲親大夫無黨以大夫爲黨今衛君朝於吳王吳王囚之而欲流之於海孰衛君之仁義而遭此難也吾欲免之而不能爲柰何仲尼曰若欲免之請子貢行魯君召子貢授之將軍之印子貢辭曰貴無益於解患在所由之道𣫍躬而行至於吳見太宰嚭太宰嚭甚悅之欲薦之於王子貢曰子不能行能行說於王柰何吾因子也太宰嚭曰子焉知嚭之不能也子貢曰衛君之來也衛國之半曰不若朝於晉其半曰不若朝於吳然衛君以爲吳可以歸骸骨也故束身以受命今子受衛君而囚之又欲流之於海是賞言朝於晉者而罰言朝於吳也且衛君之來也諸侯皆以爲蓍龜以爲蓍龜以卜朝吳之吉凶也兆今朝於吳而不利則皆移心於晉矣子之欲成霸王之業不亦難乎太宰嚭入復之於王王報出令於百官曰比十日而衛君之禮不具者死子貢可謂知所以說矣魯哀公爲室而大公宣子諫公宣子魯大夫室大眾與人處則譁少與人處則悲願公之適公曰寡人聞命矣築室不輟公宣子復見曰國小而室大百姓聞之必怨吾君諸侯聞之必輕吾國魯君曰聞命矣築室不輟公宣子復見曰左昭而右穆昭穆先君宗廟爲大室以臨二先君之廟得無害於子乎公乃令罷役除版而去之魯君之欲爲室誠矣公宣子止之必矣然三說而一聽者其二者非其道也夫臨河而釣日入而不能得一儵魚者非江河魚不食也所以餌之者非其欲也及至良工執竿投而擐脣吻者能以其所欲而釣者也夫物無不可柰何言物皆可術而治也有人無柰何事有人材所不及無柰之何也鉛之與丹異類殊色而可以爲丹者得其數也故繁稱文辭無益於說審其所由而已矣物類之相磨近而異門戶者眾而難識也故或類之而非或不類之而是或若然而不然者或不若然而然者諺曰鳶墮腐鼠而虞氏以亡何謂也曰虞氏梁之大富人也梁今之陳留浚儀也家充盈殷富金錢無量財貨無貲升高樓臨大路設樂陳酒積博其上游俠相隨而行樓下博上者射朋張中反兩射朋張上棋中之以一反兩也而笑飛鳶適墮其腐鼠而中游俠游俠相與言曰虞氏富樂之日久矣而常有輕易人之志吾不敢侵犯而乃辱我以腐鼠如此不報無以立務於天下務勢請與公僇力一志悉率徒屬而必以滅其家此所謂類之而非者也何謂非類而是屈建告石乞屈建楚大夫也石乞白公之黨也曰白公勝將爲亂石乞曰不然白公勝卑身下士不敢驕賢其家無筦籥之信關楗之固大斗斛以出輕斤兩以內而乃論之以不宜也屈建曰此乃所以及也居三年白公勝果爲亂殺令尹子椒司馬子期子椒子期皆白公之季父此所謂弗類而是者也何謂若然而不然子發爲上蔡令民有罪當刑獄斷論定決於令尹前子發喟然有悽愴之心罪人已刑而不忘其恩此其後子發盤罪威王盤辟也發得罪辟於威王也而出奔刑者遂襲恩者恩者逃之於城下之廬踹足而怒踹足蹼足曰子發視決吾罪而被吾刑怨之憯於骨髓憯痛使我得其肉而食之其知厭乎追者皆以爲然而不索其內果活子發此所謂若然而不若然者何謂不然而若然者昔越王句踐卑下吳王夫差請身爲臣妻爲妾奉四時之祭祀而入春秋之貢職委社稷效民力隱居爲蔽而戰爲鋒行禮甚卑辭甚服其離叛之心遠矣然而甲卒三千人以擒夫差於姑胥姑胥地名此四策者不可不審也夫事之所以難知者以其竄端匿跡立私於公倚邪於正而以勝惑
