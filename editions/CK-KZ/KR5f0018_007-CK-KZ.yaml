front:
  text: 八千里也倍之南北之里數也其不從中之數也以出入前表之數益損之表入一寸寸減日近一里表出一寸寸益遠一里欲知天之高樹表高一丈正南北相去千里同日度其陰北表二尺南表尺九寸是南千里陰短寸南二萬里則無景是直日下也陰二尺而得高一丈者南一而高五也則置從此南至日下里數因而五之爲十萬里則天高也若使景與表等則高與遠等也
