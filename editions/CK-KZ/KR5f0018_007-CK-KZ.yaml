body:
  text: 地形訓上紀東西南北山川藪澤地之所載萬物形兆所化育也故形因以題篇地形之所載六合之間四極之內六合已說在原道四極四方之極無復有外故謂之內也昭之以日月經之以星辰紀之以四時要之以太𡻕要正也以太𡻕所在正天時也天地之間九州八極八極八方之極也土有九山山有九塞澤有九藪風有八等水有六品何謂九州東南神州曰農土東南辰爲農祥后稷之所經緯也故曰農土也正南次州曰沃土沃盛也五月建午稼穡盛張故曰沃土也西南戎州曰滔土滔大也七月建申五穀成大故曰滔土也正西弇州曰并土并猶成也八月建酉百穀成熟故曰并土也正中冀州曰中土冀大也四方之主故曰中土也西北台州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也隱氣所隱藏故曰隱土也正東陽州曰申土申復也陰氣盡於北陽復氣起東北故曰申土何謂九山會稽泰山王屋首山太華岐山太行羊腸孟門會稽山在會稽郡泰山今在泰山郡是爲東岳王屋山在今河東恒縣東北所出也首山在蒲坂縣南河曲之中伯夷所隱太華今弘農陰山也是爲西岳岐山今扶風漢陽縣北周家所邑也太行在今上黨太行關直河內野王縣是也羊腸山名也說苑曰桀之居左河濟右太華伊闕在其南羊腸在其北今太原晉陽西北九十里通河西上郡關曰羊腸坂是孟門太行之限也何謂九塞曰大汾澠阨荆阮方城殽阪井陘令疵句注居庸太汾在晉澠阨今弘農澠池是也荆阮方城皆在楚殽阪弘農郡澠池殽欽吟是也井陘在常山通太原關是也令疵在遼西句注在雁門陰館句注是也居庸在上谷阻陽之東通運都關是也何謂九藪藪澤曰越之具區具區在吳越之間也楚之雲夢雲夢在南郡華容也秦之陽紆陽紆蓋在馮翊池陽一名具圃晉之大陸大陸魏獻子所游焚焉而死者是也鄭之圃田圃田在今河南中牟傳曰鄭有原圃猶秦之具圃也吾子取其麋鹿以閑弊邑是也宋之孟諸孟諸在今梁園睢陽東北澤是也齊之海隅海隅猶崖蓋近海濱是也趙之鉅鹿今鉅鹿廣阿澤是也燕之昭余昭余今太原郡是古者屬燕也何謂八風東北曰炎風艮氣所生曰融風也東風曰條風震氣所生也一曰明庶風東南曰景風巽氣所生也一曰清明風南方曰巨風雜氣所生也一曰凱風也西南曰涼風坤氣所以生也西方曰飂風兌氣所生也西北曰麗風乾氣所生也一曰閭闔風北方曰寒風坎氣所生也一曰廣莫風何謂六水曰河水赤水遼水黑水江水淮水河水出崑崙東北陬赤水出其東南陬遼水出碣石山自塞北東流直遼東之西南入海黑水在雝州江水出岷山在蜀西徼淮水出桐栢山南平陽也闔四海之內東西二萬八千里南北二萬六千里子午爲經卯酉爲緯言經短緯長也水道八千里通谷其名川六百陸徑三千里陸徑邪徑也陸地也禹乃使太章步自東極至於西極二億三萬三千五百里七十五步使豎亥步自北極至於南極二億三萬三千五百里七十五步太章豎亥善行人皆禹臣也海內東西短南北長極內等也凡鴻水淵藪自三百仞以上二億三萬三千五百五十里有九淵禹乃以息土填洪水以爲名山息土不耗減掘之益多故以填洪水也名山大山也掘崑崙虛以下地掘猶平也地或作池中有增城九重其高萬一千里百一十四步二尺六寸中崑崙虛中也增重也有五城十二樓見括地像此蓋誕實未聞也上有木禾其脩五尋上崑崙虛上也五尋長三十五尺珠樹玉樹璇樹不死樹在其西在木禾之西也沙棠琅玕在其東皆玉名也在木禾之東也一說沙棠木名也呂氏春秋曰果之美者沙棠之實也絳樹在其南絳赤也碧樹瑤樹在其北碧青玉也木禾之北旁有四百四十門面有十門也門間四里里間九純純丈五尺純量名也旁有九井玉橫維其西北之隅橫猶光也橫或作彭彭受不死藥器也北門開以內不周之風傾宮旋室傾宮宮滿一須曰中也旋室以旋玉飾室也一說室璇璣關可轉旋故曰旋室縣圃涼風樊桐在崑崙閶闔之中閶闔崑崙虛門名也縣圃涼風樊桐皆崑崙之山名也樊讀如麥飯之飯是其䟽圃䟽圃之池浸之黃水黃水三周復其原原本是謂丹水飲之不死河水出崑崙東北陬貫渤海入禹所導積石山渤海大海也河水自崑崙由地中行禹導而通之至積石山書曰河出積石入猶出也赤水出其東南陬西南注南海丹澤之東赤水之東弱水出自窮石窮石山名也在張掖北塞水也至於合黎餘波入於流沙絶流沙南至南海絶猶過也流沙流行也洋水出其西北陬入於南海羽民之南洋水經隴西氏道東至武都爲漢陽或作養也凡四水者帝之神泉以和百藥以潤萬物崑崙之邱或上倍之假令高萬里倍之二萬里是謂涼風之山登之而不死或上倍之是謂懸圃登之乃靈能使風雨或上倍之乃維上天登之乃神是謂太帝之居太帝天帝扶木在陽州日之所曊扶木扶桑也在湯谷之南曊猶照也過陽州東方也曊讀無枝㩌之㩌也建木在都廣建木其狀如生引之有皮若瓔黃蛇葉若羅都廣南方山名也眾帝所自上下日中無景呼而無嚮蓋天地之中也眾帝之從都廣山上天還下故曰上下日中時日直人上無有晷故曰蓋天地之中若木在建木西末有十日其華照下地末端也若木端有十日狀如蓮華華猶光也光照其下也九州之大純方千里純緣也亦曰量名也九州之外亦有八殥亦方千里殥猶遠也殥讀胤嗣之胤自東北方曰大澤曰無通大澤無通皆藪名也東方曰大渚曰少海水中可居者曰渚東方多水故曰少海亦澤名也東南方曰具區曰元澤元讀常山人謂伯爲穴之穴也南方曰大夢曰浩澤夢雲夢也浩亦大也西南方曰渚資曰丹澤蓋近丹水因其名故曰丹澤也西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大㝠曰寒澤北方多寒水故曰寒澤也凡八殥八澤之雲是雨九州八殥之外而有八紘紘維也維落天地而爲之表故曰紘也亦方千里自東北方曰和邱曰荒土鳳所自歌鸞所自舞名曰和邱曰荒土也東方曰棘林曰桑野東南方曰大窮曰眾女南方曰都廣曰反戸都廣國名也山在此國因復曰都廣山言其在鄉曰之南皆爲北鄉戸故反其戸也西南方曰焦僥曰炎土焦僥短人之國也長不滿三尺西方曰金邱曰沃野西方金位也因爲金邱沃猶白也西方白故曰沃野也西北方曰一目曰沙所國人一目在面中央沙所蓋流沙所出也一曰澤名也北方曰積冰曰委羽北方寒冰所積因以爲名積冰也委羽山名也在北極之隂不見日也凡八紘之氣是出寒暑以合八正必以風雨八正八風之正也以風雨八紘之內八紘之外乃有八極自東北方曰方土之山蒼門東北木將用事青之始也故曰蒼門東方曰東極之山曰開明之門明者陽也日之所出也故曰開明之門東南方曰波母之山曰陽門東南月建在巳純陽用事故曰陽門據天下諸城東南角門皆陽門其是類也南方曰南極之山曰暑門南方盛陽積温所在故曰暑門西南方曰編駒之山曰白門西南月建在申金氣之始也金氣白故曰白門西方曰西極之山曰閶闔之門西方八月建酉萬物成濟將可及收斂閶大也闔閉也大聚萬物而閉之故曰閶闔之門也西北方曰不周之山曰幽都之門幽闔也都聚也玄㝠將始用事順陰而聚故曰幽都之門北方曰北極之山曰寒門積寒所在故曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八夤八澤之雲以雨九州而和中土中土冀州東方之美者有醫毋閭之珣玗琪焉醫毋閭山名在遼東屬國珣玗琪玉名也東南方之美者有會稽之竹箭焉會稽山在今會稽山陰縣之南禹所葬竹箭今會稽郡出好竹箭是也南方之美者有梁山之犀象焉梁山在會稽長沙湘南有犀角象牙皆物之珍也西南方之美者有華山之金石焉金美金也石含玉之石也華山今弘農華陰山南是也西方之美者有霍山之珠玉焉出夜光之珠玉色之玉也今河東永安縣也西北方之美者有崑崙之球琳琅玕焉球琳琅玕皆美玉也北方之美者有幽都之筋角焉古之幽都在鷹門以北其畜宜牛羊馬出好筋角可以爲弓弩東北方之美者有斥山之文皮焉斥讀斥邱之斥文皮豹虎之皮也傳曰無終子使孟樂因魏莊子納虎豹之皮也以請和諸戎是也中央之美者有岱岳以生五穀桑麻魚鹽出焉岱岳泰山也王者禪代所祠因曰岱岳也五穀桑麻魚鹽所養人者出猶生也凡地形東西爲緯南北爲經山爲積德川爲積刑山仁萬物生焉故爲積德川水智智制斷故爲積刑也論語曰仁者樂山智者樂水是也高者爲生下者爲死高者陽主生下者陰主死邱陵爲牡谿谷爲牝邱陵高敞陽也故爲牡谿谷污下陰也故爲牝水圓折者有珠方折者有玉圓折者陽也珠陰中之陽方折者陰也玉陽中之陰也皆以其類也清水有黃金龍淵有玉英清水澄故黃金出焉龍淵龍所出游淵也玉英轉化有精光也土地各以其類生是故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴自此上至山氣多男皆生子多有此病也岸下氣多腫石氣多力象石堅也險阻氣多癭上下險阻氣衝喉而結多癭咽也暑氣多夭夭折不終也寒氣多壽谷氣多痺邱氣多狂衍氣多仁下而污者爲衍也陵氣多貪輕土多利重土多遲利疾清水音小濁水音大音聲湍水人輕遲水人重湍急流悍水也中土多聖人皆象其氣皆應其類故南方有不死之草北方有不釋之冰南方温故草有不死者北方寒故冰有不泮釋也東方有君子之國東方木德仁故有君子之國也其人冠帶劍食獸使二大虎也西方有形殘之尸寢居直夢人死爲鬼西方金金斷割攻戰之事有形殘之尸也寢寐也居處也金氣方剛故其寢寐處夢悟如其夢故曰直夢不終其命死而爲鬼能爲祅怪病人也一說曰形殘之尸於是以兩乳爲目肚臍爲口操干戚以舞無夢天神斷其手後天帝斷其首也故寢居直夢磁石上飛雲母來水土龍致雨燕鷹代飛湯遭旱作土龍以像龍雲從龍故致雨也燕玄鳥也春分而來雁春分而北詣漠中也燕秋分而去雁秋分而南詣彭蠡故曰代飛也代更也蛉蟹珠龜與月盛衰與猶隨也是故堅土人剛弱土人肥壚土人大沙土人細壚讀纑繩之纑也細小也息土人美耗土人醜食水者善游能寒魚鼈鷖騖之屬是也食土者無心而慧邱蚓之屬是也食木者多力而奰態羆之屬是也奰煩腸黃理也奰讀內奰干中國之奰近鼻也食草者善走而愚麋鹿之屬是也食葉者有絲而蛾蠶是也食肉者勇敢而捍虎豹鷹鸇之屬是也食氣者神明而壽仙人松喬之屬是也食穀者知慧而夭不食者不死而神凡人民禽獸萬物貞蟲各有以生貞蟲諸細要之屬也或奇或偶或飛或走莫知其情唯知通道者能原本之天一地二人三一陽二陰也人生於天地故曰三也三三而九九九八十一一主日曰數十十從甲至癸也日主人人故十月而生八九七十二二主偶偶以承奇奇主辰辰主月月主馬馬故十二月而生七九六十三三主斗斗主犬犬故三月而生六九五十四四主時時主彘彘故四月而生五九四十五五主音音主猨猨故五月而生四九三十六六主律律主麋鹿麋鹿故六月而生三九二十七七主星星主虎虎故七月而生二九十八八主風風主蟲蟲故八月而化鳥魚皆生於陰陰屬於陽故鳥魚皆卵生魚游於水鳥飛於雲故立冬燕雀入海化爲蛤萬物之生而各異類蠶食而不飲蟬飲而不食蜉蝣不飲不食介鱗者夏食而冬蟄介甲龜鼈之屬也鱗魚龍之屬齕吞者八竅而卵生鳥魚之屬嚼咽者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前膏豕也熊猿之屬無前肥從前起也有角者指而無後指牛羊麋之屬也無後肥從後起也晝生者類父夜生者似母至陰生牝至陽生
