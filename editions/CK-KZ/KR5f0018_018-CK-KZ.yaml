body:
  text: 許愼記上原道訓上原本也本道根眞包裹天地以厯萬物故曰原道因以題篇夫道者覆天載地道無形而大也廓四方析八極廓張也柝開也八極八方之極也言其遠柝讀重門擊柝之柝也高不可際深不可測際至也度深曰測一曰盡也包裹天地禀授無形禀給也授予也無形萬物之未形也皆生於道故曰禀授無形也源流泉浡沖而徐盈混混汨汨濁而徐清源泉之始所出也浡涌也沖虛也始出虛徐流不止能所盈滿以喻於道亦然也汨讀曰骨也故植之而塞於天地橫之而彌於四海施之無窮而無所朝夕植立也塞滿也彌猶絡也施用也用之無窮竭也無所朝夕盛衰舒之幎於六合卷之不盈於一握舒散也幎覆也孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合孟夏與孟冬爲合仲夏與仲冬爲合季夏與季冬爲合故曰六合言滿天地間也一曰四方上下爲六合不盈一握言微妙也約而能張幽而能明言道能小能大能昧能明弱而能强柔而能剛道之性也橫四維而含陰陽橫讀桄車之桄紘宇宙而章三光紘綱也若小車蓋四維謂之紘繩之類也四方上下曰宇古往今來曰宙以論天地章明也三光日月星甚淖而滒甚纖而微滒亦淖也夫饘粥多瀋者謂滒滒讀歌謳之歌山以之高淵以之深獸以之走鳥以之飛日月以之明星厯以之行麟以之游鳳之以翔以用也游出也大飛不動曰翔也泰古二皇得道之柄立於中央二皇伏犧神農也指說陰陽故不言三也神與化游以撫四方撫安也四方謂之天下也是故能天運地滯輪轉而無廢運行也滯止也廢休也水流而不止與萬物終始風興雲蒸事無不應應當也雷聲雨降並應無窮窮已也鬼出電入龍興鸞集鬼出言無蹤迹也電入言其疾也鈞旋轂轉周而復匝鈞陶人作瓦器法下轉旋者一曰天也已彫已琢還反於璞無爲爲之而合於道無爲言之而通乎德言二三之化無爲爲之也而言合於道也無所爲言之而適自通於德也恬愉無矜而得於和恬愉無所好憎也無矜不自大也有萬不同而便於性萬事不同能於便性者性不欲也神託於秋毫之末言微妙也而大宇宙之總宇宙謂天地總合也其德優天地而和陰陽優柔也和調也節四時而調五行五行金木水火土也呴諭覆育萬物羣生呴諭温恤也育長也潤於草木浸於金石禽獸碩大毫毛潤澤羽翼奮也奮壯角觡生也角鹿角也觡麋角也觡讀曰格獸胎不贕鳥卵不毈胎不成獸曰贕卵不成鳥曰毈言不者明其成父無喪子之憂兄無哭弟之哀言無夭死童子不孤婦人不孀無父曰孤寡婦曰孀也虹蜺不出賊星不行賊星妖星也含德之所致含懷也夫太上之道生萬物而不有不以爲己有者也成化像而弗宰宰主也跂行喙息蠉飛蝡動待而後生莫之知德不因德之待之後死莫之能怨不怨虐之得以利者不能譽用而敗者不能非收聚畜積而不加富收斂畜積國有常賦也不加富者爲百姓不以爲己有也布施禀授而不益貧布施禀授匡困乏予不足也以公家之資故不益貧也施縣而不可究纖微而不可勤縣猶小也勤猶盡也累之而不高墮之而不下益之而不衆損之而不寡斵之而不薄殺之而不殘鑿之而不深塡之而不淺忽兮怳兮不可爲象兮怳兮忽兮用不屈兮忽怳無形貌也故曰不可爲像也屈竭也怳讀人空頭扣之怳屈讀秋雞無尾屈之屈也幽兮冥兮應無形兮遂兮洞兮不虛動兮洞達也道動有所應故曰不虛動也與剛柔卷舒兮與陰陽俛仰兮卷舒猶屈申也俛仰猶升降也昔者馮夷大丙之御也夷或作遲也丙或作白皆古之得道能御陰陽者也乘雲車入雲蜺游微霧以雲蜺爲其馬也游行也微霧天之微氣也騖怳忽厯遠彌高以極往騖馳也怳忽無之象也往行也經霜雪而無迹照日光而無景行霜雪中無有迹爲日所照無影柱也扶搖抮抱羊角而上扶攀也搖動也抱了戾也扶搖如羊角轉如曲縈行而上也抮讀與左傳憾而能眕者同也抱讀詩克歧克嶷之嶷也經紀山川蹈騰崑崙排閶闔淪天門經行也紀通也蹈躡也騰上也崑崙山名也在西北其高萬九千里河之所出排猶斥也淪入也閶闔始升天之門也天門上帝所居紫微宮門也馮夷大丙之御其能如此也末世之御雖有輕車良馬勁策利鍛不能與之爭先勁强也策箠也未之感也言不能與馮夷大丙爭在前也鍛讀炳燭之炳是故大丈夫恬然無思澹然無慮以天爲蓋以地爲輿四時爲馬陰陽爲御騶御乘雲陵霄與造化者俱大丈夫諭體道者也造化天地一曰道也霄讀消息之消縱志舒節以馳大區區宅也大宅謂天也可以步而步可以驟而驟令雨師灑道使風伯掃塵雨師畢星也詩云月麗於畢俾滂沱矣風伯箕星也月麗於箕風揚沙也電以爲鞭策電激氣也故以爲鞭策雷以爲車輪雷轉氣也故以爲車輪上游於霄雿之野下出於無垠之門霄雿高峻貌也無垠無形狀之貌霄讀紺綃雿讀翟氏之翟劉覽偏照復守以全劉覽回觀也劉讀留連之留非劉氏之劉也經營四隅還反於樞隅猶方也樞本也故以天爲蓋則無不覆也以地爲輿則無不載也四時爲馬則無不使也陰陽爲御則無不備也陰陽次叙以成萬物無所缺也故曰無不備是故疾而不摇遠而不勞四支不動聰明不損損減也而知八紘九野之形埒者何也八紘天之八維也九野八方中央也執道要之柄而游於無窮之地是故天下之事不可爲也爲后也因其自然而推之推求也舉也萬物之變不可究也秉其要歸之趣趣亦歸也夫鏡水之與形接也不設智故而方圓曲直弗能逃也智故巧飾也鏡水不施巧飾之形人之形好醜以實應之故曰方圓曲直不能逃也是故響不肆應而景不一設叫呼仿佛默然自得得叫呼仿佛之聲狀也人生而靜天之性也感而後動性之害也物至而神應知之動也物事也知與物接而好憎生焉接交也情欲也好憎成形而知誘於外不能反己而天理滅矣形見也誘感也不能反己本所受天清凈之性故曰天理滅也猶衰也故達於道者不以人易天天性也不以人事易其天性也一說曰天身也不以人間利欲之事易其身也外與物化而內不失其情言通道之人雖外貌與物化內不失其無欲之本情也至無而供其求時騁而要其宿言天時自騁道要其宿會也小大脩短各有其具具猶備也萬物之至騰踴肴亂而不失其數不失其數各應其度是以處上而民弗重居前而衆弗害言民戴仰而愛之也天下歸之姦邪畏之以其無爭於萬物也故莫敢與之爭夫臨江而釣曠日而不能盈羅雖有鉤箴芒距距爪也讀距守之距也微綸芳餌加之以詹何娟嬛之數猶不能與網罟爭得也詹何娟嬛古善釣人名數術也射者扞烏號之弓彎棊衛之箭扞張也彎引也棋美箭所出地名也衛利也烏號柘桑其材堅勁烏跱其上及其將飛枝必撓下勁能復起巢鳥隨之烏不敢飛號呼其上伐其枝以爲弓因曰烏號之弓也一說黃帝鑄鼎於荆山鼎湖得道而仙秉龍上其臣援弓射龍欲下黃帝不能也烏於也號呼也於是抱弓而號因名其弓爲烏號之弓也重之羿逢蒙子之巧以要飛鳥猶不能與羅者競多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取競逐也何則以所持之小也張天下以爲之籠因江海以爲罟又何亡魚失鳥之有哉罟魚網也詩云施罟濊濊故矢不若繳繳不若無形之像言其矢也夫釋大道而任小數無以異於使蟹捕鼠蟾蠩捕蚤不足以禁姦塞邪亂乃逾滋以艾灼蟹巨上內置穴中延熱走窮穴適於禽一鼠也蟾蠩䗐也跳行舒遲捕蚤亦不能悉得故曰不足以禁姦也諭道益甚也昔者夏鯀作三仞之城諸侯背之海外有狡心鯀帝顓頊五世孫禹之父也八尺曰仞鯀作城郭以其役勞故諸侯背之四海之外皆有狡猾之心也禹知天下之叛也乃壞城平池散財物焚甲兵施之以德海外賓伏四夷納職四夷海外也職貢也合諸侯於塗山執玉帛者萬國塗山在九江當塗縣玉圭帛玄纁也故機械之心藏於胷中則純白不粹神德不全機械巧詐也藏之於胷臆之內故純白之道不粹精神專一之德不全也粹讀禍祟之祟也在身者不知何遠之所能懷懷來也是故革堅則兵利城成則衝生言攻戰之備於此生也若以湯沃沸亂乃逾甚是故鞭噬狗策蹏馬而欲教之雖伊尹造父弗能化伊尹名摯殷湯之賢相也造父周穆王之臣也而善御雖此二人不能化之欲寅之心亡於中則飢虎可尾何況狗馬之類乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠策繁用者非致遠之術也繁數也離朱之明察箴末於百步之外離朱者黃帝臣明目人也不能見淵中之魚師曠之聰合八風之調師曠晉平公樂師子野也八風八卦之風聲也而不能聽十里之外故任一人之能不足以治三畝之宅也修道理之數因天地之自然則六合不足均也均平也是故禹之決瀆也因水以爲師神農之播穀也因苗以爲教禹鯀之子名文命受禪成功曰禹因以水性自下決使東流以爲後世師法也神農少典之子炎帝也農植嘉穀神而化之故號曰神農也播布也布種百穀因苗之生而長育之以爲後世之常教也夫萍樹根於水萍大蘋也木樹根於土鳥排虛而飛獸蹠實而走蹠足也實地也蹠讀捂摭之撫蛟龍水居虎豹山處天地之性也蛟水蛟其皮有珠世人以爲刀剱之口是也蛟讀人情性交易之交緩氣言乃得耳兩木相摩而然金火相守而流流釋也員者常轉窾者主浮自然之勢也員輪丸之屬也窾空也舟船之屬也故曰自然之勢也窾讀科條之科也是故春風至則甘雨降生育萬物明堂月令曰清風至則穀雨是也育長也風或作分合羽者嫗伏毛者孕育嫗伏以氣剖卵也孕者懷胎育生也草木榮華鳥獸卵胎莫見其爲者而功旣成矣旣已也秋風下霜到生挫傷草木首地而生故曰到生挫傷者彫落也鷹鵰搏鷙昆蟲蟄藏鷙讀什伍之十草木注根魚鼈凑淵莫見其爲者滅而無形滅没也形見也木處榛巢水居窟穴聚木曰榛禽獸有芃芃蓐人民有室陸處宜牛馬舟行宜多水匈奴出穢裘匈奴獫狁北胡也干越生葛絺干吳也絺細葛也各生所急以備燥溼各因所處以御寒暑並得其宜物便其所由此觀之萬物固以自然聖人又何事焉事治也九疑之南陸事寡而水事衆九疑山名也在蒼梧虞舜所葬也於是民人被髮文身以像鱗蟲被翦也文身刻畫其體內默其中爲蛟龍之狀以入水蛟龍不害也故曰以像鱗蟲也短綣不絝以便涉游短袂攘卷以便刺舟因之也卷卷臂也因之因水之宜也鴈門之北狄不穀食賤長貴壯俗尚氣力人不㢮弓馬不解勒便之也不穀食肉酪而已北狄鮮卑也弛舍也便習也故禹之裸國解衣而入衣帶而出因之也裸國在南方聖人治禮不求變俗故曰因之也今夫徙樹者失其陰陽之性則莫不枯槁失猶易也故橘樹之江北則化而爲枳鴝鵒不過濟貈渡汶而死見於周禮故春秋傳曰鴝鵒來巢言非中國之禽所以爲魯昭公仁異也形性不可易勢居不可移也是故達於道者反於清淨反本也天本授人清靜之性故曰反也究於物者終於無爲無爲者不爲物爲也以恬養性以漠處神則入於天門所謂天者純粹樸素質直皓白未始有與雜糅者也所謂人者偶䁟智故曲巧僞詐所以俛仰於世人而與俗交者故牛歧蹏而戴角馬被髦而全足者天也絡馬之口穿牛之鼻者人也循天者與道游者也循隨也游行也隨人者與俗交者也夫井魚不可與語大拘於隘也夏蟲不可與語寒言蜩蟬不知寒雪也篤於時也曲士不可與語至道拘於俗束於教也故聖人不以人滑天不以欲亂情天身也不以人事滑亂其身也不以欲亂其情濁之性者也不謀而當不言而信不慮而得不爲而成詩云不識不知順帝之則故曰不謀而當不慮而得也精通於靈府與造化者爲人爲治也夫善游者溺善騎者墮各以其所好反自爲禍禍害也是故好事者未嘗不中中傷也好爲情欲之事者未嘗不自傷也爭利者未嘗不窮也昔共工之力觸不周之山使地東南傾共工以水行霸於伏犧神農間者也非堯時共工也不周山崑崙西北傾猶下也天文言天傾西北地傾東南先言傾高也此言東南後言傾明其下也與高辛爭爲帝高辛帝嚳有天下之號也嚳黃帝之曾孫遂潛於淵宗族殘滅繼嗣絶祀謂共工也越王翳逃山穴越人熏而出之遂不得已已止也翳越太子也賢不欲爲王逃於山穴之中越人以火熏出而立之故曰遂不得已在春秋後故不書於經也由此觀之得在時不在爭治在道不在聖治爲也雖聖不得爲故曰在道孔子是也土處下不爭高故安而不危水下流不爭先故疾而不遲昔舜耕於厯山期年而田者爭處磽埆以封壤肥饒相讓厯山在濟陰成陽也一曰濟南厯城山也墝埆讀人相墝椽之墝釣於河瀆期年而漁者爭處湍瀨以曲隈深潭相予漁讀告語湍瀨水淺流急少魚之處也曲隈崖岸委曲深潭四流饒魚之處覃讀葛覃之覃當此之時口不設言手不指麾口不設不信之言也手不指麾不妄有所規儗也執玄德於心而化馳若神玄天也馳行也若神若有神化之也使舜無其志雖口辯而戸說之不能化一人志王天下之志也一曰人心之志也是故不道之道莽乎大哉道不可道故曰不道之道夫能理三苗朝羽民三苗堯時所放渾敦窮奇饕餮之等理治也羽民南方羽國之民使之朝者德以懷遠也從裸國納肅愼未發號施令而移風易俗者其唯心行者乎裸國在南方禹所入也從化也肅愼北方遠也傅曰肅愼燕亳吾北土也唯仁化爲能然也法度刑罰何足以致之也言不足以致之也明不如仁心化之爲大是故聖人內修其本而不外飾其末保其精神偃其智故漠然無爲而無不爲也能無爲故物無不爲之化澹然無治也而無不治也所謂無爲者不先物爲也所謂不爲者因物之所爲順物之性也所謂無治者不易自然也所謂無不治者因物之相然也然猶宜也原道訓下萬物有所生而獨知守其根根本也百事有所出而獨知守其門門禁要也故窮無窮極無極照物而不眩響應而不乏此之謂天解眩惑也天解天之解故也言能明天意也故得道者志弱而事强弱柔也强無不勝也心虛而應當當合也所謂志弱者柔毳安靜藏於不敢行於不能恬然無慮動不失時與萬物回周旋轉不爲先唱感而應之感動應和是故貴者必以賤爲號貴者謂公王侯伯稱孤寡不穀故曰以賤爲號而高者必以下爲基基始也夫築京臺先從下起也託小以包大在中以制外行柔而剛用弱而强轉化推移得一之道而以少正多而能也能以寡統衆所謂其事强者遭變應卒排患扞難力無不勝敵無不淩應化揆時莫能害之是故欲剛者必以柔守之欲强者必以弱保之積於柔則剛積於弱則强觀其所積以知禍福之鄉鄉方也强勝不若己者至於若己者而同夫强者能勝不如己者同等也至於如己者則等不能勝也言强之爲小也道家所不貴也柔勝出於己者其力不可量夫能弱柔勝己者其力不可訾也言柔之爲大也道家所貴故兵强則滅木强則折革固則裂齒堅於舌而先之弊兵猶火也强則盛盛則衰故曰則滅以火諭也木强則折不能徐屈也革堅則裂鼓是也弊盡齒堅於舌而先舌盡是故柔弱者生之榦也榦質也而堅强者死之徒也徒衆也先唱者窮之路也後動者達之原也先者隤陷故曰窮也後者以謀故曰達也何以知其然也凡人中壽七十𡻕然而趨舍指湊日以月悔也以至於死故蘧伯玉年五十而有四十九年非伯玉衛大夫蘧瑗也今年所行是也則還顧知去年之所行非也𡻕𡻕悔之以至於死故有四十九非所謂月悔朔日悔昨也何者先者難爲知而後者易爲攻也先者上高則後者攀之先者諭下則後者蹷之先者隤陷則後者以謀先者敗績則後者逢之蹷履也音展非展也楚人讀躓爲隤隤者車承或言跋躓之躓也由此觀之先者則後者之弓矢質的也質的射者之準執也猶錞之與刃刃犯難而錞無患者何也以其託於後位也錞矛戈之錞也讀曰頓刃矛戈之刃也刃在前故犯難頓在後故以無患故曰其託於後位也此俗世庸民之所公見也而賢知者弗能避也庸衆也公詳也衆民詳所見知賢者不能避爲鋒刃也以諭利欲也故曰有所屏蔽也所謂後者非謂其底滯而不發凝竭而不流底讀曰紙發動也凝如脂凝也流行貴其周於數而合於時也周調也數術也合於時時行則行時止則止也夫執道理以耦變先亦制後後亦制先道當勝事爲變不必待於先人事當在後趨時當居先也是何則不失其所以制人人不能制也時之反側間不容息言時反側之間不容氣息促之甚也先之則大過後之則不逮夫日囘而月周時不與人游故聖人不貴尺之璧而重寸之陰時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和淨也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大䃺堅莫能與之爭攻大䃺堅諭難也無與聖人之爭也天下之物莫柔弱於水然而大不可極深不可測測盡也脩極於無窮遠渝於無崖息耗減益通於不訾訾量也上天則爲雨露下地則爲潤澤萬物弗得不生百事不得不成大包羣生而無好憎澤及蚑蟯蚑蚑行也蟯微小之蟲也而不求報施而不有也富贍天下而不旣瞻足也旣盡也德施百姓而不費德澤加於百姓不以爲己財費也行而不可得窮極也流膏不止也微而不可得把握也擊之無創刺之不傷斬之不斷焚之不然水之性也淖溺流遁錯繆相紛適逸也錯繆相紛彼此相糺也而不可靡散利貫金石强濟天下水流缺石是其利也舟船所載無有重是其强也濟通也動溶無形之域而翺翔忽區之上忽怳之區上也言其飛爲雲無所不上也邅回川谷之間邅回猶委曲也而淊騰大荒之野有餘不足與天地取與授萬物而無所前後前後皆與之是故無所私而無所公公私一也靡濫振蕩與天地鴻洞鴻大也洞通也讀同異之同也無所左而無所右蟠委錯紾與萬物始終紾轉也是謂至德言水之爲德最大故曰至德也夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於無有入於無間水是也吾是以知無爲之有益有益於生夫無形者物之大祖也無音者聲之大宗也無形生有形故爲物大祖也無音生有音故爲聲大宗祖宗皆本也其子爲光其孫爲水皆生於形乎光無形道所貴也觀之故子爲光也水形而不可毀差之故孫爲水也夫光可見而不可握水可循而不可毀故有像之類莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣出生出生道謂去清淨也入死入死道謂情欲也蹠適也自無形適有形離其本也自有形適無形不能復得道家所棄故曰而以衰賤也是故清靜者德之至也而柔弱者道之要也要約也虛而恬愉者萬物之用也萬物由之得爲人用肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之員不中規方不中矩大渾而爲一葉累而無根無根言微妙也懷囊天地爲道關門門道之門穆忞隱閔純德獨存穆忞隱閔皆無形之類也純不雜糅也布施而不旣用之而不勤旣盡也勤勞也是故視之不見其形聽之不聞其聲循之不得其身無形而有形生焉無形道也有形萬物也無聲而五音鳴焉音生於無聲也無味而五味形焉形或作和也無色而五色成焉是故有生於無實出於虛有形生於無形人也實財也天下爲之圈則名實同居圈陬也名爵號之名也實幣帛之屬也一曰仁義之功賞也音之數不過五宮商角徵羽也而五音之變不可勝聽也變更相生也味之和不過五甘酸鹹辛苦也而五味之化不可勝嘗也化亦變也色之數不過五青赤白黑黃也而五色之變不可勝觀也常事曰視非常曰觀春秋魯隱公觀漁於棠是也故音者宮立而五音形矣言在中央聲之主也形正也味者甘立而五味亭矣亭平也甘中央味也色者白立而五色成矣白者所在以染之故五色可成也道者一立而萬物生矣是故一之理施四海理道也一之解際天地解達也際機也解讀解故之解也其全也純兮若樸樸若玉樸也在石而未剖其散也混兮若濁濁而徐清沖而徐盈澹兮其若深淵沖虛也盈滿也澹定不動之貌汎兮其若浮雲若無而有若亡而存萬物之總皆閱一孔總衆聚也百事之根皆出一門道之門也其動無形變化若神其行無迹常後而先道之先也是故至人之治也至道之人掩其聰明滅其文章依道廢智與民同出於公公正去其誘慕除其嗜欲誘慕諭貪榮勢也故去之也嗜欲情欲也故除之也損其思慮常恬澹也約其所守則察不煩擾也寡其所求則得易供故得夫任耳目以聽視者勞形而不明以知慮爲治者苦心而無功是故聖人一度循軌一齊也軌法也不變其宜不易其常放準修繩曲因其當夫喜怒者道之邪也道貴平和故喜怒爲邪也憂悲者德之失也德尚恬和以憂悲爲失論語曰其德坦蕩是也好憎者心之過也嗜欲者性之累也心當專一中扃外閉反有所好憎故曰過性當清靜以奉天素而反嗜欲故爲之累也人大怒破陰大喜墜陽怒者陰氣也陰爲堅冰積陰相薄故破陰喜者陽氣陽升於上積陽相薄故曰陽墜也薄氣發瘖驚怖爲狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂德之至也通而不變靜之至也變更也嗜欲不載虛之至也不載於性無所好憎平之至也不與物散粹之至也散亂粹純能此五者則通於神明通於神明者得其內者也是故以中制外百事不廢中心也外情欲中能得之則外能收之不養也中之得則五藏甯思慮平五藏甯者各得其所思慮平者本妄喜怒筋力勁强耳目聰明疏達而不悖悖謬也堅强而不鞼鞼折無所大過而無所不逮處小而不逼處大而不窕在小能小在大能大其魂不躁其神不嬈躁狡嬈煩嬈也言精神定矣湫漻寂寞爲天下梟湫漻清靜也寂漠恬淡也梟雄也迫則能應感則能動物穆無窮穆美變無形像言能化也優游委縱如響之與景響應聲影應形登高臨下無失所秉履危行險無忘玄仗玄仗道也能存之此其德不虧萬物紛糅與之轉化以聽天下若背風而馳疾而易也是謂至德至德則樂矣古之人有居巖穴而神不遺者遺失也末世有勢爲萬乘而日憂悲者由此觀之聖亡乎治人而在於得道樂亡於富貴而在於德和之大己而小天下則幾於道矣幾近也許由務光是所謂樂者豈必處京臺章華京臺章華皆楚之大臺游雲夢沙邱雲夢楚澤在南郡華容也沙邱紂臺名也在鉅鹿也耳聽九韶六瑩九韶舜樂也瑩顓頊樂也口味煎熬芬芳馳騁夷道夷平也釣射鷫鷞之樂乎鷫鷞鳥名也長脛緑身其形似雁一曰鳳凰之别名也吾所謂樂者人得其得也夫得其得者不以奢爲樂不以廉爲悲廉猶儉也與陰俱閉與陽俱開故子夏心戰而臞得道而肥子夏名商孔子弟子也入學見先王之道而說之又出見富貴之樂而欲之二者交爭故戰而臞也先王之道勝無所復思故肥也聖人不以身役物不以欲滑和不以身爲物役不以情欲亂中和之道也是故其爲曜不忻欣忻忻爲過制也其爲悲不惙惙惙惙爲傷性也萬方百變消搖而無所定吾獨忼慨遺物而與道同出是故有以自得也自得其天性也喬木之下空穴之中足以適情喬木上疏少陰之木也空穴巖穴也唯處此中夫自得者足以適其情性無以自得也雖以天下爲家萬民爲臣妾不足以養生也言無以自得之人猶以此爲不足也能至於無樂者則無不樂無不樂則至極樂矣至樂至德之樂極亦至也夫建鍾鼓列管弦席旃茵傅旄象管簫也弦琴瑟也傳著也旄旌也象以象牙爲飾也耳聽朝歌北鄙靡靡之樂朝歌紂都鄙邑也紂使師涓作鄙邑靡靡之樂也故師延爲晉平公歌之師曠知之曰亡國之音也齊靡曼之色齊列也靡曼美也陳酒行觴夜以繼日樂不輟也强弩千高鳥走犬逐狡兔此其爲樂也炎炎赫赫怵然若有所誘慕誘進也慕有所思怵然猶惕然解車休馬罷酒徹樂而心忽然若有所喪悵然若有所亡也是何則不以內樂外而以外樂內樂作而喜曲終而悲悲喜轉而相生精神亂營不得須臾平營惑察其所以不得其形不得樂之形也而日以傷生失其得者也是故內不得於中禀授於外而以自飾也不浸於肌膚不浹於骨髓浸潤也浹通也不留於心志不滯於五藏故從外入者無主於中不止從中出者無應於外不行故聽善言便計雖愚者知說之稱至德高行雖不肖者知慕之說之者眾而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也夫內不開於中而强學問者不入於耳而不著於心此何以異於聾者之歌也效人爲之而無以自樂也聲出於口則越而散矣散去耳不聞也夫心者五藏之主也所以制使四支流行血氣馳騁於是非之境而出入於百事之門戸者也是故不得於心而有經天下之氣是猶無耳而欲調鍾鼓無目而欲喜文章也亦必不勝其任矣經理故天下神器不可爲也器物用也爲治也爲者敗之執者失之夫許由小天下而不以己易堯者志遺於天下許由陽城人也箕山之隱士也堯以其賢聘之欲禪天下焉不肯就故曰志遺於天下也所以然者何也因天下而爲天下也天下之要不任於彼而在於我彼謂堯也我謂許由不在於人而在於我身身得則萬物備矣徹於心術之論則嗜欲好憎外矣外不在心是故無所喜而無所怒無所樂而無所苦萬物玄同也玄天也無非無是化育玄燿生而如死玄天也耀明也生而如死無所欲夫天下者亦吾有也吾亦天下之有也天下之與我豈有間哉言相比也夫有天下者豈必攝權持勢操殺生之柄而以行其號令邪吾所謂有天下者非謂此也自得而已自得其天性也一曰不失其身也自得則天下亦得我矣吾與天下相得則常相有已又焉有不得容其間者乎所謂自得者全其身者也全其身則與道爲一矣故雖游於江潯海裔潯崖也裔邊也潯讀葛覃之覃也馳要裊建翠蓋駟駕要裊馬名也日行萬里裊撓弱之撓翠蓋以翠裊羽飾蓋也目觀掉羽武象之樂掉羽羽舞武象周武王之樂耳聽淊朗奇麗激抮之音激有激揚抮轉皆曲名也揚鄭衛之浩樂結激楚之遺風鄭聲鄭會晉平公說新聲使師延爲桑間濮上之樂濮在衛地故鄭衛之浩樂也結激清楚之聲也必爲鄭爲之俗樂夫結激清楚以娛樂也遺風猶餘聲也射沼濱之高鳥逐苑囿之走獸此齊民之所以淫泆流湎齊於凡民故曰齊民也沼池也濱水崖也聖人處之不足以營其精神亂其氣志營惑也使心怵然失其情性處窮僻之鄉側谿谷之間側伏也隱於榛薄之中藂木曰榛深草曰薄環堵之室茨之以生茅蓬戸瓮牖揉桑爲樞堵長一丈高一丈面環一堵爲方一丈故曰環者言其小也編蓬爲戸以破瓮蔽牖揉桑條以爲元樞上漏下濕潤浸北房浸漬也北房陰堂也雪霜瀼灖浸潭苽蔣瀼灖雪霜之貌也浸潭之潤以生苽蔣實蓏者蔣實也其米曰𦸔胡瀼讀繀繩之繀灖讀校滅之校苽讀觚哉之觚也蔣讀水漿之漿也逍遙於廣澤之中而仿洋於山峽之旁兩山之間爲峽此齊民之所爲形植黎累憂悲而不得志也聖人處之不爲愁悴怨懟懟也病而不失其所以自樂也是何也則內有以通於天機機發也而不以貴賤貧富勞逸失其志德者也故夫烏之啞啞鵲之唶唶豈嘗爲寒暑燥濕變其聲哉言體道者不爲貴賤貧富勞逸易其志如鳥鵲之不爲寒暑易其聲是故夫得道已定而不待萬物之惟移也非以一時之變化而定吾所以自得也吾所謂得者性命之情處其所安也夫性命者與形俱出其宗宗本形備而性命成性命成而好憎生矣故士有一定之論女有不易之行士有同志同志德也至其交接有一會而公定故曰有一定之論也貞女專一亦無二心雖有偏喪不復更醮故曰有不易之行者也規矩不能方圓鉤繩不能曲直雖規矩鉤繩無以施於此天地之永登邱不可爲脩居卑不可爲短是故得道者窮而不懾達而不榮雖窮賤不以爲懾懼也雖顯達不以爲榮幸也處高而不機機危也持盈而不傾傾覆也新而不㓪久而不渝㓪明也渝變也㓪讀汝南㓪陵之㓪入火不焦入水不濡是故不待勢而尊不待財而富不待力而强平虛下流與化翺翔翺翔猶傾仰也若然者藏金於山藏珠於淵舜藏金於靳巖之山藏珠於五湖之淵以塞貪淫之欲也不利貨財不貪勢名勢位爵號之名也是故不以康爲樂康安也不以慊爲悲慊約也慊讀辟向慊之慊也不以貴爲安不以賤爲危形神氣志各居其宜以隨天地之所爲夫形者生之舍也氣者生之充也神者生之制也一失位則二者傷矣是故聖人使人各處其位守其職而不得相干也故夫形者非其所安也而處之則廢氣不當其所充而用之則泄神非其所宜而行之則昧昧不明也此三者不可不愼守也夫舉天下萬物蚑蟯貞蟲蚑行蟯動之蟲也蟯讀饒貞蟲細腰之屬也蝡動蚑作蚑讀鳥蚑步之蚑也皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨肉無倫矣去之去逆也則骨肉靡滅無倫匹也今人之所以眭然能視眭讀曰桂營然能聽䁝讀疾營之營也形體能抗抗讀扣耳之扣而百節可屈伸察能分白黑視醜美而知能别同異明是非者何也氣爲之充而神爲之使也何以知其然也凡人之志各有所在而神有所繫者其行也足蹪趎埳頭低植木而不自知也蹪躓也楚人讀躓爲蹪知猶覺也招之而不能見也呼之而不能聞也不能見招之者不能間呼之者耳目去之也然而不能應者何也神失其守也精神失其所守故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右若楚白公勝將欲慮亂立於朝倒杖策上貫其頭血流至地而不覺此之類也無所不充則無所不在精神無所不充在存也是故貴虛者以毫末爲宅虛者情無所念慮也以毫末爲宅者言精微也今夫狂者之不能避水火之難而越溝瀆之險者豈無形神氣志哉然而用之異也與人異也失其所守之位而離其外內之舍是故舉錯不能當動靜不能中當合也中適也終身運枯形于連嶁列埒之門運行也枯輔病也形體也于於也連嶁猶離嶁也委曲之類列埒不平均也連讀陵聾幽州陵陵蓮之連嶁讀㟝嶁無松栢之嶁而蹪蹈於污壑穽陷之中污壑大壑壑讀赫赫明明之赫雖生俱與人鈞然而不免爲人戮笑者何也形神相失也故以神爲主者形從而利以形爲制者神從而害神清靜故利形有情欲故害也貪饕多欲之人漠㬆於勢利誘慕於名位漠㬆猶鈍㬆不知足類誘進也慕貪漠溺之漠㬆讀織絹緻密㬆無間孔之㬆也冀以過人之智植於高世冀猶庶幾也植立也庶幾立高名於世也則精神日以耗而彌遠耗秃也久淫而不還淫過還復形閉中距則神無由入矣神精神也清淨之性無從還入也是以天下時有盲妄自失之患此膏燭之類也火逾然而消逾亟亟疾也逾益也夫精氣志者靜而日充者以壯躁而日耗者以老是故聖人將養其神和弱其氣平夷其形而與道沈浮俛仰沈浮猶盛衰俛仰猶升降恬然則縱之迫則用之其縱之也若委衣其用之也若發機機弩機關言其疾也如是則萬物之化無不遇遇時也而百事之變無不應發應當之也俶眞訓上俶始也眞實說道之實始於無有化育於有故曰俶眞因以題篇有始者天地開闢之始也有未始有有始者言萬物萌兆未始有始者始成形也有未始有夫未始有有始者言天地合氣寂寞蕭條未始有也夫未始有始彷彿也有有者言萬物始有形兆也有無者言天地浩大言無可名也有未始有有無者有未始有夫未始有有無者所謂有始者繁憤未廢萌兆牙糵未有形埒垠堮無旡蝡蝡將欲生興而未成物類繁憤眾積之貌發憤也有未始有有始者天氣始下地氣始上陰陽錯合相與優游競暢於宇宙之間被德含和繽紛蘢蓯欲與物接而未成兆朕競逐也暢達也和氣也繽紛雜糅也蘢蓯聚會也兆朕形怪也有未始有夫未始有有始者天含和而未降地懷氣而未揚虛無寂寞蕭條霄雿無有仿佛氣遂而大通㝠㝠者也霄讀紺綃之綃雿翟氏之翟也有有者言萬物摻落根莖枝葉青葱苓蘢雚蔰炫煌蠉飛蝡動蚑行噲息可切循把握而有數量摻讀參星之參雚蔰炫煌采色貌也蚑讀車蚑轍之蚑噲讀不說懌外之噲切摩也循順也雚讀曰唯也蔰讀曰扈有無者視之不見其形聽之不聞其聲捫之不可得也望之不可極也儲與扈治儲與扈治褒大意也浩浩瀚瀚不可隱儀揆度而通光耀者浩浩瀚瀚廣大貌也光耀無形有未始有有無者包裹天地陶冶萬物大通混冥深閎廣大不可爲外析豪剖芒不可爲內無環堵之宇而生有無之根混眞大㝠之中謂道也有未始有夫未始有有無者天地未剖陰陽未判剖判混分四時未分萬物未生汪然平靜寂然清澄莫見其形汪讀傳尸諸周氏之汪同若光耀之間於無有退而自失也自失没不見也曰予能有無而未能無無也能有無爲也未能本性自無爲也故曰未能無也及其爲無無至妙何從及此哉夫大塊載我以形勞我以生大塊天地之間也逸我以老休我以死莊子曰生乃徭役死乃休息也故曰休我以死善我生者乃所以善吾死也善吾生之樂乃欲善吾死之樂也明死變化有知欲勸人同死生也夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨趨走寐者不知猶有所遁夜半有力者負舟與山走故寐者不知也若藏天下於天下則無所遁其形矣大丈夫以天下爲室以藏萬物物豈可謂無大揚攉乎揚攉無慮大數名也攉讀鎬京之鎬一範人之形而猶喜範猶遇也遭也說範法也言物一法效人形尚由善也若人者千變萬化而未始有極也言死生變化而夢故曰末始有極也弊而復新其爲樂也可勝計耶譬若夢爲鳥而飛於天夢爲魚而没於淵方其㝱也不知其㝱也覺而後知其㝱也今將有大覺然後知今此之爲大㝱也始吾未生之時焉知生之樂也今吾未死又焉知死之不樂也昔公牛哀轉病也七日化爲虎轉病易病也江淮之間公牛氏有易病化爲虎若中國有狂疾者發作有時也其爲虎者便還食人食人者因作眞虎不食人者更復化爲人公牛氏韓人淮南之人因牛食芻謂之芻豢有驗於此其兄掩戸而入覘之則虎搏而殺之殺其兄掩讀曰奄也覘視也是故文章成獸爪牙移易移易人爪牙爲虎爪牙也志與心變神與形化志心皆變神形皆化方其爲虎也不知其嘗爲人也方其爲人不知其且爲虎也二者代謝舛馳各樂其成形代更也謝叙也舛牙也形謂成虎形人舛讀舛賣之舛也狡猾鈍惽是非無端孰知其所萌萌生也夫水嚮冬則凝而爲氷氷迎春則泮而爲水氷水移易於前後若周員而趨孰暇知其所苦樂乎泮釋也趨歸也是故形傷於寒暑燥濕之虐者形苑而神壯苑枯病也壯傷也苑讀南陽苑神傷乎喜怒思慮之患者神盡而形有餘故罷馬之死也剝之若槁罷老氣力竭盡故若槁也狡狗之死也割之猶濡狡少也濡濡溼氣力未盡是故傷死者其鬼嬈嬈煩嬈善行病祟人時旣者其神漠旣盡也時旣當老者則神寂漠漠定也是皆不得形神俱没也道家養形養神皆以壽終形神俱没不俱漠而已也老子曰以道涖天下其鬼不神此謂俱没也夫聖人用心杖性依神相扶而得終始是故其寐不㝱其覺不憂精神無所思慮故不㝱志存仁義患不得至故不憂也古之人有處混冥之中神氣不蕩於外萬物恬漠以愉靜攙搶衡杓之氣莫不彌靡攙搶彗孛也杓北斗柄第七星而不能爲害當此之時萬民猖狂不知東西含哺而游鼓腹而熙鼓擊也熙戲也交被天和食於地德交俱也和氣也地德五穀不以曲故是非相尤茫茫沈沈是謂大治曲故曲巧也尤過也茫茫沈沈盛貌也茫讀王莽也沈讀水出沈沈沈白之沈於是在上位者左右而使之毋淫其性鎮撫而有之毋遷其德是故仁義不布而萬物蕃殖古者抱盛德上質樸不待仁義而萬物蕃俎也賞罰不施而天下賔服服其德也其道可以大美興而難以算計舉也言大性萬物但可以大美興而育之難以算計具也是故日計之不足而𡻕計之有餘以限計之故有餘也譬若梅矣百梅足以爲百人酸一梅不足爲百人酸也夫魚相忘於江湖人相忘於道術言各得其志故相忘也古之眞人立於天地之本中至優游抱德煬和而萬物雜累焉煬炙也抱其志德而炙於和氣故萬物雜累言成熟也煬讀供養之養也孰肯解構人間之事以物煩其性命乎解構猶合會也煩辱也夫道有經紀條貫得一之道連千枝萬葉一者道本得其根本故能連理千枝萬葉以少正多也是故貴有以行令賤有以忘卑貧有以樂業困有以處危夫大寒至霜雪降然後知松栢之茂也據難履危利害陳於前陳列也然後知聖人之不失道也是故能戴大貟者履大方言能戴天履地之道鏡太清者視大明立太平者處大堂太平天下之平也大堂明堂所以告朔行令也能游冥冥者與日月同光光明也論德道者能與日月明也是故以道爲竿以德爲綸禮樂爲鉤仁義爲餌投之於江浮之於海萬物紛紛孰非其有夫梜依於跂躍之術跂躍猶齟齬不正之道也提挈人間之際撢掞挺挏世之風俗撢引掞利也挺挏猶上下也以求利便也以摸蘇牽連物之微妙摸蘇猶摸索微妙猶細小猶得肆其志充其欲何況懷瓌瑋之道忘肝膽遺耳目獨浮游無方之外不與物相弊摋弊摋猶雜揉也弊讀跂涉之跋也摋讀楚人言殺也中徙倚無形之域而和以天地者乎若然者偃其聰明而抱其太素素樸性也以利害爲塵垢塵垢諭輕也以死生爲晝夜是故目觀玉輅琬象之狀耳聽白雪清角之聲不能以亂其神玉輅王者所乘有琬琰象牙之飾白雪師曠所奏大一五弦之琴樂曲神物爲下降者清角商聲也登千仞之谿臨蝯眩之岸不足以滑其和蝯臨其岸而目眩言滑滑亂和適也譬若鐘山之玉炊以爐炭三日三夜而色澤不變則至德天地之精也鐘山崑崙也是故生不足以使之利何足以動之死不足以禁之害何足以恐之明於死生之分達於利害之變雖以天下之大易骭之一毛無所槩於志也骭自膝以下脛以上也骭讀閈收之閈也夫貴賤之於身也猶條風之時麗也條風鳴條言其迅也麗過也毀譽之於己猶蚉之一過也夫秉皓白而不黑行純粹而不糅處玄㝠而不闇休於天鈞而不僞僞敗也天鈞北極之地積寒之野休之輒敗唯體道能不敗也孟門終隆之山不能禁孟門山名太行之隘也終隆則終南山在扶風皆險塞也唯體道能不敗湍瀨旋淵呂梁之深不能留也湍瀨急流也旋淵深淵也呂梁水名也在彭城皆水險留滯也太行石澗飛狐句望之險不能難也太行在野王北上黨關也石澗深谿飛孤在代郡句望在鴈門皆險隘也是故身處江海之上而神游魏闕之下魏闕王者門外闕也所以縣教象之書於象魏也巍巍高大曰魏闕言眞人雖在遠方心存王也一曰心下巨闕神內守也非得一原孰能至於此哉一原道之原也是故與至人居使家忘貧使王公簡其貴富而樂卑賤勇者衰其氣貪者消其欲坐而不教立而不議虛而往者實而歸故不言而能飲人以和諭道如川不言而能飲人以和適也是故至道無爲一龍一蛇龍能化蛇能解脫故道以爲譬盈縮卷舒與時變化外從其風內守其性耳目不燿思慮不營營惑也其所居神者臺簡以游太清臺猶持也簡大也引楯萬物羣美萌生引楯拔擢也楯讀允允恭之允也是故事其神者神去之事治也休其神者神居之不動擾道出一原通九門九門天之門也散六衢散布於六合之衢也設於無垓坫之宇設施也垓坫垠堮也垓讀人飲食大多以思下垓坫讀爲管氏有反坫之坫寂漠以虛無非有爲於物也物以有爲於己也非有爲於物者不爲之也物以有爲於己者物己爲也是故舉事而順於道者非道之所爲也道之所施也夫天之所覆地之所載六合所包陰陽所呴雨露所濡道德所扶此皆生一父母而閱一和也父母天地閱總也和氣也道所貴也呴讀以口相吁之吁是故槐榆與橘柚合而爲兄弟言道能化同異物也有苗與三危通爲一家有苗國在南方彭蠡舜時不服者三危在西極山名在辰州通爲一家道所化也夫目視鴻鵠之飛耳聽琴瑟之聲而心在雁門之間一身之中神之分離剖判六合之內一舉而千萬里是故自其異者視之肝膽胡越肝膽喻近胡越諭遠自其同者視之萬物一圈也圈陬百家異說各有所出若夫墨楊申商之於治道墨墨翟也其術兼愛非樂摩頂放踵而利國者爲之楊楊朱其術全性保眞雖拔骭一毛而利天下弗爲也申申不害也韓昭侯相著三符之命而尚刻削商者魏公孫鞅也爲秦孝公制相坐之法嚴猛聞故封之爲商君也因謂之商鞅猶蓋之無一橑而輪之無一輻有之可以備數無之未有害於用也己自以爲獨擅之不通之於天地之情也今夫治工之鑄器鑄讀如唾祝之祝也金踴躍於鑪中必有波溢而播棄者其中地而凝滯亦有以象於物者矣其形雖有所小周哉然未可以保於周室之九鼎也有況比於規形者乎其與道相去亦遠矣今夫萬物之䟽躍枝舉百事之莖葉條梓皆本於一根而條循千萬也䟽躍布散也梓讀詩頌苞有三葉同若此則有所受之矣而非所授者所受者無授也而無不受也無不受也者譬若周雲之蘢蓯遼巢彭濞而爲雨周雲密雨雲也蘢蓯聚合也遼巢彭濞藴積貌也濞榆莢之濞沈溺萬物而不與爲濕焉不與萬物俱濕今夫善射者有儀表之度如工匠有規矩之數此皆所得以至於妙有所得儀表規矩之巧也然而奚仲不能爲逢蒙奚仲巧爲車逢蒙善於射言未能相兼也造父不能爲伯樂者造父善御馬事周穆王伯樂善相馬事秦繆公是曰諭於一曲而不通於萬方之際也今以涅染緇則黑於涅以藍染青則青於藍涅非緇也青非藍也兹雖遇其母而無能復化已涅礬石也母本也是何則以諭其轉而益薄也何況夫未始有涅藍造化之者乎其爲化也雖鏤金石書竹帛何足以舉其數鏤讀婁數之婁由此觀之物莫不生於有也有猶住也小大優游矣言饒多也夫秋豪之末淪於無間而復歸於大矣秋豪微妙故能入於無間間孔言道無形以豪末比道猶復爲大也蘆符之厚通於無𡏴而復反於敦龐厚猶薄蘆葦也符蘆之中白符言其薄柯則歸於葦故曰反於敦龐矣符讀麫䴸之䴸也若夫無秋毫之微蘆符之厚四達無境通於無圻道貫無形秋毫蘆符已有形故曰無秋豪之微蘆符之厚四達無境通於無圻圻垠字也而莫之要御夭遏者其襲微重妙挺挏萬物揣丸變化道之所能天地之間何足以論之言道所化者大夫疾風㪍木而不能拔毛髮㪍亦拔也雲臺之高墮者折脊碎腦而蟁蝱適足以翺翔臺高際於雲因曰雲臺也蟁蝱微細故曰翺翔而無傷毀之患道所貴也夫與蚑蟯同乘天機蚑行蟯動諭微細也天機神馬天受形於一圈飛輕微細者猶足以脫其命又況未有類也類形象也未有形象道所尚也由此觀之無形而生有形亦明矣是故聖人託其神於靈府而歸於萬物之初視於冥冥聽於無聲冥冥之中獨見曉焉曉明也寂漠之中獨有照焉其用之也以不用其不用也而後能用之其知也乃不知其不知也而後能知之也夫天不定日月無所載載行也地不定草木無所植植立也所立於身者不甯是非無所形形見也是故有眞人然後有眞知知不詐故曰眞也其所持者不明庸愚詎知吾所謂知之非不知歟今夫積惠重厚累愛襲恩以聲華嘔符嫗掩萬民百姓使知之訢訢然人樂其性者仁也舉大功立顯名體君臣正上下明親疏等貴賤存危國繼絶世決挐治煩興毀宗立無後者義也閉九竅藏心志棄聰明反無識芒然仿佯於塵埃之外而消搖於無事之業含陰吐陽而萬物和同者德也是故道散而爲德德溢而爲仁義仁義立而道德廢矣百圍之木斬而爲犧尊犧讀日月猶疏鏤之尊鏤之以剞𠜾雜之以青黃剞巧工鈎刀也𠜾者規度刺畫墨邊箋也所以刻鏤之具也青黃采色之飾也剞讀枝之技𠜾讀詩蹶角之蹶也華藻鎛鮮龍蛇虎豹曲成文章華藻華文也鎛今之金尊也鮮明好也龍蛇虎豹者刻尊彝爲蟠龍伏虎之狀故曰曲成文章也然其斷在溝中壹比犧尊溝中之斷則醜美有間矣間遠也方其好醜相去遠也然而失木性鈞也鈞等是故神越者其言華越散也言不守也故華而不實德蕩者其行僞蕩逸僞不成也至精亡於中而言行觀於外此不免以身役物矣與物爲役夫趨舍行僞者爲精求於外也精有湫盡而行無窮極則滑心濁神而惑亂其本矣其所守者不定於外淫於世俗之風風化也所斷差跌者而內以濁其清明是故躊躇以終而不得須臾恬澹矣是故聖人內修道術而不外飾仁義不知耳目之宣而游於精神之和若然者下揆三泉上尋九天橫廓六合揲貫萬物此聖人之游也若夫眞人則動溶於至虛而游於滅亡之野騎蜚廉而從敦圄蜚廉獸名長毛有翼敦圄也虎而小一曰仙人名也馳於方外休乎宇內燭十日而使風雨臣雷公役夸父夸父仙人棄其策而爲鄧林也妾宓妃妻織女天地之間何足以留其志是故虛無者道之舍平易者道之素素性也俶眞訓下夫人之事其神而嬈其精營慧然而有求於外此皆失其神明而離其宅也事治也嬈煩也營慧求索名利者也故曰有求於外離宅離精神之宅也是故凍者假兼衣於春而暍者望冷風於秋天有病於內者必有色於外矣夫梣木色青翳梣木苦厯木名也生於山剝取其皮以水浸之正青用洗眼瘉人目中膚翳故曰色青翳青色象也而蠃瘉蝸睆蠃蝱薄蠃蝸睆目疾也此皆治目之藥也人無故求此物者必有蔽其明者聖人之所以駭天下者眞人未嘗過焉駭動也賢人之所以矯世俗者聖人未嘗觀焉矯拂也夫牛蹏之涔無尺之鯉涔潦水也涔讀延祰曷間急氣閉口言也塊阜之山無丈之材小山也在陳留所以然者何也皆其營宇狹小而不能容巨大也又況乎以無裹之者耶無裹無形此其爲山淵之勢亦遠矣此無有議長大夫人之拘於世也必形繫而神泄故不免於虛形繫者身形疾而精神趨泄不處其守故曰不免於虛疾使我可係羈者必其有命在於外也至德之世甘暝於溷澖之域澖讀閑放之閑言無垠虛之貌而徙倚於汗漫之宇徙倚猶汗漫無生形形生元氣之本神也故盧敖見若士者言曰吾與汗漫期於九垓之上是也宇居也提挈天地而委萬物以鴻濛爲景柱而浮楊乎無畛崖之際一手曰提挐舉也委棄也言不以身役物鴻濛東方之野日所出故以爲景柱浮楊猶遨翔也無畛崖畔界因以爲名也是故聖人呼吸陰陽之氣而羣生莫不顒顒然仰其德以和順當此之時莫之領理決離隱密而自成渾渾蒼蒼純樸未散渾渾蒼蒼混沌之貌故曰純樸未散也旁薄爲一而萬物大優優饒也是故雖有羿之知而無所用之是說上古之時也但甘卧治化自行故曰雖有羿之知其無所用之是堯時羿也謂能射十日繳大風殺窫窳斬九嬰射河伯之知巧也非有窮后羿也及世之衰也至伏羲氏其道昧昧芒芒然吟德懷和伏羲氏以木德王天下號曰太皥昧昧純厚也芒芒廣大貌也吟詠其德含懷其和氣未大宣布也被施頗烈被讀光被四表之彼也被其德澤頗烈施於民而知乃始昧昧晽晽皆欲離其童蒙之心昧昧欲明而未也晽晽欲所知之貌也離去也而覺視於天地之間是故其德煩而不能一煩多也一齊也乃至神農黃帝剖判大宗竅領天地襲九窾重九𤍂竅通也領理也襲因也窾法也𤍂形也言因九天九地之形法以通理也提挈陰陽嫥捖剛柔枝解葉貫萬物百族嫥捖和調也族類也使各有經紀條貫貫位也於此萬民睢睢盱盱然莫不竦身而載聽視睢睢盱盱聽視之貌也是故治而不能和和協也下棲遲至於昆吾夏后之世昆吾夏伯桀世也嗜欲連於物聰明誘於外而性命失其得性命之本施及周室之衰澆淳散樸施讀難易之易也雜道以僞儉德以行雜粈而巧故萌生巧言爲詐周室衰而王道廢儒墨乃始列道而議分徒而訟儒孔子道也墨墨翟術也徒黨也訟爭是非也於是博學以疑聖華誣以脅眾博學楊墨之道以疑孔子之術設虛華之言以誣聖人劫脇徒眾也弦歌鼓舞緣飾詩書以買名譽於天下爲以求之繁登降之禮飾紱冕之服聚眾不足以極其變積財不足以贍其費於是萬民乃始慲觟離跂慲讀蕭蕭無逢際之慲觟傒徑之傒也各欲行其知僞以求鑿枘於世而錯擇名利錯施也擇取也求索也言施其巧僞索榮顯之名利也故下句言曼衍於淫荒之陂也是故百姓曼衍於淫荒之陂而失其大宗之本陂或作野夫世之所以喪性命有衰漸以然所由來者久矣是故聖人之學也欲以反性於初而游心於虛也人受天地之中以生孟子曰性無不善而情欲害之故聖人能返其性於初也游心於虛言無欲也達人之學也欲以通性於遼郭而覺於寂漠也若夫俗世之學也則不然擢德𢶊性內愁五藏外勞耳目擢取也𢶊縞也皆不循其理故愁其思慮也耳妄聽目妄視淫故勞也乃始招蟯振繾物之毫芒搖消掉捎仁義禮樂暴行越智於天下以招號名聲於世搖消掉捎仁義禮樂未之能行也越揚也暴卒也越揚其詐譎之智以取聲名也此我所羞而不爲也是故與其有天下也不若有說也說樂也不若有人說樂之也與其有說也不若尚羊物之終始也而條達有無之際是故舉世而譽之不加勸舉世而非之不加沮定於死生之境而通於榮辱之理雖有炎火洪水彌靡於天下神無虧缺於胷臆之中矣若然者視天下之間猶飛羽浮芥也芥中也孰肯分分然以物爲事也分猶意念之貌水之性眞清而土汨之人性安靜而嗜欲亂之夫人之所受於天者耳目之於聲色也口鼻之於芳臭也肌膚之於寒燠其情一也或通於神明或不免於癡狂者何也其所爲制者異也是故神者智之淵也淵清則智明矣智者心之府也智公則心平矣人莫鑑於流沬而鑑於止水者以其靜也沫雨潦上沫起覆甌也言其濁擾不見人形也莫窺形於生鐵而窺於明鏡者以覩其易也易讀河間易縣之易夫唯易且靜形物之性也形見由此觀之用也必假之於弗用也是故虛室生白吉祥止也虛心也室身也白道也能虛其心以生於道道性無欲吉祥來止舍也夫鑑明者塵垢弗能薶薶污也薶讀倭語之倭也神清者嗜欲弗能亂神清者精神內守也情之嗜欲不能干亂精神以越於外而事復返之越散也事治也是失之於本而求之於末也外內無符而欲與物接弊其玄光而求知之於耳目玄光內明也一曰玄天也是釋其炤炤而道其冥冥也是之謂失道心有所至而神喟然在之反之於虛則消鑠滅息此聖人之游也反之於虛則情欲之性消鑠滅息故曰聖人之游游行也故古之治天下也必達乎性命之情其舉錯未必同也其合於道一也夫夏日之不被裘者非愛之也燠有餘於身也冬日之不用翣者非簡之也清有餘於適也翣扇也翣讀鵝鶩食唼喋之唼簡賤也夫聖人量腹而食度形而衣節於己而已貪污之心奚由生哉故能有天下者必無以天下爲也能有名譽者必無以趨行求者也以用也聖人有所於達達則嗜欲之心外矣外棄也孔墨之弟子皆以仁義之術教導於世然而不免於儡身猶不能行也又況所教乎儡身身不見用儡儡然也儡讀雷同之雷是何則其道外也夫以末求返於本許由不能行也又況齊民乎齊民凡民齊於民也誠達於性命之情而仁義固附矣趨捨何足以滑心若夫神無所掩心無所載通洞條達恬漠無事無所凝滯虛寂以待勢利不能誘也誘惑也進也辯者不能說說釋也聲色不能淫也美者不能濫也濫覦也或作監不能使之過濫知者不能動也勇者不能恐也此眞人之道也若然者陶冶萬物與造化者爲人爲治也天地之間宇宙之內莫能夭遏間上下之間也內四方之內也夫化生者不死而化物者不化化生者天也化物者德也神經於驪山太行而不能難驪山今在京兆新豐縣南也太行今在河內野王縣北也入於四海九江而不能濡四海四方之海也九江江分爲九也處小隘而不塞橫扃天地之間而不窕扃猶閉也不通此者雖目數千羊之羣耳分八風之調目視耳聽也八風八卦之風調和也足蹀陽阿之舞而手會緑水之趨陽阿古之名倡也緑水舞曲也一曰綠水古詩也趨投節也智終天地明照日月辯解連環澤潤玉石猶無益於治天下也澤潤澤也靜漠恬澹所以養性也和愉虛無所以養德也外不滑內則性得其宜性不動和則德安其位養生以經世抱德以終年可謂能體道矣若然者血脉無鬱滯五藏無蔚氣蔚病也禍福弗能撓滑非譽弗能塵垢故能致其極極至非有其世孰能濟焉有其人不遇其時身猶不能脫又況無道乎道不得行且人之情耳目應感動心志知憂樂手足之㩌疾𧒃辟寒暑所以與物接也蜂蠆螫指而神不能憺螫讀解釋之釋憺定也蚊蝱噆膚而知不能平噆噬猶穿夫憂患之來攖人心也攖迫也非直蜂蠆之螫毒而蚉蝱之慘怛也而欲靜漠虛無奈之何哉夫目察秋毫之末耳不聞雷霆之聲耳調玉石之聲目不見太山之高何則小有所志而大有所忘也今萬物之來擢拔吾悟攓取吾情有若泉源雖欲勿禀其可得邪禀猶動用也今夫樹木者灌以瀿水疇以肥壤疇雍壤或作嘹一人養之十人拔之則必無餘𣖂𣖂蘖有況與一國同伐之哉雖欲久生豈可得乎今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方貟察見人神易濁而難清猶盆水之類也況一世而撓滑之曷得須臾平乎古者至德之世賈便其肆農樂其業大夫安其職職事而處士脩其道道先王之道也當此之時風雨不毀折草木不夭九鼎重味珠玉潤澤九鼎九州貢金所鑄也一曰象九德故曰九鼎也重厚也潤澤有光也洛出丹書河出綠圖故許由方回善卷披衣得達其道許由陽城人也堯所聘而不利也方回善卷披衣皆堯時隱士姓名不可得知其人方直回旋因曰方回見其善卷披衣而行因曰披衣得達樂其所脩先王之道也何則世之主有欲利天下之心是以人得自樂其間自樂其道於天地之間也或作文德自樂其間先王之道也四子之才非能盡善蓋今之世也然莫能與之同光者遇唐虞之時光譽逮至夏桀殷紂燔生人辜諫者爲炮烙鑄金柱鑄金柱然火其下以人置其上人墜侈火中而對之笑也剖賢人之心析才士之脛賢人比干也析解也剝解有才士脚觀其有奇異脛脚也醢鬼侯之女葅梅伯之骸鬼侯梅伯紂時諸侯梅伯說鬼侯之女美好令紂妻之女至紂以爲不好故醢鬼侯之女葅梅伯之骸也一曰紂爲無道梅伯數諫故葅其骸也當此之時嶢山崩三川涸嶢山蓋在南陽三川涇渭汧也涸竭也傳曰山崩川竭亡國徵也飛鳥鍛翼走獸擠脚言紂田獵禽荒無休止時故飛鳥折翼走獸毀脚無不被害也當此之間豈獨無聖人哉然而不能通其道者不遇其世言聖人不能通其道行其仇者不遭世也夫鳥飛千仞之上獸走叢薄之中禍猶及之又況編戸齊民乎聚木曰叢深草曰薄猶及之田獵不時也由此觀之體道者不專在於我亦有繫於世矣夫厯陽之都一夕反而爲湖勇力聖知與罷怯不肖者同命厯陽淮南國之縣名今屬江都昔有老嫗常行仁義有二諸生過之謂曰此國當没爲湖謂嫗視東城門閫有血便走上北山勿顧也自此嫗便往視門閫閽者問之嫗對曰如是其暮門吏故殺鷄血塗門閫明旦老嫗早往視門見血便上北山國没爲湖與門吏言其事適一宿宿耳一夕旦而爲湖也勇怯同命無遺脫也巫山之上順風縱火膏夏紫芝與蕭艾俱死巫山在南郡膏夏大木也其理密白如膏故曰膏夏紫芝皆諭賢智也蕭艾賤草皆諭不肖故河魚不得明目穉稼不得育時其所生者然也河水濁故不得明目穉稼爲霜所凋故不得待其自熟時故曰其所生然也故世治則愚者不得獨亂世亂則智者不能獨治身蹈於濁世之中而責道之不行也是猶兩絆騏驎而求其致千里也兩者雙也置猨檻中則與豚同非不巧捷也無所肆其能也肆極舜之耕陶也不能利其里所居之里南面王則德施乎四海四海天下仁非能益也處便而勢利也古之聖人其和愉甯靜性也其志得道行命也命天命也是故性遭命而後能行命得性而後能明得其本清靜之性故能明鳥號之弓谿子之弩不能無弦而射鳥號柘桑也谿子爲弩所出國名也或曰谿蠻夷也以柘桑爲弩因曰谿子之弩也一曰谿子陽鄭國善爲弩匠因以爲名也越舲蜀艇不能無水而浮舲小船也蜀船一版之舟若今豫章是也雖越人所便習若無其水不能獨浮也今矰繳機而在上𦉾罟張而在下雖欲翺翔其勢焉得矰弋射身短矢也機發也翺翔鳥之高飛翼上下曰翺直刺不動曰翔也故詩云采采卷耳不盈傾筐嗟我懷人寘彼周行以言慕遠世也詩周南卷耳篇也言采采易得之菜不滿易盈之器以言君子爲國執心不精不能以成其道采易得之菜不能盈易滿之器也嗟我懷人寘彼周行言我思古君子官賢人置之列位也誠古之賢人各得其行列故曰慕遠也天文訓上文者象也天先垂文象日月五星及彗孛皆謂以譴告一人故曰天文因以題篇天墜未形馮馮翼翼洞洞灟灟故曰太昭馮翼洞灟無形之貌洞讀挺桐之桐灟讀以鐵頭斫地之鐲也道始於虛霩虛霩生宇宙宇宙生氣氣有漢垠宇四方上下也宙往古來今也將成天地之貌也漢垠重安之貌也清陽者薄靡而爲天薄靡者若埃飛揚之貌重濁者凝滯而爲地清妙之合專一作專易重濁之凝竭難故天先成而地後定天地之襲精爲陰陽襲合也精氣也陰陽之專精爲四時四時之散精爲萬物積陽之熱氣生火火氣之精者爲日積陰之寒氣者爲水水氣之精者爲月日月之淫爲精者爲星辰天受日月星辰地受水潦塵埃昔者共工與顓頊爭爲帝怒而觸不周之山共工官名伯於宓羲神農之問其後子孫任智刑以强故與顓頊黃帝之孫爭位不周山在西北也天柱折地維絶天傾西北故日月星辰移焉傾高也原道言地東南傾傾下也此先言傾西北明其高也地不滿東南故水潦塵埃歸焉天道曰圓地道曰方方者主幽圓者主明明者吐氣者也是故火曰外景幽者含氣者也是故水曰內景吐氣者施含氣者化是故陽施陰化天之偏氣怒者爲風天地之含氣和者爲雨陰陽相薄感而爲雷薄迫也感動也激而爲霆亂而爲霧陽氣勝則散而爲雨露散霧散也陰氣勝則凝而爲霜雪毛羽者飛行之類也故屬於陽介鱗者蟄伏之類也故屬於陰日者陽之主也是故春夏則羣獸除除冬毛微墮也日至而麋鹿解日冬至麋角解日夏至鹿角解月者陰之宗也是以月虛而魚腦減月死而蠃硥膲宗本也減少也膲肉不滿言應陰氣也膲讀若物醮妙之醮也火上蕁水下流故鳥飛而高魚動而下物類相動本標相應蕁讀葛覃之覃標讀刀末之末故陽燧見日則燃而爲火陽燧金也取金杯無緣者熟摩令熱日中時以當日下以艾承之則燃得火也方諸見月則津而爲水方諸陰遂大蛤也熟磨拭令熱月盛時以向月下則水生以銅盤受之下水數滴先師說然也虎嘯而谷風至龍舉而景雲屬虎土物也風木風也木生於土故虎嘯而谷風至龍水也雲生水故龍舉而景雲屬屬會也麒麟鬭而日月食鯨魚死而彗星出蠶珥絲而商弦絶蠶老絲成自中徹外然視之如金精珥表裏見故曰珥絲一曰弄絲於口商音清弦細而急故先絶也賁星墜而勃海決賁星客星也又作孛星墜隕也勃大也快溢也人主之情上通於天故誅暴則多飄風暴虐也飄風迅也枉法令則多蟲螟食心曰螟穀之災也殺不辜則國赤地赤地旱也令不收則多淫雨干時之令不收納則久雨爲災四時者天之吏也日月者天之使也星辰者天之期也期會也虹蜺彗星者天之忌也雄爲虹雌爲蜺也虹者雜色也忌禁也天有九野九千九百九十九隅去地五億萬里九野九天之野也一野千一百一十一隅也五星八風二十八宿五星𡻕星熒惑鎮星太白辰星也八風八卦之風也二十八宿東方角亢氏房心尾箕北方斗牛女虛危室壁西方奎婁胃昴畢觜參南方井鬼柳星張翼軫也五官六府五官五行之官六府加以穀紫宮太微軒轅咸池四守天阿皆星名下自解何謂九野中央曰鈞天其星角亢氏韓鄭之分野也東方曰蒼天其星房心尾東北曰變天陽氣始作萬物萌芽故曰變天其星箕斗牽牛尾箕一名折木燕之分野斗吳之分野牽牛一名星紀越分野北方曰玄天其星須女虛危營室虛危一名玄枵齊之分野西北方曰幽天幽陰也西方季秋將卽於陰故曰幽天也其星東璧奎婁營室東璧一名承委衛之分野奎婁一名降婁魯之分野西方曰皓天皓白也西方金色白故曰皓天或作昊其星胃昴畢昴畢一名大梁趙之分野西南方曰朱天朱陽也西南爲少陽故曰朱天其星觜巂參東井觜巂參一名實沈晉之分野南方曰炎天其星輿鬼柳七星柳七星張周之分野一名鶉火東南方曰陽天東南純乾用事故曰陽天其星張翼軫翼軫一名鶉尾楚之分野何謂五星東方木也其帝太皥太皥伏羲氏有天下號也死託祀於東方之帝也其佐句芒執圭而治春其神爲𡻕星其獸蒼龍其音角其日甲乙木色蒼蒼龍順其色也角木也甲乙皆木也南方火也其帝炎帝炎帝少典之子也以火德王天下號曰神農死託祀於南方之帝其佐朱明舊說云祝融執衡而治夏其神爲熒惑其獸朱鳥熒惑五星之一也朱鳥朱雀也其音徵其日丙丁徵火也丙丁皆火也中央土也其帝黃帝黃帝少典之子也以土德王天下號曰軒轅氏死託祀於中央之帝其佐后土執繩而制四方其神爲鎮星其獸黃龍土色黃也其音宮其日戊己宮土戊己土也西方金也其帝少昊少昊黃帝之子青陽也以金德王號曰金天氏死託祀於西方之帝其佐蓐收執矩而治秋其神爲太白其獸白虎其音商其日庚辛商金也庚辛皆金也北方水也其帝顓頊顓頊黃帝之孫以水德王天下號曰高陽氏死託祀於北方之帝也其佐玄冥執權而治冬其神爲辰星其獸玄武其音羽其日壬癸羽水也壬癸皆水也太陰在四仲則𡻕星行三宿仲中也四中謂太陰在卯酉子午四面之中也太陰在四鉤則𡻕星行二宿丑鉤辰申鉤已寅鉤亥未鉤戌謂太陰在四角二八十六三四十二故十二𡻕而行二十八宿日月行十二分度之一𡻕行三十度十六分度之七十二𡻕而周周徧熒惑常以十月入太微受制而出行列宿司無道之國爲亂爲賊爲疾爲喪爲饑爲兵出入無常辯變其色時見時匿此皆所以譴告人君鎮星以甲寅元始建斗𡻕鎭行一宿當居而弗居其國亡土未當居而居之其國益地𡻕熟日行二十八分度之一𡻕行十三度百一十二分度之五十八𡻕而周鎮星一偏太白元始以正月甲寅與熒惑晨出東方二百四十日而入入百二十日而夕出西方二百四十日而入入三十五日而復出東方出以辰戌入以丑未當出而不出未當入而入天下偃兵當入而不入當出而不出天下興兵辰星正四時常以二月春分效奎婁以五月夏至效東井輿鬼以八月秋分效角亢以十一月冬至効斗牽牛効見出以辰戌入以丑未出二旬而入晨候之東方夕候之西方一時不出其時不和四時不出天下大飢穀不熟爲饑也何謂八風距日冬至四十五日條風至艮卦之風一名融爲笙也條風至四十五日明庶風至震卦之風也爲管也明庶風至四十五日清明風至巽卦之風也爲祝也清明風至四十五日景風至離卦之風也爲絃也景風至四十五日涼風至坤卦之風也爲塤也涼風至四十五日閶闔風至兌卦之風也爲鍾也閶闔風至四十五日不周風至乾卦之風也爲磬也不周風至四十五日廣莫風至坎卦之風也爲鼓也條風至則出輕繫去稽留立春故出輕繫明庶風至則正封疆脩田疇春分播穀故正封疆治田疇也清明風至則出幣帛使諸侯立夏長善布恩惠故幣帛聘問諸侯也景風至則爵有位賞有功夏至陰氣在下陽盛於上象陽布施故賞有功封建侯也涼風至則報地德祀四郊立秋節農乃登穀常祭故報地德祀四方神也閶闔風至則收縣垂琴瑟不張秋分殺氣國君憯愴故去鐘磬縣垂之樂也不周風至則脩宮室繕邊城立冬節土工其始故治宫室繕脩邊城備寇難也廣莫風至則閉關梁決刑罰象冬閉𡻕不通關梁也罰刑疑者於是順時而決之何謂五官東方爲田南方爲司馬西方爲理北方爲司空中央爲都田主農司馬主兵理主獄司空主土都爲四方最也何謂六府子午丑未寅申卯酉辰戌巳亥是也太微者太一之庭也太微星名也太一天神也紫宫者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也咸池星名水魚天神天阿者羣神之闕也闕猶門也四宫者所以爲司賞罰四宫紫宫軒轅咸池天阿太微者主朱鳥主猶典也紫宫執斗而左旋日行一度以周於天日冬至峻狼之山南極之山日移一度月行百八十二度八分度之五而夏至牛首之山牛首北極之山反覆三百六十五度四分度之一而成一𡻕天一元始正月建寅日月俱入營室五度天一以始建七十六𡻕日月復以正月入營室五度無餘分名曰一紀凡二十紀一千五百二十𡻕大終日月星辰復始甲寅元日行一度而𡻕有奇四分度之一故四𡻕而積千四百六十一日而復合故舍八十𡻕而復故曰子午卯酉爲二繩繩直丑寅辰巳未申戌亥爲四鉤東北爲報德之維也報復也陰氣極於北方陽氣發於東方自陰復陽故曰報德之維四角爲維也西南爲背陽之維西南已過陽將復陰故曰背陽之維東南爲常羊之維常羊不進不退之貌東南純陽用事不盛不衰常如此故曰常羊之維西北爲蹏通之維西北純陰陽氣閉結陽氣將萌𨂜始通之故曰𨂜通之維日冬至則斗北中繩陰氣極陽氣萌故曰冬至爲德德始生也日夏至則斗南中繩陽氣極陰氣萌故曰夏至爲刑刑始殺也陰氣極則下至黃泉北至北極故不可以鑿地穿井萬物閉藏蟄蟲首穴故曰德在室陽氣極則南至南極上至朱天故不可以夷邱上屋萬物蕃息五穀兆長故曰德在野日冬至則水從之日夏至則火從之故五月火正而水漏火正火王也故水滲漏一說火星正中地漏濕也十一月水正而陰勝水正水王也故陰勝也一說營室正中於南方陽氣爲火陰氣爲水水勝故夏至濕火勝故冬至燥燥故炭輕溼故炭重日冬至井水盛盆水溢羊脫毛麋角解鵲始巢八尺之脩日中而景丈三尺日夏至而流黃澤石精出流黃土之精也陰氣作於下故流澤面出也石精五色之精也蟬始鳴半夏生半夏藥草蟁蝱不食駒犢鷙鳥不搏黃口五月微陰在下未成駒犢黃口肌血跪弱未成故蟁鷙鳥應陰不食不搏也八尺之景脩徑尺五寸景脩則陰氣勝景短則陽氣勝陰氣勝則爲水陽氣勝則爲旱陰陽刑德有七舍何謂七舍室堂庭門巷術野十二月德居室三十日先日至十五日後日至十五日而徙所居各三十日德在室則刑在野德在堂則刑在術德在庭則刑在巷陰陽相德則刑德合門八月二月陰陽氣均日夜分平故曰刑德合門德南則生刑南則殺故曰二月會而萬物生八月會而草木死兩維之間九十一度也自東北至東南爲兩維匝四維三百六十五度一度者二千九百三十二里十六分度之五而升日行一度十五日爲一節以生二十四時之變斗指子則冬至音比黃鍾黃鍾十一月也鍾者聚也陽氣聚於黃泉之下也加十五日指癸則小寒音比應鍾應鍾十月也言陰應於陽轉成其功萬物應時聚藏故曰應鍾加十五日指丑則大寒音比無射無射九月也陰氣上升陽氣下降萬物隨陽而藏無有射出見也故曰無射加十五日指報德之維則越陰在地故曰距日冬至四十六日而立春陽氣凍解音比南呂南呂八月也南任也言陽氣內藏陰吕於陽任成其功故曰南呂也加十五日指寅則雨水音比夷則夷則七月也夷傷則法也言陽衰陰發萬物彫傷應法成性故曰夷則也加十五日指甲則雷驚蟄音比林鍾林鍾六月也林眾中聚也陽極陰生萬物眾聚而盛故曰林鍾加十五日指卯中繩故曰春分則雷行音比蕤賔蕤賔五月也陰氣萎蕤在下似主人陽在上似賔客故曰蕤賔也加十五日指乙則清明風至音比仲呂仲呂四月也陽在外陰在中所以呂中於陽助成功也故曰仲呂也加十五日指辰則穀雨音比姑洗姑洗三月也姑故也洗新也陽氣養生去故就新故曰姑洗也加十五日指常羊之維則春分盡故曰有四十六日而立夏大風濟濟止音比夾鍾夾鍾二月也夾夾也萬物去陰夾陽地而生故曰夾鍾也加十五日指巳則小滿小滿四月也音比太蔟太蔟正月律也蔟蔟也言陰衰陽發萬物蔟地而生故曰太蔟加十五日指丙則芒種音比大呂大呂十二月律也呂侶也萬物萌動於下未能達見故曰大呂所以配黃鐘助陽宣功也加十五日指午則陽氣極故曰有四十六日而夏至音比黃鍾加十五日指丁則小暑音比大呂加十五日指未則大暑音比太簇加十五日指背陽之維則夏分盡故曰有四十六日而立秋涼風至音比夾鍾加十五日指申則處暑音比姑洗加十五日指庚則白露降音比仲呂加十五日指酉中繩故曰秋分雷戒蟄蟲北鄉音比蕤賔加十五日指辛則寒露音比林鍾加十五日指戌則霜降音比夷則加十五日指𨂜通之維則秋分盡故曰有四十六日而立冬草木畢死音比南呂加十五日指亥則小雪音比無射加十五日指壬則大雪音比應鍾加十五日指子故曰陽生於子陰生於午陽生於子故十一月日冬至鵲始加巢人氣鍾首陰生於午故五月爲小刑薺麥亭厯枯冬生草木必死斗杓爲小𡻕斗第一星至第四爲魁第五至第七爲杓也正月建寅月從在行十二辰咸池爲太𡻕二月建卯月從右行四伸終而復始太𡻕迎者辱背者强左者衰右者昌小𡻕東南則生西北則殺不可迎也而可背也不可左也而可右也其此之謂也大時者咸池也小時者月建也天維建元常以寅始起右徙一𡻕不移十二𡻕而大周天終而復始天文訓下淮南元年冬太一在丙子冬至甲午立春丙子淮南王作書之元年也一曰淮南王長孝文皇帝異母弟也僭號自稱東帝以徒嚴道道死於雍其四子皆爲列侯時人歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容文帝聞之曰以我爲利其土邪皆召四侯而王之是則淮南王安卽位之元年以紀時也二陰一陽成氣二二陽一陰成氣三陰粗觕故得氣少陽精微故得氣多一說上得二下得三合爲五故曰合氣而爲音音數五也合氣而爲音合陰而爲陽合陽而爲律故曰五音六律音自倍而爲日律自倍而爲辰故日十而辰十二月日行十三度七十六分度之二十六六或作八二十九日九百四十分日之四百九十九而爲月而以十二月爲𡻕𡻕有餘十日九百四十分日之八百二十七故十九𡻕而七閏日冬至子午夏至卯酉冬至加三日則夏至之日也冬至後三日則明年夏至之日𡻕遷六日終而復始遷六日今年以子冬至後年以午冬至也壬午冬至甲子受制木用事火煙青木色青也東方七十二日丙子受制火用事火煙赤火色赤也南方七十二日戊子受制土用事火煙黃土中央其色黃七十二日庚子受制金用事火煙白西方金其色白七十二日壬子受制水用事火煙黑北方水其色黑七十二日而𡻕終庚子受制𡻕遷六日以數推之七十𡻕而復至甲子甲子受制則行柔惠挺羣禁開闔扇通障塞毋伐木甲木也木王東方故施柔惠蟄伏之類出由戸故開闔扇通障塞春木王故毋伐木也丙子受制則舉賢良賞有功立封侯出貨財火用事象陽明識功勞故封建侯出貨財戊子受制則養老鰥寡行粰鬻施恩澤土用事象土長養故施恩澤也庚子受制則繕牆垣脩城郭審羣禁飾兵甲儆百官誅不法金用事象金斷割故誅不如法度也壬子受制則閉門閭大搜客禁搜客出新客斷罰刑殺當罪息關梁禁外徙水用事象冬閉固故禁外徙也甲子氣燥濁丙子氣燥陽戊子氣濕濁庚子氣燥寒壬子氣清寒丙子干甲子蟄蟲早出木氣温故早出故雷早行戊子干甲子胎夭卵毈鳥蟲多傷庚子干甲子有兵壬子干甲子春有霜戊子干丙子霆庚子干丙子夷夷傷也夷或電壬子干丙子雹甲子干丙子地動庚子干戊子五穀有殃壬子干戊子夏寒雨霜甲子干戊子介蟲不爲不成爲介蟲也丙子干戊子大旱蓏封熯蓏蔣草也生水土相連持大如薄者也名日封旱燥故熯也壬子干庚子大剛魚不爲不成爲魚甲子干庚子草木再死再生丙子干庚子草木復榮今八月九月時李柰復榮生實是也戊子干庚子𡻕或存或亡甲子干壬子冬乃不藏不藏地氣發也丙子干壬子星墜墜隕戊子干壬子蟄蟲冬出其鄉庚子干壬子冬雷其鄉季春三月豐隆乃出以將其雨豐隆雷也至秋三月季秋之月地氣不藏乃收其殺百蟲蟄伏靜居閉戸殺氣青女乃出以降霜雪青女天神青玉女主霜雷也行十二時之氣以至於仲春二月之夕乃收其藏而閉其寒收歛其所藏而閉之女夷鼓歌以司天和以長百穀禽鳥草木女夷主春夏長養之神也孟夏之月以熟穀禾雄鳩長鳴爲帝侯𡻕雄鳩蓋布穀也是故天不發其陰則萬物不生地不發其陽則萬物不成天圓地方道在中央日爲德月爲刑月歸而萬物死日至而萬物生遠山則山氣藏遠水則水蟲蟄遠木則木葉槁日五日不見失其位也聖人不與也與猶說也日出於暘谷浴於咸池拂於扶桑是謂晨明拂猶過一日至登於扶桑爰始將行是謂朏明朏明將明也朏讀若朏諾皋之朏也至於曲阿是謂旦明平旦至於曾泉是謂蚤食至於桑野是謂晏食至於衡陽是謂隅中至於昆吾是謂正中昆吾邱在南方至於鳥次是謂小還鳥次西南之山名也鳥所宿止至於悲谷是謂餔時悲谷西南方之大壑言其深峻臨其上令人悲思故曰悲谷也至於女紀是謂大還女紀西北陰地至於淵虞是謂高舂淵虞地名高舂時加戍民碓舂時也至於連石是謂下舂連石西北山名也言將欲㝠下象悉舂故曰下舂連讀腐爛之爛也至於悲泉爰止其女爰息其馬是謂縣車至於虞淵是謂黃昏至於蒙谷是謂定昏蒙谷北方之山名也盧敖所見若上之所也日入於虞淵之汜曙於蒙谷之浦曙明浦涯行九州七舍有五億萬七千三百九里自暘谷至虞淵凡十六所爲九州七舍也禹以爲朝晝昏夜夏日至則陰乘陽是以萬物就而死冬日至則陽乘陰是以萬物仰而生晝者陽之分夜者陰之分是以陽氣勝則日脩而夜短陰氣勝則日短而夜脩帝張四維運之以斗運旋也月徙一辰復反其所正月指寅十二月指丑一𡻕而匝終而復始指寅則萬物螾螾動生貌律受太蔟太蔟者蔟而未出也指卯卯則茂茂然律受夾鍾夾鍾者種始莢也指辰辰則振之也律受姑洗姑洗者陳去而新來也指巳巳則生已定也律受仲呂仲呂者中充大也指午午者忤也律受蕤賔蕤賔者安而服也指未未昧也律受林鍾林鍾者引而止也指申申者呻之也律受夷則夷則者易其則也德以去矣指酉酉者飽也律受南呂南呂者任包大也指戌戌者滅也律受無射無射入無厭也指亥亥者閡也律受應鍾應鍾者應其鍾也指子子者兹也律受黃鍾黃鍾者鍾已黃也指丑丑者紐也律受大呂大呂者旅旅而去也其加卯酉則陰陽分日夜平矣故曰規生矩殺衡長權藏繩居中央爲四時根道曰規始於一一而不生故分而爲陰陽陰陽合和而萬物生故曰一生二二生三三生萬物天地三月而爲一時故祭祀三飯以爲禮喪紀三踊以爲節兵重三罕以爲制以三參物三三如九故黃鍾之律九寸而宫音調調和也因而九之九九八十一故黃鍾之數立焉黃者土德之色鍾者氣之所種也日冬至德氣爲土土色黃故曰黃鍾律之數六分爲雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之爲積分七十萬七千一百四十七黃鍾大數立焉凡十二律黃鍾爲宫太蔟爲商姑洗爲角林鍾爲徵南呂爲羽物以三成音以五立三與五如八故卵生者八竅律之初生也寫鳳之音故音以八生黃鍾爲宫宮者音之君也故黃鍾位子其數八十一主十一月下生林鍾林鍾之數五十四主六月上生太蔟太簇之數七十二主正月下生南呂南呂之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鍾應鐘之數四十二主十月上生蕤賔蕤賔之數五十七主五月上生大呂大呂之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鍾夾鍾之數六十八主二月下生無射無射之數四十五主九月上生仲呂仲呂之數六十主四月極不生徵生宮宮生商商生羽羽生角角生姑洗姑洗生應鍾比於正音故爲和應鍾十月也與正音比故爲和和從聲也一曰和也應鍾生蕤賔不比正音故爲繆日冬至音比林鍾浸以濁日夏至音比黃鍾浸以清以十二律應二十四時之變甲子仲吕之徵也丙子夾鍾之羽也戊子黃鍾之宫也庚子無射之商也壬子夷則之角也古之爲度量輕重生乎天道黃鍾之律脩九寸物以三生三九二十七故幅廣二尺七寸古者幅比皆然也音以八相生故人脩八尺尋自倍故八尺而爲尋有形則有聲音之數五以五乘八五八四十故四丈而爲匹匹者中人之度也一匹而爲制秋分蔈定蔈定而禾熟蔈禾穗粟孚甲之芒也定者成也故禾熟讀如詩有貓有虎之貓古文作秒也律之數十二故十二蔈而當一粟十二粟而當一寸律以當辰音以當日日之數十十從甲至癸日故十寸而爲尺十尺而爲丈其以爲量十二粟而當一分分言其輕重分銖也十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖爲一兩天有四時以成一𡻕因而四之四四十六故十六兩而爲一斤三月而爲一時三十日爲一月故三十斤爲一鈞四時而爲一𡻕故四鈞爲一石其以爲音也一律而生五音十二律而爲六十音因而六之六六三十六故三百六十音以當一𡻕之日故律厯之數天地之道也下生者倍以三除之上生者四以三除之鍾律上下相生誘不敏也太陰元始建於甲寅一終而建甲戌二終而建甲午三終而復得甲寅之元𡻕徙一辰立春之後得其辰而遷其所順前三後五百事可舉前後太陰之前後也太陰所建蟄蟲首穴而處鵲巢鄉而爲戸太陰在寅朱鳥在卯勾陳在子玄武在戌白虎在酉蒼龍在辰寅爲建卯爲除辰爲滿巳爲平主生午爲定未爲執主䧟申爲破主衡酉爲危主杓戌爲成主少德亥爲收主大德子爲開主太𡻕丑爲閉主太隂在寅𡻕名曰攝提格其雄爲𡻕星舍斗牽牛以十一月與之晨出東方東井輿鬼爲對太陰在卯𡻕名曰單閼單讀明楊之明𡻕星舍須女虛危以十二月與之晨出東方柳七星張爲對太陰在辰𡻕名曰執徐𡻕星舍營室東壁以正月與之晨出東方翼軫爲對太陰在巳𡻕名曰大荒落𡻕星舍奎婁以二月與之晨出東方角亢爲對太陰在午𡻕名曰敦牂𡻕星舍胃昴畢以三月與之晨出東方氏房心爲對太陰在未𡻕名曰協洽𡻕星舍觜嶲參以四月與之晨出東方尾箕爲對太陰在申𡻕名曰涒灘𡻕星舍東井輿鬼以五月與之晨出東方斗牽牛爲對太陰在酉𡻕名曰作鄂作讀昨𡻕星舍柳七星張以六月與之晨出東方須女虛危爲對太陰在戌𡻕名曰閹茂𡻕星舍翼軫以七月與之晨出東方營室東壁爲對太陰在亥𡻕名曰大淵獻𡻕星舍角亢以八月與之晨出東方奎婁爲對太陰在子𡻕名困敦困讀羣𡻕星舍氐房心以九月與之晨出東方胃昴畢爲對太陰在丑𡻕名曰赤奮若𡻕星舍尾箕以十月與之晨出東方觜巂參爲對太陰在甲子刑德合東方宮常徙所不勝合四𡻕而離離十六𡻕而復合所以離者刑不得入中宮而徙於木太陰所居曰德辰爲刑德綱曰自倍因柔曰徙所不勝刑水辰之木木辰之水金火立其處凡徙諸神朱鳥在太陰前一鉤陳在後三玄武在前五白虎在後六虛星乘鉤陳而天地襲矣襲和也凡日甲剛乙柔丙剛丁柔以至於癸木生於亥壯於卯死於未三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於巳壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也故五勝生一壯五終九五九四十五故神四十五日而一徙以三應五八徙而𡻕終凡用太陰左前刑右背德擊鉤陳之衝辰以戰必勝以攻必尅欲知天道以日爲主六月當心左周而行分而爲十二月與日相當天地重襲後必無殃星正月建營室二月建奎婁三月建胃星宜言日明堂月令孟春之月日在營室仲春之月在奎婁季春之月在胃此言星正月建營室字之誤也四月建畢五月建東井六月建張七月建翼八月建亢九月建房十月建尾十一月建牽牛十二月建虛星分度角十二亢九氐十五房五心五尾十八箕十一四分一斗二十六牽牛八須女十二虛十危十七營室十六東壁九奎十六婁十二胃十四昴十一畢十六觜巂二參九東井三十輿鬼四柳十五七星張翼各十八軫十七凡二十八宿也星部地名角亢鄭氐房心宋尾箕燕斗牽牛越須女吳虛危齊營室東壁衛奎婁魯胃昴畢魏觜巂參趙東井輿鬼秦柳七星張周翼軫楚𡻕星之所居五穀豐昌其對爲衝𡻕乃有殃當居而不居越而之他處主死國亡太陰治春則欲行柔惠温涼木德仁也故柔涼也太陰治夏則欲布施宣明火德陽也故布施偏明也太陰治秋則欲脩備繕兵金德斷割故脩兵也太陰治冬則欲猛毅剛彊純陰閉固水澤氷凍故剛彊也三𡻕而改節六𡻕而易常故三𡻕而一饑六𡻕而一衰十二𡻕一康康盛也甲齊乙東夷丙楚丁南夷戊魏巳韓庚秦辛西夷壬衛癸越子周丑翟寅楚卯鄭辰晉巳衛午秦未宋申齊酉魯戌趙亥燕甲乙寅卯木也丙丁巳午火也戊己四季土也庚辛申酉金也壬癸亥子水也水生木木生火火生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困以勝擊殺勝而無報以專從事而有功以義行理名立而不墮以保畜養萬物蕃昌以困舉事破滅死亡北斗之神有雌雄十一月始建於子月從一辰雄左行雌右行五月合午謀刑十一月合子謀德太陰所居辰爲厭日厭日不可以舉百事堪輿徐行雄以音知雌故爲奇辰數從甲子始子母相求所合之處爲合十日十二辰周六十日凡八合合於𡻕前則死亡合於𡻕後則無殃甲戌燕也乙酉齊也丙午越也丁巳楚也庚申秦也辛卯戎也壬子代也癸亥胡也戊戌己亥韓也己酉己卯魏也戊午戊子八合天下也太陰小𡻕星日辰五神皆合其日有雲氣風雨國君當之天神之貴者莫貴於青龍或曰天一或曰太陰太陰所居不可背而可鄉北斗所擊不可與敵天地以設分而爲陰陽陽生於陰陰生於陽陰陽相錯四維乃通或死或生萬物乃成蚑行喙息莫貴於人孔竅肢體皆通於天天地九重人亦有九竅天有四時以制十二月人亦有四肢以使十二節天有十二月以制三百六十日人亦有十二肢以使三百六十節故舉事而不順天者逆其生者也以日冬至數來𡻕正月朔日五十日者民食足不滿五十日日減一斗有餘日日益一升有其𡻕司也攝提格之𡻕格起言萬物承陽而起也𡻕早水晩旱稻疾蠶不登登成也菽麥昌民食四升寅在甲曰閼蓬言萬物鋒芒欲出擁遏未通故曰閼蓬也單閼之𡻕單盡閼止也言陽氣推萬物而起陰氣盡止也𡻕和稻菽麥蠶昌民食五升卯在乙曰旃蒙在乙言蒙物遏蒙甲而出故曰旃蒙也執徐之𡻕執蟄徐舒也言伏蟄之物皆散舒而出也𡻕早旱晩水小饑蠶閉麥熟民食三升辰在丙曰柔兆在丙萬物皆生枝布葉故曰柔兆也大荒落之𡻕荒大也方萬物熾盛而大出霍然落落大布散𡻕有小兵蠶小登麥昌菽疾民食二升巳在丁曰强圉在丁言萬物剛盛故曰强圉也㪟牂之𡻕言萬物皆盛壯也㪟牂敦盛牂壯也𡻕大旱蠶登稻疾菽麥昌禾不爲民食二升午在戊曰著雝在戊言位在中央萬物繁養四方故曰著雝也協洽之𡻕協和洽合也言陰欲化萬物和合𡻕有小兵蠶登稻昌菽麥不爲民食三升未在巳曰屠維在巳言萬物各成其性故曰屠維屠别維離也涒灘之𡻕涒大灘脩也言萬物皆脩其精氣也𡻕和小雨行蠶登菽麥昌民食三升申在庚曰上章在庚言陰氣上升萬物畢生故曰上章也作鄂之𡻕作鄂零落也萬物皆陊落𡻕有大兵民疾蠶不登菽麥不爲禾蟲民食五升酉在辛曰重光在辛言萬物就成熟其煌煌故曰重光也掩茂之𡻕掩蔽茂胃言萬物皆蔽冒𡻕小饑有兵蠶不登麥不爲昌民食七升戌在壬曰玄黓在壬言𡻕終包任萬物故曰玄黓也大淵獻之𡻕淵藏獻迎也言萬物終於亥大小深藏窟伏以迎陽𡻕有大兵大饑蠶開菽麥不爲禾蟲民食三升困敦之𡻕困混敦沌也言陽氣皆混沌萬物牙孽也𡻕大霧起大水出蠶稻菽麥昌民食三斗子在癸曰昭陽在癸言陽氣始萌萬物合生故曰昭陽赤奮若之𡻕奮起也若順也言陽奮物而起之無不順其性也赤陽色𡻕有小兵早水蠶不出稻疾菽不爲麥昌民食一升正朝一作月夕先樹一表東方操一表却去前表十步以參望日始出北廉日直入又樹一表於東方因西方之表以參望日入北廉則定東方兩表之中與西方之表則東西之正也日冬至日出東南維入西南維至春秋分日出東中入西中夏至出東北維入西北維至則正南欲知東西南北廣袤之數者立四表以爲方一里岠先春分若秋分十餘日從岠北表參望日始出及旦以候相應相應則此與日直也輒以南表參望之以入前表數爲法除舉廣除立表袤以知從此東西之數也假使視日出入前表中一寸是寸得一里也一里積萬八千寸得從此東萬八千里視日萬入入前表半寸則半寸得一里半寸而除一里積寸得三萬六千里除則從此西里數也并之東西里數也則極徑也未春分而直已秋分而不直此處南也未秋分而直已春分而不直此處北也分至而直此處南北中也從中處欲知中南也未秋分而不直此處南北中也從中處欲知南北極遠近從西南表參望日日夏至始出與北表參則是東與東北表等也正東萬八千里則從中北亦萬八千里則從中北亦萬八千里也倍之南北之里數也其不從中之數也以出入前表之數益損之表入一寸寸減日近一里表出一寸寸益遠一里欲知天之高樹表高一丈正南北相去千里同日度其陰北表二尺南表尺九寸是南千里陰短寸南二萬里則無景是直日下也陰二尺而得高一丈者南一而高五也則置從此南至日下里數因而五之爲十萬里則天高也若使景與表等則高與遠等也地形訓上紀東西南北山川藪澤地之所載萬物形兆所化育也故形因以題篇地形之所載六合之間四極之內六合已說在原道四極四方之極無復有外故謂之內也昭之以日月經之以星辰紀之以四時要之以太𡻕要正也以太𡻕所在正天時也天地之間九州八極八極八方之極也土有九山山有九塞澤有九藪風有八等水有六品何謂九州東南神州曰農土東南辰爲農祥后稷之所經緯也故曰農土也正南次州曰沃土沃盛也五月建午稼穡盛張故曰沃土也西南戎州曰滔土滔大也七月建申五穀成大故曰滔土也正西弇州曰并土并猶成也八月建酉百穀成熟故曰并土也正中冀州曰中土冀大也四方之主故曰中土也西北台州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也隱氣所隱藏故曰隱土也正東陽州曰申土申復也陰氣盡於北陽復氣起東北故曰申土何謂九山會稽泰山王屋首山太華岐山太行羊腸孟門會稽山在會稽郡泰山今在泰山郡是爲東岳王屋山在今河東恒縣東北所出也首山在蒲坂縣南河曲之中伯夷所隱太華今弘農陰山也是爲西岳岐山今扶風漢陽縣北周家所邑也太行在今上黨太行關直河內野王縣是也羊腸山名也說苑曰桀之居左河濟右太華伊闕在其南羊腸在其北今太原晉陽西北九十里通河西上郡關曰羊腸坂是孟門太行之限也何謂九塞曰大汾澠阨荆阮方城殽阪井陘令疵句注居庸太汾在晉澠阨今弘農澠池是也荆阮方城皆在楚殽阪弘農郡澠池殽欽吟是也井陘在常山通太原關是也令疵在遼西句注在雁門陰館句注是也居庸在上谷阻陽之東通運都關是也何謂九藪藪澤曰越之具區具區在吳越之間也楚之雲夢雲夢在南郡華容也秦之陽紆陽紆蓋在馮翊池陽一名具圃晉之大陸大陸魏獻子所游焚焉而死者是也鄭之圃田圃田在今河南中牟傳曰鄭有原圃猶秦之具圃也吾子取其麋鹿以閑弊邑是也宋之孟諸孟諸在今梁園睢陽東北澤是也齊之海隅海隅猶崖蓋近海濱是也趙之鉅鹿今鉅鹿廣阿澤是也燕之昭余昭余今太原郡是古者屬燕也何謂八風東北曰炎風艮氣所生曰融風也東風曰條風震氣所生也一曰明庶風東南曰景風巽氣所生也一曰清明風南方曰巨風雜氣所生也一曰凱風也西南曰涼風坤氣所以生也西方曰飂風兌氣所生也西北曰麗風乾氣所生也一曰閭闔風北方曰寒風坎氣所生也一曰廣莫風何謂六水曰河水赤水遼水黑水江水淮水河水出崑崙東北陬赤水出其東南陬遼水出碣石山自塞北東流直遼東之西南入海黑水在雝州江水出岷山在蜀西徼淮水出桐栢山南平陽也闔四海之內東西二萬八千里南北二萬六千里子午爲經卯酉爲緯言經短緯長也水道八千里通谷其名川六百陸徑三千里陸徑邪徑也陸地也禹乃使太章步自東極至於西極二億三萬三千五百里七十五步使豎亥步自北極至於南極二億三萬三千五百里七十五步太章豎亥善行人皆禹臣也海內東西短南北長極內等也凡鴻水淵藪自三百仞以上二億三萬三千五百五十里有九淵禹乃以息土填洪水以爲名山息土不耗減掘之益多故以填洪水也名山大山也掘崑崙虛以下地掘猶平也地或作池中有增城九重其高萬一千里百一十四步二尺六寸中崑崙虛中也增重也有五城十二樓見括地像此蓋誕實未聞也上有木禾其脩五尋上崑崙虛上也五尋長三十五尺珠樹玉樹璇樹不死樹在其西在木禾之西也沙棠琅玕在其東皆玉名也在木禾之東也一說沙棠木名也呂氏春秋曰果之美者沙棠之實也絳樹在其南絳赤也碧樹瑤樹在其北碧青玉也木禾之北旁有四百四十門面有十門也門間四里里間九純純丈五尺純量名也旁有九井玉橫維其西北之隅橫猶光也橫或作彭彭受不死藥器也北門開以內不周之風傾宮旋室傾宮宮滿一須曰中也旋室以旋玉飾室也一說室璇璣關可轉旋故曰旋室縣圃涼風樊桐在崑崙閶闔之中閶闔崑崙虛門名也縣圃涼風樊桐皆崑崙之山名也樊讀如麥飯之飯是其䟽圃䟽圃之池浸之黃水黃水三周復其原原本是謂丹水飲之不死河水出崑崙東北陬貫渤海入禹所導積石山渤海大海也河水自崑崙由地中行禹導而通之至積石山書曰河出積石入猶出也赤水出其東南陬西南注南海丹澤之東赤水之東弱水出自窮石窮石山名也在張掖北塞水也至於合黎餘波入於流沙絶流沙南至南海絶猶過也流沙流行也洋水出其西北陬入於南海羽民之南洋水經隴西氏道東至武都爲漢陽或作養也凡四水者帝之神泉以和百藥以潤萬物崑崙之邱或上倍之假令高萬里倍之二萬里是謂涼風之山登之而不死或上倍之是謂懸圃登之乃靈能使風雨或上倍之乃維上天登之乃神是謂太帝之居太帝天帝扶木在陽州日之所曊扶木扶桑也在湯谷之南曊猶照也過陽州東方也曊讀無枝㩌之㩌也建木在都廣建木其狀如生引之有皮若瓔黃蛇葉若羅都廣南方山名也眾帝所自上下日中無景呼而無嚮蓋天地之中也眾帝之從都廣山上天還下故曰上下日中時日直人上無有晷故曰蓋天地之中若木在建木西末有十日其華照下地末端也若木端有十日狀如蓮華華猶光也光照其下也九州之大純方千里純緣也亦曰量名也九州之外亦有八殥亦方千里殥猶遠也殥讀胤嗣之胤自東北方曰大澤曰無通大澤無通皆藪名也東方曰大渚曰少海水中可居者曰渚東方多水故曰少海亦澤名也東南方曰具區曰元澤元讀常山人謂伯爲穴之穴也南方曰大夢曰浩澤夢雲夢也浩亦大也西南方曰渚資曰丹澤蓋近丹水因其名故曰丹澤也西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大㝠曰寒澤北方多寒水故曰寒澤也凡八殥八澤之雲是雨九州八殥之外而有八紘紘維也維落天地而爲之表故曰紘也亦方千里自東北方曰和邱曰荒土鳳所自歌鸞所自舞名曰和邱曰荒土也東方曰棘林曰桑野東南方曰大窮曰眾女南方曰都廣曰反戸都廣國名也山在此國因復曰都廣山言其在鄉曰之南皆爲北鄉戸故反其戸也西南方曰焦僥曰炎土焦僥短人之國也長不滿三尺西方曰金邱曰沃野西方金位也因爲金邱沃猶白也西方白故曰沃野也西北方曰一目曰沙所國人一目在面中央沙所蓋流沙所出也一曰澤名也北方曰積冰曰委羽北方寒冰所積因以爲名積冰也委羽山名也在北極之隂不見日也凡八紘之氣是出寒暑以合八正必以風雨八正八風之正也以風雨八紘之內八紘之外乃有八極自東北方曰方土之山蒼門東北木將用事青之始也故曰蒼門東方曰東極之山曰開明之門明者陽也日之所出也故曰開明之門東南方曰波母之山曰陽門東南月建在巳純陽用事故曰陽門據天下諸城東南角門皆陽門其是類也南方曰南極之山曰暑門南方盛陽積温所在故曰暑門西南方曰編駒之山曰白門西南月建在申金氣之始也金氣白故曰白門西方曰西極之山曰閶闔之門西方八月建酉萬物成濟將可及收斂閶大也闔閉也大聚萬物而閉之故曰閶闔之門也西北方曰不周之山曰幽都之門幽闔也都聚也玄㝠將始用事順陰而聚故曰幽都之門北方曰北極之山曰寒門積寒所在故曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八夤八澤之雲以雨九州而和中土中土冀州東方之美者有醫毋閭之珣玗琪焉醫毋閭山名在遼東屬國珣玗琪玉名也東南方之美者有會稽之竹箭焉會稽山在今會稽山陰縣之南禹所葬竹箭今會稽郡出好竹箭是也南方之美者有梁山之犀象焉梁山在會稽長沙湘南有犀角象牙皆物之珍也西南方之美者有華山之金石焉金美金也石含玉之石也華山今弘農華陰山南是也西方之美者有霍山之珠玉焉出夜光之珠玉色之玉也今河東永安縣也西北方之美者有崑崙之球琳琅玕焉球琳琅玕皆美玉也北方之美者有幽都之筋角焉古之幽都在鷹門以北其畜宜牛羊馬出好筋角可以爲弓弩東北方之美者有斥山之文皮焉斥讀斥邱之斥文皮豹虎之皮也傳曰無終子使孟樂因魏莊子納虎豹之皮也以請和諸戎是也中央之美者有岱岳以生五穀桑麻魚鹽出焉岱岳泰山也王者禪代所祠因曰岱岳也五穀桑麻魚鹽所養人者出猶生也凡地形東西爲緯南北爲經山爲積德川爲積刑山仁萬物生焉故爲積德川水智智制斷故爲積刑也論語曰仁者樂山智者樂水是也高者爲生下者爲死高者陽主生下者陰主死邱陵爲牡谿谷爲牝邱陵高敞陽也故爲牡谿谷污下陰也故爲牝水圓折者有珠方折者有玉圓折者陽也珠陰中之陽方折者陰也玉陽中之陰也皆以其類也清水有黃金龍淵有玉英清水澄故黃金出焉龍淵龍所出游淵也玉英轉化有精光也土地各以其類生是故山氣多男澤氣多女障氣多喑風氣多聾林氣多癃木氣多傴自此上至山氣多男皆生子多有此病也岸下氣多腫石氣多力象石堅也險阻氣多癭上下險阻氣衝喉而結多癭咽也暑氣多夭夭折不終也寒氣多壽谷氣多痺邱氣多狂衍氣多仁下而污者爲衍也陵氣多貪輕土多利重土多遲利疾清水音小濁水音大音聲湍水人輕遲水人重湍急流悍水也中土多聖人皆象其氣皆應其類故南方有不死之草北方有不釋之冰南方温故草有不死者北方寒故冰有不泮釋也東方有君子之國東方木德仁故有君子之國也其人冠帶劍食獸使二大虎也西方有形殘之尸寢居直夢人死爲鬼西方金金斷割攻戰之事有形殘之尸也寢寐也居處也金氣方剛故其寢寐處夢悟如其夢故曰直夢不終其命死而爲鬼能爲祅怪病人也一說曰形殘之尸於是以兩乳爲目肚臍爲口操干戚以舞無夢天神斷其手後天帝斷其首也故寢居直夢磁石上飛雲母來水土龍致雨燕鷹代飛湯遭旱作土龍以像龍雲從龍故致雨也燕玄鳥也春分而來雁春分而北詣漠中也燕秋分而去雁秋分而南詣彭蠡故曰代飛也代更也蛉蟹珠龜與月盛衰與猶隨也是故堅土人剛弱土人肥壚土人大沙土人細壚讀纑繩之纑也細小也息土人美耗土人醜食水者善游能寒魚鼈鷖騖之屬是也食土者無心而慧邱蚓之屬是也食木者多力而奰態羆之屬是也奰煩腸黃理也奰讀內奰干中國之奰近鼻也食草者善走而愚麋鹿之屬是也食葉者有絲而蛾蠶是也食肉者勇敢而捍虎豹鷹鸇之屬是也食氣者神明而壽仙人松喬之屬是也食穀者知慧而夭不食者不死而神凡人民禽獸萬物貞蟲各有以生貞蟲諸細要之屬也或奇或偶或飛或走莫知其情唯知通道者能原本之天一地二人三一陽二陰也人生於天地故曰三也三三而九九九八十一一主日曰數十十從甲至癸也日主人人故十月而生八九七十二二主偶偶以承奇奇主辰辰主月月主馬馬故十二月而生七九六十三三主斗斗主犬犬故三月而生六九五十四四主時時主彘彘故四月而生五九四十五五主音音主猨猨故五月而生四九三十六六主律律主麋鹿麋鹿故六月而生三九二十七七主星星主虎虎故七月而生二九十八八主風風主蟲蟲故八月而化鳥魚皆生於陰陰屬於陽故鳥魚皆卵生魚游於水鳥飛於雲故立冬燕雀入海化爲蛤萬物之生而各異類蠶食而不飲蟬飲而不食蜉蝣不飲不食介鱗者夏食而冬蟄介甲龜鼈之屬也鱗魚龍之屬齕吞者八竅而卵生鳥魚之屬嚼咽者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前膏豕也熊猿之屬無前肥從前起也有角者指而無後指牛羊麋之屬也無後肥從後起也晝生者類父夜生者似母至陰生牝至陽生牡夫熊羆蟄藏飛鳥時移是故白水宜玉黑水宜砥砥則卓石也青水宜碧赤水宜丹黃水宜金清水宜龜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五穀地形訓下東方川谷之所注日月之所出其人兌形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉蒼色主肝長大早知而不壽其地宜麥多虎豹南方陽氣之所積暑濕居之其人脩形兌上大口決眦竅通於耳血脉屬焉赤色主心早壯而夭其地宜稻多兕象西方高土川谷出焉日月入焉其人面末僂脩頸卬行竅通於鼻末猶脊也皮革屬焉白色主肺勇敢不仁其地宜黍多旄犀旄讀近綢繆之繆急氣言乃得之北方幽晦不明天之所閉也寒水之所積也蟄蟲之所伏也其人翕形短頸翕讀脅幹之脅大肩下尻竅通於陰骨幹屬焉黑色主腎其人憃愚禽獸而壽憃讀人謂憃然無知之憃也籠口言乃得其地宜菽菽豆也多犬馬傳曰冀之北土馬之所生言燕代出馬也中央四達風氣之所通雨露之所會也其人大面短頤美鬚惡肥竅通於口膚肉屬焉黃色主胃慧聖而好治其地宜禾多牛羊及六畜木勝土土勝水水勝火火勝金金勝木故禾春生秋死禾者木春王而生木秋金王而死菽夏生冬死豆火也夏火王而生冬水王四死麥秋生夏死麥金也金王而生火王而死也薺冬生中夏死薺水也水王而生土王而死也木壯水老火生金囚土死火壯木老土生水囚金死土壯火老金生木囚水死金壯土老水生火囚木死水壯金老木生土囚火死音有五聲宮其主也五聲宮商角徵羽也宫在中央故爲主也色有五章黃其主也味有五變甘其主也位有五材土其主也是故鍊土生木鍊木生火鍊火生雲雲金氣所生也鍊雲生水鍊水反土鍊甘生酸鍊酸生辛鍊辛生苦鍊苦生鹹鍊鹹反甘鍊猶治也變宮生徵變徵生商變商生羽變羽生角變角生宮變猶化也是故以水和土以土和火以火化金以金治木木復反土五行相治所以成器用土本也故曰五行相生所以成器用凡海外三十六國自西北至西南方有修股民天民肅愼民脩長也股腳也天民肅愼皆有國名也傳曰肅愼燕毫吾北土是云西方黨獨西方之國自復有之邪一曰肅敬也愼畏也白民沃民女子民丈夫民白民白身民被髮髮亦白女子民其貌無有鬚皆如女子也丈夫民其狀皆如丈夫衣黃衣冠帶劎皆西方之國也奇股民一臂民三身民奇隻也股腳也言其人一臂一手一鼻也三身民蓋一頭有三身皆西方之國也自西南至東南方結胷民讙頭國民裸國民三苗民交股民不死民穿胷民反舌民三苗國名也在豫章之彭蠡交股民腳相交切不死民不食也穿胷胷前穿孔達背反舌民不可知而自相曉一說舌本在前不向喉故曰反舌也南方之國名也豕喙民鑿齒民三頭民脩臂民豕喙民其喙如豕鑿齒民吐一齒出口下長三尺也三頭民身有三頭也脩臂民一國民皆長臂臂長於身也皆南方之國也自東南至東北方有大人國君子國東南壚土故人大也君子國已說在上章也黑齒民玄股民其人黑齒食稻啖地在湯上谷玄股民其股黑兩鳥夾之見山海經也毛民勞民其人體半生毛若矢鏇也勞民正理躁擾不定也皆東方國也自東北至西北方有跂踵民句嬰民跂踵民踵不至地以五指行也句嬰讀爲九嬰北方之國也深目民無腸民柔利民皆北方之國也一目民無繼民一目民目在面中央無繼民其人蓋無嗣也北方之國也雒棠武人在西北陬皆日所入之山名也硥魚在其南硥魚如鯉魚也有神聖者乘行九野在無繼民之南硥讀如蚌也有神二人連臂爲帝候夜在其西南方連臂大呼夜行三珠樹在其東北方有玉樹在赤水之上崑崙華邱在其東南方在無繼民之東南也爰有遺玉青馬視肉其人不知言也楊桃甘樝甘革百果所生皆異物也在木曰果在地曰蓏也和邱在其東北陬四方而高曰邱鸞所自歌鳳所自舞故曰和邱在無繼民東北陬也三桑無枝在其西夸父耽耳在其北方耽耳耳垂在肩上耽讀衣之褶或作攝以兩手攝其凥之中夸父棄其策是爲鄧林夸父神獸也飲河渭不足將飲西海未至道渴死見山海經策杖也其杖生木而成林鄧猶木也一曰仙人也昆吾邱在南方昆吾楚之祖祝融之孫陸終之子爲夏伯也詩云昆吾夏桀也軒轅邱在西方軒轅黃帝有天下之號也巫咸在其北方巫咸知天道明吉凶立登保之山暘谷槫桑在東方暘谷日之所出也槫桑在登保之山東北方也有娀在不周之北長女簡翟少女建疪有娀國名也不周山名也娀讀如嵩高之嵩姊妹二人在瑤臺也帝嚳之妃也天使玄鳥降卯簡翟吞之以生契是爲玄王殷之祖也詩云天命玄鳥降而生商也西王母在流沙之瀕地理志曰西王石室在金城臨羌西北塞外也樂民拏閭在崑崙弱水之洲水中可居曰州三危在樂民西三危西極之山名也宵明燭光在河洲所照方千里洲水中所居者燭光所照者方千里龍門在河淵湍池在崑崙龍門在河中馮翊夏陰界也玄燿不周玄燿水名一曰山名申池在海隅海隅藪也孟諸在沛孟諸宋澤也在睢陽東北少室太室在冀州少室太室在陽城嵩高山之别名冀堯都冀州冀爲天下之號也燭龍在雁門北蔽於委羽之山不見日其神人面龍身而無足蔽至也委羽北方山名也一日龍銜燭以照太陰蓋長千里視爲晝暝爲夜吹爲冬呼爲夏后稷壠在建木西建木在都廣都廣南方澤名說其山說其澤壠家也其人死復蘇其半魚在其間南方人死復生或化爲魚在都廣建木間流黃沃民在其北方三百里狗國在其東雷澤有神龍身人頭鼓其腹而熙雷澤大澤也鼓擊也熙戲也地理志曰於禹貢雷澤在濟陰城陽西北城陽有堯塚江出岷山東流絶漢入海左還北流至於開母之北右還東流至於東極岷山在蜀西激水絶猶過也開母山名也在東海中河出積石睢出荆山河源出崑崙伏流地中方三千里禹導而通之故出積石積石山在金城郡河關縣西南荆山禹貢北條荆山在左馮翊懷得縣之南下有荆漂原雝州浸也淮出桐栢山睢出羽山桐栢山在上黨清漳出楬戾濁漳出發包楬戾山在上黨治發包山一名鹿苦山亦在上黨長子二漳合流經魏郡入清河也濟出王屋時泗沂出臺台術王屋山在河東垣縣東北時泗沂皆水名臺台術皆山名處則未聞也洛出獵山獵山在北地西北夷中洛東南流入渭詩云瞻彼洛矣惟水泱泱是也汶出弗其流合於濟弗其山在北海朱虛縣東也漢出嶓冢涇出薄落之山嶓冢山漢陽縣西界漢水所出南入廣漢東南至雝州入江薄落之山一名笄頭山安定臨涇縣西禹貢涇水所出東南至陽陵大渭渭出鳥鼠同穴伊出上魏鳥鼠同穴山在隴西首陽西南直渭水出東會於澧又入河雍州川也上魏山名也處則未聞雒出熊耳熊耳山在京師止維之西北也浚出華竅維出覆舟汾出燕京燕京山名也在太原汾陽汾水所出西南至汾陽冀州浸祍出濆熊淄出目飴目飴山名丹水出高褚高褚一名家領山在京兆上雒丹水所出東至均入沔也股出嶕山鎬出鮮于涼出茅盧石梁鮮于茅盧石梁皆山名也汝出猛山淇出大號猛山一名高陵山在南定陵縣汝水所出東南至新蔡入淮大號山在河內卭縣北或曰在臨慮西也晉出龍山結給合出封羊結給合一名也龍山在晉陽之西北晉水所出東入汾封羊山名也遼出砥石釜出景砥石山名在塞外遼水所出南入海景山在邯鄲西南釜水所出南澤入漳其原浪沸湧正勢如釜中湯故曰釜今謂之釜口岐出石橋呼池出魯平魯平山名也呼池并州之浸也今中山漢昌呼沱河是也泥塗淵出樠山樠讀人姓樠氏之樠維濕北流出於燕流於北燕北塞外也諸稽攝提條風之所生也諸稽攝提天神之名也艮爲條風也通視明庶風之所生也通視天神也明庶風震卦之所生也赤奮若清明風之所生也赤奮若天神也巽爲清明風也共工景風之所生也共工天神也人面蛇身離爲景風也諸比涼風之所生也諸比天神也坤爲涼風也臯稽閶闔風之所生也臯稽天神也兌爲閶闔風隅强不周風之所生也隅强天神也乾爲不周風窮奇廣莫風之所生也窮奇天神也在北方道足乘雨龍其形如虎坎爲廣莫風也突生海人突人之先人海人生若菌菌讀下羣之羣若菌生聖人聖人生庶人凡容者生於庶人羽嘉生飛龍飛龍羽嘉飛蟲之先飛龍有翼飛龍生鳳凰鳳凰生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生於庶獸介鱗生蛟龍介鱗鱗蟲之先蛟龍有鱗甲之龍也蛟龍生鯤鯁鯤鯁生建邪建邪生庶魚凡鱗者生於庶魚介潭生先龍介國也龜之先潭讀譚國之譚先龍生玄黿玄黿生靈龜靈龜生庶龜凡介者生於庶龜煖濕生容煖一讀膜當風乾燥之貌也煖濕生於毛風毛風生於濕玄濕玄生羽風羽風生煗介煗介生鱗薄鱗薄生煖介五類雜種興乎外肖形而蕃肖像也言相代象而蕃多也曰馮生陽閼曰馮木之先也陽閼生喬如喬如生幹木幹木生庶木凡根拔木者生於庶木根拔生程若根拔根生之草先也程若生玄玉玄玉生醴泉醴泉生皇辜皇辜生庶草凡根茇草者生於庶草海閭生屈龍海閭浮草之先生屈龍游龍鴻也詩云隰有游龍言屈字之誤屈龍生容華容華芙蓉草花容華生蔈蔈流也無根水中草也蔈生萍藻萍藻生浮草凡浮生不根茇者生於萍藻正土之氣也御乎埃天埃天五百𡻕生缺缺五百𡻕生黃埃黃埃五百𡻕生黃澒黃澒五百𡻕生黃金黃金惟石名也中央數五故五百𡻕而一化澒水銀也黃金千𡻕生黃龍入藏生黃泉黃泉之埃上爲黃雲陰陽相薄爲雷激揚爲電上者就下流水就通而合於黃海黃海中央之海偏土之氣御乎清天清天八百𡻕生青曾青曾八百𡻕生青澒青澒八百𡻕生青金青金八百𡻕生青龍東方木色青其數八故八百𡻕而一化也青龍入藏生清泉清泉之埃上爲青雲陰陽相薄爲雲雷激揚爲電上者就下流水就通而合於青海東方之海壯土之氣御於赤天赤天七百𡻕生赤丹赤丹七百𡻕生赤澒赤澒七百𡻕生赤金南方火其色赤其數七故七百𡻕而一化也赤金千𡻕生赤龍赤龍入藏生赤泉赤泉之埃上爲赤雲陰陽相薄爲雷激揚爲電上者就下流水就通而合於赤海南方之海弱土之氣御於白天白天九百𡻕生白礜白礜九百𡻕生白澒白澒九百𡻕生白金白金白礜礜石也白澒水銀也西方金色白其數九故九百𡻕而一化也白金千𡻕生白龍白龍入藏生白泉白泉之埃上爲白雲陰陽相薄爲雷激揚爲電上者就下流水就通而合於白海西方之海牝土之氣御於玄天玄天六百𡻕生玄砥玄砥黑石玄砥六百𡻕生玄澒玄澒六百𡻕生玄金北方水其色黑其數六故六百𡻕而一化也玄金千𡻕生玄龍玄龍入藏生玄泉玄泉之埃上爲玄雲陰陽相薄爲雷激揚爲電上者就下流水就通而合於玄海北方之海上者就下天氣復從天流下也其道流之水皆入於海也時則訓上則法也四時寒暑十二月之常法故曰時則因以題篇也孟春之月招搖指寅招搖斗建昏參中旦尾中參西方白虎之宿是也月昏時中於南方尾東方蒼龍之宿是也月將旦時中於南方其位東方其日甲乙盛德在木太皥之神治東方也甲乙木日也盛德在木木王東方也其蟲鱗其音角東方少陽物去大陰甲散散爲鱗鱗蟲龍爲之長角木也位在東方也律中太蔟其數八律管音也陰衰陽發萬物太簇地而生故曰太簇其數八五行數五木第三故曰八也其味酸其臭羶木味酸酸之言鑽也萬物鑽地而生羶木香羶其視戸祭先脾蟄伏之類始動生出由戸故曰祀戸也脾屬土陳設俎豆脾在前也春木勝土言常食所勝也一曰脾屬木自用其藏也東風解凍蟄蟲始振穌東方木火母也氣温故東風解冰凍也振動穌生也魚上負冰獺祭魚是月之時鯉魚應陽而動上負冰也獺獱也是月之時獺祭鯉魚於水邊四面陳之謂之祭魚也候鴈北是月時候之應鴈從彭蠡來北過周雒至漢中孕卵鷇也天子衣青衣乘蒼龍周禮馬七尺已上曰龍也服蒼玉建青旗服佩也熊虎也旗也食麥與羊麥金穀也羊土畜也是月金土以老食所勝先食麥以麥爲王也服八風水爨萁燧火取銅槃中露水服之八方風所吹也取萁木燧之火炊之萁讀該備之該也東宮御女青色衣青采鼓琴瑟春王東方故處東宮也琴瑟木也春木王故鼓之也其兵矛矛有鋒銳似萬物鑽地生其畜羊羊土木之母故畜之也朝於青陽左个以出春令是月之朔天子朝日於青陽左个東向堂故曰青陽北頭室故曰左个个猶隔也春令寬和之令也布德施惠行慶賞省傜賦布陽德施柔惠也慶善賞賜予也省減傜役之勞輕其賦歛也立春之日天子親率三公九卿大夫以迎𡻕於東郊率使也迎𡻕春也東郊郭外八里之郊也修除祠位幣禱鬼神犧牲用牡祠位壇場屏攝之位也幣圭壁也禱鬼神求福祥也人神曰鬼天神曰神犧牲用牡尚蠲潔也禁伐木春木王當長養故禁之也毋覆巢殺胎夭毋麛毋卵胎獸胎懷姙未育者也麋子曰夭鹿子曰麛卵未鷇者皆禁民不得取蕃庶物也毋聚眾置城郭掩骼薶骴毋聚合大眾建置城郭以妨害農功也骼骨有肉掩覆薶藏之愼生氣也孟春行夏令則風雨不時草木早落國乃有恐孟春木德用事法當寬仁而用火氣動於上故草木早落國惶恐也行秋令則其民大疫飄風暴雨總至黎莠蓬蒿並興孟春温仁而秋正金鈇之令氣不和故民疫疾風雨隈至故黎莠蓬蒿疏穢之草並興盛也行冬令則水潦爲敗雨霜大雹首稼不入冬陰也水泉湧起而春行之故爲敗氣不和故雨霜大雹植稼不熟也正月官司空其樹楊司空主土春土受嘉穡故官司空也爾雅曰楊蒲柳也楊木春光故其樹楊也仲春之月招搖指卯昏弧中旦建星中弧星在輿鬼南是月昏時中於南方建星在斗上是月平旦時中於南方也其位東方其日甲乙其蟲鱗其音角律中夾鍾是月萬物去陰夾陽聚地而生故曰夾鍾也其數八其味酸其臭羶其祀戸祭先脾始雨水桃李始華自冬氷雪至此春分穀雨故曰始雨水桃李於是皆秀華也蒼庚鳴鷹化爲鳩蒼庚爾雅曰商庚黎黃楚雀也齊人謂之搏黍秦人謂之黃流離幽冀謂之黃鳥一說斵木也至此月而鳴鷹化爲鳩喙正直不鷙搏也鳩謂布穀也天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宮御女青色衣青采鼓琴瑟其兵矛其畜羊朝於青陽太廟太廟東向堂中央室命有司省囹圄去桎梏毋笞掠止獄訟囹圄法室也省之赦輕微也在足曰桎在手曰梏母笞掠言不用也止猶禁也養幼小存孤獨以通句萌順春陽長養幼小使繁茂也無父曰孤無子曰獨皆存之所以愼陽氣也故草木不句萌者以通達也擇元日令民社元者善之長也日從甲至癸也社所以爲民祈也嫌日不吉故言擇元也是月也日夜分雷始發聲蟄蟲咸動穌分等也冬陰閉固雷伏不發是月陽升雷始發聲也咸皆動穌生也先雷三日振鐸以令於兆民曰雷且發聲鐸木鈴也金口木舌爲鐸所以振告萬民也兆大數且猶將也有不戒其容止者生子不備必有凶災以雷電合房室者生子必有瘖聾通精癡狂之疾故曰不備必有凶災也令官市同度量鈞衡石角斗稱度丈尺也量釜鍾也鈞等也衡石稱也百二十斤爲石角平也斗稱量器也端權槩端正也槩平也毋竭川澤毋漉陂池毋焚山林皆爲夭物盡類毋作大事以妨農功大事戎旅征伐之事故害農民之功也祭不用犧牲用圭璧更皮幣是月尚生育故不用犧牲也更代也以圭璧皮幣代犧牲也皮謂鹿皮也幣謂玄纁束帛也禮記曰幣帛圭皮告於祖禰者也仲春行秋令則其國大水寒風總至寇戎來征仲春陽中也陽氣長養而行秋節殺戮之令故寒氣猥至寇兵來征伐其國也行冬令則陽氣不勝麥乃不熟民多相殘仲春行冬陰之令陰氣勝陽故陽不勝則麥不升熟民相殘賊也行夏令則其國大旱煗氣早來蟲螟爲害仲春行夏太陽之令故大旱陽氣熱故煗極陽生陰故蟲螟作害也食心曰螟二月官倉其樹杏二月興農播穀故曰官倉也杏有竅在中竅在中像陰布散在上故其樹杏季春之月招搖指辰昏七星中旦牽牛中七星南方朱鳥之宿是月昏時中於南方牽牛北方玄武之宿是月平旦時中於南方也其位東方其日甲乙其蟲鱗其音角律中姑洗姑故也洗新也是月陽養生去故就新故曰姑洗其數八其味酸其臭羶其祀戸祭先脾桐始華田鼠化爲鴽桐梧桐也是月生華田鼠鼢鼦鼠也鴽鶉也青徐謂之鴾幽冀謂之鶉虹始見萍始生虹螮蝀也詩云螮蝀在東莫之敢指萍水藻也是月始生也天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宮御女青色衣青采鼓琴瑟其兵矛其畜羊朝於青陽右个東向堂南頭室故曰右个舟牧覆舟五覆五反乃言具於天子舟牧主舟之官也是月天子將乘舟而漁故反覆而視之恐有穿漏也五覆五反愼之至也天子烏始乘舟薦鮪於寢廟乃爲麥祈實烏猶安也自冬至此而安乘舟故曰始乘也薦進也鮪魚似鯉而大進此魚於寢廟祈於宗祖求麥實前曰廟後曰寢詩云寢廟奕奕言相連是月也生氣方盛陽氣發泄發泄猶布散也句者畢出萌者盡達不可以內天子命有司發囷倉助貧窮振乏絶無財曰貧鰥寡孤獨曰窮也振救也開府庫出幣帛使諸侯府庫幣帛之藏也使人之聘問諸侯聘名士禮賢者有名德之士大賢之人聘問禮之將與爲治也命司空時雨將降下水上騰循行國邑周視原野司空主水土之官也是月下水上騰恐有浸清傷害五穀故循行徧視之也廣平曰原郊外曰野也修利隄防導通溝瀆達路除道從國始至境止田獵畢弋罝罘羅𦉾餒毒之藥毋出九門畢掩網也弋繳射詩曰弋鳧與鴈罝兔罟也詩曰肅肅兔罝畢羅鳥罟也詩云鴛鴦在罘畢之羅之罘麋度罟網其總名也天子城門十二東方三門王氣所在門餒獸之毒藥所不得出尚生育也兼餘九門得出故特戒之如其毋出乃禁野虞毋伐桑拓桑拓皆可養蠶故禁民伐之也鳴鳩奮其羽載鵀降於桑鳴鳩奮迅其羽直刺上飛入雲中者是也載鵀載勝鳥也詩曰尸鳩在桑其子在梅是也具撲曲筥筐撲持也三轉謂之撲撲讀南陽人言山陵同曲薄也青徐謂之曲貟底曰筥方底曰筐皆受桑器也后妃齋戒東鄉親桑省婦使勸蠶事命五庫令百工審金鐵皮革筋角箭榦脂膠丹漆無有不良擇下旬吉日大合樂致歡欣樂所以移風易俗也故擇吉日大合之以致歡和也乃合㹎牛騰馬游牝於牧㹎牛特牛也騰馬騰駒跐蹏善將羣者也游從牝於所牧之地風合之㹎讀葛藟之藟也令國儺九門磔攘以畢春氣儺散宮室中區隅幽闇之處擊鼓大呼以逐不祥之氣如今驅疫逐除是也九門三方九門也磔犬陽氣盡之故曰畢春之氣也行是月令甘雨至三旬季春行冬令則寒氣時發草木皆肅國有大恐季春行冬寒殺之氣也故寒氣時起草木上疏曰肅也行夏令則民多疾疫時雨不降山陵不登季春行夏元陽之令氣不和故民疾疫雨澤不降故草木不登成也行秋令則天多沈陰淫雨早降兵革並起秋金氣用事水之母也季春行之故多陰沈爲雨也金爲兵革故並起也三月官鄉其樹李三月科民戸口故官鄉也李亦有核說與杏同李後杏熟故三月李也孟夏之月招搖指巳昏翼中旦婺女中翼南方朱鳥之宿是月昏時中於南方婺女一曰須女北方玄武之宿是月平旦中於南方也其位南方其日丙丁盛德在火炎帝之神治南方也丙丁火日也盛德在火火王南方也其蟲羽其音徵盛陽用事鱗散羽羽蟲鳳爲長徵音火也律中仲呂其數七是月陽散在外陰實在中所以旅陽成功故曰仲呂其數七生數五火第二故曰七也其味苦其臭焦火味苦也焦火香焦其祀竈祭先胏祝融吳回爲高辛氏火正死爲火神託祀於竈是月火王故祀竈胏胏金也祭祀之肉先用所勝也一曰胏火自用其藏也螻蟈鳴蚯螾出螻螻蛄也蟈蝦蟇也四月陰氣始動於下故類應鳴也蚯螾蠢蝡也王瓜生苦菜秀王瓜栝樓也爾雅曰不榮而實曰秀苦菜宜言榮也天子衣赤衣乘赤騮服赤玉建赤旗順火德也食菽與鷄菽豆連皮也鷄豆皆屬火之所養也服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙火王南方故處南宮也竽笙空中像陽故吹之其兵戟戟有枝榦象陽布散也戟或作弩也其畜雞朝於明堂左个以出夏令南向堂當盛陽故曰明堂也東頭室故曰左个居是室行是月之令也雞羽蟲陽也故畜之立夏之日天子親率三公九卿大夫以迎𡻕於南郊迎𡻕迎夏也南郊七里之郊也還乃賞賜封諸侯脩禮樂饗左右還從南郊還也賞賜有功割土封爵傳曰賞以春夏刑以秋冬也修治禮樂所以安上治民移風易俗左右近臣也命太尉贊傑俊選賢良舉孝悌太尉卿官也命使也贊白也才過千人爲傑選擇賢良孝悌舉而用之蓋非太尉之職故特命之也行爵出祿佐天長養繼修增高無有隳壞毋興土功毋伐大樹令野虞行田原勸農事驅獸畜勿令害穀天子以彘嘗麥先薦寢廟是月麥始升故以豕嘗麥豕水畜宜先薦寢廟孝之至也聚畜百藥靡草死是月陽氣極藥草成故聚積之也靡草則亭厯之屬麥秋至決小罪斷薄刑四月陽氣盛於上及五月陰氣作於下故曰麥秋至決小罪斷薄刑順殺氣也孟夏行秋令則苦雨數來五穀不滋四鄰入保孟夏盛陽當助長養而行金氣殺戮之令故苦雨殺穀不得滋長也四方之民來入城郭自保守也行冬令則草木早枯後乃大水敗壞城郭行冬寒閉固之令故草木早枯大水敗壞其城郭奸時違行之應也行春令則螽蝗爲敗暴風來格秀草不實孟夏當繼修增高助陽長養而行春時啟蟄之令故致螽蝗之敗春木氣多風故言暴風來至使當秀之草不長茂也四月官田其樹桃四月勉農事故官田也桃說與杏同後李熟故曰四月桃也仲夏之月招搖指午昏亢中旦危中亢東方蒼龍之宿是月昏時中於南方危北方玄武之宿是月平旦時中於南方也其位南方其日丙丁其蟲羽其音徵律中蕤賔其數七是月陰氣萎蕤在下像主人也陽氣在上像賔客也故曰蕤賔其味苦其臭焦其祀竈祭先肺小暑至螳蜋生螳蜋世謂之天馬一名齒肬兗豫謂之巨斧也鵙始鳴反舌無聲鵙百勞鳥也五月陰氣於下伯勞夏至應陰而鳴殺蛇於木傳曰伯趙氏司至者反舌百舌鳥也能辯變其舌反易其聲以效百鳥之鳴故謂百舌無聲者五月陽氣極於上微陰起於下百舌無陰故無聲也天子衣赤衣乘赤騮服赤玉載赤旗食菽與雞服八風水爨柘燧火南宮御女赤色衣赤采吹竽笙其兵戟其畜雞朝於明堂太廟廟南向堂中央室也命樂師修鞀鼙琴瑟管簫調竽箎飾鍾磬管一孔似笛簫今之歌簫是也箎讀如池澤之池也執干戚戈羽干盾也戈斧也戟屬也羽武也所持翿也命有司爲民祈祀山川百原大雩帝用盛樂國之山川百原能興雲雨者皆祈祀之也雩旱也祭上帝也爲民祈雨故用盛樂盛樂六代之樂也天子以雉嘗黍雉雜雞也不言嘗雞而言嘗黍者以穀爲主也羞以含桃先薦廟羞進也含桃鶯所含食故言含桃是月而熟故進之禁民無刈藍以染爲藍青未成故毋燒灰是月草木未成不夭物也毋暴布火盛曰猛暴布則脆傷也門閭無閉關市無索門城門也閭里門也民順陽氣散布在外當出入故不閉也門要塞也市人聚也無索不征稅也挺重囚益其食挺緩存鰥寡振死事老無妻曰鰥老無夫曰寡也皆存之有先人爲死難振起其子孫也游牝别其羣執騰駒班馬政是月牝馬懷胎已定故别其羣不欲騰駒蹏傷其胎育故執也班告也馬政掌馬官也騰駒騰馬也周禮馬五尺以下曰駒也日短至陰陽爭死生分君子齋戒愼身無躁節聲色薄滋味百官靜事無徑以定晏陰之所成事無徑詳後行當先請也晏陰微陰也鹿角解蟬始鳴夏至鹿角解墮也蟬鼓翼始鳴也半夏生木堇榮半夏草藥也木堇朝榮暮落樹高五六尺其葉與安石榴相似也是月生榮華可用作丞也雒家謂朝生詩云顏如蕣華也禁民無發火役起可以居高明遠眺望登邱陵處臺榭積土四方而高曰臺也臺有室曰榭也順陽宜明也一曰望雲物占氣祥也仲夏行冬令則雹霰傷穀道路不通暴兵來至冬水凍故雹霰傷害五穀也冬氣閉藏又多水雨故道陷壞不通利暴害之兵橫來至也行春令則五穀不熟百螣時起其國乃饑行春木王好生育之令故五穀晩熟百螣動股蝗屬也時起害穀故國飢也行秋令則草木零落果實蚤成民殃於疫有覈曰果無覈曰蓏仲夏行秋成熟之令故草木零落果實早成非其時氣故民有疾疫也五月官相樹榆是月陽氣長養故官相相佐也榆說未聞也季夏之月招搖指未昏心中旦奎中心東方蒼龍之宿也是月昏時中於南方奎西方白虎之宿也是月中旦時中於南方也其位中央其日戊己盛德在土黃帝之神治中央也戊己土日也盛德在土土正中央也其蟲蠃其音宮羽落而蠃蟲鱗爲之長宮土也位中央五音之主也律中百鍾其數五百鍾林鍾也是月陽盛陰起生養萬物故曰百鍾其數五五行數土第五也其味甘其臭香土味甘也土臭香也其祀中霤祭先心土用事故祀中霤中霤室中之祭祀后土也心火也用所勝也一曰心土也自用其藏也涼風始至蟋蟀居奧蟋蟀蜻烈趣織也詩云七月在野此日居奧不與經合奧或作壁也鷹乃學習腐草化爲蚈秋節將至鷹自習擊也蚈馬炫也幽冀謂之秦渠蚈讀奚徑之徑也天子衣苑黃乘黃騮服黃玉建黃旗黃順土色也黃謂登飴之登也食稷與牛稷牛皆屬土也服八風水爨柘燧火中宮御女黃色衣黃采其兵劍季夏中央也劍有兩刃諭無所生也一曰諭無所主皆主之也其畜牛朝於中宮是月天子朝於中宮中宮大室乃命漁人伐蛟取鼉登龜取黿漁人掌漁官也漁讀相語之語也蛟鼉黿皆魚屬也鼉可以作鼓詩曰鼉鼓洋洋黿可以作羹也傳曰楚人獻黿於鄭靈公靈公不與公子宋黿羹公子怒染指於鼎嘗之而出是也皆不害人易得故言取蛟有鱗甲能害人難得言伐龜神可決吉凶入宗廟尊之故言登也令滂人入材葦滂人掌池澤官也入材葦供國用也命四監大夫令百縣之秩芻以養犧牲周制天子地方千里分爲百縣縣有四郡郡有四鄙故春秋傳言下大夫受縣上大夫受郡秦初置三十六郡以監縣耳此云百縣者謂周制畿內之縣也四監監四郡大夫也秩常所當出故聚之用養犧牲也以共皇天上帝名山大川四方之神宗廟社稷爲民祈福行惠令弔死問疾存視長老行稃鬻厚席蓐以送萬物歸也命婦官染采黼黻文章青黃白黑莫不質良婦人能别五色故染采白與黑爲黼青與赤爲黻黑與赤爲文赤與白爲章質美也良善也以給宗廟之服必宣以明宣徧也明鮮明也是月也樹木方盛勿敢斬伐不可以合諸侯起土功動眾興兵必有天殃殃罰土潤溽暑大雨時行利以殺草糞田疇以肥土壃是月大暑土潤溽暑濕重也又有時可以殺草爲糞美土疆土分畔者也季夏行春令則穀實解落多風欬民乃遷徙春木王木性墮落陽發多風而行其令故穀實解落民疾病風欬嗽上氣像春陽布散民遷徙者也行秋令則邱隰水潦稼穡不熟乃多女災邱高也隰卑也言高下皆有水潦故殺稼令不熟也陰氣遇差故多女災女災生子不育也行冬令則風寒不時鷹隼蚤摯四鄙入保冬陰蕭殺而行其令故寒風不節鷹隼蚤摯擊四界之民皆入城郭自保守也六月官少內其樹梓六月植稼成熟故官少內也梓說未聞也時則訓下孟秋之月招摇指申昏斗中旦畢中斗北方玄武之宿是日昏時中於南方畢西方白虎之宿是月平旦時中於南方也其位西方其日庚辛盛德在金少皥之神治西方也庚辛金也盛德在金金王西方也其蟲毛其音商金氣寒蠃者衣毛毛蟲虎爲之長商金也位在西方律中夷則其數九夷傷也則法也是月陽衰陰盛萬物凋傷應法成性故曰夷則也其數九五行數五金第四故曰九也其味辛其臭腥金味辛也金臭腥也其祀門祭先肝孟秋始內入由門故祀門也肝木也祭祀之用所勝也一曰肝沈金自用其藏也涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮是月鷹搏鷙殺鳥於大澤之中四面陳之世謂之祭鳥用是時乃始行殺戮刑罰順秋氣也天子衣白衣乘白駱服白玉建白旗白順金色也白馬黑毛曰駱也食麻與犬服八風水爨柘燧火西宫御女白色衣白采撞白鍾金王西故處西宫也其兵戈其畜狗朝於總章左个以出秋令總章西向堂也西方總成萬物而章明之故曰總章左个南頭室也居是室行是月之令狗金畜也求不孝不悌戮暴傲悍而罰之以助損氣損氣陰氣立秋之日天子親率三公九卿大夫以迎秋於西郊西郊七里之外郊也還乃賞軍率武人於朝軍率軍將也武勇者功名也命將率選卒厲兵簡練桀俊專任有功以征不義詰誅暴慢順彼四方順循也四方天下也命有司修法制繕囹圄禁姦塞邪審決獄平詞訟決斷也平治也天地始肅不可以贏肅殺也殺氣始行也贏盛也故曰不可也是月農始升穀天子嘗新先薦寢廟升成薦進也命百官始收歛孟秋始內也完隄防謹障塞以備水潦修城郭繕宫室是月月麗於畢俾滂沲矣故備水潦也毋以封侯立太官行重幣出大使行是月令涼風至三旬封侯列土封邑也大官九命之爵也重幣金帛之幣也大使命卿使之金氣收歛皆近不宜行也故言毋也孟秋行冬令則陰氣大勝介蟲敗穀戎兵乃來孟秋陰也復行冬水王之令故陰氣勝也其介蟲敗穀也陰氣并故戎兵來也行春令則其國乃旱陽氣復還五穀無實春陽亢燥而行其令故旱也陽氣還者此月涼風而反行温風之令故敗穀令無實也行夏令則冬多火災寒暑不節民多瘧疾夏火王而行其令故多火災寒暑相干故不節使瘧疾瘧疾寒暑所生也七月官庫其樹楝庫兵府也秋節整兵故官庫也其樹楝楝實鳳凰所食也今雒城旁有樹楝實秋熟故其樹楝也楝讀練染之練也仲秋之月招搖指酉昏牽牛中旦觜嶲中牽牛北方玄武之宿是月月昏時中於南方觜巂西方白虎之宿也是月平旦時中於南方也其位西方其日庚辛其蟲毛其音商律中南呂其數九南任也言陽氣呂旅而志助陰陰任成萬物也庚辛金日也其味辛其臭腥其祀門祭先肝涼風至候鴈來玄鳥歸羣鳥翔時候之鴈從北漠中來過周雒南至彭蠡也玄鳥歸秋分後歸蟄所也羣鳥翔寒氣至羣鳥肥盛試其羽翼而高翔翔者六翮不動也或作養養育其羽毛也天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戈其畜犬朝於總章太廟總章西向堂也太廟中央室也命有司申嚴百刑斬殺必當無或枉撓枉曲也撓弱也言平直也決獄不當反受其殃反還是月也養長老授几杖行稃鬻飲食乃命宰祝行犧牲案芻豢草養曰芻穀養曰豢案其簿書閱租之豢讀宦學之宦視肥臞全粹全無虧缺也粹毛色純也粹讀禍祟之祟察物色課比類量小大視少長莫不中度天子乃儺以御秋氣儺猶除也御止也止秋氣不使爲害也儺讀躁難之難氣或作兵也以犬嘗麻先薦寢廟是月可以築城郭建都邑國有先君之宗廟曰都無曰邑都曰城邑曰築穿竇窖修囷倉穿竇所以通水不欲地濕也穿窖可以盛穀也窖讀窖藏人物之窖也乃命有司趣民收歛畜菜多積聚勸種宿麥若或失時行罪無疑是月也雷乃始收蟄蟲培戸殺氣浸盛陽氣日衰水始涸涸凝竭涸或作盛盛言陰勝也日夜分一度量平權衡正鈞石角斗稱理關市來商旅理通也入貨財以便民事四方來集遠方皆至財物不匱上無乏用百事乃遂遂成也仲秋行春令則秋雨不降草木生榮國有大恐春陽氣而行其令故雨不降又温煦之仁故草木生榮華也氣相干必有災咎故國大惶恐行夏令則其國乃旱蟄蟲不藏五穀皆復生行炎陽之令故旱涸氣熱故蟄蟲不藏使五穀復生行冬令則風災數起收雷先行草木早死冬行寒氣激之令故有風災又冬閉藏故收雷先行草木早死也八月官尉其樹柘尉戎官也是月治兵故官尉傳曰羊舌大夫爲中軍尉柘說未聞也季秋之月招搖指戌昏虛中旦柳中虛北方玄武之宿是月昏時中於南方柳南方朱雀之宿也是月平旦中於南方也其位西方其日庚辛其蟲毛其音商律中無射陰氣上升陽氣下降萬物隨陽而藏無射出見也其數九其味辛其臭腥其祀門祭先肝侯鴈來賔雀入大水爲蛤是月時侯之鴈從北漠中來南之彭蠡蓋以爲八月者其父母也是月來者蓋其子也羽翼稚弱故在後耳賔雀者老雀也栖宿人家堂宇之間如賔客者也故謂之賔大水海水也傳曰雀入海爲蛤也菊有黃華豺乃祭獸戮禽豺似狗而長尾其色黃是月時豺殺獸四面陳之世謂之祭獸戮猶殺也天子衣白衣乘白駱服白玉建白旗食麻與犬服八風水爨柘燧火西宮御女白色衣白采撞白鍾其兵戈其畜犬朝於總章右个西向堂北頭室故謂右个也命有司申嚴號令百官貴賤無不務入以會天地之藏無有宣出乃命冢宰農事備收舉五穀之要冢大也宰治也卿官也要簿書也藏帝籍之收於神倉天子籍田千畝故曰帝籍之收籍田所收之穀也神倉倉也是月也霜始降百工休霜降天寒朱漆難成故百工休止不復作器也乃命有司曰寒氣總至民力不堪其皆入室詩曰入此室處是也上丁入學習吹大饗帝嘗犧牲合諸侯制百縣是月上旬丁日入學官吹笙竽習禮樂饗上帝用犧牲合諸侯之制度車服之差各兩其命數也百縣畿內之縣言百舉全數耳五家爲鄰五鄰爲里四里爲酇四酇爲鄙四鄙爲縣然則縣二千五百家也爲來𡻕受朔日與諸侯所稅於民輕重之法貢𡻕之數以遠近土地所宜爲度來𡻕明年受朔日如今計吏朝賀豫明年之曆日也度者職貢多少有常也乃教於田獵以習五戎戎兵也刀劍予戟矢故曰五戎也命太僕及七騶咸駕戴荏授車以級皆正設於屏外級等也授當車者以高下各隨其等級正立設陳也天子外屏屏樹垣也爾雅曰門內之垣謂之樹垣者也司徒搢朴北嚮以贊之搢插也朴以教導也插置帶間贊相威儀也司徒主衆教導之也天子乃厲服廣飾執弓操矢以獵是月天子尚武乃服猛厲之服廣其所佩之飾以取禽也命主祠祭禽四方命教也主祠典祀之官也祭禽四方祀始設禽獸者於四方報其功不知其神所在故博求之於四方也是月草木黃落乃伐薪爲炭蟄蟲咸俛乃趨獄刑毋留有罪俛伏也青州爲伏爲俛也無留言當斷也收祿秩之不當供養之不宜者不當謂無德受祿也不宜謂不孝也一曰所養者無勳於國其先人又無賢德所不宜養故收也通路除道從境始至國而后已是月天子乃以犬嘗麻先薦寢廟孝之至也季秋行夏令則其國大水冬藏殃敗民多鼽窒季秋陰氣而行夏月霖雨之令故大水火氣故冬藏殃敗也火金相干故民鼽窒鼻不通利也鼽讀怨仇之仇也行冬令則國多盜賊邊境不寧土地分裂冬水純陰姦謀所生故多盜賊使邊境之民不安寧也則土地見侵削爲鄰國所分裂也行春令則煗風來至民氣解隋師旅並興春氣陽温故煗風至民氣解墮也木干金故師旅並興也二千五百人爲師五百人爲旅也九月官候其樹槐侯望也是月繕修守備故曰官候也槐懷也可以懷來遠人也孟冬之月招搖指亥昏危中旦七星中危北方玄武之宿也是月昏時中於南方七星南方朱鳥之宿也是月平旦時中於南方者也其位北方其日壬癸盛德在水顓頊之神治北方也壬癸水日也盛德在水王北方也其蟲介其音羽介甲也像冬閉固皮漫胡也甲蟲龜爲之長羽屬水也律中應鍾其數六陰應於陽轉成其功萬物聚成故曰應鍾其數六五行數五水第一故曰六也其味鹹其臭腐水味咸也水臭腐也其祀井祭先腎井水給人故祀也井或作行行門內地冬守在內故祀也腎水自開其藏也水始冰地始凍雉入大水爲蜃虹藏不見蜃蛤也大水淮也傳曰雉入于淮爲蜃虹陰中之陽也是月陰盛故不見也天子衣黑衣乘玄驪服玄玉建玄旗順水德也熊與虎曰旗也食黍與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石水王北方故處北宫也其兵鍛其畜彘鍛者卻內像陰閉彘水畜朝於玄堂左个以出冬令北向堂西頭室故曰左个居是室行此月令也命有司修羣禁順陰閉諸所當禁皆使有司禁也禁外徙閉門閭大搜客傳曰禁舊客爲露情也有新客搜出之爲觀釁也門城門之閭里門也嚴閉之守備也斷罰刑殺當罪諸罰刑當決也當罰正罪故殺之也阿上亂法者誅阿意曲從取容於上以亂法度也誅治也立冬之日天子親率三公九卿大夫以迎𡻕於北郊還乃賞死事存孤寡有忠節蹈義死王事者賞其子孫也幼無父曰孤無夫曰寡皆存慰矜恤之是月命太祝禱祀神位占龜策審卦兆以察吉凶於是天子始裘命百官謹蓋藏命司徒行積聚修城郭警門閭修楗閉愼管籥固封璽封門也璽印也修邊境完要塞絶蹊徑飾喪紀審棺槨衣衾之薄厚飾治也紀數也二十五月之數也棺槨衣衾薄厚各有差等故審之營邱壠之小大高庳使貴賤卑尊各有等級營度也邱壟冢也小大高下各有度量也是月也工師效功陳祭器案度呈堅致爲上案視也度法也堅致功牢也爲故也上盛也工事苦慢作爲淫巧必行其罪苦惡也慢不牢也淫巧非常之巧也故行其罪苦謂監會之監也是月也大飲蒸天子祈來年於天宗蒸冬祭也於是時大飲酒而祭求明年之福祥也凡屬天子之神日月星辰皆爲天宗也大禱祭於公社畢饗先祖禱求也公社也后土之祭也生爲上公死爲貴神故曰公也畢饗先祖先公後私之義也勞農夫以休息之命將率講武律射御角力勁律習也角平地也勁强貌也乃命水虞漁師收水泉池澤之賦虞掌水官也師長也賦稅也毋或侵牟牟多孟冬行春令則凍閉不密地氣發泄民多流亡春陽氣散越故凍閉不密地氣發泄也民多流亡像陽氣布散行夏令則多暴風方冬不寒蟄蟲復出冬當閉藏方行夏盛陽之令故多暴疾陽氣温故盛冬不寒令蟄伏之蟲復出也行秋令則雪霜不時小兵時起土地侵削秋氣干冬大寒不當雪而雪不當霜而霜故曰不時也小兵數起鄰國來伐侵削其土地十月官司馬其樹檀冬間講武故官司馬也檀陰木也仲冬之月招搖指子昏壁中旦軫中東壁北方玄武之宿是月昏時中於南方軫南方朱鳥之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中黃鍾其數六黃鍾者陽氣聚於下陰氣盛於上萬物黃萌於地中故曰黃鍾也其味鹹其臭腐其祀井祭先腎水益壯地始坼鳱鴡不鳴虎始交鳱鴡山鳥陽是月陰盛故不鳴也虎陽中之陰也陰氣盛以類發也交讀將校之校也天子衣黑衣乘鐵驪服玄玉建玄旗食黍與彘服八風水爨松燧火北宫御女黑色衣黑采擊磬石其兵鎩其畜彘朝於玄堂太廟北向堂中央室故曰太廟也命有司曰土事無作無發室居及起大眾是謂發天地之藏諸蟄則死民必疾疫有隨以喪急捕盜賊誅淫泆詐僞之人命曰畼月陰氣在上民人空間故命曰畼月命奄尹申宮令奄官也尹正也申宮令重戒敕也審門閭謹房室必重閉助陰氣也省婦事乃命大酋秫稻必齊麴糵必時酋主沽酒官也醖釀米麴使化熟故謂之酋酋讀酋豪之酋齊讀齊和之齊也作麴糵當得其時不時則不成也湛熺必潔水泉必香湛漬也熺炊必令圭潔也水泉者則酒善也湛讀審釜之審熺炊熾火之熾也陶器必良火齊必得無有差忒陶器瓦器也炊享必得其適故曰無有差忒也天子乃命有司祀四海大川名澤能興雲雨故祀之也是月也農有不收藏積聚牛馬畜獸有放失者取之不詰詰呵問也山林藪澤有能取疏食田獵禽獸者野虞教導之其有相侵奪罪之不赦大加刑也是月也日短至陰陽爭君子齋戒處必掩身欲靜去聲色禁嗜欲聲絲竹金石之聲也色美色也有貪欲濫求者禁之寧身體安形性閉情欲也是月也荔挺出芸始生邱螾結麋角解荔馬荔草也芸芸蒿菜名也邱螾蟲名也結屈結也麋角解墮皆應微陽氣也水泉動則伐樹木取竹箭罷官之無事器之無用者罷省涂闕庭門閭築囹圄所以助天地之閉仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲夏氣炎陽故其國旱也清濁相干故氛霧㝠㝠也十一月雷發聲非其時也故言乃也行秋令則其時雨水瓜瓠不成國有大兵秋金氣水之母也故雨水水金用事故有大兵也行春令則蟲螟爲敗水泉咸竭民多疾癘春陽氣蟄伏生故蟲螟敗穀水泉竭也陽干陰氣不和故多疾癘也十一月官都尉其樹棗冬成軍師故官都尉棗取其赤心也季冬之月招搖指丑昏婁中旦氐中婁西方白虎之宿是月昏時中於南方氐東方蒼龍之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中大呂呂旅也萬物萌動於黃泉未能達見所以旅旅去陰卽陽助其成功故曰大呂其數六其味鹹其臭腐其祀井祭先腎鴈北鄉鵲加巢鴈在彭蠡之水皆北嚮將至北漠中也鵲感陽而動上加巢也雉雊雞呼卵詩云雉之朝雊尚求其雌是也雞呼鳴求卵也天子衣黑衣乘鐵驪服玄玉建玄旗食麥與彘服八風水爨松燧火北宮御女黑色衣黑采擊磬石其兵鍛其畜彘朝於玄堂右个右个東頭室也命有司大儺旁磔出土牛大儺今之逐陰驅疫爲陽導也旁磔四面皆磔犬羊以禳四方之疾疫也出土牛今鄉縣出勸農耕之土牛於外是也命漁師始漁是月將捕魚故命其長也漁讀論語之語天子親往射漁先薦寢廟令民出五種令農計耦耕事修耒耜具田器耦合命樂師大合吹而罷乃命四監收秩薪以供寢廟及百祀之薪燎是月也日窮於次月窮於紀星周於天十二次窮於牽牛中也紀道窮於故宿也星周于天謂二十八舍更見南方至是月周匝也𡻕將更始令靜農民無有所使天子乃與公卿大夫飾國典論時令以待嗣𡻕之宜乃命太史次諸侯之列賦之犧牲賦布以供皇天上帝社稷之芻享乃命同姓女國供寢廟之芻豢卿士大夫至於庶民供山林名川之祀季冬行秋令則白露早降介蟲爲妖四鄙入保秋節白露故白露早降介甲之蟲爲妖災金氣爲兵故四境之民入城郭自保守也行春令則胎夭傷國多痼疾命之曰逆季冬大寒而行春温之令氣不和則胎養夭傷國多篤疾逆風氣之由也故命之曰逆故也行夏令則水潦敗國時雪不降氷凍消釋夏氣炎陽有多霖雨故水潦敗國也時雪當降而不降氷凍不當消釋而消釋皆干時之徵也十二月官獄其樹櫟十二月𡻕盡刑斷故獄官也櫟可以爲車轂木不出火唯櫟爲然亦應除氣也五位東方之極自碣石山過朝鮮貫大人之國碣石在遼西界海水西畔朝鮮樂浪之縣也貫通也大人國在其東也東至日出之次扶榑木之地青土樹木之野榑木榑桑太皡句芒之所司者萬二千里太皡庖犧氏東方木德之帝也句芒木神司主也其令曰挺羣禁開閉闔通窮窒達障塞行優游棄怨惡解役罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛强剛强侵陵人不循軌度者禁止之也南方之極自北戸孫之外北戸孫國名也日在其北皆爲北向戸以日故北戸貫顓頊之國南至委火炎風之野赤帝祝融之所司者萬二千里赤帝炎帝少典之子號爲神農南方火德之帝也祝融顓頊之孫老童之子吳回也一名黎爲高辛氏火正號爲祝融死爲火神也其令曰爵有德賞有功惠賢良救饑渴舉力農賑貧窮惠孤寡憂罷疾出大祿行大賞起毀宗立無後封建侯立賢輔應陽施也中央之極自崑崙東絶兩桓山自從也絶猶過也恒山常也言兩未聞也日月之所道江漢之所出日月照其所經過之道江出岷山漢出番冢山眾民之野五穀之所宜龍門河濟相貫以息壤堙洪水之州東至於碣石黃帝后土之所司者萬二千里黃帝少典之子以土德正天下號爲軒轅氏死爲中央土德之帝后土者勾龍氏之子名曰后土能平九土死祀爲土神也其令曰平而不阿明而不苛包裹覆露露潤無不囊懷溥汜無私正靜以和行稃鬻養老衰弔死問疾以送萬物之歸土四方之主也故曰萬物之所歸也西方之極自崑崙絶流沙沈羽西至三危之國流沙蓋在崑崙之西南耳石城金室飲氣之民不死之野少皡蓐收之所司者萬二千里少皡黃帝之子青陽也名摯以金德王天下號爲金天氏死爲西方金德之帝也蓐收金天氏之裔子曰修禮死爲金神也其令曰審用法誅必辜備盜賊禁姦邪飾羣牧謹著聚修城郭補決竇塞蹊徑遏溝瀆止流水雝谿谷守門閭陳兵甲選百官誅不法應金斷也北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤羣水之野顓頊玄冥之所司者萬二千里顓頊黃帝之孫也以水德王天下號高陽氏死爲北方水德之帝也其神玄冥者金天氏有適子曰昧爲玄瞑師死而祀爲主水之神也其令曰申羣禁固閉藏脩障塞繕關梁禁外徙斷罰刑殺當罪閉關閭大搜客止交游禁夜樂蚤閉晏開以塞姦人己德執之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋行水毋發藏毋釋罪應陰殺也六合孟春與孟秋爲合仲春與仲秋爲合季春與季秋爲合孟夏與孟冬爲合仲夏與仲冬爲合季夏與季冬爲合孟春始贏孟秋始縮贏長也縮短也仲春始出仲秋始內出二月播種內八月收歛季春大出季秋大內孟夏始緩孟冬始急緩四月陽安急十月寒肅仲夏至脩仲冬至短夏至北極冬至南極短脩皆在至前也季夏德畢季冬刑畢德畢陽施結刑畢刑獄盡故正月失政七月涼風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其鄉六月失政十二月草木不脫不脫葉槁著樹不零落也七月失政正月大寒不解東風不解凍也八月失政二月雷不發不發聲也九月失政三月春風不濟濟止十月失政四月草木不實實長十一月失政五月下雹霜十二月失政六月五穀疾狂疾狂不華而實也春行夏令泄象盛陽發泄也行秋令水水生於中申故水也行冬令肅象氣肅急夏行春令風象春木氣多也行秋令蕪象秋氣蕪穢生行冬令格格歧也象冬斷刑恩澤致格不流下秋行夏令華象夏氣樹華茂行春令榮象春氣生榮華行冬令耗耗零落也冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣陰故亂霧製度陰陽大制有六度天爲繩地爲準春爲規夏爲衡秋爲矩冬爲權繩者所以繩萬物也繩正準者所以準萬物也規者所以貟萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也繩之爲度也直而不爭修而不窮久而不弊遠而不忘與天合德與神合明所欲則得所惡則亡自古及今不可移匡厥德孔密廣大以容眾是故上帝以爲物宗宗本準之爲度也平而不險均而不阿廣大以容寬裕以和柔而不剛銳而不挫銳利也挫折也流而不滯流行也滯止也易而不穢發通而有紀紀道周密而不泄準平而不失萬物皆平民無險謀怨惡不生是故上帝以爲物平平正讀評議之平也規之爲度也轉而不復貟而不垸復遏也垸轉也優而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起優簡寬舒之貌規度不失生氣乃理氣類理達衡之爲度也緩而不後平而不怨施而不德弔而不責常平民祿以繼不足勃勃陽陽唯德是行養長化育萬物蕃昌以成五穀以實封疆其政不失天地乃明明理矩之爲度也肅而不悖剛而不憒取而無怨內而無害威厲而不懾令行而不廢殺伐旣得仇敵乃克矩正不失百誅乃服權之爲度也急而不贏殺而不割充滿以實周密而不泄敗物而弗取罪殺而不赦誠信以必堅慤以固冀除苛慝不可以曲故冬正將行必弱以强必柔以剛權正而不失萬物乃藏明堂之制靜而法準動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥溼寒暑以節至甘雨膏露以時降覽㝠訓覽觀幽㝠變化之端至精感天通達無極故曰覽㝠因以題篇昔者師曠奏白雪之音而神物爲之下降風雨暴至平公𤸇病晉國赤地白雪太一五十弦琴瑟樂名也神物卽神化之物謂玄鶴之屬來至無頭鬼類操戈以舞也平公晉悼公之子彪也𤸇病篤疾赤地旱也唯聖君能御此異無災耳平公德使薄不能堪故篤病而大旱也庶女叫天雷電下擊景公臺隕支體傷折海水大出庶賤之女齊之寡婦無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明寃結叫天天爲作雷電下擊景公之臺隕壞也毀景公之支體海水爲之大溢出也夫瞽師庶女位賤尚葈權輕飛羽尚主也葈者葈耳菜名也幽冀謂之檀菜雒下謂之胡葈主是官者至微賤也瞽師庶女之位復賤於主葈之官故曰權輕飛羽也然而專精厲意委務積神上通九天激厲至精九天八方中央也以精誠感之由此觀之上天之誅也雖在壙虛幽間遼遠隱匿重襲石室界障險阻其無所逃之亦明矣上天上帝也上帝神明言人有罪惡雖自隱蔽匿藏猶見誅害也故曰無所逃也武王伐紂渡於孟津陽侯之波逆流而擊陽侯陵陽國侯也其國近水溺死於水其神能爲大波有所傷害因謂之陽侯之波也疾風晦冥人馬不相見於是武王左操黃鉞右秉白旄瞋目而撝之曰余任天下誰敢害吾意者於是風濟而波罷濟止魯陽公與韓搆難戰酣日暮援戈而撝之日爲之反三舍魯陽楚之縣公也楚平王之孫司馬子期之子國語所謂魯陽文子楚僭號稱王其守縣大夫皆稱公故曰魯陽公今南陽魯陽是也酣對戰合樂時也撝日令反卻行三舍舍次宿也夫全性保眞不虧其身遭急迫難精通於天若乃未始出其宗者何爲而不成精通於天者謂聖人質成上通爲天所助宗者道之本也謂性不外逸生與道同也夫死生同域不可脅淩勇武一人爲三軍雄武士也江淮間謂士曰武彼直求名耳而能自要者尚猶若此又況夫宮天地懷萬物以天地爲宮室懷猶囊也而友造化造化陰陽也與之相朋友含至和直偶於人形外直偶與人同形而內有大道也觀九鑽一知之所不知九謂九天一龜也觀九天之變鑽龜占兆所不知事亦云然也而心未嘗死者乎心未嘗死者謂心生與道同者也不與觀九鑽一等也昔雍門子以哭見於孟嘗君雍門子名周善彈琴又善哭雍門齊西門也居近之因以爲氏哭猶歌也見猶感孟嘗君齊相田文已而陳辭通意撫心發聲孟嘗君爲之增欷鴃唈流涕狼戾不可止增重也鴃唈失聲也狼戾猶交橫也鴃讀鴛鴦之鴦也唈讀左傳嬖女人姻姶之姶精神形於內而外諭哀於人心此不傳之道言能以精誠哀悲感傷人心不可學而得之故曰不傳之道也使俗人不得其君形者而效其容必爲人笑君形者言至精爲形也故蒲且子之連鳥於百仞之上蒲且子楚人善弋射者七尺曰仞也而詹何之騖魚於大淵之中此皆得清淨之道太浩之和也詹何楚人知道術者也言其善鉤令魚馳騖來趨鉤餌故曰騖魚得其精微故曰太浩之和也夫物類之相應玄妙深微知不能論辯不能解故東風至而酒湛溢東風木風也酒湛清酒也來物下湛故曰湛木味酸酸風入酒故酒醉而湛者沸溢物類相感也蠶咡絲而商弦絶或感之也老蠶上下絲於口故曰咡絲新絲出故絲脆商於五音最細而急故絶也咡或作珥蠶老時絲在身中正黃達見于外如珥也商西方金音也蠶午火也火壯金囚應商而已或有新故相感者也畫隨灰而月運闕鯨魚死而彗星出或動之也運讀連圍之圍也運者軍也將有軍事相圍守則月運出也以蘆草灰隨牖下月光中令圜畫缺其一面則月運亦缺於上也鯨魚大魚蓋長數里死於海邊魚之身賤也彗星爲變異人之害也類相動也故聖人在位懷道而不言澤及萬民聖人行自然無爲之道故澤及萬民也君臣乖心則背譎見於天神氣相應徵矣日旁五色氣在兩邊外出爲背外向爲譎內向爲珥在上外出爲冠也故山雲草莽水雲魚鱗山中氣出雲似草木水氣出雲似魚鱗旱雲煙火涔雲波水各像其形類所以感之旱雲亢陽氣似煙火涔大滀水也雲出於涔似波水也夫陽燧取火於日方諸取露於月夫讀大夫之夫已說在上一說水火從太極來在人手中非所能說知天地之間巧厯不能舉其數巧工也天地之間物類相感者眾多雖工爲厯術者不能悉舉其數也手徵忽怳不能覽其光言手雖覽得徵物不能得其光一說天道廣大手雖能徵其忽怳無形者不能覽得日月之光也然以掌握之中引類於太極之上太極天地始形之時也上猶初也而水火可立致者陰陽同氣相動也動猶化也此傳說之所以騎辰尾也言殷王武丁夢得賢人使工寫其像旁求之得傅說於傅巖遂以爲相爲高宗成八十一符致中興也死託精於辰尾之星一名策也故至陰飂飂至陽赫赫兩者交接成和而萬物生焉眾雄而無雌又何化之所能造乎所謂不言之辯不道之道也故召遠者使無爲焉遠者四夷也欲致化四夷者當以無爲無爲則夷荒自至也親近者使無事焉近者諸夏也欲親近者當以無事無事則近人自親附之惟夜行者爲能有之夜行喻陰行也陰行神化故能有天下也一說言入道者如夜行幽冥之中爲能有召遠親近之道也故卻走馬以糞而車軌不接於遠方之外卻走馬以糞老子辭也止馬不以走但以糞糞曰也行至德之效也一說國君無道則戎馬生於郊無事止走馬以糞田也故兵車之軌不接遠方之外兩輪之間爲軌也是謂坐馳陸沈晝冥宵明言坐行神化疾於馳傳沈浮冥明與道合也以冬鑠膠以夏造冰夫道者無私就也無私去也能者有餘拙者不足言以非時鑠膠造冰難成之也天道無私就去能行道功有餘也順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧隋侯漢東之國姬姓諸侯也隋侯見大蛇傷斷以藥傅之後蛇於江中銜大珠以報之因曰隋侯之珠蓋明月珠也楚人卞和得美玉璞於荆山之下以獻武王王以示玉人玉人以爲石刖其左足文王卽位復獻之以爲石刖其右足抱璞不釋而泣血及成王卽位又獻之成王曰先君輕刖而重剖石遂剖視之果得美玉以爲璧蓋純白夜光文玉在春秋前成王不以告故不書也得失之度深微窈冥難以知論不可以辯說也何以知其然今夫地黃主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以生殊死之人亦可謂失論矣王孫綽蓋周人也曰衛人王孫賈之後也言一劑藥愈偏枯之病欲倍其劑以生已死之人也若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐵也而求其引瓦則難矣物固不可以輕重論也夫燧之取火於日磁石之引鐵蟹之敗漆以蟹置漆中則敗壞不燥不任用也葵之鄉日雖有明智弗能然也然猶明也故耳目之察不足以分物理心意之論不足以定是非故以智爲治者難以持國唯通於太和而持自然之應者爲能有之能有持國之術故嶢山崩而薄落水涸嶢山在雍州也薄落水在馮翊臨晉臨晉山窮相通也一曰薄落涇水也區冶生而淳鈞之劍成區讀歌謳之謳也區越人善冶劍工也淳鈞古大銳劍也紂爲無道左强在側左强紂之諛臣也教紂無道勸以貪淫也太公並世故武王之功立立成由是觀之利害之路禍福之門不可求而得也言其門戸不可豫求而得知也忽然來至無形逃也夫道之與德若韋之與革遠之則邇近之則遠革之質象道韋之質象德欲遠去之道反在人側欲以事求之去人已遠也無事者近人有事者遠人不得其道若觀儵魚儵魚小魚也在水中可觀見見而不可得道亦如之故聖若鏡不將不迎將送應而不藏應猶隨也謂鏡隨人形好醜不有藏匿者也故萬化而無傷其得之乃失之其失之非乃得之也自謂得是乃失道者也自謂失道未必不得道也今夫調弦者叩宮宮應彈角角動此同聲相和者也叩大宮則少宮應彈大角則少角動故曰同音相和夫有改調一弦其於五音無所比鼓之而二十五弦皆應此未始異於聲而音之君已形也一弦宮音也音之君也故二十五弦皆和也一說改調一弦不比五音調一聲宮音也故曰未始異於聲也五主於一聲故曰音之君已形君主形見也故通於太和者惛若純醉而甘卧以游其中而不知其所由至也太和謂等死生之和齊窮達之端其中道之中也不自知所至此也純温以淪鈍悶以終若未始出其宗純一也温和也淪没也倫潜伏也鈍悶無情也欲終始於道宗本也若未有其形是謂大通今夫赤螭青虬之游冀州也赤螭青虬皆龍屬也天清地定毒獸不作飛鳥不駭入榡薄食薦梅薦梅草實也狀如桑椹其色赤生江濱也噆味含甘步不出頃畝之區而蛇鱓輕之以爲不能與之爭於江海之中噆味長美也蛇鱓自以爲能勝赤螭青虬若乃至於玄雲之素朝玄黑也素白也黑雲升合於明朝也陰陽交爭降扶風雜凍雨扶搖而登之降下也扶風疾風也凍雨暴雨也扶搖發動也登上上風雨而去威動天地聲震海內四海之內悉畏之也蛇鱓著泥百仞之中百仞七百尺也渡深曰仞傳曰仞溝洫也熊羆匍匐邱山磛巖虎豹襲穴而不敢咆襲入咆嘷猨狖顛蹶而失木枝狖讀中山人相遺物之遺也狖猨屬也長尾而昂鼻也又況直蛇鱓之類乎鳳凰之翔至德也雄曰鳳雌曰凰爲至德之君而來翔也雷霆不作風雨不興川谷不澹澹溢草木不搖而燕雀佼之以爲不能與之爭於宇宙之間燕雀自以爲能佼健於鳳凰也佼或作詨詨哭也宇屋簷也宙棟梁也易曰上棟下宇也還至其曾逝萬仞之上翺翔四海之外曾猶高也逝猶飛也一曰回也翼一上一下曰翺不搖曰翔外猶表也過崑崙之疏圃飲砥柱之湍瀨䟽圃在崑崙之上過猶厯也砥柱河之隘也在河東大陽之東湍𣵡水至疾瀨清皆激𣵡急流邅回䝉汜之渚邅回猶尚佯也蒙汜曰所出之地也池決復入爲渚渚小洲也尚佯冀州之際徑躡都廣入日抑節躡至也都廣東南之山名也眾帝所自上下也言鳳凰過廣都之野送日入於抑節之地言其翔之廣也躡或作絶也徑過絶厯也羽翼弱水暮宿風穴濯羽翼於弱水之上風穴北方寒風從地出也當此之時鴻鵠鶬鸖莫不憚驚伏竄注喙江裔注喙喙注地不敢動也裔邊也又況直燕雀之類乎此明於小動之迹而不知大節之所由者也昔者王良造父之御也王良晉大夫御無恤子良也所謂御良也一名孫無政爲趙簡子御死而託精於天駟星天文有王良星是也造父贏姓伯翳之後飛廉之子爲周穆王御上車攝轡馬爲整齊而歛諧整齊不差歛諧馬容體足調諧也投足調均勞逸若一一同心心怡氣和體便輕畢畢疾也安勞樂進馳騖若滅滅没也言疾也左右若鞭周旋若環左右謂騑驂也步趨之力若被鞭矣一說言掉鞭教諭其易也周旋若環如人志也世皆以爲巧然未見其貴者也若夫鉗且大丙之御此二人太一之御也一說古得道之人以神氣御陰陽也除轡銜去鞭棄策車莫動而自舉馬莫使而自走也但以車馬爲主耳神氣扶之也日行月動星燿而玄運耀有也玄天也運行也電奔而鬼騰進退屈伸不見朕垠朕兆朕也垠形狀也故不招指不咄叱過歸鴈於碣石言其御疾到自息止乃使北歸於碣石之山而中之鴈得之過去也過讀責過之過軼鶤鷄於姑餘自後過前曰軼也姑餘山名在吳也鶤雞鳳凰之别名也言其御疾自碣石過歸鴈便復東南軼過鶤雞于姑餘山也騁若飛騖若絶縱失躡風追猋歸縱履也足疾及箭矢躡蹈也一說矢在後不能及故言縱其行疾能及矢言躡追猋及之猋光中有影者忽然便歸皆及此言疾也朝發榑桑日入落棠榑桑日所出也落棠山名日所入也此假弗用而能以成其用者也弗用無爲非慮思之察手爪之巧也嗜欲形於胷中而精神踰於六馬此以弗御御之者也言藏嗜欲之形于胷臆之中踰和也以弗御御之以道術御也昔者黃帝治天下而力牧太山稽輔之力牧太山稽黃帝師孟子曰王者師臣也以治日月之行律律度也治陰陽之氣節四時之度正律厯之數别男女異雌雄明上下等貴賤使强不掩弱眾不暴寡人民保命而不夭安其性命不夭折也𡻕時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尤君臣調和無尤過也法令明而不闇輔佐公而不阿卿士公正不立私曲從也田者不侵畔漁者不爭隈隈曲深處魚所聚也道不拾遺市不豫賈城郭不關關閉也邑無盜賊鄙旅之人相讓以財言所有余狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五穀登熟虎狼不妄噬鷙鳥不妄搏鳳凰翔於庭翔猶止也麒麟游於郊游行也郊邑外也青龍進駕飛黃伏皂飛黃乘黃也出西方狀如狐背上有角壽千𡻕皂櫪也諸北儋耳之國莫不獻其貢職皆北極夷國也然猶未及虙戲氏之道也往古之時四極廢九州裂裂分也廢頓也天不兼覆地不周載火爁炎而不滅水浩洋而不息息消猛獸食顓民顓善鷙鳥攫老弱攫撮於是女媧鍊五色石以補蒼天女媧陰帝佐虙戲治者也三皇時天不足西北故補之師說如此斷鼇足以立四極鼇大龜天廢頓以鼇足柱之楚詞曰鼇載山下其何以安之是也殺黑龍以濟冀州黑龍水精也力牧太稽殺之以止雨也濟朝也冀九州中謂今四海之內積蘆灰以止淫水蘆葦也生於水故積聚其灰以止淫水平地出水爲淫水蒼天補四極正淫水涸冀州平狡蟲死顓民生蟲狩背方州抱圓天方州地也和春陽夏殺秋約冬枕方寢繩方榘四寸也寢繩眞身而卧也陰陽之所壅沈不通者竅理之逆氣戾物傷民厚積者絶止之逆氣亂氣也以害民物之積財故絶止也當此之時卧倨倨興眄眄倨倨卧無思慮也倨讀虛曰之虛也眄眄然視無智巧貌也一自以爲馬一自以爲牛其行蹎蹎其視瞑瞑蹎讀填窴之填侗然皆得其和莫知所由生浮游不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黃壚上與九天交接下契至黃壚黃泉下有壚土也壚讀繩纑之纑名聲被後世光輝重萬物使萬物有光輝也乘雷車服駕應龍驂青虬駕應德之龍在中爲服在旁爲驂有角爲龍無角爲虬一說應龍有翼之龍也援絶瑞席蘿圖珠絶之瑞應援而致之也羅列圖籍以爲席蓐一說羅圖車上席也黃雲絡前白螭後奔蛇絡讀道路之路也謂車之垂絡也黃雲之氣絡其車白螭導在於前奔蛇騰蛇也從在於後皆瑞應也浮游消搖道鬼神登九天九天八方中央朝帝於靈門在朝於上帝靈門也宓穆休於太祖之下宓寧也穆和也休息也太祖道之大宗也然而不彰其功不揚其聲彰揚皆明隱眞人之道以從天地之固然隱藏也眞人眞德之人固自然也何則道德上通而智故消滅也智固巧詐逮至夏桀之時主闇晦而不明道瀾漫而不修仁義道不復修設故曰瀾漫棄捐五帝之恩刑推蹶三王之法籍是以至德滅而不揚帝道揜而不興興舉也舉事戾蒼天發號逆四時戾反也春秋縮其和天地除其德縮藏也言和氣不復行也言其所施日惡不自知也故曰除其德也仁君處位而不安大夫隱道而不言不爲民所安隱仁義之道不正諫直言也論語曰國無道危行言遜也羣臣準上意而懷當準望也懷思也當合也取合主意不復以道正諫也疏骨肉而自容邪人參耦比周而陰謀陰謀私謀也居君臣父子之間而競載驕主而像其意像猶隨也亂人以成其事是故君臣乖而不親骨肉疏而不附植社槁而墵裂言不禋於神也容臺振而掩覆容臺行禮容之臺言不能行禮故天文振動而敗之犬羣嘷而入淵言將滅壞犬失其主故嘷而入淵也一說言犬禍也豕銜蓐而席澳豕銜其蓐席入之澳言豕禍一說銜蓐自藏處也美人挐首墨面而不容首亂頭也草與髮并編爲挐首不修容飭也曼聲吞炭內閉而不歌曼聲善歌也見世亂哀將滅故吞炭自敗音聲閉氣不復動也喪不盡其哀獵不聽其樂言時亂禮壞不盡在哀樂崩故不復聽田獵之樂西老折勝黃神嘯吟西王母折其頭上所載勝爲時無法度黃帝之神傷道之衰故嘯吟而長嘆也飛鳥鍛翼走獸廢腳鍛翼縱翼也廢腳跛蹇也言桀無道田獵煩數鳥獸悉被創夷鍛翼廢腳也山無峻榦澤無洼水峻榦美材也洼水渟水言山澤不以時故也狐狸首穴馬牛放失田無立禾路無莎薠莎薠讀猿猴蹯噪之蹯狀如葴葴如葮也莎草名也金積折廉璧襲無理金氣積聚折其鋒廉也璧文襲重言用之煩數皆鈍無復文理也璧讀辟也磬龜無腹磬空也象磬數鑽以卜故空盡無腹也言桀爲無道不修仁德但數占龜莫得吉兆也詩云握粟出卜自何能穀又曰我龜旣厭不我告猶是也蓍策曰施易曰再三瀆瀆則不告也晩世之時七國異族諸侯制法各殊習俗晩世春秋之後戰國之末七國齊楚燕趙韓魏秦也齊姓田楚姓芉燕姓姚趙姓趙韓姓韓魏姓魏秦姓嬴故異族也從橫間之舉兵而相角蘇秦約從張儀連橫南與北合爲從西與東合爲橫故曰從橫成則秦帝也攻城檻殺覆高危安掘墳墓楊人骸大衝車高重京衝車大鐵著其轅端馬被甲車被兵所以衝於敵城也古者伐不敬取其鯨鯢收其骸尸聚土而瘞之以爲京觀故曰高重壘京觀也除戰道便死路犯嚴敵殘不義百往一反名聲苟盛也言百人行戰皆死一人得還反也一說百人行伐一反得勝耳是故質壯輕足者爲甲卒甲鋭也在車曰士步曰卒千里之外家老羸弱悽愴於內厮徒馬圉軵車奉饟厮役徒眾也牛曰放馬曰圉軵推也饟資糧也軵讀楫拊之拊也道馬遼遠霜雪亟集短褐不完短褐處器物之人也短或作短字褐毛布如今之馬衣也不完言民窮也人羸車弊泥塗至膝相携於道奮首於路携引也奮首民疲於役頓化於路僅能搖頭耳言疲困也故曰奮首身枕格而死格榜淋也言收民役賦不畢者榜之於格上不得下故曰枕格而死也所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛戟矢石之創者扶舉於路故世至於枕人頭食人肉葅人肝飲人血甘之於芻豢甘猶嗜也故自三代以後者天下未嘗得安其情性而樂其習俗保其脩命天而不夭於人虐也虐害所以然者何也諸侯力征天下合而爲一家逮至當今之時天子在上位天子嘆孝武皇帝持以道德輔以仁義近者獻其智遠者懷其德拱揖指麾而四海賔服春秋冬夏皆獻其貢職天下混而爲一混同子孫相代此五帝之所以迎天德也夫聖人者不能生時時至而弗失也輔佐有能黜讒佞之端息巧辯之說除刻削之法去煩苛之事屏流言之迹塞朋黨之門消知能消除知巧之能修太常隳枝體絀聰明去其小聰明并大利欲者也大通混㝠解意釋神漠然若無魂魄使萬物各復歸其根則是所脩伏羲氏之迹而反五帝之道也反復夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至德遺於後世何則至虛無純一而不𡁕喋苛事也𡁕喋猶深筭也言不采取煩苛之事周書曰掩雉不得更順其風言掩雉雖不得當更從其上風順其道理也言可行與不猶當以道德爲本論申商之法失之也今若夫申韓商鞅之爲治也申申不害也韓非也商鞅公孫鞅三子之術皆爲削刻之法也挬拔其根蕪棄其本而不窮究其所由生何以至此也鑿五刑爲刻削乃背道德之本而爭於錐刀之末錐刀之末諭小利言盡爭之也斬艾百姓殫盡太半斬艾百姓以草木諭也不養之也殫病也太半過半也而忻忻然常自以爲治忻忻猶自喜得意之貌也是猶抱薪而救火鑿竇而出水夫井植生梓而不容甕溝植生條而不容舟不過三月必死植謂材也椽杙於溝邊因生爲條木也以諭申韓商鞅之所爲法比於梓條也所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也折曲潦水不泄瀇瀁極望旬月不雨則涸而枯澤受瀷而無源者瀷雨漬疾流者故曰無源瀷讀燕人强春言勅同也譬若羿請不死之藥於西王母恒蛾竊以奔月姮娥羿妻羿請不死之藥於西王毋未及服之恒娥盜食之得仙奔入月中爲月精也奔月或作坌肉藥坌肉以爲死畜之肉復可生也悵然有喪無以續之言羿悵然失志若有所喪亡不能復得不死藥以續之也何則不知不死之藥所由生也羿不知不死之藥所由生也申韓商鞅之等不得治之根本如乞藥矣一說羿謂命在藥不知命自在天也故或欲得知不死藥之所由出生也是故乞火不若取燧寄汲不若鑿井精神訓精者人之氣神者人之守也本其原說其意故曰精神因以題篇古未有天地之時惟像無形惟思也念天地未成形之時無有形生有形故天地成焉窈窈㝠㝠芒芠漠閔澒濛鴻洞莫知其門皆未成形之氣也芒讀玉莽之莽也芠讀𣐀滅之𣐀閔讀子騫之閔澒言項羽之項鴻讀子贛之贛洞讀同游之同也皆無形之象故曰莫知其門也有二神混生經天營地二神陰陽之神也混生俱生也孔乎莫知其所終極孔深貌也滔乎莫知其所止息滔大貌也於是乃别爲陰陽離爲八極剛柔相成萬物乃形離散也八極八方之極剛柔陰陽也煩氣爲蟲煩亂精氣爲人是故精神天之有也而骨骸者地之有也精神入其門而骨骸反其根精神無形故能入天門骨骸有形故反其根歸土也我尚何存言人死各有所歸我何猶常存是故聖人法天順情不拘於俗不誘於人誘猶惑也以天爲父以地爲母陰陽爲綱四時爲紀天靜以清地定以寧萬物失之者死法之者生夫靜漠者神明之宅也虛無者道之所居也是故或求之於外者失之於內有守之於內者失之於外譬猶本與末也從本引之千枝萬葉莫不隨也夫精神者所受於天也而形體者所禀於地也故曰一生二二生三三生萬物一謂道也二曰神明也三曰和氣也或說一者元氣也生二者乾坤也二生三三生萬物天地設位陰陽通流萬物乃生萬物背陰而抱陽沖氣以爲和萬物以背爲陰以腹爲陽身中空虛和氣所行爲陰故腎雙爲陽故心特陰陽與和共生物形君臣以和致太平也故曰一月而膏始育如膏也二月而胅三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形是故肺主目肺象朱雀朱雀火也火外景故主目也腎主鼻腎象龜龜水也水所以通溝也鼻所以通氣也故主鼻也膽主口膽勇者決所以處故主口也肝主耳肝金也金內景故主耳也外爲表而內爲裏開閉張歙各有經紀歙讀脅也故頭之圓也象天足之方也象地有四時五行九解四時春夏秋冬也五行金木水火土也九解謂九十爲一解也一說九解六一之所解合也一說八方中央故曰九解也三百六十六日人亦有四支五藏九竅三百六十六節天有風雨寒暑人亦有取與喜怒故膽爲雲膽金也金石雲之所出故爲雲肺爲氣肺火也故爲氣肝爲風肝木也木爲風生故爲風腎爲雨腎水也因水故雨雨或作電腎水也水爲光故爲電脾爲雷以與天地相參也而心爲之主心土也故爲四行之主也是故耳目者日月也血氣者風雨也日中有蹲烏踆猶蹲也謂三足烏踆讀踆魏之踆而月中有蟾蜍蟾蜍蝦蟆日月失其行薄蝕無光薄者迫也薄讀享薄之薄也風雨非其時毀折生災五星失其行州國受殃五星熒惑太白𡻕星辰星鎮星也今熒犯角亢則州國受其殃他也餘準此也夫天地之道至紘以大尚猶節其章光愛其神明人之耳目曷能久熏勞而不息乎息止精神何能久馳騁而不旣乎旣盡是故面氣者人之華也而五藏者人之精也夫面氣能專於五藏專一而不外越則胷腹充而嗜慾省矣胷腹充而嗜慾省則耳目清聽視達矣耳目清聽視達謂之明五藏能屬於心而無乖則㪍志勝而行不僻矣㪍志勝言己之㪍志也僻邪也勝或作遯言㪍或遯去故行正而不邪也㪍志勝而行之不僻則精神盛而氣不散矣精神盛而氣不散則理理則均均則通通則神神則以視無不見以聽無不聞也以爲無不成也是故憂患不能入也而邪氣不能襲襲猶因也亦入故事有求之於四海之外而不能遇遇得或守之於形骸之內心無欲也而不見也故所求多者所得少所見大者所知小夫孔竅者精神之戸牖也而氣志者五藏之使候也耳目淫於聲色之樂則五藏搖動而不定矣五藏搖動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣多情欲故神不內守精神馳騁於外而不守則禍福之至雖如邱山無由識之矣邱山諭大識知也使耳目精明玄達而無誘慕氣志虛靜恬愉而省嗜慾五藏定寧充盈而不泄精神內守形骸而不外越則望於往世之前而視於來事之後猶未足爲也猶尚也爲治也豈直禍福之間哉故曰其出彌遠者其知彌少言雖知道故少以言夫精神之不可使外淫也是故五色亂目使目不明不明視而昏也五聲譁耳使耳不聰不聰聽無聞也五味亂口使口爽傷爽病病傷滋味也趣舍滑心使行飛揚滑亂也飛揚不從軌度也此四者天下之所養性也性生也然皆人累也故曰嗜慾者使人之氣越越失而好憎者使人之心勞勞病弗疾去則志氣日耗耗猶亂也夫人之所以不能終其壽命而中道夭於刑戮者何也以其生生之厚言生生之厚者何必極嗜慾淫濫無厭以傷耳目情性故不終其壽命中道夭殞於刑辟之戮也夫惟能無以生爲者則所以脩得生也無以生爲者輕利害之鄉除情性之欲則長得生矣夫天地運而相通萬物總而爲一總合也一同也萬物合同統於一道能知一則無一之不知也上一道也下一物也不能知一則無一之能知也譬吾處於天下也亦爲一物矣不識天下之以我備其物與與邪辭也且惟無我而物無不備者乎然則我亦物也物亦物也物之與物也有何以相物也物亦物也何相名爲物也雖然其生我也將以何益言生我自然之道亦當以何益乎其殺我也將以何損損減夫造化者旣以我爲坯矣將無所違之矣言旣以我爲人無所離之諭不求亦不避也吾安知夫刺炙而欲生者之非或也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也天下茫茫孰知其生我也不疆求已已止也言不惡生也其殺我也不疆求止言不畏死欲生而不事事治憎死而不辭唯義所在故不辭也賤之而弗憎貴之而弗喜人有惡賤己者己不憎也人有尊己者己不喜也隨其天資而安之不極資時也一曰性也極急也諭道人不急求生也吾生也有七尺之形吾死也有一棺之土吾之於比有形之類猶吾死之淪於無形之中也淪入也然則吾生也物不以益眾吾死也土不以加厚吾又安知所喜憎利害其間者乎不知喜生之利不知憎死之害守其正性也夫造化者之攫援物也攫撮也援引也譬猶陶人之埏埴也其取之地而已爲盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也陶人作瓦器治官也頓泥坯取之於地以爲器明人不當惡死死復歸其未生之故耳譬猶瓦器之破而復反於土也與其爲盆盎亦無以異矣無以異於土也夫臨江之鄉居人汲水以浸其園江水弗憎也苦洿之家決洿而注之江洿水弗樂也是故其在江也無以異其浸園也其在洿也亦無以異其在江也道尚空虛貴無形江水大去不可消就易故不憎也窊水小去易小消就不消故不樂也洿水猶澹水也苦猶疾也一說言各自安其處也及其轉易亦無憎樂也是故聖人因時以安其位當世而樂其業業事也夫悲樂者德之邪也而喜怒者道之過也好憎者心之暴也故曰其生也天行似天氣也其死也物化如物之變化也靜則與陰俱閉動則與陽俱開精神澹然無極極盡不與物散而天下自服散雜亂貌自服服於德也故心者形之主也而神者心之寶也形勞而不休則蹶蹶顛精用而不已則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寶之至也半璧曰璜珍玉也夫精神之可寶也非直夏后氏之璜也直猶但也是故聖人以無應有必究其理以虛受實必窮其節恬愉虛靜以終其命是故無所甚䟽而無所甚親抱德煬和以順於天煬炙也向火中炙和氣以順天道也煬讀供養之養與道爲際與德爲鄰際合也鄰比也不爲福始不爲禍先魂魄處其宅而精神守其根死生無變於己故曰至神變動所謂眞人者性合於道也眞人者虙戲黃帝老聃是也故有而若無實而若虛處其一不知其二治其內不識其外治其內守精神也識其外外不好憎也明白太素無爲復樸體本抱神以游於天地之樊樊崖也樊讀麥飯之飯也芒然仿佯於塵垢之外芒讀王莽之莽而消搖於無事之業浩浩蕩蕩乎機械之巧弗載於心是故死生亦大矣而不爲變不爲變者同死生也雖天地覆育亦不與之抮抱矣抮抱猶持著者言不以天地養育萬物故强與持著守其純熱也審乎無瑕而不與物糅瑕猶釁也忤見利欲之貌也能審順之故不與物相雜粈見事之亂而能守其宗見事有者止之亂不能眩惑故能守其宗宗本也若然者正肝膽遺耳目言精神內守也心志專於內通達耦於一一者道也居不知所爲行不知所之言志意無所繫渾然而往逯然而來渾轉行貌逯謂無所爲忽然往來也逯讀謂綠衣之綠也渾讀大珠揮揮之揮也形若槁木心若死灰槁木無氣死灰無熱諭無爲也忘其五藏損其形骸不學而知不視而見不爲而成不治而辯感而應迫而動迫切不得不動然後乃動也不得已而往如光之燿如景之放以道爲紃有待而然紃者法也以道待萬物故曰有待而默默如是抱其太清之本而無所容與無所容與於情欲也而物無能營營惑也一曰亂廓惝而虛清靖而無思慮不勞精神大澤焚而不能熱河漢涸而不能寒也大雷毀山而不能驚也大風晦日而不能傷也言體道之人閉情守虛雖此四者之大不能惑也是故視珍寶珠玉猶石礫也視至尊窮寵猶行客也至尊謂帝王也故曰窮寵也行客猶行路過客視毛嬙西施猶䫏醜也毛嬙西施皆古之美人顛頭也方相氏黃金四目衣赭稀世之䫏貌非生人也但其像耳目䫏醜言極醜也以死生爲一化以萬物爲一方方類也同精於太清之本而游於忽區之旁忽區忽恍無形之區旁也有精而不使者有神而不行言不濁其精不勞其神此之謂也契大渾之樸而立至清之中樸猶質也渾不散之貌也渾讀揮章之揮是故其寢不夢其智不萌其寢不夢神內守也其智不萌無思念也其魄不抑其魂不騰魄陰神魂陽神陰不沈抑陽不飛騰各守其宅反復終始不知其端緒甘暝太宵之宅太宵長夜之中言其直瞑瞑於大道之處冥視昭昭矣而覺視於昭昭之宇休息於無委曲之隅而游敖於無形埒之野無委曲之隅無形埒之野冥冥無形像之貌也居而無容處而無所言其人居無形容可得見也處無常所其動無形其靜無體無形無體道之容也存而若亡生而若死出入無間役使鬼神言能化也人不與鬼同形而能使之者道也天神曰神人神曰鬼也淪於不測入於無間以不同形相嬗也嬗傳也萬物之形不同道以相傳生也終始若環莫得其倫倫理也道也人莫能得焉此精神之所以能登假於道也假至也上至於道也或作蝦蟆雲氣是故眞人之所游游行若吹呴呼吸吐故內新熊經鳥伸鳧浴蝯躩鴟視虎顧是養形之人也不以滑心經動搖也伸頻伸也若此養形之人導引其神屈伸跳踉是非眞人爲之道也滑亂也言此養形者耳不足以亂眞人之心也使神滔蕩而不失其充充實日夜無傷而與物爲春體道人同日夜諭賊害也無傷無所賊害也與物爲春言養物也則是合而生時干心也若是者合於道生四時化其心也言不干時害物也且人有戒形而無損於心戒備也人形體備具戒或作革革改也言人形骸有改更而作化也心諭神神不損傷也有綴宅而無耗精綴宅身也精神居其宅則生離其宅則死言人雖死精神終不耗滅故曰無耗精也夫癩者趨不變狂者形不虧神將有所遠徙孰暇知其所爲言病癩者形生神在故趨不變也或作介介被甲者禮介者不拜而能趨於步故曰不變也狂體具存故曰不虧但精神散越耳故曰神有所遠徙也故形有摩而神未嘗化者摩滅猶死也神變歸於無形也故曰未嘗化也化猶死也以不化應化千變萬抮而未始有極不化精神也化者形骸死者形爲灰土爲日化也化者復歸於無形也不化者與天地俱生也夫木之死也青青去之也夫使木生者豈木也使木生者天也故曰豈木哉猶充形者之非形也充形者氣也故曰非形也故生生者未嘗死也其所生則死矣生生者道諭道之人若天氣未嘗死也下所生者萬物矣化物者未嘗化也化物者道也道不化故未嘗化也其所化則化矣所化者萬物也萬物有變故曰則化輕天下則神無累矣輕薄天下寵勢之權者許由是也故其精神無留累於物也細萬物則心不惑矣以萬物爲小事而弗欲故心不惑物也齊死生則志不懾矣齊等也不畏義死不樂不義生其志意無所懾懼故曰等也同變化則明不眩矣眩惑眾人以爲虛言吾將舉類而實之實明人之所以樂爲人主者以其窮耳目之欲而適躬體之便也今高臺層榭人之所麗也四方高曰臺加木曰榭麗美也而堯樸桷不斵素題不枅樸采也桷椽也不斵削加宓石之素題也不加采飾故曰不枅者不施欂櫨俱交架也枅讀雞枅或作刮也珍怪奇異人之所美也而堯糲粢之飯藜藿之羹糲粗也粢稷也糲讀賴恃之賴粢讀齊衰之齊文繡狐白人之所好也而堯布衣揜形鹿裘御寒養性之具不加厚而增之以任重之憂任讀任俠之任故舉天下而傳之於舜傳禪若解重負然非直辭讓誠無以爲也此輕天下之具也禹南省方濟於江巡狩爲省省視四方也濟渡也黃龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命於天竭力而勞萬民勞憂也生寄也死歸也何足以滑和人壽蓋不過百年故曰生寄也死滅没化不見故曰歸也滑亂也和適也視龍猶蝘蜓蝘蜓蜥蜴也或曰守宫也東方朔射覆對武帝曰謂爲龍無有角謂爲蛇而有足騤騤脉脉喜緣壁非守宮當晰蜴是也顏色不變龍乃弭耳掉尾而逃逃去禹之視物亦細矣鄭之神巫相壺子林見其徵神在男曰覡在女曰巫巫能骨法吉凶之氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士壺子弟子也報白也壺子持以天壤言精神天之有也形骸地之有也死自歸其本故曰持天壤矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者必不恤也機諭疾也謂命危殆不旋踵而至猶不恐懼壺子之視死生亦齊齊等子求行年五十有四而病傴僂脊管高於頂𣎅下迫頤兩髀在上子求楚人也僂脊管下竅也高於頂出頭上也𣎅肝胷也迫薄至於頤也兩脾下在上軀正貟也𣎅讀精神歇越無之歇也燭營指天燭陰華也營其竅也上指天也燭營讀曰括撮也匍匐自闚於井臨井水自觀照曰偉哉造化者其以我爲此拘拘邪偉哉猶美哉也造化謂天也拘拘好貌此其視變化亦同矣故覩堯之道乃知天下之輕也以其禪舜觀禹之志乃知天下之細也以其視龍猶蝘蜓也原壺子之論乃知死生之齊也論持以天壤也見子求之行乃知變化之同也行匍匐闚於井此之謂也夫至人倚不拔之柱行不關之塗倚於不可拔搖之柱行於不可關閉之塗言無不通禀不竭之府學不死之師無往而不遂往而遂也無至而不通至而通也生不足以挂志死不足以幽神屈伸俛仰抱命而婉轉抱天命而婉轉不離違也禍福利害千變萬紾紾轉孰足以患心若此人者抱素守精蟬蛻蛇解游於太清輕舉獨住忽然入冥鳳凰不能與之儷儷偕而況斥鷃乎斥澤之鷃雀飛不能出於頃晦諭弱也勢位爵祿何足以槩志也不足以槩至人之志晏子與崔杼盟臨死地而不易其義晏子名嬰字平仲齊大夫也崔杼殺齊莊公盟諸侯曰不唯崔慶是從者如此盟晏子曰嬰所不唯忠於君而利社稷者是從亦如而利之故曰臨死地而不易其義者也殖華將戰而死莒君厚賂而止之不改其行殖杞梁也華華周皆齊士也爲君伐莒之隊莒人圍之壯其勇力厚賂而止之不可遂戰而死故曰不改其行也故晏子可迫以仁不可劫以兵晏子不從崔杼之盟將見殺晏子曰句戟何不句夜矛何不摧不撓不義故曰不可劫以兵也殖華可止以義而不可縣以利縣視也言不爲利動也君子義死而不可以死亡恐也彼則直爲義耳而尚猶不拘於物又況無爲者矣堯不以有天下爲貴故授舜公子扎不以有國爲尊故讓位扎吳壽夢之少子延州來季子也讓位不受兄國春秋賢之諸侯之子稱公子也子罕不以玉爲富故不受寶子罕宋戴公六世之孫西鄉士之子司成樂喜也宋人或得玉以獻子罕子罕不受獻玉者曰以示玉人玉人以爲寶故敢獻之子罕曰我以不貪爲寶子以玉爲寶若予我是皆喪寶也不如人有其寶稽首告曰小人懷璧不可以越鄉納此以請死子罕置諸其里使玉人爲之攻之富而後使復其所故曰不受寶也務光不以生害義故自投於淵務光湯時隱士也湯代桀讓天下於務光人謂務光曰湯殺其君將歸不義之名於子務光因抱石自投於深淵而死由此觀之至貴不待爵以至德見貴許由務光是也故曰不待爵也至富不待財以至德見富若楚狂接輿是也王聞其賢使使者齎金百鎰聘之欲以爲相而不受故曰至富不待財也天下至大矣而以與佗人也堯是身至親矣而棄之淵務光是也外此其餘無足利矣外猶除也利猶食利或作私私獨受也此之謂無累之人無累之人不以天下爲貴矣上觀至人之論深原道德之意以下考世俗之行乃足羞也考觀也故通許由之意金縢豹韜廢矣金縢豹韜周公太公陰謀圖王之書也許由輕天下不受焉用此書爲故曰廢矣延陵季子不受吳國而訟閒田者慙矣訟閒田者虞芮及暴桓公蘇信公是也子罕不利寶玉而爭券契者媿矣務光不污於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也大義死君親之難也不聞大言者不知天下之不足利也大言體道無欲之言今夫窮鄙之社也叩盆拊瓴相和而歌自以爲樂矣窮鄙之社窮巷之小社也盆瓴器叩之有音者故曰自以爲樂也嘗試爲之擊建鼓撞巨鐘乃性仍仍然知其盆瓴之足羞也仍仍不得志之貌仍仍或作聆聆猶聞也藏詩書脩文學而不知至論之旨則拊盆叩瓴之徒也夫以天下爲者學之建鼓矣建鼓樂之大者尊勢厚利人之所貪也尊勢窮位厚利重祿使之左據天下圖而右手刎其喉愚夫不爲由此觀之生尊於天下也天下至大非手所據故不言手也使得據天下之圖籍行其權勢而刎喉殺身雖愚者不肯爲也故曰生貴於天下矣聖人食足以接氣衣足以蓋形適情不求餘接續也蓋覆也餘饒也無天下不虧其性有天下不羡其和虧損也羡過也和適也有天下無天下一實也實等今贛人敖倉予人河水贛賜也敖地名倉者以之常滿倉也在今榮陽縣北饑而餐之渴而飲之其入腹者不過簞食瓢漿簞笥則身飽而敖倉不爲之減也減少腹滿而河水不爲之竭也竭盡有之不加飽無之不爲之饑與守其篅𥫱有其井一實篅𥫱受穀器也井家人之井水也篅讀顓孫之顓也人大怒破陰大喜墜陽巳說在原道也大憂內崩大怖生狂除穢去累漠若未始出其宗乃爲大通清目而不以視清明靜耳而不以聽鉗口而不以言委心而不以慮棄聰明而反太素休精神而棄知故覺而若昧以生而若死昧暗也厭也楚人謂厭爲昧諭無知也終則反本未生之時而與化爲一體言人之未生時欲同死生也故曰與化爲一體也死之與生一體也今夫繇者揭钁臿魚籠土繇役也今河東謂治道爲繇道揭舉也钁斫也臿鏵也青州謂之鏵有刃也三輔謂之𨬞也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽汗也薄迫也氣衝喉也當此之時茠越下則脫然而喜矣茠陰也三輔人謂休華樹下爲茠也楚人樹上大本小如車蓋狀爲越言多蔭也脫舒也言繇人之得小休息則氣得舒故喜也越讀經無重越之越也巖穴之間非直越下之休也病疵瘕者捧心抑腹膝上叩頭抑按也叩或作跔跔讀車軥之軥也踡跼而諦通夕不寐當此之時噲然得卧則親戚兄弟歡然而喜夫脩夜之寧非直一噲之樂也謂得安卧極夜者樂於一噲之樂然不得比長夜之樂也故知宇宙之大則不可劫以死生劫迫知養生之和則不可縣以天下養生之和謂正道也已脩正道不惑故不可示以天下之窮勢而移也知未生之樂則不可畏以死樂其不生之時雖懼之以死不知使之畏死言不畏死知許由之貴於舜則不貪物言不貪利欲之物也墻之立不若其偃也又況不爲墻乎冰之凝不若其釋也又況不爲冰乎不如未爲墻冰之時偃凝能變也自無蹠有自有蹠無自無蹠有從無形至有形也自有跡無從有形至無形也至無形謂死生變化也終始無端莫知其所萌非通於外內孰能無好憎好憎情欲無外之外至大也無內之內至貴也言天無有垠外而能爲之外喻極大也無內言其小小無內而能爲之內道尚微妙故曰至貴也能知大貴何往而不遂大貴謂無內之內也言道至微能出入於無間故曰何往而不遂遂通也衰世湊學不知原心反本湊趨也趨其末不脩稽古之典苟邀名號耳故曰不知原心反本也直雕琢其性矯拂其情以與世交直猶但也雕琢其天性拂戾其本情以合流俗與世人交接也故目雖欲之禁之以度心雖樂之節之以禮趨翔周旋詘節卑拜肉凝而不食酒澄而不飲外束其形內總其德鉗陰陽之和而迫性命之情故終身爲悲人悲衰也謂衰世之學達至道者則不然理情性治心術養以和持以適樂道而忘賤安德而忘貧性有不欲無欲而不得言其守虛執持不欲之情性則無有所欲而不得也心有不樂無樂而弗爲言其志正不樂邪淫之樂則無有正樂而不爲樂言皆爲之樂也無益情者不以累德而便於性者不以滑滑亂故縱體肆意而度制可以爲天下儀縱放也肆緩也儀法今夫儒者不本其所以欲而禁其所欲本所以欲謂正性恬漠也所欲謂情欲驕奢權勢也不原其所以樂而閉其所樂是猶決江河之源而障之以手也障蔽也言不能揜也夫牧民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲脩生壽終豈可得乎夫顏回季路子夏冉伯牛孔子之通學也然顏淵夭死季路葅於衛顏淵十八而卒孔子曰回不幸短命死矣故曰夭也季路仕於衛衛君父子爭國季路死孔子曰若由不得其死然言不得以壽命終也故曰然衛人醢之以爲醬故曰葅子夏失明冉伯牛爲厲子夏學於西河哭其子而失明曾子哭之伯牛有疾孔子自牖執其手曰斯人也而有斯疾也此皆迫性拂情而不得其和也故子夏見曾子一臞一肥曾子問其故曰出見富貴之樂而欲之入見先王之道又說之兩者心戰故臞先王之道勝故肥道勝不惑眩於富貴精神內守無思慮故肥也推此志非能貪富貴之位不便侈靡之樂此志子夏之志直宜迫性閉欲以義自防也宜猶但也雖情心鬱殪形性屈竭猶不得已自强也故莫能終其天年義以自防故情心鬱壹不通形性屈竭也以不得止而自勉强故無能終其天年之命若夫至人量腹而食度形而衣容身而游適情而行餘天下而不貪委萬物而不利委棄也不以萬物爲利矣處大廓之宇游無極之野廓虛也極盡也登太皇馮太一玩天地於掌握之中太皇天也馮依也太一天之形神也玩畀也夫豈爲貧富肥臞哉故儒者非能使人弗欲而能止之言不能使人無情欲也己雖欲之能以義自止也非能使人勿樂而能禁之言不能使人無樂富貴能以禮自禁制之論語曰不義而富且貴於我如浮雲也夫使天下畏刑而不敢盜豈若能使無有盜心哉越人得髯蛇以爲上肴中國得而棄之無用髯蛇大蛇也其長數丈厚以爲上肴故知其無所用貪者能辭之不知其無所用廉者不能讓也夫人主之所以殘亡其國家損棄其社稷身死於人手爲天下笑未嘗非爲非欲也夫仇由貪大鍾之賂而亡其國仇由近晉之狄國也晉智襄子伐之先賂以大鍾仇由之君貪開道來受鍾爲和親智伯因是以兵滅取其國也仇讀仇餘之仇也虞君利垂棘之璧而擒其身晉大夫荀息謀於獻公以屈產之馬垂棘之璧假道於虞以伐虢虞公貪璧馬假晉道旣滅虢還館於虞遂襲虞滅之君死位曰滅故曰擒其身也獻公豔驪姬之美而亂四世晉獻公伐驪戎得驪姬及其娣好色曰美好體曰艷獻公嬖之生奚齊其娣生卓子遂爲殺太子申生而立奚齊殺適立庶故曰亂四世者奚齊卓子惠公夷吾懷公圉也桓公甘易牙之和而不以時葬齊桓好味易牙蒸其子首而進之遂見信用專任國政亂嫡庶桓公卒五公子爭立六十日而殯蟲流出戸五月不葬故曰不以時葬也胡王淫女樂之娛而亡上地胡蓋西戎之君也秦穆公欲伐之先遺女樂以淫其志其臣由余諫不從去戎來適秦秦伐得其上地上地美地也使此五君者適情辭餘以已爲度不隨物而動豈有此大患哉五君仇由虞公晉獻齊桓胡王也適猶節也動猶惑也故射者非矢不中也學射者不治矢也不治矢言不爲而得用之然則爲者不得用之御者非轡不行學御者不爲轡也知冬日之箑夏日之裘無用於己則萬物之變爲塵埃矣故以湯止沸沸乃不止誠知其本則去火而已矣箑扇也楚人謂扇爲箑已止也重刋道藏輯要淮南鴻烈解許愼記上本經訓本始也經常也天經造化出於道治亂之由得失有常故曰本經因以題篇也太清之始也和順以寂漠清靜也太清無爲之始者謂三皇之時和順不逆天暴物也寂漠不擾民質眞而素樸閑靜而不躁推而無故質性也眞不變也素樸精不散也閑靜言無欲也不躁擾故常也在內而合乎道出外而調於義在內者志在心平欲故能合於道出於外者身所履行也行不越規矩故能調義義或作德也發動而成於文行快而便於物發作也動行也文文章也便利也物事也其言略而循理其行悅而順情略約要也侻簡易也侻讀射侻取不覺之侻也其心愉而不僞其事素而不飾愉和也僞虛詐也素樸也飾巧也是以不擇時日不占卦兆擇選也卦八卦也兆契龜之兆也世所以占吉凶也不謀所始不議所終安則止激則行通體於天地同精於陰陽一和於四時一同也明照於日月與造化者相雌雄造化天地也雌雄猶和適也是以天覆以德地載以樂樂生也四時不失其叙風雨不降其虐日月淑清而揚光光明也五星循軌而不失其行五星熒惑太白鎮辰𡻕星也軌道也循順也當此之時玄元至碭而運照玄天也元氣也碭大也言盛德之君恩仁廣大徧照四海也鳳麟至蓍龜兆鳳麟聖德之世至於門庭著四十九策兆信也善言否臧也甘露下竹實滿流黃出而朱草生滿成也流黃玉也朱草生於庭皆瑞應也機械詐僞莫藏於心莫無也逮至衰世鐫山石鐫猶鑿也求金玉也鍥金玉擿蚌蜃鍥刻金玉以爲器也擿猶開也開以求珠也消銅鐵而萬物不滋不滋長也言盡物類也刳胎殺夭麒麟不游胎獸胎也夭麋子也爲類見害故不來游覆巢毀卵鳳凰不翔鳥未鷇曰卵也鑽燧取火構木爲臺焚林而田竭澤而漁田獵也竭澤漏池也人械不足畜藏有餘械器用也畜積藏餘府庫實也而萬物不繁兆萌牙卵胎而不成者處之太半矣積壤而邱處糞田而種穀掘地而井飲疏川而爲利疏通築城而爲固拘獸以爲畜則陰陽繆戾四時失叙雷霆毀折電霰降虐氣霧雪霜不霽霽止也而萬物燋夭霜雪之害不止則萬物燋夭不繁茂也菑榛穢聚埒畝菑草曰茂木聚曰榛積之於疆畝芟野菼長苗秀芟殺也菼草也苗稼也不榮而實曰秀也草木之句萌銜華戴實而死者不可勝數乃至夏屋宮駕縣聯房植夏屋大屋也縣聯聯受雀頭箸桷者一曰辟帶也房室也植戸植也橑檐榱題橑檐橑也檐屋垂也榱棟也題當也雕琢刻鏤喬枝菱阿芙蓉芰荷阿曲屋也芙蓉藕華也菱角交蓞也荷芙蕖也五采爭勝流漫陸離流漫采色相參和陸離美好貌脩掞曲校夭矯曾橈芒繁紛挐皆屋飾也其讀麥芒之芒挐讀上谷茹縣之茹以相交持公輸王爾無所錯其剞𠜾削鋸公輸巧者一曰魯班之號也王爾古之巧匠也剖巧刺畫盡頭黑邊箋也𠜾𨧱尺削兩刃句刀也剖讀枝尺之枝也𠜾讀詩蹶角之蹶削讀綃頭之綃也然猶未能贍人主之欲也是以松柏菌露夏槁松柏根茂菌露竹筦皆冬生難殺之木當是時夏槁死也刺君作事不時陰陽失序菌讀似綸露讀南陽人言道路之路江河三川絶而不流三川涇渭汧也出於岐山絶竭也故曰不流國語曰何竭而商亡也夷羊在牧夷羊土神殷之將亡見於商郊牧野之地飛蛩滿野蛩蟬蠛蠓之屬也一曰蝗也兖州謂之螣螣讀近殆緩氣言之蛩讀詩受小拱之拱天旱地坼坼燥裂也鳳凰不下句爪居牙戴角出距之獸於是鷙矣句爪鷹鸇之屬也居牙熊虎之屬也距讀拒守之拒民之專室蓬廬無所歸宿專特小室也蓬廬籧篨覆也言小有賓客歸之無所庇宿也凍餓飢寒死者相枕席也言其眾也及至分山川谿谷使有壤界計人多少眾寡使有分數築城掘池設機械險阻以爲備飾職事制服等等差也異貴賤差賢不肖經誹譽行賞罰經書也誹惡譽善賞可賞罰可罰也則兵革興而分爭生民之滅抑天隱虐殺不辜而刑誅無罪於是生矣抑没也言民有滅没夭折之痛天地之合和陰陽之陶化萬物皆乘人氣者也天地合和其氣故生陰陽陶化萬物是故上下離心氣乃上蒸離者不和也君臣不和五穀不爲不爲五穀距日冬至四十六日天含和而未降也懷氣而未揚自立冬到冬至皆未動也陰陽儲與呼吸浸潭包裹風俗儲與猶尚羊無所生之貌也一曰褒大貌也浸潭廣衍故曰包裹風俗也斟酌萬殊旁薄眾宜旁並也薄近也眾物宜適也以相嘔咐醖釀而成育羣生咐讀符命之符醖釀猶和調也是故春肅秋榮冬雷夏霜皆賊氣之所生由此觀之天地宇宙一人之身也以身諭也六合之內一人之制也六合四方上下也是故明於性者天地不能脅也脅恐也審於符者怪物不能惑也審明也符驗也怪物非常人所疑惑也故聖人者由近知遠而萬殊爲一殊異也一同也古之人同氣於天地與一世而優游優游猶委從也當此之時無慶賀之利刑罰之感禮義廉耻不設毀譽仁鄙不立而萬民莫相侵欺暴虐猶在於混冥之中混大也大冥之中謂道也逮至衰世人眾財寡事力勞而養不足於是忿爭生是以貴仁仁鄙不齊比周朋黨設詐諝懷機械巧故之心而性失矣諝謀也性失失其純樸之性也是以貴義陰陽之情莫不有血氣之感男女羣居雜處而無別是以貴禮禮以別也性命之情淫而相脅脅迫以不得己則不和是以貴樂以樂和之是故仁義禮樂者可以救敗而非通治之至也夫仁者所以救爭也義者所以救失也禮者所以救淫也樂者所以救憂也神明定於天下而心反其初心反其初而民性善初者始也有情也未有情欲故性善也民性善而天地陰陽從而包之則財足而人贍矣貪鄙忿爭不得生焉由此觀之則仁義不用矣道德定於天下而民純樸則目不營於色營惑耳不淫於聲坐俳而歌謠被髮而浮淫雖有毛嬙西施之色不知悅也言尚德也掉羽武象不知樂也掉羽羽舞也武象周武王樂也淫泆無別不得生焉由此觀之禮樂不用也是故德衰然後仁生行沮然後義立沮敗也和失然後聲調禮淫然後容飾是故知神明然後知道德之不足爲也知道德然後知仁義之不足行也道德本仁義末知仁義然後知禮樂之不足脩也仁義大也禮樂小也今背其本而求其末釋其要而索之於詳未可與言至也至至德之道也天地之大可以矩表識也矩度也表影表識知也星月之行可以厯推得也厯術也推求也雷震之聲可以鼓鍾寫也寫猶放斆也風雨之變可以音律知也律知陰陽是故大可覩者可得而量也明可見者可得而蔽也蔽或作察聲可聞者可得而調也色可察者可得而別也夫至大天地弗能含也至微神明弗能領也領理也及至建律厯別五色異清濁清商濁宮味甘苦則樸散而爲器矣立仁義脩禮樂則德遷而爲僞矣修設也遷移也及僞之生也飾智以驚愚設詐以巧上巧欺上也天下有能持之者有能治之者也有能持之者桀紂之民有能治之者湯武之君也昔者蒼頡作書而天雨粟鬼夜哭蒼頡始視鳥迹之文造書有契則詐僞萌生詐僞萌生則去本趨末棄耕作之業而務錐刀之利天知其將餓故爲雨粟鬼恐爲書文所效故夜哭也鬼或作兔兔恐見取毫作筆害及其軀故夜哭伯益作井而龍登玄雲神棲崑崙伯益佐舜初作井鑿地而求水龍知將決川谷漉陂池恐見害故登雲而去棲其神於崑崙之山也能愈多而德愈薄矣愈益也故周鼎著倕使銜其指以明大巧之不可爲也倕堯之巧工也及周鑄鼎著倕像於鼎使銜其指假令倕在見之伎巧不能復踰但當銜齧其指故曰以明巧之不可爲也一說周人鑄鼎畫像鏤倕身於鼎使自銜其指以戒後世明不當大巧爲也故至人之治也心與神處形與性調靜而體德動而理通隨自然之性而緣不得已之化洞然無爲而天下自和澹然無欲而民自樸無機祥而民不夭不忿爭而養足兼苞海內澤及後世不知爲之者誰何道無姓名自當然也故曰不知誰何也是故生無號死無諡實不聚而名不立實財也道不名故名不立施者不德受者不讓施者不以爲恩德振不足而已受者不讓之則受之不飾辭讓也德交歸焉而莫之充忍也忍不忍也故德之所總道弗能害也總一也智之所不知辯弗能解也有智謀者尚不能知但口辯者何不解也不言之辯不道之道若或通焉謂之天府或有也有能通不言之辯不道之道者入天之府藏取焉而不損損減也酌焉而不竭酌猶予竭盡也莫知其所由出是謂瑤光瑤光者資糧萬物者也瑤光謂北斗杓第七星也居中而運厯指十二辰擿起陰陽以殺生萬物也一說瑤光和氣之見者也振困窮補不足則名生名仁名也興利除害伐亂禁暴則成功功武功也世無災害雖神無所施其德上下和輯雖賢無所立其功昔容成氏之時道路鴈行列處容成黃帝時造曆術也鴈行長幼有差也託嬰兒於巢上置餘糧於畮首虎豹可尾虺蛇可蹍而不知其所由然虎豹擾人無害人之心故可牽尾虺蛇不螫毒故可蹍履也時人謂自當然耳故曰不知其所由然逮至堯之時十日並出焦禾稼殺草木而民無所食猰貐鑿齒九嬰大風封豨脩蛇皆爲民害猰讀車軋履人之軋貐讀疾除瘉之瘉也堯乃使羿誅鑿齒於疇華之野鑿齒獸名齒長三尺其狀如鑿下徹頷下而持戈盾羿善射堯使羿射殺之疇華南方澤名也殺九嬰於凶水之上九嬰水火之怪爲人害北狄之地有凶水繳大風於青邱之澤大風風伯也能壞人屋舍羿於青邱之澤繳遮使不爲害也一日以繳繫矢射殺之青邱東方之澤名也上射十日而下殺猰貐十日並出羿射去九猰貐獸名也狀若龍首或曰似貍善走而食人在西方也斷脩蛇於洞庭擒封狶於桑林脩蛇大蛇也吞象三年而出其骨之類洞庭南方澤名封狶大豕也楚人謂豕爲狶也桑林湯所禱旱桑山之林萬民皆喜置堯以爲天子於是天下廣陜險易遠近始有道里舜之時共工振滔洪水以薄空桑共工水官名也栢有之後振動也滔蕩也欲壅防百川滔高堙庳以害天下者薄迫也空桑地名在魯也龍門未開呂梁未發江淮通流四海溟涬民皆上邱陵赴樹木龍門河之隘也在左馮翊夏陽北禹所鑿也呂梁在彭成呂縣石生水中禹決而通之民所由得度也故曰呂梁也未發之時水道不通江淮合流四海溟澤無岸畔也舜乃使禹疏三江五湖闢伊闕導瀍澗伊闕山名也禹所開以通伊水故曰闢伊闕在雒陽西南九十里瀍澗兩水名也瀍讀裹纏之纏也平通溝陸流注東海鴻水漏九州乾萬民皆甯其性是以稱堯舜以爲聖晩世之時帝有桀紂爲璇室瑤臺象廊玉牀璇瑤石之似玉以飾室臺也用象牙飾廊殿以玉爲牀言淫役也璇或作旋瑤或作搖言室施機關可轉旋也臺可搖動極土木之巧也紂爲肉圃酒池紂積肉以爲園圃積酒以爲淵也今河內朝歌紂所都也城西有糟邱酒池處是也燎焚天下之財罷苦萬民之力刳諫者剔孕婦王子比干紂之諸父也數諫紂之不道紂剖其心而觀之故曰刳諫者孕孕婦身將就草之婦也紂解剔觀其胞裹故曰剔孕婦也攘天下虐百性於是湯乃以革車三百乘伐桀於南巢放之夏臺革車兵車也南巢今盧江巢縣是也夏臺大臺故作宮也武王甲卒三千破紂牧野殺之於宣室武王周文王之子發也在車曰士步曰卒牧野南郊地名在朝歌城外宣室殷宮名一曰宣室獄也天下甯定百姓和集是以稱湯武之賢由此觀之有賢聖之名者必遭亂世之患也今至人生亂世之中含德懷道拘無窮之智鉗口寢說遂不言而死者眾矣至人至德之人然天下莫知貴其不言也無有貴鉗口不言而死也故道可道非常道至道無名不可道故曰可道者非常道也名可名非常名眞人之名不可得名也著於竹帛鏤於金石可傳於人者其粗也五帝三王殊事而同指異路而同歸五帝黃帝顓頊帝譽帝堯帝舜三王夏禹殷湯周文王同歸同歸修仁義也晚世學者不知道之所一體德之所總要總凡也要約也取成之迹相與危坐而說之鼓歌而舞之故博學多聞而不免於惑詩云不敢暴虎不敢馮河人知其一莫知其他此之謂也無兵搏虎日暴虎無舟檝而渡曰馮河言小人而爲政不可不敬則危猶暴虎馮河之必死人皆暴虎馮河立至害也故曰知其一而不知當畏愼小人危亡也故曰莫知其他此不免於惑此之謂也帝者體太一體法也太一天之刑神也王者法陰陽霸者則四時君者用六律秉太一者牢籠天地彈壓山川牢讀星霤楚人謂牢爲霤彈山川令出雲雨後能壓止之含吐陰陽伸曳四時伸曳猶押引和調之紀綱八極經緯六合覆露照導普汜無私普大也汜眾也無私愛憎言皆公也蠉飛蠕動莫不仰德而生陰陽者承天地之和形萬殊之體含氣化物以成埒類埒形也贏縮卷舒淪於不測贏長也縮烜也卷屈也舒散也淪入也測深也入於不可測盡之深終始虛滿轉於無原轉化歸於無窮之源本也四時者春生夏長秋收冬藏取予有節出入有時開闔張歙不失其叙歙讀曰脅叙次也喜怒剛柔不離其理理道也六律者生之與殺也賞之與罰也子之與奪也子布施也奪取收也非此無道也則四時用六律之君非用此上事其余無他道也故謹於權衡準繩審乎輕重足以治其境內矣權衡平也準法也繩直也是故體太一者明於天地之情通於道德之倫聰明燿於日月精神通於萬物動靜調於陰陽喜怒和於四時德澤施於方外施廷廷於遠方之外名聲傳於後世後世傳聞之也法陰陽者德與天地參參明明與日月並並併也精與鬼神總總合也戴圓履方抱表懷繩圓天也方地也表正也繩直也內能治身外能得人能得人之歡心發號施令天下莫不從風風化也則四時者柔而不脆剛而不鞼鞼折也寬而不肆肆緩雖寬不緩過齊非也肅而不悖肅急也雖急不促悖優柔委從以養羣類類物類也其德含愚而容不肖無所私愛私邪也用六律者伐亂禁暴進賢而廢不肖扶撥以爲正撥任也扶治也壞險以爲平矯枉以爲直矯正也枉曲也明於禁舍開閉之道乘時因勢以服役人心也役使也帝者體陰陽則侵爲諸夏所侵陵王者法四時則削爲諸夏所侵削傳曰諸侯侵犯王略也霸者節六律則辱爲鄰國所侮辱君者失準繩則廢爲臣所廢絀更立賢故小而行大則滔窕而不親滔窕不滿密也不爲臣下所親附也大而行小則狹隘而不容行小則正狹隘而不容包臣下貴賤不失其體而天下治矣不失其體大行大小行小也天愛其精地愛其平精光明也平正也人愛其情情性也天之精日月星辰雷電風雨也地之平水火金木土也人之情思慮聰明喜怒也故閉四關止五遁則與道淪四關耳目心口遁逸也淪入也是故神明藏於無形精神反於至眞眞身也則目明而不以視耳聰而不以聽心條達而不以思慮委而弗爲和而弗矜矜自大也眞性命之情而智故不得雜焉雜糅也精泄於目則其視明泄猶通也在於耳則其聽聰留於口則其言當當合也集於心則其慮通集止也故閉四關則身無患百節莫苑苑病也苑讀南陽之宛也莫死莫生莫虛莫盈是謂眞人言守其常凡亂之所由生者皆在流遁流遁之所生者五流放也遁逸也大構駕興宮室構連也駕材木相乘駕也延樓棧道雞棲井榦延樓高樓也棧道飛閣複道相通雞棲井榦複屋熒井也刻花置其中也檦標欂櫨以相支持木巧之飾飾巧盤紆刻儼盤盤龍也紆曲屈刻儼浮首虎頭之屬皆屋飾也儼讀嚴然之儼也嬴鏤雕琢詭文回波嬴鏤文章鏤雕畫也玉曰琢皆飾巧也詭文奇異之文也回波若水波也淌游瀷淢菱杼紾抱尚游瀷淢皆文盡擬像水勢之貌也菱芰杼采實紾戾也抱轉也皆壯采相銜持貌也淌讀平敞之敞瀷燕人强春言欶之欶淢讀郁乎文哉之郁美讀楚言杼紾讀紾結之紾抱讀岐嶷之嶷芒繁亂澤巧僞紛挐以相摧錯此遁於木也皆采色形像文章貌挐讀人性紛挐不解之挐鑿汙池之深肆畛崖之遠肆極也崖垠也來谿谷之流飾曲岸之際積牒旋石以純修碕飾治也牒累純緣也以玉石致之水邊爲脩碕或作旋祐旋石切以牒累流水邊爲脩碕脩碕曲中水所棠處也抑淢怒瀨以揚激波抑止也淢怒水也顓急流也而抑止之故激揚之波起也曲拂邅回以像湡浯拂戾也邅迴轉流也湡番隅浯蒼梧之二國多水江湖環之故多象渠池以自邅迴法而像之也湡讀愚戇之愚也益樹蓮菱以食鼈魚樹種也蓮藕實地菱芰也皆可以養魚鼈蓮讀蓮羊魚之蓮也鴻鵠鷫鷞稻梁饒餘鷫鷞鴈類也一曰鳳之別類也龍舟鷁首浮吹以娛此遁於水也龍舟大舟也刻爲龍文以爲飾也鷁大鳥也畫其象著船頭故曰鷁首也於舟中吹籟與竽以爲樂故曰浮吹以娛高築城郭設樹險阻崇臺榭之隆設施也樹立也一說種樹木以爲險阻今難攻易守也積土高丈曰臺加木曰榭也侈苑囿之大以窮要妙之望侈廣也有墻曰苑無墻曰囿所以畜禽獸也盡極要之觀望也魏闕之高上際青雲大廈曾加擬於崑崙門闕高崇巍巍然故曰魏闕也大廈大屋也曾重架材木相秉架也其高與崑崙山相像也脩爲墻垣甬道相連甬道飛閣複道也甬讀踊躍之踊道讀道布之道也殘高增下積土爲山殘墮也增益也接徑厯遠直道夷險接疾也徑行也道之阨者正直之夷平也終日馳騖而無蹟蹈之患此遁於土也大鍾鼎美重器鍾音之君也重器大器蓋鍾鼎也華蟲疏鏤以相繆紾書曰山龍華蟲藻火粉米繆紾相纏結也寢兕伏虎蟠龍連組兕獸名寢伏各有形也蟠龍詰屈相連文錯如織組文也焜昱錯眩照燿煇煌錯雜也眩惑也照燿煇煌焜光澤色貌也偃蹇蓼糾曲成文章雕琢之飾鍛錫文鐃乍晦乍明雕畫也緣錯錫可刷如連珠不可棳故曰乍晦乍明也抑微滅瑕霜文沈居若簞蘧蒢言劍理之美没滅其瑕文鐃如霜皆没身中故曰沈居簞竹蓆蘧蒢葦蓆取其邪文次叙劍鐃若此也纏錦經冗以數而疏劍文相句連纏如綺經冗如錦似數如疏文鐃美眩人目此遁於金也煎熬焚炙調齊和之適以窮荆吳甘酸之變荆楚言二國善酸鹹之和而窮盡之焚林而獵燒燎大木鼓橐吹埵以銷銅鐵鼓繫也橐治鑪排橐也埵銅橐口鐵笛埵入火中吹火也故曰吹埵銷鑠靡流堅鍜無厭足曰山無峻榦林無柘梓峻榦長枝也柘桑梓滋生也燎木以爲炭燔草而爲灰野莽白素不得其時槁草白素上掩天光下殄地財此遁於火也殄盡也珍讀曰典也此五者一足以亡天下矣五者之中有一則足以滅亡也是故古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲明堂王者布政之堂上圓下方堂四出各有左右房謂之个凡十二所王者月居其房告朔朝厯頒宣其令謂之明堂其中可以叙昭穆謂之太廟其上可以望氣祥書雲物謂之靈臺其外圓似辟雍諸侯之制半天子謂之宮詩云矯矯魯侯在泮獻公也土事不文質也木工不斵樸而已斵或作琢而不雕畫也金器不鏤不錯鏤設文飾也鏤讀婁之婁衣無隅差之削隅角也差邪也古者質皆全幅爲衣裳無有邪角邪角削殺也冠無觚嬴之理觚嬴之理謂若馬目籠相連干也言無者冠文取平直而已也嬴讀指端嬴文之嬴也堂大足以周旋理文堂明堂所以升降揖讓修禮容故曰周旋理文理政事文書也靜潔足以饗上帝禮鬼神以示民知儉節孝經曰宗祀文王於明堂以配上帝也夫聲色五味遠國珍怪瓌異奇物足以變心易志搖蕩精神感動血氣者不可勝計也夫天地之生財也本不過五不過五行之數聖人節五行則治不荒五行金木水火土也水屬陰行火爲陽行木爲燠行金爲寒行土爲風行五氣常行故曰五行凡人之性心和欲得則樂心和不喜不怒欲得無違耳樂斯動動斯蹈蹈斯蕩蕩斯歌歌斯舞歌舞節則禽獸跳矣人之性心有憂喪則悲悲則哀有憂艱難也喪事也亡失所離愛則悲悲則傷哀斯憤憤斯怒怒斯動動則手足不靜靜甯也擗踊哭泣哀以送之也人之性有侵犯則怒怒則血充人欲有侵犯則怒盛血氣充盈以成其勢血充則氣激氣激則發怒發怒則有所釋憾矣釋解也憾恨也故鍾鼓管簫干鏚羽旄所以飾喜也衰絰苴杖苴麻之有實者衰讀曰崔杼之崔也哭踊有節所以飾哀也爲哀所容故曰飾也兵革羽旄金鼓斧鉞所以飾怒也必有其質乃爲之文古者聖王在上政教平仁愛洽上下同心君臣輯睦衣食有餘家給人足父慈慈柔也子孝兄良弟順生者不怨死者不恨有道之世人得其志故生者不怨也皆終其天命故死者不恨天下和洽人得其願夫人相樂無所發貺故聖人爲之作樂以和節之夫人眾人也但中心相樂所以發其恩賜也故聖人爲之作樂以節之猶通制也末世之政田漁重稅關市急征澤梁畢禁網罟無所布耒耜無所設民力竭於徭役財殫於會賦會計計人口數責其稅歛也居者無食行者無糧老者不養死者不葬贅妻鬻子以給上求猶弗能贍贅從嫁也或作賃妻愚夫惷婦皆有流連之心悽愴之志流連猶爛漫失其職業也悽愴傷悼之貌惷讀近貯益之𦙴戇蘢口言之也乃使始爲之撞大鍾擊鳴鼓吹竽笙彈琴瑟失樂之本矣古者上求薄而民用給給足君施其德臣盡其忠父行其慈子竭其孝竭盡也善事父母曰孝也各致其愛而無憾恨其間無憾恨各得其願也夫三年之喪非强而致之非强行致孝子之情也情自發於中聽樂不樂食旨不甘思慕之心未能絶也三年之思思慕之心未能自絶於哀戚也晚世風流俗敗嗜慾多禮義廢君臣相欺父子疑怨尤充胷思心盡亡盡喪其忠孝思慕之心也被衰戴絰戲笑其中雖致之三年失喪之本也本在哀戚古者天子一畿諸侯一同方千里爲畿方百里爲同各守其分不得相侵分猶界也有不行王道者暴虐萬民爭地侵壤亂政犯禁召之不至令之不行言不行上令者行讀行馬之行禁之不止誨之不變誨教也變更也乃舉兵而伐之戮其君易其黨封其墓類其社有賢者受惡君之誅則封殖其墓若武王伐紂封比干之墓是也祭社曰類以事類祭之也詩云是類是禡也卜其子孫以代之卜擇立其子孫之賢也天子不滅國諸侯不滅姓古之政也晚世務廣地侵壤並兼無已舉不義之兵伐無罪之國殺不辜之民絶先聖之後辜罪也民皆帝王之後故曰絶先聖之後大國出攻小國城守驅人之牛馬傒人之子女傒繫囚之繫讀曰雞毀人之宗廟遷人之重寶血流千里暴骸滿野以贍貪主之欲非兵之所爲生也言兵爲禁暴整亂設不爲作亂生也故兵者所以討暴非所以爲暴也言兵討人之暴亂非所以自爲暴亂也樂者所以致和非所以爲淫也樂蕩人之邪志存人之正性致其中和而已非所爲自淫過也喪者所以盡哀非所以爲僞也喪踊哭泣所以盡孝子之哀情也非所以爲詐僞佯哀戚而已也故事親有道矣而愛爲務道孝道務在愛敬其親朝廷有容矣而敬爲上朝廷之容濟濟也父子主愛君臣主敬故以敬爲上也處喪有禮矣而哀爲主處居也喪禮三年之禮也論語曰喪與其易也甯戚故曰以哀爲主也用兵有術矣而義爲本術數也陰陽天生虛實之數也傳曰天生五材民並用之廢一不可誰能去兵兵之所由來久矣聖人以興亂人以亡廢興存亡昏明之術也故曰以義爲本本立而道行本傷而道廢本立義立也本傷義喪也故曰道廢主術訓上主君也術道也君之宰國統御臣下五帝三王以來無不用道而興故曰主術也因以題篇人主之術處無爲之事而行不言之教教令也謂不言而事辦也清靜而不動一度而不搖因循而任下責成而不勞成辦而不自勞是故心知規而師傅諭導規謀也師者所從取法則也傅相也諭導以正道也口能言而行人稱辭足能行而相者先導相儀耳能聽而執正進諫諫或作謀也其世子時也是故慮無失策謀無過事過猶誤也言爲文章行爲儀表於天下爲天下人所法則也進退應時動靜循理不爲醜美好憎不爲賞罰喜怒名各自名類各自類事猶自然莫出於己故古之王者冕而前旒所以蔽明也冕王者冠也前旒前後垂珠飾遂筵也下自目故曰蔽明也天子玉縣十二公侯挂珠九卿點珠六伯子各應隨其命數也黈纊塞耳所以掩聰不欲其妄聞也黈讀而買黈益之黈也天子外屏所以自障屏樹垣也爾雅曰門內之垣謂之樹論語曰國君樹塞門諸侯在內天子在外故曰所以自障也故所理者遠則所在者邇所治者大則所守者少夫目妄視則淫耳妄聽則惑口妄言則亂夫三關者不可不愼守也若欲規之乃是離之言嗜欲有所規合乃是離散也若欲飾之乃是賊之飾好也賊敗也天氣爲魂地氣爲魄反之玄房各處其宅守而勿失上通太一太一之精通於天道天道玄默無容無則大不可極深不可測測盡尚與人化知不能得天道至大非人智慮所能得也昔者神農之治天下也神不馳於胷中言釋神安靜不躁動也智不出於四域信身在中懷其仁成之心懷思甘雨時降五穀蕃植蕃茂植長春生夏長秋收冬藏月省時考茂成𡻕終獻功以時嘗穀嘗之新穀薦之明堂祀於明堂明堂之制有蓋而無四方風雨不能襲寒暑不能傷遷延而入之養民以公遷延猶倘佯也已說在本經也其民樸重端慤端直也慤成也不忿爭而財足不勞形而功成因天地之資而與之和同是故威厲而不殺刑錯而不用法省而不煩省約也煩多也故其化如神其地南至交阯北至幽都幽冥之都東至暘谷日所出也西至三危三危西極之山莫不聽從當此之時法寬刑緩囹圄空虛而天下一俗一同其俗莫懷姦心末世之政則不然上好取而無量下貪狼而無讓民貧苦而忿爭事力勞而無功智詐萌興盜賊滋彰上下相怨號令不行執政有司不務反道矯拂其本而事修其末事治削薄其德曾累其刑而欲以爲治無以異於執彈而來鳥𢮅梲而狎犬也亂乃逾甚逾益夫水濁則魚噞魚短氣出口於水喘息之諭也政苛則民亂言無聊也故夫養虎豹犀象者爲之圈檻供其嗜欲適其饑飽違其怒恚然而不能終其天年者刑有所劫也是以上多故則下多詐故巧上多事則下多態上煩擾則下不定不定不知所從上多求則下交爭不直之於本而事之於末譬猶揚堁而弭塵抱薪以救火也堁塵麽也楚人謂之堁堁動塵之貌弭止也故聖人事省而易治求寡而易贍瞻給不施而仁不言而信不求而得不爲而成塊然保眞抱德推誠誠實天下從之如響之應聲景之像形其所修者本也詹何曰未聞身治而國亂故曰其所修者本也刑罰不足以移風殺戮不足以禁姦唯神化爲貴至精爲神夫疾呼不過聞百步志之所在踰於千里踰猶通也冬日之陽夏之陰萬物歸之而莫使之然冬日人物歸陽夏日猛物歸陰莫使之自然如是也故至精之像弗招而自來不麾而自往窈窈冥冥不知爲之者誰而功自成智者弗能誦辯者弗能形昔孫叔敖恬臥而郢人無所害其鋒郢楚國都也孫叔敖楚大夫也蓋乘馬三年不知其牝牡言其賢也但恬臥養德折衝千里之外敵國不敢犯害故郢人不舉兵出伐無所害其鋒於四方也市南宜遼弄丸而兩家之難無所關其辭宜遼姓也名熊勇士居楚市南楚平王太子建爲費無極所逐奔鄭鄭人殺之其子勝在吳令尹子西召之以爲白公請伐鄭以報讎子西許之而未出師晉人伐鄭以報讎子西救之勝怒曰鄭人在此讎不遠矣欲殺子西其臣石乞曰市南熊宜遼得之可以當五百人乃往視之告其故不從舉之以劍而不動而弄丸不輟心志不懼曰不能從子爲亂亦不泄子之事曰公遂殺子西兩雖有難不怨宜遼故曰無所關其辭也鞅鞈鐵鎧瞋目扼𢮝其於以御兵刃縣矣縣遠也比於德不及之遠券契束帛刑罰斧鉞其於以解難薄矣薄於德也待目而照見待言而使令其於爲治難矣蘧伯玉爲相子貢往觀之曰何以治國曰以弗治治之蘧伯玉衛大夫蘧瑗也子貢衛人也姓端木名賜孔子弟子也簡子欲伐衛使是史黯往覿焉簡子晉卿趙氏也史黯史墨也覿觀之也還報曰蘧伯玉爲相未可以加兵以其賢也固塞險阻何足以致之致猶勝也故臯陶瘖而爲大理天下無虐刑有貴於言者也雖瘖平獄理訟能得人之情故貴於多言者也師曠瞽而爲太宰晉無亂政有貴於見者雖盲而大治晉國使無有亂政故貴於有所見故不言之令不視之見不言之令臯陶瘖也不視之見師曠瞽也此伏犧神農之所以爲師也以用師法故民之化也不從其所言而從所行從其志意之所行故齊莊公好勇不使鬪爭而國家多難其漸至於崔杼之亂莊公齊靈公之子光崔杼齊大夫也亂殺莊公也傾襄好色不使風議而民多昏亂其積至昭奇之難楚傾襄王昭奇楚大夫也故至精之所動若春氣之生秋氣之殺也雖馳傳騖置不若此其亟亟疾故君人者其猶射者乎於此毫末於彼尋常矣故愼所以感之也夫榮啟期一彈而孔子三日樂感於和鄒忌一徽而威王終夕悲感於憂徽騖彈也威王齊宣王之父也在春秋後徽讀紛麻縗車之縗也動諸琴瑟形諸音聲而能使人爲之哀樂哀威王也樂孔子也縣法設賞而不能移風易俗者其誠心弗施也甯戚商歌車下桓公喟然而寤矣至精入人深矣故曰樂聽其音則知其俗見其俗則知其化孔子學鼓琴於師襄師襄魯樂大師也而諭文王之志見微以知明矣諭教教之鼓文王操也延陵季子聽魯樂而知殷夏之風論近以識遠也作之上古施及千𡻕而文不滅況於並世化民乎湯之時七年旱以身禱於桑林之際而四海之雲凑凑會也或作蒸蒸升也千里之雨至抱質效誠感動天地神諭方外令行禁止豈足爲哉古聖王至精形於內而好憎忘於外形見好憎情欲已充出言以嗣情發號以明旨陳之以禮樂風之以歌謠業貫萬世而不壅貫通壅塞橫局四方而不窮禽獸昆蟲與之陶化化從昆蟲或作鬼神又況於執法施令乎故太上神化其次使不得爲非其次賞賢而罰暴暴虐亂也衡之於左右無私輕重故可以爲平衡銓衡也繩之於內外無私曲直故可以爲正人主之於用法無私好憎故可以爲命夫權輕重不差蟁首蟁首猶微細也扶撥枉橈不失針鋒直施矯邪不私辟險姦不能枉讒不能亂德無所立立見怨無所藏是任術而釋人心者也故爲治者不與焉治在道不在智故曰不與焉夫舟浮於水車轉於陸此勢之自然也木擊折轊水戾破舟不怨木石而罪巧拙者罪御者刺舟者之巧拙也知故不載焉言木石無巧詐故不怨也是故道有智則惑言道智則惑也德有心則險心有目則眩眩於物也兵莫憯於志而莫邪爲下寇莫大於陰陽而抱鼓爲小小細憯猶利也以志意精誠伐人爲利老子曰重積德則無不尅故以莫邪爲下也寇亦兵也推陰陽虛實之道爲大故以抱鼓爲小也今夫權衡規矩一定而不易不爲秦楚變節不爲胡越改容常一而不邪方行而不流一日刑之萬世傳之而以無爲爲之言無所爲爲之爲自爲之故國有亡主而世無廢道亡主桀紂是也湯武以其民主故曰無廢道也人有困窮而理無不通理道由此觀之無爲者道之宗宗本故得道之宗應物無窮任人之才難以至治才智湯武聖主也而不能與越人乘幹舟而浮於江湖幹舟小船也危險越人習水自能乘之故湯武不能也一曰大舟也伊尹賢相也而不能與胡人騎騵馬而服騊駼黃馬白腹曰騵詩曰四騵彭祖騊駼野馬也胡人所習伊尹雖賢不能與服也孔墨博通而不能山居者入榛薄險阻也孔孔子也墨墨翟也聚木爲榛深草爲薄山居者所習故孔墨不能也阻或作塗也由此觀之則人知之於物也淺矣而欲以徧照海內存萬方不因道之數而專己之能則其窮不達矣故智不足以治天下也桀之力別觡伸鉤索鐵歙金推移大犧水殺黿鼉陸捕熊羆觡角也索絞也歙讀協然湯革車三百乘困之鳴條擒之焦門焦或作巢由此觀之勇力不足以持天下矣智不足以爲治勇不足以爲强則人材不足任明也而君人者不下廟堂之上而知四海之外者因物以識物因人以知人也故積力之所舉則無不勝也衆智之所爲則無不成也埳井之無黿鼉隘也園中無脩木小也夫舉重鼎者力少而不能勝也及至其移徙之不待其多力者故千人之羣無絶梁萬人之聚無廢功夫華騮緑耳一日而至千里然其使之搏兔不如豺狼伎能殊也殊異鴟夜撮蚤蚊察分秋毫晝日顛越不能見邱山形性詭也鴟鴟鵂也謂之老菟夜鳴人屋上也夜則目明合聚人爪以著其巢中故曰察分秋毫晝則無所見故曰情性詭也夫螣蛇游霧而動應龍乘雲而舉猨得木而捷魚得水而鶩鶩疾故古之爲車也漆者不畫鑿者不斵工無二伎士不兼官各守其職不得相姦姦亂人得其宜物得其安是以器械不苦而職事不嫚苦讀監嫚捕器嫚讀慢緩之慢夫責少者易償職寡者易守寡少任輕者易權權謀上操約省之分下效易爲之功是以君臣彌久而不相厭厭欺君人之道其猶零星之尸也尸祭主也尸食飽以知神之食亦飽詩曰公尸宴飲在宗載考儼然玄默而吉祥受福尸不言語故曰玄默是故得道者不爲醜飾不爲僞善不飾爲美亦不極爲善也一人被之而不褒褒大萬人蒙之而不褊蒙冒也褊小也是故重爲惠若重爲暴則治道通矣通猶順也爲惠者而布施也無功而厚賞無勞而高爵則守職者懈於官而游居者亟於進矣爲暴者妄誅也無罪者而死亡行直而被刑則修身者不勸善而爲邪者輕犯上矣言不可不愼也故爲惠者生姦而爲暴者生亂姦亂之俗亡國之風風化是故明主之治國有誅者而主無怒焉因法而行故不怒也朝有賞者而君無與焉因功而行故不與也誅者不怨君罪之所當也賞者不德上功之所致也民知誅賞之來皆在於身也故務功修業不受贛於君贛物是故朝廷蕪而無迹田野辟而無草故太上下知有之言太上之世下知之人皆能有此術令夫橋直植立而不動俛仰取制焉橋桔臯上衡也植柱權衡者行之俛仰取制於柱也以諭君人主靜漠而不躁躁動百官得修焉譬而軍之持麾者妄指則亂矣慧不足以大甯智不足以安危與其譽堯而毁桀也不如掩聰明而反修其道也不足以大甯者小惠也不足以安危者小智也如此人者欲譽堯而毁桀以成善善惡惡之名人猶有强知之人耳不如掩聰明而本脩大道成名之速也人君之道亦如此也清靜無爲則天與之時廉儉守節則地生之財人君德行如此故天與之時地生之財天與之時湯武是也地生之財神農后稷也處愚稱德則聖人之爲謀若伊尹爲湯謀傳說爲高宗謀是孟子曰伊尹之任國語曰武丁以像旁求聖人得傅說於傅巖也是故下者萬物歸之虛者天下遺之遺與夫人主之聽治也清明而不暗虛心而弱志是故羣臣輻凑並進無愚智賢不肖莫不盡其能於是乃始陳其禮建以爲基建立也基業也是乘眾勢以爲車御眾智以爲馬雖幽野險塗則無由惑矣幽深也險猶遠也人主深居隱處以避燥溼閨門重襲以避姦賊內不知閭里之情外不知山澤之形惟幕之外目不能見十里之前耳不能聞百步之外天下之物無不通者通知其灌輸之者大而斟酌之者眾也是故不出戸而知天下不窺牖而知天道乘眾人之智則天下之不足有也專用其心則獨身不能保也保猶守也是故人主覆之以德不行其智而因萬人之所利夫舉踵天下而得所利故百姓之上弗重也錯之前而弗害也舉之而弗高也推之而弗厭尊重舉之不自覺高也推求也奉也主道員者運轉而無端端涯化育如神虛無因循常後而不先也臣道員者運轉而無方者論是而處當爲事先倡守職分明以立成功也是故君臣異道則治不易奪言相和同道則亂君所謂可臣亦曰可君所謂否臣亦曰否是同也莫相臣匡弼故曰亂也各得其宜處其當則上下有以相使也君得君道臣得臣道故曰得其宜也夫人主之聽治也虚心而弱意清明而不闇是故羣臣輻凑並進無愚智賢不肖莫不盡其能者則君得所以制臣臣得所以事君治國之道明矣文王智而好問故聖好問欲與人同其功武王勇而好問故勝勝殷夫乘眾人之智則無不任也用眾人之力則無不勝也千鈞之重烏獲不能舉也千鈞三萬斤也烏獲秦武王之力士也武王試其力使舉大鼎腕脫而不任故曰不能舉也眾人相一則百人有餘力矣是故任一人之力者則烏獲不足恃不能勝故不恃也乘眾人之制者則天下不足有也人眾力强以天下爲小故曰不足有也禹決江疏河以爲天下興利而不能使水西流稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也夫推而不可爲之勢而不修道理之數推行雖神聖人不能以成其功而況當世之主乎夫載重而馬羸雖造父不能以致遠造父周穆王之善御臣也車輕馬良雖中工可使追速是故聖人舉事也豈能拂道理之數詭自然之性拂戾也詭違也以曲爲直以屈爲伸哉未嘗不因其資而用之也資是以積力之所舉無不勝也而眾智之所爲無不成也聾者可令嗺䈥而不可使有聞也瘖者可使守圉而不可使言也形有所不周而能有所不容也是故有一形者處一位有一能者服一事力勝其任則舉之者不重也能稱其事則爲之者不難也毋小大脩短各得其宜則天下一齊無以相過也聖人兼而用之故無棄才人主貴正而尚忠忠正在上位執正營事營典則讒佞姦邪無由進矣譬猶方員之不相蓋而曲直之不相入入中夫鳥獸之不可同羣者其類異也虎鹿之不同游者力不敵也是故聖人得志而在上位讒佞姦邪而欲犯主者譬猶雀之見鸇而鼠之遇狸也亦必無餘命矣是故人主之一舉也不可不愼也所任者得其人則國家治上下和羣臣親百姓附附從所任非其人則國家危上下乖羣臣怨百姓亂故一舉而不當終身傷傷病也亦敗也得失之道權要在主是故繩正於上木直於下非有事焉事治也非治之使宜所緣以修者然也故人主誠正則直士任事而姦人伏匿矣人主不正則邪人得志忠者隱蔽矣夫人之所以莫㧓玉石而㧓瓜瓠者何也玉石堅㧓不能入故不㧓無得於玉石弗犯也使人主執正持平如從繩準高下則羣臣以邪來者猶以卵投石以火投水故靈王好細腰而民有殺食自飢也靈王蓋楚靈王殺食省食越王好勇而民皆處危爭死越王勾踐由此觀之權勢之柄其以移風易俗矣堯爲匹夫不能仁化一里桀在上位令行禁止由此觀之賢不足以爲治而勢可以易俗明矣書曰一人有慶萬民賴之此之謂也天下多眩於名聲而寡察其實寡少也察明也實眞僞之實是故處人以譽尊處人隱居也以名譽見尊也而游者以辯顯游行之人以辯辭自顯達察其所尊顯無他故焉人主不明分數利害之地而賢眾口之辯也治國則不然然如是也言事者必究於法而爲行者必治於官上操其名以責其實臣守其業業事以效其功效致言不得過其實行不得踰其法羣臣輻凑莫敢專君專制事不在法律中而可以便國佐治必參五行之陰考以觀其歸並用周聽以察其化不偏一曲不黨一事是以中立而徧運照海內中正羣臣公正莫敢爲邪公方正直百官述職務致其公迹也主精明於上官勸力於下姦邪滅迹庶功日進庶眾是以勇者盡於軍盡力於軍功也亂國則不然有眾咸譽者無功而賞守職者無罪而誅主上聞而不明羣臣黨而不忠說談者游於辯修行者競於往往自益也主上出令則非之以與法令所禁則犯之邪以黨與非謗上令自邪姦也爲智者務爲巧詐爲勇者務於鬪爭大臣專權下吏持勢朋黨周比以弄其上國雖若存古之人曰亡矣且夫不治官職而被甲兵不隨南畝而有賢聖之聲者非所以都於國也騏驥騄駬天下之疾馬也驅之不前引之不止雖愚者不加體焉加猶止也今治亂之機轍迹可見也而世主莫之能察此治道之所以塞塞猶閉也權勢者人主之車輿爵祿者人臣之轡銜也是故人主處權勢之要而持爵祿之柄審緩急之度而適取予之節是以天下盡力而不倦夫臣主之相與也非有父子之厚骨肉之親也而竭力殊死不辭其軀者何也勢有使之然也昔者豫讓中行文子之臣文子晉大夫中行穆子之子荀寅也智伯伐中行氏并吞其地豫讓背其主而臣智伯智伯與趙襄子戰於晉陽之下身死爲戮國分爲三韓魏趙三分有之此之福也豫讓欲報趙襄子欲爲智伯報讎殺趙襄子漆身爲厲吞炭變音擿齒易貌夫以一人之心而事兩主或背而去或欲身徇之豈其趨捨厚薄之勢異哉人之恩澤使之然也紂兼天下朝諸侯人迹所及舟檝所通莫不賓服然而武王甲卒三千人擒之於牧野豈周民死節而殷民背叛哉其主之德義厚而號令行也夫疾風而波興木茂而鳥集相生之氣也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣是故君不能賞無功之臣臣亦不能死無德之君君德不下流於民而欲用之如鞭蹏馬矣是猶不待雨而求熟稼必不可之數也數術主術訓下君人之道處靜以修身儉約以率下靜則下不擾矣儉則民不怨矣下擾則政亂民怨則德薄政亂則賢者不爲謀德薄則勇者不爲死是故人主好鷙鳥猛獸珍怪奇物金玉爲珍詭異爲怪非常爲奇狡躁康荒康安荒亂不愛民力馳騁田獵出入不時如此則百官務亂事勤財匱勤勞匱乏萬民愁苦生業不修矣人主好高臺深池雕琢刻鏤黼黻文章絺綌綺繡寶玩珠玉白與黑爲黼青與赤爲黻絺綌葛也精曰絺麄曰綌五彩具曰繡也則賦歛無度而萬民力竭矣堯之有天下也非貪萬民之富而安人主之位也以爲百姓力征强凌弱眾暴寡於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨不剪采椽不斷大路不畫大路上路四馬車也天子駕六馬不畫不文飾也越席不緣越結蒲爲席也大羹不和不致五味粢食不毇毇細巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下而以爲社稷非有利焉年衰志憫衰老也憫憂也舉天下而傳之舜猶卻行而脫蹤也言甚易也衰世則不然一日而有天下之當處人主之勢則竭百姓之力以奉耳目之欲志專在於宮室臺榭陂池苑囿猛獸熊羆玩好珍怪是故貧民糟糠不接於口而虎狼熊羆厭芻豢百姓短褐不完而宮室衣錦繡人主急兹無用之功百姓黎民顦顇於天下黎齊是故使天下不安其性不得安其正性爲詐生也人主之居也如日月之明也天下之所同側目而視側耳而聽延頸舉踵而望也是故非澹漠無以明德非甯靜無以致遠非寬大無以兼覆非慈厚無以懷眾非平正無以制斷是故賢主之用人也猶巧工之制木也制裁大者以爲舟航柱樑舟船也方兩小船並與共濟爲航也小者以爲楫禊修者以爲櫚榱櫚屋垂榱憩也短者以爲朱儒枅櫨朱儒梁上戴蹲跪人也枅讀如雞也無大小脩短各得其所宜規矩方圓各有所施天下之物莫凶於雞毒雞毒烏頭然而良醫橐而藏之有所用也是故林莽之材猶無可棄者而況人乎今夫朝廷之所不舉鄉曲之所不譽非其人不肖也其所以官之者非其職也鹿之上山獐不能跂也及其下牧豎能追之才有所脩短也是故有大略者不可責以捷巧略行道也有小智者不可任以大功人有其才物有其形有任一而太重或任百而尚輕是故審毫釐之計者必遺天下之大數遺失不失小物之選者或於大事之舉譬猶狸之不可使搏牛虎之不可使搏鼠也今人之才或欲平九州并方外存危國繼絶世志在直道正邪決煩理挐而乃責之以閨閤之禮隩𥥛之間或佞巧小具謟進愉說隨鄉曲之俗卑下眾人之耳目而乃任之以天下之權治亂之機機理是猶以斧劗毛以刀抵木也劗剪也劗讀驚攢之攢也皆失其宜矣宜適人主者以天下之目視以天下之耳聽以天下之智慮以天下之力爭是故號令能下究而臣情得上聞聞猶達也百官修通羣臣輻凑也歸君若輻之凑轂故曰輻凑喜不以賞賜怒不以罪誅懼失當也是故威立而不廢聰明先而不弊弊闇法令察而不苛察明也苛煩也耳目達而不闇善否之情日陳於前而無所逆是故賢者盡其智而不肖者竭其力德澤兼覆而不偏羣臣勸務而不怠怠懈近者安其性遠者懷其德性生也懷歸也所以然者何也得用人之道而不任己之才者也故假輿馬者足不勞而致千里假或作駕乘舟檝不能游而絶江海絶猶過也夫人主之情莫不欲總海內之智盡眾人之力然而羣臣志達效忠者希不困其身困猶危也使言之而是雖在褐夫芻蕘猶不可棄也言雖賤當也故曰不可棄也使言之而非也雖在卿相人君揄策於廟堂之上未必可用人君謂國君也揄出策謀也言之而非雖責罰也是非之所在不可以貴賤尊卑論也是明主之聽於羣臣其計乃可用不羞其位不羞其位卑而不用其主言可行不責其辯不責其辯口美辭也闇主則不然所愛習親近者雖邪枉不正不能見也疏遠則卑賤者竭力盡忠不能知也有言者窮之以辭有諫者誅之以罪如此而欲照海內存萬方是猶塞耳而聽清濁商音清宮音濁掩目而視青黃也其離聰明則亦遠矣離去法者天下之度量而人主之準繩也縣法者法不法也設賞者賞當賞也法定之後中程者賞缺繩者誅尊貴者不輕其罰而卑賤者不重其刑言平犯法者雖賢必誅中度者雖不肖必無罪是故公道通而私道塞矣公正也私邪也塞閉也古之置有司也有司蓋有理官士也所以禁民使不得自恣也恣放恣也其立君也所以剬有司使無專行專擅法籍禮義者所以禁君使無擅斷也人莫得自恣則道勝道勝而理達矣故反於無爲無爲者非謂其凝滯而不動也以其言莫從己出也夫寸生於𥢕𥢕生於日日生於形形生於景此度之本也𥢕禾穗𥢕孚榆頭芒也十𥢕爲一分十分爲一寸十寸爲一尺十尺一丈政謂之本也樂生於音音生於律律生於風此聲之宗也宗亦本也法生於義義生於眾適眾適合於人心此治之要也要約眾也故通於本者不亂於末覩於要者不惑於詳惑眩法者非天墮非地生發於人間而反以自正反還是故有諸己不非諸人有諸己己有聰明也不非諸人恕人行也無諸己不求諸人言己雖無獨見之明不求加罪於人也所立於下者不廢於上人主所立法禁於民亦自脩之不廢於上言以法也所禁於民者不行於身不正之事不獨行之於身言其正己以正人也所謂亡國非無君也無法也變法者非無法也有法者而不與用無法等等同是故人主之立法先自爲檢式儀表表正故令行於天下孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣禁勝於身不敢自犯禁也故能令行於民也聖主之治也其猶造父之御齊輯之於轡御之際而急緩之於脣吻之和正度於胸臆之中而執節於掌握之間節策內得於心中外合於馬志是故能進退履繩繩直正也而旋曲中規曲屈規員取道致遠而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故輿馬不調王良不足以取道君臣不和唐虞不能以爲治執術而御之則管晏之智盡矣明分以示之則蹠蕎之姦止矣盜蹠孔子時人蕎莊蕎楚威王之將軍能大爲盜也夫據除而窺井底雖達視猶不能見其睛睛目童子也借明於鑑以照之則寸之分可得而察也鑑鏡也分毛也一曰疵是故明主之耳目不勞精神不竭物至而觀其象事來而應其化近者不亂遠者治也是故不用適然之數而行必然之道故萬舉而無遺策矣今夫御者馬體調於車御心和於馬則厯險致遠進退周游莫不如志雖有騏驥騄駬之良臧獲御之則馬反自恣而人弗能制矣臧獲古之不能御者魯人也故治者不貴其自是而貴其不得爲非也故曰勿使可欲毋曰弗求勿使可奪毋曰不爭如此則人材釋而公道行矣美者正於度而不足者建於用故海內可一也夫釋職事而聽非譽棄公勞而用朋黨公正則奇材佻長而干次奇材非常之材佻長卒非純賢也故曰干次也守官者雍遏而不進如此則民俗亂於國而功臣爭於朝奇材佻長之人干超其次功勞之臣反不顯烈故爭於朝也故法律度量者人主之所以執下執制釋之而不用不用法律度量也是猶無轡御而馳也羣臣百姓反弄其上是故有術則制人無術則制於人爲人所擒制也吞舟之魚蕩而失水則制於螻蟻離其居也魚能吞舟言其大也其居水也猨貁失木而擒於狐狸非其處也其處茂木君人者釋所守而與臣下爭則有司以無爲持位無所爲以持其位也守職者以從君取容隨君之欲以取容媚是以人臣藏智而弗用不用智謀贊佐其上也反以事轉任其上矣賢臣見其不肯爲謀故轉任其上令自制之詩云仲山甫旣明且哲以保其身夫貴富者之於勞也達事者之於察也驕恣者之於恭也勢不及君君人者不任能不任用臣智能也而好自爲之則智日困而自負其責也數窮於下則不能伸理行墮於國則不能專制智不足以爲治威不足以行誅則無以與天下交也喜怒形於心者欲見於外則守職者離正而阿上阿曲從也有司枉法而從風風令賞不當功誅不應罪上下離心而君臣相怨也是以執政阿主而有過則無以責之有罪而不誅則百官煩亂智弗能解也毁譽萌生而明不能照也不正本而反自修則人主逾勞人臣逾逸是猶代庖宰剝牲而爲大匠斵也與馬競走䈥絶而弗能及上車執轡則馬死於衡下故伯樂相之王良御之明主乘之無御相之勞而致千里者乘於人資以爲羽翼也資才是故君人者無爲而有守也有爲而無好也無所私好有爲則讒生有好則諛起諂諛之人乘志而起昔者齊桓公好味而易牙烹其首子而餌之桓公襄公諸兒之子小白虞君好寶而晉獻以璧馬釣之釣取胡王好音而秦穆公以女樂誘之誘惑是皆以利見制於人也制猶擒也故善建者不拔言建之無形也夫火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之唯造化者物莫能勝也故中欲不出謂之扃外邪不入謂之塞中扃外閉何事之不節外閉中扃何事之不成弗用而後能用之弗爲而後能爲之精神勞則越越散耳目淫則謁竭滅故有道之主滅想去意清虛以待不伐之言不奪之事循名責實使自司任而弗詔責而弗教以不知爲道道常未知以奈何爲寶道貴無形無形不可奈何道之所以爲貴也如此則百官之事各有所守矣有所守言不離扃也攝權勢之柄其於化民易矣衛君役子路權重也衛君出公輒也景桓公臣管晏位尊也管仲輔相桓公晏嬰相景公二君位尊故也怯服勇而愚制智其所託勢者勝也故枝不得大於榦末不得强於本則輕重小大有以相制也若五指之屬於臂搏援攫捷莫不如志言以小屬於大也是故得勢之利者所持甚小其存甚大所守甚約約要也少也所制甚廣是故十圍之木持千鈞之屋五寸之鍵制開闔豈其材之巨小足哉所居要也孔邱墨翟修先聖之術通六藝之論口道其言身行其志慕義從風風化而爲之服役者不過數十人役事使居天子之位則天下徧爲儒墨矣徧猶盡也楚莊王傷文無畏之死於宋也奮袂而越衣冠相連於道遂成軍宋城之下權柄重也莊王楚穆王商臣之子旅也使申舟問聘於齊不假道於宋無畏曰未必襲殺我王曰殺汝伐宋見犀而行不假道於宋華元曰過我而不假道鄙我也鄙我亡也以兵殺其使者亦亡也遂殺之莊王聞之怒故拔袂而起成軍亡宋城故曰權柄重也楚文王好服解冠楚國效之文王楚武王熊達之子熊庇獬豸之冠始今御史冠趙武靈王貝帶鵔翿而朝趙國化之武靈王出春秋後以大貝飾帶胡服鵔翿讀曰私鈚頭曰郭洛帶位銚鎬也使在匹夫布衣雖冠獬冠帶貝帶鵔翿而朝則不免爲人笑也鵔翿讀曰私鈚頭二字三音也夫民之好善樂正不得禁誅而自中法度者萬無一也下必行之令從之者利逆之者凶日陰未移而海內莫不被繩矣繩正故握劍鋒以離北宮子司馬蒯蕢不使應敵北宮子齊人也孟子所謂北宮勇也司馬蒯蕢其先程伯休甫宣王命以爲司馬因爲司馬氏蒯蕢其後也周衰適他國蒯蕢在越以善擊劍聞應猶擊也操其觚招其末則庸人能以制勝觚劍拊招舉也今使烏獲藉蕃從後牽牛尾尾絶而不從者逆也烏獲藉蕃皆多力人若指之桑條以貫其鼻則五尺童子牽而周四海者順也夫七尺之撓而制船之左右者以水爲資橈刺船槔也資用也撓讀煩撓之撓也天子發號令行禁止以眾爲勢也夫防民之所害開民之所利威行也若發堿決塘堿水堿也塘堤也皆所以畜水故循流而下易以至背風而馳易以遠因其勢也桓公立政去食肉之獸食粟之鳥係罝之網三舉百姓說桓齊桓公紂殺王子比干而骨肉怨斮朝涉者之脛而萬民叛再舉而天下失矣故義者非能徧利天下之民利一人而天下從風暴者非盡害海內之眾也害一人而天下離叛故桓公三舉而九合諸侯紂再舉而不得爲匹夫故舉錯不可不審三舉去食肉之獸食粟之鳥係置之網再舉殺比干斮朝涉之脛人主租歛於民也必先計𡻕收量民積聚知饑饉有餘不足之數然後取車輿衣食供養其欲高臺層榭接屋連閣非不麗也然民無掘穴狹廬所以託身者明主弗樂不樂其大麗也肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也不甘其肥醲也匡牀蒻席非不甯匡安也蒻細也然民有處邊城犯危難澤死暴骸者明主弗安也不安其匡牀蒻席也故古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不被裘與同寒飢𡻕登民豐乃始縣鍾鼓陳干戚登成也年穀豐熟也君臣上下同心而樂之國無哀人言皆樂也故古之爲金石管絃者所以宣樂也金鍾石磬管簫也絃琴瑟兵革斧鉞者所以飾怒也觴酌俎豆酬酢之禮所以效善也效致衰絰管履辟踊哭泣所以諭哀也諭明此皆有充於內而成像於外充實及至亂主取民則不裁其力裁度求於下則不量其積男女不得事耕織之業以供上之求事治業事力勤財匱君臣相疾也故民至於焦脣沸肝有今無儲有今日之食而無明日之儲也而乃始撞大鍾擊鳴鼓吹竽笙彈琴瑟是猶貫甲冑而入宗廟被羅紈而從軍旅失樂之所由生矣夫民之爲生也一人跖耒而耕不過十畝跖蹈中田之獲卒𡻕之收不過畝四石妻子老弱仰而食之時有涔旱災害之患涔久而水潦也有以給上之徵賦車馬兵革之費由此觀之則人之生閔矣闕憂無樂夫天地之大計三年耕而餘一年之食率九年而有三年之畜十八年而有六年之積積委也二十七年而有九年之儲雖涔旱災害之殃民莫因窮流亡也故國無九年之畜謂之不足無六年之積謂之閔急閔憂病急無三年之畜謂之窮乏故有仁君明主其取下有節自養有度則得承受於天地而不離飢寒之患矣若得貪主暴君撓於其下侵漁其民以適無窮之欲則百姓無以被天和而履地德矣天和氣也地德所生植也食者民之本也民者國之本也國者君之本也是故人君者上因天時下盡地財中用人力是以羣生遂長五穀蕃植教民養育六畜以時種樹務脩田疇滋植桑麻肥墝高下各因其宜邱陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏有核曰果無核曰蓏秋畜疏食菜疏曰疏穀食曰食冬伐薪蒸大者曰薪小者曰蒸以爲民資資用是故生無乏用死無轉尸轉棄故先王之法畋不掩羣掩猶盡也不取麛夭鹿子曰麛麛子曰夭不蒸澤而漁涸澤漉池不焚林而獵爲盡物也豺未祭獸罝罦不得布於野十月之時豺殺獸四面陳之世謂之祭獸也未祭獸罝罦不得施也獺未祭魚網罟不得入於水獺獱也明堂月令孟春之月獺祭魚獺取鯉四面陳之水邊世謂之祭魚未祭不得捕也鷹隼未摯羅網不得張於谿谷立秋鷹摯矣未立秋不得施下鷹或作雋草木未落斤斧不得入山林九月草木節解未解不得伐山林也昆蟲未蟄不得以火燒田十月蟄蟲備藏未蟄不得用燒田也孕育不得殺𪅏卵不得探魚不長尺不得取彘不期年不得食皆爲盡物是故草木之發若蒸氣發生禽獸歸之若流原飛鳥歸之若煙雲有所以致之也故先王之政四海之雲至而脩封疆立春之後四海出雲蝦蟇鳴燕降而達路除道三月之時陰降百泉則脩橋梁十月之時昏張中則務種穀三月昏張星中於南方張南方朱鳥之宿也大火中則種黍菽大火東方倉龍之宿四月建巳中在南方菽豆也虛中則種宿夌盧北方玄武之宿八月建酉中於南方也昴中則收歛畜積伐薪木昴星西方白虎也季秋之月收斂畜積也上告於天下布之民先王之所以應時脩備富國利民實曠來遠者其道備矣實滿也曠空也非能目見而足行之也欲利之也欲利之也不忘於心則官自備矣心之於九竅四支也不能一事焉然而動靜聽視皆以爲主者不忘於欲利之也故堯爲善而眾善至矣桀爲非而眾非來也善積卽功成非積則禍極極至凡人之論心欲小而志欲大智欲員而行欲方能欲多而事欲鮮所以心欲小者慮患未生備禍未發戒過愼微不敢縱其欲也詩云惟此文王小心翼翼昭事上帝聿懷多福此之謂也志欲大者兼包萬國一齊殊俗並覆百姓若合一族是非輻湊而爲之轂轂以諭王智欲員者環復轉運終始無端若順連環故曰無端旁流四達淵泉而不竭萬物並興莫不嚮應也應和行欲方者直立而不撓撓弱曲也素白而不污窮不易操通不肆志肆放能欲多者文武備具動靜中儀舉動廢置曲得其宜無所擊戾無不畢宜也擊掌也失破也事欲鮮者執柄持術得要以應眾執約以治廣處靜持中運於璇樞以一合萬若合符者也符約故心小者禁於微也志大者無不懷也多所容也知員者無不知也行方者有不爲也非正道不爲也能多者無不治也治猶作也事鮮者約所持也約要古者天子聽朝公卿正諫博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以爲未足也故堯置敢諫之鼓也欲諫者擊其鼓舜立誹謗之木書其善否於表木也湯有司直之人司直官名不曲也武王立戒愼之鞀欲戒君令愼疑者搖鞀鼓過若毫釐而旣已備之也備具也夫聖人之於善也無小而不舉舉用其於過也無微而不改改更堯舜禹湯文武王皆坦然天下而南面焉背屏而朝諸候當此之時鼛鼓而食鼛鼓王者之食樂也詩云鼓鐘伐磬奏雍而徹雍已食之樂也已飯而祭竈行不用巫祝言其卒德蹈正無求於神鬼神弗敢祟山川弗敢禍可謂至貴矣至德之可貴也然而戰戰慄慄日愼一日由此觀之則聖人之心小矣詩云惟此文王小心翼翼昭事上帝聿懷多福其斯之謂歟武王伐紂發鉅橋之粟散鹿臺之錢鉅橋紂倉名也一說鉅鹿漕運之橋栗鹿臺紂錢藏府所積也武王發散以賑疲民封比干之墓比干紂諸父也諫紂之非紂殺之故武王封崇其墓以旌仁也表商容之閭商容殷之賢人老子師故表顯其里穆稱篇又云老子業於商容見舌而知守柔矣是也朝成湯之廟成湯殷受命之王言聖人以類相宗解箕子之囚箕子紂之庶兄論語云箕子爲之奴武王伐紂赦其囚執問以洪範封之於朝鮮也使各處其宅田其田無故無新唯賢是親用非其有使非其人晏然若故有之由此觀之則聖人之志大也文王周觀得失徧覽是非堯舜所以昌桀紂所以亡者皆著於明堂著猶圖也於是略智博聞以應無方由此觀之則聖人之智員矣成康繼文武之業守明堂之制觀存亡之迹見成敗之變非道不言非聖人之意不敢言非義不行非仁義不敢履行也言不苟出行不苟爲擇善而後從事焉由此觀之則聖人之行方矣孔子之通智過於萇弘勇服於孟賁足躡郊菟力招城關能亦多矣萇弘周大夫敬王臣也號知大道孟賁勇士也孔子皆能招舉也以一手招城門關端能舉之故曰亦能多也然而勇力不聞人不聞其爲勇力也伎巧不知人不知其有伎巧者專行孝道以成素王事亦鮮矣春秋二百四十二年亡國五十二弑君三十六采善鉏醜以成王道論亦博矣然而圍於匡顏色不變絃歌不輟匡宋邑也今陳襄邑西匡亭是也孔子曰天生德於予匡人其如予何故顏色不變絃歌不止也臨死亡之地犯患難之危據義行理而志不攝分亦明矣犯猶遭攝猶懼然爲魯司寇聽獄必爲斷爲魯定公司寇作爲春秋不道鬼神不敢專己夫聖人之智固已多矣其所守者有約故舉而必榮愚人之智固已少矣其所事者多故動而必窮矣吳起張儀智不若孔墨而爭萬乘之君此其所以車裂支解也夫以正教化者易而必成以邪巧世者難而必敗凡將設行立趣於天下捨其易成者而從事難而必敗者愚惑之所致也凡此六反者不可不察也六反謂孔墨萇弘孟賁吳起張儀也其行相反故曰六反也偏知萬物而不知人道不可謂智偏愛羣生而不愛人類不可謂仁仁者愛其類也智者不可惑也仁者雖在斷割之中其所不忍之色可見也不忍智斷割之色見於顏色也智者雖煩難之事其不闇之效可見也內恕反情心之所欲其不加諸人由近知遠由己知人此人智之所合而行也小有教而大有存也小有誅而大有甯也小教之以正故大有存也少責之以義故大有甯也非正則不存非義則不甯也唯惻隱推而行之此智者之所獨斷也故仁智錯有時合合者爲正錯者爲權其義一也府吏守法君子制義法而無義亦府吏也不足以爲政耕之爲事也勞織之爲事也擾擾勞之事而民不舍者知其可以衣食也人之情不能無衣食衣食之道必始於耕織萬民之所容見也物之若耕織者始初甚勞終必利也眾愚人之所見者寡事可權者多愚之所權者少此愚者之所多患物之可備者智者盡備之可權者盡權之此智者所以寡患也故智者先忤而後合忤逆愚者始於樂而終於哀今日何爲而榮乎旦日何爲而義乎此易言也今日何爲而義旦日何爲而榮此難知也問瞽師曰白素何如曰縞然曰黑何若曰黮然援白黑而示之則不處焉人之視白黑以目言白黑以口瞽師有以言白黑無以知白黑故言白黑與人同其別白黑與人異入孝於親出忠於君無愚智賢不肖皆知其爲義也使陳忠孝行而知所出者鮮矣凡人思慮莫不先以爲可而後行之其是或非此愚知之所以異凡人之性莫貴於仁莫急於智仁以爲質知以行之兩者爲本而加之以勇力辯慧捷疾劬錄巧敏遲利聰明審察盡眾益也身材未修伎藝曲備而無仁智以爲表幹而加之以眾美則益其損故不仁而有勇力果敢則狂而操利劍狂猶亂也不智而辯慧懷給則棄驥而不式不知之人辯慧懷給不知所裁之猶棄而或不知所詣也懷佞也雖有材能其施之不當其處之不宜適足以輔僞飾非伎藝之眾不如其寡也故有野心者不可借便勢野外有愚質者不可與利器老子曰國之利器不可以假人也魚得水而游焉則樂塘決水涸則爲螻蟻所食有掌修其隄防補其缺漏則魚得而利之掌主國有以存人有以生國有人存由魚得水也國厚故人遂生也國之所以存者仁義是也人之所以生者行善是也國無義雖大必亡桀紂是也人無善志雖勇必傷論語曰勇而無禮則亂亂則傷也治國上使不得與焉使不得與亡傷之危是上術也孝於父母弟於兄嫂信於朋友不得上令而可得爲也釋己之所得爲而責於其所不得制悖矣士處卑隱欲上達必先反諸己上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽於友有道事親不說不信於友不能說親朋反不信之也說親有道修身不誠不能事親矣誠身有道心不專一不能專誠道在易而求之難易謂反己先修其本也不修其本而欲得說親誠身之名皆難也故曰道在易而求之難也驗在近而求之遠故弗得也驗效也近謂本遠謂末也故不能得之也繆稱訓繆異之論稱物假類同之神明以知所貴道至高無上至深無下平乎準直乎繩員乎規方乎矩包裹宇宙而無表裏洞同覆載而無所礙礙挂是故體道者不哀不樂不喜不怒其坐無慮其寢無夢物來而名事來而應主者國之心心治則百節皆安心擾則百節皆亂故其心治者支體相遺也其國治者君臣相忘也黃帝曰芒芒昧昧從天之道與元同氣故至德者言同略事同指上下一心無歧道旁見者遏障之於邪關道之於善而民鄉方矣故易曰同人于野利涉大川言能同人道至於野則可以濟大川大川大難也道者物之所導也德者性之所扶也仁者積恩之見證也義者比於人心而合於眾適者也故道滅而德用德衰而仁義生故尚世體道而不德中世守德而弗壞也末世繩繩乎唯恐失仁義君子非仁義無以生失仁義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失仁義小人懼失利觀其所懼知各殊矣易曰卽鹿無虞惟入於林中君子幾不如舍往吝卽就也鹿以諭民虞欺也幾終也就民欺之卽入林中幾終不如舍之使之不終如其吝也其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者古今未之有也是故聖人察其所以往則知其所以來者聖人之道猶中衢而致尊邪道六通謂之衢尊酒器也過者斟酌多少不同各得其所宜是故得一人所以得百人也一人來得其心百人來亦得其心人以其所願於上以與其下交誰弗載以其所欲於下以事其上誰弗喜詩云媚兹一人應侯愼德愼德大矣一人小矣能善小斯能善大矣君子見過忘罰故能諫見賢忘賤故能讓見不足忘貧故能施情繫於中行形於外凡行戴情雖過無怨不戴其情雖忠來惡戴心所感也情誠也后稷廣利天下猶不自矜禹無廢功無蔽財自視猶觖如也觖不滿也滿如陷陷少實如虛盡之者也凡人各賢其所說而說其所快世莫不舉賢或以治或以亂非自遁遁欺求同乎己者也己未必得賢而求與己同者而欲得賢亦不幾矣使堯度舜則可使桀度堯是猶以升量石也今謂狐狸則必不知狐又不知狸俱不知此二獸非未嘗見狐者必未嘗見狸也狐狸非異同類也而謂狐狸則不知狐狸是故謂不肖者賢則必不知賢謂賢者不肖則必不知不肖者矣聖人在上則民樂其治在下則民慕其意小人在上位如寢關曝纊寢謂臥關上之不安纊繭也曝蠒踴動搖不休死乃止也不得須臾甯故易曰乘馬班如泣血連如諭乘馬班如難也故有泣血之憂言小人處非其位不可長也物莫無所不用天雄烏喙藥之凶毒也良醫以活人侏儒瞽師人之困慰者也慰者蹶也一曰慰極人主以備樂是故聖人制其剟材無所不用矣剟疏殺也勇士一呼三軍皆辟其出之也誠故倡而不和意而不戴意患聲也戴嗟中心必有不合者也故舜不降席而王天下者求諸己也故上多故則民多詐矣身曲而景直者未之聞也說之所不至者容貌至焉說之粗不如容貌精微入人深也容貌之所不至者感忽至焉感乎心明乎智發而成形精之至也可以形勢接而不可以照誌戎翟之馬皆可以馳驅或近或遠唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美必有不傳者心教之微眇不可傳中行繆伯手搏虎中行繆伯晉臣也力能搏生虎也而不能生也力能殺虎而德不能服之蓋力優而克不能及也克猶能也用百人之所能則得百人之力舉千人之所愛則得千人之心辟若伐樹而引其本千枝萬葉則莫得弗從也慈父之愛子非爲報也不可內解於心聖王之養民非求用也性不能已若火之自熱冰之自寒夫有何脩焉及恃其力賴其功者若失火舟中言舟中之人同心救火不相爲賜故君子見始斯知終矣媒妁譽人而莫之德也取庸而强飯之莫之愛也雖親父慈母不加於此有以爲則恩不接矣故送往者非所以迎來也施死者非專爲生也誠出於己則所動者遠矣錦繡登廟貴文也登猶入也圭璋在前尚質也以玉祭之者質也文不勝質之謂君子故終年爲車無三寸之鎋不可以驅馳匠人斵戸無一尺之楗不可以閉藏故君子可斯乎其所結結要終也心之精者可以神化而不可以導人導教目之精者可以消澤而不可以昭誋昭遁誋誠也不可以教導戒人在混冥之中不可諭於人混冥人心中也故舜不降席而天下治桀不下陛而天下亂蓋情甚乎叫呼也言雖叫呼大語不如心行眞直也無諸己求諸人古今未之聞也同言而民信信在言前也同令而民化誠在令外也聖人在上民遷而化情以先之也動於上不應於下者情與令殊也故易曰亢龍有悔仁君動極在上故有悔也三月嬰兒未知利害也而慈母之愛諭焉者情也故言之用者昭昭乎小哉不言之用者曠曠乎大哉身君子之言信也身君子之言體行君子之言也中君子之意忠也忠信形於內感動應於外故禹執干戚舞於兩階之間而三苗服三苗畔禹禹風以禮樂而服之也鷹翔川魚鼈沉禹以德服三苗猶鷹翔川上魚鼈恐皆潛飛鳥揚鳥見鷹而揚去必遠害也鷹懷欲害之心故鳥魚知其情實故遠之子之死父也臣之死君也世有行之者矣非出死以要名也恩心之藏於中而不能違其難也故人之甘甘非正爲蹠也人之甘甘猶樂樂而爲之臣之死君子之死父非以求蹠蹠也而蹠焉往言蹠乃往至也君子之慘怛非正爲僞形也諭乎人心非從外入自中出者也義尊乎君仁親乎父故君之於臣也能死生之不能使爲苟蕳易君不能使臣爲苟合易行之義父之於子也能發起之不能使無憂尋憂尋憂長也仁念也仁念父母不樂子之如此然不能止故義勝君仁勝父則君尊而臣忠父慈而子孝聖人在上化育如神太上曰我其性與太上皇德之君也我性自然也其次曰微彼其如此乎其次五帝時也其民如此故我治之如彼故詩曰執轡如組易曰含章可貞動於近成文於遠夫察所夜行周公慙乎景故君子愼其獨也釋近斯遠塞矣聞善易以正身難夫子見禾之三變也夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐鄉邱而死我其首禾乎禾穗垂而向根君子不忘本也故君子見善則痛其身焉痛己身善惡自在也身苟正懷遠易矣懷來故詩曰弗躬弗親庶民弗信小人之從事也曰苟得君子曰苟義所求者同所期者異乎擊舟水中魚沉而鳥揚同聞而殊事其情一也僖負羈以壺飱表其閭釐負羈曹臣晉重耳出遇曹負羈遺以壺飱重耳反晉伐曹令兵不入其閭趙宣孟以束脯免其軀趙宣孟晉卿以束脯活靈輒後免其難也禮不隆隆多也而德有餘仁心之感恩接而憯怛生故其入人深俱之叫呼也在家老則爲恩厚其在債人則生爭鬪故曰兵莫憯於意志莫邪爲下冠莫大於陰陽抱鼓爲小聖人爲害非以求名而名從之名不與利期而利歸之故人之憂喜非爲蹗蹗焉往生也言非爲冀幸往生利意也故至至不容至道之人不飾容也故若眯而撫眯芥入目也撫捫之從中發非爲觀容之也若跌而據跌仆聖人之爲治漠然不見賢焉終而後知其可大也若日之行日行人不見也騏驥不能與之爭遠今夫夜有求與瞽師併東方開斯照矣言人見照用瞽者猶闇而無爲人而以治事用思也動而有益則損隨之益所以爲損也故易曰剝之不可遂盡也故受之以復言物剝落而復生也積薄爲厚積卑爲高故君子曰孳孳以成煇小人曰快快以至辱其消息也離珠弗能見也文王聞善如不及宿不善如不祥非爲日不足也其憂尋推之也憂導憂深故詩曰周雖舊邦其命維新新國者也懷情抱質天弗能殺地弗能薶也聲揚天地之間配日月之光甘樂之者也荀鄉善雖過無怨苟不鄉善雖忠來患故怨人不如自怨求諸人不如求諸己得也聲自召也貌自示也名自命也文自官也無非己者操銳以刺操刃以擊自召也貌何自怨乎人故筦子文錦也雖醜登廟筦仲相齊明法度審國刑不能及聖猶文綿雖惡宜以升廟也子產練染也美而不尊子產相鄭先恩而後法猶練染爲衣温辱而非宗廟服也虛而能滿淡而有味被褐懷玉者故兩心不可以得一人一心可以得百人男子樹蘭美而不芳蘭芳草艾之美芳也男子樹之蓋不芳繼子得食肥而不澤繼子有假母也情不相與往來也生所假也故弘演直仁而立死弘演衛懿公臣狄人攻衛食懿公其肝在弘演剖腹以盛之也王子閭張掖而受刃楚白公欲立王子閭爲王不可刺之以兵子閭不受不以所託害所歸也故世治則以義衛身世亂則以身衛義死之日行之終也故君子愼一用之無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂棘之璧而不知虢禍之及己也故至至之人不可遏奪也言至道之人其心先定不可臨以利奪其志也人之欲榮也以爲己也於彼何益聖人之行義也其憂尋出乎中也於己何以利故帝王者多矣而三王獨稱貧賤者多矣而伯夷獨舉以貴爲聖乎則聖者眾矣以賤爲仁乎則賤者多矣何聖人之寡也獨專之意樂哉忽乎曰滔滔以自新忘老之及己也始乎叔季歸乎伯孟必此積也言自少而至長不身遁斯亦不遁人遁隱也己不自隱身之行亦不隱之於人故也故若行獨梁不爲無人不競其容獨梁一木之水橋也行其上常兢兢恐陷也故使人信己者易而蒙衣自信者難及身不信故難情先動言人君以精動導民也動无不得動盡得人心也無不得則無莙發無莙結發動也莙而後快雖莙結快民心故唐虞之舉錯也非以偕情也快己而天下治桀紂非正賊之也快己而百事廢喜憎議而治亂分矣下有喜議而國治有憎議而國亂也聖人之行無所合無所離譬若鼓無所與調無所不比絲筦金石小大脩短有叙異聲而和君臣上下官職有差殊事而調夫織者日以進織帛者進耕者日以卻耕謂耕者卻行事相反成功一也申喜聞乞人之歌而悲出而視之其母也申喜亡其母母乞食於道艾陵之戰也夫差曰夷聲陽句吳其庶乎艾陵之戰吳王夫差與齊戰於艾陵也夷謂吳陽告也句吳夷語不正言吳加以句也庶幾也同是聲而取信焉異有諸情也故心哀而歌不樂心樂而哭不哀夫子曰絃則是也其聲非也閔子騫三年之喪畢援琴而彈其絃是也其聲切切而哀文者所以接物也情繫於中而欲發外者也以文滅情則失情以情滅文則失文文情理通則鳳麟極矣言至德之懷遠也輸子陽謂其子曰良工漸乎矩鑿之中漸習矩鑿之中固無物而不周聖王以治民造父以治馬醫駱以治病醫駱越醫同材自取焉自從也矩鑿之中各取法度或以治民或以治馬或以治病同材而各往從取治法之也上意而民載誠中者也上有意而未言則民皆載而行之志或發中之於大未言而信弗召而至或先之也忣於不己知者不自知也忣急矜怛生於不足怛驕也不足知不足也華誣生於矜矜貪功也誠中之人樂而不忣如鴞好聲忠信之人自樂爲之非忣忣也如鴞自好爲聲耳熊之好經經動導引夫有誰爲矜各任自性非徒矜也春女思秋士悲春女感陽則思秋士見陰而悲而知物化矣號而哭嘰而哀知聲動矣容貌顏色理詘𠈐倨佝知情僞矣故聖人栗栗乎其內而至乎至極矣功名遂成天也循理受順人也太公望周公旦天非爲武王造之也崇侯惡來天非爲紂生之也崇侯紂時諸侯也惡來紂之臣秦之先也有其世有其人也教本乎君子小人被其澤利本乎小人君子享其功昔東戸季子之世東戸季子古之人君道路不拾遺耒耜餘糧宿諸畮首使君子小人各得其宜也故一人有慶兆民賴之凡高者貴其左天道左旋故下之於上曰左之臣辭也臣道左君下者貴其右故上之於下曰右之君讓也君謙讓佑助臣故上左遷則失其所尊也左臣辭也君以再還故失其尊也臣右還則失其所貴矣右君辭也而臣以再還故失其貴也小快害道斯𩓣害儀斯𩓣近也子產騰辭騰傳也子產作刑書人有傳詞詰之獄繫而無邪䇓多也獄雖益多而下無邪也失諸情者則塞於辭矣失事之情則爲世人辭所窮塞也成國之道工無僞事農無遺力士無隱行官無失法譬若設網者引其網而萬目開矣舜禹不再受命受命於人不受於天堯舜傳大焉先形乎小也形見也先見微小以知大刑於寡妻至於兄弟禪於家國而天下從風禪傳也言堯舜禹相傳天下服之也故戎兵以大知小若湯武以義伐不義從大伐小人以小知大人謂天下從風者也堯舜之民以小知堯大也君子之道近而不可以至卑而不可以登無載焉而不勝萬物載之皆勝其任大而章遠而隆知此之道不可求於人斯得諸己也釋己而求諸人去之遠矣君子者樂有餘而名不足小人樂不足而名有餘觀於有餘不足之相去昭然遠矣含而弗吐在情而不萌者未之聞也言懷其情而必萌見也君子思義而不慮利小人貪利而不顧義子曰鈞之哭也子孔子鈞等也曰子予奈何兮乘我何其哀則同其所以哀則異故哀樂之襲人情也深矣鑿地漂池人或有鑿穿或有填也言用心異也非止以勞苦民也各從其蹠蹠願也而亂生焉其載情一也施人則異矣施於人有善惡故唐虞日孳孳以致於王桀紂日快快以致於死不知後世之譏己也凡人情說其所苦卽樂失其所樂則哀故知生之樂必知死之哀有義者不可欺以利有勇者不可劫以懼如飢渴者不可欺以虛器也人多欲虧義欲則貪貪損義多憂害智貪憂閉塞故害智也多懼害勇嫚生乎小人嫚倨小人行也蠻夷皆能之嫚蠻夷之行也善生乎君子誘然與日月爭光誘美稱也天下弗能遏奪故治國樂其所以存亡國亦樂其所以亡也金錫不消釋則不流刑刑法上憂尋不誠則不法民憂尋不在民則是絶民之繫也繫所以拘維民君反本而民繫固也至德小節備大節舉齊桓舉而不密齊桓有大節小節疏也晉文密而不舉晉文有小節大節廢也晉文得之乎閨內失之乎境外閨內脩而境外亂也齊桓失之乎閨內而得之本朝閨內亂而朝廷治也水下流而廣大君下臣而聰明君不與臣爭功而治道通矣管夷吾百里奚經而成之百里奚虞人秦相也齊桓秦穆受而聽之聽用二臣之謀照惑者以東爲西惑也照曉見日而寤矣衛武侯謂其臣曰小子無謂我老武侯蓋年九十五矣而羸我羸劣有過必謁之是武侯如弗羸之必得羸故老而弗舍通乎存亡之論者也人無能作也有能爲也有能爲也而無能成也人之爲天成之終身爲善非天不行終身爲不善非天不亡故善否我也禍福非我也非我也天所爲故君子順其在己者而已矣性者所受於天也命者所遭於時也有其材不遇其世天也太公何力比干何罪循性而行指或害或利求之有道得之在命故君子能爲善而不能必其得福不忍爲非而未能必免其禍君根本也臣枝葉也根本不美枝葉茂者未之聞也有道之世以人與國若堯以天下與舜也無道之世以國與人堯王天下而憂不解授舜而憂釋憂而守之而樂與賢終不私其利矣凡萬物有所施之無小不可爲無所用之不知其所用也碧瑜糞土也瑜玉也不知用之則爲糞土也人之情於害之中爭取小焉於利之中爭取大焉故同味而嗜厚膊者厚膊厚切肉也必其甘之者也同師而超羣者必其樂之者也弗甘弗樂而能爲表者未之聞也表立見也君子時則進得之以義何幸之有不時則退讓之以義何不幸之有故伯夷餓死首山之下伯夷孤竹君之子讓國與弟不食周粟故餓也猶不自悔棄其所賤得其所貴也善求人而得也福之萌也綿綿禍之生也分分福禍之始萌微故民嫚之唯聖人見其始而知其終故傳曰魯酒薄而邯鄲圍魯與趙俱朝楚獻酒於楚魯酒薄而趙酒厚楚之主酒吏求酒於趙不與楚吏恐以趙所獻酒於楚王易魯薄酒楚王以爲趙酒薄而圍邯鄲一曰趙魯獻酒於周也事見莊子羊羹不斟而宋國危宋將華元與鄭戰殺羊食士不及其御及戰御馳馬入鄭軍華元以獲也明主之賞罰非以爲己也以爲國也通於己而無功於國者不施賞焉逆於己便於國者不加罰焉故楚莊謂共雍共雍楚臣曰有德者受吾爵祿有功者受吾田宅是二者女無一焉吾無以與女可謂不踰於理乎踰越其謝之也猶未之莫與謝謂遣共雍也莫勉之也周政至至於道也殷政善善施教未至於道也夏政行行尚粗也行政善善未必至也至至之人不慕乎行不慙乎善含德履道而上下相樂也不知其所由然有國者多矣而齊桓晉文獨名泰山之上有七十壇焉封乎太山蓋七十二君也而三王獨道君不求諸臣臣不假之君修近彌遠而後世稱其大不越鄰而成章而莫能至焉故孝己之禮可爲也孝己殷王高宗之子也蓋放逐而不失禮而莫能奪之名也必不得其所懷也不能與孝己爭名者不得孝己之所懷也義載乎宜之謂君子宜遺乎義之謂小人通智得勞而不勞通智達道之人其次勞而不病其下病而不勞古人味而弗貪也古人知其味而不貪其食今人貪而弗味孔子魯人之學也飮之而已貞之能味也歌之脩其音也此言樂所以移風易俗歌長其音音之不足於其美者也此音不足以致美化也金石絲竹助而奏之猶未足以至於極也極洽化之至也人能尊道行義喜怒取予如此卽其化民逾於樂也欲如草之從風草上之風必偃召公以桑蠶耕種之時死獄出拘召公周太保也使百姓皆得反業脩職文王辭千里之地而請去炮烙之刑紂拘文王文王獻寶於紂紂賞以千里之地文王不受願去炮烙之刑故聖人之舉事也進退不失時若夏就絺紘上車授緌之謂也老子學商容見舌而知守柔矣商容神人也商容吐舌示老子老子知舌柔齒剛列子學壺子觀景柱而知持後矣先有形而後有影形可亡而影不可傷故聖人不爲物先而常制之其類若積薪樵後者在上人以義愛以黨羣以羣强是故德之所施者博則威之所行者遠義之所加者淺則武之制者小矣鐸以聲自毁鐸大鈴出於吳也膏燭以明自鑠虎豹之文來射猨狖之捷來措措刺也故子路以勇死死衛侯輒之難萇弘以智困欲以術輔周周人殺之能以智智而未能以智不智也故行險者不得履繩出林者不得直道夜行瞑目而前其手事有所至而明有不害人能貫冥冥入於昭昭可與言至矣鵲巢知風之所起𡻕多風則鵲作巢卑獺穴知水之高下水之所及則獺避而爲穴也暉日知晏暉日鳩鳥也晏无雲也天將晏靜暉日先鳴也陰諧知雨陰諧暉日雌也天將陰雨則鳴爲是謂人智不如鳥獸則不然故通於一伎察於一辭可與曲說未可與廣應也甯戚擊牛角而歌桓公舉以大政雍門子以哭見孟嘗君涕流沾纓歌哭眾人之所能爲也一發聲入人耳感人心情之至者也故唐虞之法可效也其諭人心不可及也簡公以濡殺簡公齊君也以柔濡田成子殺之也子陽以猛劫子陽鄭相也尚刑而劫死皆不得其道者也故歌而不比於律者其清濁一也雖清濁失和故不中律全繩之外與繩之內皆失直者也紂爲象箸而箕子嘰嘰唬也知象箸必有玉杯爲杯必極滋味魯以偶人葬而孔子嘆偶人桐人也嘆其象人而用之見所始則知所終故水出於山入於海稼生乎野而藏乎倉聖人見其所生則知其所歸矣水濁者魚噞令苛者民亂城峭者必崩岸崝者必陀崝峭也陀落也故商鞅立法而支解商鞅爲秦孝公立治法百姓怨之以罪支解吳起刻削而車裂吳起相楚設貴臣相坐之法卒車裂也治國辟若張瑟大絃組組急也則小絃絶矣故急轡數策者非千里之御也有聲之聲不過百里無聲之聲施於四海是故祿過其功者損名過其實者蔽情行合而名副之禍福不虛至矣身有醜夢不勝正行國有妖祥不勝善政是故前有軒冕之賞不可以無功取也後有斧鉞之禁不可以無罪蒙也素脩正者弗離道也君子不謂小善不足爲也而舍之小善積而爲大善不爲小不善爲無傷也而爲之小不善積而爲大不善是故積羽沉舟羣輕折軸故君子禁於微壹快不足以成善積快而爲德壹恨不足以成非積恨而成怨故三代之善千𡻕之積譽也桀紂之謗千𡻕之積毁也天有四時人有四用何謂四用視而形之莫明於目聽而精之莫聰於耳重而閉之莫固於口舍而藏之莫深於心目見其形耳聽其聲口言其誠而心致之精則萬物之化咸有極矣地以德廣人君以德廣益其土地也君以德尊上也地以義廣君以義尊次也地以强廣君以强尊之下也故粹者王駮者霸無一焉者亡昔二鳳凰至於庭三代至乎門室至乎澤德彌麁所至彌遠德彌精所至彌近君子誠仁於施亦仁不施亦仁道无爲而民蒙純此所謂不施而仁小人誠不仁施亦不仁不施亦不仁善之由我與其由人若仁德之盛者也故情勝欲者昌欲勝情者亡欲知天道察其數謂律厯之數也欲知地道物其樹五土之宜各有所種生之欲知人道從其欲君子欲於道小人欲於利勿驚勿駭萬物將自理勿撓勿櫻櫻纓萬物將自清言治天下各順其情察一曲者不可與言化一曲一事也審一時者不可與言大猶蟬不知寒也日不知夜月不知晝日月爲明而弗能兼也唯天地能函之能包天地曰唯無形者也驕溢之君無忠臣口慧之人無必信交拱之木無把之枝拱抱也把握也尋常之溝無吞舟之魚根淺則末短本傷則枝枯福生於無爲患生於多慾害生於弗備穢生於弗䅶聖人爲善若恐不及備禍若恐不免蒙塵而欲毋昧涉水而欲毋濡不可得也是故知己者不怨人知命者不怨天福由己發禍由己生聖人不求譽不辟誹正身直行眾邪自息今釋正而追曲倍是而從眾是與俗儷走而內行無繩繩所以彈曲也故聖人反己而弗由也道之有篇章形埒者形埒兆朕非至者也嘗之而無味視之而無形不可傳於人大戟去水亭厯愈張用之不節乃反爲病物多類之而非唯聖人知其微善御者不忘其馬善射者不忘其弩善爲人上者不忘其下誠能愛而利之天下可從也弗愛弗利親子叛父天下有至貴而非勢位也有至富而非金玉也有至壽而非千𡻕也原心反性則貴矣適情知足則富矣明死生之分則壽矣言無常是行無常宜者小人也察於一事通於一伎者中人也兼覆蓋而并有之度伎能而裁使之者聖人也裁制也度其伎能而裁制使之齊俗訓齊一也四宇之風世之眾理皆混其俗令爲一道也率性而行謂之道得其天性謂之德性失然後貴仁道失然後貴義是故仁義立而道德遷矣禮樂飾則純樸散矣是非形則百姓眩矣珠玉尊則天下爭矣凡此四者衰世之造也末世之用也夫禮者所以別尊卑異貴賤義者所以合君臣父子兄弟夫妻朋友之際也今世之爲禮者恭敬而忮忮害也音寘爲義者布施而德君臣以相非骨肉以生怨則失禮義之本也故搆而多責搆謂以權相交權盡而交疏搆搆然也夫水積則生相食之魚土積則生自穴之獸禮義飾則生僞匿之本夫吹灰而欲無眯涉水而欲無濡不可得也古者民童蒙不知東西貌不羨乎情而言不溢乎行其衣致煖而無文其兵戈銖而無刃楚人謂刃頓爲銖其歌樂而無轉其哭哀而無聲鑿井而飲耕田而食無所施其美亦不求得親戚不相毁譽朋友不相怨德及至禮義之生貨財之貴而詐僞萌興非譽相紛怨德並行於是乃有曾參孝己之美而生盜跖莊蹻之邪故有大路龍旂羽蓋垂緌大路天子車也龍旂龍旗結駟連騎則必有穿窬拊揵抽箕踰備之姦抽握也備後垣有詭文繁繡弱緆羅紈弱緆細布也羅穀紈素也必有菅屩跐音此踦短褐不完者菅茅也跐偶也踦適也楚人謂袍爲短褐大布故高下之相傾也短脩之相形也亦明矣夫蝦蟇爲鶉鶉鸙也水蠆爲𧐟莣青蛉也音予音務皆生非其類唯聖人知其化其化視陰入陽從陽入陰夫胡人見黂黂麻子也不知其可以爲布也越人見毳不知其可以爲旃也故不通於物者難與言化昔太公望周公旦受封而相見太公望問周公曰何以治魯周公曰尊尊親親太公曰魯從此弱矣尊尊親親仁者弱也周公問太公曰何以治齊太公曰舉賢而上功周公曰後世必有劫殺之君舉賢上功則民競故劫殺其後齊日以大至於霸二十四世而田氏代之齊臣田氏奪其君位而代魯日以削至三十二世而亡魯祿去公室至楚考烈王滅之故易曰履霜堅冰至聖人之見終始微言故糟邱生乎象𣛰紂爲長夜之飲積糟成邱者起於象𣛰炮烙生乎熱升庖人進羹於紂熱以爲惡以熱升殺之趙國升可以殺人故起炮烙子路撜溺而受牛謝撜舉也升出溺人主謝以牛也孔子曰魯國必好救人於患子贛贖人而不受金於府魯國之法贖人於他國者受金於府孔子曰魯國不復贖人矣子路受而勸德子贛讓而止善孔子之明以小知大以近知遠通於論者也由此觀之廉有所在而不可公行也故行齊於俗可隨也事周於能易爲也矜僞以惑世伉行以違眾聖人不以爲民俗廣厦闊屋連闥通房人之所安也鳥入之而憂高山險阻深林叢薄虎豹之所樂也人入之而畏川谷通原積水重泉黿鼉之所便也人入之而死咸池承雲皆黃帝樂九韶舜樂六英帝顓頊樂人之所樂也鳥獸聞之而驚深谿峭岸峻木尋枝猨狖之所樂也人上之而慄形殊性詭所以爲樂者乃所以爲哀所以爲安者乃所以爲危也乃至天地之所覆載日月之所照誋音告使各便其性安其居處其宜爲其能故愚者有所脩智者有所不足柱不可以樀齒筐不可以持屋筐小簪也馬不可以服重牛不可以追速鈆不可以爲刀銅不可以爲弩鐵不可以爲舟木不可以爲釜各用之於其所適施之於其所宜卽萬物一齊而無由相過夫明鏡便於照形其於以函食不如簞犠牛粹毛宜於廟牲其於以致雨不若黑蜧黑蜧神蛇也潛於神淵蓋能興雲雨由此觀之物無貴賤因其所貴而貴之物無不貴也因其所賤而賤之物無不賤也夫玉璞不猒厚角䚩魚沼反不猒薄角䚩刀劍羽間之覆角也漆不猒黑粉不猒白此四者相反也所急則均其用一也今之裘與蓑孰急見雨則裘不用升堂則蓑不御此代爲常者也譬若舟車楯肆窮廬故有所宜也水固宜舟陸地宜車沙地宜肆泥地宜楯草野宜窮廬故老子曰不上賢者言不致魚於木沉鳥於淵物各因其宜故不須用賢也故堯之治天下也舜爲司徒契爲司馬禹爲司空后稷爲大田師奚仲爲工其導萬民也水處者漁山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤臯織岡陵阪耕田得以所有易所無以所工易所拙是故離叛者寡而聽從者眾譬若播棋丸於地員者走澤方者處高各從其所安夫有何上下焉若風之遇簫簫籟忽然感之各以清濁應矣夫猨狖得茂木不舍而穴狟狢得埵防弗去而緣狟狟豚也埵水埒也防隄物莫避其所利而就其所害是故鄰國相望雞狗之音相聞而足迹不接諸侯之境車軌不結千里之外者皆各得其所安故亂國若盛治國若虛亡國若不足存國若有餘虛者非無人也皆守其職也盛者非多人也皆徼於末也有餘者非多財也欲節事寡也不足者非無貨也民躁而費多也故先王之法籍非所作也其所因也其禁誅非所爲也其所守也凡以物治物者不以物以睦治睦者不以睦以人治人者不以人以君治君者不於君以欲治欲者不於欲以性治性者不於性以德治德者不以德以道原人之性蕪濊而不得清明者物或堁之也堁紛塵也羌氐僰翟嬰兒生皆同聲羌東夷氐南夷僰西夷也翟北胡也及其長也雖重象狄騠象狄騠驛也象傳狄騠之語也不能通其言教俗殊也今今三月嬰兒生而徙國則不能知其故俗由此觀之衣服禮俗者非人之性也所受於外也夫竹之性浮殘以爲牒束而投之水則沉失其體也金之性沉託之於舟上則浮勢有所枝也夫素之質白染之以涅則黑縑之性黃染之以丹則赤人之性無邪久湛於俗則易易而忘本合於若性若性合於他性自若本性故日月欲明浮雲蓋之河水欲清沙石濊之人性欲平嗜欲害之惟聖人能遺物而反己夫乘舟而惑者不知東西見斗極則寤矣夫性亦人之斗極也以有自見也則不失物之情無以自見則動而惑營譬若隴西之遊愈躁愈沉孔子謂顏回曰吾服汝也忘孔子謙自謂無知而服回此忘行也而汝服於我也亦忘雖然汝雖忘乎吾猶有不忘者存孔子知其本也夫縱欲而失性動未嘗正也以治身則危以治國則亂以入軍則破是故不聞道者無以反性故古之聖王能得諸已故令行禁止名傳後世德施四海是故凡將舉事必先平意神清意平物乃可正若璽之抑埴璽印也埴泥也正與之正印正而封正也傾與之傾故堯之舉舜也決之於目桓公之取寗戚也斷之於耳而已矣爲是釋術數而任耳目其亂必甚矣夫耳目之可以斷也反情性也聽失於誹譽而目淫於采色而欲得事正則難矣夫載哀者聞歌聲而泣載樂者見哭者而笑哀可樂者笑可哀者載使然也是故貴虛虛者心無所載於哀樂也故水擊則波興氣亂則智昏智昏不可以爲政波水不可以爲平故聖王執一而勿失萬物之情旣矣四夷九州服矣夫一者至貴無適於天下聖人記於無適故民命繫矣爲仁者必以哀樂論之爲義者必以取予明之目所見不過十里而欲遍照海內之民哀樂弗能給也無天下之委財而欲遍贍萬民利不能足也且喜怒哀樂有感而自然者也故哭之發於口涕之出於目此皆憤於中而形於外者也譬若水之下流煙之上尋也夫有孰推之者故强哭者雖病不哀强親者雖笑不和情發於中而聲應於外故釐負羈之壺餐愈於晉獻公之垂棘獻公以垂棘滅虞虢趙宣孟之束脯賢於智伯之大鐘智伯以大鐘滅仇由故禮豐不足以效愛而誠心可以懷遠故公西華之養親也若與朋友處公西華孔子弟子也與朋友處睦而少敬曾參之養親也若事嚴主烈君烈酷也曾子事親其敬多其於養一也故胡人彈骨胡人之盟約置酒人頭中飲以相詛越人契臂刻臂出血中國歃血也殺牲歃血相與爲信所由各異其於信一也三苗髽首三苗之國在彭蠡洞庭之野髮以枲束髮也羌人括領括結中國冠笄笄簪越人劗髮劗斷其於服一也帝顓頊之法婦人不辟男子於路者拂之於四達之衢拂仿今之國都男女切踦踦足肩摩於道其於俗一也故四夷之禮不同皆尊其主而愛其親敬其兄獫狁之俗相反獫狁北胡也其俗物與中國相反也皆慈其子而嚴其上夫鳥飛成行獸處成羣有孰教之故魯國服儒者之禮行孔子之術地削名卑不能親近來遠越王句踐劗髮文身無皮弁搢笏之服皮弁以爲爵冠也搢佩紟笏佩玉也長三尺抒上終葵首拘罷拒折之容拘罷園也拒折方也然而勝夫差於五湖南面而霸天下泗上十二諸侯皆率九夷以朝胡貉匈奴之國縱體拖髮拖縱也箕倨反言而國不亡者未必無禮也楚莊王裾衣博袍裾襄也衣裾令行乎天下遂霸諸侯晉文君大布之衣大布粗布䍧羊之裘韋以帶劍威立於海內豈必鄒魯之禮之謂禮乎鄒孟軻邑魯孔子邑是故入其國者從其俗入其家者避其諱不犯禁而入不迕逆而進雖之夷狄徒倮之國徒倮不衣結軌乎遠方之外而無所困矣禮者實之文也仁者恩之效也故禮因人情而爲之節文而仁發恲以見容恲色也禮不過實仁不溢恩也治世之道也夫三年之喪是强人所不及也而以僞輔情也三月之服是絶哀而迫切之性也三月之服夏后氏禮夫儒墨不原人情之終始而務以行相反之制五縗之服五縗謂三年暮九月五月三月服也悲哀抱於情葬薶稱於養不强人之所不能爲不絶人之所能已度量不失於適誹譽無所由生古者非不知繁升降槃還之禮也蹀采齊肆夏之容也采齊肆夏皆樂名也以爲曠日煩民而無所用故制禮足以佐實喻意而已矣古者非不能陳鐘鼓盛筦簫揚干戚奮羽旄以爲費財亂政制樂足以合歡宣意而已喜不羨於音非不能竭國麋民虛府殫財含珠鱗施綸組節束鱗施王田也綸絮也束縛也追送死也以爲窮民絶業而無益於槁骨腐肉也故葬薶足以收歛蓋藏而已昔舜葬蒼梧市不變其肆舜南巡狩死蒼梧葬泠道九嶷山不煩於市有所廢禹葬會稽之山農不易其畝禹會羣臣於會稽墓山陰之陽不煩農人之田畝明乎死生之分通乎侈儉之適者也亂國則不然言與行相悖情與貌相反禮飾以煩樂優以淫崇死以害生久喪以招行是以風俗濁於世而誹譽萌於朝是故聖人廢而不用也義者循理而行宜也禮者體情制文者也義者宜也禮者體也昔有扈氏爲義而亡有扈夏啓之庶兄也以堯舜舉賢禹獨與子故伐啓啓亡之知義而不知宜也魯治禮而削知禮而不知體也有虞氏之祀其社用土封土爲社祀中霤葬成畝田畝而葬其樂咸池承雲九韶舜兼用黃帝樂九韶舜所作也其服尚黃舜土德也故尚黃夏后氏其社用松所樹之木皆所生地之所宜也祝尸春祭先尸夏木德也葬墻置翣翣棺衣飾也其樂夏籥九成六佾六列六英九成變也六列六六爲行列也六英禹兼用顓頊之樂也其服尚青木德故尚青也殷人之禮其社用石以石爲社主也祀門秋祭先門殷金德也葬樹松其樂大護晨露大護晨露湯所作樂其服尚白金德故尚白也周人之禮其社用栗祀竈夏祭先竈周火德也鄒子曰吾德之次從此不勝故虞土夏木殷金周火葬樹栢其樂大武三象棘下三象棘下武象樂也其服尚赤火德故尚赤也禮樂相詭服制相反然而皆不失親疏之恩上下之倫今握一君之法籍以非傳代之俗譬由膠柱而調琴也故明主制禮義而爲衣分節行而爲帶衣足覆形從典墳虛循撓便身體適行步不務於奇麗之容隅眥之削帶足以結紐收衽束牢連固不亟於爲文句疏短之鞵故制禮義行至德而不拘於儒墨所謂明者非謂其見彼也自見而已所謂聰者非謂聞彼也自聞而已所謂達者非謂知彼也自知而已是故身者道之所託身德則道得矣道之得也以視則明以聽則聰以言則公以行則從故聖人財制物也猶工匠之斵削鑿芮也宰庖之切割分別也曲得其宜而不折傷拙工則不然大則塞而不入小則窕而不周動於心枝於手而愈醜夫聖人之斵削物也剖之判之離之散之已淫已失復揆以一旣出其根復歸其門已雕已琢遂反於樸合而爲道德離而爲儀表其轉入玄冥其散應無形禮義節行又何以窮至治之本哉世之明事者多離道德之本曰禮義足以治天下此未可與言術也所謂禮義者五帝三王之法藉風俗一世之迹也譬若芻狗土龍之始成芻狗束芻爲狗以謝過求福土龍以請雨文以青黃絹以綺繡纏以朱絲尸祝袀袨袀純服袨墨齋衣也大夫端冕端冕冠也以送迎之及其已用之後則壤土草𠟝音出而已夫有孰貴之言弃之不貴也故當舜之時有苗不服於是舜脩政偃兵執干戚而舞之禹之時天下大雨禹令民聚土積薪擇邱陵而處之武王伐紂載尸而行武王伐紂伯夷曰父死未葬爰及干戈可謂孝乎海內未定故不爲三年之喪始三年之喪於武王禹遭洪水之患陂塘之事故朝死而暮葬此皆聖人之所以應時耦變見形而施宜者也今之修干戚而笑钁插钁斫屬知三年非一日是從牛非馬以徵笑羽也以此應化無以異於彈一絃而會棘下棘下樂石一絃會之不可成也夫以一世之變欲以耦化應時譬猶冬被葛而夏被裘夫一儀不可以百發儀弩招顏也射百發遠近不可皆以一儀也一衣不可以出𡻕儀必應乎高下衣必適乎寒暑是故世異卽事變時移則俗易故聖人論世而立法隨時而舉事尚古之王封於泰山禪於梁父七十餘聖法度不同非務相反也時世異也是故不法其以成之法而法其所以爲法所以爲法者與化推移者也夫能與化推移爲人者至貴在焉爾故狐梁之歌可隨也其所以歌者不可爲也聖人之法可觀也其所以作法不可原也辯士言可聽也其所以言不可形也湻均之劍不可愛也而歐冶之巧可貴也今夫王喬王喬蜀武陽人也爲伯人令得道而仙也赤誦子赤誦子上谷人也病厲入山導引輕舉吹嘔呼吸吐故內新遺形去智抱素反眞以遊玄眇上通雲天今欲學其道不得其養氣處神而放其一吐一吸時詘時伸其不能乘雲升假亦明矣假上也五帝三王經天下細萬物齊死生同變化抱大聖之心以鏡萬物之情上與神明爲友下與造化爲人令欲學其道不得其清明玄聖而守其法籍憲令不能爲治亦明矣故曰得十利劍不若得歐冶之巧得百走馬不若得伯樂之數樸至大者無形狀道至眇者無度量故天之員也不得規地之方也不得矩往古來今謂之宙四方上下謂之宇道在其間而莫知其所故其見不遠者不可與語大其智不閎者不可與論至昔者馮夷得道以潛大川馮夷河伯也華陰潼鄉隄首里人服八石得水仙鉗且得道以處崑崙鉗且得仙道升居崑崙山扁鵲以治病扁鵲盧人姓秦名越人趙簡子時人也造父以御馬羿以之射倕以之斵倕堯巧功所爲者各異而所道者一也夫禀道以通物者無以相非也譬若同陂而溉田其受水鈞也今屠牛而烹其肉或以爲酸或以爲甘煎敖燎炙齊味萬方其本一牛之體伐楩柟豫樟而剖梨之剖判梨分或爲棺槨或爲柱梁披斷撥檖披解也撥析理遂順所用萬方然一木之樸也故百家之言指奏相反其合道一體也譬若絲竹金石之會樂同也其曲家異而不失於體伯樂韓風秦牙管青四子皆古善相馬者所相各異其知馬一也故三皇五帝法籍殊方其得民心鈞也故湯入夏而用其法武王入殷而行其禮桀紂之所以亡而湯武之所以爲治故剞劂銷音削鋸陳非良工不能以制木鑪橐埵坊設鑪橐埵皆治具也坊土刑也非巧治不能以治金屠牛吐齊之大屠一朝解九牛而刀以剃毛剃截髮也庖丁用刀十九年庖丁齊屠伯也而刀如新剖刑剖始石也硎磨刀石何則游乎眾虛之間眾虛之間剖中理也若夫規矩鉤繩者此巧之具也而非所以巧也故瑟無絃雖師文不能以成曲師文樂師徒絃則不能悲故絃悲之具也而非所以爲悲也若夫工匠之爲連鐖運開陰閉眩錯連鐖鐖發也運開相通也陰閉獨閉也眩因而相錯也入於冥冥之眇神調之極游乎心手眾虛之間而莫與物爲際者父不能以教子瞽師之放意相物寫神愈舞而形乎絃者兄不能以喻弟今夫爲平者準也爲直者繩也若夫不在於繩準之中可以平直者此不共之術也故叩宮而宮應彈角而角動此同音之相應也其於五音無所比而二十五絃皆應此不傳之道也故蕭條者形之君蕭條深靜而寂漠者音之主也微音生於寂漠天下是非無所定世各是其所是而非其所非所謂是與非各異皆自是而非人由此觀之事有合於己者而未始有是也有忤於心者而未始有非也故求是者非求道理也求合於己者也去非者非批邪施施微曲也去忤於心者也忤於我未必不合於人也合於我未必不非於俗也至是之是無非之非至非無是此眞是非也若夫是於此而非於彼非於此而是於彼者此之謂一是一非也此一是非隅曲也夫一是非宇宙也今吾欲擇是而居之擇非而去之不知世之所謂是非者不知孰是孰非老子曰治大國若烹小鮮爲寬裕者曰勿數撓裕饒也爲刻削者日致其醎酸而已矣晉平公出言而不當師曠舉琴而撞之跌衽宮壁跌衽至平公衣衽中宮壁左右欲塗之欲塗師曠所敗壁也平公曰舍之以此爲寡人失孔子聞之曰平公非不痛其體也欲來諫者也韓子聞之韓子韓公子非曰羣臣失禮而弗誅是縱過也有以也夫平公之不霸也故賓有見人於密子者密子子賤者也賓出密子曰子之賓獨有三過望我而笑是攓也攓慢也談語而不擇師是返也交淺而言深是亂也賓曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也故賓之容一體也或以爲君子或以爲小人所自是之異也故趣舍合卽言忠而益親身疏卽謀當而見疑母親爲其子治扢秃而血流至耳見者以爲其愛之至也使在於繼母則過者以爲嫉也事之情一也所從觀者異也從城上視牛如羊視羊如豕所居高也闚面於盤水則員於杯則隨面形不變其故有所員有所隨者所自闚之異也今吾雖欲正身而待物庸遽知世之所自窺我者乎若轉化而與世競走譬猶逃雨也無之而不濡常欲在於虛則有不能爲虛矣爲者失之執者敗之若夫不爲虛而自虛者性自然也此所慕而不能致也故通於道者如車軸不運於己而與轂致千里轉無窮之原也不通於道者若迷惑告以東西南北所居聆聆聆聆意曉解也一曲而辟小邪僻也然忽不得復迷惑也故終身隸於人辟若俔之見風也俔侯風雨也世所謂五雨者也無須臾之間定矣故聖人體道反性不化以待化無爲以待有爲則幾於免矣近於免世難也治世之體易守也其事易爲也其禮易行也其責易償也是以人不兼官官不兼事士農工商鄉別州異是故農與農言力士與士言行工與工言巧商與商言數是以士無遺行農無廢功工無苦事商無折貨各安其性不得相干故伊尹之興土功也修脛者使之跖钁長脛以蹋插者使而入深强脊者使之負土脊强者任負重眇者使之凖目不正因令晞傴者使之塗傴人塗地因其俛也各有所宜而人性齊矣胡人便於馬越人便於舟異形殊類易事而悖失處而賤得勢而貴聖人總而用之其數一也夫先知遠見達視千里人才之隆也而治世不以責於民言民不以己求備於下也博聞强志口辯辭給人智之美也而明主不以求於下敖世輕物不汙於俗士之伉行也而治世不以爲民化神機陰閉剞劂無迹人巧之妙也而治世不以爲民業故萇弘師曠先知禍福言無遺策而不可與眾同職也公孫龍折辯抗辭別同異離堅公孫龍趙人好分析詭異之言以白馬不得合爲一物離而爲二也不可以眾同道也北人無擇非舜而自投清冷之淵北人無擇古隱士也非舜非其德之衰也不可以爲世儀魯般墨子以木爲鳶而飛之三日不集而不可使爲工也故高不可及者不可以爲人量行不可逮者不可以爲國俗夫契輕重不失殊兩聖人弗用而縣之乎銓衡視高下不差尺寸明主弗任而求之乎浣準浣準水望之平何則人才不可專用而度量可世傳也故國治可與愚守也而軍制可與權用也夫待騕裊飛兔而駕之騕裊良馬飛兔其子裊兔走蓋皆一日萬里也則世莫乘車待西施毛嬙而爲配西施毛嬙古好女也則終身不家矣然非待古之英俊而人自足者因所有而並用之夫騏驥千里一日而通駑馬十舍旬亦至之旬十日也由是觀之人材不足專恃而道術可公行也亂世之法高爲量而罪不及重爲任而罰不勝危爲禁而誅不敢民困於三責則飾智而詐上犯邪而干免干求也故雖峭法嚴刑不能禁其姦何力不足也故諺曰鳥窮則噣獸窮則𧢻人窮則詐此之謂也道德之論譬猶日月也江南河北不能易其指馳騖千里不能易其處趍舍禮俗猶室宅之居也東家謂之西家西家謂之東家雖臯陶爲之理不能定其處故趍舍同誹譽在俗意行鈞窮達在時湯武之累行積善可及也其遭桀紂之世天授也今有湯武之意而無桀紂之時而欲成霸王之業亦不幾矣昔武王執戈秉鉞以伐紂勝殷搢笏杖殳以臨朝殳木杖也武王旣没殷民叛之周公踐東宮東宮太子宮也履乘石人君升車有乘石也攝天子之位負扆而朝諸侯戸牖之間謂之扆放蔡叔誅管叔周公兄也克殷殘商殘商誅紂紂子祿父祀文王於明堂七年而致政成王夫武王先武而後文非意變也以應時也周公放兄誅弟非不仁也以匡亂也故事周於世則功成務合於時則名立昔齊桓公合諸侯以乘車退誅於國以斧鉞晉文公合諸侯以革車退行於國以禮義桓公前柔而後剛文公前剛而後柔然而令行乎天下權制諸侯鈞者審於勢之變也顏闔魯君欲相之顏闔魯隱士也而不肯使人以幣先焉鑿培而遁之培屋後墻爲天下顯武楚人謂士爲武使遇商鞅申不害刑及三族又況身乎世多稱古之人而高其行並世有與同者而弗知貴也非才下也時弗宜也故六騏驥駟駃騠駃騠北翟之良馬也以濟江河不若窾木便者窾空處世然也是故立功之人簡於行而謹於時今世俗之人以功成爲賢以勝患爲智以遭難爲愚以死節爲贛吾以爲各致其所極而已王子比干非不智箕子被髮佯狂以免其身也然而樂直行盡忠以死節故不爲也伯夷叔齊非不能受祿任官以致其功也然而樂離世伉行以絶眾故不務也許由善卷非不能撫天下甯海內以德民也然而羞以物滑和故弗受也豫讓要離豫讓智伯臣要離吳王闔閭臣非不知樂家室安妻子以偷生也然而樂推誠行必以死主故不留也今從箕子視比干則愚矣從比干視箕子則卑矣從管晏視伯夷則戇矣從伯夷視管晏則貪矣趍舍相非嗜欲相反而各樂其務將誰使正之曾子曰擊舟水中鳥聞之而高翔魚聞之而淵藏故所趍各異而皆得所便故惠子從車百乘以過孟諸惠子名施仕爲梁相從車百乘志尚未足孟諸宋澤莊子見之弃其餘魚莊子名周蒙人隱而不仕見惠施之不足故弃餘魚也鵜胡飲水數斗而不足鵜胡鳥汙澤鳥鱓鮪入口若露而死鱓鮪魚名智伯有三晉而欲不贍三晉智伯有范中行之地瞻足林類榮啓期衣若縣衰林類榮啓期皆隱賢意不慊慊恨由此觀之則趣行各異何以相非也夫重生者不以利害己立節者見難不苟免貪祿者見利不顧身而好名者非義不苟得此相爲論譬猶冰炭鈎繩也何時而合若以聖人爲之中則兼覆而并之未有可是非者也夫飛烏主巢狐狸主穴巢者巢成而得棲焉穴者穴成而得宿焉趍舍行義亦人之所棲宿也各樂其所安致其所無謂之成人故以道論者總而齊之治國之道上無苛令官無煩治士無僞仁上無淫巧其事經而不擾其器完而不飾亂世則不然爲行者相揭以高揭舉爲禮者相矜以僞車輿極於雕琢器用遽於刻鏤求貨者爭難得以爲寶詆文者處煩撓以爲慧爭爲佹辯久積而不訣無益於治工爲奇器厯𡻕而後成不周於用故神農之法曰丈夫丁壯而不耕天下有受其飢者婦人當年而不織天下有受其寒者故身自耕妻親織以爲天下先其導民也不貴難得之貨不器無用之物是故其耕不强者無以養生其織不强者無以揜形有餘不足各歸其身衣食饒溢姦邪不生安樂無事而天下均平故孔邱曾參無所施其善孟賁成荆無所行其威成荆古勇士也衰世之俗以其知巧詐僞飾眾無用貴遠方之貨珍難得之財不積於養生之具澆天下之淳澆薄也淳厚也析天下之樸牿服馬牛以爲牢滑萬民以清爲濁性命飛揚皆亂以營貞信漫瀾人失其情性於是乃有翡翠犀象黼黻文章以亂其目芻豢黍梁荆吳芬馨以嚂音藍其口荆吳國也芬珍味也嚂貪求也鐘鼓管簫絲竹金石以淫其身趍舍行義禮節謗議以營其心於是百姓縻沸豪亂暮行遂利煩挐澆淺淺薄也旣薄尚澆也法與義相非行與利相反雖十管仲弗能治也且富人則車輿衣纂錦纂繪馬飾傅旄象帷幕茵席綺繡條組青黃相錯不可爲象貧人則夏被褐帶索啥菽飲水以充腸以支暑熱冬則羊裘解札解札裘敗解也短褐不掩形而煬竈口煬炙故其爲編戸齊民無以異然貧富之相去也猶人君與樸虜不足以論之夫乘奇技僞邪施者自足乎一世之間守正脩理不苟得者不免乎飢寒之患而欲民之去末反本由是發其原而壅其流也夫雕琢刻鏤傷農事者也錦繡纂組害女工者也農事廢女工傷則飢之本而寒之原也夫飢寒並至能不犯法干誅者古今之未聞也故仕鄙在時不在行利害在命不在智夫敗軍之卒勇武遁逃將不能止也勝軍之陳怯者死行懼不能走也故江河决沉一鄉父子兄弟相遺而走爭升陵阪上高邱輕足先升不能相顧也世樂志平見鄰國之人溺尚猶哀之又況親戚乎故身安則恩及鄰國志爲之滅身危則忘其親戚而人不能解也游者不能拯溺手足有所急也灼者不能救火身體有所痛也夫民有餘卽讓不
