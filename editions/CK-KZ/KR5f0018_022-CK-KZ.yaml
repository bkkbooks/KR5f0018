front:
  text: 菟爲走而破其玦也因珮兩玦以爲之豫兩玦相觸破乃逾疾亂國之治有似於此夫鴟目大而睡不若鼠蚈足眾而走不若蛇物固有大不若小眾不若少者及至夫彊之弱弱之彊危之安存之亡也非聖人孰能觀之大小尊卑未足以論也唯道之在者爲貴何以明之天子處於郊亭則九卿趨大夫走坐者伏倚者齊當此之時明堂太廟懸冠解劍緩帶而寢非郊亭大而廟堂狹小也至尊居之也天道之貴也非特天子之爲尊也所在而眾仰之夫蟄蟲鵲巢皆嚮天一者至和在焉爾帝者誠能包禀道合至和則禽獸草木莫不被其澤矣而說兆民乎
  hash: sha256:5d208515f15b02bbe6e7bfc98ee32492c128bf7f06fc65fc842e91c84455b932
