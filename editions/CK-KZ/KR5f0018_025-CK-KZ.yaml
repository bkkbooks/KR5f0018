front:
  text: 者而已今沐者墮髮而猶爲之不止以所去者少所利者多砥石不利而可以利金金刀劍之屬也擏不正而可以正弓擏弓之掩牀讀曰檠物固有不正而可以正不利而可以利不正者擏正者弓也不利者砥利者金也力貴齊知貴捷得之同遫爲上齊讀齏之齏齊捷皆疾勝之同遲爲下所以貴鏌邪者以其應物而斷割也𠟣靡勿釋牛車絶轔𠟣切楚人謂門切之轔車行其上則斷之孟子曰城門之軌非兩馬之力轔讀近蘭急舌言之乃得也爲孔子之窮於陳蔡而廢六藝則惑六藝禮樂射御書數爲醫之不能自治其病病而不就藥則勃矣不擇於事曰勃也
