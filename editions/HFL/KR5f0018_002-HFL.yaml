body:
  text: 太尉祭酒臣許愼記上原道訓下萬物有所生而獨知守其根根本也百事有所出而獨知守其門門禁要也故窮無窮極無極照物而不眩響應而不乏此之謂天解眩惑也天解天之解故也言能明天意也故得道者志弱而事强弱柔也强無不勝也心虛而應當當合也所謂志弱者柔毳安靜藏於不敢行於不能恬然無慮動不失時與萬物回周旋轉不爲先唱感而應之感動應和是故貴者必以賤爲號貴者謂公王侯伯稱孤寡不穀故曰以賤爲號而高者必以下爲基基始也夫築京臺先從下起也託小以包大在中以制外行柔而剛用弱而强轉化推移得一之道而以少正多而能也能以寡統衆所謂其事强者遭變應卒排患扞難力無不勝敵無不淩應化揆時莫能害之是故欲剛者必以柔守之欲强者必以弱保之積於柔則剛積於弱則强觀其所積以知禍福之鄉鄉方也强勝不若己者至於若己者而同夫强者能勝不如己者同等也至於如己者則等不能勝也言强之爲小也道家所不貴也柔勝出於己者其力不可量夫能弱柔勝己者其力不可訾也言柔之爲大也道家所貴故兵强則滅木强則折革固則裂齒堅於舌而先之弊兵猶火也强則盛盛則衰故曰則滅以火諭也木强則折不能徐屈也革堅則裂鼓是也弊盡齒堅於舌而先舌盡是故柔弱者生之榦也榦質也而堅强者死之徒也徒衆也先唱者窮之路也後動者達之原也先者隤陷故曰窮也後者以謀故曰達也何以知其然也凡人中壽七十歲然而趨舍指湊日以月悔也以至於死故蘧伯玉年五十而有四十九年非伯玉衛大夫蘧瑗也今年所行是也則還顧知去年之所行非也歲歲悔之以至於死故有四十九非所謂月悔朔日悔昨也何者先者難爲知而後者易爲攻也先者上高則後者攀之先者諭下則後者蹷之先者隤陷則後者以謀先者敗績則後者逢之蹷履也音展非展也楚人讀躓爲隤隤者車承或言跋躓之躓也由此觀之先者則後者之弓矢質的也質的射者之準執也猶錞之與刃刃犯難而錞無患者何也以其託於後位也錞矛戈之錞也讀曰頓刃矛戈之刃也刃在前故犯難頓在後故以無患故曰其託於後位也此俗世庸民之所公見也而賢知者弗能避也庸衆也公詳也衆民詳所見知賢者不能避爲鋒刃也以諭利欲也故曰有所屏蔽也所謂後者非謂其底滯而不發凝竭而不流底讀曰紙發動也凝如脂凝也流行貴其周於數而合於時也周調也數術也合於時時行則行時止則止也夫執道理以耦變先亦制後後亦制先道當勝事爲變不必待於先人事當在後趨時當居先也是何則不失其所以制人人不能制也時之反側間不容息言時反側之間不容氣息促之甚也先之則大過後之則不逮夫日回而月周時不與人游故聖人不貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和淨也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大䃺堅莫能與之爭攻大䃺堅諭難也無與聖人之爭也天下之物莫柔弱於水然而大不可極深不可測測盡也脩極於無窮遠渝於無崖息耗減益通於不訾訾量也上天則爲雨露下地則爲潤澤萬物弗得不生百事不得不成大包群生而無好憎澤及蚑蟯蚑蚑行也蟯微小之蟲也而不求報施而不有也冨贍天下而不既瞻足也既盡也德施百姓而不費德澤加於百姓不以爲己財費也行而不可得窮極也流膏不止也微而不可得把握也擊之無創刺之不傷斬之不斷焚之不然水之性也淖溺流遁錯繆相紛適逸也錯繆相紛彼此相糺也而不可靡散利貫金石强濟天下水流缺石是其利也舟船所載無有重是其强也濟通也動溶無形之域而翺翔忽區之上忽怳之區上也言其飛爲雲無所不上也邅回川谷之間邅回猶委曲也而淊騰大荒之野有餘不足與天地取與授萬物而無所前後前後皆與之是故無所私而無所公公私一也靡濫振蕩與天地鴻洞鴻大也洞通也讀同異之同也無所左而無所右蟠委錯紾與萬物始終紾轉也是謂至德言水之爲德最大故曰至德也夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於無有入於無間水是也吾是以知無爲之有益有益於生夫無形者物之大祖也無音者聲之大宗也無形生有形故爲物大祖也無音生有音故爲聲大宗祖宗皆本也其子爲光其孫爲水皆生於形乎光無形道所貴也觀之故子爲光也水形而不可毁差之故孫爲水也夫光可見而不可握水可循而不可毁故有像之類莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣出生出生道謂去清淨也入死入死道謂清欲也蹠適也自無形適有形離其本也自有形適無形不能復得道家所棄故曰而以衰賤也是故清靜者德之至也而柔弱者道之要也要約也虚而恬愉者萬物之用者萬物由之得爲人用肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之貟不中規方不中矩大渾而爲一葉累而無根無根言微妙也懷囊天地爲道關門門道之門穆忞隱閔純德獨存穆忞隱閔皆無形之類也純不雜糅也布施而不既用之而不勤既盡也勤勞也是故視之不見其形聽之不聞其聲循之不得其身無形而有形生焉無形道也有形萬物也無聲而五音鳴焉音生於無聲也無味而五味形焉形或作和也無色而五色成焉是故有生於無實出於虛有形生於無形人也實財也天下爲之圈則名實同居圈陬也名爵號之名也實幣帛之屬也一曰仁義之功賞也音之數不過五宫商角徵羽也而五音之變不可勝聽也變更相生也味之和不過五甘酸鹹辛苦也而五味之化不可勝嘗也化亦變也色之數不過五青赤白黑黄也而五色之變不可勝觀也常事曰視非常曰觀春秋魯隱公觀漁於棠是也故音者宫立而五音形矣言在中央聲之主也形正也味者甘立而五味亭矣亭平也甘中央味也色者白立而五色成矣白者所在以染之故五色可成也道者一立而萬物生矣是故一之理施四海理道也一之解際天地解達也際機也解讀解故之解也其全也純兮若樸樸若玉樸也在石而未剖其散也混兮若濁濁而徐清沖而徐盈澹兮其若深淵沖虚也盈滿也澹定不動之貌汎兮其若浮雲若無而有若亡而存萬物之緫皆閱一孔緫衆聚也百事之根皆出一門道之門也其動無形變化若神其行無迹常後而先道之先也是故至人之治也至道之人掩其聦明滅其文章依道廢智與民同出于公公正去其誘慕除其嗜欲誘慕諭貪榮勢也故去之也嗜欲情欲也故除之也損其思慮常浩澹也約其所守則察不煩擾也寡其所求則得易供故得夫任耳目以聽視者勞形而不明以知慮爲治者苦心而無功是故聖人一度循軌一齊也軌法也不變其宜不易其常放準修繩曲因其當夫喜怒者道之邪也道貴平和故喜怒爲邪也憂悲者德之失也德尚恬和以憂悲爲失論語曰其德坦蕩是也好憎者心之過也嗜欲者性之累也心當專中扃外閉反有所好憎故曰過性當清靜以奉天素而反嗜欲故爲之累也人大怒破隂大喜墜陽怒者隂氣也隂爲堅冰積隂相薄故破隂喜者陽氣陽升於上積陽相薄故曰陽墜也薄氣發瘖驚怖爲狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂德之至也通而不變靜之至也變更也嗜欲不載虚之至也不載於性無所好憎平之至也不與物散粹之至也散亂粹純能此五者則通於神明通於神明者得其内者也是故以中制外百事不廢中心也外情欲中能得之則外能收之不養也中之得則五藏寧思慮平五藏寧者各得其所思慮平者本妄喜怒筋力勁强耳目聦明䟽達而不悖悖謬也堅强而不鞼鞼折無所大過而無所不逮處小而不逼處大而不窕在小能小在大能大其魂不躁其神不嬈躁狡嬈煩嬈也言精神定矣湫漻寂寞爲天下梟湫漻清靜也寂漠恬淡也梟雄也迫則能應感則能動物穆無窮穆美變無形像言能化也優游委縱如響之與景響應聲影應形登高臨下無失所秉履危行險無忘玄仗玄仗道也能存之此其德不虧萬物紛糅與之轉化以聽天下若背風而馳疾而易也是謂至德至德則樂矣古之人有居巖穴而神不遺者遺失也末世有勢爲萬乘而日憂悲者由此觀之聖亡乎治人而在于得道樂亡于富貴而在于德和之大己而小天下則幾於道矣幾近也許由務光是所謂樂者豈必處京臺章華京臺章華皆楚之大臺游雲夢沙丘雲夢楚澤在南郡華容也沙丘紂臺名也在鉅鹿也耳聽九韶六瑩九韶舜樂也瑩顓頊樂也口味煎熬芬芳馳騁夷道夷平也釣射鷫鷞之樂乎鹔鷞鳥名也長脛緑身其形似雁一曰鳳凰之别名也吾所謂樂者人得其得者夫得其得者不以奢爲樂不以廉爲悲廉猶儉也與隂俱閉與陽俱開故子夏心戰而臞得道而肥子夏名商孔子弟子也入學見先王之道而說之又出見富貴之樂而欲之二者交爭故戰而臞也先王之道勝無所復思故肥也聖人不以身役物不以欲滑和不以身爲物役不以情欲亂中和之道也是故其爲曜不忻欣忻忻爲過制也其爲悲不惙惙惙惙爲傷性也萬方百變消摇而無所定吾獨忼慨遺物而與道同出是故有以自得也自得其天性也喬木之下空穴之中足以適情喬木上䟽少隂之木也空穴巖穴也唯處此中夫自得者足以適其情性無以自得也雖以天下爲家萬民爲臣妾不足以養生也言無以自得之人猶以此爲不足也能至于無樂者則無不樂無不樂則至極樂矣至樂至德之樂極亦至也夫建鍾鼓列管弦席旃茵傅旄象管簫也弦琴瑟也傅著也旄旌也象以象牙爲飾也耳聽朝歌北鄙靡靡之樂朝歌紂都鄙邑也紂使師涓作鄙邑靡靡之樂也故師延爲晋平公歌之師曠知之曰亡國之音也齊靡曼之色齊列也靡曼美也陳酒行觴夜以繼日樂不輟也强弩千高鳥走犬逐狡兔此其爲樂也炎炎赫赫怵然若有所誘慕誘進也慕有所思怵然猶惕然解車休馬罷酒徹樂而心忽然若有所喪悵然若有所亡也是何則不以内樂外而以外樂内樂作而喜曲終而悲悲喜轉而相生精神亂營不得須臾平營惑察其所以不得其形不得樂之形也而日以傷生失其得者也是故内不得於中禀授於外而以自飾也不浸于肌膚不浹于骨髓浸潤也浹通也不留于心志不滯于五藏故從外入者無王於中不止從中出者無應於外不行故聽善言便計雖愚者知說之稱至德高行雖不肖者知慕之說之者衆而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也夫内不開於中而强學問者不入於耳而不著於心此何以異於聾者之歌也效人爲之而無以自樂也聲出於口則越而散矣散去耳不聞也夫心者五藏之主也所以制使四支流行血氣馳騁于是非之境而出入于百事之門户者也是故不得於心而有經天下之氣是猶無耳而欲調鍾鼓無目而欲喜文章也亦必不勝其任矣經理故天下神器不可爲也器物用也爲治也爲者敗之執者失之夫許由小天下而不以己易堯者志遺於天下許由陽城人也箕山之隱士也堯以其賢聘之欲禪天下焉不肯就故曰志遺於天下也所以然者何也因天下而爲天下也天下之要不任於彼而在於我彼謂堯也我謂許由不在於人而在於我身身得則萬物備矣徹於心術之論則嗜欲好憎外矣外不在心是故無所喜而無所怒無所樂而無所苦萬物玄同也玄天也無非無是化育玄燿生而如死玄天也耀明也生而如死無所欲夫天下者亦吾有也吾亦天下之有也天下之與我豈有間哉言相比也夫有天下者豈必攝權持勢操殺生之柄而以行其號令邪吾所謂有天下者非謂此也自得而已自得其天性也一曰不失其身也自得則天下亦得我矣吾與天下相得則常相有已又焉有不得容其間者乎所謂自得者全其身者也全其身則與道爲一矣故雖游於江潯海裔潯崖也裔邊也潯讀葛覃之覃也馳要裊建翠蓋駟駕要裊馬名也日行萬里裊撓弱之撓翠蓋以翠裊羽飾蓋也目觀掉羽武象之樂掉羽羽舞武象周武王之樂耳聽淊朗竒麗激抮之音激有激揚抮轉皆曲名也揚鄭衛之浩樂結激楚之遺風鄭聲鄭會晋平公說新聲使師延爲桑間濮上之樂濮在衛地故鄭衛之浩樂也結激清楚之聲也必爲鄭爲之俗樂夫結激清楚以娱樂也遺風猶餘聲也射沼濱之高鳥逐苑囿之走獸此齊民之所以淫泆流湎齊於凡民故曰齊民也沼池也濱水崖也聖人處之不足以營其精神亂其氣志營惑也使心怵然失其情性處窮僻之郷側谿谷之間側伏也隱于榛薄之中藂木曰榛深草曰薄環堵之室茨之以生茅蓬户瓮牖揉桑爲樞堵長一丈高一丈面環一堵爲方一丈故曰環者言其小也編蓬爲户以破瓮蔽牖揉桑條以爲元樞上漏下濕潤浸北房浸漬也北房隂堂也雪霜灖浸潭苽蔣灖雪霜之貌也浸潭之潤以生苽蔣實蓏者蔣實也其米曰𦸔胡讀繀繩之繀灖讀校滅之校苽讀觚哉之觚也蔣讀水漿之漿也逍遥于廣澤之中而仿洋于山峽之旁兩山之間爲峽此齊民之所爲形植黎累憂悲而不得志也聖人處之不爲愁悴怨懟懟病也而不失其所以自樂也是何也則内有以通于天機機發也而不以貴賤貧富勞逸失其志德者也故夫烏之啞啞鵲之唶唶豈嘗爲寒暑燥濕變其聲哉言體道者不爲貴賤貧富勞逸易其志如烏鵲之不爲寒暑易其聲是故夫得道已定而不待萬物之惟移也非以一時之變化而定吾所以自得也吾所謂得者性命之情處其所安也夫性命者與形俱出其宗宗本形備而性命成性命成而好憎生矣故士有一定之論女有不易之行士有同志同志德也至其交接有一會而公定故曰有一定之論也貞女專一亦無二心雖有偏喪不復更醮故曰有不易之行者也規矩不能方圓鉤繩不能曲直雖規矩鉤繩無以施於此天地之永登丘不可爲脩居卑不可爲短是故得道者窮而不懾達而不榮雖窮賤不以爲懾懼也雖顯達不以爲榮幸也處高而不機機危也持盈而不傾傾覆也新而不㓪久而不渝㓪明也渝變也㓪讀汝南㓪陵之㓪入火不焦入水不濡是故不待勢而尊不待財而冨不待力而强平虛下流與化翺翔翺翔猶傾仰也若然者藏金於山藏珠於淵舜藏金於靳巖之山藏珠於五湖之淵以塞貪淫之欲也不利貨財不貪勢名勢位爵號之名也是故不以康爲樂康安也不以慊爲悲慊約也慊讀辟向慊之慊也不以貴爲安不以賤爲危形神氣志各居其冝以隨天地之所爲夫形者生之舍也氣者生之充也神者生之制也一失位則二者傷矣是故聖人使人各處其位守其職而不得相干也故夫形者非其所安也而處之則廢氣不當其所充而用之則泄神非其所宜而行之則昧昧不明也此三者不可不愼守也夫舉天下萬物蚑蟯貞蟲蚑行蟯動之蟲也蟯讀饒貞蟲細腰之屬也𧏦動蚑作蚑讀鳥蚑步之蚑也皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨肉無倫矣去之去逆也則骨肉靡滅無倫匹也今人之所以眭然能視眭讀曰桂營然能聽䁝讀疾營之營也形體能抗抗讀扣耳之扣而百節可屈伸察能分白黑視醜美而知能别同異明是非者何也氣爲之充而神爲之使也何以知其然也凡人之志各有所在而神有所繫者其行也足蹪趎埳頭低植木而不自知也蹪躓也楚人讀躓爲蹪知猶覺也招之而不能見也呼之而不能聞也不能見招之者不能間呼之者耳目去之也然而不能應者何也神失其守也精神失其所守故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右若楚白公勝將欲慮亂立於朝倒杖策上貫其頭血流至地而不覺此之類也無所不充則無所不在精神無所不充在存也是故貴虛者以毫末爲宅虚者情無所念慮也以毫末爲宅者言精微也今夫狂者之不能避水火之難而越溝瀆之險者豈無形神氣志哉然而用之異也與人異也失其所守之位而離其外内之舍是故舉錯不能當動靜不能中當合也中適也終身運枯形于連嶁列埒之門運行也推輔病也形體也于於也連嶁猶離嶁也委曲之類列埒不平均也連讀陵聾幽州陵陵蓮之連嶁讀㟝嶁無松栢之嶁而蹪蹈于污壑穽陷之中污壑大壑壑讀赫赫明明之赫雖生俱與人鈞然而不免爲人戮笑者何也形神相失也故以神爲主者形從而利以形爲制者神從而害神清靜故利形有情欲故害也貪饕多欲之人漠㬆於勢利誘慕於名位漠㬆猶鈍㬆不知足類誘進也慕貪漠溺之漠㬆讀織絹緻密㬆無間孔之㬆也冀以過人之智植于高世冀猶庶幾也植立也庶幾立高名於世也則精神日以耗而彌遠耗秃也久淫而不還淫過還復形閉中距則神無由入矣神精神也清凈之性無從還入也是以天下時有盲妄自失之患此膏燭之類也火逾然而消逾亟逾益也亟疾也夫精氣志者靜而日充者以壯躁而日耗者以老是故聖人將養其神和弱其氣平夷其形而與道沈浮俛仰沈浮猶盛衰俛仰猶升降恬然則縱之迫則用之其縱之也若委衣其用之也若發機機弩機關言其疾也如是則萬物之化無不遇遇時也而百事之變無不應應當之也淮南鴻烈解卷之二
