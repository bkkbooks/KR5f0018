front:
  text: 淮南鴻烈解卷之九動七
  hash: sha256:135b694552ad7d543a883f32c6fe01b2c1289843e12a8c23369315afbeb78cca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_HFL_009-001a, image: hfl/0864/0864-004.png}
body:
  text: 太尉祭酒臣許愼記上時則訓上則法也四時寒暑十二月之常法故曰時則因以題篇也孟春之月招摇指寅招摇斗建昏參中旦尾中參西方白虎之宿是也月昏時中於南方尾東方蒼龍之宿是也月將旦時中於南方其位東方其日甲乙盛德在木太皡之神治東方也甲乙木日也盛德在木木王東方也其蟲鱗其音角東方少陽物去大隂甲散散爲鱗鱗蟲龍爲之長角木也位在東方也律中太蔟其數八律管音也隂衰陽發萬物太蔟地而生故曰太蔟其數八五行數五木第三故曰八也其味酸其臭羶木味酸酸之言鑽也萬物鑽地而生羶木香羶其祀户祭先脾蟄伏之類始動生出由户故曰祀户也脾屬土陳設俎豆脾在前也春木勝土言常食所勝也一曰脾屬木自用其藏也東風解凍蟄蟲始振穌東方木火母也氣温故東風解冰凍也振動穌生也魚上負冰獺祭魚是月之時鯉魚應陽而動上負冰也獺獱也是月之時獺祭鯉魚於水邊四面陳之謂之祭魚也候鴈北是月時候之應鴈從彭蠡來北過周雒至漢中孕卵鷇也天子衣青衣乘蒼龍周禮馬七尺已上曰龍也服蒼玉建青旗服佩也熊虎也旗也食麥與羊麥金穀也羊土畜也是月金土以老食所勝先食麥以麥爲王也服八風水爨萁燧火取銅槃中露水服之八方風所吹也取萁木燧之火炊之萁讀該備之該也東宫御女青色衣青采鼓琴瑟春王東方故處東宫也琴瑟木也春木王故鼓之也其兵矛矛有鋒銳似萬物鑽地生其畜羊羊土木之母故畜之也朝于青陽左个以出春令是月之朔天子朝日于青陽左个東向堂故曰青陽北頭室故曰左个个猶隔也春令寬和之令也布德施惠行慶賞省傜賦布陽德施柔惠也慶善賞賜予也省減徭役之勞輕其賦歛也立春之日天子親率三公九卿大夫以迎歲于東郊率使也迎歲春也東郊郭外八里之郊也修除祠位幣禱鬼神犠牲用牡祠位壇場屏攝之位也幣圭壁也禱鬼神求福祥也人神曰鬼天神曰神犠性用牡尚蠲潔也禁伐木春木王當長養故禁之也毋覆巢殺胎夭毋麛毋卵胎獸胎懷姙未育者也麋子曰夭鹿子曰麛卵未鷇者皆禁民不得取蕃庶物也毋聚衆置城郭掩骼薶骴毋聚合大衆建置城郭以妨害農功也骼骨有肉掩覆薶藏之愼生氣也孟春行夏令則風雨不時草木早落國乃有恐孟春木德用事法當寬仁而用火氣動於上故草木早落國惶恐也行秋令則其民大疫飄風暴雨緫至黎莠蓬蒿並興孟春温仁而秋正金鈇之令氣不和故民疫疾風雨隈至故黎莠蓬蒿疏穢之草並興盛也行冬令則水潦爲敗雨霜大雹首稼不入冬隂也水泉湧起而春行之故爲敗氣不和故雨霜大雹植稼不熟也正月官司空其樹楊司空主土春土受嘉穡故官司空也爾雅曰楊蒲柳也楊木春光故其樹楊也仲春之月招摇指卯昏弧中旦建星中弧星在輿鬼南是月昏時中於南方建星在斗上是月平旦時中於南方也其位東方其日甲乙其蟲鱗其音角律中夾鍾是月萬物去隂夾陽聚地而生故曰夾鍾也其數八其味酸其臭擅其祀户祭先脾始雨水桃李始華自冬氷雪至此春分穀雨故曰始雨水桃李於是皆秀華也蒼庚鳴鷹化爲鳩蒼庚爾雅曰商庚黎黄楚雀也齊人謂之搏黍秦人謂之黄流離幽冀謂之黄鳥一說斲木也至此月而鳴鷹化爲鳩喙正直不鷙搏也鳩謂布穀也天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宫御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽太廟太廟東向堂中央室命有司省囹圄去桎梏毋笞掠止獄訟囹圄法室也省之赦輕微也在足曰桎在手曰梏毋笞掠言不用也止猶禁也養幼小存孤獨以通句萌順春陽長養幼小使繁茂也無父曰孤無子曰獨皆存之所以愼陽氣也故草木不句萌者以通達也擇元日令民社元者善之長也日從甲至癸也社所以爲民祈也嫌日不吉故言擇元也是月也日夜分雷始發聲蟄蟲咸動穌分等也冬隂閉固雷伏不發是月陽升雷始發聲也咸皆動穌生也先雷三日振鐸以令於兆民曰雷且發聲鐸木鈴也金口木舌爲鐸所以振告萬民也兆大數且猶將也有不戒其容止者生子不備必有凶災以雷電合房室者生子必有瘖聾通精癡狂之疾故曰不備必有凶災也令官市同度量鈞衡石角斗稱度文尺也量釜鍾也鈞等也衡石稱也百二十斤爲石角平也斗稱量器也端權槩端正也槩平也毋竭川澤毋漉陂池毋焚山林皆爲夭物盡類毋作大事以妨農功大事戎旅征伐之事故害農民之功也祭不用犠牲用圭璧更皮幣是月尚生育故不用犧性也更代也以圭璧皮幣代犧性也皮謂鹿皮也幣謂玄纁束帛也禮記曰幣帛圭皮告於祖禰者也仲春行秋令則其國大水寒氣緫至寇戎來征仲春陽中也陽氣長養而行秋節殺戮之令故寒氣猥至寇兵來征伐其國也行冬令則陽氣不勝麥乃不熟民多相殘仲春行冬隂之令隂氣勝陽故陽不勝則麥不升熟民相殘賊也行夏令則其國大旱煗氣早來蟲螟爲害仲春行夏太陽之令故大旱陽氣熱故煗極陽生隂故蟲螟作害也食心曰螟二月官倉其樹杏二月興農播穀故官倉也杏有竅在中竅在中像隂布散在上故其樹杏季春之月招摇指辰昏七星中旦牽牛中七星南方朱鳥之宿是月昏時中於南方牽牛北方玄武之宿是月平旦時中於南方也其位東方其日甲乙其蟲鱗其音角律中姑洗姑故也洗新也是月陽養生去故就新故曰姑洗其數八其味酸其臭羶其祀户祭先脾桐始華田䑕化爲鴽桐梧桐也是月生華田鼠鼢𪕧鼠也駕鶉也青徐謂之鴾幽冀謂之鶉虹始見萍始生虹螮蝀也詩云螮蝀在東莫之敢指萍水藻也是月始生也天子衣青衣乘蒼龍服蒼玉建青旗食麥與羊服八風水爨萁燧火東宫御女青色衣青采鼓琴瑟其兵矛其畜羊朝于青陽右个東向堂南頭室故曰右个舟牧覆舟五覆五反乃言具于天子舟牧主舟之官也是月天子將乘舟而漁故反覆而視之恐有穿漏也五覆五反愼之至也天子烏始采舟薦鮪於寢廟乃爲麥祈實烏猶安也自冬至此而安乘舟故曰始乘也薦進也鮪魚似鯉而大進此魚於寢廟祈於宗祖求麥實前曰廟後曰寢詩云寢廟奕奕言相連是月也生氣方盛陽氣發泄發泄猶布散也句者畢岀萌者盡達不可以内天子命有司發囷倉助貧窮振乏絶無財曰貧鰥寡孤獨曰窮也振救也開府庫出幣帛使諸侯府庫幣帛之藏也使人之聘問諸侯聘名士禮賢者有名德之士大賢之人聘問禮之將與爲治也命司空時雨將降下水上騰循行國邑周視原野司空主水土之官也是月下水上騰恐有浸清傷害五穀故循行徧視之也廣平曰原郊外曰野也修利隄防導通溝瀆達路除道從國始至境止田獵畢弋罝罘羅𦉾餒毒之藥毋出九門畢掩網也弋繳射詩曰弋鳧與鴈罝兔罟也詩曰肅肅兔罝畢羅鳥罟也詩云鴛鴦在罘畢之羅之罘麋度罟網其緫名也天子城門十二東方三門王氣所在門餒獸之毒藥所不得出尚生育也兼餘九門得出故特戒之如其毋出乃禁野虞毋伐桑拓桑拓皆可養蠶文禁民伐之也鳴鳩奮其羽載鵀降于桑鳴鳩奮迅其羽直刺上飛入雲中者是也載鵀載勝鳥也詩曰尸鳩在桑其子在梅是也具撲曲筥筐樸持也三轉謂之樸撲讀南陽人言山陵同曲薄也青徐謂之曲貟底曰筥方底曰筐皆受桑器也后妃齋戒東鄉親桑省婦使勸蠶事命五庫令百工審金鐵皮革筋角箭榦脂膠丹漆無有不良擇下旬吉日大合樂致歡欣樂所以移風易俗也故擇吉日大合之以致歡和也乃合㹎牛騰馬游牝于牧㹎牛特牛也騰馬騰駒跐蹏善將群者也游從牝於所牧之地風合之㹎讀葛藟之藟也令國儺九門磔攘以畢春氣儺散宫室中區隅幽闇之處擊鼓大呼以逐不祥之氣如今驅疫逐除是也九門三方九門也磔犬陽氣盡之故曰畢春之氣也行是月令甘雨至三旬季春行冬令則寒氣時發草木皆肅國有大恐季春行冬寒殺之氣也故寒氣時起草木上疏曰肅也行夏令則民多疾疫時雨不降山陵不登季春行夏元陽之令氣不和故民疾疫雨澤不降故草木不登成也行秋令則天多沈隂淫雨早降兵革並起秋金氣用事水之母也季春行之故多隂沈爲雨也金爲兵革故並起也三月官鄉其樹李三月科民户口故官鄉也李亦有核說與杏同李後杏熟故三月李也孟夏之月招摇指巳昏翼中旦婺女中翼南方朱鳥之宿是月昏時中於南方婺女一曰須女北方玄武之宿是月平旦中於南方也其位南方其日丙丁盛德在火炎帝之神治南方也丙丁火日也盛德在火火王南方也其蟲羽其音徵盛陽用事鱗散羽羽蟲鳳之長徵音火也律中仲吕其數七是月陽散在外隂實在中所以旅陽成功故曰仲吕其數七生數五火第二故曰七也其味苦其臭焦火味苦也焦火香焦其祀竈祭先胏祝融吴回爲高辛氏火正死爲火神託祀於竈是月火王故祀竈胏胏金也祭祀之肉先用所勝也一曰胏火自用其藏也螻蟈鳴丘螾出螻螻蛄也蟈蝦蟇也四月隂氣始動於下故類應鳴也丘螾蠢蝡也王瓜生苦菜秀王瓜栝樓也爾雅曰不榮而實曰秀苦菜宜言榮也天子衣赤衣乘赤騮服赤玉建赤旗煩火德也食菽與鷄菽豆連皮也鷄豆皆屬火之所養也服八風水爨柘燧火南宫御女赤色衣赤采吹竿笙火王南方故處南宫也竿笙空中像陽故吹之其兵戟戟有枝榦象陽布散也戟或作弩也其畜雞朝于明堂左个以出夏令南向堂當盛陽故曰明堂也東頭室故曰左个居是室行是月之令也雞羽蟲陽也故畜之立夏之日天子親率三公九卿大夫以迎歲於南郊迎歲迎夏也南郊七里之郊也還乃賞賜封諸侯脩禮樂饗左右還從南郊還也賞賜有功割土封爵傳曰賞以春夏刑以秋冬也修治禮樂所以安上治民移風易俗左右近臣也命太尉贊傑俊選賢良舉孝悌太尉卿官也命使也贊白也才過千人爲傑選擇賢良孝悌舉而用之蓋非太尉之職故特命之也行爵出禄佐天長養繼修增高無有隳壞毋興土功毋伐大樹令野虞行田原勸農事驅獸畜勿令害穀天子以彘嘗麥先薦寢廟是月麥始升故以豕嘗麥豕水畜宜先薦寢廟孝之至也聚畜百藥靡草死是月陽氣極藥草成故聚積之也靡草則亭歷之屬麥秋至决小罪斷薄刑四月陽氣盛於上及五月隂氣作於下故曰麥秋至决小罪斷薄刑順殺氣也孟夏行秋令則苦雨數來五穀不滋四鄰入保孟夏盛陽當助長養而行金氣殺戮之令故苦雨殺穀不得滋長也四方之民來入城郭自保守也行冬令則草木早枯後乃大水敗壞城郭行冬寒閉固之令故草木早枯大水敗壞其城郭奸時違行之應也行春令則螽蝗爲敗暴風來格秀草不實孟夏當繼修增高助陽長養而行春時啓蟄之令故致螽蝗之敗春木氣多風故言暴風來至使當秀之草不長茂也四月官田其樹桃四月勉農事故官田也桃說與杏同後李熟故曰四月桃也仲夏之月招摇指午昏亢中旦危中亢東方蒼龍之宿是月昏時中於南方危北方玄武之宿是月平日時中於南方也其位南方其日丙丁其蟲羽其音徵律中蕤賔其數七是月隂氣萎蕤在下像主人也陽氣在上像賔客也故曰蕤賔其味苦其臭焦其祀竈祭先肺小暑至螳蜋生螳蜋世謂之天馬一名齒肬兖豫謂之巨斧也鵙始鳴反舌無聲鵙百勞鳥也五月隂氣於下伯勞夏至應隂而鳴殺蛇於木傳曰伯趙氏司至者反舌百舌鳥也能辯變其舌反易其聲以效百鳥之鳴故謂百舌無聲者五月陽氣極於上微隂起於下百舌無隂故無聲也天子衣赤衣乘赤騮服赤玉載赤旗食菽與雞服八風水爨柘燧火南宫御女赤色衣赤采吹竽笙其兵戟其畜雞朝于明堂太廟廟南向堂中央室也命樂師修鞀鼙琴瑟管簫調竿箎飾鍾磬管一孔似笛簫今之歌簫是也箎讀如池澤之池也執干戚戈羽干盾也戈斧也戟屬也羽武也所持翿也命有司爲民祈祀山川百原大雩帝用盛樂國之山川百原能興雲雨者皆祈祀之也雩旱也祭上帝也爲民祈雨故用盛樂盛樂六代之樂也天子以雉嘗黍雉雜雞也不言嘗雞而言嘗黍者以穀爲主也羞以含桃先薦廟羞進也含桃鶯所含食故言含桃是月而熟故進之禁民無刈藍以染爲藍青未成故毋燒灰是月草木未成不夭物也毋暴布火盛曰猛暴布則脆傷也門閭無閉關市無索門城門也閭里門也民順陽氣散布在外當出入故不閉也門要塞也市人聚也無索不征稅也挺重囚益其食挺緩存鰥寡振死事老無妻曰鰥老無夫曰寡也皆存之有先人爲死難振起其子孫也游牝别其群執騰駒班馬政是月牝馬懷胎已定故别其群不欲騰駒蹏傷其胎育故執也班告也馬政掌馬官也騰駒騰馬也周禮馬五尺以下曰駒也日短至隂陽爭死生分君子齋戒愼身無躁節聲色薄滋味百官靜事無徑以定晏隂之所成事無徑詳後行當先請也晏隂微隂也鹿角解蟬始鳴夏至鹿角解墮也蟬鼓翼始鳴也半夏生木堇榮半夏草藥也木堇朝榮暮落樹高五六尺其葉與安石榴相似也是月生榮華可用作丞也雒家謂朝生詩云顔如蕣華也禁民無發火役起可以居高明遠眺望登丘陵處臺榭積土四方而高曰臺也臺有室曰榭也順陽宜明也一曰望雲物占氣祥也仲夏行冬令則雹霰傷穀道路不通暴兵來至冬水凍故雹霰傷害五穀也冬氣閉藏又多水雨故道陷壞不通利暴害之兵横來至也行春令則五穀不熟百螣時起其國乃饑行春木王好生育之令故五穀晩熟百螣動股蝗屬也時起害穀故國飢也行秋令則草木零落果實蚤成民殃於疫有覈曰果無覈曰蓏仲夏行秋成熟之令故草木零落果實早成非其時氣故民有疾疫也五月官相樹榆是月陽氣長養故官相相佐也榆說未聞也季夏之月招摇指未昏心中旦奎中心東方蒼龍之宿也是月昏時中於南方奎西方白虎之宿也是月中旦時中於南方也其位中央其日戊己盛德在土黄帝之神治中央也戊己土日也盛德在土土正中央也其蟲蠃其音宫羽落而蠃蟲鱗爲之長宫土也位中央五音之主也律中百鍾其數五百鍾林鍾也是月陽盛隂起生養萬物故曰百鍾其數五五行數土第五也其味甘其臭香土味甘也土臭香也其祀中霤祭先心土用事故祀中霤中霤室中之祭祀后土也心火也用所勝也一曰心土也自用其藏也凉風始至蟋蟀居奥蟋蟀蜻烈趣織也詩云七月在野此日居奥不與經合奥或作壁也鷹乃學習腐草化爲蚈秋節將至鷹自習擊也蚈馬炫也幽冀謂之秦渠蚈讀奚徑之徑也天子衣苑黄乘黄騮服黄玉建黄旗黄順土色也黄謂登飴之登也食稷與牛稷牛皆屬土也服八風水爨柘燧火中宫御女黄色衣黄采其兵劍季夏中央也劍有兩刃諭無所生也一曰諭無所主皆主之也其畜牛朝于中宫是月天子朝於中宫中宫大室乃命漁人伐蛟取鼉登龜取黿漁人掌漁官也漁讀相語之語也蛟鼉黿皆魚屬也鼉可以作鼓詩曰鼉鼓洋洋黿可以作羹也傳曰楚人獻黿於鄭靈公靈公不與公子宋黿羹公子怒染指於鼎嘗之而出是也皆不害人易得故言取蛟有鱗甲能害人難得言伐龜神可决吉凶入宗廟尊之故言登也令滂人入材葦滂人掌池澤官也入材葦供國用也命四監大夫令百縣之秩芻以養犧牲周制天子地方千里分爲百縣縣有四郡郡有四鄙故春秋傳言下大夫受縣上大夫受郡秦初置三十六郡以監縣耳此云百縣者謂周制畿内之縣也四監監四郡大夫也秩常所當出故聚之用養犧性也以共皇天上帝名山大川四方之神宗廟社稷爲民祈福行惠令弔死問疾存視長老行稃鬻厚席蓐以送萬物歸也命婦官染采黼黻文章青黄白黑莫不質良婦人能别五色故染采白與黑爲黼青與赤爲黻黑與赤爲文赤與白爲章質美也良善也以給宗廟之服必宣以明宣徧也眀鮮明也是月也樹木方盛勿敢斬伐不可以合諸侯起土功動衆興兵必有天殃殃罰土潤溽暑大雨時行利以殺草糞田疇以肥土壃是月大暑土潤溽暑濕重也又有時可以殺草爲糞美土疆土分畔者也季夏行春令則穀實解落多風欬民乃遷徙春木王木性墮落陽發多風而行其令故穀實解落民疾病風欬嗽上氣像春陽布散民遷徙者也行秋令則丘隰水潦稼穡不熟乃多女災丘高也隰卑也言高下皆有水潦故殺稼令不熟也隂氣遇差故多女災女災生子不育也行冬令則風寒不時鷹隼蚤摯四鄙入保冬隂蕭殺而行其令故寒風不節鷹隼蚤摯擊四界之民皆入城郭自保守也六月官少内其樹梓六月植稼成熟故官少内也梓說未聞也淮南鴻烈解卷之九
