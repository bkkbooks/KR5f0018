body:
  text: 太尉祭酒臣許愼記上精神訓精者人之氣神者人之守也本其原說其意故曰精神因以題篇古未有天地之時惟像無形惟思也念天地未成形之時無有形生有形故天地成焉窈窈㝠㝠芒芠漠閔澒濛鴻洞莫知其門皆未成形之氣也芒讀玉莽之莽也芠讀𣐀滅之𣐀閔讀子騫之閔澒言項羽之項鴻讀子贛之贛洞讀同游之同也皆無形之象故曰莫知其門也有二神混生經天營地二神隂陽之神也混生俱生也孔乎莫知其所終極孔深貌也滔乎莫知其所止息滔大貌也於是乃别爲隂陽離爲八極剛柔相成萬物乃形離散也八極八方之極剛柔隂陽也煩氣爲蟲煩亂精氣爲人是故精神天之有也而骨骸者地之有也精神入其門而骨骸反其根精神無形故能入天門骨骸有形故反其根歸土也我尚何存言人死各有所歸我何猶常存是故聖人法天順情不拘於俗不誘於人誘猶惑也以天爲父以地爲母隂陽爲綱四時爲紀天靜以清地定以寧萬物失之者死法之者生夫靜漠者神明之宅也虛無者道之所居也是故或求之於外者失之於内有守之於内者失之於外譬猶本與末也從本引之千枝萬葉莫不隨也夫精神者所受於天也而形體者所禀於地也故曰一生二二生三三生萬物一謂道也二曰神明也三曰和氣也或說一者元氣也生二者乾坤也二生三三生萬物天地設位隂陽通流萬物乃生萬物背隂而抱陽沖氣以爲和萬物以背爲隂以腹爲陽身中空虛和氣所行爲隂故腎雙爲陽故心特隂陽與和共生物形君臣以和致太平也故曰一月而膏始育如膏也二月而胅三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形是故肺主目肺象朱雀朱雀火也火外景故主目也腎主鼻腎象龜龜水也水所以通溝也鼻所以通氣也故主鼻也膽主口膽勇者决所以處故主口也肝主耳肝金也金内景故主耳也外爲表而内爲裏開閉張歙各有經紀歙讀脅也故頭之圓也象天足之方也象地有四時五行九解四時春夏秋冬也五行金木水火土也九解謂九十爲一解也一說九解六一之所解合也一說八方中央故曰九解也三百六十六日人亦有四支五藏九竅三百六十六節天有風雨寒暑人亦有取與喜怒故膽爲雲膽金也金石雲之所出故爲雲肺爲氣肺火也故爲氣肝爲風肝木也木爲風生故爲風腎爲雨腎水也因水故雨雨或作電腎水也水爲光故爲電脾爲雷以與天地相參也而心爲之主心土也故爲四行之主也是故耳目者日月也血氣者風雨也日中有蹲烏踆猶蹲也謂三足烏踆讀踆魏之踆而月中有蟾蜍蟾蜍蝦蟆日月失其行薄蝕無光薄者迫也薄讀享薄之薄也風雨非其時毁折生災五星失其行州國受殃五星熒惑太白歲星辰星鎮星也今熒犯角亢則州國受其殃他也餘準此也夫天地之道至紘以大尚猶節其章光愛其神明人之耳目曷能久熏勞而不息乎息止精神何能久馳騁而不既乎既盡是故面氣者人之華也而五藏者人之精也夫面氣能專于五藏專一而不外越則胷腹充而嗜慾省矣胷腹充而嗜慾省則耳目清聽視達矣耳目清聽視達謂之明五藏能屬於心而無乖則㪍志勝而行不僻矣㪍志勝言己之㪍志也僻邪也勝或作遯言㪍或遯去故行正而不邪也㪍志勝而行之不僻則精神盛而氣不散矣精神盛而氣不散則理理則均均則通通則神神則以視無不見以聽無不聞也以爲無不成也是故憂患不能入也而邪氣不能襲襲猶因也亦入故事有求之於四海之外而不能遇遇得或守之於形骸之内心無欲也而不見也故所求多者所得少所見大者所知小夫孔竅者精神之户牖也而氣志者五藏之使候也耳目淫於聲色之樂則五藏摇動而不定矣五藏摇動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣多情欲故神不内守精神馳騁於外而不守則禍福之至雖如丘山無由識之矣丘山諭大識知也使耳目精明玄達而無誘慕氣志虚靜恬愉而省嗜慾五藏定寧充盈而不泄精神内守形骸而不外越則望於往世之前而視於來事之後猶未足爲也猶尚也爲治也豈直禍福之間哉故曰其出彌遠者其知彌少言雖知道故少以言夫精神之不可使外淫也是故五色亂目使目不明不明視而昏也五聲譁耳使耳不聦不聦聽無聞也五味亂口使口爽傷爽病病傷滋味也趣舍滑心使行飛揚滑亂也飛揚不從軌度也此四者天下之所養性也性生也然皆人累也故曰嗜慾者使人之氣越越失而好憎者使人之心勞勞病弗疾去則志氣日耗耗猶亂也夫人之所以不能終其壽命而中道夭於刑戮者何也以其生生之厚言生生之厚者何必極嗜慾淫濫無厭以傷耳目情性故不終其壽命中道夭殞於刑辟之戮也夫惟能無以生爲者則所以脩得生也無以生爲者輕利害之鄉除情性之欲則長得生矣夫天地運而相通萬物緫而爲一緫合也一同也萬物合同統於一道能知一則無一之不知也上一道也下一物也不能知一則無一之能知也譬吾處於天下也亦爲一物矣不識天下之以我備其物與與邪辭也且惟無我而物無不備者乎然則我亦物也物亦物也物之與物也有何以相物也物亦物也何相名爲物也雖然其生我也將以何益言生我自然之道亦當以何益乎其殺我也將以何損損減夫造化者既以我爲坯矣將無所違之矣言既以我爲人無所離之諭不求亦不避也吾安知夫刺炙而欲生者之非或也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也天下茫茫孰知其生我也不疆求已已止也言不惡生也其殺我也不疆求止言不畏死欲生而不事事治憎死而不辭唯義所在故不辭也賤之而弗憎貴之而弗喜人有惡賤己者己不憎也人有尊己者己不喜也隨其天資而安之不極資時也一曰性也極急也諭道人不急求生也吾生也有七尺之形吾死也有一棺之土吾之於比有形之類猶吾死之淪於無形之中也淪入也然則吾生也物不以益衆吾死也土不以加厚吾又安知所喜憎利害其間者乎不知喜生之利不知憎死之害守其正性也夫造化者之攫援物也攫撮也援引也譬猶陶人之埏埴也其取之地而已爲盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也陶人作瓦器治官也頓泥坯取之於地以爲器明人不當惡死死復歸其未生之故耳譬猶瓦器之破而復反於土也與其爲盆盎亦無以異矣無以異於土也夫臨江之鄉居人汲水以浸其園江水弗憎也苦洿之家决洿而注之江洿水弗樂也是故其在江也無以異其浸園也其在洿也亦無以異其在江也道尚空虛貴無形江水大去不可消就易故不憎也窊水小去易小消就不消故不樂也洿水猶澹水也苦猶疾也一說言各自安其處也及其轉易亦無憎樂也是故聖人因時以安其位當世而樂其業業事也夫悲樂者德之邪也而喜怒者道之過也好憎者心之暴也故曰其生也天行似天氣也其死也物化如物之變化也靜則與隂俱閉動則與陽俱開精神澹然無極極盡不與物散而天下自服散雜亂貌自服服於德也故心者形之主也而神者心之寳也形勞而不休則蹶蹶顛精用而不已則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寳之至也半璧曰璜珍玉也夫精神之可寳也非直夏后氏之璜也直猶但也是故聖人以無應有必究其理以虚受實必窮其節恬愉虚靜以終其命是故無所甚䟽而無所甚親抱德煬和以順于天煬炙也向火中炙和氣以順天道也煬讀供養之養與道爲際與德爲鄰際合也鄰比也不爲福始不爲禍先魂魄處其宅而精神守其根死生無變於己故曰至神變動所謂眞人者性合于道也眞人者虛戲黄帝老聃是也故有而若無實而若虛處其一不知其二治其内不識其外治其内守精神也識其外外不好憎也明白太素無爲復樸體本抱神以游于天地之樊樊崖也樊讀麥飯之飯也芒然仿佯于塵垢之外芒讀王莽之莽而消摇于無事之業浩浩蕩蕩乎機械之巧弗載於心是故死生亦大矣而不爲變不爲變者同死生也雖天地覆育亦不與之抮抱矣抮抱猶持著者言不以天地養育萬物故强與持著守其純熱也審乎無瑕而不與物糅瑕猶釁也忤見利欲之貌也能審順之故不與物相雜粈見事之亂而能守其宗見事有者止之亂不能眩惑故能守其宗宗本也若然者正肝膽遺耳目言精神内守也心志專于内通達耦于一一者道也居不知所爲行不知所之言志意無所繫渾然而往逯然而來渾轉行貌逯謂無所爲忽然往來也逯讀謂緑衣之緑也渾讀大珠揮揮之揮也形若槁木心若死灰槁木無氣死灰無熱諭無爲也忘其五藏損其形骸不學而知不視而見不爲而成不治而辯感而應迫而動迫切不得不動然後乃動也不得已而往如光之燿如景之放以道爲紃有待而然紃者决也以道待萬物故曰有待而默默如是抱其太清之本而無所容與無所容與於情欲也而物無能營營惑也一曰亂廓惝而虛清靖而無思慮不勞精神大澤焚而不能熱河漢涸而不能寒也大雷毁山而不能驚也大風晦日而不能傷也言體道之人閉情守虚雖此四者之大不能惑也是故視珍寳珠玉猶石礫也視至尊窮寵猶行客也至尊謂帝王也故曰窮寵也行客猶行路過客視毛嬙西施猶䫏醜也毛嬙西施皆古之美人顛頭也方相氏黄金四目衣赭稀世之䫏貌非生人也但其像耳目䫏醜言極醜也以死生爲一化以萬物爲一方方類也同精於太清之本而游於忽區之旁忽區忽恍無形之區旁也有精而不使者有神而不行言不濁其精不勞其神此之謂也契大渾之樸而立至清之中樸猶質也渾不散之貌也渾讀揮章之揮是故其寢不夢其智不萌其寢不夢神内守也其智不萌無思念也其魄不抑其魂不騰魄隂神魂陽神隂不沈抑陽不飛騰各守其宅反復終始不知其端緒甘暝太宵之宅太宵長夜之中也言其直瞑於大道之處㝠視昭昭矣而覺視于昭昭之宇休息于無委曲之隅而游敖于無形埒之野無委曲之隅無形埒之野㝠㝠無形像之貌也居而無容處而無所言其人居無形容可得見也處無常所其動無形其靜無體無形無體道之容也存而若亡生而若死出入無間役使鬼神言能化也人不與鬼同形而能使之者道也天神曰神人神曰鬼也淪於不測入於無間以不同形相嬗也嬗傳也萬物之形不同道以相傳生也終始若環莫得其倫倫理也道也人莫能得焉此精神之所以能登假于道也假至也上至於道也或作蝦蟆雲氣是故眞人之所游游行若吹呴呼吸吐故内新熊經鳥伸鳧浴蝯躩鴟視虎顧是養形之人也不以滑心經動摇也伸頻伸也若此養形之人導引其神屈伸跳踉是非眞人爲之道也滑亂也言此養形者耳不足以亂眞人之心也使神滔蕩而不失其充充實日夜無傷而與物爲春體道人同日夜諭賊害也無傷無所賊害也與物爲春言養物也則是合而生時干心也若是者合於道生四時化其心也言不干時害物也且人有戒形而無損於心戒備也人形體備具戒或作革革改也言人形骸有改更而作化也心諭神神不損傷也有綴宅而無耗精綴宅身也精神居其宅則生離其宅則死言人雖死精神終不耗滅故曰無耗精也夫癩者趨不變狂者形不虧神將有所遠徙孰暇知其所爲言病癩者形生神在故趨不變也或作介介被甲者禮介者不拜而能趨於步故曰不變也狂體具存故曰不虧但精神散越耳故曰神有所遠徙也故形有摩而神未嘗化者摩滅猶死也神變歸於無形也故曰未嘗化也化猶死也以不化應化千變萬抮而未始有極不化精神也化者形骸死者形爲灰土爲日化也化者復歸於無形也不化者與天地俱生也夫木之死也青青去之也夫使木生者豈木也使木生者天也故曰豈木哉猶充形者之非形也充形者氣也故曰非形也故生生者未嘗死也其所生則死矣生生者道諭道之人若天氣未嘗死也下所生者萬物矣化物者未嘗化也化物者道也道不化故未嘗化也其所化則化矣所化者萬物也萬物有變故曰則化輕天下則神無累矣輕薄天下寵勢之權者許由是也故其精神無留累於物也細萬物則心不惑矣以萬物爲小事而弗欲故心不惑物也齊死生則志不懾矣齊等也不畏義死不樂不義生其志意無所懾懼故曰等也同變化則明不眩矣眩惑衆人以爲虛言吾將舉類而實之實明人之所以樂爲人主者以其窮耳目之欲而適躬體之便也今高臺層榭人之所麗也四方高曰臺加木曰榭麗美也而堯樸桷不斲素題不枅樸采也桷椽也不斲削加宓石之素題也不加采飾故曰不枅者不施欂櫨俱交架也枅讀雞枅或作刮也珍怪竒異人之所美也而堯糲粢之飯藜藿之羹糲粗也粢稷也糲讀賴恃之賴粢讀齊衰之齊文繡狐白人之所好也而堯布衣揜形鹿裘御寒養性之具不加厚而增之以任重之憂任讀任俠之任故舉天下而傳之于舜傳禪若解重負然非直辭讓誠無以爲也此輕天下之具也禹南省方濟于江巡狩爲省省視四方也濟渡也黄龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命於天竭力而勞萬民勞憂也生寄也死歸也何足以滑和人壽蓋不過百年故曰生寄也死滅没化不見故曰歸也滑亂也和適也視龍猶蝘蜓蝘蜓蜥蜴也或曰守宫也東方朔射覆對武帝曰謂爲龍無有角謂爲蛇而有足騤騤脉脉喜縁壁非守宫當晰蜴是也顔色不變龍乃弭耳掉尾而逃逃去禹之視物亦細矣鄭之神巫相壺子林見其徵神在男曰覡在女曰巫巫能占骨法吉凶之氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士壺子弟子也報白也壺子持以天壤言精神天之有也形骸地之有也死自歸其本故曰持天壤矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者必不恤也機諭疾也謂命危殆不旋踵而至猶不恐懼壺子之視死生亦齊齊等子求行年五十有四而病傴僂脊管高于頂𣎅下迫頤兩髀在上子求楚人也僂脊管下竅也高於頂出頭上也𣎅肝胷也迫薄至於頤也兩脾下在上軀正貟也𣎅讀精神𣎅越無之歇也燭營指天燭隂華也營其竅也上指六也燭營讀曰括撮也匍匐自闚於井臨井水自觀照曰偉哉造化者其以我爲此拘拘邪偉哉猶美哉也造化謂天也拘拘好貌此其視變化亦同矣故覩堯之道乃知天下之輕也以其禪舜觀禹之志乃知天下之細也以其視龍猶蝘蜓也原壺子之論乃知死生之齊也論持以天壤也見子求之行乃知變化之同也行匍匐闚於井此之謂也夫至人倚不拔之柱行不關之塗倚於不可拔摇之柱行於不可關閉之塗言無不通禀不竭之府學不死之師無往而不遂往而遂也無至而不通至而通也生不足以挂志死不足以幽神屈伸俛仰抱命而婉轉抱天命而婉轉不離違也禍福利害千變萬紾紾轉孰足以患心若此人者抱素守精蟬蛻蛇解游於太清輕舉獨住忽然入㝠鳳凰不能與之儷儷偕而況斥鷃乎斥澤之鷃雀飛不能出於頃晦諭弱也勢位爵禄何足以槩志也不足以槩至人之志晏子與崔杼盟臨死地而不易其義晏子名嬰字平仲齊大夫也崔杼殺齊莊公盟諸侯曰不唯崔慶是從者如此盟晏子曰嬰所不唯忠於君而利社稷者是從亦如而利之故曰臨死地而不易其義者也殖華將戰而死莒君厚賂而止之不改其行殖𣏌梁也華華周皆齊士也爲君伐莒之隊莒人圍之壯其勇力厚賂而止之不可遂戰而死故曰不改其行也故晏子可迫以仁不可劫以兵晏子不從崔杼之盟將見殺晏子曰句戟何不句夜矛何不摧不撓不義故曰不可劫以兵也殖華可止以義而不可縣以利縣視也言不爲利動也君子義死而不可以死亡恐也彼則直爲義耳而尚猶不拘於物又況無爲者矣堯不以有天下爲貴故授舜公子扎不以有國爲尊故讓位扎吴壽夢之少子延州來季子也讓位不受兄國春秋賢之諸侯之子稱公子也子罕不以玉爲冨故不受寳子罕宋戴公六世之孫西鄉士之子司成樂喜也宋人或得玉以獻子罕子罕不受獻玉者曰以示玉人玉人以爲寳故敢獻之子罕曰我以不貪爲寳子以玉爲寳若子我是皆喪寳也不如人有其寳稽首告曰小人懷璧不可以越鄉納此以請死子罕置諸其里使玉人爲之攻之冨而後使復其所故曰不受寳也務光不以生害義故自投於淵務光湯時隱士也湯代桀讓天下於務光人謂務光曰湯殺其君將歸不義之名於子務光因抱石自投於深淵而死由此觀之至貴不待爵以至德見貴許由務光是也故曰不待爵也至冨不待財以至德見冨若楚狂接輿是也王聞其賢使使者齎金百鎰聘之欲以爲相而不受故曰至富不待財也天下至大矣而以與佗人也堯是身至親矣而棄之淵務光是也外此其餘無足利矣外猶除也利猶食利或作私私獨受也此之謂無累之人無累之人不以天下爲貴矣上觀至人之論深原道德之意以下考世俗之行乃足羞也考觀也故通許由之意金縢豹韜廢矣金縢豹韜周公太公隂謀圖王之書也許由輕天下不受焉用此書爲故曰廢矣延陵季子不受吴國而訟閒田者慙矣訟閒田者虞芮及暴桓公蘇信公是也子罕不利寳玉而爭券契者媿矣務光不污於世而貪利偷生者悶矣故不觀大義者不知生之不足貪也大義死君親之難也不聞大言者不知天下之不足利也大言體道無欲之言今夫窮鄙之社也叩盆拊瓴相和而歌自以爲樂矣窮鄙之社窮巷之小社也盆瓴器叩之有音聲故曰自以爲樂也嘗試爲之擊建鼓撞巨鐘乃性仍仍然知其盆瓴之足羞也仍仍不得志之貌仍仍或作聆聆猶聞也藏詩書脩文學而不知至論之㫖則拊盆叩瓴之徒也夫以天下爲者學之建鼓矣建鼓樂之大者尊勢厚利人之所貪也尊勢窮位厚利重禄使之尤據天下圖而右手刎其喉愚夫不爲由此觀之生尊于天下也天下至大非手所據故不言手也使得據天下之圖籍行其權勢而刎喉殺身雖愚者不肯爲也故曰生貴於天下矣聖人食足以接氣衣足以蓋形適情不求餘接續也蓋覆也餘饒也無天下不虧其性有天下不羡其和虧損也羡過也和適也有天下無天下一實也實等今贛人敖倉予人河水贛賜也敖地名倉者以之常滿倉也在今榮陽縣北飢而餐之渴而飲之其入腹者不過簞食瓢漿簞笥則身飽而敖倉不爲之減也減少腹滿而河水不爲之竭也竭盡有之不加飽無之不爲之饑與守其篅𥫱有其井一實篅𥫱受穀器也井家人之井水也篅讀顓孫之顓也人大怒破隂大喜墜陽巳說在原道也大憂内崩大怖生狂除穢去累漠若未始出其宗乃爲大通清目而不以視清明靜耳而不以聽鉗口而不以言委心而不以慮棄聦明而反太素休精神而棄知故覺而若昧以生而若死昧暗也厭也楚人謂厭爲昧諭無知也終則反本未生之時而與化爲一體言人之未生時欲同死生也故曰與化爲一體也死之與生一體也今夫繇者揭钁臿魚籠土繇役也今河東謂治道爲繇道揭舉也钁斫也臿鏵也青州謂之鏵有刃也三輔謂之𨬞也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽汗也薄迫也氣衝喉也當此之時茠越下則脫然而喜矣茠隂也三輔人謂休華樹下爲茠也楚人樹上大本小如車蓋狀爲越言多蔭也脫舒也言繇人之得小休息則氣得舒故喜也越讀經無重越之越也巖穴之間非直越下之休也病疵瘕者捧心抑腹膝上叩頭抑按也叩或作跔跔讀車軥之軥也踡跼而諦通夕不寐當此之時噲然得卧則親戚兄弟歡然而喜夫脩夜之寧非直一噲之樂也謂得安卧極夜者樂於一噲之樂然不得比長夜之樂也故知宇宙之大則不可劫以死生劫迫知養生之和則不可縣以天下養生之和謂正道也已脩正道不惑故不可示以天下之窮勢而移也知未生之樂則不可畏以死樂其不生之時雖懼之以死不知使之畏死言不畏死知許由之貴于舜則不貪物言不貪利欲之物也墻之立不若其偃也又况不爲墻乎冰之凝不若其釋也又况不爲冰乎不如未爲墻冰之時偃凝能變也自無蹠有自有蹠無自無蹠有從無形至有形也自有跡無從有形至無形也至無形謂死生變化也終始無端莫知其所萌非通于外内孰能無好憎好憎情欲無外之外至大也無内之内至貴也言天無有垠外而能爲之外喻極大也無内言其小小無内而能爲之内道尚微妙故曰至貴也能知大貴何往而不遂大貴謂無内之内也言道至微能出入於無間故曰何往而不遂遂通也衰世凑學不知原心反本凑趨也趨其末不脩稽古之典苟邀名號耳故曰不知原心反本也直雕琢其性矯拂其情以與世交直猶但也雕琢其天性拂戾其本情以合流俗與世人交接也故目雖欲之禁之以度心雖樂之節之以禮趨翔周旋詘節卑拜肉凝而不食酒澄而不飲外束其形内緫其德鉗隂陽之和而迫性命之情故終身爲悲人悲哀也謂衰世之學達至道者則不然理情性治心術養以和持以適樂道而忘賤安德而忘貧性有不欲無欲而不得言其守虚執持不欲之情性則無有所欲而不得也心有不樂無樂而弗爲言其志正不樂邪淫之樂則無有正樂而不爲樂言皆爲之樂也無益情者不以累德而便於性者不以滑滑亂故縱體肆意而度制可以爲天下儀縱放也肆緩也儀法今夫儒者不本其所以欲而禁其所欲本所以欲謂正性恬漠也所欲謂情欲驕奢權勢也不原其所以樂而閉其所樂是猶决江河之源而障之以手也障蔽也言不能揜也夫牧民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲脩生壽終豈可得乎夫顔回季路子夏冉伯牛孔子之通學也然顔淵夭死季路葅於衛顔淵十八而卒孔子曰回不幸短命死矣故曰夭也季路仕於衛衛君父子爭國季路死孔子曰若由不得其死然言不得以壽命終也故曰然衛人醢之以爲醬故曰葅子夏失明冉伯牛爲厲子夏學於西河哭其子而失明曾子哭之伯牛有疾孔子自牖執其手曰斯人也而有斯疾也此皆迫性拂情而不得其和也故子夏見曾子一臞一肥曾子問其故曰出見富貴之樂而欲之入見先王之道又說之兩者心戰故臞先王之道勝故肥道勝不感縣於富貴精神内守無思慮故肥也推此志非能貪富貴之位不便侈靡之樂此志子夏之志直宜迫性閉欲以義自防也宜猶但也雖情心鬱殪形性屈竭猶不得已自强也故莫能終其天年義以自防故情心鬱壹不通形性屈竭也以不得止而自勉强故無能終其天年之命若夫至人量腹而食度形而衣容身而游適情而行餘天下而不貪委萬物而不利委棄也不以萬物爲利矣處大廓之宇游無極之野廓虚也極盡也登太皇馮太一玩天地于掌握之中太皇天也馮依也太一天之形神也玩畀也夫豈爲貧富肥臞哉故儒者非能使人弗欲而能止之言不能使人無情欲也己雖欲之能以義自止也非能使人勿樂而能禁之言不能使人無樂富貴能以禮自禁制之論語曰不義而富且貴於我如浮雲也夫使天下畏刑而不敢盜豈若能使無有盜心哉越人得髯蛇以爲上肴中國得而棄之無用髯蛇大蛇也其長數丈厚以爲上肴故知其無所用貪者能辭之不知其無所用廉者不能讓也夫人主之所以殘亡其國家損棄其社稷身死於人手爲天下笑未嘗非爲非欲也夫仇由貪大鍾之賂而亡其國仇由近晋之狄國也晋智襄子伐之先賂以大鍾仇由之君貪開道來受鍾爲和親智伯因是以兵滅取其國也仇讀仇餘之仇也虞君利垂棘之璧而擒其身晋大夫荀息謀於獻公以屈産之馬垂棘之璧假道於虞以伐虢虞公貪璧馬假晋道既滅虢還館於虞遂襲虞滅之君死位曰滅故曰擒其身也獻公豔驪姬之美而亂四世晋獻公伐驪戎得驪姬及其娣好色曰美好體曰艷獻公嬖之生奚齊其娣生卓子遂爲殺太子申生而立奚齊殺適立庶故曰亂四世者奚齊卓子惠公夷吾懷公圉也桓公甘易牙之和而不以時葬齊桓好味易牙蒸其首子而進之遂見信用專任國政亂嫡庶桓公卒五公子爭立六十日而殯蟲流出户五月不葬故曰不以時葬也胡王淫女樂之娱而亡上地胡蓋西戎之君也秦穆公欲伐之先遺女樂以淫其志其臣由余諫不從去戎來適秦秦伐得其上地上地美地也使此王君者適情辭餘以已爲度不隨物而動豈有此大患哉五君仇由虞公晋獻齊桓胡王也適猶節也動猶惑也故射者非矢不中也學射者不治矢也不治矢言不爲而得用之然則爲者不得用之御者非轡不行學御者不爲轡也知冬日之箑夏日之裘無用於己則萬物之變爲塵埃矣故以湯止沸沸乃不止誠知其本則去火而已矣箑扇也楚人謂扇爲箑已止也淮南鴻烈解卷之十二
