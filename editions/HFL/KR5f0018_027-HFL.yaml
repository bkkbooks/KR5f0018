body:
  text: 太尉祭酒臣許愼記上脩務訓脩勉務趍聖人趍時冠危弗顧履遺不取必用仁義之道以濟萬民故曰脩務因以題篇或曰無爲者寂然無聲漠然不動引之不來椎之不往如此者乃得道之像或人以爲先爲術如此乃可謂爲得道之法也吾以爲不然嘗試問之矣以爲不如或人之言嘗問之於聖人矣若夫神農堯舜禹湯可謂聖人乎有論者必不能廢言五人可謂聖人邪有論者何能廢其道也以五聖觀之則莫得無爲明矣言不得無爲也古者民茹草飲水采樹木之實食蠃蛖之肉時多疾病毒傷之害害患也於是神農乃始教民播植五穀菽麥黍稷稻也相土地宜燥濕肥墝高下相視也燥乾也墝埆高陵也下濕也嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而遇七十毒此神農之爲也堯立孝慈仁愛使民如子弟言雖役使其民必加仁愛遇之如己之子弟也西教沃民東至黑齒北撫幽都南道交趾沃民西方之國黑齒東方之國隂氣所聚故曰幽都今鴈門以北是交趾南方之國四者遠裔不覩聖人之化故親往行教導撫之以仁義也放讙兜於崇山竄三苗於三危放棄也讙兜堯佞臣也南極之山三苗蓋謂帝鴻氏之裔子渾敦少昊氏之裔子窮竒縉雲氏之裔子饕餮三族之苗裔故謂之三苗三危西極之山名一曰放三苗國民於三危也流共工於幽州殛鯀於羽山堯時有共工官鯀禹父爲治水績用不成堯殛之羽山東極之山是則堯之爲洪範曰鯀則殛死然則渾敦窮竒饕餮生至四裔可知也舜作室築墻茨屋辟地樹穀令民皆知去巖穴各有家室南征三苗道死蒼梧三苗之國在彭蠡舜時不服故往征之書曰舜陟方乃死時舜死蒼梧葬於九嶷之山在蒼梧馮乘縣東北零陵之南千里也禹沐浴霪雨櫛扶風禹勞力天下不避風雨以久雨爲沐浴扶風以疾風爲梳𣗽也决江䟽河鑿龍門闢伊闕决巫山令江水得東過故言决疏道東注于海故言疏龍門本有水門鯆魚遊其中上行得上過者便爲龍故曰龍門禹闢而大之故言鑿伊闕山名禹開截山體令伊水得北過入雒水故言闕也脩彭蠡之防乘四載隨山栞木平治水土定千八百國脩治也彭蠡澤名在豫章彭澤縣西防隄四載山行用蔂水行用舟陸行用車澤行用蕝隨循也栞石刊識之四海之内凡萬國禹定千八百國是禹之所爲也湯夙興夜寐以致聦明輕賦薄歛以寬民氓早起夜寐以思萬事能得其精故曰以致聦明寬猶富野民曰氓也布德施惠以振困窮弔死問疾以養孤孀幼無父曰孤孀寡婦雒家謂寡婦曰孀婦百姓親附政令流行乃整兵鳴條困夏南巢譙以其過放之歷山鳴條地名南巢今盧江居巢是譙責讓其罪過於歷山歷山益歷陽之山是湯之爲也此五聖者天下之盛主勞形盡慮爲民興利除害而不懈懈墮也奉一爵酒不知於色言其輕也挈一石之尊則白汗交流言其重也又況贏天下之憂而海内之事者乎其重於尊亦遠也遠猶多也且夫聖人者不恥身之賤而愧道之不行不憂命之短而憂百姓之窮是故禹之爲水以身解於陽眄之河爲治水解禱以身爲質解讀解除之解陽眄河在秦地湯旱以身禱於桑山之林桑山之林能興雲致雨故禱之聖人憂民如此其明也而稱以無爲豈不悖哉悖繆也且古之立帝王者非以奉養其欲也聖人踐位者非以逸樂其身也逸安也爲天下强掩弱衆暴寡詐欺愚勇侵怯懷知而不以相教積財而不以相分故立天子以齊之齊等一同也爲一人聦明而不足以遍照海内故立三公九卿以輔翼之輔正也翼佐也絶國殊俗僻遠幽間之處不能被德承澤故立諸侯以教誨之絶遠殊異能猶及也立置以爲遠國君是以地無不任時無不應官無隱事國無遺利言官無隱病失職之事以利民故無所遺亡也所以衣寒食饑養老弱而息勞倦也若以布衣徒步之人觀之則伊尹負鼎而干湯伊尹處於有莘之野執鼎俎和五味以干湯欲其調隂陽行其道詩云實惟阿衡實左右商王是也吕望鼓刀而入周吕望姜姓四嶽之後四嶽佐禹治水有功賜姓曰姜氏有吕望其後居殷乃屠於朝謌故曰鼓刀入周自殷而往爲文王太師佐武王伐紂成王封之於齊也伯里奚轉鬻伯里奚虞臣自知虞公不可諫而去轉行自賣於秦爲穆公相而秦興也管仲束縛管仲傅相齊公子糾不死子糾之難而奔魯束縛以歸齊桓公用之而霸也孔子無默突墨子無煖席默言其突竈不至於黑坐席不至於温歷行諸國汲汲施行道也是以聖人不高山不廣河蒙恥辱以干世主非以貪禄慕位欲事起天下利而除萬民之害聖人蓋謂禹稷不以山爲高不以河爲廣言必踰渡之事治也蓋聞傳書曰神農憔悴堯瘦臞舜黴黑禹胼胝由以觀之則聖人之憂勞百姓甚矣甚重也故自天子以下至於庶人四肢不動思慮不用事治求贍者未之聞也夫地勢水東流人必事焉然後水潦得谷行水勢東流人必事而通之使得循谷而行也禾稼春生人必加功焉故五穀得遂長加功謂是藨是蓘耘耔之也遂成也聽其自流待其自生則鯀禹之功不立而后稷之智不用若吾所謂無爲者私志不得入公道嗜欲不得枉正術循理而舉事因資而立權自然之勢而曲故不得容者曲故巧詐政事而身弗伐伐自矜大其善功立而名弗有不名有其功也非謂其感而不應攻而不動者若夫以火熯井以淮灌山此用己而背自然故謂之有爲火不可以熯井淮不可以灌山而以用之非其道故謂之有爲也若夫水之用舟沙之用肆泥之用輴山之用蔂夏瀆而冬陂因高爲田因下爲池此非吾所謂爲之此皆因其宜用之故曰非吾所謂爲言無爲聖人之從事也殊體而合于理殊異體行理道也其所由異路而同歸其存危定傾若一志不忘于欲利人何以明之昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趍而十日十夜足重繭而不休息裂衣裳裹足至於郢見楚王自從趍走郢楚都也今南郡江陵北里郢是也曰臣聞大王舉兵將攻宋計必得宋而後攻之乎忘其苦衆勞民頓兵剉銳負天下以不義之名而不得咫尺之地猶且攻之乎頓罷剉辱折銳精攻無罪之宋故負天下以不義之名猶且必攻也王曰必不得宋又且爲不義曷爲攻之墨子曰臣見大王之必傷義而不得宋王曰公輸天下之巧士作雲梯之械設以攻宋曷爲弗取公輸魯般號時在楚雲梯攻城具高長上與雲齊故曰雲梯械器設施也墨子曰令公輸設攻臣請守之於是公輸般設攻宋之械墨子設守宋之備九攻而墨子九却之弗能入入猶下也於是乃偃兵輟不攻宋輟止也段干木辭禄而處家魏文侯過其閭而軾之閭里周禮二十五家爲閭軾伏軾敬有德曲禮曰軾視馬尾又曰兵車不軾尚威武也其僕曰君何爲軾文侯曰段干木在是以軾其僕曰段干木布衣之士君軾其閭不已甚乎文侯曰段干木不趍勢利懷君子之道隱處窮巷聲施千里聲名也施行也寡人敢勿軾乎勿無也段干木光于德寡人光于勢段干木富于義寡人富于財勢不若德尊財不若義高干木雖以己易寡人不爲使干木之己賢易寡人之尊不肯爲之矣吾日悠悠慙于影影形影也子何以輕之哉其後秦將起兵伐魏司馬庾諫曰段干木賢者庾秦大夫也或作唐其君禮之天下莫不知諸侯莫不聞舉兵伐之無乃妨於義乎於是秦乃偃兵輟不攻魏夫墨子跌蹏而趍千里以存楚宋跌疾行也蹏趍走也段干木闔門不出以安秦魏夫行與止也其勢相反而皆可以存國此所謂異路而同歸者也異路謂行與止也同歸謂歸於存國今夫救火者汲水而趍之或以甕瓴或以盆盂其方員銳橢不同盛水各異其於滅火鈞也故秦楚燕魏之謌也異轉而皆樂轉音聲也九夷八狄之天也殊聲而皆悲一也東方之夷九種北方之狄八類夫謌者樂之徵也哭者悲之效也徵應也效驗也憤於中則應於外憤發也故在所以感感發也夫聖人之心日夜不忘于欲利人其澤之所及者效亦大矣效功也世俗廢衰而非學者多非者不善之辭故曰非也人性各有所脩短若魚之躍若鵲之駮此自然者不可損益推此楑之故不欲學吾以爲不然夫魚者躍鵲者駮也猶人馬之爲馬筋骨形體所受於天不可變以此論之則不類矣言人自爲人馬自爲馬不相類也夫馬之爲草駒之時跳躍揚蹏翹尾而走人不能制馬五尺以下爲駒放在草中故曰草駒翹舉也制禁也齕咋足以噆肌碎骨蹶蹏足以破盧陷匈咋齧也噆穿也及至圉人擾之良御教之圉養馬官擾順也掩以衡扼連以轡銜則雖歷險壍弗敢辭故其形之爲馬馬不可化其可駕御教之所爲也馬聾蟲也蟲喻無知也而可以通氣志猶待教而成又況人乎且夫身正性善發憤而成帽憑而爲義帽憑盈滿積思之貌性命可說不待學問而合於道者堯舜文王言有善性命可教說者聖人不學而知之者堯舜文王詩云不識不知順帝之則是也沉䤄耽荒不可教以道不可喻以德嚴父弗能正賢師不能化丹朱商均也丹朱堯子商均舜子弗能化詩云誨爾諄諄聽我邈邈是其類也曼頰皓齒形夸骨佳不待脂粉芳澤而性可說者西施陽文也曼頰細理也夸弱佳好性猶姿也西施陽文古之好女者也啳𦝢哆噅籧蒢戚施雖粉白黛黑弗能爲美者嫫母仳倠也啳讀權衡之權急氣言之𦝢讀夔哆讀大口之哆噅讀楚籧氏之籧籧蔭偃戚施僂皆醜嫫母仳倠古之醜女嫫讀如模範之模仳讀人得風病之靡倠讀近虺仳倠一說讀曰莊維也夫上不及堯舜下不及商均美不及西施惡不若嫫母此教訓之所喻也喻導也而芳澤之施且子有弑父者然而天下莫䟽其子何也愛父者衆也儒有邪辟者而先王之道不廢何也其行之者多也今以爲學者之有過而非學者則是以一飽之故絶穀不食以一蹪之難輟足不行惑也蹪躓楚人謂躓也言以飽而不食蹪而不行喻丹朱商均不可教化而非學故謂之惑也今日良馬不待册錣而行駑馬雖兩錣之不能進爲此不用册錣而御則愚矣爲良馬能自走不復用垂得駑馬無以行之故曰愚也夫怯夫操利劍擊則不能斷刺則不能入及至勇武攘捲一擣則摺脇傷幹武士也楚人謂士爲武摺折也爲此棄干將鏌邪而以手戰則悖矣所爲言者齊於衆而同於俗今不稱九天之頂則言黄泉之底九天八方中央故曰九頂極高底極卑也是兩末之端議何可以公論乎公平也夫橘柚冬生而人曰冬死死者衆薺麥夏死人曰夏生生者衆多江河之回曲亦時有南北者而人謂江河東流攝提鎮星日月東行而人謂星辰日月西移者以大氐爲本歲星在寅曰攝提鎮星中央士星鎮四方故曰鎮氐猶更言其餘星辰皆西行故曰大氐爲本也胡人有知利者而人謂之駤駤忿戾惡理不通達胡人性皆然亦舉多駤讀似質緩氣言之者在舌頭乃得越人有重遲者而人謂之訬訬輕利急亦以多者言訬讀燕人言躁操善趍者謂之訬同也以多者名之若夫堯眉八彩九竅通洞而公正無私堯母慶都蓋天帝之女寄伊長孺家年二十無夫出觀於河有赤龍負圖而至曰赤龍受天下之圖有人赤衣光面八彩鬢鬚長赤帝起成元寳奄然隂雲赤龍與慶都合而生堯帝如圖故眉有八彩之色洞達聖道也無私無所愛憎也一言而萬民齊一言仁言齊無倦舜二瞳子是謂重明言能知人舉十六相作事成法出言成章作事爲後世所法論語舜有天下焕乎其有文章巍巍乎此之謂也禹耳參漏是謂大通參三漏穴也大通天下摧下滯之物興利除害䟽河决江傳曰劉子觀於雒汭云微禹吾其魚乎故曰興利除害也文王四乳是謂大仁乳所以養人故曰大仁也天下所歸百姓所親文王爲西伯遭紂之虐三分天下而有二受命而主故百姓所親也臯陶馬喙是謂至信喙若馬口出言皆不虛故曰至信决獄明白察於人情察猶知也禹生於石禹母脩己感石而生禹坼胷而出契生於卵契母有城氏之女簡翟吞燕卵而生契愊背而出詩云天命玄鳥降而生商是也史皇産而能書史皇蒼頡生而見鳥迹知著書故曰史皇或曰頡皇羿左臂脩而善射羿有窮之君也若此九賢者千歲而一出猶繼踵而生以千歲爲近明聖賢之難今無五聖之天奉堯舜禹湯周文王也奉助也四俊之才難才千人爲俊謂臯陶稷契史皇欲棄學而循性是謂猶釋船而欲展足水也展履也夫純釣魚腸劒之始下型擊則不能斷刺則不能入純釣利劒名魚腸文理屈碎若魚腸者良劒也型或作盧也及加之砥礪摩其鋒㓵則水斷龍舟龍舟大舟陸剸犀甲言利也明鏡之始下型矇然未見形容及其粉以玄錫摩以白旃鬢眉毛可得而察於摩微細察見夫學亦人之砥錫也而謂學無益者所以論之過以用也過非也知者之所短不若愚之所脩短謂缺脩長明有所不足謂愚有所不違也賢者之所不足不若衆人之有餘衆凡也何以知其然夫宋畫吴治刻刑鏤法亂脩曲出宋人之畫吴人之治刻鏤刑法亂理之文脩飾之功曲出於不意也其爲微妙堯舜之聖不能及及猶如也蔡之幼女衛之稚質蔡國今南陽胡曲衛故在河内後徙頓丘今東陽郡稚質亦少女梱纂組雜竒彩抑黑質揚赤文梱叩核纂織組邪文如今之短没黑耳亦言其巧也禹湯之智不能逮言不能及二國之女巧也夫天之所覆地之所載包於六合之内託於宇宙之間隂陽之所生血氣之精含牙戴角前爪後距奮翼攫肆跂行蟯動之蟲喜而合怒而鬪攫搏也肆極跂讀車跂之跂蟯讀饒多之饒見利而就避害而去其情一也雖所好惡其與人無以異一同人亦避害就利有不相如故言雖也然其爪牙雖利筋骨雖彊不免制於人者知不能相通才力不能相一也各有其自然之勢勢力也無禀受於外無有學問受謀慮於外以益其思也故力竭功沮竭盡也沮敗也夫鴈順風以愛氣力御蘆而翔以備矰弋未秀曰蘆已秀曰葦矰矢弋繳御蘆所以令繳不得裁其翼也螘知爲垤貛貉爲曲穴虎豹有茂草野彘有艽莦槎櫛堀虛連比以像宫室隂以防雨防衛也景以蔽日蔽擁也此亦鳥獸之所以知求合於其所利今使人生於辟陋之國辟遠陋鄙小也長於窮櫩漏室之下長無兄弟少無父母目未嘗見禮節耳未嘗聞先古先古謂聖賢之道也獨守專室而不出門專室小室使其性雖不愚然其知者必寡矣昔者蒼頡作書容成造曆容成黄帝臣造作曆知日月星辰之行度胡曹爲衣易曰黄帝垂衣裳胡曹亦黄帝臣也后稷耕稼詩曰携厥百穀儀狄作酒見世本奚仲爲車傳曰奚仲爲夏車正封於薛也此六人者皆有神明之道聖智之迹故人作一事而遺後世非能一人而獨兼有之各悉其知貴其所欲達達通也遂爲天下備備猶用也今使六子者易事而明弗能見者何見猶知言人各有所不能萬物至衆而知不足以奄之奄蓋之也周室以後無六子之賢賢才也而皆脩其業當世之人無一人之才而知其六賢之道者何教順施續而知能流通施設續猶傳也由此觀之學不可已明矣已止也今夫盲者目不能别晝夜分白黑然而搏琴撫弦參彈復徽攫援摽拂手若薎蒙不失一弘參彈并弦復徽上下手攫援掇摽拂敷薎蒙言其疾學之習徽讀繀車之繀攫讀屈直木令句欲句此木之句摽讀刀標之標也使未嘗鼓瑟者雖有離朱之明攫掇之捷猶不能屈伸其指離朱黄帝時人明目能見百步之外秋毫之末攫掇亦黄帝時捷疾者也何則服習積貫之所致謂上不失一弦故弓待擏而後能調劍待砥而後能利擏矯弓之材讀曰敬砥礪石玉堅無敵鏤以爲獸首尾成形礛諸之功礛諸治玉之石詩云他山之石可以爲錯是礛讀廉氏之廉一曰濫也木直中繩楺以爲輪其曲中規規員之也隱括之力唐碧堅忍之類猶可刻鏤揉以成器用唐碧石似玉皆堅鑽之物又況心意乎且夫精神滑淖纖微倏忽變化與物推移椎移猶轉易也雲蒸風行在所設施施用君子有能精摇摩監砥礪其才自試神明覽物之博通物之壅觀始卒之端見無外之境所觀以遠以逍遥仿佯於塵埃之外塵埃猶窈㝠也超然獨立卓然離世不群於俗此聖人之所以游心若此而不能閑居靜思鼓琴讀書追觀上古及賢大夫學問講辯日以自娱講論辯别然否自娱樂蘇援世事分白黑利害蘇猶索援别分别白黑知利害之所在籌策得失以觀禍福籌策曰視非常曰觀設儀立度可以爲法則窮道本末究事之情窮盡也究極也立是廢非明示後人是善也非惡也死有遺業生有榮名遺餘功業榮寵也如此者人才之所能逮逮及也然而莫能至焉者偷慢懈惰多不暇日之故偷薄慢易薄易之人懈惰於庶幾多言而不暇日而不學惟此故也夫瘠地之民多有心者勞也心向義之心也沃地之民多不才者饒也饒逸也由此觀之知人無務不若愚而好學自人君公卿至于庶人不自彊而功成者天下未之有也詩云日就月將學有緝熙于光明此之謂也詩頌敬之篇言爲善者日有所成就月有所奉行當學之是明此勉學之謂也名可務立功可彊成務事也彊勉也故君子積志委正以趣明師師所以取法則勵節亢高以絶世俗不群於衆也何以明之昔者南策疇恥聖道之獨亡於己身淬霜露欶蹻趹跋涉山川冒蒙荆棘淬浴欶猶著蹻履趹趣不從蹊遂曰跋涉故觸犯荆棘南姓策疇字蓋魯人也百舍重跰不敢休息百里一舍跰足胝生南見老聃受教一言老聃老子字伯陽楚苦縣賴鄉曲里人今陳國東瀨鄉有祠存據在魯南故曰南見老子聃一言道合也精神曉泠鈍聞條達曉明泠猶了絶聞猶純恪欣然七日不食如饗太牢丈夫七日不食則斃故以七日爲極三牲具曰太牢也是以明照四海名施後世施延也達畧天地達通也略猶數也察分秋毫察明稱譽葉語至今不休葉世言策疇見稱譽世傳相語至今不止此所謂名可彊立者吴與楚戰吴王闔閭與楚昭王戰於百舉莫囂大心撫其御之手曰今日距彊敵犯白刃蒙矢石莫大也囂衆也主大衆之官楚卿大夫心楚成得臣子玉之孫彊謂吴蒙冒石矢弩也一曰發石也戰而身死卒勝民治全我社稷可以庶幾乎庶幾得安遂入不返决腹斷頭不旋踵運而死言入吴不旋踵因軌而死勇然不如申包胥之功也申包胥竭筋力以赴嚴敵伏尸流血不過一卒之才在車曰士步曰卒而此者一人之功也不如約身卑辭求救於諸侯申包胥楚大夫與伍子胥友者子胥之亡謂申包胥曰我必覆楚國申包胥曰子能覆之我必興之及昭王敗於伯舉奔隨申包胥如秦乞師故曰不如求救於諸侯於是乃羸糧跣走跋涉谷行羸裏一曰橐跣走不及著履不蹊隧爲跋涉上峭山赴深谿游川水峭山高山深谿大壑遊渡自楚至秦所經由也犯津關獵蒙籠蹷沙石蹠達膝曾繭重胝七日七夜至於秦庭犯觸觸津關則捲獵蒙籠之山一曰葛蔂所蒙籠言非人所由蹷僵蹠足達穿幽通賦曰申重繭以存荆者也鶴跱而不食晝呤宵哭面若死灰顔色黑鶴峙時立言不動不食黑其面色欲速則秦救也涕流交集以見秦王秦王秦哀公也曰吴爲封豨脩蛇蠶食上國虐始於楚封脩皆大豨蛇喻貪蠶食盡無餘上國中國虐害始先言將以次至秦也寡君失社稷越在草茅寡君昭王越遠在於隨矣百姓離散夫婦男女不遑啓處遑暇也啓跪也處安使下臣告急秦王乃發車千乘步卒七萬屬之子虎秦大夫子車鉞虎傳曰卒車五百乘以救楚凡三萬七千五伯人此曰千乘步卒七萬不合也踰塞而東塞函谷一曰武關塞也擊吴濁水之上果不破之以存楚國濁水蓋江水傳曰敗吴于公壻之谿公壻之溪楚地烈藏廟堂著於憲法此功之可彊成者也烈功憲法也夫七尺之形心致憂愁勞苦膚之知痛疾寒暑人情一也一同也聖人知時之難得務可趣也苦身勞形焦心怖肝不避煩難不違危殆佈肝猶戒懼蓋聞子發之戰子發楚威王之將也進如激矢合如雷電解如風雨員之中相方之中矩破敵陷陳莫能壅御澤戰必克克勝也攻城必下彼非輕身而樂死務在於前遺利於後故名立而不墮名武中寧國之名墮廢也此自强而成功者也成猶立也是故田者不强囷倉不盈强力也官御不厲心意不精精專將相不强功烈不成烈業也侯王懈惰後世無名世猶身也詩云我馬唯騏六轡如絲詩云小雅皇皇者華之篇六轡四馬如絲言調匀也載馳載驅周爰諮謨以言人之有所務也諮難也詩言當馳驅以忠信往謨難事之不自專己愼之至乃聖人之務也通於物者不可驚怪通達言怪物不能驚之也喻於道者不可動以竒喻明非常曰竒察於辭者不可燿以名燿眩名虚實之名也審於形者不可遯以狀遯欺也狀貌也世俗之人多尊古而賤今故爲道者必託之於神農黄帝而後能入說說言也言爲二聖所作乃能入其說於人人乃用之亂世闇主高遠其所從來因而貴之爲學者蔽於論而尊其所聞相與危坐而稱之正領而誦之此見是非之分不明誦之喻若影之隨形響之應聲效言之不知其理故曰不眀也夫無規矩雖奚仲不能以定方圓無準繩雖魯般不能以定曲直是故鍾子期死而伯牙絶弦破琴知世莫賞也鍾官氏子通稱期名達於音律伯牙楚人覩世無有知音若子期故絶弦破其琴也惠施死而莊子寢說言見世莫可爲語者也惠施宋人仕於梁爲惠王相莊子名周宋蒙縣人作書三十三篇爲道家之言也夫項託七歲爲孔子師孔子有以聽其言也以年之少爲閭丈人說救敲不給何道之能明也閭里敲横丈人長老年少爲之說事老人敲其頭自救不暇何能明道也昔者謝子見於秦惠王惠王說之以問唐姑梁唐姑梁曰謝子山東辯士固權說以取少主謝姓也子通稱也唐姓名姑梁秦大夫言謝子辯士也常發其巧說以取少主之權少主謝子之君一曰謂惠王惠王秦孝公之子也惠王因藏怒而待之後日復見逆而弗聽也聽猶說是也非其說異也所以聽者易易革也夫以徵爲羽非絃之罪罪在聽也以甘爲苦非味之過過在嘗也楚人有烹猴而召其鄰人以爲狗羹也而甘之召猶請也後聞其猴也據地而吐之盡寫其食此未始知味者也喻以惠王初說謝子唐姑梁間之因藏怒也邯鄲師有出新曲者託之李竒師樂師瞽也出猶作也新曲非雅樂也李竒古之名倡也諸人皆爭學之諸衆也後知其非也而皆棄其曲此未始知音者也知非李竒所作而皆棄之故未始知也鄙人有得玉璞者喜其狀以爲寳而藏之鄙人小人以示人人以爲石也因而棄之此未始知玉者也故有符於中則貴是而同今古符驗驗者有明也是實也言中心能明實是者則貴之古今一也故曰同也無以聽其說則所從來者遠而貴之耳言無中心眀驗無以聽人說之是否但見其言遠古之事便珍貴之耳近世之事有可貴者亦有不貴之也此和氏之所以泣血於荆山之下荆人和氏得美玉之璞於荆山之下獻楚武王武王以爲石刖其右趾及文王即位復獻之如是乃泣血證之爲寳文王曰先王輕於刖足而重剖石遂爲剖之畢如和言因號爲和氏之璧也今剱或絶側羸文齧缺卷銋而稱以頃襄之剱則貴之爭帶之絶無側羸無文齧齒卷銋鈍弊無刃託之爲楚頃襄王所服剱故貴人慕而爭帶之一說頃襄王善爲劍人名銋讀豐之稔也琴或撥刺枉橈闊解漏越而稱以楚莊之琴側室爭鼓之撥刺不正枉撓曲弱闊解壞漏越音聲散託之爲楚莊王琴則側室之寵人爭鼓之也側室或作廟堂也苗山之鋌羊頭之銷雖水斷龍舟陸剸兕甲莫之服帶苗山楚山利金所出羊頭之銷白羊子刀雖有利用無所稱託故無人服帶也山桐之琴澗子之腹雖鳴廉隅脩營唐牙伐山桐以爲琴谿澗之梓以爲腹言其鳴音聲有廉隅脩營音清凉聲和調唐猶堂營讀營正急之營也通入則不然服劍者期於銛利而不期於墨陽莫邪通人通於事類不然不如衆人貴遠慕聲不期得銛利而已墨陽莫邪美劍名也乘馬者期於千里而不期於驊騮緑耳鼓琴者期於鳴廉脩營而不期於濫脇號鍾濫脇音不和號鍾高聲非耳所及也誦詩書者期於通道畧物而不期於洪範商頌畧達物事也頌或作容聖人見是非若白黑之於曰辯辯别也清濁之於耳聽清商也濁宫也衆人則不然然如是也中無主以受之譬若遺腹子之上隴以禮哭泣之而無所歸心自不識父之顔心不哀也故夫孿子之相似者唯其母能知之知獨别也玉石之相類者唯良工能識之卞和是也書傳之微者唯聖人能論之微妙論叙也今取新聖人書名之孔墨則弟子句指而受者必衆矣眩於孔墨之名而或不知其實非孔墨所作也故美人者非必西施之種通士者不必孔墨之類曉然意有所通於物故作書以喻意以爲知者也喻明也作書者以明古今傳代之事以爲知者施也誠得清白之士執玄鑑於心照物明白不爲古今易意玄水也鑑鏡也皆以自見能自易故能見物言反易也攄書明指以示之攄舒也指書雖闔棺亦不恨矣朝聞道夕死可矣何恨之有乎昔晋平公令官爲鍾鍾成而示師曠曰鍾音不調平公晋悼公之子彪師曠識音故知其不調也平公曰寡人以示工工皆以爲調而以爲不調何也而汝也師曠曰使後世無知音者則已若有知音者必知鍾之不調故師曠之欲善調鍾也以爲後之有知音者也喻上句作書爲知音施也三代與我同行五伯與我齊智我謂作書彼獨有聖智之實我曾無有閭里氣聞窮巷之知者何曾則也我則無聲名宣聞於閭里窮巷之人無有知我之賢何故也彼并身而立節我誕謾而悠忽彼謂三代五伯并身同行而五伯也立節我謂誕謾倨傲悠悠忽遊蕩輕物今夫毛墻西施天下之美人若使人銜腐鼠蒙蝟皮衣豹裘帶死蛇則布衣韋帶之人過者莫不左右睥睨而掩鼻言雖有美姿人惡聞其臭故睥睨掩其鼻孟子曰西施之蒙不潔則人皆掩鼻而過之是也嘗試使之施芳澤正娥眉設笄珥衣阿錫曳齊紈笄婦人首飾珥頊阿細穀錫細布紈素齊所出粉白黛黑佩玉環榆步體摇動撓足行雜芝若籠蒙目視雜佩芝若香草籠蒙猶妙昏目視也冶由笑目流眺冶猶笑巧笑詩云巧笑倩兮是也流眺精盻詩云美目盻兮是也口曾撓竒牙出𩉇摇曾則也掩弱也口則弱撓冒若將笑故好齒出詩云齒如瓠犀是也𩉇頰邊文婦人之媚也則雖王公大人有嚴志頡頏之行者無不憚悇癢心而悅其色矣憚悇貪欲癢心煩悶也憚悇讀慘探之探也今以中人之才蒙愚惑之智被汙辱之行無本業所脩方術所務焉得無有睥面掩鼻之容哉今鼓舞者鼓舞或作鄭舞鄭者鄭袖楚懷王之幸姬善謌攻舞因名鄭舞一說鄭重攻舞也繞身若環車輪倒也曾撓摩地扶於猗那動容轉曲曾撓摩地鼓車平解扶轉周旋更曲意更爲之便媚擬神擬象也身若秋藥被風藥白芷香草被風言其弱髮若結旌屈而復舒騁馳若騖騁馳言其疾也木熙者舉梧檟據句枉熙戲舉授也梧桐檟梓皆大木也句枉曲枝也枉或作掘也蝯自縱好茂葉言舞者若蝯不復踐地好上茂木之枝葉龍天矯燕枝拘言纘藴若蟠龍燕枝拘言其著樹如燕附枝也援豐條舞扶䟽援持持大條以木舞扶䟽槃跚龍從鳥集搏援攫肆薎蒙踊躍言其舞體如龍附雲如鳥集山持捷大極其巧薎蒙踊躍明其疾也且夫觀者莫不爲之損心酸足觀者見其微妙危險皆爲之損動中心酸酢其足也彼乃始徐行微笑被衣脩擢彼彼舞者更復徐行小笑披倡衣脩擢舞爲後曲也夫鼓者非柔縱言非其人生自柔弱屈句委縱也而木熙者非眇勁眇絶言其非能也自有絶妙之强力也淹浸漬漸靡使然也淹久浸漬漸於教久使之柔縱眇勁靡教化使之然也是故生木之長莫見其益有時而脩長者令長之長砥礪䃺監莫見其損有時而薄有時積時言非一日教化亦然也藜藿之生蝡蝡然日加數寸不可以爲櫨棟加猶益也櫨屋也梗柟豫章之生也七年而後知故可以爲棺舟知猶覺覺其大也夫事有易成者名小難成者功大君子脩美雖未有利福將在後至美善也故詩云日就月將學有緝熙于光明此之謂也已說在上章也淮南鴻烈解卷之二十六
