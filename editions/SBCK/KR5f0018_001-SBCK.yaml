body:
  text: 太尉祭酒臣許愼記上原道訓原夲也本道根眞包裏天地以歷萬物故曰原道因以題篇夫道者覆天載地道无形而大也廓四方柝八極廓張也柝開也八極八方之極也言其逺柝讀重門擊柝之柝也髙不可際深不可測際至也度深曰測一曰尽也包裏天地稟授無形稟給也授予也无形万物之未形也皆生於道故曰稟授无形也源流泉滂沖而徐盈混混汩汩濁而徐清原泉之始所出也浡涌也沖虛也始出虛徐流不止能所盈滿以喻於道亦然也汩讀曰骨也故植之而塞于天地横之而彌于四海施之無窮而無所朝夕植立也塞滿也弥猶絡也施用也用之无窮竭也无所朝夕盛衰舒之幎於六合卷之不盈於一握舒散也幎覆也孟春与孟秋為合仲春与仲秋爲合季秋与季春爲合孟夏与孟冬爲合仲夏与仲冬爲合季夏与季冬爲合故曰六合言滿天地間也一曰四方上下爲六合不盈一握言微妙也約而能張幽而能明言道能小能大能昧能明弱而能強柔而能剛道之性也横四維而含隂陽横讀桄車之桄絃宇宙而章三光紘綱也若小車盖四維謂之紘繩之也四方上下曰字古往今來曰宙以踰天地章明也三光日月星甚淖而滒甚纎而微滒亦淖也夫饘粥多審者謂滒滒讀歌謳之歌山以之髙淵以之深獸以之走鳥以之飛日月以之明星歷以之行麟以之游鳯以之翔以用也游出也大飛不動曰翔也泰古二皇得道之柄立於中央二皇伏犧神農也指隂陽故不言三也神與化游以撫四方撫安也四方謂之天下也是故能天運地滯輪轉而無廢運行也滯止也廢休也水流而不止與萬物終始風興雲蒸事無不應應當也雷聲雨降並應無窮窮已也出電入龍興鸞集出言无蹤迹也電入言其疾也鈞旋轂轉周而復匝鈞陶人作瓦器法下轉族者一曰天也巳彫已琢還反於樸無爲爲之而合于道無爲言之而通乎德言二三之化无爲爲之也而言合扵道也无所爲言之而適自通扵德也恬愉無矝而得于和恬愉无所好憎也无矝不自大也有萬不同而便于性万事不同能扵便性者性不欲也神託于秋毫之未言微妙也而大與宇宙之緫宇宙諭天地緫合也其德優天地而和隂陽優柔也和調也節四時而調五行五行金木水火土也呴諭覆育萬物羣生呴諭温恤也育長也潤于草木浸于金石禽獸碩大毫毛潤澤羽翼奮也奮壯角觡生也角鹿角也觡麋角也觡讀曰格獸胎不贕鳥卵不胎不成獸曰贕卵不成鳥曰言不者明其成父無䘮子之憂兄無哭弟之哀言无犬死童子不婦人不孀无父曰寡婦曰孀也虹蜺不出賊星不行賊星妖星也含德之所致含懷也夫太上之道生萬物而不有不以爲巳有者也成化像而弗宰宰主也行喙息蠉飛蝡動待而後生莫之知德不因德之待之後死莫之能怨不怨虐之得以利者不能譽用而敗者不能非聚畜積而不加冨收歛畜積囯有常賦也不加冨者爲百姓不以爲巳有也布施稟授而不益貧布施稟授匡困乏予不足也以公家之資微宫門也馮夷大丙之御其能如此也末丗之御雖有輕車良馬勁䇿利鍜不能與之爭先勁强也䇿箠也未之感也言不能与馮夷大丙爭在前也鍜讀炳燭之炳是故大丈夫恬然無思澹然無慮以天爲蓋以地爲輿四時爲馬隂陽爲御騶御乗雲陵霄與造化者俱大丈夫諭躰道者也造化天地一曰道也霄讀消息之消縱志舒節以馳大區區宅也大宅謂天也可以歩而歩可以驟而驟今師灑道使風伯掃塵師畢星也詩云月麗于畢俾滂沱矣風伯箕星也月麗于箕風揚沙也電以爲鞭䇿電激氣也故以為鞭䇿雷以爲車輪雷轉氣也故以為車輪上游于霄雿之野下出于無垠之門霄雿髙峻貌也无垠无形状之貌霄讀紺綃雿讀翟氏之翟劉覽偏照復守以全劉覽回觀也劉讀留連之留非劉氏之劉也經營四隅還反於樞隅猶方也樞本也故以天爲蓋則無不覆也以地爲輿則无不載也四時爲馬則無不使也隂陽爲御則無不備也隂陽次叙以成万物无所缺也故曰无不備是故疾而不搖逺而不勞四支不動聦明不損損减也而知八紘九野之形埒者何也八紘天之八維也九野八方中天也執道要之柄而游於無窮之地是故天下之事不可爲也爲治之因其自然而推之推求也㪯也萬物之變不可究也秉其要歸之趣趣亦歸也夫鏡水之與形接也不設智故而方圎曲直弗能逃也智故巧飾也鏡水不施巧飾之形人之形好醜以宝應之故曰方圎曲直不能逃也是故響不肆應而景不一設叫呼仿佛黙然自得得叫呼仿佛之声狀也人生而靜天之性也感而後動性之害也物至而神應知之動也物事也知與物接而好憎生焉接交也情欲也好憎成形而知誘於外不能反已而天理滅矣形見也誘感也不能反已本所受天清静之性故曰天理滅也猶衰也故逹於道者不以人易天天性也不以人事易其天性也曰天身也不以人閒利欲之事易其身也外與物化而内不失其情言通道之人雖外貌与物化内不失其無欲之本情也至無而供其求時騁而要其宿言天時自騁道要其宿會也小大脩短各有其具具猶備也萬物之至騰踴肴亂而不失其數不失其數各應其度是以處上而民弗重居前而衆弗害言民戴仲而愛之也天下歸之姦邪畏之以其無爭於萬物也故莫敢與之爭夫臨江而釣曠日而不能盈羅雖有鉤箴芒距距爪也讀距守之距也微綸芳餌加之以詹何姢嬛之數猶不能與罟爭得也詹何姢嬛古善釣人名数術也射者扞烏號之弓彎綦衞之箭扞張也彎引也綦美箭所出地名也衛利也烏号柘桑其材堅勁烏跱其上及其將飛枝必撓下勁能復起巢烏隨之烏不敢飛号呼其上伐其枝以為弓因曰烏号之弓也一黄帝鑄鼎於荆山鼎湖得道而僊乗龍上其臣援弓射龍欲下黄帝不能也烏於也号呼也於是抱弓而号因名其弓為烏号之弓也重之羿逢蒙子之巧以要飛烏猶不能與羅者競多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百百中故曰之巧要取競逐也何則以所持之小也張天下以爲之籠因江海以爲罟又何亡魚失鳥之有乎罟魚也詩云施罟濊濊故夫不若繳繳不若無形之像言其大也夫釋大道而任小數無以異於使蠏蜅䑕蟾蠩捕蚤不足以禁姦塞邪亂乃逾滋以艾灼蟹臣上内置穴中廼走窮穴適能禽一䑕也詹諸䗐也跳行舒遲捕蚤亦不能悉得故曰不足以禁姦也諭盗益甚也昔者夏鯀作三仞之城諸侯背之海外有狡心鯀帝顓頊五也孫禹之父也八尺曰仞鯀作城郎以其伇勞故諸侯背之四海之外皆有狡猾之心禹知天下之叛也乃壞城平池散財物焚甲兵施之以徳海外賔服四夷納職四夷海外也職貢也合諸侯於塗山執玉帛者萬國塗山在九江當塗縣玉圭帛纁也故機械之心藏於中則純白不粹神徳不全機械巧詐也藏之於臆之内故純白之道不粹精神專一之徳不全也粹讀禍祟之祟也在身者不知何逺之所能懷懐来也是故革堅則兵利城成則衝生言攻戰之備於此生也若以湯沃沸亂乃逾甚是故鞭噬狗䇿馬而欲敎之雖伊尹造父弗能化伊尹名摯殷湯之賢相也趙父周穆王之臣也而善御雖此二人不能化之欲害之心亡於中則飢虎可尾何况狗馬之乎故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也箠䇿繁用者非致逺之術也繁數也離朱之明察箴末於百歩之外離朱者黃帝臣明目人也不能見淵中之魚師曠之聦合八風之調師曠晉平公樂師子野也八風八卦之風声也而不能聽十里之外故任一人之能不足以治三畝之宅也脩道理之數因天地之自然則六合不足均也均平也是故禹之決瀆也因水以爲師神農之播榖也因苗以爲敎禹鯀之子名文命受禅成功曰禹因以水性自下决使東流以爲後世師法也神農少典之子炎帝也農植嘉榖神而化之故号曰神農也播布也布種百榖因苗之生而長育之以爲後丗之常敎也夫萍樹根於水萍大蘋也木樹根於土烏排虚而飛獸蹠實而走蹠足也實地也蹠讀捃摭之摭蛟龍水居虎豹山處天地之性也蛟水蛟其皮有珠世人以為刀劒之口是也蛟讀人情性交易之交緩氣言乃得耳兩木相摩而然金火相守而流流釋也貟者常轉窽者主浮自然之勢也貟輪丸之属也窽空也舟舡之属也故曰自然狄不榖食賤長貴壯俗上氣力人不㢮弓馬不解勒便之也不榖食肉酪而已北狄鮮卑也㢮舍也便習也故禹之祼國解衣而入衣帶而出因之也祼囯在南方聖人治礼不求与俗故曰因之也今夫徙樹者失其隂陽之性則莫不枯槁失猶易也故橘樹之江北則化而爲枳鴝鵅不過濟貈度汶而死見扵周礼故春秋傳曰鴝鵒來巢言非中囯之禽所以為魯昭公仁異也形性不可易勢居不可移也是故逹於道者反於淸静反夲也天夲援人清静之性故曰反也究於物者終於無為无為者不為物為也以恬養性以漠処神則入于天門所謂天者純粹樸素質直皓白未始有與雜糅者也所謂人者偶䁟智故曲巧僞詐所以俛仰於丗人而與俗交者故牛歧蹏而戴角馬髦而全足者天也絡馬之口穿牛之鼻者人也循天者與道游者也循隨也㳺行也隨人者與俗交者也夫井魚不可與語大拘於隘也夏蟲不可與語寒言蜩蝉不知寒雪也篤於時也曲士不可與語至道拘於俗束於敎也故聖人不以人滑天不以欲乱情天身者不以人事滑乱其身也不以欲乱其清濁之性者也不謀而當不言而信不慮而得不爲而成詩云不識不知順帝之則故曰不謀而當不慮而得也精通于霊府與造化者爲人為治也夫善游者溺善者墮各以其所好反自爲禍禍害也是故好事者未甞不中中傷也好為情欲之事者未甞不自傷也爭利者未甞不窮也昔共工之力觸不周之山使地東南傾共工以水行霸扵伏犧神農閒者也非堯時共工也不周山崑䈁西北傾猶下也天文言天傾西北地傾東南先言傾髙也此言東南後言傾明其下也與髙辛爭爲帝髙辛帝嚳有天下之号也嚳黄帝之曾孫遂濳于淵宗族殘滅維嗣絶祀謂共工也越王翳逃山穴越人熏而出之遂不得已巳止也醫越太子也賢不欲為王逃於出山穴之中越人以火熏出而立之故曰遂不得已在春秋後故不書于經也由此觀之得在時不在爭治在道不在聖治為也雖聖不得為故曰在道孔子是也土處下不爭髙故安而不危水下流不爭失故疾而不遲昔舜耕於歷山朞年而田者爭処墝埆以封壤肥饒相讓歷山在済隂成陽也一曰済南歷城山也墝埆讀人相墝椽之墝釣於河濵朞年而漁者爭處湍瀬以曲隈深潭相予漁讀告語湍瀬水淺流急少魚之処也曲隈崖岸委曲深潭回流饒魚之処潭讀葛覃之覃當此之時口不設言手不指麾口不設不信之言也手不指麾小妄有所規擬也執德於心而化馳若神玄天也馳行也若神有神化之也使舜無其志雖口辯而戸之不能化一人志王天下之志也一曰人心之志也是故不道之道莽乎大哉道不可道故曰不道之道夫能理三苗朝羽民三苗堯時所放渾敦窮竒饕餮之等理治也羽民南方羽國之民使之朝者德以懷逺也從祼國納肅愼未發號施令而移風易俗者其唯心行者乎祼國在南方禹所入也從化也肅愼北方逺也傳曰肅愼燕亳吾北土也唯仁化為能然也法度刑罰何足以致之也言不足以致之也明不如仁心化之為大是故聖人内修其夲而不外飾其末保其精神偃其智故漠然無爲而無不爲也能无為故物无不為之化澹然無治也而無不治也所謂無爲者不先物爲也所謂不爲者因物之所爲順物之性也所謂無治者不易自然也所謂無不治者因物之相然也然猶冝也
