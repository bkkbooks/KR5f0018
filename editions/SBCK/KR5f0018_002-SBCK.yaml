body:
  text: 萬物有所生而獨知守其根根夲也百事有所出而獨知守其門門禁要也故窮無窮極無極照物而不響應而不乏此之謂天解惑也天解天之解故也言能明天意也故得道者志弱而事強弱柔也強无不勝也心虛而應當當合也所謂志弱者柔毳安静藏於不敢行於不能恬然無慮動不失時與萬物回周旋轉不爲先唱感而應之感動應和是故貴者必以賤爲號貴者謂公王侯伯稱寡不榖故曰以賤為号而髙者必以下爲基基始也大築京臺先從下起也託小以包大在中以制外行柔而剛用弱而強轉化推移得一之道而以少正多而能也能以寡統衆所謂其事強者遭變應卒排患扞難力無不勝敵無不凌應化揆時莫能之是故欲剛者必以柔守之欲強者必以弱保之積於柔則剛積於弱則強觀其所積以知禍福之郷郷方也強勝不已者至於已者而同夫強者能勝不如已者同等也至於如已者則等不能勝也言強之為小也道家所不貴也柔勝出於已者其力不可量夫能弱柔勝已者其力不可訾也言柔之為大也道家所貴故兵強則滅木強則折革堅則裂齒堅於舌而先之兵猶火也強則盛盛則衰故曰則滅以火諭也木強則折不能徐屈也革堅則裂鼔是也弊尽齒堅於舌而先舌尽是故柔弱者生之榦也榦質也而堅強者死之徒也徒衆也先唱者窮之路也後動者達之原也先者隤䧟故曰窮也後者以謀故曰達何以知其然也凡人中壽七十歳然而趨舎指湊日以自悔也以至於死故蘧伯玉年五十而有四十九年非伯玉衞大夫蘧瑗也今年所行是也則還顧知去年之所行非也歳悔之以至於死故有四十九非所謂月悔朔日悔昨也何者先者難爲知而後者易爲攻也先者上髙則後者攀之先者諭下則後者蹷之先者隤陷則後者以謀先者敗績則後者逢之蹷履也音展非展也楚人讀躓為隤隤者車承或言羕躓之躓也由此觀之先者則後者之弓矢質的也質的射者之準執也猶錞之與刃刄犯難而錞無患者何也以其託於後位也錞干戈之也讀曰頓刃矛戈之刃也刃在前故犯難頓在後故以无患故曰其託於後位也此俗丗庸民之所公見也而賢知者弗能避也庸衆也公詳也衆民詳所見知賢者不能避為鋒刃也鋒刃以諭利欲也故曰有所屝蔽也所謂後者非謂其厎滯而不發凝竭而不流厎讀曰紙發動也凝如脂凝也流行貴其周扵數而合於時也周調也數術也合於時時行財行時止則止也夫執道理以耦変先亦制後後亦制先道當隨事為変不必待於先人事當在後趨時當居先也是何則不失其所以制人人不能制也時之反側閒不容息言時反側之間不容氣息促之甚也先之則大過後之則不逮夫日回而月周時不與人游故聖人不貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也是故聖人守淸道而抱雌節清和静也雌柔弱也因循應変常後而不先柔弱以静舒安以定舒詳也攻大䃺堅莫能與之爭攻大䃺堅諭難也無与聖人之爭也天下之物莫柔弱於水然而大不可極深不可測測尽也脩極於無窮逺渝於無崖息秏減益通於不訾訾量也上天則爲雨露下地則爲潤澤万物弗得不生百事不得不成大包羣生而無好憎澤及蚑蟯蚑蚑行也蟯微小之虫也而不求報施而不有也冨贍天下而不旣贍足也旣尽也德施百姓而不費德澤加於百姓不以爲已財費也行而不可得窮極也流膏不止也微而不可得把握也擊之無創刺之不傷斬之不断焚之不然水之性也淖溺流遁錯繆相紛遁逸也錯繆相紛彼此相糺也而不可靡散利貫金石強濟天下水流缺石是其利也舟舡所載无有重是其強也済通也動溶無形之域而翶翔忽區之上忽怳之區上也言其飛為雲无所不上也邅回川谷之閒邅回猶委曲也而滔騰大荒之野有餘不足與天地取與授萬物而無所前後前後皆与之是故無所私而無所公公私一也靡濫振蕩與天地鴻洞鴻大也洞通也讀同異之同也無所左而無所右蟠委錯紾與萬物始終紾轉也是謂至徳言水之為徳最大故曰至德也夫水所以能成其至徳於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於無有入於無閒水是也吾是以知無爲之有益有益於生夫無形者物之大祖也無音者聲之大宗也无形生有形故為物大祖也无音生有音故為声大宗祖宗皆本也其子爲光其孫為水皆生於形乎光无形道所貴也之故子為光也水形而不可毀差之故孫為水也夫光可見而不可握水可循而不可毀故有像之莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣出生出生道謂去清静也入死入死道謂情欲也蹠適也自无形適有形離其本也自有形適无形不能復得道家所弃故曰而以衰賤也是故清静者徳之至也而柔弱者道之要也要約也虚而恬愉者万物之用也万物由之得為人用肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之貟不中規方不中矩大渾而爲一葉累而無根无根言微妙也懷囊天地爲道門門道之門穆忞隱閔純徳獨存穆忞隱閔皆无形之也純不雜粈也布施而不旣用之而不勤旣尽也勤勞也是故視之不見其形聽之不聞其聲循之不得其身無形而有形生焉无形道也有形万物也無聲而五音鳴焉音生於无声也無味而五味形焉形或作和也無色而五色成焉是故有生於無實出於虚有形生於无形人也實財也天下爲之圈則名實同居圈陬也名爵号之名也實幣帛之属也一曰仁義之功賞也音之數不過五宫商角徵羽也而五音之變不可勝聼也変更相生也味之和不過五甘酸醎辛苦也而五味之化不可勝甞也化亦変也色之數不過五青赤白黒黃也而五色之變不可勝觀也常事曰視非常曰春秋魯隱公漁於棠是也故音者宫立而五音形矣宫在中央声之主也形正也味者甘立而五味亭矣亭平也甘中央味也色者白立而五色成矣白者所在以染之故五色可成矣道者一立而萬物生矣是故一之理施四海理道也一之解際天地解逹也際機也解讀解故之解也其全也純兮樸樸若玉樸也在石而未剖其散也混兮濁濁而徐清冲而徐盈澹兮其深淵冲虚也盈滿也澹定不動之貌汎兮其浮雲若無而有亡而存万物之緫皆閱一孔緫皆聚也百事之根皆出一門道之門也其動無形変化神其行無迹常後而先道之先也是故至人之治也至道之人掩其聦明滅其文章依道發智與民同出于公公正去其誘慕除其嗜欲誘諭貪榮势也故去之也嗜欲情欲也故除之也損其思慮常活澹也約其所守則察不煩擾也寡其所求則得易供故得夫任耳目以聽視者勞形而不明以知慮爲治者苦心而無功是故聖人一度循軌一斉也軌法也不變其宜不易其常放準修繩曲因其當夫喜怒者道之邪也道貴平和故喜怒爲衺也憂悲者徳之失也德尚恬和以憂悲爲失論語曰其德坦蕩是也好憎者心之過也嗜欲者性之累也心當專一中扁外閉反有所好憎故曰過性當清净以奉天素而反嗜欲故爲之累也人大怒破隂大喜墜陽怒者隂氣也隂爲堅冰積隂相薄故破隂喜者陽氣陽升於上積陽相薄故曰陽墜也薄氣發瘖驚怖爲狂憂悲多恚病乃成積好憎繁多禍乃相隨故心不憂樂德之至也通而不變静之至也変更也嗜欲不載虛之至也不載於性無所好憎平之至也不與物散粹之至也散乱粹純能此五者則通於神明通於神明者得其内者也是故以中制外百事不廢中心也外情欲中能得之則外能收之不養也中之得則五藏寧思慮平五藏寧者各得其所思慮平者不安喜怒筋力勁強耳目聦明䟽達而不悖悖謬也堅強而不鞼鞼折無所大過而無所不逮處小而不逼處大而不窕在小能小在大能大其魂不躁其神不嬈躁狡嬈煩嬈也言精神定矣湫漻寂漠爲天下梟湫漻清静也寂漠恬淡也梟雄也迫則能應感則能動物穆無窮穆美變無形像言能化也優游委縱如響之與景響應声影應形登髙臨下無失所秉履危行險無忘仗仗道也大道坦坦去身不逺求之近者往而復反近謂身也能存之此其德不虧萬物紛糅與之轉化以聽天下背風而馳疾而易也是謂至德至德則樂矣古之人有居巖穴而神不遺者遺失也末丗有勢爲萬乗而日憂悲者由此觀之聖亡乎治人而在于得道樂亡于冨貴而在于德和知大已而小天下則幾於道矣幾近也許由務光是所謂樂者豈必處京臺章華宗臺章華皆造之大臺游雲夢沙丘雲夢楚澤在南郡華容也沙丘紂臺名也在鉅鹿也耳聽九韶六瑩九韶舜楽也六瑩顓頊楽也口味煎熬芬芳馳騁夷道夷平也釣射鷫鷞之謂樂乎鷫鷞鳥名也長脛綠身其形似鴈一曰鳯皇之別名也吾所謂樂者人得其得者夫得其得者不以奢爲樂不以廉爲悲廉猶儉也與隂俱閉與陽俱開故子夏心戰而得道而肥子夏名商孔子弟子也入斈見先王之道而之又出見冨貴之楽而欲之二者交争故而也先王之道勝無所復思故肥也聖人不以身役物不以欲滑和不以身為物役不以情欲乱中和之道也是故其為曜不忻忻忻忻為過制也其爲悲不惙惙惙惙為傷性也萬方百變消揺而無所定吾獨忼慨遺物而與道同出是故有以自得自得其天性也喬木之下空穴之中足以適情喬木上䟽少隂之木也空穴巖穴也唯処此中夫自得者足以適其情性無以自得也雖以天下爲家萬民爲臣妾不足以養生也言无以自待之人猶以此為不足也能至于無樂者則無不樂無不樂則至極樂矣至樂至得之樂極亦至也夫建鍾鼓列管席旃茵傅旄象管簫也琴瑟也傅着也旄旌也以象牙為飾也耳聽朝北鄙靡靡之樂朝歌紂都鄙邑也紂使師㳙作鄙邑靡靡之楽也故師延為晋平公歌之師曠知之曰亡囯之音也齊靡曼之色斉列也靡曼美也陳酒行夜以継日樂不輟也強弩于髙鳥走犬遂狡兔此其為樂也炎炎赫赫怵然有所誘慕誘進也慕有所思怵然猶惕然解車休馬罷酒徹樂而心忽然有所䘮悵然有所亡也是何則不以内樂外而以外樂内樂作而喜曲終而悲悲喜轉而相生精神乱營不得須㬰平營惑察其所以不得其形不得楽之形也而日以傷生失其得者也是故内不得於中禀授於外而以自飾也不浸于肌膚不浹于骨髓浸润也浹通也不留于心志不滯于五藏故從外入者無主於中不止従中出者無應於外不行故聽善言便計雖愚者和之至德髙行雖不肖者知慕之之者衆而用之者鮮慕之者多而行之者寡所以然者何也不能反諸性也夫内不開於中而強斈問者不入於耳而不著於心此何以異於聾者之也效人為之而無以自樂也聲出於口則越而散矣散去耳不聞也夫心者五藏之主也所以制使四攴流行血氣馳騁于是非之境而出入于百事之門戸者也是故不得於心而有經天下之氣是猶無耳而欲調鍾鼔無目而欲喜文章也亦必不勝其任矣經理故天下神噐不可為也噐物用也為治也為者敗之執者失之夫許由小天下而不以已易堯者志遺于天下許由陽城人也箕山之隱士也堯以其賢聘之欲禪天下焉不肯就故曰志遺于天下也所以然者何也因天下而爲天下也天下之要不任於彼而在於我彼謂堯也我謂許由不在於人而在於我身身得則万物備矣徹於心術之論則嗜欲好憎外失外不在心是故無所喜而無所怒無所樂而無所苦萬物同也天也無非無是化育燿生而如死天也燿明也生而如死无所欲夫天下者亦吾有也吾亦天下之有也天下之與我豈有間哉言相比也夫有天下者豈必攝持勢操殺生之柄而以行其號令邪吾所謂有天下者非謂此也自得而已自得其天性也一曰不失其身也自得則天下亦得我矣吾与天下相得則常相有已又焉有不得容其閒者乎所謂自得者全其身者也全其身則與道爲一矣故雖游於江潯海裔潯崖也裔邊也潯讀葛覃之覃也馳要裊建翠蓋駟駕要裊馬名也日行万里裊撓弱之撓翠蓋以翠鳥羽飾蓋也目觀掉羽武象之樂掉羽羽舞武象周武王之楽耳聽滔㓪竒麗激抮之音激有激揚抮轉皆曲名也揚鄭衞之浩樂結激楚之遺風鄭声鄭㑹晉平公就新声使師延為桑間濮上之楽濮在衛地故鄭衛之浩楽也结激清楚之声也必為鄭為之俗楽夫结激清楚以娱樂也遺風猶餘声也射沼濵之髙鳥逐苑囿之走獸此齊民之所以泆流湎齊於凡民故曰齊民也沼池也濵水崖也聖人處之不足以營其精神亂其氣志營或也使心怵然失其情性處窮僻之郷側谿谷之間側伏也隱于榛薄之中叢木曰榛深草曰薄環堵之室茨之以生茅蓬戸甕牖揉桑以爲樞堵長一丈髙一丈而環一堵為方一丈故曰環堵言其小也編蓬為戸以破甕蔽牖揉桑條以為戸樞上漏下溼潤浸北房浸漬也北房隂堂也雪霜滖灖浸潭蔣滖灖雪霜之貌也浸潭之潤以生蔣實者蔣實也其米曰胡滖讀繀䋲之繀灖讀校滅之校讀觚哉之觚也蔣讀水之也逍遥于廣澤之中而仿洋于山峽之旁兩山之間爲峽此齊民之所爲形植藜累憂悲而不得志也聖人處之不爲愁悴怨懟懟病也而不失其所以自樂也是何也則内有以通于天機機㣲也而不以貴賤貧富勞逸失其志德者也故夫烏之啞啞鵲之唶唶豈甞爲寒暑燥溼變其聲哉言躰道者不為貴賤貧富勞逸易其志如烏鵲之不為寒暑易其声是故夫得道巳定而不待萬物之推移也非以一時之變化而定吾所以自得也吾所謂得者性命之情處其所安也夫性命者與形俱出其宗宗本形備而性命成性命成而好憎生矣故士有一定之論女有不易之行士有同志同志德也至其交接有一㑹而公定故曰有一定之論也貞女專一亦无二心雖有偏喪不復更醮故曰有不易之行者也規矩不能方圎鉤繩不能曲直雖規矩鉤繩无以施於此天地之永登丘不可為脩居卑不可為短是故得道者窮而不懾逹而不榮雖窮賤不以為懾懼也雖達不以為榮幸也處髙而不機機危也持盈而不傾傾覆也新而不㓪乆而不渝朗明也渝変也助讀汝南㓪陵之㓪入火不焦入水不濡是故不待勢而尊不待財而冨不待力而強平虛下流與化翶翔翶翔猶傾仰也然者藏金於山藏珠於淵舜藏金扵嶄巖之山藏珠於五湖之渊以塞貪淫之欲也不利貨財不貪勢名位爵号之名也是故不以康爲樂康安也不以慊爲悲慊約也慊讀辟向慊之慊也不以貴爲安不以賤爲危形神氣志各居其宜以隨天地之所為夫形者生之舍也氣者生之充也神者生之制也一失位則二者傷矣是故聖人使人各處其位守其職而不得相干也故夫形者非其所安也而處之則廢氣不當其所充而用之則泄神非其所宜而行之則昧昧不明也此三者不可不愼守也夫舉天下萬物蚑蟯貞蟲蚑行蟯動之虫也蟯讀饒貞虫細要之屬也蝡動蚑作蚑讀鳥蚑歩之蚑也皆知其所喜憎利害者何也以其性之在焉而不離也忽去之則骨無倫矣去之去道也則骨靡滅无倫匹也今人之所以眭然能視眭讀曰桂䁝然能聽䁝讀疾營之營也形體能抗抗讀扣耳之扣而百節可屈伸察能分白黒視醜美而知能别同異明是非者何也氣爲之充而神爲之使也何以知其然也凡人之志各有所在而神有所繫者其行也足蹪趎埳頭抵植木而不自知也蹪躓也楚人讀躓爲蹪知猶斍也招之而不能見也呼之而不能聞也不能見招之者不能聞呼之者耳目去之也然而不能應者何也神失其守也精神失其所守故在於小則忘於大在於中則忘於外在於上則忘於下在於左則忘於右若楚白公勝欲慮乱立於朝倒杖䇿上貫其頥血流至地而不斍此之也無所不充則無所不在精神無所不充在存也是故貴虛者以毫末爲宅也虚者情无所念慮也以毫末爲宅者言精微也今夫狂者之不能避水火之難而越溝瀆之嶮者豈無形神氣志哉然而用之異也与人異也失其所守之位而離其外内之舍是故舉錯不能當動静不能中當合也中適也終身運枯形于連嶁列埒之門運行也枯猶病也形躰也于於也連嶁猶離嶁也妄曲之列埒不平均也連讀陵聾幽州陵陵蓮之連嵝讀㟝嶁无松柏之嵝而蹪蹈于汚壑穽陷之中汚壡大壑壑讀赫赫明明之赫雖生俱與人鈞然而不免爲人戮者何也形神相失也故以神爲主者形從而利以形爲制者神從而害神清静故利形有情欲故害也貪饕多欲之人漠㬆於勢利誘慕於召位漢㬆猶鈍㬆不知足誘進也慕貪漠溺之漠㬆讀織絹綴宻㬆无間孔之㬆也兾以過人之智植于髙丗兾猶庶幾也植立也庶幾立髙名於丗也則精神日以秏而彌逺耗秃也乆而不還過還復形閉中距則神無由入矣神精神也清静之性无從還入也是以天下時有盲妄自失之患此膏燭之也火逾然而消逾亟逾益也亟疾也夫精氣志者靜而日充者以壯躁而日耗者以老是故聖人將養其神和弱其氣平夷其形而與道沉浮俛仰沉浮猶盛衰俛仰猶升降恬然則縦之迫則用之其縱之也委衣其用之也發機機弩機言其疾也如是則萬物之化無不遇遇時也而百事之變無不應應當之也淮南鴻烈解卷第一
