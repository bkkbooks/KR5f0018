  text: 淮南鴻烈解卷第二
  hash: sha256:40eaff6f7a947389b14942162ac83159e17b256920265ed4bf3fd7bd151df5f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_SBCK_001-16b}
body:
  text: 太尉祭酒臣許愼記上俶眞訓俶始也眞實道之實始於无有化育于有故曰俶眞因以題篇有始者天地開闢之始也有未始有有始者言万物萌兆未始有始者始成形也有未始有夫未始有有始者言天地合氣寂寞蕭條未始有也夫未始有始仿佛也有有者言万物始有形兆也有无者言天地浩大言无可名也有未始有有無者言道微妙苞裏天地未始有有无者在有无者之前有未始有夫未始有有无者天也所謂有始者繁憤未發萌兆牙蘖未有形呼垠堮无无蝡蝡將欲生㒷而未成物繁憤衆積之貌發積也有未始有有始者天氣始下地氣始上隂陽錯合相与優游競暢于宇宙之間被德含和紛蘢蓯欲与物接而未成兆朕競逐也暢逹也和氣也紛糅也蘢蓯聚㑹也兆朕形怪也有未始有夫未始者有有始者天含和而未降地懐氣而未揚虛无寂寞蕭條霄雿无有仿佛氣遂而大通冝冝者也霄讀紺綃之绡雿翟氏之翟也有有者言万物摻落根莖枝葉青葱苓蘢雚蔰煌蠉飛蝡動蚑行噲息可切循把握而有数量摻讀參星之參雚蔰煌采色貌也蚑讀車蚑轍之蚑噲讀不懌外之會切摩也循順也雚讀曰唯也蔰讀曰扈有无者視之不見其形聽之不聞其聲捫之不可得也望之不可極也儲與扈治儲与扈治襃大意也浩浩瀚瀚不可隱儀揆度而通光燿者浩浩瀚瀚廣大貌也光燿无形有未始有有无者包裹天地陶冶万物大通混冥深閎廣大不可為外析毫剖芒不可爲内无環堵之宇而生有无之根混㝠大之中謂道也有未始有夫未始有有无者天地未剖隂陽未判剖判混分四時未分万物未生汪然平靜寂然清澄莫見其形汪讀傳尸諸周氏之汪同若光燿之閒於无有退而自失也自失不見也曰予能有無而未能无无也能有无為也未能本性自无為也故曰未能无也及其爲无无至妙何從及此哉夫大塊載我以形勞我以生大塊天地之間也逸我以老休我以死莊子曰生乃徭役死乃休息也故曰休我以死善我生者乃所以善吾死也善吾生之楽乃欲善吾死之楽也明死変化有知欲勸人同死生也夫藏舟於壑藏山於澤人謂之固矣雖然夜半有力者負而趨趨走寐者不知猶有所遁夜半有力者負舟与山走故寐者不知也藏天下於天下則无所遁其形矣大丈夫以天下爲室以藏万物物豈可謂无大揚攉乎揚攉无慮大数名也攉讀鎬鎬一範人之形而猶喜範猶遇也遭也範法也言物一法効人形尚由善也若人者千変萬化而未始有極也言死生変化而夢故曰未始有極也弊而復新其爲楽也可勝計邪譬㝱爲鳥而飛於天㝱爲魚而没於淵方其㝱也不知其㝱也覺而後知其㝱也今將有大覺然後知今此之爲大㝱也始吾未生之時焉知生之楽也今吾未死又焉知死之不樂也昔公牛哀轉病也七日化爲虎轉病易病也江淮之間公牛氏有易病化為虎若中囯有狂疾者發作有時也其爲虎者便還食人食人者因作眞虎不食人者更復化為人公牛氏韓人准南之人因牛食芻謂之芻豢有驗于此其兄掩戸而入覘之則虎而殺之殺其兄掩讀曰奄也覘視也是故文章成獸爪牙移易移易人牙為虎爪牙也志与心変神与形化志心皆変神形皆化方其爲虎也不知其甞爲人也方其爲人不知其且爲虎也二者代謝舛馳各楽其成形代更也謝叙也舛牙也形謂成虎形人舛讀舛賣之舛也狡猾鈍惽是非无端孰知其所萌萌生也夫水嚮冬則凝而爲冰冰迎春則洋而爲水冰故移易于前後周貟而趨孰暇知其所苦樂乎泮釋也趨㱕也是故形傷于寒暑燥溼之虐者形苑而神壯苑枯病也壯傷也苑讀南陽苑神傷乎喜怒思慮之患者神尽而形有餘故罷馬之死也剥之槁罷老氣力竭尽故若槁也狡狗之死也割之猶濡狡少也濡濡溼氣力未尽是故傷死者其嬈嬈煩嬈善行病祟人時旣者其神漠旣尽也時旣當老者則神寂漠漠定也是皆不得形神俱没也道家養形養神皆以壽終形神俱没不俱漠而已也老子曰以道治天下其不神此謂俱没也夫聖人用心杖性依神相扶而得終始是故其寐不㝱其覺不精神无所思慮故不㝱志存仁義患不得至故不也古之人有処混冥之中神氣不蕩于外万物恬漠以愉靜攙搶衡杓之氣莫不彌靡攙搶彗孛也杓北斗柄第七星而不能爲害當此之時万民倡狂不知東西含哺而游鼔腹而熈鼔擊也熈戯也交被天和食于地德交俱也和氣也地徳五榖不以曲故是非相尤茫茫沈沈是謂大治曲故曲巧也尤過也茫茫沈沈盛貌也茫讀王莽也沈讀水出沈沈正白之沈於是在上位者左右而使之母其性鎮撫而有之母迁其德是故仁義不布而万物蕃殖古者抱盛德上質是不待仁義而万物蕃殖也賞罰不施而天下賔服服其德也其道可以大美㒷而難以筭計㪯也言天性万物但可以大美㒷而育之難以筭計具也是故曰計之不足而歳計之有餘人譬若梅矣百梅足以為百人酸一梅不足為百人酸也夫魚相忘於江湖人相忘於道術言名得其志故相忘也古之眞人立於天地之夲中至游抱德煬和而万物累焉煬炙屯抱其志德而炙於和氣故万物累言成熟也煬讀供養之養也孰肯解構人閒之事以物煩其性命乎解構猶合㑹也煩辱也夫道有經紀條貫得一之道連千枝万葉一者道得其根夲故能連理千枝万葉以少正多也是故貴有以行令賤有以忘卑貧有以楽業困有以処危夫大寒至霜雪降然後知松栢之荗也據難履危利害陳于前陳列也然後知聖人之不失道也是故能戴大貟者履大方言能戴天履地之道鏡太清者視大明立太平者処大堂太平天下之平也大堂明堂所以告朔行今也能游冥冥者与日月同光光明也諭徳道者能与日月明也是故以道為竿以德爲綸礼楽為鉤仁義為餌投之於江浮之於海万物紛紛孰非其有夫挾依於躍之術躍猶齟齬不正之道也提挈人閒之際撢掞挺挏丗之風俗撢引掞利也挺挏猶上下也以求利便也以摸蘇牽連物之微妙摸蘇猶摸索微妙猶细小猶得肆其志充其欲何況懷瑋之道忘肝膽遺耳目獨浮游无方之外不与物相弊摋弊摋猶雜揉也弊讀䟦涉之䟦也摋讀楚人言殺也中徙无形之域而和以天地者乎然者偃其聦明而抱其太素素樸性也以利害爲塵垢塵垢諭輕也以死生為尽夜是故目觀玉輅琬象之狀耳聽白雪清角之聲不能以乱其神玉輅王者所乗有琬琰象牙之飾白雪師曠所奏太一五之琴楽曲神物為下降者清角商聲也登千仞之谿臨蝯之岸不足以滑其和蝯臨其岸而目眩言滑滑乱和適也譬鍾山之玉炊以鑪炭三日三夜而色澤不変則至德天地之精也鍾山崑崙也是故生不足以使之利何足以動之死不足以禁之害何足以恐之明於死生之分達於利害之変雖以天下之大易骭之一毛无所槩於忠也骭自膝以下脛以上也骭讀閈牧之閈也夫貴賤之於身也猶條風之時麗也條風鳴條言其迅也麗過也毀譽之於已猶蚊䖟之一過也夫秉皓白而不里行纯粹而不糅処冥而不闇休于天鈞而不僞偽敗也天鈞北極之地積寒之野休之輙敗唯躰道能不敗也孟門終隆之山不能禁孟門山名太行之隘也終隆則終南山在扶風皆險塞也唯躰道能不敗湍瀬旋淵吕梁之深不能留也湍瀬急流也旋淵深淵也吕梁水名也在彭城皆水險留滯也大行石澗飛狐句望之險不能難也太行在野王北上黨開也石澗深谿飛狐在代郡句望在鴈门皆隘險也是故身処江海之上而神游魏阙之下魏闕王者門外闕也所以縣敎象之書於象魏也巍巍高大故曰魏闕眞人雖在逺方心存王也一曰心下巨闕神内守也非得一原執能至於此哉一原道之原也是故与至人居使家忘貧使王公簡其貴富而楽卑賤勇者衰其氣貪者消其欲坐而不敎立而不議虚而往者實而㱕故不言而能飲人以和諭道如川不言而能飲人以和適也是故至道无爲一龍一蛇龍能化蛇能解蛻故道以為譬盈縮卷舒與時變化外從其風内守其性耳目不燿思慮不營營或也其所居神者臺簡以游太清臺猶持也簡大也引楯萬物羣美萌生引楯拔擢也楯讀若允恭之允也是故事其神者神去之事治也休其神者神居之不動擾道出一原通九門九門天之門也散六衢散布於六合之衢也設於无垓坫之字設施也垓坫垠堮也垓讀人歛食大多以思下垓坫讀為管氏有反坫之坫寂漠以虚無非有爲於物也物以有爲於巳也非有爲於物者不爲之也物以有爲於巳者物巳爲也是故舉事而順于道者非道之所爲也道之所施也夫天之所覆地之所載六合所包隂陽所呴露所濡道德所扶此皆生一父母而閱一和也父母天地閱緫也和氣也道所貴也呴讀以口相吁之吁是故槐榆與橘柚合而爲兄弟言道能化同異物也有苗與三危通爲一家有苗國在南方彭蠡舜時不服者三危在西極山名在辰州通爲一家道所化也夫目視鴻鵠之飛耳聽琴瑟之聲而心在鴈門之間一身之中神之分離剖判六合之内一舉而千萬里是故自其異者視之肝膽胡越肝膽諭近胡越諭逺自其同者視之萬物一圈也圈厥百家異各有所出夫墨揚申商之於治道翟也其術兼愛非樂摩頂於踵而利國者為之楊朱其術全性保眞雖㧞一毛而利天下弗為也申中不害也韓昭侯相著三符之命而尚刻削商者魏公孫鞅也爲秦孝公制相坐之法嚴猛聞故封之爲商君也因謂之商鞅也猶蓋之無一撩而輪之無一輻有之可以備數無之未有害於用也已自以爲獨擅之不通之于天地之情也今夫冶工之鑄器鑄讀如唾祝之祝也金踊躍于鑪中必有波溢而播弃者其中地而凝滯亦有以象於物者矣其形雖有所小周哉然未可以保於周室之九鼎也有況比於規形者乎其與道相去亦逺矣今夫萬物之䟽躍枝舉百事之莖葉條梓皆夲於一根而條循千萬也䟽躍布散也梓讀詩頌茍有三同此則有所受之矣而非所授者所受者无授也而无不受也无不受也者譬若周雲之蘢蓯遼巢彭而爲雨周雲密雨雲也蘢蓯聚合也遼巢彭藴積貌也萍榆莢之萍沉溺萬物而不與爲溼焉不与萬物俱溼今夫善射者有儀表之度如工匠有規矩之數此皆所得以至於妙有所得儀表規矩之巧也然而奚仲不能爲逢蒙奚仲巧為車逢蒙善於射言未能相兼也造父不能爲伯樂者造父善御馬事周移王伯楽善相馬事秦缪公是皆諭於一曲而不通于萬方之際也今以涅染緇則黒於涅以藍染靑則靑於蓝涅非緇也靑非藍也茲雖遇其母而无能復化已涅石也母本也是何則以諭其轉而益薄也何況夫未始有涅藍造化之者乎其爲化也雖鏤金石書竹帛何足以舉其數鏤讀婁数之婁由此之物莫不生於有也有猶往也小大優游矣言饒多也夫秋毫之末淪於无間而復歸於大矣秋毫微妙故能入於无間間孔言道无水以毫未比道猶復爲大也蘆符之厚通於无而復反於敦庞厚猶薄芦葦也符蘆之中白符言其薄柯則歸於葦故曰反於孰庞矣符讀之也若夫无秋毫之微蘆符之厚四達無境通于无圻道貴无形杖毫蘆符已有形故曰无秋毫之微蘆符之厚四達无境通於无圻圻垠字也而莫之要御夭遏者其襲微重妙挺挏萬物揣丸変化道之所能天地之閒何足以論之言道所化者大夫疾風㪍木而不能拔毛髮㪍亦拔也雲臺之髙墮者析脊碎腦而蟁䖟適足以翶翔臺髙際於雲因曰雲臺也蟁蟲微細故曰翺翔而无傷毀之患道所貴也夫與蚑蟯同乗天機蚑行蟯動諭微細也天機神馬天受形於一圈飛輕微細者猶足以脫其命又況未有也類形象也未有形象道所尚也由此之無形而生有形亦明矣是故聖人託其神於靈府而㱕於萬物之初視於冥聽於无聲冥之中獨見曉焉曉明也寂漠之中獨有照焉其用之也以不用其不用也而後能用之其知也乃不知其不知也而後能知之也夫天不定日月無所載載行也地不定草木無所植植立也所立於身者不寧是非無所形形見也是故有眞人然後有眞知知不詐詔故曰眞也其所持者不明庸愚詎知吾所謂知之非不知歟今夫積惠重厚累愛襲恩以聲華嘔符嫗掩万民百姓使知之訢訢然人樂其性者仁也舉大功立顯名體君臣正上下明親䟽等貴賤存危國繼絶丗決挐治煩興毀宗立無後者義也閉九竅藏心志棄聦明反無識芒然仿佯于塵埃之外而消揺于無事之業含隂吐陽而万物和同者德也是故道散而爲德德溢而爲仁義仁義立而道德廢矣百圍之木斬而爲犧尊犧讀日月猶䟽鏤之尊鏤之以之以青黃巧工鈎刀也者規度刺畫邊箋也所以刻鏤之具也貴黄采色之飾也剞讀技之技讀詩蹶角之蹶也華藻鎛觧龍蛇虎豹曲成文章華藻華文也鎛今之金尊也鲜明好也龍蛇虎豹者刻尊彜爲幡龍伏虎之然故曰曲成文章也然其断在溝中一比犧尊溝中之断則醜羙有間矣間逺也方其好醜相去逺也然而失木性鈞也鈞等是故神越者其言華越散也言不守也故華而不實德蕩者其行僞蕩逸僞不成也至精亡於中而言行觀於外此不免以身役物矣与物爲役夫趍舎行僞者爲精求于外也精有湫盡而行無窮極則滑心濁神而惑亂其夲矣其所守者不定於外於丗俗之風風化也所断差跌者而内以濁其清明是故躊躇以終而不得須恬淡矣是故聖人内修道術而不外飾仁義不知耳目之宣而游于精神之和然者下揆三泉上尋九天横廓六合揲貫万物此聖人之游也若夫眞人則動溶于至虚而游于滅亡之野蜚㢘而従敦圄蜚亷獸名長毛有翼敦圖似虎而小一曰僊人名也馳於方外休乎宇内燭十日而使風雨臣雷公役夸父夸父僊人弃其䇿而爲鄧林也妾宓妃妻織女天地之間何足以留其志是故虚無者道之舎平易者道之素素性也
