body:
  text: 夫人之事其神而嬈其精營慧然而有求於外此皆失其神明而離其宅也事治也嬈煩也營慧求索名利者也故曰有求於外離宅離精神之宅也是故凍者假兼衣于春而暍者望冷風于秋夫有病於内者必有色於外矣夫梣木色青翳梣木苦歷木名也生於山剥取其皮以水浸之正青用洗眼瘉人目中膚翳故曰色青翳青色象也而蠃瘉蝸睆蠃蠡薄蠃蝎睆目疾也此皆治目之藥也人無故求此物者必有蔽其明者聖人之所以駭天下者眞人未甞過焉駭動也賢人之所以矯丗俗者聖人未甞觀焉矯拂也夫牛蹏之涔無尺之鯉涔潦水也涔讀延䄆曷問急氣閉口言也塊阜之山無文之材小山也在陳留所以然者何也皆其營宇狹小而不能容巨大也又況乎以無裹之者邪无裹无形此其爲山淵之勢亦逺矣此无有議長大夫人之拘於丗也必形繫而神泄故不免於虚形繫者身形疾而精神越他不處其守故曰不免於虚疾使我可係羈者必其有命在於外也至德之丗甘瞑于溷澖之域澖讀閑放之閑言無垠虚之貌而徙于汗漫之宇徙猶汗漫无生形形生元氣之本神也故盧敖見若士者言曰吾与汗漫期於九垓之上是也宇居也提挈天地而委萬物以鴻濛爲景柱而浮揚乎無畛崖之際一手曰提挈舉也委棄也言不以身役物鴻濛東方之野曰之所出故以為景柱浮揚猶遨翔也無畛崖畔界因以爲名也是故聖人呼吸隂陽之氣而羣生莫不顒顒然仰其德以和順當此之時莫之領理決離隱密而自成渾渾蒼蒼純樸未散渾渾蒼蒼混沌大皃故曰純樸未散也旁薄爲一而萬物大優優饒也是故雖有羿之知而無所用之是上古之時也但甘卧治化自行故曰雖有羿之知其無所用之是堯時羿也謂能射十日繳大風殺窫窳斬九嬰射河伯之知巧也非有窮后羿也及丗之衰也至伏羲氏其道昧昧芒芒然吟德懷和伏羲氏以木徳王天下号曰太皡昧昧純厚也芒芒廣大貌也吟詠其德含懷其和氣未大宣布也施頗烈讀光被四表之也其德澤頗烈施於民而知乃始昧昧晽晽皆欲離其童䝉之心昧昧欲明而未也晽晽欲所知之貌也離去也而覺視於天地之閒是故其德煩而不能一煩多也一齊也乃至神農黃帝剖判大宗竅領天地襲九窽重九竅通也領理也襲因也窽法也形也言因九天九地之形法以通理也提挈隂陽嫥捖剛柔枝解葉貫萬物百族嫥捖和調也族也使各有經紀條貫貫位也於此萬民睢睢盱盱然莫不竦身而載聽視睢睢盱盱聽視之貌也是故治而不能和和恊也下棲遟至于昆吾夏后之丗昆吾夏伯桀世也嗜欲連於物聦明誘於外而性命失其得性命之本施及周室之衰澆淳散樸施讀難易之易也雜道以僞儉德以行雜糅而巧故萌生巧言為詐周室衰而王道廢儒墨乃始列道而議分徒而訟儒孔子道也墨墨翟術也徒黨也訟爭是非也於是博學以疑聖華誣以脅衆博斈揚之道以疑孔子之術設虚華之言以誣聖人劫脅徒衆也歌鼔舞縁飾詩書以買名譽於天下為以求之繁登降之禮飾紱冕之服聚衆不足以極其變積財不足以贍其費於是萬民乃始慲觟離慲讀簫簫无逢際之慲觟徯徑之徯也各欲行其知僞以求鑿柄於丗而錯擇名利錯施也擇取也求索也言施其巧偽索榮顯之名利也故下句言曼衍於淫荒之陂也是故百姓曼衍於淫荒之陂而失其大宗之夲陂或作野夫丗之所以喪性命有衰漸以然所由來者乆矣是故聖人之學也欲以反性於而游心於虚也人受天地之中以生孟子曰性無不善而情欲害之故聖人能返其性於初也游心於虚言無欲也達人之學也欲以通性於遼廓而覺於寂漠也若夫俗丗之學也則不然擢德捲性内愁五藏外勞耳目擢取也捲缩也皆不揗其理故愁其思慮也耳妄聽目妄視淫故勞也乃始招蟯振繾物之豪芒揺消掉捎仁義禮樂暴行越智於天下以招號名聲於丗揺消棹梢仁義禮樂未之能行也越揚也卒也越揚其詐譎之智以取聲名也此我所羞而不為也是故與其有天下也不有也樂也不有又樂之也與其有也不尚羊物之終也始而條達有無之際是故舉丗而譽之不加勸舉丗而非之不加沮定于死生之境而通于榮辱之理雖有炎火洪水彌靡於天下神無虧缺於臆之中矣然者視天下之閒猶飛羽浮芥也芥中也熟肯分分然以物為事也分猶意念之貌水之性眞清而土汩之人性安静而嗜欲亂之夫人之所受於天者耳目之於聲色也口鼻之於芳臭也肌膚之於寒燠其情一也或通於神明或不免於癡狂者何也其所為制者異也是故神者智之淵也淵清則智明矣智者心之府也智公則心平矣人莫鑑於流沬而鑒於止水者以其靜也沬雨潦上沫起覆甌也言其濁擾不見人形也莫窺形於生鐵而窺於明鏡者以覩其易也易讀河間易縣之易夫唯易且静形物之性也形見由此之用也必假之於弗用也是故虚室生白吉祥止也虚心也室身也白道也能虚其心以生於道道性无欲吉祥來止舍也夫鑑明者塵垢弗能薶薶汚也薶讀倭語之倭也神清者嗜欲弗能乱神清者精神内守也情之嗜欲不能干乱精神以越於外而事復返之越散也事治也是失之於夲而求之於末也外内无符而欲與物接其光而求知之于耳目光内明也一曰天也是釋其炤炤而道其冥冥也是之謂失道心有所至而神喟然在之反之於虚則消鑠滅息此聖人之游也反之於虚則情欲之性消鑠滅息故曰聖人之游游行也故古之治天下也必達乎性命之情其舉錯未必同也其合於道一也夫夏日之不裘者非愛之也燠有餘於身也冬日之不用翣者非之也淸有餘於適也翣扇也翣讀鵝鶩食唼喋之唼簡賤也夫聖人量腹而食度形而衣節於已而已貪汚之心奚由生哉故能有天下者必無以天下爲也能有名譽者必無以趨行求者也以用也聖人有所于達達則嗜慾之心外矣外弃也孔墨之弟子皆以仁義之術敎導於丗然而不免於儡身猶不能行也又況所敎乎儡身身不見用儡儡然也儡讀雷同之雷是何則其道外也夫以末求返于夲許由不能行也又況齊民乎斉民凡民斉於民也誠達于性命之情而仁義固附矣趨捨何足以滑心夫神無所掩心無所載通洞條達恬漠無事無所凝滯虚寂以待勢利不能誘也誘惑也進也辯者不能釋也聲色不能涇也美者不能濫也濫覦也或作監不能使之過濫知者不能動也勇者不能恐也此眞人之道也若然者陶冶萬物與造化者爲人為治也天地之閒宇宙之内莫能夭遏閒上下之閒也内四方之内也夫化生者不死而化物者不化化生者天也化物者德也神經於驪山太行而不能難驪山今在京兆新豊縣南也太行今在河内野王縣北也入於四海九江而不能濡四海四方之海也九江江分為九也處小隘而不寒横扄天地之閒而不窕扄猶閉也不通此者雖目數千羊之群耳分八風之調目視耳聽也八風八卦之風調和也足蹀陽阿之舞而手㑹緑水之趨陽阿古之名侣也緑水舞曲也一曰緑水古詩也趨投節也智終天地明照日月辯解連環澤潤玉石猶無益於治天下也澤潤澤也靜漠恬所以養性也和愉虚無所以養德也外不滑内則性得其宜性不動和則德安其位養生以經丗抱德以終年可謂能體道矣然者血脉無鬱滯五藏無蔚氣蔚病也禍福弗能撓滑非譽弗能塵垢故能致其極極至非有其丗孰能濟焉有其人不遇其時身猶不能脫又況無道乎道不得行且人之情耳目應感動心志知憂樂手足之㩌疾辟寒暑所以與物接也蜂蠆螫指而神不能憺螫讀解釋之釋憺定也蚉䖟噆膚而知不能平噆噬猶穿夫憂患之來攖人心也攖迫也非直蜂蠆之螫毒而蚉䖟之慘怛也而欲靜漠虚无奈之何哉夫目察秋毫之末耳不聞雷霆之音耳調玉石之聲目不見太山之髙何則小有所志而大有所志也今萬物之來擢拔吾悟攓取吾情有泉源雖欲勿稟其可得耶稟猶動用也今夫樹木者灌以水疇以肥壤疇雍或作嘹一人養之十人拔之則必無餘㮆㮆櫱有況與一國同伐之哉雖欲乆生豈可得乎今盆水在庭淸之終曰未能見眉睫濁之不過一撓而不能察方貟察見人神易濁而難淸猶盆水之也況一丗而撓滑之曷得須平乎古者至德之丗賈便其肆農樂其業大夫安其職職事而処士脩其道道先生之道也當此之時風雨不毀折草木不夭九鼎重味珠玉潤澤九鼎九州貢金所鑄也一曰象九德故曰九鼎也重厚也潤澤有光也洛出丹書河出緑圖故許由方回善卷披衣得達其道許由陽城人也堯所聘而不利也方回善卷披衣皆堯時隱士姓名不可得知其人方直回旋因曰方回見其善卷披衣而行因曰披衣得達楽其所脩先生之道也何則丗之主有欲利天下之心是以人得自樂其閒自樂其道於天地之閒也或作文德自楽其閒先王之道也四子之才非能盡善蓋今之丗也然莫能與之同光者遇唐虞之時光譽逮至夏桀殷紂燔生人辜諫者爲炮烙鑄金柱鑄金柱然火其下以人置其士人墯陊火中而對之笑也剖賢人之心析才士之脛賢人比干也析解也剥解有才士脚觀其有竒異脛脚也醢侯之女葅梅伯之骸勉便梅伯紂時諸侯梅伯説侯之女美好令紂妻之女至紂以為不好故醢侯之女葅梅伯之骸也一曰紂為无道梅伯数諌故葅其骸也當此之時嶢山崩三川涸嶢山蓋在南陽三川涇渭汧也涸竭也傳曰山崩川竭亡囯徵也飛鳥鎩翼走獸櫅脚言紂田獵禽荒无休止時故飛鳥折翼走獸毁脚无不害也當此之間豈獨無聖人哉然而不能通其道者不遇其丗言聖人不能通其道行其化者不遭丗也天鳥飛千仞之上獸走叢薄之中禍猶及之又況編戸齊民乎聚木曰叢深草曰薄猶及之田獵不時也由此之體道者不專在於我亦有繫於丗者矣夫歷陽之都一夕反而爲湖勇力聖知与罷怯不肖者同命歷陽淮南囯之縣名今屬江都昔有老嫗常行仁義有二诸生遇之謂曰此囯當爲湖謂嫗視東城門閫有血便走上北山勿顧也自此嫗便往視門閫閽者問之嫗對曰如是其暮門吏故殺雞血涂門閫明旦老嫗早往視門見血便上北山囯没爲湖与門吏言其事適一宿耳一夕旦而爲湖也勇怯同命无遺脫也巫山之上順風縱火膏夏紫芝與蕭艾俱死巫山在南郡膏夏大木也其理密白如膏故曰膏夏紫芝皆諭賢智也蕭艾賤草皆諭不肖故河魚不得明目穉稼不得育時其所生者然也河水濁故不得明目穉稼爲霜所彫故不得待其自熟時故曰其所生然也故丗治則愚者不得獨亂丗亂則智者不能獨治身蹈于濁丗之中而責道之不行也是猶兩絆騏而求其致千里也兩者雙也置猨檻中則與豚同非不巧捷也無所肆其能也肆極舜之耕陶也不能利其里所居之里南面王則德施乎四海四海天下仁非能益也處便而勢利也古之聖人其和愉寧靜性也其志得道行命也命天命也是故性遭命而後能行命得性而後能明得其本清靜之性故能明烏號之弓谿子之弩不能無而射鳥號柘桑也谿子為弩所出囯名也或曰谿蠻夷也以柘桑爲弩因曰谿子之弩也一曰谿子陽鄭囯善為弩匠因以為名也越舲蜀艇不能無水而浮舲小舩也蜀舩一版之舟若今豫章是也雖越人所便習无其水不能獨浮也仌今矰繳機而在上罟張而在下雖欲翺翔其勢焉得矰弋射身短矢也機發也翺翔鳥之髙飛翼上下曰翺直刺不動曰翔也故詩云采采卷耳不盈傾筐嗟我懷人寘彼周行以言慕逺丗也詩周南卷耳篇也言采采易得之菜不滿易盈之器以言君子為囯執心不精不能以成其道采易得之粟不能盈易滿之器也嗟我懷人寘彼周行言我思古君子官賢人置之列位也誠古之賢人各得其行列故曰慕逺也淮南鴻烈解卷第二淮南鴻烈解卷第三
