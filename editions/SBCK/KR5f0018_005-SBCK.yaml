body:
  text: 太尉祭酒臣許愼記上天文訓文者象也天先垂文象日月三星及彗孛皆謂以譴告一人故曰天文因以題篇天墜未形馮馮翼翼洞洞灟灟故曰大昭馮翼同灟无形之貌洞讀挺桐之桐灟讀以鐵頭斫地之鐲也道始于虚霩虚霩生宇宙宇宙生氣氣有漢垠宇四方上下也宙往古来今也將成天地之貌也漢垠重安之貌也淸陽者薄靡而爲天薄靡者若埃飛揚之貌重濁者滯凝而爲地淸妙之合專一作慱易重濁之凝竭難故天先成而地後定天地之襲精爲隂陽襲合也精氣也隂陽之專精爲四時四時之散精爲萬物積陽之氣生火火氣之精者爲日積隂之寒氣者爲水水氣之精者爲月日月之淫爲精者爲星辰天受日月星辰地受水潦塵埃昔者共工與顓頊爭爲帝怒而觸不周之山共上官名伯於宓羲神農之間其後子孫任智刑以強故与顓頊黄帝之孫爭位不周山在西北也天柱折地維絶天傾西北故日月星辰移焉傾髙也原道言地東南傾傾下也此先言傾西北明其髙也地不滿東南故水潦塵埃歸焉天道曰貟地道曰方方者主幽貟者主明明者吐氣者也是故火曰外景幽者含氣者也是故水曰内景吐氣者施含氣者化是故陽施隂化天之偏氣怒者爲風天地之含氣和者爲雨隂陽相薄感而爲雷薄迪也惑動也激而爲霆亂而爲霧陽氣勝則散而爲雨露散霧散也隂氣勝則凝而爲霜雪毛羽者飛行之也故屬於陽介鱗者蟄伏之也故屬於隂日者陽之主也是故春夏則群獸除除冬毛微墮也日至而麋鹿解日冬至麋角解日夏至鹿角解月者隂之宗也是以月虛而魚腦減月死而羸硥膲宗本也減少也膲不滿言應隂氣也膲讀若物醮少之醮也火上蕁水下流故鳥飛而髙魚動而下物相動本標相應蕁讀葛覃之覃慓讀刀未之末故陽燧見日則燃而爲火陽燧全也取金杯无縁者熟摩令日中時以當日下以艾承之則燃得大也方諸見月則津而爲水方諸隂遂大蛤也熟磨拭令月盛時以向月下則水生以銅受之下水數滴先師然也虎嘯而谷風至龍舉而景雲屬虎土物也谷風木風也水生於土故虎嘯而谷風至龍水也雲生水故舉而景雲屬屬會也麒麟而日月食鯨魚死而彗星出蠶珥絲而商弦絶蠶老絲成自中徹外然視之如今精珥表裏見故曰珥絲一曰弄絲於口商音淸細而急故先絶也賁星墜而勃海決賁星客星也又作孛星墜隕也勃大也決溢也人主之情上通于天故誅則多飄風暴虐也飄風迅也枉法令則多蟲螟食心曰螟榖之災也殺不辜則囯赤地赤地旱也令不收則多淫雨干時之令不收納則久雨爲災四時者天之吏也曰月者天之使也星辰者天之期也期㑹也虹蜺彗星者天之忌也雄爲虹雌爲蜺也虹者色也忌禁也天有九野九千九百九十九隅去地五億萬里九野九天之野也一野千一百一十一隅也五星八風二十八宿五星星熒惑鎭星太白辰星也八風八卦之風也二十八宿東方角亢氐房心星箕北方斗牛女虛危室壁西方奎婁胃畢觜參南方井栁星張翼軫也五官六府五官五行之官六府如以榖紫宮太微軒轅咸池四守天阿皆星名下自解何謂九野中央曰鈞天其星角亢氐韓鄭之分野也東方曰蒼天其星房心尾東北曰變天陽氣始作萬物萌牙故曰変天其星箕斗牽牛尾箕一名析木燕之分野斗吴之分野牽牛一名星紀越分野北方曰天其星須女虚危營室虚危一曰枵齊之分野西北方曰幽天幽隂也酉方季秋將即於隂故曰幽天也其星東壁奎婁營室東壁一名承委衞之分野奎婁一名降婁魯之分野西方曰昊天皓白也西方金色白故曰吴天或作是其星胃昴畢昴畢一名大梁趙之分野西南方曰朱天朱陽也西南為少陽故曰朱天其星觜嶲參東井觜嶲參一名實沈晉之分野南方曰炎天其星輿柳七星柳七星張周之分野一名鶉火東南方曰陽天東南純乾用事故曰陽天其星張翼軫翼軫一名鶉尾楚之分野何謂五星東方木也其帝太皥太皡伏犧氏有天下号也死託祀於東方之帝也其佐句芒執規而治春其神爲歳星其獸蒼龍其音角其日甲乙木色蒼蒼龍順其色也角木也甲乙皆木也南方火也其帝炎帝炎帝少典之子也以火德王天下号曰神農死託祀於南方之帝其佐朱明舊云祝融執衡而治夏其神爲熒惑其獸朱鳥熒惑五星之一也朱鳥朱雀也其音徴其日丙丁徴火也丙丁皆火也中央土也其帝黃帝黄帝少典之子也以土德王天下号曰軒轅氏死託於中央之帝其佐后土執繩而制四方其神爲鎭星其獸黃龍土色黄也其音宫其日戊已宫士戊巳土也西方金也其帝少昊少昊黄帝之子青陽也以金德王号曰金天氏死託祀於西方之帝其佐蓐收執矩而治秋其神爲太白其獸白虎其音商其日庚辛商金也庚辛皆金也北方水也其帝顓頊顓頊黄帝之孫以水德王天下号曰髙陽氏死託祀北方之帝也其佐冥執權而治冬其神爲辰星其獸武其音羽其日壬癸羽水也壬癸皆水也太隂在四仲則歲星行三宿仲中也四中謂太隂在邜酉子午四面之中也太隂在四鉤則歳星行二宿丑鉤辰申東井輿以八月秋分効角亢以十一月乆至効斗牽牛効見出以辰戌入以丑未出二旬而入晨候之東方夕候之西方一時不出其時不和四時不出天下大飢榖不熟為飢也何謂八風距日冬至四十五日條風至艮卦之風一名融為笙也條風至四十五日明庶風至震卦之風也為管也明庶風至四十五日淸明風至巽卦之風也為柷也淸明風至四十五日景風至离卦之風也為也景風至四十五日凉風至坤卦之風也為損也涼風至四十五日閶闔風至兊卦之風也為鍾也閶闔風至四十五日不周風至乾卦之風也為磬也不周風至四十五日廣莫風至坎卦之風也為鼓也條風至則出輕繫去稽留立春故出輕繫明庶風至則正封疆修田疇春分憣榖故正封疆治田疇也淸明風至則出幣帛使諸侯立夏長飬而恩惠故幣帛聘問諸侯也景風至則爵有位賞有功夏至隂氣在下陽盛於上象陽布施故賞有功封建侯也涼風至則報地德祀四郊立秋節農乃登榖常祭故報地德祀四方神也閶闔風至則收縣垂琴瑟不張秋分殺氣國君愴故去鍾磬縣垂之楽也不周風至則脩宮室繕邊城立冬節土功其始故治宫室繕脩邊城備宼難也廣莫風至則閉梁決刑罰象冬閉藏不通關也罰刑疑者於是順時而决之何謂五官東方爲田南方爲司馬西方為理北方爲司空中央爲都田主農司馬主兵理主獄司空主土都為四方最也何謂六府子午丑未寅申邜酉辰戌已亥是也太微者太一之庭也太微星名也太一天神也紫宫者太一之居也軒轅者帝妃之舎也咸池者水魚之囿也咸池星名水魚天神天阿者群神之闕也闕猶門也四宫者所以爲司賞罰四宫紫宫軒轅咸池天阿太㣲者主朱鳥主猶典也紫宫執斗而左旋日行一度以周於天日冬至峻狼之山南極之山日移一度月行百八十二度八分度之五而夏至牛首之山牛首之此極山反覆三百六十五度四分度之一而成一歳天一元始正月建寅日月俱入營室五度天一以始建七十六歳日月復以正月入營室五度無餘分名曰一紀凡二十紀一千五百二十歳大終日月星辰復始甲寅元日行一度而歳有竒四分度之一故曰歳而積千四百六十一日而復合故舎八十歳而復故曰子午邜酉爲二繩繩直丑寅辰巳未申戌亥為四鉤東北爲報德之維也報復也隂氣極於北方陽氣發於東方自隂復陽故曰報德之維四角為維也西南爲背陽之維西南已過陽將復陽故曰背陽之維東南爲常羊之維常羊不進不退之貌也東南純陽用事不盛不衰常如此故曰常羊之維西北爲蹏通之維西北純隂陽氣閉結陽氣將萌蹏始通之故曰蹏通之維日冬至則斗北中繩隂氣極陽氣萌故曰冬至為德德始生也日夏至則斗南中繩陽氣極隂氣萌故曰夏至為刑刑始殺也隂氣極則下至黄泉北至北極故不可以鑿地穿井万物閉藏蟄虫首穴故曰德在室陽氣極則南至南極上至朱天故不可以夷丘上屋万物蕃息五榖兆長故曰德在野日冬至則水從之日夏至則火從之故五月火正火正而水漏火正火王也故水滲漏一大星正中地漏溼也十一月水正而隂勝水正水王也故隂勝也一營室正中於南方陽氣爲火隂氣爲水水勝故夏至溼火勝故冬至燥燥故炭輕溼故炭重日冬至井水盛盆水溢羊脫毛麋角解鵲始巢八尺之脩日中而景丈三尺日夏至而流黄澤石精出流黄土之精也隂氣作於下故流澤而出也石精五色之精也蟬始嗚半夏生半夏薬草昬䖟不食駒犢鷙鳥不搏黃口五月微隂在下未成駒犢黄口肌血脆弱未成故蟁䖟鷙鳥應隂不食不博也八尺之景脩徑尺五寸景脩則隂氣勝景短則陽氣勝隂氣勝則為水陽氣勝則為旱隂陽刑德有七何謂七室堂庭門巷術野十二月德居室三十日先日至十五日後日至十五日而徙所居各三十日德在室則刑在野德在堂則刑在術德在庭則刑在巷隂陽相德則刑德合門八月二月隂陽氣均日夜分平故曰刑徳合門德南則生刑南則殺故曰二月㑹而万物生八月㑹而草木死兩維之閒九十一度也自東北至東南為兩維帀四維三百六十五度一度者二千九百三十二里十六分度之五而升日行一度十五日爲一節以生二十四時之變斗指子則冬至音比黃鍾黄鍾十一月也鍾者聚也陽氣聚於黄泉之下也加十五日指癸則小寒音比應鍾應鍾十月也言隂應於陽轉成其功万物應時聚藏故曰應鍾加十五日指丑則大寒音比無射无射九月也隂氣上升陽氣下降万物隨陽而藏无有身出見也故曰无射加十五日指報德之維則越隂在地故曰距日冬至四十六日而立春陽氣凍解音比南吕南吕八月也南在也宫陽氣内藏隂侣於陽任成其功故曰南吕也加十五日指寅則雨水音比夷則夷則七月也夷傷則法也言陽衰隂發万物凋傷應法成性故曰夷則也十五日指甲則雷驚蟄音比林鍾林鍾六月也林衆鍾聚也陽極隂生万物衆聚而盛故曰林鍾加十五日指邜中繩故曰春分則雷行音比蕤賔蕤賔五月也隂氣委蕤在下以主人陽在上似賔客故曰蕤賔也加十五日指乙則清明風至音比仲吕仲吕四月也陽在外隂在中所以侣中於陽助成功也故曰仲吕也加十五日指辰則榖雨音比姑洗姑洗三月也姑故也洗新也陽氣飬生去故就新故曰姑洗也加十五日指常羊之維則春分盡故曰有四十六日而立夏大風濟済止音比夾鍾夾鍾二月也夾夾也万物去隂夾陽地而生故曰夾鍾也加十五日指巳則小滿小滿四月也音比太蔟太蔟正月律也蔟蔟也言隂衰陽發万物蔟地而生故曰太蔟也加十五日指丙則芒種音比大吕大吕十二月律也吕侣也万物萌動於下未能逹見故曰大吕所以配黄鍾助陽宣功也加十五日指午則陽氣極故曰有四十六日而夏至音比黄鍾加十五日指丁則小暑音比大吕加十五日指未則大暑音比大蔟加十五日指背陽之維則夏分尽故曰有四十六日而立秋涼風至音比夾鍾加十五日指申則處暑音比姑洗加十五日指庚則百露降音比仲吕加十五日指酉中繩故曰秋分雷戒蟄蟲北郷音比蕤賔加十五日指辛則寒露音比林鍾加十五日指戌則霜降音比夷則加十五日指蹏通之維則秋分盡故曰有四十六日而立冬草木畢死音比南吕加十五日指亥則小雪音比無射加十五日指壬則大雪音比應鍾加十五日指子故曰陽生於子隂生於午陽生於子故十一月日冬至鵲始加巢人氣鍾首隂生於午故五月爲小刑薺麥亭歷枯冬生草木必死斗杓爲小歳斗第一星至第四爲魁第五至第七爲杓也正月建寅月從左行十二辰咸池爲太歳二月建夘月從右行四仲終而復始太歳迎者辱背者強左者衰右者昌小歳東南則生西北則殺不可迎也而可背也不可左也而可右也其此之謂也大時者咸池也小時者月建也天維建元常以寅始起右徙一歳而移十二歳而大周天終而復始
