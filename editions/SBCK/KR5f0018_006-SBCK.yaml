front:
  text: 淮南元年冬太一在丙子冬至甲午立春丙子淮南王作書之元年也一曰淮南王長孝文皇帝異母弟也僣号自稱東帝以徙嚴道道死於雍其四子皆為列侯時人歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容文帝間之曰以我為利其土邪皆召四侯而王之是則淮南王安即位之元年以紀時也二隂一陽成氣二二陽一隂成氣三隂粗故時氣少陽精微故得氣多一說上得二下得三合爲五故曰合氣而爲音音數五也合氣而爲音合隂而爲陽合陽而爲律故曰五音六律音自倍而爲日律自倍而爲辰故曰十而辰十二月日行十三度七十六分度之二十六六或作八二十九日九百四十分日之四百九十九而爲月而以十二月爲歳歳有餘十日九百四十分日之八百二十七故十九歳而七閏日冬至子午夏至卯酉冬至加三日則夏至之日也冬至後三日則明年夏至之日歳遷六日終而復始遷六日今年以子冬至後年以午冬至也壬午冬至甲子受制木用事火煙靑木色青也東方七十二日丙子受制火用事火煙赤火色赤也南方七十二日戊子受制土用事火煙黄土中央其色黄七十二日庚子受制金用事火煙白西方金其色白七十二日壬子受制水用事火煙黒北方水其色黒七十二日而歳終庚子受制歳遷六日以數推之七十歳而復至甲子甲子受制則行柔惠挺群禁開闔扇通障塞毋伐木甲木也木王東方故施柔惠蟄伏之出由戸故開闔扇通障塞春木王故母伐木也丙子受制則舉賢良賞有功立封侯出貨財火用事象陽明識功勞故封建侯出貨財戊子受制則養老鰥寡行粰鬻施恩澤土用事象土長養故施恩澤也庚子受制則繕牆垣脩城郭審群禁飾兵甲儆百官誅不法金用事象金断割故誅不如法度也壬子受制則閉門閭大捜客禁搜客出新客断罰刑殺當罪息梁禁外徙水用事象冬閉固故禁外徙也甲子氣燥濁丙子氣燥陽戊子氣溼濁庚子氣燥寒壬子氣淸寒丙子干甲子蟄蟲早出木氣温故早出故雷早行戊子干甲子胎天鳥蟲多傷庚子干甲子有兵壬子干甲子春有霜戊子干丙子霆庚子干丙子夷夷傷也夷或電壬子干丙子雹甲子干丙子地動庚子干戊子五榖有殃壬子干戊子夏寒雨霜甲子干戊子介蟲不爲不成爲介蟲也丙子干戊子大旱封熯蔣草也生水土相連特大如薄者也名曰封旱燥故熯也壬子干庚子大剛魚不爲不成爲魚甲子干庚子草木再死再生丙子干庚子草木復榮今八月九月時李柰復榮生實是也戊子干庚子歳或存或亡甲子干壬子冬乃不藏不藏地氣發也丙子干壬子星墜墜隕戊子干壬子蟄蟲冬出其郷庚子干壬子冬雷其郷季春三月豐隆乃出以將其雨豐隆雷也至秋三月季秋之月地氣不藏乃收其殺百蟲蟄伏靜居閉戸殺氣青女乃出以降霜雪青女天神青玉女主霜雪也行十二時之氣以至于仲春二月之夕乃收其藏而閉其寒收斂其所藏而閉之女夷鼔歌以司天和以長百榖禽鳥草木女夷主春夏長養之神也孟夏之月以熟榖禾䧺鳩長鳴爲帝候歳雄鳩盖布穀也是故天不發其隂則万物不生地不發其陽則万物不成天貟地方道在中央日爲德月爲刑月歸而万物死日至而万物生逺山則山氣藏逺水則水蟲蟄逺木則木葉槁日五日不見失其位也聖人不與也与猶也日出于暘谷浴于咸池拂于扶桑是謂晨明拂猶過一曰至登于扶桑爰始將行是謂朏明朏明將明也朏讀若朏諾皐之朏也至于曲阿是謂旦明平月至于曽泉是謂蚤食至于桑野是謂晏食至于衡陽是謂隅中至于昆吾是謂正中昆吾丘在南方至于鳥次是謂小還鳥次西南之山名也鳥所宿止至于悲谷是謂餔時悲谷西南方之大壑言其深峻臨其上令人悲思故曰悲谷也至于女紀是謂大還女紀西北隂地至于淵虞是謂髙春淵隅地名髙春時加成民碓春時也至于連石是謂下春連石西北山名也言將欲冥下象悉春故曰下春連讀腐爛之爛也至于悲泉爰止其女爰息其馬是謂縣車至于虞淵是謂黄昏至于䝉谷是謂定昏蒙谷北方之山名也盧敖所見若士之所也日入干虞淵之汜曙於蒙谷之浦曙明浦涯行九州七舎有五億万七千三百九里自陽谷至虞淵凡十六所為九州七舍也禹以爲朝晝昬夜夏日至則隂乗陽是以万物就而死冬日至則陽乗隂是以万物仰而生晝者陽之分夜者隂之分是以陽氣勝則日脩而夜短隂氣勝則日短而夜脩帝張四維運之以斗運施也月徙一辰復反其所正月指寅十二月指子一歳而帀終而復始指寅則萬物螾螾動生貌律受太蔟太蔟者蔟而未出也指卯卯則茂茂然律受夾鍾夾鍾者種始莢也指辰辰則振之也律受姑洗姑洗者陳去而新來也指巳巳則生巳定也律受仲吕仲吕者中充大也指午午者忤也律受蕤賔蕤賔者安而服之指未未昧也律受林鍾林鍾者引而止也指申者神之也律受夷則夷則者易其則也德以去矣指酉酉者飽也律受南吕南吕者任包大也指戌戌者滅也律受无射无射入无厭也指亥亥者閡也律受應鍾應鍾者應其鍾也指子子者兹也律受黃鍾黃鍾者鍾已黄也指丑丑者紐也律受大吕大吕者旅旅而去也其加卯酉則隂陽分日夜平矣故曰規生矩殺衡長權藏繩居中央爲四時根道曰規始於一一而不生故分而爲隂陽隂陽合和而萬物生故曰一生二二生三三生萬物天地三月而爲一時故祭祀三飯以爲礼喪紀三踊以爲節兵重三罕以爲制以三㕘物三三如九故黃鍾之律九寸而宫音調調和也因而九之九九八十一故黃鍾之數立焉黄者土德之色鍾者氣之所種也日冬至德氣爲土土色黄故曰黄鍾律之數六分爲雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之爲積分七十萬七千一百四十七黃鍾大數立焉凡十二律黃鍾爲宫太蔟爲商姑洗爲角林鍾爲徴南吕爲羽物以三成音以五立三與五如八故卯生者八竅律之初生也寫鳳之音故音以八生黄鍾爲宫宫者音之君也故黄鍾位子其數八十一主十一月下生林鍾林鍾之數五十四主六月上生太蔟太蔟之数七十二主正月下生南吕南吕之数四十八主八月上生姑洗姑洗之数六十四主三月下生鍾鍾之数四十二主十月上生蕤賔蕤賔之数五十七主五月上生大吕大吕之数七十六主十二月下生夷則夷則之数五十一主七月上生夾鍾夾鍾之数六十八主二月下生无射元射之数四十五主九月上生仲吕仲吕之数六十主四月極不生徴生宫宫生商商生羽羽生角角生姑洗姑洗生鍾比於正音故為和應鍾十月也与正音比故為和和从声也一曰和也鍾生賔不比正音故為繆日冬至音比林鍾浸以濁日夏至音比黄鍾浸以清以十二律二十四時之変甲子仲吕之徴也丙子夾鍾之羽也戊子黄鍾之宫也庚子无射之商也壬子夷則之角也古之為度量輕重生乎天道黄鍾之律脩九寸物以三生三九二十七故幅廣二尺七寸古者幅比皆然也音以八相生故人脩八尺尋自倍故八尺而爲尋有形則有聲音之数五以五乗八五八四十故四丈而為匹匹者中人之度也一匹而為制秋分蔈定蔈定而禾熟蔈禾穗粟孚甲之芒也定者成也故禾熟讀如诗有貓有虎之貓古文作秋也律之数十二故十二蔈而當一粟十二粟而當一寸律以當辰音以當日日之数十十從甲至癸也故十寸而為尺十尺而為丈其以為量十二粟而當一分分言其輕重分銖也十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖為一兩天有四時以成一歳因而四之四四十六故十六兩而為一斤三月而為一時三十日為一月故三十斤為一鈞四時而為一歳故四鈞為一石其以為音也一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歳之日故律歷之数天地之道也下生者倍以三除之上生者四以三除之鍾律上下相生诱不敏也太隂元始建于甲寅一終而建甲戌二終而建甲午三終而復得甲寅之元歳徙一辰立春之後得其辰而迁其所順前三後五百事可㪯前後太隂之前後也太隂所建蟄蟲首穴而処鵲巢鄉而為戸太隂在寅朱烏在卯勾陳在子武在戌白虎在酉蒼龍在辰寅為建卯為除辰為滿巳為平主生午為定未為執主陷申為破主衡酉為危主杓戌為成主少德亥為牧主大德子為開主太歳丑為閉主太隂在寅歳名曰攝提格其雄為歳星舎斗牽牛以十一月与之晨出東方東井輿為對太隂在卯歳名曰單閼单讀明揚之明星須女虚危以十二月与之晨出東方柳七星張為對太隂在辰歳名曰執除歳星含營室東壁以正月与之晨出東方翼軫為對太隂在巳歳名曰大荒落歳星舍奎婁以二月与之晨出東方角亢為對太隂在午歳名曰敦䍧歳星胃昴畢以三月与之晨出東方氐房心為對太隂在未歳名曰協洽歳星觜雋參以四月与之晨出東方尾箕為對太隂在申歳名曰涒灘歳星舍東井輿以五月與之晨出東方斗牽牛為對太隂在酉歳名曰作鄂作讀也歳星舍柳上星張以六月與之晨出東方須女虚危為對太隂在戊歳名曰閹茂歳星舍翼軫以七月与之晨出東方營室東壁為對太隂在亥歳名曰大淵献歳星角亢以八月与之晨出東方奎婁為對太隂在子歳名困敦困讀羣歳星氐房心以九月与之晨出東方胃畢為對太隂在丑歳名曰赤奮歳星舎尾箕以十月与之晨出東方觜嶲參爲對太隂在甲子刑德合東方宫常徙所不勝合四歳而離離十六歳而復合所以離者刑不得入中宫而徙於木太隂所居曰德辰爲刑德綱曰自倍因柔曰徙所不勝刑水辰之木木辰之水金火立其処凡徙諸神朱鳥在太隂前一鉤陳在後三武在前五白虎在後六虚星乗鉤陳而天地襲矣襲和也凡日甲剛乙柔丙剛丁柔以至於癸木生於亥壯於卯死於未三辰皆木也火生於寅壯於午死於成三辰皆火也土生於午壯於成死於寅三辰皆土也金生於已壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也故五勝生一壯五終九五九四十五故神四十五日而一徙以三應五故八徙而歳終凡用太隂左前刑右背德擊鉤陳之衝辰以必勝以攻必剋欲知天道以日爲主六月當心左周而行分而爲十二月与日相當天地重襲後必无殃星正月建營室二月建奎婁三月建胃室宜言日明堂月令孟春之月日在營字仲春之月在奎婁季春之月在胃此言星正月建營室字之誤也四月建畢五月建東井六月建張七月建翼八月建亢九月建房十月建尾十一月建牽牛十二月建虚星分度角十二亢九氐十五房五心五尾十八箕十一四分一斗二十六牽牛八須女十二虚十危十七營室十六東壁九奎十六婁十二胃十四卯十一畢十六觜嶲二參九東井三十輿四柳十五七星張翼各十八軫十七凡二十八宿也星部地名角亢鄭氐房心宋尾箕燕斗牽牛越須女吴虚危齊營室東壁衞奎婁魯胃昴畢魏觜雋參趙東井輿秦柳七星張周翼軫楚歳星之所居五榖豐昌其對爲衝歳乃有殃當居而不居越而之他處主死囯亡大隂治春則欲行柔惠温涼水徳仁也故柔涼也太隂治夏則欲布施宣明火德陽也故布施偏明也太隂治秋則欲脩備繕兵金德断割故脩兵也太隂治冬則欲猛毅剛彊純隂閉固水澤冰凍故剛彊也三歳而改節六歳而易常故三歳而一饑六歳而一衰十二歳一康康盛也甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬衞癸越子周丑翟寅楚卯鄭辰晉巳衞午秦未宋申齊酉魯戌趙亥燕甲乙寅卯木也丙丁巳午火也戊己四季土也庚辛申酉金也壬癸亥子水也水生木木生火火生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困以勝擊殺勝而无報以專從事而有功以義行理名立而不墯以保畜養万物蕃昌以困舉事破滅死亡北斗之神有雌雄十一月始建於子月從一辰雄左行雌右行五月合午謀刑十一月合子謀德太隂所居辰爲猒日猒日不可以舉百事堪輿徐行雄以音知雌故爲竒辰數從甲子始子母相求所合之處爲合十日十二辰周六十日凡八合合於歳前則死亡合於歳後則无殃甲戍燕也乙酉齊也丙午越也丁巳楚也庚申秦也辛卯戎也壬子代也癸亥胡也戊戌己亥韓也已酉已卯魏也戊午戊子八合天下也太隂小歳星日辰五神皆合其日有雲風雨囯君當之天神之貴者莫貴於靑龍或曰天一或曰太隂太隂所居不可背而可郷北斗所擊不可与敵天地以設分而爲隂陽陽生於隂隂生於陽隂陽相錯四維乃通或死或万物乃成蚑行喙息莫貴於人孔竅肢躰皆通於天天地九重人亦有九竅天有四時以制十二月人亦有四肢以使十二節天有十二月以制三百六十日人亦有十二肢以使三百六十節故㪯事而不順天者逆其生者也以日冬至数來歳正月朔日五十日者民食足不滿五十日日减一十有餘日日益一升有其歳司也攝提格之歳格起言萬物承陽而起也歳早水晚旱稻疾不登登成也菽麥昌民食四寅在甲曰閼蓬言萬物鋒芒欲出擁遏未通故曰閼蓬也單閼之歳單盡閼止也言陽氣推萬物而起隂氣盡止也歳和稻菽麥昌民食五升卯在乙曰旃蒙在乙言䝉物遏蒙甲而出故曰旃蒙也執徐之歳執蟄徐舒也言伏蟄之物皆散舒而出也歳早旱晚水小饑蠶閉麥熟民食三升辰在丙曰柔兆在丙萬物皆生枝布葉故曰柔兆也大荒落之歳荒大也方萬物熾盛而大出霍然落落大布散歳有小兵小登麥昌菽疾民食二升巳在丁曰強圉在丁言萬物剛盛故曰強圉也敦䍧之歳言萬物皆盛壯也敦䍧敦盛特壯也歳大旱登稻疾菽麥昌禾不爲民食二升午在戊曰著雝在戊言位在中央萬物繁養曰方故曰著雝也協洽之歳協和洽合也言隂欲化萬物和合歳有小兵登稻昌菽麥不爲民食三升未在已曰屠維在已言萬物各成其性故曰屠維屠别維離也涒灘之歳涒大灘脩也言萬物皆脩其精氣也歳和小雨行蠶登菽麥昌民食三申在庚曰上章在庚言隂氣上升万物畢生故曰上章也作鄂之歳作鄂零落也万物皆陊落歳有大兵民疾蠶不登菽麥不爲禾蟲民食五酉在辛曰重光在辛言萬物就成熟其煌煌故曰重光也掩茂之歳掩蔽荗冒言万物皆蔽冒歳小飢有兵蠶不登麥不爲菽昌民食七升戌在壬曰黓在王言歳終包任万物故曰也大淵獻之歳淵藏獻迎也言万物終在亥大小深藏窟伏以迎陽歳有大兵大飢開菽麥不爲禾蟲民食三困敦之歳困混敦沌也言陽氣皆混沌万物牙孽也歳大霧起大水出稻菽麥昌民食三斗子在癸曰昭陽在癸言陽氣始萌万物合生故曰昭陽赤奮之歳奮起也順也言陽奮物而起之无不順其性也赤陽色歳有小兵早水蠶不出稻疾菽不爲麥昌民食一升正朝一作月夕先樹一表東方操一表却去前表十歩以參望日始出北廉日直入又樹一表於東方因西方之表以參望日方入北廉則定東方兩表之中与西方之表則東西之正也日冬至日出東南維入西南維至春秋分日出東中入西中夏至出東北維入西北維至則正南欲知東西南北廣袤之數者立四表以爲方一里岠先春分若秋分十餘日從岠北表參望日始出及旦以侯相應相應則此與日直也輙以南表參望之以入前表數爲法除舉廣除立表袤以知從此東西之數也假使視日出入前表中一寸是寸得一里也一里積萬八千寸得從此東萬八千里視日方入入前表半寸則半寸得一里半寸而除一里積寸得三萬六千里除則從此西里數也并之東西里數也則極徑也未春分而直已秋分而不直此處南也未秋分而直已春分而不直此處北也分至而直此處南北中也從中處欲知中南也未秋分而不直此處南北中也從中處欲知南北極逺近從西南表參望日日夏至始出与北表參則是東與東北表等也正東萬八千里則從中北亦萬八千里也倍之南北之里數也其不從中之數也以出入前表之數益損之表入一寸寸減日近一里表出一寸寸益逺一里欲知天之髙樹表髙一丈正南北相去千里同日度其隂北表二尺南表尺九寸是南千里隂短寸南二萬里則无景是直日下也隂二尺而得髙一丈者南一而髙五也則置從此南至日下里數因而五之爲十萬里則天髙也使景与表等則髙与逺等也淮南鴻烈解卷第三淮南鴻烈解卷第四
