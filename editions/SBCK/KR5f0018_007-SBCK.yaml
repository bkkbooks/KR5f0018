body:
  text: 形訓紀東西南北山川藪澤地之所載萬物形兆所化育也故形因以題篇墬形之所載六合之閒四極之内六合已在原道四極四方之極无夏有外故謂之内也昭之以日月經之以星辰紀之以四時要之以太歳更正也以太歳所在正天時也天地之閒九州八極八極八方之極也土有九山山有九塞澤有九藪風有八等水有六品何謂九州東南神州曰農土東南辰焉農祥后稷之所經緯也故曰農土也正南次州曰沃土沃盛也五月建午稼穡盛張故曰沃土也西南戎州曰滔土滔大也七月建申五榖成大故曰滔土也正西弇州曰并土并猶成也八月建酉百榖成熟故曰并土也正中兾州曰中土兾大也四方之主故曰中土也西北台州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也隱氣所隱藏故曰隱土也正東陽州曰申土申復也隂氣盡於北陽復氣起東北故曰申土何謂九山㑹稽泰山王屋首山太華山太行羊腸孟門會稽山在㑹稽郡泰山今在泰山郡是爲東岳王屋山在今河東縣東北所出也首山在蒲坂縣南阿曲之中伯夷所隱太華今農隂山也是爲西岳山今扶風漢陽縣北周家所邑也太行在今上黨太行關直河内野王縣是也羊腸山名也苑曰桀之居左河濟右太華伊闕在其南羊腸在其北今太原晉陽西北九十里通河西上郡關曰羊腸坂是孟門太行之限也何謂九塞曰大汾渑阨荆阮方城殽阪井陘令疵句注居庸太汾在晉澠阨今農澠池是也荆阮方城皆在楚殽阪農郡澠也殽欽吟是也井陘在常山通太原關是也令疵在遼西句注在鴈門隂館句注是也居庸在上谷阻陽之東通運都關是也何謂九藪藪澤曰越之具區具區在吴越之間也楚之雲夢雲夢在南郡華容也秦之陽紆陽紆蓋在馮翊池陽一名具圃晉之大陸大陸魏献子所游焚焉而死者是也鄭之圃田圃田在今河南中牟傳曰鄭有原圃猶秦之具圃也吾子取其麋鹿以閑弊邑是也宋之孟諸孟諸在今梁園睢陽東北澤是也齊之海隅海隅猶崖蓋近海濵是也趙之鉅鹿今鉅鹿廣阿澤是也燕之昭余昭余今太原郡是古者属燕也何謂八風東北曰炎風艮氣所生一曰融風也東曰條風震氣所生也一曰明庶風東南曰景風巽氣所生也一曰清明風南方曰巨風离氣所生也一曰凱風也西南曰涼風坤氣所以生也西方曰飂風兊氣所生也西北曰麗風乾氣所生也一曰閭闔風北方曰寒風坎氣所生也一曰廣莫風何謂六水曰河水赤水遼水黒水江水淮水河水出崑菕東北陬赤水出其東南陬遼水出碣石山自塞北東流直遼東之西南入海黒水在雝州江水出岷山在蜀西徼淮水出桐柏山南平陽也闔四海之内東西二萬八千里南北二萬六千里子午爲經卯酉爲緯言經短緯長也水道八千里通谷其名川六百陸徑三千里陸徑邪徑也陸地也禹乃使太章歩自東極至于西極二億三萬三千五百里七十五歩使豎亥歩自北極至于南極二億三萬三千五百里七十五歩太章豎亥善行人皆禹臣也海内東西短南北長極内等也凡鴻水淵藪自三百仞以上二億三萬三千五百五十里有九淵禹乃以息土塡洪水以爲名山息土不耗減掘之益多故以塡洪水也名山大山也掘崑崙虚以下地掘猶平也地或作池中有增城九重其髙萬一千里百一十四歩二尺六寸中昆崙虛中也增重也有五城十二樓見括地像此盖誕實未聞也上有木禾其脩五尋上崑崙虚上也五尋長三十五尺珠樹玉樹琁樹不死樹在其西在木禾之西也沙棠琅玕在其東皆玉名也在木禾之東也一沙棠木名也吕氏春秋曰果之美者沙棠之實也絳樹在其南絳赤碧樹瑶樹在其北碧青玉也木禾之北旁有四百四十門面有十門也門閒四里里閒九純純丈五尺純里名也旁有九井玉橫維其西北之隅横猶光也横或作彭彭受不死薬噐也北門開以内不周之風傾宫旋室傾宫宫滿一頃田中也旋室以旋玉飾室也一室琁璣閞可轉旋故曰旋室縣圃涼風樊桐在崑崙閶闔之中閶闔崑崙虚門名也縣圃涼風樊桐皆崑崙之山名也樊讀如麥飯之飯是其䟽圃䟽圃之池浸之黃水黃水三周復其原原本是謂丹水飲之不死河水出崑崙東北陬貫㴾海入禹所導積石山潡海大海也河水自崑崙由地中行禹導而通之至積石山書曰河出積石入猶出也赤水出其東南陬西南注南海丹澤之東赤水之東弱水出自窮石窮石山名也在張掖北塞水也至于合黎餘波入于流沙絶流沙南至南海絶猶過也流沙流行也洋水出其西北陬入于南海羽民之南洋水經隴西氐道東至武都為漢陽或作養也凡四水者帝之神泉以和百藥以潤萬物崑崙之丘或上倍之假今髙万里倍之二万里是謂涼風之山登之而不死或上倍之是謂懸圃登之乃霊能使風雨或上倍之乃維上天登之乃神是謂太帝之居太帝天帝扶木在陽州日之所扶木扶桑也在湯谷之南猶照也過陽州東方也讀无枝㩌之㩌也建木在都廣建木其狀如牛引之有皮若瓔黄䖳葉君羅都廣南方山名也衆帝所自上下日中無景呼而無嚮蓋天地之中也衆帝之從都廣山上天還下故曰上下日中時日直人上无有晷故曰蓋天地之中若木在建木而末有十日其華照下地木端也木端有十日如蓮華華猶光也光照其下也九州之大純方千里純縁也亦曰量名也九州之外乃有八殥亦方千里殥猶逺也殥讀胤嗣之胤自北東方曰大澤曰無通大澤无通皆薮名也東方曰大渚曰少海木中可居者曰者東方多水故曰少海亦澤名也東南方曰具區曰元澤元讀常山人謂伯爲冗之冗也南方曰大夢曰浩澤夢雲夢也浩亦大也西南方曰渚資曰丹澤蓋近丹水因其名故曰丹澤也西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤北方多寒也故曰寒澤也凡八殥八澤之雲是雨九州八殥之外而有八紘紘維也維落天地而爲之表故曰紘也亦方千里自東北方曰和丘曰荒土鳳所自歌鵉所自舞名曰和丘曰荒土也東方曰林曰桑野東南方曰大窮曰衆女南方曰都廣曰反戸都廣囯名也山在此囯因復曰都廣山言其在郷曰之南昔為北郷戸故反其戸也西南方曰焦僥曰炎土焦僥短人之囯也長不滿三尺西方曰金丘曰沃野西方金位也因為金丘沃猶白也西方白故曰沃野也西北方曰一目曰沙所囯人一目在面中央沙所蓋流沙所出也一日澤名也北方曰積冰曰委羽北方寒冰所積因以爲名積冰也委羽山名也在北極之隂不見日也凡八紘之氣是出寒暑以合八正必以風雨八正八風之正也以風雨八絃之内八紘之外乃有八極自東北方曰方土之山曰蒼門東北木將用事青之始也故曰蒼門東方曰東極之山曰開明之門明者陽也日之所出也故曰開明之門東南方曰波母之山曰陽門東南月建在已純陽用事故曰陽門據天下諸城東南角門皆陽門其是也南方曰南極之山曰暑門南方盛陽積温所在故曰著門西南方曰編駒之山曰白門西南月建在申金氣之始也金氣白故曰白門西方曰西極之山曰閶闔之門西方八月建酉万物成濟將可及收斂閶大也闔閉也大聚万物而閉之故曰閶闔之門也西北方曰不周之山曰幽都之門幽蓋也都聚也冥將始用事順隂而聚故曰幽都之門北方曰北極之山曰寒門積寒所在故曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八夤八澤之雲以雨九州而和中土中土兾州東方之美者有醫母閭之珣玕琪焉醫母閭山名在遼東属囯珀玕琪玉名也東南方之美者有㑹稽之竹箭焉㑹稽山在今㑹稽山隂縣之南禹所葬竹箭今㑹稽郡出好竹箭是也南方之美者有梁山之犀象焉梁山在㑹稽長沙湘南有犀鱼象竹皆物之珍也西南方之美者有華山之金石焉金美金也石舍玉之石也華山今農華隂山南是也西方之美者有霍山之珠玉焉出夜光之珠五色之玉也今河東永安縣也西北方之美者有崑崙之球琳琅玕焉球琳琅玕皆美玉也北方之美者有幽都之筋角焉古之幽都在鴈門以北其畜冝牛羊馬出好筋角可以爲弩東北方之美者有斥山之文皮焉斥讀厈丘之斥文皮豹虎之皮也曰无終子使孟樂因魏莊子納豹虎之皮也以請和諸戎是也中央之美者有岱岳以生五榖桑麻魚鹽出焉岱岳素山也三者禪代所祠因曰岱岳也五榖桑麻鱼塩所養人者出猶生也凡地形東西爲緯南北爲經山爲積德川爲積刑山仁万物生焉故爲積徳川水智智制断故爲積刑也論語曰仁者樂山智者樂水是也髙者爲生下者爲死髙者陽主生下者隂主死丘陵爲牡谿谷爲牝丘陵髙敞陽也故爲牡谿谷汚下隂也故爲牝水貟折者有珠方折者有玉貟折者陽也珠隂中之陽方折者隂也玉陽中之隂也皆以其也清水有黄金龍淵有玉英清水澄故黄金出焉龍淵龍所出㳺淵也玉英轉化有精光也土地各以其生是故山氣多男澤氣多女障氣多喑風氣多聾林氣多木氣多傴自此上至山氣多男皆生子多有此病也岸下氣多腫石氣多力象石堅也險阻氣多癭上下險阻衝喉而結多癭咽也暑氣多夭夭折不終也寒氣多壽谷氣多痺丘氣多狂衍氣多仁下而汚者為衍也陵氣多貪輕土多利重土多遲利疾清水音小濁水音大音声湍水人輕遲水人重湍急流悍水也中土多聖人皆象其氣皆其故南方有不死之草北方有不釋之冰西方温故草有不死者北方寒故冰有不泮釋也東方有君子之國東方木悳仁故有君子之囯也其人冠帶劒食獸使二文虎也西方有刑殘之尸寢居直夢人死為西方金金断割攻之事有刑殘之尸也寢寐也居処也金氣方剛故其寢寐処夢悟如其夢故曰直夢不終其命死而為能為祅怪病人也一曰刑殘之尸扵是以兩乳為目肥臍為口操干戚以舞以无夢天神断其手後天帝断其首也故竒主辰辰主月月主馬馬故十二月而生十九六十三三主斗斗主犬犬故三月而生六九五十四四主時時主彘彘故四月而生五九四十五五主音音主猨猨故五月而生四九三十六六主律律主麋鹿麋鹿故六月而生三九二十七七主星星主虎虎故七月而生二九十八八主風風主蟲蟲故八月而化鳥魚皆生於隂隂屬於陽故鳥魚皆生魚游於水鳥飛於雲故立冬鷰雀入海化爲蛤萬物之生而各異食而不飲蟬飲而不食蜉蝣不飲不食介鱗者夏食而冬蟄介甲鼈之屬也鱗魚龍之屬齕吞者八竅而生鳥魚之屬嚼咽者九竅而胎生四足者無羽翼戴角者無上齒無角者膏而無前膏豕也熊猨之屬無前肥從前起也有角者指而無後指牛羊麋之屬也無後肥從後起也晝生者父夜生者似母至隂生牝至陽生牡夫熊羆蟄藏飛鳥時移是故白水宜玉黒水宜砥砥則皁石也青水宜碧赤水宜丹黃水宜金清水宜汾水濛濁而宜麻濟水通和而宜麥河水中濁而宜菽雒水輕利而宜禾渭水多力而冝黍漢水重安而宜竹江水肥仁而宜稻平大之人慧而宜五榖
