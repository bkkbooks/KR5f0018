body:
  text: 東方川谷之所注日月之所出其人兊形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉蒼色主肝長大早知而不壽其地宜麥多虎豹南方陽氣之所積暑溼居之其人修形兊上大口决眦竅通於耳血脉屬焉赤色主心早壯而夭其地宜稻多兕象西方髙土川谷出焉日月入焉其人面末僂脩頸印行竅通於鼻末猶脊也皮革屬焉白色主肺勇敢不仁其地宜黍多旄犀旄讀近綢繆之繆急氣言乃得之北方幽晦不明天之所閉也寒冰之所積也蟄蟲之所伏也其人翕形短頸翕讀脅幹之脅大肩下竅通於隂骨幹屬焉黒色主腎其人憃愚禽獸而壽憃讀人謂憃然無知之憃也籠口言乃得其地宜菽菽豆也多犬馬曰兾之北土馬之所生言燕代出馬也中央四逹風氣之所通雨露之所㑹也其人大面短頸美鬚惡肥竅通於口膚肉屬焉黄色主胃慧聖而好治其地宜禾多牛羊及六畜木勝土土勝水水勝火火勝金金勝木故禾春生秋死禾者木春王而生木秋金王而死菽夏生冬死豆火也夏火王而生冬水王而死麥秋生夏死麥金也金王而生火王而死也薺冬生中夏死薺水也水王而生土王而死也木壯水老火生金囚土死火壯木老土生水囚金死土壯火老金生木囚水死金壯土老水生火囚木死水壯金老木生土囚火死音有五聲宫其主也五聲宫商角徴羽也宫在中央故爲主也色有五章黄其主也味有五變甘其主也位有五材土其主也是故鍊土生木錬木生火錬火生雲雲金氣所生也錬雲生水鍊水反土鍊甘生酸鍊酸生辛鍊辛生苦鍊苦生醎鍊醎反甘鍊猶治也變宫生徴變徴生商變商生羽變羽生角變角生宫變猶化也是故以水和土以土和火以火化金以金治木木復反土五行相治所以成器用土夲也故曰五行相生所以成器用凡海外三十六國自西北至西南方有修股民天民肅愼民脩長也股脚也天民肅愼皆有囯名也曰肅愼燕毫吾北土是云西方黨獨西方之囯自復有之邪一曰肅敬也愼畏也白民沃民女子民丈夫民白民白身民被髪髪亦白女子民其貌無有鬚皆如女子也丈夫民其狀皆如丈夫衣黃衣冠帶劒皆西方之囯也竒股民一臂民三身民竒隻也股脚也言其人一臂一手一鼻也三身民蓋一頭有三身皆西方之囯也自西南至東南方結胷民羽民讙頭國民祼國民三苗民交股民不死民穿胷民反舌民三苗囯名也在豫章之彭蠡交股民脚相交切不死民不食也穿胷胷前穿孔逹背反舌民語不可知而自相曉一舌本在前不向喉故曰反舌也南方之國名也豕喙民鑿齒民三頭民脩臂民豕喙民其喙如豕鑿齒民吐一齒出口下長三尺也三頭民身有三頭也脩臂民一囯民皆長臂臂長於身也皆南方之囯也自東南至東北方有大人國君子國東南壚土故人大也君子國已在上章也黒齒民股民其人里齒食稻啖地在湯上谷股民其股黑兩鳥夾之見山海經也毛民勞民其人躰半生毛若矢鏃也勞民正理躁擾不定也皆東方囯也自東北至西北方有踵民句嬰民踵民踵不至地以五指行也句嬰讀為九嬰北方之國也深目民無腸民柔利民皆北方之國也一目民無繼民一目民目在面中央無継民其人蓋無嗣也北方之囯也雒棠武人在西北陬皆日所入之山名也硥魚在其南硥魚如鯉魚也有神聖者乗行九野在無継民之南硥讀如蚌也有神二人連臂爲帝夜在其西南方連臂大呼夜行三珠樹在其東北方有玉樹在赤水之上崑崙華丘在其東南方在無継民之東南也爰有遺玉靑馬視肉其人不知言也楊桃甘樝甘華百果所生皆異物也在木曰果在地曰蓏也和丘在其東北陬四方而髙曰丘鸞所自歌鳳所自舞故曰和丘在無継民東北陬也三桑無枝在其西夸父耽耳在其北方耽耳耳垂在肩上耽讀衣之摺或作攝以兩手攝其居海中夸父棄其䇿是爲鄧林夸父神獸也飲河渭不足將飲西海未至道渴死見山海經䇿杖也其杖生木而成林鄧猶木也一曰仙人也昆吾丘在南方昆吾楚之祖祝融之孫陸終之子爲夏伯也詩云昆吾夏桀也軒轅丘在西方軒轅黄帝有天下之号也巫咸在其北方巫咸知天道明吉凶立登保之山暘谷榑桑在東方暘谷日之所出也榑桑在登保之山東北方也有娀在不周之北長女簡翟少女建疵有娀囯名也不周山名也娀讀如嵩髙之嵩姊妹二人在瑶臺也帝嚳之妃也天便鳥降邜簡翟吞之以生契是為王殷之祖也詩云天命鳥降而生商也西王母在流沙之瀕地理志曰西王石室在金城臨羌西北塞外也樂民拏閭在崑崙弱水之洲水中可居曰洲三危在樂民西三危西極之山名也宵明燭光在河洲所照方千里洲水中所居者燭光所照者方千里龍門在河淵濁漳出發包楬戾山在上黨治發包山一名鹿苦山亦在上黨長子二漳合流經魏郡入清河也濟出王屋時泗沂出臺台術王屋山在河東垣縣東北時泗沂皆水名臺台術皆山名處則未聞也洛出獵山獵山在北地西北夷中洛東南流入渭詩云瞻彼洛矣惟水泱泱是也汶出弗其流合於濟弗其山在北海朱虚縣東也漢出嶓冢涇出薄落之山嶓冢山漢陽縣西界漢水所出南入廣漢東南至雝州入江薄洛之山一名笄頭山安定臨涇縣西禹貢涇水所出東南至陽渡大滑渭出鳥鼠同穴伊出上魏鳥䑕同穴山在龍西首陽西南直渭水所出東㑹于澧又入河雝州川也上魏山名也處則未聞雒出熊耳熊耳山在京師止雒之西北也浚出華竅維出覆舟汾出燕京燕京山名也在太原汾陽汾水所出西南至汾陽兾州浸衽出濆熊淄出目飴目飴山名丹水出髙禇髙禇一名冢領山在京兆上雒丹水所出東至均入也股出嶕山鎬出鮮于涼出茅盧石梁鮮于茅盧石梁皆山名也汝出猛山淇出大號猛山一名髙陵山在南定陵縣汝水所出東南至新蔡入淮大號山在河内卬縣北或曰在臨慮西也晉出龍山結給合出封羊結給合一名也龍山在晉陽之西北水所出東大汾封羊山名也遼出砥石釡出景砥石山名在塞外遼水所出南入海景山在邯鄲西南釡水所出南澤入漳其原浪沸湧正勢如釡中湯故曰釡今謂之釡口歧出石橋呼池出魯平魯平山名也呼池并州之浸也今中山漢昌呼沲河是也泥淵出樠山樠讀人姓樠氏之樠維濕北流出於燕流扵北燕北塞外也諸稽攝提條風之所生也諸稽垣提天神之名也是爲條風也通視明庶風之所生也通視天神也明庶風震卦之所生也赤奮若淸明風之所生也赤奮天神也巽為清明風也共工景風之所生也共工天神也人面蛇身離爲景風也諸比凉也之所生也諸北天神也神爲涼風也臯稽閶闔風之所生也臯稽天神也兊爲閶闔風隅強不周風之所生也隅強天神也乾為不周風窮竒廣莫之所生也窮竒天神也在北方道足乗龍其形如虎坎為廣莫風也突生海人突人之先人海人生若菌菌讀下羣之羣菌生聖人聖人生庶人凡容者生於庶人羽嘉生飛龍飛龍羽嘉飛蟲之先飛龍有翼飛龍生鳯皇鳯皇生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥毛犢生應龍應龍生建馬建馬生麒麟麒麟生庶獸凡毛者生於庶獸介鱗生蛟龍介鱗鱗虫之先蛟龍有鱗甲之龍也蛟龍生鯤鯁鯤鯁生建邪建邪生庶魚凡鱗者生於庶魚介潭生先龍介國也之先潭讀譚國之譚先龍生黿黿生靈靈生庶凡介者生庶於煖溼生容煖一讀暵當風乾燥之貌也煖溼生於毛風毛風生於溼溼生羽風羽風生煗介煗介生鱗薄鱗薄生煖介五雜種興乎外宵形而蕃宵像也言相代象而蕃多也曰馮生陽閼曰馮水之先也陽閼生喬如喬如生幹木幹木生庶木凡根拔木者生於庶木根拔生程根拔根生之草先也程若生玉玉生醴泉醴泉生皇辜皇辜生庶草凡根茇草者生於庶草海閭生屈龍海閭浮草之先也屈龍游龍鴻也詩云隰有游龍言屈字之誤屈龍生容華容華芙蓉草華容華生蔈蔈流也无根水中草也蔈生萍藻萍藻生浮草凡浮生不根茇者生於萍藻正土之氣也御乎埃天埃天五百歳生缺缺五百歳生黄埃黄埃五百歳生黄澒黄澒五百歳生黄金黄金唯石名也中央数五故五百歳而一化澒水銀也黄金千歳生黄龍入藏生黃泉黃泉之埃上爲黃雲隂陽相薄爲雷激楊爲電上者就下流水就通而合于黄海黄海中央之海偏土之氣御乎淸天淸天八百歲生青曽靑曽八百歳生靑澒靑澒八百歳生青金青金八百歳生靑龍東方木色靑其数八故八百歳而一化也青龍入藏生清泉清泉之埃上爲青雲隂陽相薄爲雲雷激揚爲電上者就下流水就通而合于靑海東方之海牡土之氣御于赤天赤天七百歳生赤丹赤丹七百歳生赤澒赤澒七百歳生赤金南方火其色赤其数七故七百歳而一化也赤金千歳生赤龍赤龍入藏生赤泉赤泉之埃上爲赤雲隂陽相薄為雷激揚為電上者就下流水就通而合于赤海南方之海弱土之氣御于白天白天九百歳生白礜白礜九百歳生白澒白澒九百歳生白金白金白礜礜石也白澒水銀也西方金色白其数九故九百歳而一化者也白金千歲生白龍白龍入藏生白泉白泉之埃上爲白雲隂陽相薄為雷激揚爲電上者就下流水就通而合于白海西方之海牝土之氣御于天天六百歳生砥砥黒石砥六百歲生澒澒六百歲生金北方水其色黒其数六故六百歳而一化也金千歳生龍龍入藏生泉泉之埃上爲雲隂陽相薄爲雷激揚為電上者就下流水就通而合于海北方之海上者就下天氣復從天流下也其通流之水皆入于海也淮南鴻烈解卷第四
