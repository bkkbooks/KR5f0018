body:
  text: 玉建青旗服佩也熊虎曰旗也食麥與羊麥全榖也羊土畜也是月金上以老食所勝先食麥以麥為主也服八風水爨萁燧火取銅木中露水服之八方風所吹也取萁木燧之火炊之萁讀該備之該也東宫御女靑色衣靑采鼔琴瑟春王東方故処東宫也琴瑟木也春木王故鼔之也其兵矛矛有鋒鋭似万物鑚墜生其畜羊羊土木一母故畜之也朝于青陽左个以出春令是月之朔天子朝日于青陽左个東向堂故曰青陽北頭室故曰左个个猶隔也春令寛和之令也布德施惠行賞省傜賦布陽德施柔惠也善賞賜子也省減伇之勞輕其賦斂也立春之日天子親率三公九卿大夫以迎歳于東郊率使也迎歳春也東郊郭外八里之郊也修除祠位幣禱神犧牲用牡祠位壇場屏攝之位也幣圭璧也禱神求福祥也人神曰天神曰神犧牲用牡尚蠲絜也禁伐木春木王當長養故禁之也母覆巢殺胎夭母麛母卵胎獸胎懐姙未育者也麋子曰天鹿子曰麛卵未者皆禁民不得畨庶物也母聚衆置城郭掩骼薶骴母聚合大衆建置城郭以妨害農功也骼骨有掩覆薶藏之慎生氣也孟春行夏令則風雨不時草木早落國乃有恐孟春木德用事法當寛仁而用火氣動於土故草木早落囯惶恐也行秋令則其民大疫飄風暴雨緫至黎莠蓬蒿並㒷孟春温仁而秋正金鈌之令氣不和故民疫疾風雨隈至故黎莠蓬蒿疏穢之草並㒷盛也行冬令則水潦爲敗雨霜大雹首稼不入冬隂也水泉涌起而春行之故為敗氣不和故霜大雹植稼不熟也正月官司空其樹楊司空主土春土受喜穡故官司空也爾雅曰楊蒲柳也楊木春光故其樹楊也仲春之月招揺指卯昬弧中旦建星中弧星在輿南是月昬時中於南方建星在斗上是月平旦時中於南方也其位東方其日甲乙其蟲鳞其音角律中夾鍾是月万物去隂夾陽聚地而生故曰夾鍾也其数八其味酸其臭羶其祀戸祭先脾始雨水桃李始華自冬冰云至此春分榖雨故曰始水桃李於是皆秀華也蒼庚鳴鷹化為鳩蒼庚爵雅曰商庚黎黄楚雀也斉人謂之搏黍秦人謂之黄流离幽兾謂之黄鳥一斵木也至此月而鳴鷹化爲鳩喙正直不鷙搏也鳩蓋謂布榖也天子衣青衣乗蒼龍服蒼玉建青旗食麥与羊服八風水爨其燧火東宫御女靑色衣靑采鼔琴瑟其兵矛其畜羊朝于青陽太廟太廟東向堂中央室命有司省囹圄去桎梏毋笞掠止獄訟囹圄法室也雀之赦輕微也在足曰桎在手曰梏毋笞掠言不用也止猶禁也養幼小存獨以通句萌順春陽長養幼小使繁也无父曰无子曰獨皆存之所以慎陽氣也故草木不句萌者以通逹也擇元日令民社元者善之長也日從甲至癸也社所以為民祈也嫌日不故言擇元也是月也日夜分雷始發声蟄蟲咸動稣分等也冬隂閉固雷伏不發是月陽升雷始發声也咸皆動稣生也先雷三日振鐸以令於兆民曰雷且發声鐸木鈴也金口木舌為鐸所以振告万民也兆大数且猶將也有不戒其容止者生子不備必有凶災以雷電合房至者生子必有瘖聾通精癡狂之疾故曰不備必有凶災也令官市同度量釣衡石角斗稱度丈尺也量釡鍾也釣等也衡石稱也百二十斤為石角平也斗稱量噐也端槩端正也槩平也毋竭川澤毋漉陂池毋焚山林皆為夭物盡毋作大事以妨農功大事戎旅征伐之事故害農民之功也祭不用犧牲用圭璧更皮幣是月尚生育故不用犧牲也更代也以圭璧皮幣代犧牲也皮謂鹿皮也幣謂纁束帛也礼記曰幣帛圭皮告扵祖禰者也仲春行秋令則其囯大水寒氣緫至宼戎來征仲春陽中也陽氣長養而行秋節殺戮之令故寒氣猥至宼兵來征伐其囯也行冬令則陽氣不勝麥乃不熟民多相殘仲春行冬隂之令隂氣勝陽故陽不勝則麥不升熟民相殘賊也行夏令則其國大旱煗氣早來蟲螟爲害仲春行夏太陽之令故大旱陽氣熟故煗極陽生隂故蟲螟作害也食心日螟二月官倉其樹杏二月興農播榖故官倉也杏有竅在中竅在中像隂布散在上故其樹杏季春之月招揺指辰昬七星中旦牽牛中七星南方朱鳥之宿是月昬時中於南方牽牛北方武之宿是月平旦時中於南方也其位東方其日甲乙其蟲鱗其音角律中姑洗姑故也洗新也是月陽養生去故就新故曰姑洗其數八其味酸其臭羶其祀戸祭先脾桐始華田䑕化爲鴽桐梧桐也是月生華田鼠鼢䑕也鴽鶉也青徐謂之鴹幽兾謂之鶉虹始見萍始生虹螮蝀也詩云螮蝀在東莫之敢指萍水藻也是月始生也天子衣青衣乗蒼龍服蒼玉建靑旗食麥與羊服八風水爨萁燧火東宫御女靑色衣靑采鼓琴瑟其兵矛其畜羊朝于青陽右个東向堂南頭室故曰右个舟牧覆舟五覆五反乃言具于天子舟牧主舟之官也是月天子將乗舟而漁故反覆而覌之恐有穿漏也五覆五反俱之至也天子烏始乗舟薦鮪於寢廟乃爲麥祈實烏猶安也自冬至此而安乗舟故曰始乗也薦進也鮪魚似鯉而太進此魚於寢廟祈於宗祖求麥實前曰廟後曰寢詩云寢廟奕弈言相連是月也生氣方盛陽氣發泄發泄猶布散也句者畢出萌者盡達不可以内天子命有司發囷倉助貧窮㧞乏絶無財曰貧鰥寡獨曰窮也振救也開府庫出幣帛使諸侯府庫幣帛之藏也使人之聘問諸侯聘名士禮賢者有名德之士大賢之人聘問禮之將與爲治也命司空時雨將降下水上騰循行國邑周視原野司空主水土之官也是月下水上騰恐有浸漬傷害五榖故循行徧視之也廣平曰原郊外曰野也修利隄防導通溝瀆達路除道從國始至境止田獵罼弋罘羅餒毒之藥毋出九門畢掩也弋繳射詩曰弋鳬与鴈兔也詩曰肅肅兔罼羅鳥也詩云鴛鴦在梁罼之羅之罘麋鹿其緫名也天子城門十二東方三門王氣所在門餒獸之毒藥所不得出尚生育也兼餘九門得出故特戒之如其毋出乃禁野虞毋伐桑柘桑柘皆可養蚕故禁民伐之也鳴鳩奮其羽戴鵀降于桑鳴鳩奮迅其羽直刺上飛入雲中者是也戴鵀戴勝鳥也詩曰尸鳩在桑其子在梅是也具樸曲筥筐撲持也三轉謂之樸樸讀南陽人言山陵同曲薄也靑徐謂之曲貟底曰筥方底曰筐皆受桑器也后妃齋戒東郷親桑省婦使勸事命五庫令百工審金鐵皮革筋角箭脂膠丹漆無有不良擇下旬吉日大合樂致歡欣樂所以移風易俗也故擇吉日大合之以致歡和也乃合㹎牛騰馬游牝于牧㹎牛持牛也騰馬騰駒號善將羣者也游從比於所牧之墜風合之㹎讀葛藟之藟也令國儺九門磔攘以畢春氣灘散宫室中區隅幽闇之處擊鼓大呼以逐不祥之氣如今驅疫逐除是也九門三方也門也逐大陽氣盡逐故曰畢春之氣也行是月令甘雨至三旬季春行冬令則寒氣時發草木皆肅國有大恐季春行冬寒殺之氣也故寒氣時起草木上踈日肅也行夏令則民多疾疫時雨不降山陵不登季春行夏元陽之令氣不和故民疾復兩澤不降故草木不登成也行秋令則天多沈隂雨早降兵革並起秋金氣用事水之母也季春行之故多隂沈爲雨金爲兵革故並起也三月官郷其樹李三月科民戸口故官郷也李亦有核與杏同李後咨熟故三月李也歳於南郊迎歳迎夏也南郊七里之郊也還乃賞賜封諸侯修禮樂饗左石還从南郊還也賞賜有功割土封爵傳曰賞以春夏刑以秋冬也修治礼楽所以安上治民移風易俗左右近臣也命太尉賛傑俊選賢良舉孝悌太尉卿官也命使也賛白也才過千人為傑巽擇賢良孝悌㪯而用之盖非太尉之職故特命之也行爵出禄佐天長養継修増髙無有隳壞毋興土功母伐大樹令野虞行田原勸農事驅獸畜勿令害榖天子以彘甞麥先薦寢廟是月麥始升故以豕甞麥豕水畜冝麥先薦寢庿孝之至也聚畜百藥靡草死是月陽氣極藥草成故聚積之也靡草則亭歷之属麥秋至決小罪断薄刑四月陽氣盛於上乃五月隂氣作於下故曰麥秋至決小辠断薄刑順殺氣也孟夏行秋令則苦雨數來五榖不滋四鄰入保孟夏盛陽當助長養而行金氣殺戮之令故苦雨殺榖不得滋長也四方之民來入城郭自保守也行冬令則草木早枯後乃大水敗壞城郭行冬寒閉固之令故草木早枯大水敗壞其城郭奸時違行之應也行春令則螽蝗為敗暴風來格秀草不實孟夏當継修增高助陽長養而行春時啓蟄之令故致螽蝗之敗春木氣多風故言暴風來至使當秀之草不長也四月官田其樹桃四月勉農事故官田也桃与杏同後李熟故曰四月桃也仲夏之月招揺指午昬亢中且危中亢東方倉龍之宿是月昬時中於南方危北方武之宿是月平旦時中於南方也其位南方其曰丙丁其蟲羽其音徴律中㽔賔其數七是月隂氣萎在下像主人也陽氣在上像賔客也故曰賔其味苦其臭焦其祀竈祭先胏小暑至螳蜋生螳蜋世謂之天馬一名齒耽兖豫謂之巨斧也鵙始鳴反舌無聲鵙百勞鳥也五月隂氣於下伯勞夏至應隂而鳴殺蛇於木曰伯趙氏司至者反舌百舌鳥也能辨变其舌反易其声以效百鳥之鳴故謂百舌无声者五月陽氣極於上微隂起於下百舌无隂故无声也天子衣赤衣乗赤騮服赤玉載赤旗食菽與雞服八風水爨柘燧火南宫御女赤色衣赤采吹竽笙其兵㦸其畜雞朝于明堂太廟庿南向堂中央室也命樂師修鞀鼙琴瑟管簫調竽箎飾鍾磬管一孔似篴簫今之歌簫是也箎讀如池澤之池也執干戚戈羽干盾也戊斧也㦸属也羽武也所持翿也命有司爲民祈祀山川百原大雩帝用盛樂囯之山川百原能興雲雨者皆祈祀之也雩旱也祭上帝也為民祈雨故用盛楽盛楽六代之楽也天子以雉甞黍雉新雞也不言甞雞而言甞黍者以糓為主也羞以含桃先薦寢廟羞進也舍桃鸎所舍食故言含桃是月而熟故進之禁民無刈藍以染為藍青未成故母燒是月草木未成不夭物也母暴布火盛曰猛暴布則脆傷也門閭無閉市無索門城門也閭里門也民順陽氣散布在外當出入故不閉也門要塞也市人聚也无索不征稅也挺重囚益其食挺緩存鰥寡振死事老无妻曰鰥老无夫曰寡也皆存之有先人為死難振起其子孫也游牝别其羣執騰駒班馬政是月此馬懷姙已定故别其羣人欲騰駒号傷其胎育故執也班告也馬政掌馬官也騰駒騰馬也周礼馬五尺以下曰駒也日短至隂陽爭死生分君子齋戒愼身無躁節聲色薄滋味百官静事無徑以定晏隂之所成事无徑詳後行當先謂也晏隂微隂也鹿角解蟬始鳴夏至鹿角解墮也蝉鼔翼始鳴也半夏生木堇榮半夏草薬也木堇朝榮暮落樹髙五六尺其葉與安石榴相似也是月生榮華可用作烝也雒家謂朝生詩云顔如蕣華也禁民無發火役起可以居髙明逺眺望登丘陵處臺榭積土四方而高曰臺也臺有室曰榭也順陽宣明也一曰望雲物占氣祥也仲夏行冬令則雹霰傷榖道路不通兵來至冬冰凍故雹霸傷害五榖也冬氣閉藏又多水雨故道䧟壞不通利暴害之兵横來至也行春令則五榖不熟百螣時起其國乃飢行春水王好生育之令故五榖晚熟百螣動服煌属也時起害榖故國飢也行秋令則草木零落果實蚤成民殃於疫有覈曰果无覈曰蓏仲夏行秋成熟之令故草木零落果實早成非其時氣故民有疾疫也五月官相樹榆是月陽氣長飬故官相相佐也榆未聞也季夏之月招揺指未昬心中旦奎中心東方蒼龍之宿也是月昬時中於南方本西方白虎之宿也是月中旦時中於南方也其位中央其日戉已盛徳在土黄帝之神治中史也戌巳土日也盛德在土王工中央也其蟲蠃其音宮羽落而蠃虫鱗為之長宮土也位中央五音之主也律中百鍾其數五百鍾林鐘也是月陽盛隂起生養万物故曰百鍾其数五五行数土第五也其味甘其臭香土味甘也土香也其祀中祭先心土用事故祀中中室中之祭祀后土也心火也用所勝也一日心土也自用其藏也涼風始至蟋蟀居奥蟋蟀蜻趣織也詩云七月在野此日居奥不与經合奥或作壁也鷹乃學習腐草化爲蚈秋節將至鷹白習擊也蚈馬蚿也幽兾謂之秦渠蚈讀奚徑之徑也天子衣苑黃乗黃騮服黃玉建黄旗黄順土色也黃謂登飴之登也食稷与牛稷牛皆屬土也服八風水爨柘燧火中宫御女黄色衣黄采其兵劒季夏中央也劒有兩刃諭无所生也一曰諭无所主皆主之也其畜牛朝于中宫是月天子朝于中宮中宫大室乃命漁人伐蛟取鼉登取黿漁人掌漁官也漁讀相語之語也蛟鼉黿皆鱼屬也鼉可以作鼓詩曰鼉鼔洋洋黿可以作羹也曰楚人献黿扵鄭靈公靈公不与公子宋黿羮公子怒染指扵鼎甞之而出是也皆不害人易得故言取蛟有鱗甲能害人難得言伐神可決吉凶入宗庿尊之故言登也令滂人入材葦滂人掌池澤官也入材葦供囯用也命四監大夫令百縣之秩芻以養犧牲周制天子墜方千里分為百縣縣有四郡郡有四鄙故春秋言下大夫受縣上大夫受郡秦初置三十六郡以監縣耳此云百縣者謂周制畿内之縣也四監監四郡大夫也秋常人所當出芻故聚之用養犧牲也以共皇天上帝名山大川四方之神宗廟社稷為民祈福行惠令弔死問疾存視長老行稃鬻厚席蓐以送万物㱕也命婦官染采黼黻文章靑黄白黒莫不質良婦人能别五色故染采白与黒為黼青与赤為黻黒与赤為文赤与白為章質美也良善也以給宗廟之服必宣以明宣徧也明鮮明也是月也樹木方盛勿敢斬伐不可以合諸侯起土功動衆興兵必有天殃殃罰土潤溽暑大雨時行利以殺草糞田疇以肥土是月大暑土閏溽溼重也又有時可以殺草為糞美土疆疆土分畔者也季夏行春令則榖實解落多風欬民乃迁徙春木主木性墮落陽發多風而行其令故榖實解落民疾病風欬嗽上氣像春陽布散民迁徙者也行秋令則丘隰水潦稼穡不熟乃多女災丘髙也隰卑也言髙下昏有水潦故殺稼令不熟也隂氣過差故多女災女災生子不育也行冬令則風寒不時鷹隼蚤摯四鄙入保冬隂肅殺而行其令故寒風不節鷹隼蚤摯擊四界之民皆入城郭自保守也六月官少内其樹梓六月植稼成熟故官少内也梓未聞也
