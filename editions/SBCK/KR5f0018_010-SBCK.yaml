front:
  text: 孟秋之月招揺指申昬斗中旦畢中斗北方武之宿是月昬時中於南方畢西方白虎之宿是月平旦時中於南方也其位西方其日庚辛盛德在金少皡之神治西方也庚辛金也盛德在金金王西方也其蟲毛其音商金氣寒蠃者衣毛毛虫虎為之長商金也位在西方律中夷則其数九夷傷也則法也是月陽衰隂盛万物周傷應法成性故曰夷則也其数九五行数五金第四故曰九也其味辛其臭腥金味辛也金臭腥也其祀門祭先肝孟秋始内入由門故祀門也肝衣也祀之用所勝也一曰肝沈金自用其藏也涼風至白露降寒蟬鳴鷹乃祭鳥用始行戮是月鷹搏鷙殺鳥於大澤之中四面陳之丗謂之鳥用是時乃始行殺戮刑罰順秋氣也天子衣白衣乗白駱服白玉建白旗白順金色也白馬黒毛白駱也食麻与犬服八風水爨柘燧火西宫御女白色衣白采撞白鍾金王西故処西宫也其兵戈其畜狗朝于緫章左个以出秋令緫章西向堂也西方緫成万物而章明之故曰緫章左个南頭室也居是室行是月之令狗金畜也求不孝不悌戮慠悍而罰之以助損氣損氣隂氣立秋之日天子親率三公九卿大夫以迎秋于西郊西郊九里之外郊也還乃賞軍率武人於朝軍率軍也武勇有功名也命將率選卒厲兵簡涷桀俊專任有功以征不義詰誅慢順彼四方順循也四方天下也命有司修法制繕囚圄禁姦塞邪審決獄平詞訟決也平治也天墬始肅不可以贏肅殺也殺氣始行也贏盛也故曰不可也是月農始升榖天朱辛其臭腥其祀門祭先肝涼風至鴈來鳥歸羣鳥翔時候之鴈從北漠中來過周雒南至彭蠡也鳥歸秋分後歸蟄所也羣鳥翔寒氣至羣鳥肥盛試其羽翼而髙翔翔者六翮不動也或作養養育其羽毛也天子衣白衣乗白駱服白玉建白旗食麻与犬服八風水爨柘燧火西宫御女白色衣白采撞白鍾其兵戈其畜犬朝于緫章大廟緫章西向堂也太廟中夫室也命有司申嚴百刑斬殺必當無或枉撓枉曲也撓弱也言平直也決獄不當反受其殃反還是月也養長老授凡杖行稃鬻飲食乃命宰祝行犧牲案芻豢草養曰芻榖養曰豢案其簿書閱租之豢讀䆠斈之䆠視肥全粹全无虧缺也粹毛色純也粹讀禍崇之崇察物色課比量小大視少長莫不中度天子乃儺以御秋氣難猶除也御止也止秋氣不使為害也儺讀躁難之難氣或作兵也以犬甞麻先薦寢廟是月可以築城郭建都邑國有先君之宗廟日都无曰邑都曰城邑曰築穿竇窖修囷倉穿竇所以通水不欲地溼也穿窖可以盛榖也窖讀窖藏人物之窖也乃命有司趣民收斂畜采多積聚種宿麥或失時行罪无疑是月也雷乃始收蟄虫陪戸殺氣浸盛陽氣日衰水始涸涸凝竭涸或作盛盛言隂勝也日夜分壹度量平權衡正鈞石角斗稱理市來商旅理通也入貨財以便民事四方來集逺郷皆至財物不匱上无乏用百事乃遂遂成也仲秋行春令則秋雨不降草木生榮囯有大恐春陽氣而行其令故雨不降又温煦之仁故草木生榮華也氣相干必有災咎故囯大惶恐行夏令則其囯乃早蟄虫不藏五榖皆復生行炎陽之令故旱涸氣故蟄虫不藏使五榖復生行冬令則風災數起收雷先行草木早死冬行寒氣激之令故有風災又冬閉藏故收需先行草木早死也八月官尉其樹柘尉成官也是月治兵故官尉傳曰羊舌大夫爲中軍尉柘未聞也季秋之月招揺指戍昬虚中且柳中虚北方武之宿是月昬時中於南方柳南方朱雀之宿也是月平旦中於南方也其位西方其日庚辛其虫毛其音商律中无射隂氣上升陽氣下降万物隨陽而藏无射出見也其數九其味辛其臭腥其祀門祭先肝候鴈來賔雀入大水爲蛤是月時候之鴈從北漠中來南之彭蠡盖以爲八月者其父母也是月來者盖其子也羽翼稚弱故在後耳賔雀者老雀也栖宿人家堂宇之間如賔客者也故謂之賔大水海水也曰雀入海爲蛤也菊有黄華豺乃祭獸戮禽豺似狗而長尾其色黄是月時殺獸四面陳之丗謂之獸戮猶殺也天子衣白衣乗白駱服白玉建白旗食麻与犬服八風水爨柘燧火西宫御女白色衣白采撞白鍾其兵戈其畜犬朝于緫章右个西向堂北頭室故謂右个也命有司申嚴號令百官貴賤无不務入以㑹天墬之藏无有宣出乃命冢宰農事備收㪯五榖之要冢大也宰治也卿官也要簿書也藏帝籍之扵神倉天子籍田千畒故曰帝籍之收籍田所收之榖也神倉倉也是月也霜始降百工休霜降天寒朱漆難成故百工休止不復作噐也乃命有司曰寒緫至民力不堪其皆入室詩曰入此室処是也上丁入學習吹大饗帝甞犧牲合諸侯制百縣是月上旬丁日入斈官吹笙竽習礼樂饗上帝用犧牲合諸侯之制度車服之差各兩其命数也百縣畿内之廟孝之至也季秋行夏令則其國大水冬藏殃敗民多窒季秋隂氣而行夏月霖雨之令故大水火氣故冬藏殃敗也火金相干故民窒鼻不通利也讀怨仇之仇也行冬令則國多盗賊邊境不寧土墜分裂冬水純隂姦謀所生故多盗賊使邊境之民不安寕也則土墜見侵削為隣國所分裂也行春令則煗風來至民氣解隋師旅並興春氣陽温故愞風至民氣解墮也木干金故師旅並興也二千五百人為師五百人為旅也九月官候其樹槐候望也是月繕修守備故曰官候也槐懷也可以懷來逺人也孟冬之月招揺指亥昬危中旦七星中危北方玄武之宿也是月昬時中於南方七星南方朱鳥之也是月平旦時中扵南方者也其位北方其日壬癸盛德在水顓頊之神治北方也壬癸水日也盛德在水王北方也其蟲介其音羽介甲也像冬閉固皮漫胡也甲虫為之長明屬水也律中應鍾其数六隂應於陽轉成其功万物聚成故曰應鍾其数六五行数五水第一故曰六也其味鹹其臭腐水味鹹也水殠腐也其祀井祭先腎井水給人故祀也井或作行行門内地冬守在内故祀也肾水自開其藏也水始冰墬始凍雉入大水為蜃虹藏不見蜃蛤也大水淮也傳曰雉入于淮為蜃虹隂中之陽也是月隂盛故不見也天子衣黒衣乗服玉建旗順水惠也熊与虎曰旗也食黍与彘服八風水爨松燧火北宫御女黒色衣黒采擊磬石水王北方故処北宫也其兵鎩其畜彘鍜者内像隂閉水畜朝于堂左个以出冬令北向堂西頭室故曰左个居是室行此月令也命有司修羣禁順隂閉諸所當禁皆使有司禁也禁外徙閉門閭大客傳曰禁舊客為露情也有新客出之為釁也門城門之閭里門也閉之守備也断罰刑殺當罪諸罰刑當決也當罰正罪故殺之也阿上亂法者誅阿意曲从取容扵上以乱法度也誅治也立冬之日天子親率三公九卿大夫以迎歲于北郊還乃賞死事存寡有忠莭蹈義死王事者賞其子孫也幼无父曰无夫曰寡皆存慰矜恤之是月命太祝禱祀神位占䇿審卦兆以察吉凶於是天子始裘命百官謹盖藏命司徒行積聚修城郭警門閭修楗閉愼管籥固封玺封門也玺印也修邊境完要塞絶蹊徑飭喪紀審棺椁衣衾之薄厚飭治也紀数也二十五月之数也棺椁衣衾薄厚各有差等故審之營丘壟之小大髙使貴賤卑尊各有等級營度也北壟冢也小大髙下各有度量也是月也工師効功陳祭器案度呈坚致為上案視也度法也坚致功宇也為故也上盛也工事苦慢作為巧必行其罪苦惡也慢不牢也巧非常之巧也故行其罪謂塩㑹之塩也是月也大飲蒸天子祈來年扵天宗蒸冬祭也扵是時大飲酒而祭求明年之福祥也凡屬天子之神日月星辰皆為天宗也大禱祭于公社畢饗先祖禱求也公社囯社也后土之也生為上公死為貴神故曰公也畢饗先祖先公後私之義也勞農夫以休息之命將率講武律射御角力勁律習也角平地也勁強貌也乃命水虞漁師水泉池澤之賦虞掌水官也師長也賦稅也毋或侵牟牟多孟冬行春令則凍閉不密墜氣發泄民多流亡春陽氣散越故凍閉不宻墜氣發泄也民多流亡像陽氣布散行夏令則多風方冬不寒蟄蟲復出冬當閉藏反行夏盛陽之令故多暴疾陽氣温故盛冬不寒令蟄伏之虫復出也行秋令則雪霜不時小兵時起土墬侵削秋氣干冬大寒不當雪而雪不當霜而霜故曰不時也小兵数起隣囯來伐侵削其土墬十月官司馬其樹檀冬間講武故官司馬也檀隂木也仲冬之月招揺指子昬璧中旦軫中東璧北方武之宿是月昬時中扵南方軫南方朱鳥之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中黄鍾其數六黄鍾者陽氣聚於下隂氣盛於上万物黄萌扵墜中故曰黄鍾也其味鹹其臭腐其祀井先肾冰益壯墬始坼鳱鴠不鳴虎始交鳱鴠山鳥陽是月隂盛故不鳴也虎陽中之隂也隂氣盛以發也交讀校之校也天子衣黒衣乗鐵服玉建旗食黍与彘服八風水爨松燧火北宫御女黒色衣黒采擊磬石其兵鎩其畜朝于堂太廟北向堂中央室故曰太庿也命有司曰土事无作无發室居及起大衆是謂發天墬之藏諸蟄則死民必疾疫有隨以䘮急捕盗賊誅泆詐偽之人命曰畼月隂氣在上民人空間故命曰畼月命奄尹申宫令奄官也尹正也申宫令重戒敕也審門閭謹房室必重閉助隂氣也省婦事乃命大酋秫稻必斉麴蘖必時酋主沽酒官也醖釀米麴使化熟故謂之酋酋讀酋豪之酋斉讀斉和之斉也作麴蘖當得其時不時則不成也湛熺必潔水泉必香湛漬也熺炊必令圭潔也水泉者則酒善也湛讀審釜之審熺炊熾火之熾也陶器必良火斉必得无有差忒陶器瓦器也炊亨必得其適故曰无有差忒也天子乃命有司祀四海大川名澤能㒷雲雨故祀之也是月也農有不藏積聚牛馬畜獸有放失者取之不詰詰呵問也山林藪澤有能取䟽食田獵禽獸者野虞敎導之其有相侵奪罪之不赦大加刑也是月也日短至隂陽爭君子斎戒処必掩身欲靜去声色禁嗜欲声絲竹金石之声也色美色也有貪欲濫求者禁之寜身躰安形性閉情欲也是月也荔挺出芸始生丘螾結麋角解荔馬荔草也芸芸蒿菜名也丘螾虫名也結屈結也麋角解墮皆應微陽氣也水泉動則伐樹木取竹箭罷官之无事器之无用者罷省涂闕庭門閭築囹圄所以助天墬之閉仲冬行夏令則其國乃旱氛霧㝠㝠雷乃發聲夏氣炎陽故其囯早也清濁相干故氛霧㝠㝠也十一月雷發声非其時也故言乃也行秋令則其時雨水瓠不成囯有大兵秋金氣水之母也故雨水金用事故有大兵也行者令則蟲螟為敗水泉咸竭民多疾癘春陽氣蟄伏生故虫螟敗榖水泉竭也陽干隂氣木和故多疾癘也十一月官都尉其樹棗冬成軍師故官都尉裘取其赤心也季冬之月招揺指丑昬婁中旦氏中婁西方白虎之宿是月昬時中扵南方氐東方倉龍之宿是月平旦時中於南方也其位北方其日壬癸其蟲介其音羽律中大吕吕旅也万物萌動扵黄泉未能達見所以旅旅去隂即陽助其成功故曰大吕其數六其味鹹其腐其祀井先腎鴈北郷鵲加巢鴈在彭蠡之水皆北嚮至北漠中也鵲感陽而動上加巢也雉雊雞呼卵詩云雉之朝雊尚求其雌是也雞呼鳴求卵也天子衣黒衣乗鐵服王建旗食麥与彘服八風水爨松燧火北宫御女黒色衣黒采擊磬石其兵鎩其畜彘朝于堂右个右个東頭室也命有司大儺旁磔出土牛大儺今之逐隂驅疫為陽導也旁磔四面皆磔犬羊以禳四方之疾疫也出土牛今郷縣出農耕之土牛於外是也命漁師始漁是月將捕魚故命其長也漁讀論語之語天子親往射漁先薦寢庿令民出五種令農計耦耕事修耒耜具田器耦合命樂師大合吹而罷乃命四監收秩薪以供寢廟及百祀之薪燎是月也日窮于次月窮于紀星周于天十二次窮於牽牛中也紀道窮於故宿也星周于天謂二十八舍更見南方至是月周帀也歳將更始令靜農民無有所使天子乃與公卿大夫飾國典論時令以待嗣歳之宜乃命太史次諸侯之列賦之犧牲賦布以供皇天上帝社稷之芻享乃命同姓女囯供寢廟之芻豢卿士大夫至于庶民供山林名川之祀季冬行秋令則白露早降介蟲爲䄏四鄙入保秋節白露故白露早降介甲之虫為䄏災金氣為兵故四境之民入城郭自保守也行春令則胎夭傷國多固疾命之曰逆季冬大寒而行春温之令氣不和謂胎養夭傷囯多篤疾逆風氣之由也故命之曰逆故也行夏令則水潦敗國時雪不降冰凍消釋夏氣炎陽有多霖雨故水潦敗囯也時雪當降而不降水凍不當消釋而消釋皆于時之徴也十二月官獄其樹櫟十二月歳尽刑断故獄官也櫟可以爲車轂水不出火唯櫟爲然亦應除氣也五位東方之極自碣石山過朝鮮貫大人之國竭石在遼西界海水西畔朝鮮樂浪之縣也貫通也大人囯在其東也東至日出之次扶槫木之地靑土樹木之野慱木摶桑太皥句芒之所司者萬二千里太皡庖犧氏東方木德之帝也句芒木神司主也其令曰挺羣禁開閉闔通窮窒逹障塞行優游棄怨惡解伇罪免憂患休罰刑開梁宣出財和外怨撫四方行柔惠止剛強剛強侵陵人不循執度者禁止之也南方之極自北戸孫之外北戸孫國名也日在其北皆爲北向戸以日故北戸貫顓頊之國南至委火炎風之野赤帝祝融之所司者萬二千里赤帝炎帝少典之子号爲神農南方火德之帝也祝融顓頊之孫老童之子吴回也一名黎爲髙辛氏火正号爲祝融死爲火神也其令曰爵有德賞有功惠賢良救飢渴舉力農振貧窮惠寡憂罷疾出大禄行大賞起毀宗立無後封建侯立賢輔應陽施也中央之極自崑崙東絶兩山自從也絶猶過也山常也言兩未聞也日月之所道江漢之所出日月照其所經過之道江出岷山漢出畨家山衆民之野五榖之所宜龍門河濟相貫以息壤堙洪水之州東至於碣石黃帝后土之所司者萬二千里黄帝少典之子以土德王天下号為軒轅氏死為中央土德之帝后土者句龍氏之子名曰后土能平九土死祀為土神者其令曰平而不阿明而不苛包裏覆露露潤無不囊懷汜無私正靜以和行稃鬻養老衰弔死問疾以送万物之歸土四方之主也故曰万物之所㱕也西方之極自崑崙絶流沙沈羽西至三危之國流沙盖在崑崙之西南耳石城金室飲氣之民不死之野少皓蓐收之所司者萬二千里少皓黄帝之子青陽也名摯以金德王天下号為金天氏死為西方金德之帝也蓐收金天氏之裔子曰修礼死為金神孟夏与孟冬爲合仲夏與仲冬爲合季夏與季冬爲合孟春始贏孟秋始縮贏長也縮短也仲春始出仲秋始内出二月播種内八月收斂季春大出季秋大内孟夏始緩孟冬始急緩四月陽皮急十月寒肅仲夏至修仲冬至短夏至北極冬至南極短修皆在至前也季夏德畢季冬刑畢德畢陽施結刑畢刑獄盡故正月失政七月凉風不至二月失政八月雷不藏三月失政九月不下霜四月失政十月不凍五月失政十一月蟄蟲冬出其郷六月失政十二月草木不脫不脱葉橋著樹不零落也七月失政正月大寒不解東風不解東也八月失政二月雷不發不發声也九月失政三月春風不濟齊土十月失政四月草木不實實長十一月失政五月下雹霜十二月失政六月五榖疾狂疾狂不華而實也春行夏令泄象盛陽發泄也行秋令水水生於申故水也行冬令肅象氣肅急夏行春令風象春木氣多風行秋令蕪象秋氣蕪生行冬令格格攱也象冬断刑恩澤致格不流下秋行夏令華象夏氣樹華茂行春令榮象春氣生榮華行冬令耗耗零落也冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故乱霧製度隂陽大制有六度天爲繩墜爲凖春爲規夏爲衡秋爲矩冬爲權繩者所以繩萬物也繩正準者所以準萬物也規者所以貟萬物也衡者所以平萬物也矩者所以方萬物也權者所以權萬物也繩之爲度也直而不爭修而不窮乆而不逺而不忘與天合德與神合明所欲則得所惡則亡自古及今不可移匡厥德孔密廣大以容衆是故上帝以爲物宗宗本準之爲度也平而不險均而不阿廣大以容寛以和柔而不剛銳而不挫銳利也挫折也流而不滯流行也滯止也易而不穢發通而有紀紀道周密而不泄準平而不失万物皆平民無險謀怨不生是故上帝以爲物平平正讀評議之平也規之爲度也轉而不復貟而不垸復遏也垸轉也優而不縱廣大以寛感動有理發通有紀優優簡簡百怨不起優簡寛舒之貌規度不失生氣乃理氣理逹衡之爲度也緩而不後平而不怨施而不德弔而不責常平民禄以継不足㪍㪍陽陽唯德是行養長化育万物蕃昌以成五榖以實封疆其政不失天墬乃明明理矩之爲度也肅而不悖剛而不憒取而無怨内而無害威厲而不懾令行而不廢殺伐既得仇敵乃克矩正不失百誅乃服權之爲度也急而不贏殺而不割充滿以實周密而不泄敗物而弗取罪殺而不赦誠信以必堅慤以固兾除苛慝不可以曲故冬正將行必弱以強必柔以剛權正而不失萬物乃藏明堂之制静而法準動而法繩春治以規秋治以矩冬治以權夏治以衡是故燥溼寒暑以節至甘雨膏露以時降淮南鴻烈解卷第五淮南鴻烈解卷第六
