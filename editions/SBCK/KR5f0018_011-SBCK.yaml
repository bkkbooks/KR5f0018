front:
  text: 覽㝠訓覽幽㝠変化之端至精感天道達三極故曰覽㝠因以題篇昔者師曠奏白雪之音而神物為之下降風雨暴至平公病晉國赤墬白雪太一五十瑟琴樂名也神物即神化之物謂鶴之屬来至无頭操戈以舞也平公晉悼公之子彪也病䔍疾赤地旱也唯聖君能御此異使无災耳平公德薄不能堪故篤病而大旱也庶女叫天雷電下擊景公臺隕支躰傷折海水大出庶賤之女齊之寡婦無子不嫁事姑漌敬姑无男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明結叫天天為作雷電下擊景公之臺隕壞也毀景公之支躰海水爲之大溢出也夫瞽師庶女位賤尚葈權輕飛羽尚主也葈者葈耳菜名也幽兾渭之䄠菜雒下謂之胡葈生是官者至微賤也瞽師庶女之位復賤於主葈之官故曰權輕飛羽也然而專精厲意委務積神上通九天激厲至精九天八方中央也以精誠感之由此之上天之誅也雖在壙虚幽閒遼逺隱匿重襲石室界障險阻其無所逃之亦明矣上天上帝也上帝神明言人有罪惡雖自隱蔽竄藏猶見誅害也故曰无所逃也武王伐紂渡于孟津陽侯之波逆流而擊陽侯陵陽囯侯也其囯近水溺死於水其神能爲大波有所傷害因謂之陽侯之波也疾風晦㝠人馬不相見於是武王左操黃鉞右秉白旄瞋目而撝之曰余任天下誰敢害吾意者於是風濟而波罷済止魯陽公與韓構難戰酣曰暮援戈而撝之日爲之反三舎魯陽楚之縣公也楚平王之孫司馬子其之子囯語所謂魯陽文子楚僣号稱王其守縣大夫皆稱公故曰魯陽公今南陽魯陽是也酣對合樂時也撝日令反即行三舍宫次宿也夫全性保眞不虧其身遭急廹難精通于天廼未始出其宗者何爲而不成精通于天者謂聖人質成上通爲天所助宗者道之本也謂性不外逸生与道同也夫死生同域不可脅凌勇武一人爲三軍雄武士也江淮间謂士曰武彼直求名耳而能自要者尚猶若此又況夫宫天墬懷萬物以天地爲宫室懷猶囊也而友造化造化隂陽也与之相朋友含至和直偶于人形外直偶与人同形而内有大道也九鑚一知之所不知九謂九天一也九天之変鑚占兆所不知事亦云然也而心未甞死者乎心未甞死者謂心主与道同者也不与九鑚一䓁也昔雍門子以見於孟甞君雍門子名周善弹琴又善哭雍門斉西門也居近之因以為氏哭猶哥也見猶感孟甞君斉相田文己而陳辝通意撫心發聲孟甞君爲之増欷歍唈流涕狼戾不可止增重也唈失聲也狼戾猶交撗也讀鴛鴦之鴦也唈瀆左傳嬖女人姻始之姶精神形於內而外諭哀於人心此不傳之道言能以精誠哀悲感傷人心不可斈而得之故曰不傳之道也使俗人不得其君形者而効其容必爲人笑君者言至精為也故蒲且子之連鳥於百仞之上满且子楚人善弋射者七尺曰仞也而詹何之鶩魚於大淵之中此皆得清尽之道太浩之和也詹何楚人知道術者也言其善釣令魚馳騖来趨鉤餌故曰騖魚得其精㣲故曰太浩之和也夫物之相妙深微知不能論辯不能解故東風至而酒湛溢東風木風也酒湛靑酒也來物下甚故曰湛太味酸酸風入酒故酒酢而湛者沸溢物相感也蚕咡絲而商絶或感之也老蚕上下絲於口故曰咡絲新絲出故綵商於五音最鈿而急故絶也咡或作珥蚕老時絲在身中正黄逹見于外如珥也商西方金音也蚕午火也火壯金因應商而已成有新故相感者也晝隨而月運闕鯨魚死而彗星出或動之也運讀連圍之圍也運者軍也將有軍事相圍守則月運出也以蘆草隨牖下月光中令圜畫缺其一面則月運亦阙於上也洏魚大魚蓋長数里死於海邊魚之身賤也彗星為変異人之害也相動也故聖人在位懷道而不言澤及万民聖人行自然白為之道故澤及万民也君臣乖心則背譎見於天神氣相應徴矣日旁五色氣在兩邊水出為背外向爲譎內向為珥在上外出為冠故山雲草莽水雲魚鱗山中氣出雲似草莽水氣出雲似魚鱗旱雲煙火涔雲波水各像其形所以感之旱雲亢陽氣似煙火涔大滀水也雲岀於涔似波水也夫陽燧取火於日方諸取露於月夫瀆大夫之夫已説在上一涗水火從火極来在人手中非人所能涗知天墬之閒巧歷不能㪯其数巧工也天地之閒物相感者衆多雖工為歷術者不能悉㪯其数也手徴忽怳不能覽其光言手雖覽得微物不能得其光一天道廣大手雖能徴其忽怳无形者不能覧得日月之光也然以掌握之中引於太極之上太極天下始形之時也上猶也而水火可立致者隂陽同氣相動也動猶化也此傳之所以騎辰尾也言殷王武丁夢得賢人使工寫其像旁求之得傳說於傳巖遂以為相爲髙宗成八十一符致中㒷也死託精於辰尾之星一名天䇿也故至隂飂飂至陽赫赫兩者交接成和而万物生焉衆雄而無雌又何化之所能造乎所謂不言之辯不道之道也故召逺者使无為焉逺者四夷也欲致化四夷者當以死為无為則夷荒自至也親近者使无事焉近者渚夏也欲親近者當以无事无事則近人自親附之惟夜行者爲能有之夜行渝隂行也陰行神化故能有天下也一說言入道者如夜行幽之中為能有召遠親近之道也故走馬以糞而車軌不接於逺方之外却走馬以糞老子辝也止馬不以走但以糞糞田也行至德之効也一說囯无道則戎馬生於郊无事正走馬以糞田也故兵車之不接逺方之外雨輪之间為也是謂坐馳陸沈晝㝠宵明言坐行神化疾於馳傳沈浮㝠明与道合也以冬鑠膠以夏造冰夫道者无私就也无私去也能者有餘拙者不足言以非時鑠㬔造冰難成之也天道无私就去能行道功有餘也順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧隋佚漢東之囯王姓諸侯也隋侯見大蛇傷断以薬之後蛇扵江中御大珠以報之因曰隋侯之珠蓋明月珠也楚人卞和得美王璞於荊山之下以献武王王以示玉人玉人以為石刖其左足文王即位復献之以為石刖其右足抱不釋而泣血及成王即位又献之成王曰先君輕則而重剖石遂剖視之果得美王以為璧蓋純白夜光文王在春秋前成王不以告故不書也得失之度深微窈冥難以知論不可以辯也何以知其然今夫墬黄主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以生殊死之人亦可謂失論矣王孫綽蓋周人也一曰衛人王孫賈之後也言一斉薬愈偏枯之病欲倍其剤以生已死之人也若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐵也而求其引瓦則難矣物固不可以輕重論也夫燧之取火於日磁石之引鐡解之敗漆以蟹置漆中則敗壞不燥不任用也葵之郷日雖有明智弗能然也然猶明也故耳目之察不足以分物理心意之論不足以定是非故以智為治者難以持國唯通于太和而持自然之應者爲能有之能有持囯之術故嶢山崩而薄落之水涸嶢山在雍州也薄落水在馮翊臨晉臨晉山窮相通也一曰薄落涇水也區冶生而淳鈞之劒成區讀哥謳之謳也區越人善治劒工也淳鈞古大銳劒也紂爲无道左強在側左強紂之䛕臣也敎紂无道勸以貪滛也太公並世故武王之功立立成由是觀之利害之路禍福之門不可求而得也言其門户不可豫求而得知也忽然來至无形兆也夫道之與德若韋之與革逺之則迩近之則逺革之質象道韋之質象得欲逺去之道反在人側欲以事求之去人已遠也无事者近人有事者逺人不得其道若鯈魚儵魚小魚也在水中可觀見見而不可得道亦如之故聖若鏡不將不迎將送而不藏應猶隨也謂鏡隨人形好醜不有藏匿者也故万化而无傷其得之乃失之其失之非乃得之也目謂得是乃失道者也自謂失道未必不得道也今夫調者叩宫宫弹角角動此同聲相和者也叩大宮則少宫應弹大角則少角動故曰同音相和夫有改調一弦其於五音無所比鼓之而二十五皆應此未始異於聲而音之君已形也一宫音也音之君也故二十五弦皆和也一説改調一不比五音謂一声宮音也故曰未始異於声也五王扵一声故曰音之君巳形君主形見也故通於太和者惽若纯酔而甘卧以游其中而不知其所由至也太和渭䓁死生之和斉窮逹之端其中道之中也不自知所至此也纯温以淪鈍悶以終若未始出其宗純一也温和也淪没也諭潜伏也鈍悶无情也欲終始於道宗夲也若未有其形是謂大通今夫赤螭靑虬之游兾州也赤螭青虬皆龍屬也天淸墬定毒獸不作飛鳥不駭入榛薄食薦梅薦梅草實也狀如桑椹其色赤生江濵也噆味合甘歩不出頃畒之區而蛇鱓輕之以為不能與之爭於江海之中噆味長美也蛇鱓自以為能勝赤螭青虬若乃至於雲之素朝黑也素白也黑雲升合於明朝也隂陽交爭降扶風雜凍雨扶揺而登之降下也扶風疾風也東雨暴雨也扶摇發動也登上上風雨而去威動天墬聲震海内四海之内悉畏之也蛇鱓著泥百仞之中百仭七百尺也渡深曰仞傳曰仞溝洫也熊羆匍匐丘山磛巖虎豹襲穴而不敢咆襲入呛嘷猨狖顚蹶而失木枝狖讀中山人相遺物之遺也狖猨屬也長尾而昻鼻也又況直蛇鱓之乎鳯皇之翔至徳也雄曰鳯雌曰皇爲至德之君而來翔也雷霆不作風雨不興川谷不澹澹溢草木不揺而燕雀佼之以爲不能與之爭於宇宙之間燕雀自以爲能佼健於鳯皇也佼或作詨詨哭也宇屋簷也宙棟梁也易日上棟下宇也還至其曾逝萬仭之上翺翔四海之外曾猶髙也逝猶飛也一曰回也翼一上一下曰翺不摇曰翔外猶表也過崑崙之䟽圃飲砥柱之湍䟽圃在崑崙之上過猶歴也砥柱河之隘也在河東大陽之東湍淂水圭疾瀬淸皆激急流邅回蒙汜之渚邅回猶尚洋也蒙汜曰所出之墜也池决復入爲渚渚小渊也尚佯兾州之際徑躡都廣入白抑節躡圭也都廣東南之山名也衆帝所自上下也言鳯皇過廣都之野送日入扵枊節之地言其翔之廣也躡或作絶也徑遇絶歷也羽翼弱水暮宿風穴濯羽翼扵弱水之上風穴北方寒風從地出也當此之時鴻鵠鶬鶴莫不憚驚伏竄注喙江裔注䧘啄注墜不敢動也裔邊也又況直燕雀之乎此明於小動之迹而不知大節之所由者也昔者王良造父之御也王良晉大夫御无恤子良也所謂御良也一名孫無政爲趙簡子御死而託精於天駟星天文有王良星是也造父嬴姓伯翳之後飛廉之子爲周穆王御上車攝轡馬爲整齊而歛諧整齊不差歛諧馬容躰足調諧也投足調均勞逸一一同也心怡氣和體便輕畢畢疾也安勞樂進馳騖若滅滅没也言疾也左右若鞭周旋環左右謂騑驂也歩趨之力被鞭矣一說言掉鞭教諭其易也周旋若環如人志也丗皆以爲巧然未見其貴者也若夫鉗且大丙之御此二人太一之御也一說古得道之人以神氣御隂陽也除轡銜去鞭棄䇿車莫動而自舉馬莫使而自走也但以車馬爲主耳神氣扶之也日行月動星燿而運燿有也天也運行也電奔而騰進退屈伸不見朕垠朕兆朕也垠形狀也故不招指不咄叱過歸鴈於碣石言其御疾到自息止乃使北歸於碣石之山而中之鴈得之過去也過讀責過之過軼鶤雞於姑餘自後過前曰軼也姑餘山名在吴也鶤雞鳯皇之别名也言其御疾自碣石過帰鴈便復東南軼過鶤雞於姑餘山也騁若飛騖若絶矢躡風追猋歸忽縱履也足疾及箭矢躡蹈也一矢在後不能及故言縱其行疾能及矢言躡追猋及之猋光中有影者忽然便帰皆及此言疾也朝發槫桑日入落棠榑桑日所出也落棠山名日所入也此假弗用而能以成其用者也弗用無為非慮思之察手爪之巧也嗜欲形於中而精神踰於六馬此以弗御御之者也言藏嗜欲之形扵臆之中諭和也以弗御御之以道術御也昔者黄帝治天下而力牧太山稽輔之力牧太山稽黄帝師孟子曰王者師臣也以治日月之行律律度也治隂陽之氣節四時之度正律歷之數別男女異雌雄明上下等貴賤使強不掩弱衆不暴寡人民保命而不夭安其性命不夭折也歲時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尢君臣調和無尤過也法令明而不闇輔佐公而不阿卿土公正不立私曲從也田者不侵畔漁者不爭隈隈曲深処魚所聚也道不拾遺市不豫賈城郭不関閉也邑無盗賊鄙旅之人相讓以財言所有餘狗吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五榖登熟虎狼不妄噬鷙鳥不妄搏鳯皇翔於庭翔猶止也麒麟游於郊游行也郊邑外也靑龍進駕飛黃伏皁飛黄乗黄也出西方如狐背上有角壽千歳皁也諸北儋耳之國莫不獻其貢職皆北極夷囯也然猶未及虙戲氏之道也往古之時四極廢九州裂裂分也廢頓也天不兼覆墬不周載火爁炎而不滅水浩洋而不息息消猛獸食顓民顓善鷙鳥攫老弱攫搗於是女媧錬五色石以補蒼天女媧隂帝佐虑戲治者也三皇時天不足西北故補之師說如此断鼇足以立四極鼇大龜天廢頓以鼇足柱之楚詞曰鼇載山下其何以安之是也殺黑龍以濟兾州黒龍水精也力大稽殺之以止雨也済朝也兾九州中謂令四海之内積蘆以止水蘆葦也生於水故積聚其以止滛水平地出水爲滛水蒼天補四極正滛水涸兾州平狡蟲死顓民生蟲狩也背方州抱貟天方州地也和春陽夏殺秋約冬方寢䋲方榘四寸也寢繩直身而卧也隂陽之所壅沈不通者竅理之逆氣戾物傷民厚積者绝止之逆氣乱氣也傷害民物之積財故絶止也當此之時卧倨倨興眄眄倨倨卧无思慮也倨讀虚田之虚也眄眄然視無智巧皃也一自以爲馬一自以爲牛其行蹎蹎其視瞑蹎讀填寘之填侗然皆得其和莫知所由生浮游不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下黄壚上與九天交接下契至黄壚黄泉下有壚土也壚讀䋲纑之纑名聲被後丗光暉重萬物使萬物有光暉也雷車服駕龍驂青虬駕應德之龍在中爲服在旁為驂有角為龍無角為虬一應龍有翼之龍也援絶瑞席蘿圖殊絶之瑞援而致之也羅列圖籍以爲席蓐一蘿圖車上席也黄雲络前白螭後奔蛇絡讀道路之路也謂車之垂絡也黄雲之氣络其車白螭導在於前奔蛇騰蛇也從在於後皆瑞也浮游消揺道神登九天九天八方中央朝帝扵靈門在朝於上帝靈門也宓穆休于太祖之下宓寕也穆和也休息也太祖道之太宗也然而不彰其功不楊其聲彰揚皆明隱眞人之道以從天墬之固然隱藏也真人眞德之人固自然也何則道德上通而智故消滅也智故巧詐逮至夏桀之時主闇晦而不明道瀾漫而不修仁義道不復修設故曰瀾漫棄五帝之恩刑推蹶三王之法籍是以至徳滅而不帝道揜而不興興㪯也舉事戾蒼天發號逆四時戾反也春秋縮其和天地除其徳縮藏也言和氣不復行也言其所施日惡不自知也故曰除其德也仁君處位而不安大夫隱道而不言不爲民所安隱仁義之道不正諌直言也論語曰囯无道危行言遜也羣臣準上意而懷當準望也懷思也當合也取合主意不復以道正諌也䟽骨肉而自容邪人叅耦比周而隂謀隂謀私謀也居君臣父子之間而競載驕主而像其意像猶隨也亂人以成其事是故君臣乖而不親骨肉䟽而不附植社槁而墵裂言不禋於神也容臺振而掩覆容臺行礼容之臺言不能行礼故天文振動而敗之犬羣嘷而入淵言將滅壞犬失其主故噑而入淵也一說言犬禍也豕銜蓐而席澳豕銜其蓐席入之澳言豕禍之說銜蓐自藏処也美人挐首面而不容挐首乱頭也草与髪并編爲挐首不修容飾也曼聲吞炭内閉而不歌曼聲善歌也見丗乱哀將滅故吞炭自敗音聲閉氣不復動也喪不盡其哀獵不聽其樂言時乱札壞不尽在哀楽崩故不復聽田獵之楽西老折勝黄神嘯吟西王母折其頭上所戴勝爲時无法度黄帝之神傷道之衰故嘯吟而長嘆也飛鳥鎩翼走獸廢脚鎩翼緃翼也廢脚廢蹇也言桀無道田獵煩數鳥獸悉被創夷鎩翼廢脚也山無峻榦澤無洼水峻榦美材也洼水渟水言山澤不以時故也狐狸首穴馬牛放失田無立禾路無莎薠莎薠讀猿猴蹯噪之蹯狀如葴葴如葭也莎草名也金積折廉璧襲無理金氣積聚析其廉也壁文襲重言用之煩数皆鈍無復文理也璧讀辟也磬無腹磬空也象磬數鑚以十故空尽無腹也言桀爲無道不修仁德但数占莫得吉兆也詩云握粟出卜自何能榖又曰我旣猒不我告猶是也蓍䇿日施易曰再三瀆瀆則不告也晚丗之時七國異族諸侯制法各殊習俗晚丗春秋之後囯之未七囯斉楚燕趙韓魏秦也斉姓田楚姓芈燕姓姚趙姓趙韓姓韓魏姓魏秦姓嬴故異族也從横間之舉兵而相角蘇秦約從張儀連横南与此合為從西与東合為横故曰從横成則秦帝也攻城檻殺覆髙危安掘墳墓楊人骸大衝車高重京衝軍大鐡著其轅端馬甲車被兵所以衝扵敵城也古者伐不敬取其鯨鯢其骸尸聚土而之以爲京觀故曰高重壘京也除戰道便死路犯嚴敵殘不義百往一反名聲苟盛也言百人行戰皆死一人得還反也一說百人行伐一反得勝耳是故質壯輕足者爲申卒甲鎧也在車曰土歩曰卒千里之外家老羸弱悽愴於内廝徒馬圉軵車奉饟廝役徒衆也牛曰放馬曰圉軵推也饟資粮也軵讀楫拊之拊也道路遼逺霜雪亟集短褐不完短褐處器物之人也矩或作短字毛布如今之馬衣也不完言民窮也人羸車弊泥至膝相於道奮首於路㰎引也奮首民疲扵伇頓仆於路僅能摇頭耳言疲困也故曰奮首身格而死格榜牀也言收民伇賦不畢者榜之扵格上不得下故曰格而死也所謂兼囯有墬者伏尸數十萬破車以千百數傷弓弩矛㦸矢石之創者扶㪯於路故丗至於枕人頭食人肉葅人肝飮人血甘之於芻豢甘猶嗜也故自三代以後者天下未甞得安其情性而樂其習俗保其脩命天而不夭於人虐也虐害所以然者何也諸侯力征天下合而爲一家逮至當今之時天子在上位天子漢孝武皇帝持以道德輔以仁義近者獻其智逺者懷其徳拱揖指麾而四海賔服春秋冬夏皆獻其貢職天下混而爲一混同子孫相代此五帝之所以迎天德也夫聖人者不能生時時至而弗失也輔佐有能黜䜛侫之端息巧辯之除削刻之法去煩苛之事屏流言之迹塞朋黨之門消知能消除知巧之能脩太常隳枝體絀聦明去其小聦明大利欲也大通混解意釋神漠然若無魂魄使萬物各復歸其根則是所脩伏犧氏之迹而反五帝之道也反復夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至德遺於後丗何則至虚無純一而不喋苛事也喋猶深筭也言不采取煩苛之事周書日掩雉不得更順其風言掩雉雖不得當更從其上風順其道理也言可行与不猶當以道徳為夲諭申商之法失之也今若夫申韓商鞅之爲治也申申不害也韓韓非也商鞅公孫鞅三子之術皆爲削刻之法也挬拔其根蕪棄其夲而不窮究其所由生何以至此也鑿五刑爲刻削乃背道徳之本而爭於錐刀之末錐刀之末論小利言盡爭之也斬艾百姓殫盡太半斬艾百姓以草木諭也不養之也殫病也大半過半也而忻忻然常自以爲治忻忻猶自喜得意之皃也是猶抱薪而救火鑿竇而出水夫井植生梓而不容甕溝植生條而不容舟不過三月必死植謂材也椽杙於溝邊因生為條木也以諭申韓啇鞅之所爲法比於梓條也所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也折曲潦水不泄瀇瀁極望旬月不雨則涸而枯澤受翼而無源者瀷雨濆疾流者故曰无源瀷讀燕人强春言勑同也譬羿請不死之藥於西王母娥竊以奔月娥羿妻羿請不死之藥扵西王母未及服之娥盗食之得僊奔入月中為月精也奔月或作坌肉薬坌肉以為死畜之肉可生也悵然有喪無以續之言羿悵然失志若有所喪亡不能復得不死藥以續之也何則不知不死之藥所由生也羿不知不死之藥所出生也申韓商鞅之等不得治之根本如乞藥矣一說羿謂命在藥不知命自在天也故或欲得知不死薬之所由出生也是故乞火不若取燧寄汲不若鑿井淮南鴻烈解卷第六淮南鴻烈解卷第七
