front:
  text: 精神訓精者人之氣神者人之守也夲其原說其意故曰精神因以題篇也古未有天地之時惟像無形惟思也念天地未成形之時无有形生有故天地成焉窈窈㝠㝠芒芠漠閔澒濛鴻洞莫知其門皆未成形之氣也芒讀王莽之莽也芠讀枚滅之枚閔讀子騫之閔澒讀項羽之項鴻讀子贛之贛洞讀同游之同也皆无形之象故曰莫知其門也有二神混生經天營地二神隂陽之神也混生俱生也孔乎莫知其所終極孔深貌也滔乎莫知其所止息滔大貌也於是乃别爲隂陽離為八極剛柔相成萬物乃形離散也八極八方之極剛柔隂陽也煩氣為蟲煩乱精氣爲人是故精神天之有也而骨骸者地之有也精神入其門而骨骸反其根精神无形故能入天門骨骸有形故反其根歸土地我尚何存言人死各有所歸我何猶常存是故聖人法天順情不拘於俗不誘於人誘猶惑也以天爲父以地為母隂陽為綱四時為紀天静以清地定以寧萬物失之者死法之者生夫靜漠者神明之宅也虚無者道之所居也是故或求之於外者失之於内有守之於内者失之於外譬猶夲與末也從夲引之千枝萬葉莫得不隨也夫精神者所受於天也而形體者所稟於地也故曰一生二二生三三生萬物一謂道也二曰神明也三曰和氣也或一者无氣也生二者乾坤也二生三三生万萬天地設位陰陽通流万物乃生萬物背隂而抱陽沖氣以爲和万物以背為隂以腹爲陽身中空虛和氣所行爲隂故腎雙為陽故心特隂陽与和共生物形君臣以和致太平也故曰一月而膏始育如膏也二月而胅三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而坐形體以成五藏乃形是故胏主目胏象朱雀朱雀火也火外景故主目也腎主鼻腎象水也水所以通溝也鼻所以通氣也故主鼻也膽主口膽勇者决所以処故主口也肝主耳肝金也金內景故主耳也外爲表而内爲裏開閉張歙各有經紀歙讀脅也故頭之圓也象天足之方也象地有四時五行九解四時春夏秋冬也五行金木水火土也九解謂九十為一解也一九解六一之所解合也一八方中央故曰九解也三百六十六日人亦有四支五藏九竅三百六十六節天有風雨寒暑人亦有取與喜怒故膽爲雲膽金也金石雲之所出故爲雲胏爲氣肺火也故爲氣肝爲風肝木也木爲風生故爲風腎爲雨腎水也因水故雨雨或作電腎水也水爲光故爲電脾爲雷以與天地相參也而心爲之主心土也故爲四行之主也是故耳目者日月也血氣者風雨也日中有蹲烏踆猶蹲也謂三足烏踆讀踆魏之踆而月中有蟾蜍蟾蜍蝦蟆日月失其行薄蝕無光薄者迫也薄讀厚薄之薄也風雨非其時毁折生災五星失其行州國受殃吾工熒惑太白歳星辰星鎮星也今熒犯角亢則州囯受其殃也餘準此也夫天地之道至紘以大尚猶節其章光變其神明人之耳目曷能乆熏勞而不息乎息止精神何能乆馳騁而不旣守旣盡是故面氣者人之華也而五藏者人之精也夫面氣能專于五藏專一而不外越則腹充而嗜慾省矣腹充而嗜慾省則耳目清聽視逹矣耳目淸聽視達謂之明五藏能屬於心而無乖則㪍志勝而行不僻矣㪍志勝言已之㪍志也僻邪也勝或作遯言㪍或遯去故行正而不邪也㪍志勝而行之不僻則精神盛而氣不散矣精神盛而氣不散則理理則均均則通通則神神則以視無不見以聽無不聞也以爲無不成也是故憂患不能入也而邪氣不能襲襲猶因也亦入故事有求之於四海之外而不能遇遇得或守之於形骸之内心無欲也而不見也故所求多者所得少所見大者所知小夫孔竅者精神之戸牖也而氣志者五藏之使候也耳目淫於聲色之楽則五藏揺動而不定矣五藏摇動而不定則血氣滔蕩而不休矣血氣滔蕩而不休則精神馳騁於外而不守矣多情欲故神不内守精神馳騁於外而不守則禍福之至雖如丘山无由識之矣丘山諭上識知也使耳目精明達而無誘慕氣志虚靜恬愉而省嗜慾五藏定寧充盈而不泄精神内守形骸而不外越則望於往丗之前而視於來事之後猶未足爲也猶尚也爲治也豈直禍福之間哉故曰其出彌逺者其知彌少言難以道故也以言夫精神之不可使外淫也是故五色亂目使目不明不明視而昬也五聲譁耳使耳不聦不聦聼無聞也五味亂口使口爽傷爽病病傷滋味也趣舍滑心使行飛滑亂也飛且下從度也此四者天下之所養性也性生也然皆人累也故曰嗜慾者使人之氣越越失而好憎者使人之心勞勞病弗疾去則志氣日耗耗猶亂也夫人之所以不能終其夀命而中道天於刑戮者何也以其生生之厚言生生之厚者何心極嗜慾滛監無厭以傷耳目情性故不終其壽命中道天讀於刑辟之戮也夫惟能無以生爲者則
