body:
  text: 所以脩得生也無以生爲者輕利害之卿徐情性之欲則長得生矣夫天地運而相通萬物揔而爲一緫合也一同也萬物合同統於一道能知一則無一之不知也上一道也下一物也不能知一則无一之能知也譬吾處於天下也亦爲一物矣不識天下之以我備其物與與耶辭也且惟無我而物無不備者乎然則我亦物也物亦物也物之與物也有何以相物也物亦物也何相名為物也雖然其生我也將以何益言生我自然之道亦當以何益乎其殺我也將以何損損減夫造化者旣以我爲坯矣將無所違之矣言旣以我爲人無所離之諭不求亦不避也吾安知夫刺炙而欲生者之非或也又安知夫絞經而求死者之非福也或者生乃徭役也而死乃休息也天下茫茫孰知其生我也不彊求己已止也言不惡生也其殺我也不彊求止言不畏死欲生而不事事治憎死而不辭唯義所在故不辭也賤之而弗憎貴之而弗喜人有惡賤己者已不僧也人有尊己者已不喜也隨其天資而安之不極資時也一曰性也極急也諭道人不急求生也吾生也有七尺之形吾死也有一棺之上吾之於比有形之猶吾死之淪於無形之中也淪入也然則吾生也物不以益衆吾死也土不以加厚吾又安知所喜憎利害其間者乎不知喜生之利不知僧死之害守其正性也夫造化者之攫援物也攫撮也援引也譬猶陶人之埏埴也其取之地而已爲盆盎也與其未離於地也無以異其已成器而破碎漫瀾而復歸其故也陶人作瓦器治官也頓泥坯取之扵地以爲器明人不當惡死死復帰其未生之故耳譬猶瓦器之破而復反於土也與其爲盆盎亦無以異矣无以異於土也夫臨江之郷居人汲水以浸其園江水弗憎也苦洿之家決洿而注之江洿水弗樂也是故其在江也無以異其浸園也其在洿也亦無以異其在江也道尚空虛貴无形江水大去不可消就易故不僧也窊水小去易小消就不消故不楽也洿水猶澹水也苦猶疾也之說言名自安其處也及其轉易亦無憎楽也是故聖人因時以安其位當丗而樂其業業事也夫悲樂者德之邪也而喜怒者道之過也好憎者心之也故曰其生也天行似天氣也其死也物化如物之變化也静則與隂俱閉動則與陽俱開精神澹然無極極盡不與物散而天下自服散雜亂貌自服服於德也故心者形之主也而神者心之寳也形勞而不休則蹶蹶顛精用而不己則竭是故聖人貴而尊之不敢越也夫有夏后氏之璜者匣匱而藏之寳之至也半壁曰璜珍王也夫精神之可宝也非直夏后氏之璜也直猶非也是故聖人以無應有必究其理以虚受實必窮其節恬愉虚静以終其命是故無所甚䟽而無所甚親抱德煬和以順于天焬炙也向火中炙和氣以順天道也煬讀供餋之餋與道爲際與徳爲鄰際合也鄰比也不爲福始不爲禍先魂魄處其宅而精神守其根死生無變於己故曰至神変動所謂眞人者性合于道也眞人者虙戲黄帝老明是也故有而無實而若虚処其一不知其二治其内不識其外治其内守精神也識其外外不妤憎也明白太素無爲復樸體本抱神以游于天地之樊樊崖也樊讀麥飯之飯也芒然仿佯于塵垢之外芒讀王莽之莽而消摇于無事之業浩浩蕩蕩乎機械知巧弗載於心是故死生亦大矣而不爲變不爲変者同死生也雖天地覆育亦不與之抮抱矣抮抱猶持着也言不以天地養育万物故强与持著守其純熟也審乎無瑕而不與物糅瑕猶釁也忤見利欲之貌也能審順之故不与物相粗見事之亂而能守其宗見事有者止之乱不能惑故能守其宗宗本也若然者正肝膽遺耳目言精神内守也心志專于内通逹耦于一一者道也居不知所爲行不知所之言志意无所繫渾然而徃逯然而來渾轉行貌逯謂无所爲忽然往來也逯讀謂緑衣之緑也渾讀大珠渾渾之渾也形若槁木心若死槁木無氣死無諭無爲也忘其五藏損其形骸不學而知不視而見不爲而成不治而辯感而迫而動迫切不得不動然後方動也不得己而徃如光之燿如景之放以道爲紃有待而然紃者法也以道待万物故曰有待而默默如是抱其太清之本而無所容與无所容与扵情欲也而物無能營營惑也一曰乱廓惝而虚清靖而無思慮不劳精神大澤焚而不能河漢涸而不能寒也大雷毁山而不能驚也大風晦日而不能傷也言體道之人閉情守虛雖此四者之大不能感也是故視珍寳珠玉猶石礫也視至尊窮寵猶行客也至尊謂帝王也故曰窮寵也行客猶行路過客視毛牆西施猶䫏魂也毛牆西施皆古之羙人䫏頭也方相氏黄金四目衣赭稀丗之䫏貌非生人也但其像耳目䫏醜言極醜也以死生爲一化以萬物爲一方方也同精於太淸之夲而㳺於忽區之旁忽區忽恍無形之區旁也有精而不使者有神而不行言不濁其精不勞其神此之謂根契大渾之樸而立至清之中樸猶質也渾不散之貌也渾讀揮韋之揮是故其寢不夢其智不萌其寢不夢神内守也其智不萌无思念也其魄不抑其魂不騰魄隂神魂陽神陰不沈枊陽不飛騰各守其宅反覆終始不知其端緒甘瞑大宵之宅大宵長夜之巾也言其直瞑扵大道之処視昭昭矣而斍視于昭昭之宇休息于無委曲之隅而游敖于無形埒之野無委曲之隅無形埓之野冥无形像之貌也君而無容處而無所言其人居無形容可得見也處无常所其動無形其静無體无形无躰道之容也存而若亡生而死岀入無間役使神言能化也人不与鬼同形而能使之者道也天神曰神人神日鬼也淪於不測入於無間以不同形相嬗也嬗傳也萬物之形不同道以相傳生也終始環莫得其倫倫理也道也人莫能得焉此精神之所以能登假于道也假至也上至扵道也或作煆蟇雲氣是故眞人之所游游行若吹呴呼吸吐故内新熊經鳥伸鳬浴蝯躩鴟視虎顧是餋形之人也不以滑心經動摇也伸頻伸也此餋形之人導引其神屈申跳踉是非眞人為之道也滑乱也言此養形者耳不足以乱眞人之心也使神滔蕩而不失其充充實日夜無傷而與物爲春躰道人同日夜諭賊害也无傷无所賊害也与物爲春言餋物也則是合而生時于心也是者合扵道生四時化其心也言不干時害物也且人有戒形而無損於心戒備也人形躰備具戒或作革革改也言人形骸有改更而作化也心諭神神不損傷也有綴宅而無耗精綴宅身也精神居其宅則生離其宅則死言人雖死精神終不耗滅故曰无耗精也夫者趨不變狂者形不虧神將有所遠徙孰暇知其所爲言病者形生神在故趨不变也或作介介被甲者礼介者不拜而能趨於歩故曰不变也狂躰具存故曰不虧但精神散越耳故曰神有所遠徙也故形有摩而神未甞化者摩滅猶死也神变歸於无形也故曰未甞化也化猶死也以不化化千變萬抮而未始有極不化精神也化者形骸死者形為土為日化心化者復歸於無形也不化者與天地俱生也夫木之死也青青去之也夫使木生者豈木也使木生者天也故曰豈木哉猶充形者之非形也充形者氣也故曰非形也故生生者未甞死也其所生則死矣生生者道諭道之人若天氣未甞死也下所生者万物矣化物者未甞化也化物者道也道不化故未甞化也其所化則化矣所化者万物也万物有変故曰則化輕天下則神無累矣輕薄天下寵勢之權者許由是也故其精神无留累於物也細萬物則心不惑矣以万物為小事而弗欲故心不惑物也齊死生則志不懾矣斉䓁也不畏義死不楽不義生其志意无所懾懼故曰等也同變化則明不眩矣惑衆人以為虚言吾將㪯而實之實明人之所以樂為人主者以其窮耳目之欲而適躬體之便也今髙臺層榭人之所麗也四方高曰臺加木曰榭麗羙也而尭樸桷不斵素題不枅樸采也桷椂也不斵削加宓石之素題也不加采飾故曰不枅者不施欂櫨俱交架也枅讀雞枅或作刮也珍怪竒味人之所美也而堯糲粢之飯藜藿之羹糲粗也粢稷也糲讀頼恃之頼粢讀斉衰之斉文繡狐白人之所好也而堯布衣揜形鹿裘御寒養性之具不加厚而増之以任重之憂任讀任使之任故㪯天下而傳之于舜傳禪若解重負然非直辭讓誠无以為也此輕天下之具也禹南省方済于江廵狩為省省視四方也済渡也黄龍負舟舟中之人五色無主禹乃熈笑而稱曰我受命於天竭力而勞萬民勞憂也生也死歸也何足以滑和人壽蓋不過百年故曰生寄也死滅没化不見故曰歸也滑乱也和適也視龍猶蝘蜓蝘蜓蜥蜴也或曰守宫也東方朔射覆對武帝曰謂為龍无有角謂為蛇而有足騤騤脉脉喜緣壁非守宫當蜥蜴是也顔色不變龍乃弭耳掉尾而逃逃去禹之視物亦細矣鄭之神巫相壷子林見其徴神在男曰覡在女曰巫巫能占骨法吉凶之氣故見其兆徵徵也告列子列子行泣報壷子列子鄭之隱士壺子弟子也報白也壶子持以天壤言精神天之有也形骸地之有也死自帰其本故曰持天壌矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者心不恤也機諭疾也謂命危殆不旋踵而至猶不恐懼壷子之視死生亦斉斉等子求行年五十有四而病傴僂脊管髙于頂下迫頤兩髀在上子求楚人也僂脊管下竅也髙扵頂出頭上也肝也迫薄至扵頥也兩脾下在上軀正貟也讀精神越无之歇也燭營指天燭隂華也營其竅也上指天也燭營讀曰括撮也匍匐自闚於井臨井水自照曰偉哉造化者其以我為此拘拘邪偉哉猶羙哉也造化謂天也拘拘好貌此其視變化亦同矣故覩尭之道乃知天下之輕也以其禪舜禹之志乃知天下之細也以其視龍猶蝘蜓也原壷子之論乃知死生之齊也論持以天壤也見子求之行乃知變化之同也行匍匐闚於井此之謂也夫至人不拔之柱行不之塗倚扵不可㧞摇之柱行扵不可開閉之塗言无不通稟不竭之府學不死之師無徃而不遂徃而遂也無至而不通至而通也生不足以挂志死不足以幽神屈神俛仰抱命而婉轉抱天命而婉轉不離違也禍福利害千變萬紾紾轉孰足以患心若此人者抱素守精蟬蛻蛇解游於太淸輕㪯獨徃忽然入㝠鳯皇不能與之儷儷偕而況斥鷃乎斥澤之鷃為飛不能出扵頃畮諭弱也勢位爵禄何足以槩志也不足以槩至人之志晏子與崔杼盟臨死地而不易其義晏子名嬰字平仲斉大夫也崔杼殺斉莊公盟諸侯曰不唯崔慶是從者如此盟晏子曰嬰所不唯忠於君而利祉稷者是從亦如而利之故曰臨死地而不易其義者也殖華將戰而死莒君厚賂而止之不改其行殖梁也車車周皆斉士也為君伐莒之隊莒人圍之壯其勇力厚賂而止之不可逐而无故曰不改其行也故晏子可迫以仁不可劫以兵晏子不從崔杼之盟將見殺晏子曰句㦸何不句直矛何不摧不撓不義故曰不可劫以兵也殖華可止以義而不可縣以利縣視也言不爲利動也君子義死而不可以富貴也義爲而不可以死亡恐也彼則直爲義耳而尚猶不拘於物又況無為者矣堯不以有天下為貴故授舜公子扎不以有囯為尊故讓位扎吴壽夢之少子延州來季子也讓位不受兄囯春秋賢之諸侯之子稱公子也子罕不以玉為富故不受寳子罕宋戴公六世之孫西卿士之子司成樂喜也宋入或得王以献子罕子罕不受献玉者日以示玉人玉人以為宝故敢献之子罕曰我以不貪為宝子以玉為宝予我是皆喪宝也不如人有其宝稽者吿曰小人懷壁不可以越鄉納此以請死子罕置諸其里使玉人爲之攻之冨而後使復其所故曰不受宝也務光不以生害義故自投於淵務光湯時隱士也湯伐桀讓天下扵務光人謂務光曰湯殺其君將帰不義之名扵子務光因抱石自投扵深淵而死由此觀之至貴不待爵以至德見貴許由務光是也故曰不待爵也至富不待財以至徳見富若楚狂接輿是也王聞其賢使使者齎金百溢聘之欲以爲相而不受故曰至富不待財也天下至大矣而以與佗人也堯是身至親矣而棄之淵務光是也外此其餘無足利矣外猶除也利猶食利或作私私獨受也此之謂無累之人無累之人不以天下爲貴矣上至人之論深原道德之意以下考丗俗之行乃足羞也考觀也故通許由之意金縢豹韜廢矣金縢豹韜周公太公隂謀圖王之書也許由輕天下不受焉用此書爲故曰廢矣延陵季子不受吳囯而訟間田者慙矣訟間田者虞芮及暴桓公蘇信公是也子罕不利寳玉而爭劵契者媿矣務光不汚於丗而貪利偷生者悶矣故不大義者不知生之不足貪也大義死君親之難也不聞大言者不知天下之不足利也大言躰道无欲之言今夫窮鄙之社也叩盆拊瓴相和而歌自以爲樂矣窮鄙之社窮巷之小社也盆瓶瓦器叩之有音声故曰自以爲楽也甞試爲之擊建鼔撞巨鐘乃性仍仍然知其盆瓴之足羞也仍仍不得志之貌仍仍或作聆聆猶聞也藏詩書脩文學而不知至論之旨則拊盆叩瓴之徒也夫以天下為者學之建鼓矣建鼔楽之大者尊勢厚利人之所貪也尊勢窮位厚利重禄使之左據天下圗而右手刎其喉愚夫不為由此觀之生尊于天下也天下至大非手所據故不言手也使得據天下之圖藉行其權勢而刎喉殺身雖愚者不肯為也故曰生貴於天下矣聖人食足以接氣衣足以盖形適情不求餘接續也盖覆也餘饒也無天下不虧其性有天下不羡其和虧損也羡過也和適也有天下無天下一實也實等今贛人敖倉予人河水貢賜也敖地名倉者以之常滿倉也在今滎陽縣北飢而飱之渴而飲之其入腹者不過簞食瓢簞笥則身飽而敖倉不爲之減也減少腹满而河水不為之竭也竭尽有之不加飽無之不爲之飢與守其篅有其井一實篅受榖噐也井家人之并水也篅讀顓孫之顓也人大怒破隂大喜墜陽已說在原道也大憂内崩大怖生狂除去累漠未始出其宗乃為大通清目而不以視淸明靜耳而不以聽鉗口而不以言委心而不以慮棄聦明而反太素休精神而棄知故斍而若昧以生而若死昧暗也猒也楚人謂猒爲昧諭无知也終則反夲末生之時而與化爲一體言人之未生時欲同死生也故曰与化為一躰也死之輿生一體也今夫繇者掲钁臿魚籠土繇役也今河東謂治道為繇道揭㪯也櫻研也臿鏵也青州謂之鏵有刃也三輔謂之鵭也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽汗也薄迫也氣衝喉也當此之時得茠越下則脫然而喜矣茠隂也三輔人謂休華樹下為茠也楚人樹上大本小如車蓋狀爲越言多䕃也脫舒也言繇人之得小休息則氣得舒故喜也越讀經无重越之越也巖穴之間非直越下之休也病疵瘕者捧心抑腹膝上叩頭抑案也叩頭作跔跔讀車軥之軥也踡跼而諦通夕不寐當此之時噲然得卧則親戚兄弟歡然而喜夫脩夜之寧非直一噲之樂也謂得安卧極夜者樂扵一噲之楽然不得比長夜之楽也故知宇宙之大則不可劫以死生劫迫知養生之和則不可縣以天下飬生之和謂正道也已脩正道不惑故不可示以天下之窮勢而移也知未生之樂則不可畏以死楽其未生之時雖懼之以死不知使之畏死言不畏死知許由之貴于舜則不貪物言不貪利欲之物也牆之立不若其偃也又況不為牆乎冰之凝不若其釋也又況不為冰乎不如未爲牆水之時偃凝能変也自無蹠有自有蹠無自无跡有從无形至有形也自有跡无從有至无形也至无形謂死生変化也終始無端莫知其所萌非通于外内孰能無好憎好憎情欲無外之外至大也無内之内至貴也言天无有垠外而能爲之外諭極大也无内言其小小无内而能為之内道尚微妙故曰至貴也能知大貴何徃而不遂大貴謂無内之内也言道至微能出入扵无間故曰何往而不遂遂通也衰丗湊斈不知原心反夲湊趨也趨其末不脩稽古之典苟邀名號耳故曰不知原心反本也直雕其性矯拂其情以與丗交直猶但也彫琢其天性拂戾其夲情以合流俗与丗人交接也故目雖欲之禁之以度心雖樂之節之以禮趨翔周旋詘節拜肉凝而不食酒澄而不飲外束其形内楤其德錯隂陽之和而迫性命之情故終身爲悲人悲哀也謂衰世之學逹至道者則不然理情性治心術餋以和持以適樂道而忘賤安德而忘貧性有不欲無欲而不得言其守虚執持不欲之情性則无有所欲而不得也心有不樂無樂而弗為言其志正不樂邪淫之楽則无有正楽而不為楽言皆為之楽也無益情者不以累德而便於性者不以滑滑乱故縱體肆意而度制可以為天下儀縱放也肆緩也儀法今夫儒者不夲其所以欲而禁其所欲本所以欲謂正性恬漠也所欲謂情欲驕奢势也不原其所以樂而閉其所樂是猶決江河之源而障之以手也障蔽也言不能揜也夫民者猶畜禽獸也不塞其囿垣使有野心系絆其足以禁其動而欲脩生夀終豈可得乎夫顔回季路子夏冉伯牛孔子之通斈也然顔淵夭死季路於衛顔淵十八而卒孔子曰回不幸短命死矣故曰夭也季路仕於衛衛君父子爭囯季路死孔子曰若由不得其死然言不得以壽命終也故曰然衛人醢之以為醬故曰葅子夏失明冉伯牛為厲子夏斈扵西河哭其子而失明曾子之伯牛有疾孔子自牖執其手曰斯人也而有斯疾也此皆迫性拂情而不得其和也故子夏見曽子一臞一肥曽子問其故曰出見冨貴之樂而欲之入見先王之道又之兩者心戰故臞先王之道勝故肥道勝不惑縣於冨貴精神内守无思慮故肥也推此志非能貪富貴之位不便侈靡之樂此志子夏之志直宜迫性閉欲以義自防也冝猶但也雖情心殪形性屈竭猶不得己自強也故莫能終其天年義以自防故情心欎壹不通形性屈竭也以不得止而自勉強故无能終其天年之命也若夫至人量腹而食度形而衣容身而游適情而行餘天下而不貪委萬物而不利委棄也不以万物為利矣処大廓之宇游無極之野廓虚也極尽也登太皇馮太一玩天地于掌握之中大皇天也馮依也太一天之形神也玩弄也夫豈為貧富肥臞哉故儒者非能使人弗欲也欲而能止之言不能使人无情欲也已雖欲之能以義自止也非能使人勿樂也樂而能禁之言不能使人无楽冨貴能以礼自禁制之論語曰不義而冨且貴扵我如浮雲也夫使天下畏刑而不敢盗豈能使無有盗心哉越人得蛇以爲上肴中囯得而棄之無用蛇大虬也其長数丈厚以爲上肴故知其無所用貪者能辭之不知其無所用亷者不能譲也夫人主之所以殘亡其囯家損棄其社稷身死於人手為天下未甞非為非欲也夫仇由貪大鍾之賂而亡其囯仇由近晉之狄囯也晉智襄子伐之先賂以大鍾仇由之君貪開道來受鍾爲和親智伯因是以兵滅取其囯也仇讀仇餘之仇也虞君利垂之璧而擒其身晉大夫荀息謀扵献公以屈産之馬垂之璧假道扵虞以伐虢虞公貪璧馬假晋道旣滅虢還館扵虞遂襲虞滅之君死位曰滅故曰擒其身也獻公驪姫之羙而亂四丗晉献公伐驪戎得驪姫及其娣妤色曰美好躰曰献公嬖之生奚斉其娣生卓子遂為殺太子申生而立奚斉殺適立庶故曰乱四出者奚斉卓子惠公夷吾懷公圉也桓公甘易牙之和而不以時葬斉桓好味易牙蒸其首子而進之遂見信用専任囯政乱嫡庶桓公卒五公子爭立六十日而殨蟲流出戸五月不葬故曰不以時葬也胡王女樂之娯而亡上地胡蓋西戎之君也秦穆公欲伐之先遺女楽以淫其志其臣由諫不從去戎來適秦秦得其上地上地羙地也使此五君者適情辭餘以己爲度隨物而動豈有此大患哉五君仇白虞公晉献斉桓胡王也適猶節也動猶惑也故射矢不中也斈射者不治天也不治天言不為而得用之然則爲者不得用之御者行學御者不為轡也知冬日之箑夏日之裘無用於已則萬物之變爲塵埃矣故以湯止沸沸乃不止誠知其夲則去火而己矣箑扇也楚人謂扇為箑已止也淮南鴻烈解卷第七淮南鴻烈解卷第八太尉酒臣許愼記上夲
