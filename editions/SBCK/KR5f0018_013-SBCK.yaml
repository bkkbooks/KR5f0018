front:
  text: 經訓本始也經常也天經造化岀扵道冶亂之由得失有常故曰夲經因以題篇也太清之治也和順以寂漢清靜也太清无為之始者謂三皇之時和順不逆天暴物也寂漠不擾民質眞而素樸閑静而不躁推移而无故質性也眞不變也素樸精不散也閑靜言无欲也不躁故常也在内而合乎道出外而調于義在内者志在心平欲故能合扵道出扵外者身所履行也行不越規矩故能調義義或作德也發動而成于文行快而便于物發作也動行也文文章也便利也物事也其言略而循理其行侻而順情略約要也侻簡易也侻讀射侻取不覺之侻也其心愉而不僞其事素而不飾愉和也為虚詐也素樸也飾巧也是以不擇時日不占卦兆擇選也卦八卦也兆契之兆也丗所以占吉凶也不謀所始不議所終安則止激則行通體于天地同精于隂陽一和于四時一同也明照于日月與造化者相雌雄造化天地也雌雄猶和適也是以天覆以德地載以樂楽生也四時不失其敘風雨不降其虐日月淑清而光光明也五星循軌而不失其行五星熒惑太白鎮辰歳星也道也循順也當此之時元至碭而運照天也元氣也碭大也言盛徳之君恩仁廣大徧照四海也鳯麟至蓍兆鳫麟聖德之世至於門庭蓍四十九策兆信也善言否學也甘露下竹實滿流黄出而朱草生滿成也流黄玉也朱草生扵庭皆瑞應也機械詐僞莫藏于心莫无也逮至衰丗鐫山石鐫猶鑿也求今玉也䤿金玉㰅蚌蜃䤿刻金玉以為器也㰅猶開也開以求味也消銅鐡而萬物不滋不滋長也言盡物也刳胎殺天麒麟不游胎獸胎也天麋子也為見害故不來游覆巢毁卯鳯皇不翔鳥未鷇日卯也鑚燧取火構木爲臺焚林而田竭澤而漁田獵也竭澤漏池也人械不足畜藏有餘械器用也畜積藏餘府府實也而萬物不繁兆萌牙卯胎而不成者處之太半矣積壌而丘處糞田而種榖掘地而井飲䟽川而為利䟽通築城而為固拘獸以爲畜列隂陽繆戾四時失敘雷霆毀折電霰降虐氣霧雪霜不霽霽止也而萬物燋夭霜雪之害不止則萬物燋夭不繁茂也菑榛聚埓畒菑草曰茂木聚日榛積之扵疆芟野菼長苗秀芟殺也菼草也苗稼也不榮而實曰秀也草木之句萌銜華戴實而死者不可勝數乃至夏屋宫駕縣聮房植夏屋大屋也縣聮聮受雀頭箸桷者一曰辟帶也房室也植戸植也橑擔榱題橑椽撩也檐屋垂也榱棟也題當也雕琢刻鏤喬枝菱阿芙蓉芰荷阿曲屋也芙蓉藕華也菱角交蓞也荷吴蕖也五采爭勝流漫陸離流漫采色相参和陸離美妤貌脩掞曲校天矯曾橈芒繁紛挐皆屋飾也讀麥芒之芒挐讀上谷茹縣之茹以相交持公輸王爾無所錯其剞削鋸公輸巧者一曰魯班之號也王爾古之巧匠也剞巧刺盡頭黒邊箋也尺削兩刃句刀也剞讀枝尺之技也讀詩蹶角之蹶削讀綃頭之綃也然猶未能贍人主之欲也是以松柏菌露夏槁松柏根菌露竹筦皆冬生難殺之木當是時夏槁死也刺君作事不時隂陽失敘菌讀似綸虚讀南陽人言道路之路江河三川絶而不流三川涇渭并也出於岐山絶竭也故曰不流國語曰河竭而商亡也夷羊在牧夷羊土神殷之將亡見於商郊牧野之地飛蛩满野蛩蟬蟣蠓之屬也一日蝗也兖刑渭之螣螣讀近殆緩氣言之蛩讀詩受小共之拱天旱地坼坼燥裂也鳯皇不下句居牙戴角出距之獸於是騺矣句瓜鷹鸇之屬也居牙熊虎之屬也距讀拒守之拒民之專室蓬廬無所歸專特小室也蓬盧蘧篨覆也言小有賔客歸之无所庇也凍餓飢寒死者相枕席也言其衆也及至分山川谿谷使有壤界計人多少衆寡使有分數築城掘池設機械險阻以爲備飾職事制服等等差也異貴賤差賢不肖經誹譽行賞罰經書也誹惡譽善賞可賞罰可罰也則兵革興而分爭生民之滅抑天隱虐殺不辜而刑誅無罪於是生矣抑没也言民有滅没天折之痛天地之合和隂陽之陶化萬物皆乗人氣者也天地合和其氣故生隂陽陶化萬物是故上下離心氣乃上蒸離者不和也君臣不和五榖不爲不為
