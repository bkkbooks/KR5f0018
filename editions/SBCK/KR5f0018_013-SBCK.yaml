body:
  text: 日冬至四十六日天含和而未降也懐氣而未楊自立隂陽儲與呼吸浸潭包裹風俗儲與猶尚羊无所主之貌也一日襃大貌也浸潭廣衍故曰包裹民俗也斟酌萬殊旁薄衆冝旁並也薄近也衆物宜適也以相嘔咐醖釀而成育羣生咐讀符命之符醖醸猶和調也是故春肅秋榮冬雷夏霜皆賊氣之所生由此觀之天地宇宙一人之身也以身諭也六合之内一人之制也六合四方上下也是故明於性者天地不能䝱也䝱恐也審於符者怪物不能惑也審明也符驗也怪物非常人所疑惑也故聖人者由近知逺而萬殊爲殊異也一同也古之人同氣于天地與一丗而優游優游猶委從也當此之時無慶賀之利刑罰之威禮義廉恥不設誹譽仁鄙不立而萬民莫相侵欺暴虐猶在于混之中混大也大之中謂道也逮至衰丗人衆而財寡事力勞而餋不足於是忿爭生是以貴仁仁鄙不齊比周朋黨設詐諝懷機械巧故之心而性失矣諝謀也性失失其純樸之性也是以貴義隂陽之情莫不有血氣之感男女羣居雜處而無别是以貴禮行也道德夲仁義末知仁義然後知禮樂之不足脩也仁義大也禮楽小也今背其本而求于末釋其要而索之于詳未可與言至也至至德之道也天地之大可以矩表識也矩度也表影表識知也星月之行可以歷推得也歷術也推求也雷震之聲可以鼔鐘寫也冩猶放斆也風雨之變可以音律知也律知隂陽是故大可覩者可得而量也明可見者可得而蔽也蔽或作察聲可聞者可得而調也色可察者可得而别也夫至大天地弗能含也至微神明弗能領也領理也及至建律歷别五色異淸濁淸商濁宫味甘苦則樸散而爲器矣立仁義脩禮樂則德遷而為偽矣脩設也遷移也及偽之生也飾智以驚愚設詐以巧上巧欺上也天下有能持之者有能治之者也有能持之者桀紂之民有能治之者湯武之君也昔者蒼頡作書而天雨粟夜哭蒼頡始視鳥迹之文造書有契則詐僞萌生詐僞萌生則去本趨末棄耕作之業而務錐刀之利天知其將餓故爲南粟恐爲書又所効故夜哭也鬼或仡免免恐見取毫作筆害及其軀故夜哭伯益作井而龍登雲神棲崑崙伯益佐舜初作井鑿地而未水龍知將決川谷漉陂池恐見害故登雲而去樓其神於崑崙之山也能愈多而徳愈薄矣愈益也故周鼎著倕使銜其指以明大巧之不可爲也倕堯之巧工也及周鑄鼎著倕像於鼎使銜其指假令倕在見之巧不能復踰但當銜齧其指故曰以明巧之不可爲也一說周人鑄鼎畫像鏤倕身扵鼎使自銜其指以戒後世明不當大巧為也故至人之治也心與神處形與性調靜而體徳動而理通隨自然之性而縁不得巳之化洞然無為而天下自和憺然無欲而民自樸無禨祥而民不夭不忿爭而養足兼苞海内澤及後丗不知為之者誰何道无姓名自當然也故曰不知誰何也是故生無號死無謚實不聚而名不立實財也道不名故名不立施者不德受者不讓施者不以為恩德振不足而已受者不讓之則受之不飾辭讓也德交歸焉而莫之充忍也忍不忍也故德之所緫道弗能害也緫一也智之所不知辯弗能解也有智謀者尚不能知但口辯者何能解也不言之辯不道之道若或通焉謂之天府令有也有能通不言之群不道之道者入天之府藏取焉而不損損减也酌焉而不竭酌猶予竭盡也莫知其所由出是謂瑶光瑶光者資糧萬物者也瑶光謂北斗杓第七星七居中而運歴指十二辰擿起隂陽以殺生萬物也一說瑶光和氣之見者也振困窮補不足則名生名仁名也興利除害伐亂禁暴則功成功武功也丗無災害雖神无所施其徳上下和輯雖賢無所立其功昔容成氏之時道路鴈行列處容成黄帝時造歴術也鴈行長幼有差也託嬰兒於巢上置餘糧扵畮首虎豹可尾虺蛇可蹍而不知其所由然虎豹擾人无害人之心故可牵尾虺蛇不螫毒故可蹍履也時人謂自當然耳故曰不知其所由然逮至尭之時十日並出焦禾稼殺草木而民无所食猰貐鑿齒九嬰大風封豨修蛇皆爲民害猰讀車軋履人之乾㺄讀疾除瘉之瘉也堯乃使羿誅鑿齒扵疇華之野鑿齒獸名齒長三尺其狀如鑿下徹頷下而持戈盾羿善射尭展羿射殺之疇華南方澤名也殺九嬰於凶水之上九嬰水火之怪為人害北狄之地有凶水繳大風扵靑丘之澤大風風伯也能壞人屋含羿扵青丘之澤樂遮使不為害也一曰以繳繫矢射殺之靑丘東方之澤名也上射十日而下殺猰貐十日並出羿射去九猤貐黙名也状若龍首或曰似貍善走而食人在西方也斷脩蛇於洞庭禽封狶扵桑林脩蛇大蛇也吞象三年而出其骨之類洞庭南方澤名封豨大豕也楚人頭豕爲豨也桑林湯所儔旱桑山之林萬民皆喜置堯以為天子於是天下廣陜險易逺近始有道里舜之時共工振滔洪水以薄空桑共工水官名也栢有之後振動也滔蕩也欲壅防百川滔高煙以害天下者薄迫也空桑地名在魯也龍門未開吕梁未發江淮通流四海溟涬民皆上丘陵赴木龍門河之隘也在左馮翊貢王北禹所鑿也吕梁在彭城吕縣石生水中禹決而通之民所由得度也故曰吕梁也未發之時水道不通江淮合流四海溟涬无岸畔也舜乃使禹䟽三江五湖闢伊闕導澗伊闕山名也禹所開以通伊水故曰闢伊闕在雒陽西南九十里涧雨水名也讀裏之也平通溝陸流注東海鴻水漏九州乾萬民皆寧其性是以稱堯舜以為聖晚丗之時帝有桀紂為琁室瑶臺象廊玉琁瑶石之似玉以飾室臺也用象牙飾廊殿以玉爲牀言淫伇也琁或作旋瑶或作揺口室施機關可轉琁也臺可摇動極士木之巧也紂爲肉圃酒池紂積肉以為圜圃積酒以為淵池今河内朝歌紂所都也城西有糟丘酒池處是也燎焚天下之財罷苦萬民之力刳諫者剔孕婦王子比干纣之諸父也数諌紂之无道紂剖其心而觀之故曰刳諫者孕婦姙身將就草之婦也紂解剔觀其胞裏故曰剔孕婦也攘天下虐百姓於是湯乃以革車三百乗伐桀于南巢放之夏臺革車兵車也南巢今廬江巢縣是也夏臺大臺故作宫也武王甲卒三千破紂牧野殺之于宣室武王周文王之子發也在車曰士歩日卒牧野南郊地名在朝歌城外宜室殷宫名一日宣室獄也天下寧定百姓和集是以稱湯武之賢由此觀之有賢聖之名者必遭亂世之患也今至人生亂丗之中含德懷道拘无窮之智鉗口寢遂不言而死者衆矣至人至德之人然天下莫知貴其不言也無有貴維口不言而死也故道可道非常道至道无名不可道故曰可道者非常道也名可名非常名眞人之名不可得名也著於竹帛鏤於金石可傳於人者其粗也五帝三王殊事而同指異路而同歸五帝黄帝顓頊帝嚳帝堯帝舜三王夏禹殷湯周文王同歸同歸修仁義也晚丗學者不知道之所一體德之所緫要緫凡也要約也取成之迹相與危坐而說之鼔歌而舞之故博學多聞而不免於惑詩云不敢暴虎不敢馮河人知其一莫知其他此之謂也无兵博虎曰虎无舟揖而渡曰馮河言小人而為政不可不敬則危猶暴虎馮河之必死人皆暴虎馮河立至害也故曰知其一而不知當畏愼小人危亡也故曰莫知其他北不免扵或此之謂也帝者體太一體法也大一天之刑神也王者法隂陽霸者則四時君者用六律秉太一者牢籠天地彈山川平讀屋楚人渭牢為彈山川令岀雲雨復能止之含吐隂陽伸曳四時伸曳猶狎引和調之紀綱八極經緯六合覆露照導普汜無私普大也氾泉也無私愛憎言皆公也蠉飛蠕動莫不仰德而生隂陽者承天地之和形萬殊之體含氣化物以成埒埒形也嬴縮卷舒淪於不測嬴長也縮短也卷屈也舒散也淪入也測深也入於不可測盡之深終始虚满轉於無原轉化歸扵无窮之原本也四時者春生夏長秋收冬藏取予有節出入有時開闔張歙不失其敘歙讀曰䝱敘次也喜怒剛柔不離其理理道也六律者生之與殺也實之與罰也予之與奪也子布施也奪取也非此無道也則日時用六律之君非用此上事其餘无他道也故謹扵權衡凖繩審乎輕重足以治其境内矣淮衡平也準法也䋲直也是故體太一者明於天地之情通扵道德之倫聦明燿於日月精神通於萬物動静調扵隂陽喜怒和于四時徳澤施于方外施延延於遠方之外名聲傳于後丗後丗傳闻之也法隂陽者德與天地參參明明與日月並並併也精與神緫緫合也戴貟履方抱表懷繩貟天也方地也表正也繩直也内能治身外能得人能得人之心發號施令天下莫不從風風化也則四時者柔而不脆剛而不鞼鞼折也寛而不肆肆緩雖寛不緩過齊非也肅而不悖肅急也雖急不促悖優柔委從以養羣物也其徳舍愚而容不肖無所私受私邪也用六律者伐亂禁暴進賢而廢不肖扶撥以爲正撥任也扶治也壞險以爲平矯枉以為直矯正也枉曲也明於禁舍開閉之道乗時因勢以服伇人心也伇使也帝者體隂陽則侵爲諸夏所侵陵王者法四時則削為渚夏所侵削傳日渚侯侵犯王略也霸者節六律則辱為鄰國所侮辱君者失準繩則廢爲臣所廢絀更立賢故小而行大則滔窕而不親滔窕不滿密也不爲臣下所親附也大而行小則陿隘而不容行小則正陿隘而不容包臣下貴賤不失其體而天下治矣不失其體大行大小行小也天愛其精墬愛其平精光明也平正也人愛其情情性也天之精日月星辰雷電風雨也地之平水火金木土也人之情思慮聦明喜怒也故閉四止五遁則與道淪四關耳目心口遁也淪入也是故神明藏於無形精神反於至真眞身也則目明而不以視耳聦而不以聽心條逹而不以思慮委而弗爲和而弗矜矜自大也眞性命之情而智故不得雜焉雜糅也精泄於目則其視明泄猶通也在於耳則其聽聦留於口則其言當當合也集於心則其慮通集止也故閉四則身無患百節莫苑苑病也苑讀南陽之宛也莫死莫生莫虚莫盈是謂眞人言守其常凡亂之所由生者皆在流遁流遁之所生者五流放也遁逸也大構駕興宮室構連也駕材木相乗駕也延樓棧道雞棲井榦延樓髙樓也棧道飛閣道相通雞棲井屋熒井也刻花置其中也檦抹欂攎以相支持木巧之飾飾巧盤紆刻儼盤盤龍也紆曲屈刻儼浮首虎頭之屬皆屋飾也儼讀儼然之儼也嬴鏤雕琢詭文回波嬴鏤文章鏤雕畫也王曰皆飾巧也詭文竒異之文也回波若水波也淌游瀷淢菱杼紾抱淌湘瀷淢皆文盡擬像水勢之貌也菱芰杼采實紾戾也抱轉也皆壯采相銜持貌也淌讀平敞之敞瀷蒸人強春言敕之欶淢讀郁乎文哉之郁菱讀楚言杼紾讀紾結之給抱讀歧嶷之嶷芒繁亂澤巧僞紛挐以相摧錯此遁於木也皆采色形像文章貌挐讀人性紛挐不解之挐鑿汙池之深肆畛崖之逺肆極也崖垠也來谿谷之流飾曲岸之際積牒旋石以純脩碕飾治也牃累純緣也以玉石致之水邉爲脩碕或作旋石旋石切以牒累流水邊爲脩碕脩碕曲中水所棠處也抑淢怒瀬以揚激波抑止也淢怒水也瀬急流也而抑止之故激揚之波起也曲拂邅迴以像湡浯拂戾也邅迴轉流也湡畨隅浯蒼梧之二囯多水江湖環之故多象渠也以自邅法而像之也湡讀愚戅之愚也益樹蓮菱以食鼈魚樹種也蓮藕實也菱芰也皆可以養魚鼈蓮讀蓮羊魚之蓮也鴻鵠鷫鷞稻梁饒餘鷫鷞鴈也一曰鳳之别也龍舟鷁首浮吹以娱此遁於水也龍舟大舟也刻爲龍文以爲飾也鷁大鳥也其象著舩頭故曰鷁首也於舟中吹與竽以爲楽故曰浮吹以娯高築城郭設樹險阻崇臺榭之隆設施也樹立也一種樹木以爲險阻令難攻易守也積土高丈曰臺加木曰榭也侈苑囿之大以窮要妙之望侈廣也有牆曰苑無牆曰囿所以畜禽獸也盡極要之望也魏闕之髙上際青雲大厦曾加擬於崑崙門闕髙崇巍巍然故曰魏闕也際接也上接青雲周礼所謂象魏也大厦大屋也曽重架材木相乗架也其髙與崑崙山相擬像也脩爲牆垣甬道相連甬道飛閣道也甬讀踊躍之踊道讀道布之道也殘髙増下積土爲山殘墮也増益也接徑歷逺直道夷險接疾也道行也道之阨者正直之夷平也終日馳鶩而無蹟蹈之患此遁於土也大鍾鼎美重器鍾音之君也重器大器蓋鍾鼎也華蟲疏鏤以相繆紾書曰山龍華蟲藻火粉米繆紾相纒結也寢兕伏虎蟠龍連組兕獸名寢伏各有形也蟠龍詰屈相連文錯如織組文也焜昱錯眩照耀煇煌錯襍也惑也照耀煇煌焜光澤色貌也偃蹇蓼紏曲成文章雕琢之飾鍛錫文鏡乍晦乍明雕畫也縁錯錫文如脂膩不可刷如連珠不可掇故曰乍晦乍明也抑微滅瑕霜文沈居若簞籧篨言劍理之美没滅其瑕文鏡如霜皆没身中故曰沈居簟竹席籧篨葦席取其邪文次序劍鐃若此也纒錦經穴似數而疏劍文相句連如綺經穴如錦似數如疏文鐃美眩人目此遁於金也煎熬焚炙調齊和之適以窮荆吴甘酸之變荆椘言二國善酸鹹之和而窮盡之焚林而獵燒燎大木鼔橐吹埵以銷銅鐡鼓擊也橐冶鑪排橐也埵銅橐鐵鐡筒埵入火中吹火也故曰吹埵銷鑠靡流堅鍛無厭足日山無峻幹水無柘梓峻幹長枝也柘桑梓滋生也燎木以爲炭燔草而爲灰野莽白素不得其時莽稿草白素也上掩天光下殄地財此遁於火也殄盡也殄讀曰典也此五者一足以亡天下矣五者之中有一則足以滅亡也是故古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲明堂王者布政之堂上圎下方四出各有左右房謂之个凡十二門王者月居其房告朔朝歴頒宣其令謂之明堂其中可以序昭穆謂之太廟其上可以望氛祥書雲物謂之靈臺其外圓似辟雍諸侯之制半天子謂之泮宮詩云矯矯虎臣在泮獻馘是也土事不文質也木工不斵樸而巳斵或作琢不雕畫也金器不鏤不錯鏤設文飾也鏤讀婁之婁衣無隅差之削隅角也差邪也古者質皆全幅為衣裳無有邪角邪角削殺也冠無觚嬴之理觚蠃之理謂若馬目籠相連干也言無者冠文取平直而己也嬴讀指端臝文之蠃也堂大足以周旋理文堂明堂所以升降揖讓脩禮容故曰周旋理文理政事文書也静潔足以饗上帝禮鬼神以示民知儉節孝經曰宗祀文王於明堂以配上帝也夫聲色五味遠國珍怪瓌異奇物足以變易心志揺蕩精神感動血氣者不可勝計也夫天地之生財也本不過五不過五行之數聖人節五行則治不荒五行金木水火土也水屬隂行火爲陽行木爲燠行金爲寒行土爲風行五氣常行故曰五行凡人之性心和欲得則樂心和不喜不怒欲得无違耳樂斯動動斯蹈蹈斯蕩蕩斯歌斯舞舞節則禽獸跳矣人之性心有憂喪則悲悲則哀有憂艱難也喪亡也亡失所離愛則悲悲則傷哀斯憤憤斯怒怒斯動動則手足不静静寧也辟踊哭泣哀以送之也人之性有浸犯則怒怒則血充人欲有侵犯則怒盛血氣充盈以成其勢血充則氣激氣激則發怒發怒則有所釋憾矣釋解也憾恨也故鐘鼓管簫干鏚羽旄所以飾喜也衰絰苴杖苴麻之有實者衰讀曰崔杼之崔也哭踊有節所以飾哀也爲哀所容故曰飾也兵革羽旄金鼔斧鉞所以飾怒也必有其質乃爲之文古者聖王在上政敎平仁爱治上下同心君臣輯睦衣食有餘家給人足父慈哀也子孝兄良弟順生者不怨死者不恨有道之世人得其志故生者不怨也皆终其天命故死者不恨天下和治人得其願夫人相樂無所發貺故聖人爲之作樂以和節之夫人衆人也相中心相樂所以發其恩賜也故聖人為之作楽以莭之猶逋制也未丗之政田漁重稅市急征澤梁畢禁網無所布耒耨無所設民力竭於徭役財殫於會賦會計計人口数責其稅斂也居者無食行者無糧老者不餋死者不葬贅妻鬻子以給上求猶弗能贍贅従嫁也或作賃妻愚夫惷婦皆有流連之心悽愴之志流連猶爛漫失其職業也悽愴傷悼之貌惷讀近貯益之胜戇籠口言之也乃使始爲之撞大鍾擊鳴鼔吹竽笙弹琴瑟失樂之本矣古者上求薄而民用給給足君施其德臣盡其忠父行其子竭其孝竭盡也善事父母曰孝也各致其愛而無憾恨其間无憾恨各得其願也夫三年之喪非強而致之非強行致孝子之情也情自發扵中聽樂不樂食旨不甘思慕之心未能絕也三年之思思慕之心未能自絶扵哀戚也晚丗風流俗敗嗜慾多禮義廢君臣相欺父子疑怨左充思心盡亡盡䘮其忠孝恩慕之心也衰戴絰戲其中雖致之三年失喪之本也本在哀戚古者天子一畿諸侯同方千里爲畿方百里爲同各守其分不得相侵分猶界也有不行王道者暴虐萬民爭地侵壤亂政犯禁召之不至今之不行言不行上令者行讀行馬之行禁之不止誨之不変誨教也変更也乃舉兵而伐之戮其君易其黨封其墓其社有賢者受惡君之誅則封殖其墓武王伐紂封比干之墓是也社曰以事之也詩云是是禡也卜其子孫以代之擇立其子孫之䝨也天子不滅囯諸侯不滅姓古之政也晚丗務廣地侵壤并兼無己舉不義之兵伐無罪之國殺不辜之民絶先聖之後罪也民皆帝王之後故曰絶先聖之後大國出攻小國城守驅人之牛馬傒人之子女傒繋囚之繋讀曰雞毁人之宗廟遷人之重宝血流千里暴骸滿野以贍貪主之欲非兵之所爲生也言兵爲禁整乱設不爲作乱生也故兵者所以討暴非所以爲暴也言兵討人之暴乱非所以自爲暴乱也樂者所以致和非所以爲淫也楽蕩人之邪志存人之正性致其中和而已非所爲自淫遇也䘮者所以盡哀非所以爲偽也䘮踊泣所以盡孝子之哀情也非所以為詐偽佯哀戚而已也故事親有道矣而愛爲務道孝道務在愛敬其親朝廷有容矣而敬為上朝廷之容濟濟也父子主愛君目主敬故以敬為上也處喪有禮矣而哀爲主処居也䘮礼三年之礼也論語曰䘮与其易也寧戚故曰以哀為主也用兵冇術矣而義為夲術数也隂陽天生虛實之数也傳曰天生五材民並用之廢一不可讒能去兵兵之所由來乆矣聖人以興乱人以亡廢與存亡昬明之術也故曰以義為本夲立而道行夲傷而道廢本立義六也本傷義䘮也故曰道廢淮南鴻烈解卷第八淮南鴻烈解卷第九太尉酒臣許愼記上
