body:
  text: 主術訓主君也術道也君之宰囯統御臣下五帝三王以來无不用道而㒷故曰主術也因以題篇人主之術処无爲之事而行不言之敎教令也渭不言而事辦也清静而不動一度而不揺因循而任下責成而不勞成辦而不自勞是故心知規而師傳諭導規謀也師者所從取法則也相也諭導以正道也口能言而行人稱辭足能行而相者先導規義耳能聽而執正進諌諌或作謀也其丗子時也是故慮无失䇿謀无過事過猶設也言爲文章行爲儀表於天下爲天下人所法則也進退時動静循理不爲醜美好憎不爲賞罰喜怒名各自名各自事猶自然莫出於己故古之王者冕而前旅所以蔽明也冕王者冠也前旒前後垂珠飾遂筵也下自目故曰蔽明也天子玉縣十二公侯桂珠九卿主珠六伯子各應隨其命数也黄續塞耳所以掩聦不欲其妄聞也黈讀而買黈益之黈也天子外屏所以自障屏樹恒也尔雅曰門内之垣謂之樹論語曰囯君樹塞門諸侯在内天子在外故曰所以自障也故所理者逺則所在者邇所治者大則所守者少夫目安視則滛耳安聽則惑口安言則亂夫三者不可不愼守也若欲規之乃是離之言嗜欲有所規合乃是離散也若欲飾之乃是賊之飾好也賊敗也天氣爲魂地氣爲魄反之房各処其宅守而勿失上通太一太一之精通於天道天道黙无容无則天不可極深不可測測尽尚與人化知不能得天道至大非人智慮所能得也昔者神農之治天下也神不馳於中言釋神安静不躁動也智不出於四域信身在中懐其仁成之心懐思甘雨時降五榖蕃植蕃茂植長春生夏長秋收冬藏月省時考茂成歳終獻功以時甞榖甞之新榖薦之明堂祀于明堂明堂之制有蓋而無四方風雨不能襲寒暑不能傷遷延而入之養民以公迁延猶倘佯也巳說在夲經也其民樸重端愨端直也愨誠也不忿爭而財足不勞形而功成因天地之資而与之和同是故威厲而不殺刑錯而不用法省而不煩省約也煩多也故其化如神其地南至交阯北至幽都幽冥之都東至湯谷日所出也西至三危三危西極之山莫不聽從當此之時法寛刑緩囹圄空虚而天下一俗一同其俗莫懐姦心末丗之政則不然上好取而无量下貪狼而无讓民貧苦而忿事事力勞而无功智詐萌興盗賊滋彰上下相怨號令不行執政有司不務反道矯拂其夲而事修其未事治削薄其徳曽累其刑而欲以爲治无以異於執彈而來鳥捭梲而狎大也乱乃逾甚逾益夫水濁則魚噞魚短氣出口扵水端息之渝也政苛則民乱言无聊也故夫養虎豹犀象者爲之圈檻供其嗜欲其飢飽違其怒恚然而不能終其天年者刑有所劫也是以上多故則下多詐故巧上多事則下多能上煩擾則下不定不定不知所從上多求則下交爭不直之於本而亊之於未譬猶捰而弭塵抱薪以救火也捰塵磨也楚人謂之堁堁動塵之皃弭止也故聖人事省而易治求寡而易贍贍紿不施而仁不言而信不求而得不爲而成塊然保眞抱德推誠誠實天下從之如響之聲景之像形其所修者本也詹何曰未聞身治而囯乱故曰其公修者夲也刑罰不足以移風殺戮不足以禁姦唯神化爲貴至精爲神夫疾呼不過聞百歩志之所在踰于千里踰猶通也冬日之陽夏日之隂万物帰之而莫使之然冬日仁物歸陽夏日猛物歸隂莫使之自然如是也故至精之像弗招而自來不麾而自往窈窈冥冥不知爲之者誰而功自成智者弗能誦辯者弗能形昔孫叔敖恬卧而郢人无所害其鋒郢楚國都也孫叔敖楚大夫也蓋乗馬三年不知其牝牡言其賢也但恬卧養德折衝千里之外敵囯不敢犯害故郢人不㪯兵出伐无所害其鋒於四方也市南冝遼弄丸而兩家之難無所其辝冝遼姓也名熊勇士居楚市南楚平王太子建爲費无極所逐奔鄭鄭人殺之其子勝在吴令尹子西召之以爲白公請伐鄭以報讎子西許之而未出師晉人伐鄭以報讎子西救之勝怒曰鄭人在此讎不遠矣欲殺子西其臣石乞曰市南熊宜遼得之可以當五百人乃生視之吿其故不从㪯之以劒不動而弄丸不輟心志不懼日不能从子爲乱亦不泄子之事曰公遂殺子西兩雖有難不怨冝遼故曰无所関其辝也鞅鞈鐵鎧瞋目扼掔其於以御兵刃縣矣縣遠也比於德不及之遠劵契束帛刑罰斧銊其於以解難薄矣薄於德也待目而照見待言而使令其於爲治難矣蘧伯玉爲相子貢往觀之曰何以治國曰以弗治治之蘧伯玉衛大夫蘧瑗也子貢衛人也姓端木名賜孔子弟子也簡子欲伐衛使是史黯往覿焉簡子晉卿趙鞅也史黯史墨也覿之也還反報曰蘧伯玊爲相未可以加兵以其賢也固塞險阻何足以致之致猶勝也故臯陶瘖而爲大理天下無虐刑有貴于言者也雖瘖平獄理訟能得人之情故貴於多言者也師曠瞽而爲大宰晉无乱政有貴于見者也雖盲而大治晉囯使无有乱政故貴於有所見故不言之令不視之見不言之令臯陶瘖也不視之見師曠瞽也此伏犠神農之所以爲師也以用師法故民之化也不從其所言而從其所行从其志意之所行故齊荘公好勇不使爭而國家多難其漸至于崔杼之亂莊公斉靈公之子光崔杼斉大夫也乱殺荘公也傾襄好色不使風議而民多昬亂其積至昭奇之難楚傾襄王昭奇楚大夫也故至精之所動若春氣之生秋氣之殺也雖駞騖置不若此其亟亟疾故君人者其猶射者乎於此豪末於彼尋常矣故愼所以感之也夫榮啓期一彈而孔子三日樂感于和邹忌一徽而威王終夕悲感于憂徽鶩彈也威王齊宣王之父也在春秋後徽讀紛麻縗車之緯也動諸琴瑟形諸音聲而能使人爲之哀樂哀威王也樂孔子也縣法設賞而不能移風易俗者其誠心弗施也戚商歌車下植公喟然而窹矣至精入人深矣故曰樂聽其音則知其俗見其俗則知其化孔子學鼔琴於師襄師襄魯樂太師而諭文王之志見微以知明矣諭教教之鼓文正操也延陵季子聽魯樂而知殷夏之風論近以識遠也作之上古施及千歳而文不滅況於並丗化民乎湯之時七年旱以身禱於桑林之際而四海之雲湊湊會也或作蒸蒸升也千里之雨至抱質放誠感動天地神諭方外令行禁止豈足爲哉古聖王至精形於内而好憎忘於外形見好憎情欲已充出言以嗣情發號以明旨陳之以禮樂風之以歌謡業貫萬丗而不壅貫通壅塞橫局四方而不窮禽獸昆蟲與之陶化化從昆虫或作鬼神又況於執法施令乎故太上神化其次使不得爲非其次賞賢而罰暴暴虐乱也衡之於左右無私輕重故可以爲平衡銓衡也繩之於内外無私曲直故可以爲正人主之於用法無私好憎故可以爲命夫權輕重不差蟁首蟁首猶微細也扶撥抂橈不失箴鋒直施矯邪不私辟險姦不能枉讒不能亂德無所立立見怨無所藏是任術而釋人心者也故爲治者不與焉治在道不在智故曰不与焉夫舟浮於水車轉於陸此勢之自然也木擊折轊水戾破舟不怨木石而罪巧拙者罪御者刺舟者之巧拙也知故不載焉言木石无巧詐故不怨也是故道有智則惑言道智則惑也徳有心則險心有目則於物也兵莫憯於志而莫邪爲下宼莫大於隂陽而抱鼔爲小小細憯猶刹也以志意精誠伐人爲利老子曰重積徳則无不剋故以莫邪爲下也宼亦兵也推隂陽虚實之道爲大故以枹鼓爲小也今夫權衡規矩一定而不易不爲秦楚變節不爲胡越改容常一而不邪方行而不流一日刑之萬丗傳之而以無爲爲之言无所爲爲之爲自爲之故國有亡主而丗無廢道亡主桀紂是也湯武以其民主故曰无廢道也人有困窮而理無不通理道由此之無爲者道之宗宗本故得道之宗應物無窮任人之才難以至治才智湯武聖主也而不能與越人乗幹舟而浮於江湖幹舟小船也危險越人習水自能乗之故湯武不能也一曰大舟也伊尹賢相也而不能與胡人騎騵而服騊駼黄馬白腹曰騵詩曰四騵彭彭騊駼野馬也胡人所習伊尹錐䝨不能与服也孔墨博通而不能與山居者入榛薄險阻也孔孔子也墨墨翟也聚木為榛深草爲薄山居者所習故孔墨不能也阻或作塗也由此之則人知之於物也淺矣而欲以偏照海内存萬方不因道之数而專己之能則其窮不逹矣故智不足以治天下也桀之力别觡仲鈎索鐡歙金椎移大犠水殺黿鼍陸捕熊羆觡角也索鈎也歙讀掠也然湯革車三百乗因之鳴條擒之焦門焦或作巢由此之勇力不足以持天下矣智不足以爲治勇不足以爲強則人材不足任明也而君人者不下廟堂之上而知四海之外者因物以識物因人以知人也故積力之所舉則無不勝也衆智之所爲則無不成也塪井之無黿鼉隘也園中之無脩木小也夫舉重鼎者少力而不能勝也及至其移徙之不待其多力者故千人之群無絶梁萬人之聚無廢功夫華騮緑耳一日而至千里然其使之搏免不如豺狼能殊也殊異鴟夜撮蚊察分秋豪晝日顛越不能見丘山形性詭也鴟鴟鵂也謂之老莬夜鳴人屋上也夜則目明合聚人爪以著易巢中故曰察分秋豪晝則无所見故曰形性詭也夫螣蛇游霧而動應龍乗雲而舉猨得木而捷魚得水而鶩騖疾故古之爲車也漆者不畫鑿者不斵工無二士不兼官各守其職不得相姦姦亂人得其冝物得其安是以器械不苦而職事不嫚苦讀嫚捕器嫚讀慢緩之慢夫責少者易償職寡者易守寡少任輕者易權權謀上操約省之分下效易爲之功是以君臣彌乆而不相猒猒欺君人之道其猶零星之尸也尸主也尸食飽以知神之食亦飽詩曰公尸宴飲在宗載考然黙而吉祥受福尸不言語故曰默是故得道者不爲醜飾不爲僞善不飾爲羙非不極爲善也一人之而不襃襃大萬人之而不褊冐也褊小也是故重爲惠若重爲暴則治道通矣通猶順也為惠者尚布施也無功而厚賞無勞而髙爵則守職者懈於官而游居者亟於進矣爲暴者妄誅也無罪者而死亡行直而被刑則修身者不善而為邪者輕犯上矣言不可不愼也故爲惠者生姦而為暴者生亂姦亂之俗亡囯之風風化是故明主之治囯有誅者而主無怒焉因法而行故不怒也朝有賞者而君無與焉因功而行故不与也誅者不怨君罪之所當也賞者不德上功之所致也民知誅賞之来皆在於身也故務功修業不受贛於君贛物是故朝延無而無迹田野辟而無草故太上下知有之言太上之世下知之人皆能有此制今夫橋直植立而不動俛仰取制焉橋桔臯上衡也植桂權衡者行之俛仰取制於往也以諭君人主靜漠而不躁躁動百官得修焉譬而軍之持麾者妄指則亂矣慧不足以大寕智不足以安危與其譽堯而毁桀也不如掩聦明而反修其道也不足以大寕者小惠也不足以安危者小智也如此人者欲譽堯而毁桀以成善惡善惡之名人猶有強知之之耳不如掩聦明而夲修大道成名之遠也人君之道亦如此也清静無爲則天與之時廉儉守節則地生之財人君德行如此故天与之時即生之財天子之時湯武是也地生之財神農后稷也處愚稱德則聖人之爲謀若伊戸爲湯謀傳涗說爲高宗謀是孟子曰伊尹之任囯語曰武丁以像像旁求聖人得傳說於僡巖也是故下者萬物歸之虚者天下遺之遺與夫人主之聽治也淸明而不闇虚心而弱志是故群臣輻湊並進無愚智賢不肖莫不盡其能於是乃始陳其禮建以爲基建立也基業也是乗衆勢以爲車御衆智以爲馬雖幽野險塗則无由惑矣幽深也險猶遠也人主深居隱処以避燥濕閏門重襲以避姦賊内不知閭里之情外不知山澤之形惟幕之外目不能見十里之前耳不能聞百歩之外天下之物无不通者通知其灌輸之者大而斟酌之者衆也是故不出户而知天下不窺牖而知天道乗衆人之智則天下之不足有也專用其心則獨身不能保也保猶守也是故人主覆之以德不行其智而因萬人之所利夫舉踵天下而得所利故百姓之上弗重也錯之前而弗害也舉之而弗髙也推之而弗猒尊重㪯之不自斍高也推求也奉也主道貟者運轉而无端端涯化育如神虚无因循常後而不先也臣道貟者運轉而无方者論是而処當爲事先倡守職分明以立成功也是故君臣異道則治不易奪言相和同道則亂君所謂可臣亦曰可君所謂否臣亦曰否是同也莫相臣異故曰乱也各得其冝処其當則上下有以相使也君得君道臣得臣道故曰得其冝也夫人主之聽治也虛心而弱意清明而不闇是故群臣輻湊並進无愚智賢不肖莫不盡其能者則君得所以制臣臣得所以事君治囯之道明矣文王智而好問故聖好問欲与人同其功武王勇而好問故勝勝殷夫乗衆人之智則无不仕也用衆人之力則无不勝也千鈞之重烏獲不能㪯也千鈞三万斤也烏獲秦武王之力土也武王試其力使斈大鼎服脫而不任故曰不能㪯也衆人相一則百人有餘力矣是故任一人之力者則烏獲不足恃不能勝故不恃也乗衆人之制者則天下不足有也人衆力強以天下爲小故曰不足有也禹決江䟽河以爲天下興利而不能使水西流稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也夫推而不可爲之而不修道理之數推行雖神聖人不能以成其功而況當丗之主乎夫載重而馬嬴雖造父不能以致遠造父周穆王之善御臣也車輕馬良雖中工可使追速是故聖人㪯亊也豈能拂道理之數詭自然之性拂戻也詭違也以曲爲直以屈爲伸哉未甞不因其資而用之也資才是以積力之所舉无不勝也而衆智之所爲无不成也聾者可令嗺筋而不可使有聞也瘖者可使守圉而不可使言也形有所不周而能有所不容也是故有一形者処一位有一能者服一事力勝其任則舉之者不重也能稱其事則爲之者不難也毋小大脩短各得其冝則天下一齊无以相過也聖人兼而用之故无棄才人主貴正而尚忠忠正在上位執正營事營典則讒佞姦邪无由進矣譬猶方貟之不相蓋而曲直之不相入入中夫鳥獸之不可同詳者其異也虎鹿之不同游者力不敵也是故聖人得志而在上位䜛佞姦邪而欲犯主者譬猶雀之見鸇而䑕之遇狸也亦必无餘命矣是故人主之一舉也不可不愼也所任者得其人則囯家治上下和群臣親百姓附附從所任非其人則國家危上下乖群臣怨百姓亂故一舉而不當終身傷傷病也亦敗也得失之道權要在主是故繩正於上木直於下非有事焉爭治也非治之使冝所縁以修者然也故人主誠正則直士任事而姦人伏匿矣人主不正則邪人得志忠者隱蔽矣夫人之所以莫玉石而抓瓠者何也玉石坚不能入故不㧓无得於玉石弗犯也使人主執正持平如從繩凖髙下則群臣以邪來者猶以夘投石以火投水也故靈王好細而民有殺食自飢也靈王蓋楚靈王殺食省食越王好勇而民皆処危爭死越王勾踐由此觀之權之柄其以移風易俗矣堯爲匹夫不能仁化一里桀在上位令行禁止由此觀之賢不足以爲治而勢可以易俗明矣書曰一人有慶万民頼之此之謂也天下多於名聲而寡察其實寡少也察明也實眞偽之實是故處人以譽尊処人隱居也以名譽見尊也而游者以辯顯游行之人以辯辭自顯逹察其所尊顯無他故焉人主不明分數利害之地而賢衆口之辯也治囯則不然然如是也言事者必究於法而為行者必治於官上操其名以責其實臣守其業業事以效其功效致言不得過其實行不得踰其法群臣輻湊莫敢專君專制事不在法律中而可以便囯佐治必參五行之隂考以觀其歸並用周聽以察其化不偏一曲不黨一事是以中立而偏運照海内中正群臣公正莫敢爲邪公方正直百官述職務致其公迹也主精明於上官勸力於下姦邪滅迹庶功日進庶衆是以勇者盡於軍尽力於軍功也乱囯則不然有衆咸譽者無功而賞守職者無罪而誅主上闇而不明群臣黨而不忠談者游於辯脩行者競於往往自益也主上出令則非之以與法令所禁則犯之邪以黨与非謗上令也邪姦也爲智者務爲巧詐爲勇者務於爭大臣專權下吏持勢朋黨周比以弄其上囯雖存古人之日亡矣且夫不治官職而被甲兵不隨南而有䝨聖之聲者非所以都於囯也騏騄駬天下之疾馬也驅之不前引之不止雖愚者不加體焉加猶止也今治乱之機轍迹可見也而丗主莫之能察此治道之所以塞塞猶閉也權者人主之車輿爵禄者人臣之轡衘也是故人主処權勢之要而持爵禄之柄審緩急之度而適取予之節是以天下盡力而不倦夫臣主之相與也非有父子之厚骨之親也而竭力殊死不辭其軀者何也勢有使之然也昔者豫讓中行文子之臣文子晉大夫中行穆子之子荀寅也智伯伐中行氏并吞其地豫讓背其主而臣智伯智伯与趙襄子戰於晉陽之下身死爲戮囯分爲三韓魏趙三分有之此之謂也豫讓欲報趙襄子欲為智伯報辯殺趙襄子漆身爲厲吞炭變音擿齒易貌夫以一人之心而事兩主或背而去或欲身徇之豈其趨捨厚薄之異哉人之恩澤使之然也紂兼天下朝諸侯人迹所及舟檝所通莫不賔服然而武王甲卒三千人擒之於牧野豈周氏死節而殷民背叛哉其主之徳義厚而號令行也夫疾風而波興木而鳥集相生之氣也是故臣不得其所欲於君者君亦不能得其所求於臣也君臣之施者相報之勢也是故臣盡力死節以與君計君垂爵以與臣市故君不能賞無功之臣臣亦不能死無德之君君德不下流於民而欲用之如鞭馬矣是猶不待雨而求熟稼必不可之數也数術君人之道処静
