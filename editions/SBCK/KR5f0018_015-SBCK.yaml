seq: 15
front:
  text: 以修身儉約以率下靜則下不擾矣儉則民不怨矣下擾則政亂民怨則德薄政亂則䝨者不為謀德薄則勇者不爲死是故人主好騺鳥猛獸珍怪竒物全玉為珍詭異為怪非常為竒狡躁康荒康安荒乱不愛民力馳騁田獵岀入不時如此則百官務亂事勤財匱勤勞匱乏万民愁苦生業不修矣人主好髙臺深池雕刻鏤黼黻文章絺綌綺繡寳玩珠玉白与黒為黼青与赤為黻絺綌也精曰絺麁曰綌五彩具曰繡也則賦歛無度而万民力竭矣堯之有天下也非貪万民之冨而安人主之位也以爲百姓力征強凌弱衆暴寡於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨不翦采不斵大路不畫大路上路四馬車也天子駕六馬不畫不文節也越席不縁越結蒲為席也大羮不和不致五味粢食不毇毇細廵狩行教勤勞天下周流五嶽豈其奉餋不足楽哉舉天下而以為社稷非有利焉年衰志憫衰者也悯憂也舉天下而傳之舜猶却行而脫蹤也言甚易也衰丗則不然一日而有天下之當処人主之則竭百姓之力以奉耳目之欲志專在于宫室臺榭陂池苑囿猛獸熊羆玩好珍恠是故貧民糟糠不接於口而虎狼熊羆猒芻豢百姓短褐不完而宮室衣錦繡人主急茲无用之功百姓黎民顦顇於天下黎斉是故使天下不安其性不雇安其正性為詐生也人主之居也如日月之明也天下之所同側目而視側耳而聽延頸舉踵而望也是故非澹漠無以明德非寕靜無以致逺非寛大無以兼覆非厚無以懷衆非平正無以制斷是故䝨主之用人也猶巧工之制木也制裁大者以為舟航柱梁舟航也方雨小船並与共済為航也小者以為揖楔脩者以為櫊榱櫊屋垂榬穩也短者以為朱儒枅櫨朱儒梁上戴蹲跪人也枅瀆如雞也无大小修短皆得其所冝規矩方貟各有所施天下之物莫凶於雞毒雞毒烏頭然而良醫橐而之有所用也是故林莽之材猶无可棄者而況人乎今夫朝延之所不舉鄉曲之所不譽非其人不肖也其所以官之者非其職也鹿之上山獐不能也及其下牧竪能追之才有所脩短也是故有大略者不可責以捷巧略行道也有小智者不可任以大功人有其才物有其形有任一而太重或任百而尚輕是故審毫釐之計者必遺天下之大數遺失不失小物之選者或於大事之舉譬猶狸之不可使搏牛虎之不可使搏䑕也今人之才或欲平九州并方外存危囯繼絶丗志在直道正邪決煩理挐而乃責之以閨閤之礼隩窔之閒或佞巧小具謟進愉隨郷曲之俗卑下衆人之耳目而乃任之以天下之權治乱之機機理是猶以斧毛以刀抵木也翦也讀驚攢之櫕也皆失其冝矣冝適人主者以天下之目視以天下之耳聽以天下之智慮以天下之力爭是故号令能下究而臣情得上聞聞猶達也百官修通群臣輻湊臣㱕君若輻之湊轂故曰輻湊喜不以賞賜怒不以罪誅懼失當也是故威立而不廢聦明先而不弊弊闇法令察而不苛察明也苛煩也耳目逹而不闇善否之情日陳於前而无所逆是故䝨者盡其智不肖者竭其力德澤兼覆而不偏羣臣勸務而不怠怠澥近者安其性逺者懷其德性生也懷㱕也所以然者何也得用人之道而不任己之才者也故假輿馬者足不勞而致千里假或作駕乗舟檝不能游而絶江海絶猶過也夫人主之情莫不欲緫海内之智尽衆人之力然而羣臣志逹效忠者希不困其身困猶危也使言之而是也雖在夫芻蕘猶不可棄也言雖賤當也故曰不可棄也使言之而非也雖在卿相人君榆䇿于廟堂之上未必可用人君謂囯君也擒出䇿謀也言之而非雖貴罰也是非之所在不可以貴賤尊卑論也是明主之聽於羣臣其計乃可用不羞其位不羞其位卑而不用其主言可行不責其辯不責其辯口美辭也闇主則不然所愛習親近者雖邪枉不正不能見也䟽逺則卑賤者竭力尽忠不能知也有言者窮之以辭有諌者誅之以罪如此而欲照海内存万方是猶塞耳而聽清濁商音清宫音濁掩目而視青黄也其離聦明則亦逺矣離去法者天下之度量而人主之準繩也縣法者法不法也設賞者賞當賞也法定之後中程者賞鈌繩者誅尊貴者不輕其罰而卑賤者不重其刑言平犯法者雖䝨必誅中度者雖不肖必無罪是故公道通而私道塞矣公正也私邪也塞閉也古之置有司也有司蓋有理宫土也所以禁民使不得自恣也恣放恣也其立君也所以剬有司使无專行專擅法籍礼義者所以禁君使無擅斷也人莫得自恣則道勝道勝而理逹矣故反於無為無為者非謂其凝滯而不動也以其言莫從己出也夫寸生於䅺䅺生於日日生於形形生於景此度之本也䅺禾穗孚榆頭芒也十䅺為一分十分為一寸十寸為一尺十尺為一丈政謂之本也樂生於音音生於律律内得於心中外合於馬志是故能進退履繩繩直正也而旋曲中規曲屈規貟取道致逺而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故輿馬不調土良不能以取道君臣不和唐虞不能以為治執術而缷之則管晏之智盡矣明分以示之則跖蕎之姦止矣盗跖孔子時人蕎蕎楚威王之將軍能大為盗也夫據榦而窺并底雖逹視猶不能見其睛睛目童子也借明於鑑以照之則寸之分可得而察也鑑鏡也分毛也一曰疵是故明主之耳目不勞精神不竭物至而觀其象事來而其化近者不乱逺者治也是故不用適然之數而行必然之道故万㪯而無遺䇿矣今夫御者馬體調于車御心和于馬則險致逺進退周游莫不如志雖有騏驥騄駬之良而臧獲御之則馬反自恣而人弗能制矣臧獲古之不能御者魯人也故治者不貴其自是而貴其不得為非也故曰勿使可欲母曰弗求勿使可奪母曰不爭如此則人材釋而公道行矣美者正於度而不足者逮於用故海内可一也夫釋職事而聽非譽棄公勞而用朋黨公正則竒材佻長而于次竒材非常之材能長卒非純賢也故曰于次也守官者雍遏而不進如此則民俗乱於囯而功臣爭於朝竒材佻長之人于超其次功勞之臣反不列故爭於朝也故法律度量者人主之所以執下執制釋之而不用不用法律度量也是猶無轡銜而馳也羣臣百姓反弄其上是故有術則制人無術則制於人為人所擒制也吞舟之魚蕩而失水則制於螻蟻離其居也魚能合舟言其大也其居水也猨貁失木而擒於狐貍非其處也其処茂木君人者釋所守而與臣下爭則有司以無為持位无所為以侍其位也守職者以從君取容隨君之欲以取容媚是以人臣藏智而弗用不用智謀賛佐其上也反以事轉任其上矣䝨臣見其不肯為謀故轉任其上令自制之詩云仲山甫旣明且哲以保其身夫貴冨者之於勞也逹事者之於察也驕恣者之於恭也勢不及君君人者不任能不任用臣智能也而好自爲之則智日困而自負其責也数窮於下則不能伸理行墮於囯則不能專制智不足以爲治威不足以行誅則無以与天下交也喜怒形於心者欲見於外則守職者離正而阿上阿曲從也有司枉法而從風風令賞不當功誅不應罪上下離心而君臣相怨也是以執政阿主而有過則無以貴之有罪而不誅則百官煩乱智弗能解也毀譽萌生而明不能照也不正夲而反自脩則人主逾勞人臣逾逸是猶代庖宰剥牲而爲大匠斵也與馬競走筋絶而弗能及上車執轡則馬死于衡下故伯樂相之王良御之明主乗之無御相之勞而致千里者乗於人資以爲羽翼也資才是故君人者無為而有守也有為而無好也无所私好有爲則䜛生有好則䛕起謟䛕之人乘志而起昔者齊桓公好味而易牙烹其首子而餌之桓公㐮公諸兒之子小白虞君好寳而晋獻以璧馬釣之釣取胡王好音而穆公以女樂誘之誘惠是皆以利見制於人也制猶擒也故善建者不拔言建之无形也夫火而水滅之金剛而火銷之木強而斧伐之水流而土遏之唯造化者物莫能勝也故中欲不出謂之扄外邪不入謂之塞中扄外閉何事之不節外閉中扄何事之不成弗用而後能用之弗爲而後能爲之精神勞則越越散耳目滛則竭竭滅故有道之主滅想去意清虚以待不伐之言不奪之事循名責實使自司任而弗詔責而弗敎以不知爲道道常未知以奈何為寳道貴无形无形不可奈何道之所以為貴也如此則百官之事各有所守矣有所守言不離扄也攝權勢之柄其於化民易矣衛君伇子路權重也衛君出公輕也景桓公臣管晏位尊也管仲輔相桓公晏髪相景公二君匹尊故也怯服勇而愚制智其所託勢者勝也故枝不得大於榦末不得強於本則輕重小大有以相制也若五指之屬於臂也搏援攫捷莫不如志言以小屬於大也是故得勢之利者所持甚小其存甚大所守甚約約要也少也所制甚廣是故十圍之木持千鈞之屋五寸之鍵制開闔豈其材之巨小足哉所居要也孔丘墨翟脩先聖之術通六藝之論口道其言身行其志慕義從風風化而為之服伇者不過数十人伇事使居天子之位則天下徧為儒墨矣徧猶尽也楚莊王傷文無畏之死於宋也奮袂而越衣冠相連於道遂成軍宋城之下權柄重也荘王楚穆王啇臣之子旅也使申舟問聘於斉不假道於宋无畏曰未必襲殺我王曰殺汝伐宋見犀而行不假道於宋華元曰過我而不假道鄙我也鄙我亡也以兵殺其使者亦亡也遂殺之莊王聞之怒故投袂而起成軍于宋域故曰柄重也楚文王好服解冠楚國效之文王楚武王熊逹之子熊疪解豸之冠如今御史冠趙成霊王貝帯鵕翿而朝趙國化之武靈王出春秋後以大貝飾帶故服鵕翿讀曰私鈚頭曰郭洛帶粒銚鏑也使在匹夫布衣雖冠解冠帶貝帯鵕翿而朝則不免為人也鵕翿讀曰私鈚頭二字三音也夫民之好善樂正不待禁誅而自中法度者萬無一也下必行之令從之者利逆之者凶日隂未移而海内莫不繩矣繩正故握劒鋒以離北宮子司馬蒯蕢不使敵北宫子斉人也孟子所謂北宮勇也司馬蒯蕢其先程伯休甫宣王命以為司馬因為司馬氏蒯蕢其後也周衰適他囯蒯蕢在趙以善擊劒闻猶擊也操其觚招其末則庸人能以制勝觚劒拊招㪯也今使烏獲藉蕃從後牽牛尾尾絶而不從者逆也烏獲藉蕃皆多力人若指之桑條以貫其則五尺童子牽而周四海者順也夫七尺之橈而制船之左右者以水爲資橈刺船橰也資用也橈讀煩橈之橈也天子發號令行禁止以衆爲勢也夫防民之所害開民之所利威行也若發堿決塘堿水堿也塘堤也皆所以畜水故循流而下易以至背風而馳易以逺因其勢也桓公立政去食之獸食粟之鳥係之罔三舉百姓桓齊桓公紂殺王子比干而骨怨斮朝涉者之脛而萬民叛再舉而天下失矣故義者非能徧利天下之民利一人而天下從風暴者非盡害海内之衆也害一人而天下離叛故桓公三舉而九合諸侯紂再舉而不得爲匹夫故舉錯不可不審三舉去食肉之獸食粟之鳥係之罔再舉殺比干斮朝渉之脛也人主租斂於民也必先計歳收量民積聚知饒饉有餘不足之數然後取車輿衣食供養其欲髙臺層榭接屋連閣非不麗也然民無掘穴狹廬所以託身者明主弗樂不樂其大麗也肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也不甘其肥醲也匡牀蒻席非不寧匡安也蒻細也然民有處邊城犯危難澤死暴骸者明主弗安也不安其匡牀蒻席也故古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不裘與同寒飢歲登民豐乃始縣鍾鼔陳干戚登成也年榖豐熟也君臣上下同心而樂之國無哀人言皆樂也故古之爲金石管者所以宣樂也金錘石磬管簫也琴瑟兵革斧鉞者所以飾怒也觴酌俎豆酬酢之禮所以效善也效致衰經管屨辟踊泣所以諭哀也諭明此皆有充於内而成像於外充實及至亂主取民則不裁其力裁度求於下則不量其積男女不得事耕織之業以供上之求事治業事力勤財匱君臣相疾也故民至於焦脣沸肝有今無儲有今日之食而無明日之儲也而乃始撞大鍾擊鳴鼓吹竽笙彈琴瑟是猶貫甲胃而入宗廟羅紈而從軍旅失樂之所由生矣夫民之爲生也一人跖耒而耕不過十畒跖蹈中田之獲卒歲之收不過四石妻子老弱仰而食之時有涔旱災害之患涔乆而水潦也有以給上之徴賦車馬兵革之費由此觀之則人之生閔矣閔憂無樂夫天地之大計三年耕而餘一年之食率九年而有三年之畜十八年而有六年之積積委也二十七年而有九年之儲雖涔旱災害之殃民莫困窮流亡也故國無九年之畜謂之不足無六年之積謂之閔急閔憂急病無三年之畜謂之窮乏故有仁君明主其取下有節自養有度則得承受於天地而不離寒之患矣若得貪主暴君橈於其下侵漁其民以適無窮之欲則百姓無以天和而履地德矣天和氣也地徳所生殖也食者民之本也民者國之本也國者君之夲也是故人君者上因天時下盡地財中用人力是以群生遂長五榖蕃植敎民養育六畜以時種樹務脩田疇滋植桑麻肥墝髙下各因其冝丘陵阪險不生五榖者以樹竹木春伐枯槁夏取果蓏有㧡曰果無核曰蓏秋畜䟽食菜食曰䟽榖食曰食冬伐薪蒸大者曰薪小者曰蒸以爲民資資用是故生無乏用死無轉尸轉棄故先王之法畋不掩群掩猶盡也不取麛夭鹿子曰麛麋子曰夭不涸澤而漁涸澤漉池不焚林而獵爲盡物也豺未祭獸罝罦不得布於野十月之時豺殺獸四面陳之丗謂之獸也未獸罦不得施也未祭魚罔不得入於水獱也明堂月令孟春之月魚取鯉四面陳之水邊世謂之魚未不得捕也鷹隼未摯羅網不得張於谿谷立秋鷹摯矣未立秋不得施下鷹或作隽草木未落斤斧不得入山林九月草木節解未解不得伐山林也昆蟲未蟄不得以火燒田十月蟄蟲備藏未蟄不得用燒田也孕育不得殺鷇不得探魚不長尺不得取不㫷年不得食皆爲盡物是故草木之發若烝氣生禽獸歸之若流原飛鳥歸之若煙雲有所以之也故先王之政四海之雲至而脩封立春之後四海出雲蝦蟇鳴燕降而達路除道三月之時隂降百泉則脩橋梁十月之時昬張中則務種榖三月昬張星中於南方張南方朱鳥之宿也大火中則種黍菽大火東方倉龍之宿四月建巳中在南方菽豆也虚中則種麥虚北方武之宿八月建酉中於南方也昴中則牧斂畜積伐薪木昴星西方白虎也季秋之月收歛畜積也上告于天下布之民先王之所以時脩備冨國利民實曠來逺者其道備矣實满也曠空也非能目見而足行之也欲利之也欲利之也不忘於心則官自備矣心之於九竅四肢也不能一事焉然而動静聽視皆以爲主者不忘于欲利之也故堯爲善而衆善至矣桀爲非而衆非來也善積即功成非積則禍極極至凡人之論心欲小而志欲大智欲貟而行欲方能欲多而事欲鮮所謂心欲小者慮患未生備禍未發戒過愼微不敢縱其欲也詩云惟此文王小心翼翼昭事上帝聿懐多福此之謂也志欲大者兼包萬國壹齊殊俗并覆百姓若合一族是非輻湊而爲之轂轂以諭王智欲貟者環復轉運終始無端順連環故曰無端旁流四逹淵泉而不竭萬物並㒷莫不嚮應也和行欲方者直立而不橈橈弱曲也素白而不汚窮不易操通不肆志肆放能欲多者文武備具動静中儀舉動廢置曲得其冝無所擊戾莫不畢宜也擊掌也戾破也事欲鮮者執柄持術得要以應衆執約以治廣處靜持中運於琁樞以一合萬若合符者也符約故心小者禁於微也志大者無不懷也多所容也知貟者無不知也行方者有不爲也非正道不爲也能多者無不治也治猶作也事鮮者約所持也約要古者天子聽朝公卿正諫博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以為未足也故尭置敢諌之鼔也欲諫者擊其鼓舜立誹謗之木書其善否於表木也湯有司直之人司直官名不曲也武王立戒愼之鞀欲戒君令愼疑者摇鞀鼓過若豪釐而旣巳備之也備具也夫聖人之於善也無小而不舉舉用其於過也無微而不改改更堯舜禹湯武王皆坦然天下而南面焉背屏而朝諸侯當此之時鼛鼓而食鼛鼓王者之食樂也詩云鼓鍾伐鼛奏雍而徹雍已食之樂也己飯而竈行不用巫祝言其率徳蹈正無求於神神弗敢崇山川弗敢禍可謂至貴矣至德之可貴也然而戰戰慄慄日愼一日由此觀之則聖人之心小矣詩云惟此文王小心翼翼昭事上帝聿懷多福其斯之謂歟武王伐紂發鉅橋之粟散鹿臺之錢鉅橋纣倉名也一說鉅鹿漕運之橋粟鹿臺紂錢藏府所積也武王發散以賑疲民封比干之墓比干紂諸父也諫紂之非紂殺之故武王封崇其墓以旌仁也表商容之閭商容殷之䝨人老子師故表顯其里穆稱篇又云老子業於商容見舌而知守柔矣是也朝成湯之廟成湯殷受命之王言聖人以相宗解箕子之囚箕子纣之庶兄論語云箕子爲之奴武王伐紂赦其囚執問以洪範封之於朝鮮也使各處其宅田其田無故無新唯賢是親用非其有使非其人晏然若故有之由此觀之則聖人之志大也文王周觀得夫徧覽是非堯舜所以昌桀紂所以亡者皆著於明堂著猶圖也於是略智博聞以應無方由此觀之則聖人之智貟矣成康繼文武之業守明堂之制觀存亡之迹見成敗之變非道不言非聖人之意不敢言非義不行非仁義不敢履行也言不苟出行不苟爲擇善而後從事焉由此觀之則聖人之行方矣孔子之通智過於萇弘勇服於孟賁足躡郊莬力招城能亦多矣萇弘周大夫敬王臣也號知天道孟賁勇士也孔子皆能招㪯也以一手招城門端能舉之故曰亦能多也然而勇力不聞人不聞其為勇力也巧不知人不知其有巧者專行孝道以成素王事亦鮮矣春秋二百四十二年亡國五十二弑君三十六采善鉏醜以成王道論亦博矣然而圍於匡顔色不變歌不輟匡宋邑也今陳襄邑西匡亭是也孔子曰天生德於予匡人其如予何故顔色不變絃歌不止也臨死亡之地犯患難之危據義行理而志不懾分亦明矣犯猶遭懾猶懼然爲魯司㓂聽獄必爲斷爲魯定公司冦作爲春秋不道神不敢專己夫聖人之智固己多矣其所守者有約故舉而必榮愚人之智固巳少矣其所事者多故動而必窮矣吴起張儀智不若孔墨而爭萬乗之君此其所以車裂支解也夫以正敎化者易而必成以邪巧丗者難而必敗凡將設行立趣於天下捨其易成者而從亊難而必敗者愚惑之所致也凡此六反者不可不察也六反謂孔墨萇弘孟賁吴起張儀也其行相反故曰六反也偏知萬物而不知人道不可謂智偏愛群生而不愛人不可謂仁仁者愛其也智者不可或也仁者雖在斷割之中其所不忍之色可見也不忍智斷割之色見於顔色也智者雖煩難之事其不闇之效可見也内恕反情心之所欲其不加諸人由近知逺由巳知人此人智之所合而行也小有敎而大有存也小有誅而大有寧也小教之以正故大有存也少責之以義故大有寧也非正則不存非義則不寧也唯惻隱推而行之此智者之所獨斷也故仁智錯有時合合者爲正錯者為權其義一也府吏守法君子制義法而無義亦府吏也不足以爲政耕之為亊也勞織之為亊也擾擾勞之事而民不舍者知其可以衣食也人之情不能無衣食衣食之道必始於耕織萬民之所容見也物之若耕織者始甚勞終必利也衆愚人之所見者寡亊可權者多愚之所權者少此愚者之所多患也物之可備者智者盡備之可權者盡權之此智者所以寡患也故智者先忤而後合忤逆愚者始於樂而終於哀今日何為而榮乎且日何爲而義乎此易言也今日何爲而義且日何爲而榮此知難也問瞽師曰白素何如曰縞然曰黒何曰黮然援白黒而示之則不処焉人之視白黒以目言白黒以口瞽師有以言白黒無以知白黒故言白黒與人同其别白黒與人異入孝於親出忠於君無愚智賢不肖皆知其為義也使陳忠孝行而知所出者鮮矣凡人思慮莫不先以爲可而後行之其是或非此愚知之所以異凡人之性莫貴於仁莫急於智仁以為質知以行之兩者爲夲而加之以勇力辯慧捷疾劬録巧敏遟利聦明審察盡衆益也身材未脩藝曲備而無仁智以爲表而加之以衆美則益其損故不仁而有勇力果敢則狂而操利剱狂猶亂也不智而辯慧懷給則棄而不式不知之人辯慧懷給不知所裁之猶棄而或不知所詣也懷佞也雖有材能其施之不當其處之不宜適足以輔僞飾非藝之衆不如其寡也故有野心者不可借便勢野外有愚質者不可與利器老子曰國之利器不可以假人也魚得水而游焉則樂塘決水涸則爲螻蟻所食有掌脩其隄防補其缺漏則魚得而利之掌主國有以存人有以生囯有以存魚得水也國存故人遂生也國之所以存者仁義是也人之所以生者行善是也國無義雖大必亡桀紂是也人無善志雖勇必傷論語曰勇而無礼則亂亂則傷也治國上使不得與焉使不得與亡傷之危是上術也孝於父母弟於兄㛮信於朋友不得上令而可得為也釋己之所得爲而責于其所不得制悖矣士處卑隱欲上達必先反諸己上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽於友有道亊親不不信於友不能說親咀友不信之也說親有道脩身不誠不能亊親矣誠身有道心不專一不能專誠道在易而求之難易謂反已先修其本也不修其本而欲得說親誠身之名皆難也故曰道在易而求之難也驗在近而求之逺故弗得也驗効包近謂夲逺謂末也故不能得之也淮南鴻烈解卷第九淮南鴻烈閒話第十
