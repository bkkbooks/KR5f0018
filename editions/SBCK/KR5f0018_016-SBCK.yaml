seq: 16
front:
  text: 繆稱訓繆異之論稱物假同之神明以知所貴道至高無上至深無下平乎凖直乎䋲貟乎規方乎矩句裹宇宙而無表裏洞同覆載而無所礙礙挂是故體道者不哀不楽不怒不喜其坐無慮其寢無㝱物來而名亊來而主者國之心心治則百節皆安心擾則百節皆亂故其心治者攴體相遺也其國治者君臣相忘也黄帝曰芒芒昧昧從天之道與元同氣故至徳者言同略事同指上下壹心無歧道旁見者遏障之於邪道之於善而民郷方矣故易曰同人于野利涉大川言能同人道至于野則可以濟大川大川大難也道者物之所導也徳者性之所扶也仁者積恩之見證也義者比於人心而含於衆適者也故道滅而德用徳衰而仁義生故尚丗體道而不德中丗守德而弗壞也未丗繩繩乎准恐失仁義君子非仁義無以生失仁義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失義小人懼失利其所懼知各殊矣易曰即鹿無虞惟入于林中君子幾不如舍往吝即入也鹿以諭民虞斯也幾終也就民欺之即入林中幾終不如舍之使之不終如其吝也其施厚者其報美其怨大者其禍深薄施而厚望畜怨而無患者古今未之有也是故聖人察其所以往則知其所以來者聖人之道猶中衢而致尊邪道六通謂之衢尊酒器也過者斟酌多少不同各得其所冝是故得一人所以得百人也一人來得其心百人來亦得其心人以其所願於上以與其下交誰弗載以其所欲於下以事其上誰弗喜詩云媚兹一人侯愼德愼德太矣一人小矣能善小斯能善大矣君子見過忘罰故能諌見賢忘賤故能讓見不足忘貧故能施情繋於中行形於外凡行戴情雖過無怨不戴其情雖忠來惡戴心所感也情誠也后稷廣利天下猶不自矜禹無廢功無蔽財自視猶觖如也觖不满也滿如䧟䧟少實如虚尽之者也凡人各賢其所而其所快丗莫不㪯賢或以治或以乱非自遁遁欺求同乎巳者也己未必得賢而求与己同者而欲得賢亦不幾矣使尭度舜則可使桀度尭是猶以升量石也今謂狐貍則必不知狐又不知貍俱不知此二獸非木甞見狐者必未甞見貍也狐貍非異同也而謂狐貍則不知狐貍是故謂不肖者賢則必不知賢謂賢者不肖則必不知不肖者矣聖人在上則民樂其治在下則民慕其意小人在上位如寢閞曝纊寢謂卧閞上之不安纊繭也曝繭踴動摇不休死乃止也不得須寕故易曰乗馬班如泣血連如論乗馬班如難也故有泣血之憂言小人處非其位不可長也物莫無所不用天雄烏啄藥之凶毒也良醫以活人侏儒瞽師人之困慰者也慰可蹶也一日慰拯人主以備樂是故聖人制其剟材无所不用矣剟䟽殺也勇士一呼三軍皆辟其出之也誠故倡而不和意而不戴意恚声也戴嗟中心必有不合者也故舜不降席而王天下者求諸己也故上多故則民多詐矣身曲而景直者未之聞也之所不至者容貌至焉說之粗不如容貌精微入人深也容貌之所不至者感忽至焉感乎心明乎智發而成形精之至者可以形勢接而不可以照誌戎翟之馬皆可以馳驅或近或逺唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美必有不傳者心教之微眇不可傳中行繆伯手搏虎中行繆伯晋臣也力能搏生虎也而不能生也力能殺虎而德不能服之蓋力優而克不能及也克猶能也用百人之所能則得百人之力舉千人之所愛則得千人之心辟若伐樹而引其夲千枝萬葉則莫得弗從也慈父之愛子非為報也不可内解於心聖王之養民非求用也性不能己火之自熱冰之自寒夫有何脩焉及恃其力賴其功者失火舟中言舟中之人同心救火不相為賜故君子見始斯知終矣媒妁譽人而莫之徳也取庸而強飯之莫之愛也雖親父母不加於此有以爲則恩不接矣故送往者非所以迎來也施死者非專為生也誠出於已則所動者遠矣錦繡登庿貴文也登猶入也圭璋在前尚質也以玉之者質也文不勝質之謂君子故終年為車無三寸之鎋不可以驅馳匠人斵戸無一尺之楗不可以閉藏故君子行斯乎其所結結要終也心之精者可以神化而不可以導人導教目之精者可以消澤而不可以昭誋照道誋誠也不可以教導戒人在混之中不可諭於人混人心中也故舜不降席而天下治桀不下陛而天下乱蓋情甚乎叫呼也言虽叫呼大語不如心行眞直也無諸己求諸人古今未之聞也同言而民信信在言前也同令而民化誠在令外也聖人在上民遷而化情以先之也動於上不於下者情與令殊也故易曰亢龍有悔仁君動極在上故有悔也三月嬰兒未知利害也而慈母之愛諭焉者情也故言之用者昭昭乎小哉不言之用者曠曠乎大哉身君子之言信也身君子之言體行君子之言也中君子之意忠也忠信形於内感動於外故禹執于戚舞於兩階之間而三苗服三苗畔禹禹風以禮楽而服之也鷹翔川魚鼈沈禹以德服三苗猶鷹翔川上魚鼈恐皆濳飛鳥揚鳥見鷹而揚去必逺害也鷹懐欲害之心故烏魚知其情實故遠之子之死父也臣之死君也丗有行之者矣非出死以要名也恩心之藏於中而不能違其難也故人之甘甘非正爲蹠也人之甘甘猶楽楽而為之臣之死君子之死乆非以求蹠蹠也而蹠焉往言蹠乃往至也君子之惨怛非正爲僞形也諭乎人心非從外入自中出者也義尊乎君仁親乎父故君之於臣也能死生之不能使爲苟簡易君不能使臣為苟舍易行之義父之於子也能發起之不能使無憂尋憂尋憂長也仁念也仁念父母不楽子之如此然不能止故義勝君仁勝父則君尊而臣忠父而子孝聖人在上化育如神太上曰我其性與太上皇德之君也我性自然也其次曰㣲彼其如此乎其次五帝時也其民如此故我治之如彼故詩曰執轡如組易曰含章可貞動於近成文於逺夫察所夜行周公慙乎景故君子愼其獨也釋近斯逺塞矣聞善易以正身難夫子見禾之三變也夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐郷丘而死我其首禾乎禾穗垂而向根君子不忘夲也故君子見善則痛其身焉痛己身善惡自在也身苟正懷逺易矣懷來故詩曰弗躬弗親庶民弗信小人之從事也曰苟得君子曰苟義所求者同所期者異乎擊舟水中魚沈而鳥揚同間而殊事其情一也僖負羈以壺飱表其閭釐負羈曹臣晋重耳出過曹負羈遺以壼飱重耳反晉伐曹令兵不入其閭趙宣孟以束脯免其軀趙宣孟晋卿以束脯活靈輙後免其難也禮不隆隆多也而德有餘仁心之感恩接而㦧怛生故其入人深俱之叫呼也在家老則爲恩厚其在債人則生爭故曰兵莫㦧於意志莫邪爲下㓂莫大於隂陽抱鼓爲小聖人爲善非以求名而名從之名不與利期而利歸之故人之憂喜非爲蹗蹗焉往生也言非為兾幸往生利意也故至至不容至道之人不飾容也故若眯而撫眯芥入目也撫捫之從中發非為容之也若跌而據跌仆聖人之爲治漠然不見賢焉終而後知其可大也若日之行日行人不見也騏不能與之爭逺今夫夜有求與瞽師併東方開斯照矣言人見照用瞽者猶闇而无為人而治治事用思也動而有益則損隨之益所以為損也故易曰剥之不可遂盡也故受之以復言物剥落而復生也積薄爲厚積卑爲髙故君子曰孳孳以成煇小人曰快快以至辱其消息也離珠弗能見也文王聞善如不及宿不善如不祥非為日不足也其憂尋推之也憂㝷憂深故詩曰周雖舊其命惟新新國者也懐情抱質天弗能殺地弗能薶也聲天地之閒配日月之光甘楽之者也苟郷善雖過無怨苟不郷善雖忠來患故怨人不如自怨求諸人不如求諸己得也聲自召也貌自示也名自命也文自官也無非己者操銳以刺操刃以擊自召也貌何自怨乎人故筦子文錦也雖醜登廟筦仲相齊明法度審國刑不能及聖猶文錦雖惡宜以升廟也子産練染也美而不尊子産相鄭先恩而後法猶練染爲衣温厚而非宗廟服也虚而能滿淡而有味被褐懐王者故兩心不可以得一人一心可以得百人男子樹蘭芙而不芳蘭芳草女之美芳也男子樹之蓋不芳継子得食而不澤継子有假母也情不相與往來也生所假也无所歸也故弘演直仁而立死弘演衛懿公臣狄人攻衛食懿公其肝在弘演剖腹以盛之也王子閭張掖而受刃楚白公欲立王子閭爲王不可一刺之以兵子閭不受不以所託害所歸也故丗治則以義衛身丗亂則以身衛義死之日行之終也故君子愼一用之無勇者非先懾也難至而失其守也貪婪者非先欲也見利而忘其害也虞公見垂之璧而不知禍之及已也故至至之人不可遏奪也言至道之人其心先定不可臨以利奪其志人之欲榮也以爲己也於彼何益聖人之行義也其憂尋出乎中也於已何以利故帝王者多矣而三王獨稱貧賤者多矣而伯夷獨舉以責爲聖乎則聖者衆矣以賤爲仁乎則賎者多矣何聖仁之寡也獨專之意楽哉忽乎曰滔滔以自新忘老之及巳也始乎叔李歸乎伯孟必此積也言自少而至長不身遁斯亦不遁人遁隱也己不自隱身之行亦不隱之於人故也故若行獨梁不爲無人不兢其容獨梁一木之水也行其上常兢兢恐陷也故使人信已者易而蒙衣自信者難及身不信故難情先動言人君以精動導民也動無不得動静得人心也无不得則無莙發無莙結發動也莙而後快雖莙結快民心故唐虞之舉錯也非以偕情也快已而天下治桀紂非正賦之也快巳而百事廢喜憎議而治亂分矣下有喜議而國治有憎議而國亂也聖人之行無所合無所離譬鼓無所與調無所不比絲筦金石小大脩短有敘異聲而和君臣上下官職有差殊事而調夫織者日以進織帛者進耕者日以耕渭耕者行事相反成功一也申喜聞乞人之歌而悲出而視之其母也申喜三其母母乞食於道艾陵之戰也夫差曰夷聲陽句吴其庶乎艾陵之戰吴王夫差與齊戰於艾陵也夷渭吴陽告也句吴夷語不正言吴加以句也庶幾也同是聲而取信焉異有諸情也故心哀而歌不楽心楽而不哀夫子曰絃則是也其聲非也閔子騫三年之喪畢援琴而弹其經是也其聲切切而哀文者所以接物也惟繫於中而欲發外者也以文滅情則失情以情滅文則失文文情理通則鳳麟極矣言至徳之懷逺也輸子陽謂其子曰良工漸乎矩鑿之中漸習矩鑿之中固無物而不周聖王以治民造父以治馬醫駱以治病醫駱越醫同材自取焉自從也矩鑿之中各取洁度或以治民或以治馬或以治病同材而各往從取治法之也上意而民載誠中者也上有意而未言則民皆載而行之志或發中之於大未言而信弗召而至或先之也忣於不己知者不自知也忣急矜怛生於不足怛驕也不足知不足也華誣生於矜矝貪功也誠中之人楽而不忣如鴞好聲忠信之人自楽爲之非忣忣也如鴞自好爲聲耳熊之好經動導引夫有誰爲矜各任自性非徒矜也春女思秋士悲春乆感陽則思秋士見隂而悲而知物化矣號而哭嘰而哀知聲動矣容貌顔色理詘倨佝知情偽矣故聖人栗栗乎其内而至乎至極矣功名遂成天也循理受順人也太公望周公旦天非為武王造之也崇侯惡來天非為紂生之也崇侯紂時諸侯也惡來紂之臣秦之先也有其丗有其人也教本乎君子小人其澤利本乎小人君子享其功昔東戸季子之丗東戸季子古之人君道路不拾遺耒耜餘糧諸畮首使君子小人各得其冝也故一人有慶兆民賴之凡髙者貴其左天道左旋故下之於上曰左之臣辭也臣道左君下者貴其右故上之於下曰右之君譲也君䛺攘活臣故上左遷則失其所尊也左臣辭也君以再還故失其尊也臣右還則失其所貴矣右君辭也而臣以再還故失其貴也小快害道斯顔害儀斯顔近也子產騰辭騰傳也産作刑書人有傳辝詰之獄繫而無邪煩多也雖獄益多而下无邪也失諸情者則塞於辭矣失事之情則為丗人辝所窮塞也成國之道工無僞事農無遺力土無隱行官無失法譬設網者引其網而萬目開矣舜禹不再受命受命於人不受於天堯舜傳大焉先形乎小也形見也先見微小以知大刑於寡妻至于兄弟禪於家國而天下從風禪也言堯舜禹相傳天下服之也故戒兵以大知小湯武以義伐不義從大伐小人以小知大人謂天下從風者也堯舜之民以小知堯大也君子之道近而不可以至卑而不可以登無載焉而不勝万物載之皆勝其任大而章逺而隆知此之道不可求於人斯得諸己也釋已而求諸人去之逺矣君子者樂有餘而名不足小人樂不足而名有餘於有餘不足之相去昭然逺矣含而弗吐在情而不萌者未之聞也言懷其情而必萌見也君子思義而不慮利小人貪利而不顧義子曰鈞之哭也子孔子鈞等也曰子予奈何乗我何其哀則同其所以哀則異故哀樂之襲人淸也深矣鑿地漂池人或有鑿穿成有塡也言用心異也非止以勞苦民也各從其蹠蹠願也而亂生焉其載情一也施人則異矣施於人有善惡故唐虞曰孳孳以致於王桀紂日快快以致於死不知後丗之譏己也凡人情說其所苦即樂失其所樂則哀故知生之樂必知死之哀有義者不可欺以利有勇者不可劫以懼如飢渴者不可欺以虚噐也人多欲虧義欲則貪貪損義多憂害智貪憂閉塞故害智也多懼害勇嫚生乎小人嫚倨小人行也蠻夷皆能之嫚蛮夷之行也善生乎君子誘然與日月爭光誘美稱也天下弗能遏奪故治國樂其所以存亡國亦樂其所以亡也金錫不消釋則不流刑刑法上憂尋不誠則不法民憂尋不在民則是絶民之繫也繫所以拘維民君反夲而民繫固也至德小節備大節舉齊桓舉而不密齊桓有大莭小節䟽也晉文密而不舉晉文有小莭大莭廢也晉文得之乎閨内失之乎境外閨内脩而境外乱也齊桓失之乎閨内而得之夲朝閨内乱而朝廷治也水下流而廣大君下臣而聦明君不與臣爭功而治道通矣筦夷吾百里奚經而成之百里奚虞人秦相也齊桓秦穆受而聽之聽用二臣之謀照惑者以東爲西惑也照曉見日而寤矣衞武侯謂其臣曰小子無謂我老武侯蓋年九十五矣而羸我羸劣有過必謁之是武侯如弗羸之必得羸故老而弗舍通乎存亡之論者也人無能作也有能爲也有能爲也而無能成也人之爲天成之終身爲善非天不行終身爲不善非天不亡故善否我也禍福非我也非我也天所爲故君子順其在己者而己矣性者所受於天也命者所遭於時也有其材不遇其丗天也太公何力比干何罪循性而行指或害或利求之有道得之在命故君子能爲善而不能必其得福不忍爲非而未能必免其禍君根夲也臣枝葉也根夲不美枝葉者未之聞也有道之丗以人與若堯以天下与舜也無道之丗以國與人堯王天下而憂不解授舜而憂釋憂而守之而樂與賢終不私其利矣凡萬物有所施之無小不可爲無所用之不知其所用也碧瑜糞土也瑜王不知用之則爲糞土也人之情於害之中爭取小焉於利之中爭取大焉故同味而嗜厚膊者厚膊厚切也必其甘之者也同師而超羣者必其樂之者也弗甘弗樂而能爲表者未之聞也表立見也君子時則進得之以義何幸之有不時則退讓之以義何不幸之有故伯夷餓死首山之下伯夷竹君之子譲國與弟不食周粟故餓也猶不自悔棄其所賤得其所貴也善求仁而得也福之萌也緜緜禍之生也分分福禍之始萌微故民嫚之唯聖人見其始而知其終故傳曰魯酒薄而邯鄲圍魯与趙俱朝楚獻酒於楚魯酒薄而趙酒厚楚之主酒吏求酒於趙不与楚吏怒以趙所獻酒於楚王易魯薄酒楚王以為趙酒薄而圍邯鄲一曰趙魯獻酒於周也事見荘子羊羮不而宋國危宋將華元与鄭戰殺羊食士不及其御及戰御馳馬入鄭軍華元以也明主之賞罰非以爲己也以爲國也通於巳而無功於國者不施賞焉逆於巳便於國者不加罰焉故楚莊謂共雍共雍楚臣曰有德者受吾爵禄有功者受吾田宅是二者女無一焉吾無以與女可謂不踰於理乎踰越其謝之也猶未之莫與謝謂遣共雍也莫勉之也周政至至於道也殷政善善施教未至於道也夏政行行尚租也行政善善未必至也至至之人不慕乎行不慙乎善含德履道而上下相樂也不知其所由然有國者多矣而齊桓晉文獨名泰山之上有七十壇焉封乎太山蓋七十二君也而三王獨道君不求諸臣臣不假之君脩近彌遠而後丗稱其大不越鄰而成章而莫能至焉故孝巳之禮可爲也孝已殷王高宗之子也蓋放逐而不失礼而莫能奪之名也必不得其所懷也不能與孝巳爭名者不得孝己之所懷也義載乎冝之謂君子冝遺乎義之謂小人通智得勞而不勞通智達道之人其次勞而不病其下病而不勞古人味而弗貪也古人知其味而不貪其食今人貪而弗味孔子魯人之斈也飲之而巳莫之能味者歌之脩其音也此言樂所以移風易俗歌長其音音之不足於其美者也此音不足以致美化也金石絲竹助而奏之猶未足以至於極也極治化之至也人能尊道行義喜怒取予如此即其化民逾於樂也欲如草之從風草上之風必偃召公以桑耕種之時㢮獄出拘召公周太保也使百姓皆得反業脩職文王辭千里之地而請去炮烙之刑紂拘文王文王獻寶於紂紂賞以千里之地文王不受願去炮烙之刑故聖人之舉事也進退不失時若夏就絺紘上車授緌之謂也老子學商容見舌而知守柔矣商容神人也商容吐舌示老子老子知舌柔齒剛列子學壶子景柱而知持後矣先有形而後有影形可亡而影不可傷故聖人不爲物先而常制之其若積薪樵後者在上人以義愛以黨羣以羣強是故德之所施者博則威之所行者遠義之所加者淺則武之所制者小矣鐸以聲自毁繹大鈴出於吴也膏燭以明自鑠虎豹之文來射猨之捷來措措刺也故子路以勇死死衛侯輒之難萇以智困欲以術䡝周周人殺之能以智智而未能以智不智也故行險者不得履繩出林者不得直道夜行瞑目而前其手事有所至而明有不害人能貫冥冥入於昭昭可與言至矣鵲巢知風之所起歳多風則鵲作巢卑獺穴知水之髙下水之所及則避而爲穴也暉日知晏暉日鴆鳥也晏无雲也天晏靜暉日先鳴也隂諧知雨隂諧暉日雌也天隂雨則鳴爲是謂人智不如鳥獸則不然故通於一察於一辭可與曲說未可與廣應也戚擊牛角而歌桓公舉以大政雍門子以哭見孟甞君涕流沾纓歌哭衆人之所能爲也一發聲入人耳感人心精之至者也故唐虞之法可効也其諭人心不可及也簡公以濡殺簡公齊君也以柔濡田成子殺之也子陽以猛劫子陽鄭相也尚刑而劫死皆不得其道者也故歌而不比於律者其淸濁一也雖淸濁失和故不中律全繩之外與繩之内皆失直者也紂爲象箸而箕子嘰嘰唬也知象箸必者玉桮爲桮必極滋味魯以偶人葬而孔子歎偶人桐人也嘆其人而用之也見所始則知所終故水出於山入於海稼生乎野而藏乎倉聖人見其所生則知其所歸矣水濁者魚噞令苛者民亂城峭者必崩岸崝者必陁崝峭也陁落也故商鞅立法而支解商鞅爲秦孝公立治法百姓怨之以罪支解呉起刻削而車裂吴起相楚設貴臣相坐之法卒車裂也治國辟若張瑟大組組急也則小絃絶矣故急轡數䇿者非千里之御也有聲之聲不過百里無聲之聲施於四海是故禄過其功者損名過其實者蔽情行合而名副之禍福不虚至矣身有醜夢不勝正行國有妖祥不勝善政是故前有軒冕之賞不可以無功取也後有斧鉞之禁不可以無罪蒙也素脩正者弗離道也君子不謂小善不足爲也而舍之小善積而爲大善不爲小不善爲無傷也而爲之小不善積而爲大不善是故積羽沉舟羣輕折軸故君子禁於微壹快不足以成善積快而爲徳壹恨不足以成非積恨而成怨故三代之善千歳之積譽也桀紂之謗千歳之積毁也天有四時人有四用何謂四用視而形之莫明於目聽而精之莫聦於耳重而閉之莫固於口含而藏之莫深於心目見其形耳聽其聲口言其誠而心致之精則萬物之化咸有極矣地以德廣人君以德廣益其土地也君以徳尊上也地以義廣君以義尊次也地以強廣君以強尊之下也故粹者王駿者霸無一焉者亡昔二鳳皇至於庭三代至乎門室至乎澤德彌麤所至彌遠德彌精所至彌近君子誠仁於施亦仁不施亦仁道无爲而民蒙純此所謂不施而仁小人誠不仁施亦不仁不施亦不仁善之由我與其由人若仁德之盛者也故情勝欲者昌欲勝情者亡欲知天道察其數謂侓歷之数之欲知地道物其樹五土之冝各有所種生之欲知人道從其欲君子欲於道小人欲於利勿驚勿駭萬物將自理勿撓勿櫻櫻纓万物將自清言治天下各順其情察一曲者不可與言化一曲一事也審一時者不可與言大猶蝉不知寒也日不知夜月不知晝日月爲明而弗能兼也唯天地能函之能包天地曰唯無形者也驕溢之君无忠臣口慧之人無必信交拱之木無把之枝拱抱也把握也尋常之溝無吞舟之魚根淺則末短夲傷則枝枯福生於无爲患生於多欲害生於弗備穢生於弗耨聖人為善恐不及備禍若恐不免䝉塵而欲母眯渉水而欲母濡不可得也是故知已者不怨人知命者不怨天福由己發禍由己生聖人不求譽不辟誹正身而直行衆邪自息今釋正而追曲倍是而從衆是與俗儷走而内行無繩繩所以弹曲也故聖人反己而弗由也道之有篇章形埒者形埓兆朕非至者也甞之而無味視之而無形不可傳於人大載去水亭歷愈脹用之不節乃反為病物多之而非唯聖人知其微善御者不忘其馬善射者不忘其弩善爲人上者不忘其下誠能愛而利之天下可從也弗愛弗利親子叛父天下有至貴而非勢位也有至冨而非金玉也有至壽而非千歳也原心反性則貴矣適情知足則冨矣明死生之分則壽矣言無常是行無常冝者小人也察於一事通於一者中人也兼覆蓋而并有之度能而裁使之者聖人也裁制也度其能而裁制使之淮南鴻烈解卷第十淮南鴻烈解卷第十一
