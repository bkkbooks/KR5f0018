front:
  text: 道應訓第十二道之所行物動而應考之禍福以知驗符也太清問於無窮太清元氣之清者也無窮無形也曰子知道乎无窮曰吾弗知也又問於無爲無為有形而不為也曰子知道乎无爲曰吾知道無為有形故知道也子之知道亦有數乎無爲曰吾知道有數曰其數奈何無爲曰吾知道之可以弱可以強可以柔可以剛可以隂可以陽可以窈可以明可以包裹天地可以應待無方此吾所以知道之數也太清又問於無始無始未始有之氣也曰鄉者吾問道於無窮無窮曰吾弗知之又問於無爲無爲曰吾知道曰子之知道亦有數乎無爲曰吾知道有數曰其數奈何無爲曰吾知道之可以弱可以強可以柔可以剛可以隂可以陽可以窈可以明可以包裏天地可以應待無方吾所以知道之數也是則無爲知與無窮之弗知孰是孰非無始曰弗知之深而知之淺弗知內而知之外弗知精而知之粗太淸仰而歎曰然則不知乃知邪知乃不知邪孰知知之爲弗知弗知之爲知邪無始曰道不可聞聞而非也道不可見見而非也道不可言言而非也孰知形之不形者乎故老子曰天下皆知善之爲善斯不善也故知者不言言者不知也白公問於孔子曰人可以微言白公楚平正孫太子建勝也建見殺白公怨而欲復讎故問微言也孔子不應知白公有隂謀故不應也白公曰以石投水中何如曰吴越之善没者能取之矣曰以水投水何如孔子曰菑澠之水合易牙甞而知之菑澠齊二水也白公曰然則入固不可與㣲言乎孔子曰何謂不可誰知言之謂者乎夫知言之謂者不以言言也不以言心知之爭魚者濡逐獸者趨非樂之也故至言去言至爲無爲夫淺知之所爭者未矣白公不得也故死於洛室楚殺白公於洛室之地也故老子曰言有宗事有君夫唯無知是以不吾知也白公之謂也惠子爲惠王爲國法惠王梁惠王惠子惠施也已成而示諸先生先生皆善之奏之惠王惠王甚說之以示翟煎曰善惠王曰善可行乎翟煎曰不可惠王曰善而不可行何也翟煎對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不此其冝也治國有禮不在文辯故老子曰法令滋彰盜賊多有此之謂也田駢以道術說齊王田駢齊人諸臣王應之曰寡人所有齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以爲政譬之林木無材而可以爲材願王察其所謂而自取齊國之政焉巳雖無除其患天地之間六合之内可陶冶而變化也齊國之政何足問哉此老聃之所謂無狀之狀無物之象者也王之所問者齊也田駢所稱者材也材不及林林不及雨雨然後材乃得生也雨不及隂陽隂陽不及和和不及道道者求之由生之本也白公勝得荆國不能以府庫分人白公篡得楚國貪其財而不分人也得積七日也七日石乞入曰石乞白公之黨也不義得之又不能布施患必至矣不能予人不焚之母令人害我白公弗聽也九日葉公入葉公楚大夫子髙自方城之外入殺白公也乃發太府之貨以予衆出髙庫之兵以賦民因而致之十有九日而擒白公葉公殺白公也夫國非其有也而欲有之可謂至貪也不能爲人又無以自爲可謂至愚矣譬白公之嗇也何以異於梟之愛其子也梟子長食其母故老子曰持而盈之不知其已揣而銳之不可長保也趙簡子以襄子爲後董閼于曰無䘏賤董閼于趙氏臣也無䘏襄子之名簡子之庻子也今以爲後何也簡子曰是爲人也能爲社稷忍羞襄子能柔能忍耻也異日知伯與襄子飲而批襄子之首大夫請殺之襄子曰先君之立我也曰能爲社稷忍羞豈曰能刺人哉處十月知伯圍襄子於晉陽襄子䟽隊而擊之䟽分也隊軍二百人為一隊分斯隊卒擊之大敗知伯破其首以爲飲器故老子曰知其雄守其雌其爲天下谿齧缺問道於被衣齧缺衣皆堯時老人也被衣曰正女形壹女視天和將至攝女知正女度神將來德將來附美而道將爲女居惷乎新生之犢而無求其故言未卒齧缺繼以讎夷讎夷熟視不言被衣行歌而去曰形槁骸心如死灰直實知不以故自持墨墨恢恢無心可與謀彼何人哉故老子曰明白四達無以知乎趙襄子攻翟而勝之尤人終人尤人終人翟之二邑使者來謁之襄子方將食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰江河之大也不過三日三日而減飄風暴雨日中不須言其不終日今趙氏之德行無所積今一朝兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以爲昌也而喜所以爲亡也勝非其難者也賢主以此持勝故其福及後丗齊楚吳越皆甞勝矣然而卒取亡焉不通乎持勝也唯有道之主持勝孔子勁杓國門之關杓引也古者縣門下從上杓引之者難也而不肯以力聞墨子爲守攻公輸般服而不肯以兵知子雖善為兵而不肯以知兵聞也善持勝者以強爲弱故老子曰道沖而用之又弗盈也惠孟見宋康王蹀足謦欬疾言曰寡人所說者勇有功也不說爲仁義者也客將何以敎寡人惠孟對曰臣有道於此人雖勇刺之不入雖巧有力擊之不中大王獨無意邪宋王曰善此寡人之所欲聞也惠孟曰夫刺之而不入撃之而不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力不敢擊夫不敢刺不敢擊非無其意也臣有道於此使人夲無其意也夫無其意未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之心此其賢於勇有力也四累之上也此上凡四事皆累於世而男女莫不然爲上也大王獨無意邪宋王曰此寡人所欲得也惠孟對曰孔墨是已孔丘墨翟無地而爲君無官而爲長無地爲君以道冨也無官為長以徳尊也天下丈夫女子莫不延頸舉踵而願安利之者今大王萬乗之主也誠有其志則四境之内皆得其利矣此賢於孔墨也逺矣宋王無以應惠孟出宋王謂左右曰辯矣客之以說勝寡人也故老子曰勇於不敢則活由此觀之大勇反爲不勇耳昔尭之佐九人謂禹臯陶稷契伯夷倕益蔓龍也舜之佐七人皆與尭同臣其七人也武王之佐五人謂周公郡公太公畢公毛公也堯舜武王於九七五者不能一事焉然而垂拱受成功焉善乗人之資也故人與逐走則不勝託於車上則不能勝人北方有獸其名曰蹷䑕前而菟後䑕前足短菟後足長故謂之蹷趨則頓走則顚常爲蛩蛩駏驉取甘草以與之蛩蛩駏驉前足長後足短故能乗虚而走不能上也蹷有患害蛩蛩駏驉必而走此以其能託其所不能故老子曰夫代大匠斲者希不傷其手薄疑說衛嗣君以王術嗣君衛國君也嗣君應之曰予所有者千乗也願以愛敎薄疑對曰烏獲舉千鈞又況一斤乎杜赫以安天下說周昭文君昭文君周襄分爲西東各自立其君也文君謂杜赫曰願學所以安周赫對曰臣之所言不可則不能安周臣之所言可則周自安矣此所謂弗安而安者也故老子曰大制無割故致數輿無輿也魯國之法魯人爲人妾於諸侯有能贖之者取金於府子贛贖魯人於諸侯來而辭不受金孔子曰賜失之矣夫聖人之舉事也可以移風易俗而受教順可施後世非獨以適身之行也今國之富者寡而貧者衆贖而受金則爲不廉不受金則不復贖人自今以來魯人不復贖人於諸侯矣孔子亦可謂知禮矣故老子曰見小曰明魏武侯問於李克李克武侯之相曰吳之所以亡者何也李克對曰數戰而數勝武侯曰數戰數勝國家之福其獨以亡何故也對曰數戰則民罷數勝則主憍以憍主使罷民而國不亡者天下鮮矣憍則恣恣則極慮上下俱極吴之亡猶晚此夫差之所以自剄於千遂也越伐吴夫差所自殺也故老子曰功成名遂身退天之道也越欲干齊桓公困窮無以自達於是爲商旅將任車任載也詩曰我任我輦以商於齊暮宿於郭門之外桓公郊迎客夜問門辟任車爝火甚盛爝炬火也從者甚衆越飯牛車下望見桓公而悲擊牛角而疾商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之桓公及至從者以請桓公贛之衣冠而見說以爲天下桓公大說將任之群臣爭之曰客衞人也衞之去齊不逺君不使人問之問之而故賢者也用之未晚桓公曰不然問之患其有小惡也以人之小惡而忘人之大美此人主之所以失天下之士也凡聽必有驗一聽而弗復問合其所以也合已聽知之意所以用之且人固難合也權而用其長者而已矣當是舉也公得之矣故老子曰天大地大道大王亦大域中有四大而王處其一焉以言其能包裹之也大王亶父居邠翟人攻之事之以皮帛珠玉而弗受曰翟人之所求者地無以財物爲也大王亶父曰與人之兄居而殺其弟與人之父處而殺其予弗爲皆勉處矣爲吾臣與翟人奚以異且吾聞之也不以其所養害其養杖䇿而去民相連而從之遂成國於歧山之下山今之美陽北也其下有周地因是以為天下号也大王亶父可謂能保生矣雖冨貴不以養傷身雖貧賤不以利累形今受其先人之爵禄則必重失之所自來者久矣而輕失之豈不惑哉故老子曰貴以身爲天下焉可以託天下愛以身爲天下焉可以天下矣中山公子牟中山鮮虞之國謂詹子曰身處江海之上心在魏闕之下爲之奈何江海之上言志在於己身心之魏闕也言內守詹子曰重生重生則輕利重生已之性也中山公子牟曰雖知之猶不能自勝則從之從之神無怨乎言不勝已之情欲則當縱心意則已神無怨也不能自勝而強弗從者此之謂重傷之人無壽類矣故老子曰知和曰常知常曰明益生曰祥心使氣曰強是故用其光復歸其明也楚莊王問詹何曰治國奈何對曰何明於治身而不明於治國楚王曰寡人得立宗廟社稷願學所以守之詹何對曰臣未甞聞身治而國亂者也未甞聞身亂而國治者也故夲任於身不敢對以未楚王曰善故老子曰修之身其德乃眞也桓公讀書於堂桓公齊君輪人斵輪於堂下釋其椎鑿而問桓公曰君之所讀書者何書也桓公曰聖人之書輪扁曰其人在焉扁輪之名問作書之人何在也桓公曰已死矣輪扁曰是直聖人之糟粕耳糟酒滓也粕已漉之精也桓公悖然作色而怒曰寡人讀書工人焉得而譏之哉有說則可無說則死輪扁曰然有說臣誠以臣之斲輪語之大疾則苦而不入苦急意也大徐則甘而不固甘緩意也不甘不苦應於手猒于心而可以至妙者臣不能以敎臣之子而臣之子亦不能得之於臣是以行年六十老而為輪今聖人之所言者亦以懷其實窮而死獨其糟粕在耳故老子曰道可道非常道名可名非常名昔者司城子罕相宋謂宋君曰夫國家之危安百姓之治亂在君行賞罰夫爵賞賜予民之所好也君自行之殺戮刑罰民之所怨也臣請當之宋君曰善寡人當其美子受其怨寡人自知不爲諸侯矣國人皆知殺戮之制專在子罕也大臣親之百姓畏之居不至朞年子罕遂宋君而專其政故老子曰魚不可脫于淵國之利器不可以示人王壽負書而行見徐馮於周王壽古好書之人徐馮周之隱者也徐馮曰事者應變而動變生於時故知時者無常行書者言之所出也言出於知者知者藏書於是王壽乃焚書而舞之自喜林其書故舞之也故老子曰多言數窮不如守中令尹子佩請飲莊王子佩楚莊王之相請飲請置酒也莊王許諾子佩䟽揖北面立於殿下䟽徒跣也揖舉手也曰昔者君王許之今不果往果誠也意者臣有罪乎莊王曰吾聞子具於強臺強臺者南望料山以臨方皇料山名方皇水名也一曰山名左江而右淮其樂忘死吾薄德之人不可以當此樂也恐留而不能反故老子曰不見可欲使心不亂晉公子重耳出亡過曹無禮焉曹共公聞重耳駢脅使而捕魚設薄以觀之負羇之妻謂負羇曰君無禮於晉公子吾觀其從者皆賢人也從者狐偃趙衰之屬也以相夫子反晉國必伐曹子何不先加德焉羇遺之壺餕而加璧焉重耳受其餕而反其璧及其反國起師伐曹剋之令三軍無入負羇之里故老子曰曲則全枉則正越王勾踐與吳戰而不勝國破身亡困於㑹稽忿心張膽氣如涌泉選練甲卒赴火滅然而請身爲臣妻爲妾親執戈為吴兵先馬走先馬走走馬前果擒之於千遂故老子曰柔之勝剛也弱之勝強也天下莫不知而莫之能行越王親之故霸中國趙簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻圍之未合而城自壤者十丈襄子擊金而退之軍法鼓以進衆征以退之軍吏諫曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乗人於利不迫人於險使之治城城治而後攻之中牟聞其義乃請降故老子曰夫唯不爭故莫能與之爭秦穆公請伯樂曰子之年長矣子姓有可使求馬者乎子姓謂伯樂子對曰良馬者可以形容筋骨相也相天下之馬者滅失亡滅其相不可見也失乍入乍出也亡髣不及也其一此馬者絕塵弭徹絶塵不及也弭徹引跡疾也臣之子皆下材也可告以良馬而不可告以天下之馬臣有所與供儋纒采薪者九方堙索也九方堙人姓名也此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得馬矣在於沙丘穆公曰何馬也對曰牡而黃使人往之牡而驪穆公不說召伯樂而問之曰敗矣子之所使求者毛物牡牡弗能知又何馬之能知伯樂喟然木息曰一至此乎是乃其所以千萬臣而无数者也堙之所觀者天機也得其精而忘其粗在其內而忘其外見其所見而不見其所不見視其所視而遺其所不視彼之所相者乃有貴乎馬者馬至而果千里之馬故老子曰大直屈大巧拙吴起爲楚令尹適魏問屈冝屈冝若楚大夫亡在魏者也曰王不知起之不肖而以爲令尹先生試觀起之爲人也屈子曰將奈何吴起曰將衰楚國之爵而平其制禄損其有餘而綏其不足砥礪甲兵時爭利於天下屈子曰冝聞之昔善治國家者不變其故不易其常令子將衰楚國之爵而平其制禄損其有餘而綏其不足是變其故易其常也行之者不利冝聞之曰怒者逆德也兵者凶器也爭者人之所本也今子隂謀逆德好用凶器始人之所本本者謂兵爭也逆之至也且子用魯兵不冝得志於齊而得志焉吴起爲將伐齊敗之子用魏兵不宜得志於秦而得志焉吴起為魏西河守秦兵不敢東下也宜聞之非禍人不能成禍吾固惑吾王之数逆天道戾人理至今无禍差須夫子也差須猶意須也吴起惕然曰尚可更乎屈子曰成刑之徒不可更也成刑之徒刑禍已戎於衆子不敦愛而篤行之老子曰挫其銳解其紛和其光同其塵晉伐楚三舍不止大夫請擊之莊王曰先君之時晉不伐楚及之身而晉伐楚是之過也何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請王擊之王俛而泣涕沾起而拜君大夫晉人聞之曰君臣爭以過爲在已且輕下其臣不可伐也夜還師而歸老子曰能受國之垢是謂社稷主宋景公之時熒惑在心公懼召子韋而問焉子韋司星者也曰熒惑在心何也子韋曰熒惑天罰也心宋分野宋之分野上屬房心之星禍且當君雖然可移於宰相公曰宰相所使治國家也而移死焉不祥子韋曰可移於民公曰臣死寡人誰爲君乎寧獨死耳子韋曰可移於歳公曰歳民之命歳饑民必死矣爲人君而欲殺其民以自活也其誰以我爲君者乎是寡人之命固已盡矣子韋无復言矣子韋還走北面再拜曰敢賀君天之処髙而聽卑君有君人之言三天必有三賞君今夕星必徙三君延年二十一歳公曰子奚以知之對曰君有君人之言三故有三賞星必三徙舍行七里三七二十一故君移年二十一歳臣請伏於陛下以司之星不徙臣請死之公曰可是夕也星果三徙舍救老子曰能受國之不祥是謂天下之王昔者公孫龍在趙之時謂弟子曰人而無能者龍不能與逰有客衣褐帶索而見曰臣能呼公孫龍顧謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之籍後数日往說燕王至於河上而航在一汜汜水涯也使善呼之一呼而航來故曰聖人之處丗不逆有能之士故老子曰人無弃人物無弃物是謂襲明子發攻蔡踰之子發楚宣王之將軍踰越勝之也宣王郊迎列田百頃而封之執圭楚爵功臣賜以圭謂之執圭比附庸之君也子發辭不受曰治國立政諸侯入賔此君之德也發号施令師未合而敵遁此將軍之威也兵陳戰而勝敵者此庶民之力也夫乗民之功勞而取其爵禄非仁義之道也故辭而弗受故老子曰功成而不居夫唯不居是以不去晉文公伐原原周邑周襄王以原賜文公原叛伐也與大夫期三日三日而原不降文公令去之軍吏曰原不過一二日將降矣君曰吾不知原三日而不可得下也以與大夫期盡而不罷失信得原吾弗爲也原人閒之曰有君此可弗降也遂降温人聞亦請降時周人亦以温予文公温相連俱叛故老子曰窈兮冥其中有精其精甚眞其中有信故美言可以市尊美行可以加人公儀休相魯公儀休故魯愽士也而嗜魚一國獻魚公儀子不受其弟子諌曰夫子嗜魚弗受何也荅曰夫唯嗜魚故弗受夫受魚而免於相雖嗜魚不能自給魚母受魚而不免於相則能長自給魚此明扵爲人爲已者也故老子曰後其身而身先外其身而身存非以無私故能成其私一曰知足不辱狐丘丈人謂孫叔敖丈人老而杖於人者曰人有三怨子知之乎孫叔敖曰何謂也對曰爵髙者士妬之官大者主惡之禄厚者怨處之孫叔敖曰吾爵益髙吾志益下吾官益六吾心益小吾禄益厚吾施益博是以免三怨可乎故老子曰故貴必以賤爲夲髙必以下爲基大司馬捶覩果反鈎者年八十矣捶鍜擊也鈎鈎鈎也而不失鈎芒大司馬曰子巧邪有道邪曰臣有守也臣年二十好捶鈎於物無視也非鈎無察也是以用之者必假扵弗用也而以長得其用而況持不用者乎物孰不濟焉故老子曰從事於道者同於道文王砥德脩政三年而天下二垂歸之砥礪也文王三分天下有其二也紂聞而患之曰余夙興夜寐與之競行則苦心勞形縱而置之恐伐余一人崇侯虎曰周伯昌行仁義而善謀夫子發勇敢而不疑中子旦恭儉而知時與之從則不堪其殃縱而赦之身必危亡冠雖弊必加於頭及未成請圖之屈商乃拘文王於羑里屈商紂臣也羑里地名也在河内湯隂於是散宜生乃以千金求天下之珍怪得騶虞雞斯之乗騶虞白虎黒文而仁食自死之獸日行千里雞斯神馬也王百工二玉為一工也大貝百朋五貝為一朋也豹黄羆青犴音岸犴胡地野犬也白虎文皮千合以獻於紂因費仲而通費仲紂侫臣也紂見而說之乃免其身殺牛而賜之文王歸乃爲玉門築霊臺相女童擊鍾鼓王門以玉飾門為柱樞也相女童相視之一曰相匠也以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃爲炮烙剖比干剔孕婦殺諌者文王乃遂其謀故老子曰知其榮守其辱為天下谷成王問政於尹佚曰吾何德之行尹佚史佚而民親其上對曰使之時而敬順之王曰其度安至曰如臨深淵如履薄冰王曰懼哉王人乎尹佚曰天地之間四海之内善之則吾畜也不善則吾讎也昔夏商之臣反讎桀紂而臣湯武宿沙之民皆自攻其君而歸神農伏羲神農之閭有共工宿沙霸天下者也此丗之所明知也如何其無懼也故老子曰人之所畏不可不畏也跖之徒問跖曰盜亦有道乎跖曰奚適其無道也夫意而中藏者聖也入先者勇也出後者義也分均者仁也知可否者智也五者不備而能成大盗者天下無之由此觀之盜賊之心必託聖人之道而後可行故老子曰絶聖弃智民利百倍楚將子發好求技道之士楚有善爲偷者往見曰聞君求技道之士臣偷也願以技齎一卒齎備卒足子發聞之衣不給帶冠不暇正出見而禮之左右諌曰偷者天下之盜也何爲之禮君曰此非左右之所得與後無幾何齊興兵伐楚子發將師以當之兵三却楚賢良大夫皆盡其計而悉其誠齊師愈強於是市偷進請曰臣有薄技願爲君行之子發曰諾不問其辭而遣之偷則夜解齊將軍之幬帳而獻之子發因使人歸之曰卒有出薪者得將軍之帷使歸之於執事明又復往取其枕子發又使人歸之明日又復往取其簪子發又使歸之齊師聞之大駭將軍與軍吏謀曰今日不去楚軍恐取吾頭則還師而去故曰無細而能薄在人君用之耳故老子曰不善人善人之資也顔回謂仲尼曰回益矣仲尼曰何謂也曰回忘禮樂矣回忘禮樂絶聖弃知入於无為也仲尼曰可矣猶未也異日復見曰回益矣仲尼曰何謂也曰回忘仁義矣仲尼曰可矣猶未也異日復見曰回坐忘矣言坐自忘其身以至道也仲尼造然曰何謂坐忘顔回曰隳支體黜聦明離形去知洞於化通是謂坐忘仲尼曰洞則無善也化則無常矣而夫子薦賢薦先也回人賢丘請從之後故老子曰載營魄抱一能毋離乎專氣至柔能如嬰皃乎秦穆公興師將以襲鄭蹇叔曰不可臣聞襲國者以車不過百里以人不過三十里爲其謀未及發泄也甲兵未及鋭弊也糧食未及乏絶也人民未及罷病也皆以其氣之髙與其力之盛至是以犯敵能威今行數千里又數絶諸侯之地以襲國臣不知其可也君重圖之穆公不聽蹇叔送師衰絰而哭之師遂行過周而東鄭賈人髙矯鄭伯之命以十二牛勞秦師而賔之三帥乃懼而謀曰吾行數千里以襲人未至而人已知之其備必先成不可襲也還師而去當此之時晉文公適薨未葬先軫言於襄公先軫晉大夫也襄公晉文公子曰昔吾先君與穆公交天下莫不聞諸侯莫不知今吾君薨未葬而不弔吾喪而不假道是死吾君而弱吾也請擊之襄公許諾先軫舉兵而與秦師遇於殽大破之擒其三軍以歸穆公聞之素服廟臨以說於衆說解故老子曰知而不知尚矣不知而知病也齊王后死王欲置后而未定使群臣議薛公欲中王之意薛公田嬰也因獻十珥而美其一旦日因問美珥之所在因勸立以爲王后齊王大說遂尊重薛公故人主之意欲見於外則爲人臣之所制故老子曰塞其兊閉其門終身不勤盧敖游乎北海盧敖燕人始皇召以為博士使求神仙亡而不返也經乎太隂入乎闕太隂北方也闕北方之山也至於蒙榖之上蒙穀山名見一士焉深目而鬢涙注淚水而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂慢然止舞也遯逃乎碑匿於碑隂盧敖就而視之方倦殻楚人謂倨為倦龜殼甲也而食蛤梨蛤梨海蚌盧敖與之語曰唯敖爲背群離黨窮觀於六合之外者非敖而已乎敖幼而好遊至長不渝周行四極唯北隂之未闢今卒睹天子於是子殆可與敖爲友乎士者齤音拳然而曰嘻子中州之民寜肯而逺至此此猶光乎日月言太隂之地尚見日月也而載列星隂陽之所行四時之所生其比夫不名之地猶突奥也言我所游不可字名之地以盧敖而所行比之則如突奥奥室中也我南游乎岡㝗之野北息乎沉墨之郷西窮冥冥之黨東開鴻濛之光此其下無地而上無天聽焉無聞視焉無眴此其外猶有汰沃之汜汰沃四海予天之際水流聲也汜涯也其餘一舉而千萬里千万里沃氾之外也吾猶夫能之在吾尚未至此也今子游始於此乃語窮觀豈不亦逺哉然子處矣吾與汗漫期于九垓之外汗漫不可知之也九垓九天之外吾不可以久駐士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕之車止柸治楚人謂恨不得為柸治也悖有喪也曰吾比夫子猶黃鵠與蠰蟲也蠰蟲蟲之幼也終日行不離咫尺入寸爲咫十寸為尺而自以爲逺豈不悲哉故莊子曰小人不及大人小知不及大知朝菌不知晦朔朝菌朝生暮死之蟲也生水上狀似蚕蛾一名孳母海南謂之蟲邪蟪蛄不知春秋蟪蛄貂蟟此言明之有所不見也季子治亶父三年季子子賤而巫馬期絻衣短褐巫馬期孔子弟子也易容貌往觀化焉易服而往微以視之見夜魚釋之巫馬期問焉曰凡子所爲魚者欲得也今得而釋之何也漁者對曰季子不欲人取小魚也古者魚不盈尺不上爼也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣使人闇行有嚴刑在其側者季子何以至於此孔子曰丘甞問之以治言曰誡於此者刑於彼季子必行此術也故老子曰去彼取此罔兩問於景罔兩水之精物也景日月水光晷也曰照照者神明也罔兩恍揔之物見景光明以爲神也景曰非也罔兩曰子何以知之景曰扶桑受謝日炤宇宙扶桑日所出之木也受謝扶桑受日且澤出之也炤炤之光輝燭四海闔戸塞牖刖無由入矣神明四通並流無所不極上際於天下蟠於地化育萬物而不可爲象俛仰之間而撫四海之外照照何足以名之故老子曰天下之至柔馳騁於天下之至堅光耀問於無有光耀可見而無有至虛者曰子果有乎其果無有子有形生於無形何以能生物故問果有乎其无有也無有弗應也光耀不得問而就視其狀貌冥然忽然視之不見其聽之不聞其聲搏之不可得望之不可極也光耀曰貴矣哉孰能至于此乎予能有無矣未能無無也言我能使形不可得未能殊無也及其爲無無又何從至於此哉故老子曰無有入于無間吾是以知無爲之有益也白公勝慮亂白公將爲父復讎起兵乱因思慮之也罷朝而立到杖䇿錣音針上貫頥䇿馬捶端有針以刺馬謂之錣到救䇿故錣貫頥也血流至地而弗知也鄭人聞之曰頥之忘將何不忘哉白公之父死鄭人預之故懼之也此言精神之越於外智慮之蕩於内則不能漏理其形也漏補空也是故神之所用者逺則所遺者近也近謂身也故老子曰不出户以知天下不窺牖以見天道其出彌逺其知彌少此之謂也秦皇帝得天下恐不守發邊戍築長城脩關梁設障塞具車置邊吏然劉氏奪之轉閉錘閉錘格也上之錘所以編薄席反後之易昔武王伐紂破之牧野乃封比干之墓表商容之閭柴箕子之門紂死箕子亡之朝鮮舊居空故柴護之朝成湯之廟發鉅橋之粟散鹿臺之錢破鼓折抱㢮弓絶去舍露宿以示平易解剱帶笏以示无仇於此天下歌謡而樂之諸侯執幣相朝三十四丗不奪故老子曰善閉者无関鍵而不可開也善結者無繩約而不可解也尹需斈御三年而無得焉私自苦痛常寢想之寢堅思之中夜夢受秋駕於師秋駕善御之術明日往朝師望之謂之曰吾非受道於子也恐子不可子也今日將敎子以秋駕尹需反走北面再拜曰臣有夭幸今夕固夢受之故老子曰致虛極守静篤萬物並作吾以其復也昔孫叔敖三得令尹無喜志三去令尹无憂色延陵季子吳人願一以爲王而不肯許由讓天下而弗受晏子與崔杼盟臨死地不変其儀此皆有所逺通也精神通於死生則物孰能惑之荆有佽非得寶劒於干隊干音寒干囯在今臨淮出寳劒盖為莫邪洞鄂之形也還反度江至於中流陽侯之波兩蛟挾繞其舩蛟龍属也魚滿二千五百斤蛟未爲之主也佽非謂枻舡者枻櫂曰嘗有如此而得活者乎對曰未甞見也於是佽非瞋目㪍然攘臂㧞劒曰武王可以仁義之禮說也不可劫而奪也此江中之腐肉朽骨弃劒而已余有奚愛焉赴江刺蛟遂斷其頭舩中人盡活風波畢除荆爵爲執圭孔子聞之曰夫善載腐朽骨弃劒者佽非之謂乎故老子曰夫唯無以生爲者是賢於貴生焉齊人淳于髠以從說魏王魏王辯之約車十乗將使荆辭而行人以爲從未足也復以衡說其辭然从說說諸侯之計當相從也衡說从之非是當横更計也魏王乃止其行而䟽其身失從心志而有不能成衡之事是其所以固也夫言有宗事有夲失其宗夲技能雖多不其寡也故周鼎著倕而使齕其指先王以見大巧之不可也故愼子曰匠人知爲門能以門愼子名到齊人所以不知門也不知門之要也故必杜然後能門門之要在門外者有田鳩者田鳩斈子之術也欲見秦惠王約者申轅申束留於秦周年不得見客有言之楚王者往見楚王楚王甚悅之予以節使於秦至因見予之將軍之節惠王而說之出舍喟然而歎告從者曰吾留秦三年不得見不識道之可以從楚也物固有近之而逺逺之而近者故大人之行不掩以繩掩猶揮也至所極而已矣此所謂筦子梟飛而維繩者言為士者上下无常進退无下可繩也以喻飛梟从下繩維之而欲翺翔則不可也豐水之深千仞而不受塵垢扵金鐡鍼焉則形見於外非不深且清也魚鼈龍蛇莫肯之㱕也是故石上不生五榖秃山不㳺麋鹿無所隂蔽隱也昔趙文子問於叔向曰晉六將軍其孰先亡乎六將軍韓魏趙范中行知伯也對曰中行知氏文子曰何乎對曰其爲政也以苛爲察以切爲明以刻下爲忠以計多爲功譬之猶廓革者也廓之大則大矣裂之道也故老子曰其政惽惽其民純純其政察察其民缺缺景公謂太曰子之道何能對曰能動地動震晏子往見公公曰寡人問太曰子之道何能對曰能動地地可動乎晏子黙然不封出見太曰昔吾見句星在房心之閒地其動乎句星客星也駟房句星守房心則地動也太曰然晏子出太走往見公曰臣非能動地地固將動也田子陽聞之田子陽齊臣也曰晏子黙而不對者不欲太卜之死往見太者恐公之欺也晏子可謂忠於上而惠於下矣故老子曰方而不割廉而不劌魏文侯觴諸大夫於曲陽飲酒酣文侯喟然歎曰吾獨無豫讓以爲臣子豫讓事知伯而死其難故文侯思以爲臣蹇重舉白而進之蹇重文侯臣也舉白進酒曰請浮君浮猶罰也以酒罰君也君曰何也對曰臣聞之有命之父母不知孝于有道之君不知忠臣夫豫讓之君亦何如哉豫讓相其君而君見殺亦何如不足貴也文侯受觴而飲釂而不獻釂盡曰無管仲鮑叔以爲臣故有豫讓之功故老子曰國家昬亂有忠臣孔子桓公之廟桓公魯君也有器焉謂之宥巵宥在坐右孔子曰善哉乎得見此器頗顧曰弟子取水水至灌之其中則正中水牢巵中也其盈則覆孔子造然革容曰善哉持盈者乎子貢在側曰請問持盈曰揖而損之曰何謂揖而損之曰夫物盛而衰樂極則悲日中而移月盈而虧是故聦明叡知守之以愚多聞博辯守之以儉武力毅勇守之以畏富貴廣大守之以陋德施天下守之以讓此五者先王所以守天下而弗失也反此五者未甞不危也故老子曰服此道者不欲盈夫唯不盈是以能弊而不新成武王問太公曰寡人伐紂天下是臣殺其主而下伐其上也吾恐後丗之用兵不休爭無已爲之奈何太公曰甚善王之問也夫未得獸者唯恐其創之小也獵禽恐不能殺故恐其創小也已得之惟恐傷之多也王欲久持之則塞民於兊兊耳目口也老子曰塞其兊也道全爲無用之事煩擾之敎彼皆樂其業供其情昭昭而道冥冥於是乃去其瞀而載之木瞀被髪也水鶩鳥冠也知文者冠鶩解其劒而帶之笏爲三年之喪令不蕃髙辭卑讓使民不爭酒以通之竽瑟以娱之鬼神以畏之繁文滋禮以弇其質厚葬乆喪以亶晉丹其家含珠鱗施綸組以貧其財深鑿髙壟以盡其力家貧族少慮患者寡以此移風可以持天下弗失故老子曰化而欲作吾將鎭之以無名之樸也淮南鴻烈解卷第十二淮南鴻烈解卷第十三
