body:
  text: 氾論訓第十三愽說丗間古今得生以道為化大歸於一故臣氾譏因以題篇古者有鍪而綣領以王天下者矣古者盖三皇以前也鍪頭着兠鍪帽言未知制冠也綣領皮衣屈而紩之如今胡家韋襲反褶以為領也一說鍪放髪也綣繞頸而已皆无飾其德生而不辱刑楷不用也予而不奪予予无財也不奪无所徵求於民也天下不非其服同懐其德非猶譏呵也懷歸也當此之時隂陽和平風雨時莭萬物蕃息政不虐生无天折烏鵲之巢可俯而探也禽獸可羈而從也從猶牽也豈必襃衣帶句襟委章甫哉襃衣謂方与之衣如今吏人之左衣也博帶大帶詩云垂帶厲句襟今之曲領曲領褒衣也委委貌冠章甫亦冠之名也古者民澤處復穴處居也復穴重窟一說穴毁隄㕫崖岸之中以為窟堂也冬日則不勝霜雪霧露夏日則不勝暑熱䖟䖟讀詩云言采其蔄之蔄也聖人乃作作起也爲之築土構木以爲宫室講架也謂材未相乗架也上棟下宇以蔽風雨楝屋檼也宇屋之垂以避寒暑而百姓安之安樂也伯余之初作衣也伯余黄帝臣也世本曰伯余製衣裳一曰伯余黄帝緂㝝索縷手經指挂其成猶網羅緂銳索功也緂讀恬然不動之恬後丗爲之機杼勝以便其用而民得以掩形衘寒掩蔽御止古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩今利用之耨耨除苗穢也木鉤而樵抱甀而汲鉤鐮也鉤讀濟隂句陽之句樵薪蒸甀武今充州日小武爲甄幽州曰瓦也民勞而利薄後丗爲之耒耰鋤斧柯而樵桔臯而汲耰謂曰優㭬椎也三輔謂之儓所以覆種也民逸而利多焉古者大川名谷衝絶道路不通往來也乃為窬木方板以爲舟航窬空也方並也舟相連為航也故也勢有无得相委輸運所有輸所无乃爲靻蹻而超千里肩負儋之勤也靻蹻靻靸也勤勞也而作爲之楺輪建輿駕馬服牛民以致逺而不勞代負儋故不勞也爲鷙禽猛獸之害傷人而无以禁御也而作爲之鑄金鍜鐡以為兵刃猛獸不能為害以兵刃備之故不得為人害也故居迫其難則求其便困其患則造其備人各以其所知去其所害就其所利常故不可循噐械不可因也循隨也當時之可攷則攷之故曰不可也則先王之法度有移易者矣古之制㛰礼不稱主人當婚者之身不稱其名也稱諸父兄師友舜不告而娶非礼也堯知舜賢以二女妻舜不告父父頑常欲殺舜舜知告則不得娶也不孝莫大扵无後故孟子曰舜不告猶告耳立子以長文王舍伯邑考而用武王非制也礼三十而娶三十而娶者隂陽未分時俱生於予男從子数左行三十年立於已女從子数右行二十年亦立於已合夫婦故聖人因是制礼使男三十而娶女二十而嫁共男子自已数左行十得寅故人十月而生於寅故男子数從寅起女自已数右行得申亦十月而生於申故女子数从申起生伯邑考武王兄廢長立聖以庶代嫡聖人之耳文王十五而生武王非法也歳星十二歳而周天天道十二而備故國君十二歳而冠冠而娶十五生子重國嗣也不從故制也上句言之冝伯邑考娶也夏后氏殯於阼階之上礼飯於牖下小斂於户内大斂於阼階在牀曰尸在棺曰柩殯於賔位祖於庭葬於墓也於阼階猶在主位未忍以賔道逺之殷人殯於兩楹之間楹柱也記曰殷殯之於堂上兩柱之間賔主共周人殯於西階之上蓋以賔道遣之此礼之不同者也有虞氏用瓦棺有虞氏舜丗也瓦棺陶瓦也夏后氏堲周夏后氏禹丗无棺槨以瓦廣二尺長四尺側身累之以蔽土曰堲周也殷人用槨用栢爲槨厚之冝以棺爲制也周人牆置翣此葬之不同者也周人兼用棺槨故牆設翣狀如今要扇文挿置棺車葙以為飾多少之差各從其爵命之数也夏后氏於闇於室中中夜之也殷人祭於陽於堂上日平旦也周人於日出以朝於日出時於庭中朝者庭也此祭之不同者也堯大章堯樂也舜九韶舜樂也書曰簫韶九成是也禹大夏禹樂也湯大護湯樂也周武象武王樂也此樂之不同者也故五帝異道而德覆天下三王殊事而名施後丗此皆因時變而制礼樂者譬猶師曠之施瑟柱也所推移上下者无寸尺之度而靡不中音故通於礼樂之情者能作音有本主於中而以知榘彠之所周者也榘方也彠度法也魯昭公有慈母而愛之死爲之練冠故有慈母之服母者父所命養己者此大夫之妾士之妻謂之女母礼爲之緦麻三月昭公獨練言其記礼之所由興也陽侯殺蓼侯而竊其夫人故大饗廢夫人之禮陽侯陽陵囯侯也蓼侯臯陶之後偃姓之囯侯也今在廬江古者大饗飲酒君執爵夫人執豆陽侯見蓼侯夫人羙豔因殺蓼侯而娶夫人由是廢致夫人之礼記所由廢也先王之制不宜則廢之末丗之事善則著之是故礼樂未始有常也故聖人制礼樂而不制於礼樂聖人能作礼樂不爲礼樂所制治囯有常而利民爲夲本要政敎有經而令行為上經常也上最也苟利於民不必法古苟周於事不必循舊舊常也傳曰舊不必良舊或作咎也夫夏商之衰也不変法而亡亡謂桀紂三代之起也不相襲而王三代禹湯武也襲因也故聖人法與時変礼与俗化化易衣服噐械各便其用法度制令各因其宜故変古未可非而循俗未足多也循隨也俗常也百川異源而皆㱕於海以海為宗百家殊業而皆務治於業事也以治為要也王道缺而詩作詩所以刺王道周室廢礼義壊而春秋作春秋所以貶絶不由礼義也詩春秋斈之美者也皆衰丗之造也儒者循之以敎導於丗豈三代之盛哉以詩春秋為古之道而貴之又有未作詩春秋之時失道之缺也不道其全也誦先王之詩書不聞得其言聞得其言不得其所以言聞聖人之言不如得其未言時本意得其所以言者言弗能言也聖人所言微妙凡人雖得之口不能以言故道可道者非常道也常道深隱幽不可道也猶聖人之言微妙不可言周公事文王也行无專制專獨制断事无由已請而後行身不勝衣言不出口有奉持於文王洞洞屬屬如將不能恐失之洞洞屬屬婉順貌也而將不能勝之恐失之愼至也洞讀䘰桐之桐屬讀犁之也可謂能子矣武王崩成王㓜少周公継文王之業履天子之籍聽天下之政藉圖藉也政治也籍或作阼也平夷狄之乱夷狄滑夏平除之也誅管蔡之罪蔡叔周公无也管叔周公弟也二叔监殷而導紂子禄父為流言欲以乱周周公誅之為国故也傳曰大義滅親也扆而朝諸侯負背也扆户牖之間也言南面也誅賞制断無所顧間决之於心威動天地声懾海内懾服也服四海之内可謂能武矣成王旣壯周公屬籍致政北面委質而臣事之以圗籍什屬成王致猶㱕北面委玉帛之質執臣之礼也請而後為復而後行每事必請復白一无擅恣之志无伐矝之色不自伐其功勞也不自矝大其善也可謂能臣矣故一人之身而三変者所以應時矣何況乎君数易丗囯数易君人以其位逹其好憎人人以其寵位行其所好憎其所憎也以其威勢供嗜欲而欲以一行之礼一定之法應時偶変其不能中亦明矣一行之礼非隨時礼也一定之法非隨時法也故曰不能中權權則因事制冝不失中道也故聖人所由曰道所為曰事道猶金石一調不更事猶琴瑟每終改調金石鍾声也故曰調而不更琴瑟絃有數往有前故調事亦如之也故法制礼義者治人之具也而非所以為治也言法制礼義可以為治之基耳非以爲治治在其人之德猶曰矣躰之具也非能必中也中在其人之功也故仁以為經義以為紀此万丗不更者也乃人考其身才而時省其用雖日変可也言人能考度其才時省其行擇其善者而崇用之不必循常故曰雖日変可也唯仁義不可改耳故万丗不更矣天下豈有常法哉隨其時於其冝當於丗事得於人理順於天地祥於神則可以正治矣當合也祥順也古者民醇工厖商撲女重醇厚不虚華也工厖氣坚緻也商撲不為詐也女重貞正无邪也是以政敎易化風俗易移也今丗德益衰民俗益薄欲以撲重之法治旣弊之民是猶无鏑銜橜䇿錣而御馯馬也鏑銜口中央鐵大如雞子中黄所制馬口也錣揣頭箴也馯馬馬也昔者神農无制今而民従无制令結䋲以治之唐虞有制令而无刑罰有制令煥乎其方文章也其政常仁義民无犯法干誅故曰无刑也夏后氏不貟言言而信也殷人誓以言語要誓亦不逮周人盟有事而會不恊而盟盟者殺牲歃血以為信也逮至當今之丗謂淮南王作此書時忍訽而輕辱貪得而寡羞欲以神農之道治之則其乱必矣伯成子高辝為諸侯而耕天下髙而伯成子髙蓋堯時人也詢讀夏后之后也今時之人辝官而隱処為郷邑之下豈可同哉古之兵弓劒而已矣槽柔无擊脩㦸无别槽柔木矛也无擊无心刃也刺鋒也桓讀領如蠐螬之螬也晚丗之兵隆衝以攻渠幨以守隆髙也衝所以臨敵城衝突壞之渠壍也一曰渠甲名也囯語曰奉文渠之甲是也憺㦥所以禦矢矣連弩以䠶銷車以連車弩通一絃以牛挽之以刃著左右為機關發之日銷車銷讀絙綃之綃也古之伐囯不殺黃口不獲二毛黄口糿也二毛有白髪於古為義於今為笑古之所以為榮者伯成子髙今之所以為辱也爲郷邑之下也古之所以為治者今之所以爲乱也夫神農伏犧不施賞罰而民不為非然而立政者不能廢法而治民不能及神農伏義舜執干戚而服有苗舜之有而叛舜執干戚而舞於雨階之間有苗服従之以德化懷來也然而征伐者不能釋甲兵而制疆暴不能及舜由此之法度者所以論民俗而節緩急也器械者因時変而制冝適夫聖人作法而万物制焉制猶従也䝨者立礼而不肖者拘焉拘猶檢也制法之民不可与逹辱拘礼之人不可使應変耳不知清濁之分者不可今調意不知治乱之源者不可令制法必有獨聞之耳獨見之明然後能擅道而行矣夫殷変夏周変殷春秋変周変改三代之礼不同何古之従大人作而弟子循循道知法治所由生則應時而変不知法治之源雖循古终乱今丗之法藉与時変礼義与俗易為斈者循先襲業據籍守舊敎以爲非此不治是猶持方柄而周貟鑿也欲得冝適致固焉則難矣今儒墨者稱三代文武而弗行是言其所不行也不能行徂言之而已非今時之丗而弗改是行其所非也稱其所是行其所非是以尽日極慮而无益於治勞形竭智而无補於主也今夫圖工好魅而憎圖狗馬者何也魅不丗岀而狗馬可日見也夫存危治乱非智不能道而先稱古雖愚有餘故不用之法聖王弗行不驗之言聖王不聽聽受天地之氣莫大於和和故能生万物和者隂陽調日夜分而生物春分而生秋分而成生之与成必得和之精精氣故聖人之道寛而栗嚴而温柔而直猛而仁言剛柔寛猛相済也太剛則折太柔則卷聖人正在剛柔之閒乃得道之本本原也積隂則沉積陽則飛隂陽相接乃能成和夫繩之為度也可卷而伸也引而伸之可直而晞晞望故聖人以身躰之躰行夫脩而不横短而不窮直而不剛乆而不志者其唯繩乎故恩推則懦懦則不威推猶移也嚴推則猛猛則不和愛推則縦縦則不令縦放刑推則虐虐則无親虐害也喜害人人无親之昔者斉簡公釋其囯家之柄而專任其大臣簡公悼公陽生之子任也一德不解曰簡大臣陳成子也將相攝威檀勢私門成黨而公道不行黨羣故使陳成田常䲭夷子皮得成其難難殺簡公之難使吕氏绝祀太公姓吕簡公其後也绝祀陳氏代之而陳氏有囯者此柔懦所生也鄭子陽剛而好罰子陽鄭君也一曰鄭相其於罰也執而无赦人有折弓者畏罪而恐誅則因猘狗之驚以殺子陽舍人家臣也囯人遂猘狗以乱擾舍人因之以殺子陽畏其嚴也此剛猛之所致也今不知道者見柔懦者侵則矜於為剛見剛者亡則矜於為柔懦此本无主於中而聞見舛馳於外者也舛乖故終身而无所定趨足安也趣㱕也譬猶不知音者之歌也濁一則欎而无轉欎湮也轉讀傳謁之傳也清之則燋而不謳燋悴也謳和也及至韓娥秦青薛談之謳三人皆善謳侯同曼聲之歌二人善歌一曰曼長憤於志積於内盈而發音則莫不比於律而和於人心何則中有夲主以定清濁不受於外而自為儀表也今夫盲者行於道人謂之左則左謂之右則右遇君子則易道遇小人則䧟溝何則目無以接物也接見故魏兩用楼翟吴起而亡西河魏文侯任楼翟吴起不用他䝨秦伐䘮其西河之地湣王專用淖齒而死于東廟湣讀没水之汶涽王田常之後代吕氏為齊侯也春秋之後號稱王淖齒楚將奔齊為臣湣王无道淖齒殺之擢其筋懸廟門之梁三日死見囯䇿也無術以御之也文王兩用吕望召公奭而王吕望太公吕尚也善用兵謀奭召康公善理民物有甘堂之歌也楚莊王專任孫叔敖而霸有術以御之也孫叔敖楚大夫薳賈伯盈子或曰童子也任其賢故致於霸也夫弦歌鼓舞以爲樂盤旋揖譲以脩禮厚葬乆喪以送死孔子之所立也而墨子非之非猶譏也兼爱上䝨右非命墨子之所立也而楊子非之兼三老五更是以兼爱選士大射是以上賢宗祀父是以右鬼右猶尊也順四時而行是以非命皆揚子所不貴故非也全性保眞不以物累形楊子之所立也而孟子非之全性保眞謂不拔骭毛以利天下弗為不以物累已身形也孟子受業於子思之門成唐虞三代之徳敘詩書孔子之意塞楊墨淫辭故非之也趨捨人異各有曉心故是非有処得其處則無非失其處則無是丹穴太蒙反踵空同大夏北戸竒肱脩股之民是非各異習俗相反丹穴南方當日下之也太蒙西方日所入処也反踵囯名其人南行武迹北向空同戴勝極下之地大夏在西方北戸在南方奇肱脩股之民在西南方凡此八者皆九州之外入寅之域者也君臣上下夫婦父子自以相使也此之是非彼之是也此之非非彼之非也此近諭諸華也彼達諭八寅也於諸華之所是八寅之所非而廢也於諸華所非八寅所是而行也譬斤斧椎鑿之各有所施也施冝禹之時以五音聽治禹顓頊後五丗鮌之子也名文命受禅成功曰禹五音宫商角徴羽也懸鍾鼓磬鐸置鞀以待四方之士爲號曰敎寡人以道者擊鼓道和隂陽鼓一声以調五音故擊之諭寡人以義者擊鍾鍾金也义者断割故擊鍾也告寡人以亊者振鐸鐸鈴金口木舌台為音声亊者非一品故振之語寡人以者擊磬磬石也声急亦急務故擊磬有獄訟者揺鞀獄亦訟訟一辨於亊故小鞀摇當此之時一饋而十起一沐而三捉髪饙者食也以勞天下之民勞猶憂也勞讀勞來之勞也此而不能逹善効忠者則才不足也當此之時不能達其善効致其忠自為无有其才也秦之時髙爲臺榭大爲苑囿逺為馳道鑄金人秦皇帝二小云年兼天下有長人見於臨洮其髙五丈足逹云只放冩其形鑄金人以象之翁仲君何是也發適戍入芻槀戍守其城也入芻槀之税以洪囯用也頭㑹箕賦輸於少府頭會隨民口数人責其秘箕賦似箕然斂人財多取意也少府官名如今司農丁壯丈夫西至臨洮狄道臨洮壟西之縣洮水出北狄道漢陽之縣是也東至㑹稽浮石㑹稽山名也浮石隨水髙下言不没自在遼西界一說㑹稽山在太山下封于太山禅於㑹稽是也㑹稽或作滄海南至豫章桂林豫章豫章郡桂林欎林郡也北至飛狐陽原飛狐蓋在代郡南飛狐山也陽原蓋在太原或曰伐郡廣昌東五阮門是也道路死人以溝量言滿溝也當此之時忠諌者謂之不祥而道仁義者謂之狂逮至髙皇帝存亡繼絕漢髙祖劉季也舉天下之大義身自執銳以爲百姓請命于室天執利兵伐無道以求百姓之命所之於皇天也當此之時天下雄㑺豪英暴露于野澤才過于入為擕百人為豪萬人為其也前矢石而後墮谿壑出百死而紿一生以爭天下之權墮入也紿至也紿碩仍代之代也武厲誠以決一旦之命當此之時豐衣博帶而道儒墨者以爲不肖言尚武也逮至暴亂已勝勝暴亂也海内大定繼文之業立武之功繼文王受命之業武王誅无道之功履天子之圖籍造劉氏之貌冠髙祖於新豐所作竹皮冠也一日委貌冠揔鄒鲁之儒墨通先聖之遺敎戴天子之旗乗大路建九斿撞大鍾擊鳴鼓奏咸池干戚周禮天子五路大路上路也王者功成作樂故撞鍾擊鼓成池黄帝楽也十楯也戚斧也春夏舞者所執當此之時有立武者見疑疑恠也一丗之間而文武代爲雌雄有時而用也今丗之為武者則非文也爲文者則非武也文武更相非而不知時丗之用也此見隅曲之一指而不知八極之廣大也隅曲室中之區隅言狹小八極八方之極言廣大也故東面而望不見西牆南面而視不覩北方唯無所嚮者則無所不通無所向則可以見四方故曰无所不通囯之所以存者道德也道德施行民說其化故囯存也家之所以亡者理塞也理道堯無百户之郭舜無植錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處周之間也地方不過百里而立爲天子者有王道也堯舜禹湯文王背王有天下孟子曰以德行仁者身王不待亦是也夏桀殷紂之盛也人跡所至舟車所通莫不爲郡縣然而身死人手爲天下者有亡形也孟子曰惡死亡楽不仁不口必死亡故曰有亡形也故聖人見化以觀其徴徵成德有昌衰風先萌焉風氣也萌見也言有盛德者謂文王也伯夷太公先見之有衰德者謂桀太史令終在及向艾先去之也故得王道者雖小必大湯武是也有亡形者雖成必敗桀紂是也夫夏之將亡太史令終古先奔於商三年而桀乃亡湯滅之也殷之將敗也太史令向藝先㱕而反益已之所以奪是趨亡之道也武王剋殷欲築宫於五行之山五行山今太行山也在河内野王縣北上黨開也周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者迴也迴迂難也廻或作固固必也使我有暴亂之行則天下之伐我難矣周公言我有暴乱之行則天下當來伐我無爲於五行之山使天下來我我者難也言其依徳不恃險也此所以三十六丗而不奪也周公可謂能持滿矣滿滿而不溢也故曰能持滿也昔者周書有言曰周史之書上言者下用也下言者上用也可否相濟上言者常也爲君常也下言者權也此存亡之術也權謀也謀度事冝不失其道也唯聖人爲能知權言而必信期而必當天下之髙行也直躬其父攘羊而子證之直躬楚葉縣人也葉公子髙謂孔子曰吾黨存直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父爲子隱子爲乆隱直在其中矣凡六畜自來而取之曰攘也尾生與婦人期而死之尾生魯人与婦人期於梁下水至弱死也直而證父信而溺死雖有直信孰能貴之夫三軍矯命過之大者也秦穆公興兵襲鄭過周而東以兵伐國不擊鼔宻声曰襲周者王城也公羊傳曰王城者河西周也今河南縣也鄭賈人髙將西敗牛道遇秦師於周鄭之閒乃矯鄭伯之命犒以十二牛賔秦師而之非君命也而稱君命曰矯酒曰嚮牛羊曰犒芬其指犒也秦師曰行千里而襲之逺主有備而師无継不如還逐還師而去也故曰之以存鄭國故事有所至信反爲過誕反爲功信爲過者尾生是誕爲功者爲是也何謂失礼而有大功昔楚恭王戰於隂陵恭王与晋厲於隂陵吕錡射於㳟王中厥因而擒之過而能改故曰暴也潘尫養由基黄衰微公孫丙相與簒之四子楚大夫晋取㳟王衰瀆䋲之維微讀枚滅之枚也恭王懼而失體威儀不如常坐不能起也黄衰微舉足蹵其體恭王乃覺怒其失礼奮體而起四大夫載而行失礼謂㪯足蹵君也昔蒼吾繞娶妻而美以讓兄此所謂忠愛而不可行者也蒼吾繞孔子時人以妻美好推与其兄於兄則爱矣而達親近曲顧之義故曰不可行也是故聖人論事之局曲直與之屈伸偃仰無常儀表時屈時伸卑弱柔如蒲韋非攝奪也剛彊猛志厲青雲非夲矜也以乗時應變也夫君臣之接屈膝卑拜以相尊礼也至其迫於患也則舉足蹵其體天下莫能非也是故忠之所在礼不足以難之也孝子之事親和顔卑體奉帶運履運正廻也至其溺也則捽其髮而拯拯升也岀溺曰拯也非敢驕侮以救其死也故溺則捽父祝則名君孟子曰嫂溺而不拯是豺狼也而况父兄乎故溺則捽之祝則名君周人以諱事神敬至也勢不得不然也此權之所設也故孔子曰可以共學矣而未可與適道也適之道仁義之善道可與適道未可以立也立德立功立言可以立未可與權權者聖人之所獨見也故忤而後合者謂之知權忤逆不合也權因事制冝權量輕重无常形勢能令醜反善合於冝適故聖人獨見之也合而後舛者謂之不知不知者善反醜矣故禮者實之華而僞之文也方於卒迫窮遽之中也則无所用矣无所用於礼也是故聖人以文交於丗而以實從事於冝不结於一迹之塗凝滯而不化是故敗亊少而成亊多號令行于天下而莫之能非矣結猶衆也猩猩知徃而不知來猩猩北方獸名人面獸身黄色礼記曰猩猩能言不离走獸見人往走則知人姓字此知徃也又嗜酒人以酒之飲而不能息不知當醉以擒其身故曰不能知來也乾鵠知來而不知往乾鵠鵲也人將有來事喜之徴則鳴且知來也知歳多風多巢扵木枝人皆探其卯故曰不知往也乾讀乾燥之乾鵠讀告退之告此脩短之分也昔者萇弘周室之執数者也萇弘周景王之人夫也数暦術天地之氣日月之行風雨之変律曆之数无所不通然而不能自知車裂而死晉范中行氏之難以畔其君也周劉氏与晉范氏丗爲婚姻萇弘事劉文公故周人助范氏至敬王二十八年晉人譲周周為殺萇弘以釋之故曰而不能自知車裂而死也蘇秦匹夫徒歩之人也靻蹻嬴蓋經營萬乗之主服諾諸侯然不能自免於車裂之患蘇秦洛陽人也嬴籝囊也蓋步蓋也蘇秦相趙趙封之為武安君初帶籝囊擔歩蓋歷說万乗之君合東山之從利病之勢无所不下使諸侯服從无有不服諾者故曰服諾諸侯不自免扵車裂之患說在詮言之篇
