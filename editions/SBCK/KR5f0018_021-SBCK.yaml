front:
  text: 徐偃王被服慈惠身行仁義陸地之朝者三十二國然而身死國亡子孫無偃王於衰亂之丗脩行仁義不設武備楚文王滅之故身死囯亡也七諫篇曰荆文悮而徐亡是也大夫種輔翼越王句踐而爲之報怨雪恥禽夫差之身開地数千里然而身伏属而死句踐計報怨於呉王夫差獲千里之地而越王終已疑之賜其属以死也属利劒也一曰長劒檦施鹿盧鋒曳地属錄而行之也此皆達於治亂之機機要也而未知全性之具者故萇知天道而不知人亊蘇秦知謀而不知禍福徐偃王知仁義而不知時大夫種知忠而不知謀不知自為身謀聖人則不然論丗而為之事權亊而為之謀是故舒之天下而不窕内之尋常而不塞不窕在大能大也八尺曰尋倍尋曰常在小能小不塞急也使天下荒亂礼義绝綱紀廢姜弱相乗力征相攘臣主无差貴賤无序甲胄生蟣虱乗加也攘平除生蟣虱不離躰也燕雀處帷幄幄幕也処猶巢也而兵不休息而乃始服属之貌謹也恭儉之禮則必滅抑而不能興矣天下安寜政教和平百姓肅睦上下相親而乃始立氣矜矜自大也奮勇力則必不免於有司之法矣是故聖人者能隂能陽能弱姜隨時而動靜因資而立功物動而知其反亊萌而察其変化則爲之象運則爲之應是以終身行而无所困故亊有可行而不可言者有可言而不可行者有易爲而難成者有難成而易敗者所謂可行而不可言者趨舍也可言而不可行者僞詐也易爲而難成者亊也難成而易敗者名也此四䇿者聖人之所獨見而留意也誳寸而伸尺聖人為之寸小尺大小枉而大直君子行之枉曲也直直其道也周公有殺弟之累誅管蔡也齊植有爭囯之名自莒先入殺子糺也然而周公以義補缺謂翼成王以致太平七年㱕政北面為臣故曰以義補缺也桓公以功滅醜立九合囯之功以滅爭囯之惡而皆為賢今以人之小過揜其大美則天下无聖王賢相矣故目中有疵不害於視不可灼也疵贅灼燃喉中有病无害於息不可鑿也鑿穿河上之丘冢不可勝数猶之為易也言河上㪯非丘壟之処有易之地猶多以大言之也以諭万亊多覆於少水激興波髙下相臨差以尋常猶之為平雖有激波猶以為平平者多也猶橘柚冬生人曰冬死者衆也薺麥夏死人曰夏生者多也昔者曹子為魯將兵三不勝亡地千里使曹子計不顧後尺不旋踵刎頸於陳中則終身為破軍擒將矣然而曹子不羞其敗恥死而无功柯之盟榆三尺之刃造桓公之胷三所亡一朝而反之勇聞于天下功立於鲁囯復攻陽之田也管仲輔公子糺而不能遂遂成不可謂智遁逃奔走不死其難不死子糺之難也不可謂勇束縛桎梏不諱其恥不可謂貞當此三行者布衣弗友人君弗臣布衣之士不以為益友也人君不以為義臣也然而管仲免於束縛之中立齊囯之政九合諸侯一匡天下使管仲岀死軀不顧後圖豈有此霸功哉今人君論其臣也不計其大功揔其略行而求小善則失賢之数也略大也小善忠也數術也故人有厚德無問其小節而有大譽无疵其小故夫牛蹏之涔不能生鱣鮪涔雨水也滿牛蹏跡中言其小也故不能生鱣鮪也鱣大鱼長大餘細鱗黄首白身知頭口在腹下鮪大魚亦長丈餘仲春二月從河西上得過龍門便為龍先師說云也而蜂房不容鵠卵房巢小形不足以包大躰也夫人之情莫不有所短誠其大略是也雖有小過不足以為累訣其實略其行其大略非也雖有閭里之行未足大㪯㪯用夫顔喙聚梁父之大盗也梁父齊邑今属太山而為齊忠臣段干木晉囯之大駔也而為文侯師駔驕怛一曰駔市儈也言魏国之大會也孟卯妻其㛐有五子焉然而相魏寧其危解其患孟卯齊人也及爲魏臣能安其危囯其勲也囯䇿曰芒卯也景陽滛酒被髪而御於婦人威服諸侯景陽楚將此四人者皆有所短然而功名不滅者其略得也略猶道也季襄陣仲子立節抗行不入洿君之朝不食亂丗之食遂餓而死季襄魯人孔子弟子陳仲子齊人孟子弟子居於陵也不能存亡接絶者何小節伸而大略屈仲用屈廢故小謹者无成功訾行者不容於衆好揜人之善楊人之短訾毀人行自獨卑藏衆人所疾而不容之也一說訾毁也行有毁缺者不為衆人所容躰大者節䟽蹠距者㪯逺䟽長也蹠足也距大也自古及今五帝三王未有能全其行者也故易曰小過亨利貞言人莫不有過而不欲其大也夫堯舜湯武丗主之隆也隆盛齊桓晉文五霸之豪英也然堯有不之名謂天下不以予子丹朱也舜有卑父之謗謂鼓叟降在庶人也湯武有放弑之亊殷湯放桀南巢周武弒紂宣室也伍伯有暴亂之謀齊桓晉文宋㐮楚莊秦穆德末能純皆有爭奪之險故曰有暴亂之謀也是故君子不責備於一人方正而不以割廉直而不以切博通而不以訾文武而不以責文武以備具而不責備於人求於一人則任以人力在其力所能任也自脩則以道德責人以人力易償也自脩以道德難為也難為則行髙矣易償則求贍矣夫夏后氏之璜不能无考半圭曰章夏后氏之珍王也考瑕釁也明月之珠不能无纇夜光之味有似月光故曰明月纇磐若之結纇也然而天下寳之者何也其小惡不足妨大美也今志人之所短而忘人之所脩而求得其賢乎天下則難矣夫百里奚之飯牛百里奚虞人也自鬻為秦養飯牛得五羖羊皮號為五羖大大也伊尹之負鼎伊尹負鼎爼調五味以干湯卒為賢相太公之鼓刀太公河内汲人有屠釣之困卒為文王佐翼武王伐紂也戚之商歌戚衛人也商旅於齊宿郭門外疾世商歌以干桓公夜出迎客聞之本以爲大田其歌曲在道應說也其美有存焉者矣衆人見其位之卑賤事之洿辱而不知其大略以爲不肖及其爲天子三公而立爲諸侯賢相乃始信於異衆也信知夫發于鼎爼之閒伊尹出于屠酤之肆肆列也謂太公吕尚也解于累紲之中累紲所以束縳人謂管仲興于牛頷之下㒷起也謂百里奚也頷讀合集之合洗之以湯沐祓之以爟火立之于夲朝之上倚之于三公之位爟火取火於日之宫也周礼司爟掌行火之正令火所以祓除不祥也立置也夲朝囯朝也内不慙於囯家外不愧於諸侯符勢有以内合内合於君故未有功而知其賢者堯之知舜功成亊立而知其賢者市人之知舜也爲是釋度数而求之於朝肆草莽之中其失人也必多矣爲上自住耳曰聦明以得賢人之故不復用度量之術取人而亟求䝨於朝四之列草莽之中失䝨人必多矣何言求䝨何則能効其求而不知其所以取人也夫物之相者丗主之所亂惑也嫌疑肖象者衆人之所眩耀牀似象也嫌疑謂白骨之肖象牙也碧盧似玉虵牀似慶蕪也故很者知而非知很者自用像有知非真知愚者仁而非仁愚者不能斷割有似於仁非眞仁也戇者勇而非勇也戇者不知畏危難有似扵勇非眞勇使人之相去也玉之與石美之與惡則論人易矣夫亂人者芎藭之与藁夲也虵牀之与麋蕪也此皆相似者言其相類但其芳臭不同猶小人類君子但其仁与不仁異也故劔工或劒之似莫邪者唯歐冶名其種歐冶良工玉工王之似碧盧者唯猗頓不失其情碧盧或云碔砆猗頓魯之冨人能知玉理不失其情也闇主亂于姦臣小人之疑君子者唯聖人能見微以知明故虵㪯首尺而脩短可知也象見其牙而大小可論也薛燭庸子見狐甲於劒而利鈍識矣薛齊邑也燭庸氏子通利劒兒易牙淄澠之水合者甞一哈水如甘苦知矣兒易牙皆齊之知味者也哈口也故聖人之論䝨也見其一行而䝨不肖分也孔子辭廩丘終不盗刀鉤廩丘齊邑今属濟隂齊景公養孔子以言未見從道未得行不欲虚禄辭而不受故不復利人刀鉤也許由讓天子終不利封侯許由隱者陽成人堯欲以天下与之洗耳而不就故曰不利於封侯也故未甞灼而不敢握火者見其有所燒也未甞傷而不敢握刀者見其有所害也由此之見者可以論未發也而小節足以知大躰矣故論人之道貴則其所㪯富則其所施窮則其所不受賤則其所不為貧則觀其所不取視其更難以知其勇動以喜樂以觀其守委以貨財以論其人振以恐懼以知其節則人情備矣古之善賞者費少而衆趙襄子行之是善罰者刑省而姦禁齊成王行之是也善予者用約而為德秦穆公行之是善取者入多而无怨齊桓公行之也趙㐮子圍於晉陽罷圍而賞有功者五人髙赫爲賞首左右曰晉陽之難赫无大功今爲賞首何也智伯求地扵趙㐮子不与智伯率韓魏以圍之三月不克趙氏之臣張孟談潜与韓魏通謀反智伯而殺之張孟談之力也故曰髙赫无大功也㐮子曰晉陽之圍寡人社稷危囯家殆羣臣无不有驕侮之心唯赫不失君臣之礼故賞一人而天下爲忠之臣者莫不終忠扵其君此賞少而善者衆也齊威王設大鼎於庭中而数瓦塩今曰子之譽曰聞吾耳察子之亊田野蕪倉廩虚囹圄實子以姦亊我者也乃烹之齊以此三十二歳道路不拾遺此刑省姦禁者也秦穆公出遊而車敗右服失馬服中失馬野人得之穆公追而及之山之陽野人方屠而食之穆公曰夫食駿馬之而不還飲酒者傷人吾恐其傷汝等徧飲而去之処一年与晉惠公爲韓之処一年者謂飲食人酒之明年也晉惠公夷吾倍秦納巳之賂秦興兵伐晉於晉也韓原也晉師圍穆公之車梁由靡扣穆公之驂獲之梁由靡晉大夫扣猶牽也將獲穆公食馬肉者三百餘人皆出死爲穆公於車下遂克晉虜惠公以歸此用約而爲得者也齊桓公將欲征伐甲兵不足令有重罪者出犀甲一㦸犀甲取其堅也㦸車㦸也長丈六尺犀或作三直出三甲也有輕罪者贖以金分輕小以金分出金隨罪輕重有分兩訟而不勝者出一束箭不勝猶不直也箭十二爲束也百姓皆說乃矯箭爲矢治箭之笄好者也鑄金而爲刃刃五刃也刀劒矛㦸矢也以伐不義而征无道遂霸天下此入多而无怨者也故聖人因民之所喜而善因民之所惡以禁姦故賞一人而天下譽之罰一人而天下畏之故至賞不費賞當賞不虚費至刑不濫刑當刑不傷善濫讀取歛之歛也孔子誅少正卯而魯囯之邪塞少正官卯其名也魯之謟人孔子相魯七日誅之於東觀之下刑不盡也子産誅鄧析而鄭囯之姦禁鄧析詭辯姦人之雄也子産誅之故姦止也傳曰鄭駟遄殺鄧析而用其竹刑鄧析制刑書之於竹鄭囯用不以人廢言也以近論逺以小知大也故聖人守約而治廣者此之謂天下莫易於為善而莫難於為不善也為言淨身无欲信仁而已愼其天性故易為不善貪欲无厭殺人自成戾其天性欲難也所謂為善者静而无為也所謂為不善者蹂而多欲也適情辭无所誘或循性保眞无変於已故曰為善易越城郭踰險塞姦符節盜管金簒弑矯誣非人之性也姦私亦盗也符節成信也而盗取之管壯籥也金印封亦所以為信也固閉藏也篡弑下謀上也矯擅作君命誣以惡覆人也皆非人夲所受天之善性也故曰為不善難今人所以犯囹圄之罪而䧟於刑戮之患者由嗜慾无厭不循度量之故也何以知其然天下縣官法曰發墓者誅竊盗者刑此執政之所司也夫法令者罔其姦邪勤率隨其蹤跡勤者問吏率大任也无愚夫惷婦皆知為姦之无脫也犯禁之不得免也然而不材子不勝其欲蒙死亡之罪而被刑戮之羞蒙冒然而立秋之後司㓂之徒継踵於門不死市之人血流於路何則惑於財利之得而蔽於死亡之患也夫今陳卒設兵兩軍相當將施令曰斬首拜爵而屈撓者要斬然而隊階之卒皆不能前遂斬首之功遂成而後被要斬之罪是去恐死而就必死也故利害之反禍福之接不可不審也事或欲之適足以失之或避之適足以就之楚人有乗而遇大風者波至而自投於水非不貪生而畏死也或於恐死而反忘生也故人之嗜慾亦猶此也齊人有盗金者當市繁之時至掇而走勒問其故曰而盗金於市中何也繁衆也勒主問吏故猶意也而汝也對曰吾不見人徒見金耳志所欲則忘其為矣是故聖人審動靜之変而適受與之度理好憎之情和喜怒之節夫動靜得則患弗過也受與適則罪弗累也好憎理則憂弗近也喜怒莭則怨弗犯也故達道之人不茍得不譲福其有弗棄非其有弗索常滿而不溢恒虚而易足虚无欲也今夫霤水足以溢壺榼而江河不能實漏巵故人心猶是也自當以道術度量食充虚衣御寒則足以養七尺之形矣无道術度量而以自儉約則万乗之勢不足以為尊天下之富不足以為樂矣諭桀與纣无道術度量不得為匹夫何尊衆之有乎孫叔敖三去令尹而无色爵禄不能累也不以爵禄累其身也荆佽非兩蛟夾繞其而志不動怪物不能驚也勇而不惑聖人心平志易精神內守物莫足以惑之夫酔者俛入城門以爲七尺之閨也超江淮以為尋常之溝也酒濁其神也法者夜見立表以為也見寢石以為虎也懼揜其氣也揜奞又況无天地之怪物乎夫雌雄相接隂陽相薄羽者為雛毛者為駒犢柔者為皮堅者為齒角人弗怪也水生蛖蜄山生金王人弗怪也老槐生火乆血為燐人弗怪也血精在地暴踏百日則為燐遥望烱烱燃火也山出嘄陽嘄陽山精也人形長大面黑色身有毛反踵見人而笑水生罔象水之精也囯語曰龍岡象也木生畢方木之精也狀如鳥青色赤脚一足不食五榖也井生墳羊土之精也魯季子穿井獲土缶其中有羊也人怪之聞見鮮而識物淺也天下之怪物聖人之所獨見利害之反覆知者之所獨明逹也同異嫌疑者丗俗之所眩惑也夫見不可布於海内聞不可明於百姓是故因神禨祥而為之立禁禨祥凶禁戒㧾形推而為之変象何以知其然也世俗言曰饗大髙者而彘為上牲大髙祖一曰上帝葬死人者裘不可以藏相戲以刃者太祖軵其肘軵擠也讀近茸急察言之枕户橉而卧者神蹠其首此皆不著於法令而聖人之所不口傳也夫饗大髙而為上性者非賢於野獸麋鹿也而神明獨饗之何也以為者家人所當畜而易得之物也故因其便以尊之裘不可以藏者非具綈綿曼帛温煖扵身也丗以為裘者難得貴賈之物也曼帛細帛也裘狐之屬也故曰貴貴之物而可傳於後丗无益於死者而足以養生故因其資以讋之資用也讋忌恐相戲以刃太祖軵其肘者夫以刃相戲必為過失過失相傷其患必大无涉血之仇爭忿而以小事自内於刑戮愚者所不知忌也故因太祖以累其心累恐枕户橉而卧神履其首者使神能化則不待户牖之行循虚而出入則亦无能履也虚孔竅也夫户牖者風氣之所從徃來而風氣者隂陽粗捔者也離者必病離遭故託神以申誡之也凡此之屬皆不可勝著於書䇿竹帛而藏扵宫府者也故以禨祥明之為愚者之不知其害乃借神之威以聲其教所由來者逺矣而愚者以為禨祥而很者以為非唯有道者能通其志今丗之井竈門户箕箒曰杵者非以其神為能饗之也恃頼其德煩之无已也是故以時見其德所以不忘其功也觸右而出膚寸而合不崇朝而雨天下者唯太山崇終也曰且至食時為終朝也赤地三年而不絶流澤及百里而潤草木者唯江河也是以天子祑而之故馬免人扵難者其死也葬之牛其死也葬以大車為薦牛馬有功猶不可忘又況人乎此聖人所以重仁襲恩襲亦重累故炎帝扵火死而為竈炎帝神農以火德王天下死託祀於竈神禹勞天下死為社勞力謂天下治水之功也託祀於后土之神后稷作稼穡而死為稷稷周弃也羿除天下之害死而為宗布此神之所以立羿古之諸侯河伯溺殺人羿射其左目風伯壞人屋室羿射中其膝又誅九嬰窫窳之屬有功於天下故死託杞於宋布祭田為宗布謂岀也一曰今人室中所禍之宋布是也或曰司命傍布也堂堯曰羿非有窮后羿北楚有任俠者其子孫数諌而止之不聽也縣有賊大搜其廬亊果發斍夜驚而走追道及之其所施德者皆為之得免而遂反語其子曰汝数止吾為俠今有難果頼而免身而諌我不可用也知所以免扵難而知所以无難論事如此豈不或哉宋人有嫁子者告其子曰嫁未必成也有如出不可不私藏私藏而富其於以復嫁易其子聽父之計竊而藏之君公知其盗也逐而去之其父不自非也而反得其計知為出藏財而不知藏財所以出也為論如此豈不勃哉今夫僦載者救一車之任極一牛之力為軸之折也有如轅軸其上以為造不知軸轅之趣軸折也楚王之佩玦而逐莬為走而破其玦也因珮兩玦以為之豫兩玦相觸破乃逾疾乱囯之治有似於此夫鴟目大而睡不䑕蚈足衆而走不虵物固有大不若小衆不若少者及至夫彊之弱弱之彊危之安在之亡也非聖人孰能之大小尊卑未足以論也唯道之在者為貴何以明之天子處於郊亭則九卿趨大夫走坐者伏者斉當此之時明堂太廟懸冠解劎緩帶而寝非郊亭大而廟堂狹小也至尊居之也天道之貴也非特天子之為尊也所在而衆仰之夫蟄蟲鵲巢皆嚮天一者至和在焉爾帝者誠能包稟道合至和則禽獸草木莫不被其澤矣而況兆民乎淮南鴻烈解卷第十三淮南鴻烈解卷第十四
