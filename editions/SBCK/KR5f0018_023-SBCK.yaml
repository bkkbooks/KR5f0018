front:
  text: 兵略訓第十五兵防也防乱之萌皆在略謀解喻至論用師之意也古之用兵非利土壌之廣而貪金玉之略略獲得也將以存亡継絶平天下之亂而除万民之害也凡有血氣之蟲含牙帶角前後距有角者觸有齒者噬有毒者螫有蹏者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也故羣居雜處分不均求不贍則爭爭則強脅弱而勇侵怯人無筋骨之強牙之利故割革而為甲鑠鐡而為刃貪昧饕餮之人殘賊天下万人慅動莫寜其所有聖人敕然而起乃討強暴平亂丗夷險除穢以濁為清以危爲寧故不得不中絶中絶謂般上中相絶滅兵之所由來者逺矣黄帝甞與炎帝矣黄帝神農之末丗也与黄帝戰於阪泉黄帝滅之顓頊甞與共工爭矣共工与顓頊爭爲帝觸不周山故黄帝戰於鹿之野黄帝与蚩尤戰於鹿鹿在上谷尭戰於丹水之浦堯以楚伯受命滅不義於丹水丹水在南陽舜伐有苗有苗三苗啓攻有扈禹之子啓伐有扈於甘甘在右扶風郡自五帝而弗能偃也又況衰丗乎夫兵者所以禁暴討亂也炎帝爲火災故黃帝擒之共工爲水害故顓頊誅之敎之以道導之以德而不聽則臨之以威武臨之威武而不從則制之以兵革故聖人之用兵也櫛髪耨苗所去者少而所利者多殺無罪之民而養無義之君害莫大焉殫天下之財而贍一人之欲禍莫深焉使夏桀殷紂有害於民而立被其患不至於爲炮烙晉厲宋康行一不義而身死國亡不至於侵奪爲暴此四君者皆有小過而莫之討也故至於攘天下攘亂害百姓肆一人之邪而長海内之禍此大論之所不取也所爲立君者以禁暴討亂也今乗万民之力而反為殘賊是爲虎傅翼曷為弗除夫畜池魚者必去猵猵之飬禽獸者也必去犲狼又況治人乎故覇王之兵以論慮之以䇿圖之以義扶之非以亡存也將以存亡也故聞敵國之君有加虐於民者則舉兵而臨其境責之以不義刺之以過行兵至其郊乃令軍師曰無伐樹木毋扣墳墓毋五榖燒母焚積聚母捕民虜母收六畜乃發號施令其國之君傲天海決獄不辜殺戮無罪此天之所以誅也民之所以仇也兵之來也以廢不義而復有徳也有逆天之道帥民之賊者身死族滅以家聽者禄以家以里聽者賞以里以郷聽者封以郷以縣聽者侯以縣剋國不及其民廢其君而易其政尊其秀士而顯其賢良振其寡恤其貧竅出其囹圄賞其有功百姓開門而待之淅米而儲之淅漬唯恐其不來也此湯武之所以致王而齊桓晉文之所以成霸也故君為無道民之思兵也旱而望雨渴而求飲夫有誰與交兵接刃乎故義兵之至也至於不戰而止晚丗之兵君雖无道莫不設渠壍傅堞而守傅守也堞城上女牆攻者非以禁暴除害也欲以侵地廣壌也是故至於伏尸流血相支以日而霸王之功不丗出者自爲之故也夫爲地戰者不能成其王爲身戰者不能立其功舉事以爲人者衆助之舉事以自爲者衆去之衆之所助雖弱必強衆之所去雖大必亡兵失道而弱得道而強將失道而拙得道而工國得道而存失道而亡所謂道者體貟而法方背隂而抱陽左柔而右剛履幽而戴明變化无常得一之原以應無方是謂神明夫貟者天也方者地也天貟而無端故不可得而觀地方而無垠故莫窺其門天化育而無形象地出長而無計量渾渾沉沉孰知其藏凡物有朕唯道無朕言萬物可朕也而道不可朕也所以無朕者以其無常勢也輪轉而無窮象日月之行春秋有代謝日月有晝夜終而復始明而復晦莫得其紀制刑而無刑故功可成物物而不物故勝而不屈刑兵之極也至於無刑可謂極之矣是故大兵無創與神通五兵不厲天下莫之敢當建鼓不出庫諸侯莫不慴㥄沮膽其處故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境内而逺方慕其德制勝於未戰而諸侯服其威内政治也古得道者静而法天地動而順日月喜怒而合四時叫呼而比雷霆音氣不戾八風詘伸不獲五度獲誤也五度五行也下至介鱗上及毛羽條脩葉貫萬物百族由夲至未莫不有序是故入小而不偪偪迫處大而不窕浸乎金石潤乎草木宇中六合振豪之末或曰宇中四宇也六合六合内莫不順比道之浸洽滒淖纎微無所不在是以勝權多也夫射儀度不得則格的不中格射之椹質也的的淮也一節不用而千里不至夫戰而不勝者非鼓之日也鼔之日謂陳兵擊鼓之日素行無刑乆矣故得道之兵車不發軔軔車不支不被鞍鼓不振塵旗不解卷卷束也甲不離矢刃不甞血朝不易位賈不去肆農不離野招義而責之大國必朝小城必下因民之欲乗民之力而爲之去残除賊也故同利相死同情相成同欲相助順道而動天下爲嚮因民而慮天下爲獵者逐禽車馳人趨各盡其力無刑罰之威而相爲斥闉要遮者斥候也闉塞也同所利也同舟而濟於江卒而遇風波百族之子捷捽招杼舡㨗疾取也左右手不以相得其憂同也故明王之用兵也爲天下除害而與萬民共享其利民之爲用猶子之爲父弟之爲兄威之所加崩山決塘敵孰敢當故善用兵者用其自爲用也不能用兵者用其爲已用也用其自爲用則天下莫不可用也用其爲已用所得者鮮矣兵有三詆爲大詆要事也治國家理境内行仁義布德立正法塞邪隧羣臣親附百姓和輯上下一心君臣同力諸侯服其威而四方懷其德脩政廟堂之上而折衝千里之外拱揖指撝而天下響應此用兵之上也地廣民衆主賢將忠國富兵強約束信號令明兩軍相當鼓錞相望錞錞于大鍾也未至兵交接刃而敵人奔亡此用兵之次也知土地之冝習險隘之利明竒政之變察行陳解贖之數維抱綰而鼓之綰貫抱係於臂以擊鼓也白刃合流矢接涉血屬腸輿死扶傷流血千里暴骸盈乃以決勝此用兵之下也今夫天下皆知事治其未而莫知務脩其本釋其根而樹其枝也夫兵之所以佐勝者衆而所以必勝者寡甲堅兵利車固馬良畜積給足士卒殷軫殷衆軫乗輪多盛㒵此軍之大資也而勝亡焉明於星辰日月之運刑德竒賌之數竒賌隂陽竒祕之要非常術背郷左右之便此戰之助也而全亡焉良將之所以必勝者有不原之智不遒之道難以衆同也夫論除謹論除爲賢除吏謹愼也動静時吏卒辨兵甲治正行五連行伯明鼓旗此尉之官軍尉所以尉鎭衆也前後刑不足以爲威爲存政者雖小必存爲亡政者雖大必亡昔者楚人地南卷沅湘卷屈取也沅湘二水名北繞潁泗潁泗二水名也西包巴蜀東裹郯淮巴蜀郯淮地名潁汝以爲洫洫溝江漢以爲池垣之以鄧林鄧林沔水上險緜之以方城綿落也方城楚北塞也在南陽葉也山髙尋雲谿肆無景四極也極溪之深不見景地利形便卒民勇敢蛟革犀兕以爲甲冑脩鎩短鏦鎩小矛也齊爲前行積弩陪後積弩連弩錯車衞旁疾如錐矢錐金蔟箭羽之矢也合如雷電解如風雨然而兵殆於垂沙垂沙地谷衆破於栢舉楚國之強大地計衆中分天下然懷王北畏孟甞君脅於斉也背社稷之守而委身強秦懷王入秦秦留之藍田也兵挫地削身死不還二丗皇帝二世秦始皇少年胡亥也勢爲天子富有天下人迹所至舟檝所通莫不爲郡縣然縱耳目之欲窮侈靡之変不顧百姓之飢寒窮匱也興萬乗之駕而作阿房之官阿房地名秦所築也發閭左之戌秦皆發閭左民未及發而秦亡也收太半之賦賈民之三而稅二百姓之隨逮肆刑挽輅首路死者隨逮應召也肆刑極刑輅輓輦横木也一旦不知千萬之數天下敖然焦熱傾然苦烈上下不相寧吏民不相憀憀頼戌卒陳勝興於大澤壌臂右陳勝字涉汝隂人也大澤沛蘄縣袒右脫右臂衣也稱爲大楚而天下響應當此之時非有牢甲利兵勁弩強衝也伐而爲矝棗酸也矝矛柄同周錐鑿而爲刃周内也然矝以内鑚鑿也剡摲筡奮儋钁摲剡銳也钁斫也以當脩㦸強弩攻城略地莫不降下天下爲之糜沸螘動雲徹席卷方数千里勢位至賤而器械甚不利然一人唱而天下應之者積怨在於民也武王伐紂東面而迎歲太在寅至汜而水汜之名也水有大雨水也至共頭而墜共頭山名在河曲共山墜隕也彗星出而授殷人其柄時有彗星柄在東方可以掃西人也當戰之時十日亂於上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢拔而天下傳矣是故善守者無與御而善戰者無與明於禁舍開塞之道乗時勢因民欲而取天下故善爲政者積其德善用兵者畜其怒德積而民可用怒畜而威可立也故文之所以加者淺則勢之所勝者小德之所施者博則威之所制者廣威之所制者廣則我強而敵弱矣故善用兵者先弱敵而後戰者也故費不半而功自倍也湯之地方七十里而王者脩德也智伯有千里之以而亡者窮武也故千乗之國行文徳者王萬乗之國好用兵者亡故全兵先勝而後戰德先勝之而後乃湯武是也敗兵先而後求勝德均則衆者寡力敵則智者勝愚者侔則有數者禽無數侔等凡用兵者必先自廟戰主孰賢將孰能民孰附國孰治蓄積孰多士卒孰精甲兵孰利器備孰便故運籌於廟堂之上而決勝乎千里之外矣夫有形埒者天下訟見之有篇籍者世人傳學之丗此皆以形相勝者也善形者弗法也所貴道者貴其无形也無形則不可制迫不可度量也不可巧計也不可規慮也智見者人爲之謀形見者人爲之功衆見者人爲之伏器見者人爲之備動作周還倨句詘伸可巧詐者皆非善者也善者之動也神出而行星耀而遂進退詘伸不見朕整鸞舉麟振鳳飛龍騰發如秋風疾如駭龍龍魚也飛之疾者也當以生繫死以盛乗衰以疾掩遟以飽制飢以水滅火若以湯沃雪何徃而不遂何之而不用達在中虚神在外漠志運於無形出於不意與飄飄徃與忽忽來莫知其所之與條出與間入莫知其所集卒如雷霆疾如風雨從地出從天下獨出獨入莫能應圉疾如鏃矢何可勝偶一晦一明孰知其端緒未見其發固已至矣故善用兵者見敵之虛乗而勿假也追而勿舍也迫而勿去也擊其猶猶陵其與與疾雷不及塞耳用疾雷之聲不暇復塞耳疾霆不暇揜目善用兵若聲之與響若鏜之與鞈鞈鞞聲眯不給撫呼不給吸當此之時仰不見天俯不見地手不麾戈兵不盡拔擊之雷薄之風炎之若火陵之波敵之静不知其所守動不知其所爲故鼓鳴旗麾當者莫不廢滯崩阤天下孰敢厲威抗節而當其前者故淩人者勝待人者敗爲人杓者死杓所撃也兵靜則固專一則威分决則勇心疑則北力分則弱故能分人之兵疑人之心則錙銖有餘不能分人之兵疑人之心則數倍不足故紂之卒百萬之心武王之卒三千人皆專而一故千人同心則得千人力萬人異心則無一人之用將卒吏民動靜如身乃可以應敵合戰故計定而發分決而動將無疑謀卒無二心動無堕容已無虚言事無甞試應敵必敵發動必亟故將以民爲體而民以將爲心心誠則肢體親刃心疑則肢體撓北心不專一則體不節動將不誠必則卒不勇敢故良將之卒虎之牙兕之角鳥之羽蚈之足蚈馬蠸也可以行可以舉可以噬可以觸強而不相敗衆而不相害一心以使之也故民誠從其令雖少無畏民不從令雖衆爲寡故下不親上其心不用卒不畏將其刑不戰守有必固而攻有必勝不待交兵接刃而存亡之機固以形矣兵有三勢有二權有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲加雷霆誠積踰而威加敵人此謂氣勢硤路津關大山名塞龍虵蟠蟠冕屈也笠居偃覆也笠登羊腸道羊腸一屈一伸發笱門發笱竹笱所以捕鱼其門可入而不得出一人守隘而千人弗敢過也此謂地勢因其勞倦怠亂飢渇凍暍推其摿摿擠其掲揭擠排也摿摿欲卧也揭揭欲拔也此謂因勢善用間諜人渾之反間也審錯規慮設蔚施伏草木盛日蔚隱匿其形出於不意敵人之兵無所適備此謂知權陳卒正前行選進退俱什伍摶前後不相撚撚揉蹈也左右不相干受刃者少傷敵者衆此謂事權權勢必形吏卒專精選良用才官得其人計定謀決明於死生舉錯得失莫不振驚故攻不待衝隆雲梯而城㧞雲梯可依雲而立所以瞰敵之城中戰不至交兵接刃而敵破明於必勝之攻也故兵不必勝不苟接刃攻不必取不爲苟發故勝定而後戰鈐縣而後動故衆聚而不虛散兵出而不徒歸唯無一動无且動則淩天振地扤泰山蕩四海神移徙鳥獸驚駭如此則野无校兵敵家之兵不來相交復也國無守城矣静以合躁治以持亂無形而制有形無爲而應變雖未能得勝於敵敵不可得勝之道也敵先我動則是見其形也彼躁我静則是罷其力也形見則勝可制也力罷則威可立也視其所爲因與之化觀其邪正以制其命餌之以所欲以罷其足彼有間急塡其極其變而束之盡其節而朴之敵反靜爲之出竒彼不吾應獨盡其調言我盡之調以待敵也動而應有見所爲彼持後節彼謂敵持後節敵在後使失已與之推移彼有所積必有所虧精轉左䧟其右陂右陂西也敵潰而走後必可移敵迫而不動名之曰奄遟擊之如雷霆斬之草木燿之火電欲疾以遫人不及歩鋗車不及轉轂兵如植木弩如羊角人雖衆多勢莫敢格諸有象者莫不可勝也諸有形者莫不可應也是以聖人藏形於无而逰心於虚風雨可障蔽而寒暑不可開閉以其无形故也夫能滑淖精微貫金石窮至逺放乎九天之上放蟠乎黃盧之下唯无形者也善用兵者當擊其亂不攻其治不襲堂堂之㓂下擊塡塡之旗塡塡旗立牢端容未可見以數相持彼有死形因而制之敵人執數動則就隂以虚應實必爲之禽虎豹之動不入䧟阱麋鹿不動不離罘飛鳥不動不絓罔羅魚鼈不動不擐脣啄物未有不以動而制者也是故聖人貴静靜則能應躁後則能應先數則能勝䟽博則能禽缺故良將之用卒也同其心一其力勇者不得獨進怯者不得獨退止如丘山發如風雨所淩必破靡不毀沮動如一體莫之應圉是故傷敵者衆而手戰者寡矣夫五指之更彈不捲手之一挃挃擣也萬人之更進更代也不如百人之俱至也今夫虎豹便㨗熊羆多力然而人食其而席其革者不能通其知而壹其力也夫水勢勝火章華之臺燒章華楚之髙臺以升勺沃而救之雖涸井而竭池無奈之何也舉壺㯼盆盎而以灌之其滅可立而待也今人之與人非有水火之勝也而欲以少耦衆不能成其功亦明矣兵家或言曰少可以耦衆此言之所將非言所戰也或將衆而用寡者勢不齊也勢不齊土不同力也將寡而用衆者用力諧也乃人盡其才悉用其力以少勝衆者自古及今未甞聞也神莫貴於天勢莫便於地動莫急於時用莫利於人凡此四者兵之幹植也然必待道而後行可一用也夫地利勝天時巧舉勝地利勢勝人故任天者可迷也任地者可束也任時者可迫也任人者可惑也夫仁勇信廉人之美才也然勇者可誘也仁者可奪也信者易欺也廉者易謀也將衆者有一見焉則爲人禽矣由此觀之則兵以道理制勝而不以人才之賢亦自明矣是故爲麋鹿者則可以罘設也麋鹿有兵而不能以間无術之軍也爲魚鼈者則可以罔取也魚鼈之兵散而不集爲鴻鵠者則可以矰繳加也鴻鵠之兵髙而无被唯無形者無可佘也是故聖人藏於無原故其情不可得而觀運於無形故其陳不可得而經无法無儀來而爲之冝無名無變而爲之象深哉睭睭逺哉悠悠且冬且夏且春且秋上窮至髙之未下測至深之底變化消息无所疑滯建心乎窈之野而藏志乎九旋之淵九旋九廻之淵至深者也雖有明目孰能窺其情兵之所隠議者天道也所圖者地形也所明言者人事也所以決勝者鈐勢也故上將之用兵也上得天道下得地利中得人心乃行之以機發之以勢是以無破軍敗兵及至中將上不知天道下不知地利專用人與勢雖未必能萬全勝鈐必多矣下將之用兵也博聞而自亂多知而自疑居則恐懼發則猶豫是以動爲人禽矣今使兩人接刃巧拙不異而勇士必勝者何也其行之誠也夫以巨斧擊桐薪不待利時良日而後破之加巨斧於桐薪之上而无人刃之奉雖順招挾刑德招揺斗杓也刑十二辰也德十日也而弗能破者以其无勢也故水激則矢激則逺夫栝淇衞箘簵栝翦也淇衛箘簵箭之所出也載以銀錫載飾也飾箭以銀雖有薄縞之幨縞網繒也腐荷之矰荷蓮華也矰猶矢也然猶不能獨䠶也假之筋角之力弓弩之勢則貫兕甲而徑於革盾矣夫風之疾至於飛屋折木虚舉之下大逹自上髙丘虚舉不駕也風疾飛之下大遲復上髙丘也人之有所推也是故善用兵者勢如決積水於千仞之隄轉貟石於萬丈之谿天下見吾兵之必用也則孰敢與我戰者故百人之必死也䝨於万人之必北也況以三軍之衆赴水火而不還踵乎雖誂合刃於天下誰敢在於上者誂卒也雖卒然合與天下爭人誰敢在其上者所謂天數者左青龍右白虎前朱鳥後武角亢爲青龍參伐爲日虎星張爲朱鳥斗牛爲武用兵者右參伐左魯亢背斗牛郷星張此順北斗之銓衡也所謂地利者後生而前死左牡而右牝髙者爲生下者爲死丘陵爲牡谿谷爲牝所謂人事者慶賞信而刑罰必動静時舉錯疾此丗傳之所以爲儀表者因也然而非所以生儀表者因時而變化者也是故處於堂上之隂而知日月之次序見瓶中之冰而知天下之寒暑夫物之所以相形者微唯聖人達其至故鼔不與於五音而爲五音主水不與於五味而爲五味調將軍不與於五官之事而爲五官督故能調五音者不與五音者也能調五味者不與五味者也能治五官之事者不可揆度者也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正於冬也因形而與之化隨時而與之移夫景不爲曲物直響不爲清音濁觀彼之所以來名以其勝應之是故扶義而動推理而行掩節而斷割掩覆也復其節制斷割也因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走夫飛鳥之摰也俛其首猛獸之攫也匿其爪虎豹不水其爪而噬不見齒故用兵之道示之以柔而迎之以剛示之以弱而乗之以強爲之以歙而應之以張將欲西而示之以東先忤而後合前而後明之無迹水之無創故所郷非所之也所見非所謀也舉措動靜莫能識也雷之擊不可為備所用不復故勝可百全與明通莫知其門是謂至神兵之所以強者民也民之所以必死者義也義之所以能行者威也是故合之以文齊之以武是謂必取威儀並行是謂至強夫人之所樂者生也而所憎者死也然而髙城深池矢石雨平原廣澤白刃交接而卒爭先合者彼非輕死而楽傷也爲其賞信而罰明也是故上視下如子則下視上如父土視下如弟則下視上如兄上視下如子則必王四海下視上如父則必正天下上親下如弟則不難爲之死下事上如兄則不難爲之亡是故父子兄弟之㓂不可與者積恩先施也故四馬不調造父不能以致逺弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武吴三闔閭之將軍也是故内脩其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死歸故將必與卒同甘苦俟飢寒故其死可得而盡也故古之善將者必以其身先之暑不張蓋寒不被裘所以程寒暑也險隘不乗士陵必下所以齊勞佚也軍食熟然後敢食軍井通而後敢飲所以司飢渴也合戰必立矢射之所及以共安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民爲之勞也欲民爲之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民以償其二積而上失其三望國雖大人雖衆兵猶且弱也者必得其樂勞者必得其利斬首之功必全死事之後必賞死事以軍事賞其後子孫死四者旣信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鍾竽敦六博敦者致也投髙壺兵猶且強令猶且行也是故上足仰則下可用也德足慕則威可立也將者必有三隧四義五行十守所謂三隧者上知天道下習地形中察人情凡此三事者人所從蹊隧所謂四義者便囯不兵負程爲主不顧身見難不畏死決疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可陵也所謂十守者神清而不可濁也謀逺而不可慕也操固而不可遷也知明而不可蔽也不食於貨不於物不嚂於辯不推於方不可喜也不可怒也是謂至於窈窈㝠㝠孰知其情發必中詮言必合數動必順時解必中揍揍理通動静之機明開塞之節審舉措之利害合符節疾如瀇弩勢如發矢一龍一地動无常體莫見其所中莫知其所窮攻則不可守守則不可攻蓋間善用兵者必先脩諸已而後求諸人先爲不可勝而後求勝脩已於人求勝於敵已未能治也而攻人之亂是猶以火救火以水應水也何所能制今使陶人化而爲埴則不能成盆盎陶人化爲埴陶人復変為埴土不能作埴土也工女化而爲絲則不能織文錦同莫足以相治也故以異爲竒兩爵相與未有死者也鸇鷹至則爲之解以其異也故静爲躁竒有出於人治爲亂竒飽爲飢竒佚爲勞竒竒正之相應水火金木之代爲雌雄也善用兵者持五殺以應五殺五行故能全其勝拙者處五死以貪故動而爲人擒兵貴謀之不測也形之隱匿也出於不意不可以設備也謀見則窮形見則制故善用兵者上隱之天下隱之地中隱之人隱之天者无不制也何謂隱之天大寒甚暑疾風雨大霧晦因此而爲變者也何謂隱之地山陵丘阜林叢險怛可以伏匿而不見形者也何謂隱之人蔽之於前望之於後出竒行陳之間發如雷霆疾如風雨巨旗卷取也止鳴鼔而出入无形莫知其端緒者也故前後正齊四方如繩出入解贖不相越淩翼輕邊利翼軍之翼在边而利或前或後離合散聚不失行伍此善脩行陳者也明於音正賌隂陽刑德五行望氣候星䇿機祥此善爲天道者也設規慮施蔚伏見用水火出珍怪鼓譟軍所以營其耳也曵梢肆柴塵起堨梢小柴也堨埃所以營其目者此善爲詐祥者也錞鉞牢重固植而難恐勢利不能誘死亡不能動此善爲充榦者也充盈榦強剽疾輕悍勇敢輕敵疾滅没此善用輕出竒者也相地形處次治壁壘審煙斥居髙陵舍出處此善爲地者也因其飢渇凁暍勞倦怠亂恐懼窘歩乗之以選卒擊之以宵夜此善因時應變者也易則用車易平地也險則用涉水多弓水中不可引弩故以弓便隘則用弩隘可以手弩以為距晝則多旌夜則多火晦㝠多鼓此善爲設施者也凡此八者不可一无也然而非兵之貴者也夫將者必獨見獨知獨見者見人所不見也獨知者知人所不知也見人所不見謂之明知人所不知謂之神明者先勝者也先勝者守不可攻戰不可勝者攻不可守虛實是也上下有將吏不相得所持不直卒心積不服積怨不服之也所謂虛也主明將良上下同心氣意俱起所謂實也以水投火所當者䧟所薄者移牢柔不相通而勝相竒者虛實之謂也故善戰者不在少善守者不在小勝在得威敗在失氣夫實則虛則走盛則強衰則北吴王夫差地方二千里帶甲士十萬南與越戰棲之㑹稽北與齊戰破之艾陵西遇晉公擒之黄池智公謂平俟也擒晉服晉此用民氣之實也其後驕溢縱欲距諌喜訷憢悍遂過憢勇急也不可正喻大臣怨懟百姓不附越王選卒三千人擒之于隧因制其虛也夫氣之有虚實也明之必晦也故勝兵者非常實也敢兵者非常虛也善者能實其民氣以待人之虛也不能者虚其民氣以待人之實也故虛實之氣兵之䝿者也凡囯有難君自宮召將詔之日社稷之命在將軍耳今囯有難願請子將而應之將軍受命乃令祝史太卜齊三日之太廟鑚靈卜吉日以受鼔旗君入廟門西面而立將入廟門趨至堂下北面而立主親操鉞持頭授將軍其柄曰從此上至天者將軍制之復操斧持頭授將軍其柄曰從此下至淵者將軍制之將已受斧荅曰囯不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣旣以受制於前矣鼓旗斧鉞之威臣无還請願君亦以垂一言之命於臣也君不許臣不敢將君許之臣辭而行乃爪鬋鬋爪送終之礼去手足爪設明衣也明衣喪衣也在於闇㝠故言明鑿凶門而出凶門北出門也將軍之出以喪礼處之以其必死也乗將軍車載旌旗斧鉞累君不勝其臨敵決戰不顧必死无有二心是故无天於上无地於下无敵於前无主於後進不求名退不避罪唯民是保利合於主囯之實也上將之道也如此則智者爲之慮勇者爲之氣厲青雲疾如馳騖是故兵未交接而敵人恐懼戰勝敵奔畢受功賞吏遷官益爵禄割地而爲調決於封外卒論斷於軍中言有罪而誅顧反於囯放旗以入斧報畢於君曰軍无後治乃縞素辟舍請罪於君君曰赦之退齊服大勝三年反大勝敵者還三年乃反故舍也中勝二年下勝期年兵之所加者必无道之囯也故能戰勝而不報取地而不反民不疾疫將不天死五榖豐昌風雨時節戰勝於外福生於内是故名必成而後无餘害矣淮南鴻烈解卷第十五淮南鴻烈解卷第十六
