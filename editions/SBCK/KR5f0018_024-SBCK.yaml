front:
  text: 說山訓第十六山爲道夲仁者所処說道之旨委積山故曰說山因以題篇魄問於魂曰道何以爲體魄人隂神也魂人陽神也隂道祖於陽故魄問魂道以何等形體也曰以無有爲體道无形以无有爲體也魄曰無有有形乎魂曰無有何得而聞也言无有狀何以可得而知也魂曰吾直有所遇之耳言遇遭遇知之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也似道而非道也魄曰吾聞得之矣得猶知也乃内視而自反也魂曰凡得道者形不可得而見名不可得而揚揚猶稱也或作象也今汝巳有形名矣何道之所能乎魄曰言者獨何爲者魄謂魂曰子尚无形何故有言吾將反吾宗矣宗夲也魄言將反於无有魄反顧魂忽然不見不見魂也反而自存亦以淪於無形矣魂反而自存亦以入於无形之中矣形或作有也人不小學不大迷小斈不博不能通道故大迷也不小慧不大愚小慧不能通物故大愚也人莫鑑於沬雨而鑑於澄水者以其休止不蕩也沫雨雨潦上覆瓮也澄止水也蕩動也沬雨或作流潦詹公之釣千歳之鯉不能避詹公詹何也古得道善釣者有精之術故得千歳之鯉也曽子攀柩車引輴者爲之止也曾子至孝送親喪悲哀攀援柩車而輓者感之爲之止輴棺下輪者輴讀若牛行輴輴之輴也老母行歌而動申喜精之至也中喜楚人也少亡其母聞乞人行歌声感而出視之則其母故曰精之至瓠巴鼓瑟而淫魚出聽巴楚人也善鼓瑟淫魚喜音出頭於水而聽之淫魚長頭身相半長丈餘正白身正黒口在頷下似鬲獄魚而魚无鱗出江中也百牙鼓琴而駟馬仰秣仰秣仰頭久吐謂馬笑也介子歌龍蛇而文君垂泣介子介推也从晉文公重耳出奔翟遭難絶粮介子推割肌㗖之公子復国賞從亡者子推獨不位故歌曰有龍矯矯而失其所有蛇從之而啖其口龍旣升雲蛇獨泥処龍以喻文公也蛇以自喻也於是文公斍悟求介子推不得而号泣之故玉在山而草木潤五陽中之隂也故能潤澤草木淵生珠而岸不枯珠隂中之陽也有光明故岸不枯也螾無筋骨之強爪牙之利螾一名蜷也上食晞堁下飲黄泉用
