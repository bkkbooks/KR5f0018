body:
  text: 一也晞乾也堁土塵也楚人謂之堁也一精專也清之爲明杯水見牟子濁之爲闇河水不見太山視日者聽雷者聲人無爲則治有爲則傷道貴无爲故治也有爲則傷道不貴有爲也故治有爲者傷傷猶病也無爲而治者載無也言无爲而能致治者常載行其无爲爲者不能有也爲者有爲也有謂好憎情欲不能恬憺靜漢故曰不能无爲不能無爲者不能有爲也不能行清靜無爲者不能大有所致其治立其功也故曰不能有爲也人無言而神无言者道不言也道能化故神也有言者則傷道不貴言故言有傷無言而神者載無道貴无言能致於神載行也常行其无言也有言則傷其神之神者道賤有言而多反有言故自傷其神之所以息耳之所以聽終以其無用者爲用矣无用者謂耳中空処也物莫不因其所有而用其所無以其所无用爲用也以爲不信視與竽三孔籥也以其官孔空処以成音也故曰視與竽也念慮者不得卧詩曰耿耿不寐如有殷又日辰轉伏枕寤寤永歎止念慮則有爲其所止矣止猶去也強自抑去念慮非眞眞无念慮則與物所止矣兩者俱亡則至德約矣兩者念慮與強不念慮也忘二者則神内守故至德純一也聖人終身言治所用者非其言也用所以言也非其言非其所常言也用所以言者用當所治之言歌者有詩然使人善之者非其詩也善之者善其音之清和也不善其詩故曰非其詩也鸚鵡能言而不可使長鸚鵡鳥名出扵蜀郡赤喙者是其色縹緑能効人言長主也是何則得其所言而不得其所以言得其言者知効人言也不知所以長言敎令之言故曰不得其所以言也故循迹者非能生迹者也循隨也隨人故迹不能創基造制自爲新迹如鸎䳇知効人言不能自爲長主之言也神蛇能断而復續而不能使人勿断也神能見夢元王而不能自出漁者之籠宋元王夜夢見得神而未獲也漁者豫且捕魚得以獻元王元王剥以故曰能見夢元王而不能自出漁者之籠也四方皆道之門戸牖嚮也在所從闚之故釣可以敎可以敎御御可以教刺舟此四術者皆謹敬加順其道故可以相敎越人學逺射天而發適在五歩之内越人習水便舟而不知射射逺反直仰向天而發矢尽而還故近在五歩之内叅猶望也不易儀儀射先也言不曉射故不知易去天之法也丗已変矣而守其故譬猶越人之䠶也言其守故不知变也月望日奪其光隂不可以乗陽也月十五日与日相望東西中繩則月食故奪月光也羗則虧至晦則尽故曰隂不可以乘陽也日出星不見不能與之爭光也星隂也不能奪日之光也故末不可以強於本指不可以大於臂下輕上重其覆必易一淵不兩鮫鮫魚之長其皮有珠今世以爲刀劒之口是也一說魚二千斤爲鮫水定則清正動則失平故惟不動則所以無不動也江河所以長百谷者能下之也夫惟能下之是以上之上大也天下莫相憎於膠漆膠漆相持不解故曰相憎一說膠入漆中則敗漆入膠亦敗以多少推之故曰相憎也而莫相愛於冰炭氷得炭則解歸小復其性炭得氷則保其炭故曰相愛膠漆相賊氷炭相息也牆之壊愈其立也壞反夲還為土故曰愈其立也氷之泮愈其凝也以其反宗泮釋反水也宗夲也泰山之容巍巍然髙容刑去之千里不見埵堁逺之故也埵堁猶席翳也埵讀似望作江淮聞人言能得耳秋毫之末淪於不測是故小不可以為内者大不可爲外矣小不可為内復小於秋豪之末謂无有也无有无形者至大不可為外也蘭生幽宫不爲莫服而不芳性香舟在江海不爲莫乗而不浮性淨君子行義不爲莫知而止休性仁義也夫王潤澤而有光其聲舒舒緩也揚和也涣乎其有似也以君子也渙讀人謂冨貴家為主之也無内無外不匿瑕穢无内无外表裏通也匿藏也近之而濡望之而隧夫照鏡見眸子微察秋毫明照晦故和氏之璧隨侯之珠出於山淵之精君子服之順祥以安寧服佩也君子佩而象之无有情欲能順善以安其身也侯王寳之爲天下正寳重也侯王重其天性若凡民之重珠玉故可以為天下正无所阿私也陳成子之劫子淵捷也陳成子將殺齊簡公使勇士十六人脅其大夫子淵㨗欲與分囯㨗不从故曰劫之也子罕之辭其所不欲不欲玉之宝也而得其所欲所欲不貪爲宝孔子之見黏蝉者白公勝之倒杖䇿也倒杖䇿傷其頥血流及屦而不斍言精有所在也衞姫之請罪於桓公衛姬衛女齊桓公夫人也桓公有伐衛之志衛姫望見桓公色而知之故請公殺贖衛之罪也子見子夏曰何肥也道勝无情欲故肥也魏文侯見之反披裘而負芻也知其皮尽則毛无所傅也皃說之為宋王解閉結也結不可解者而能解之解之以不解此皆微眇可以論者微眇謂見始知終也人有嫁其子而敎之曰爾行矣愼無為善曰不為善將為不善邪應之曰善且由弗為况不善乎此全其天器者器猶性也孟子曰人性善故曰全其天性拘囹圄者以日爲脩當死市者以日爲短日之脩短有度也有所在而短有所在而脩也則中不平也中心故以不平爲平者其平不平也嫁女於病消者夫死則後難復処也以女為妨夫後人不敢娶故難復嫁処也一說女以天下人皆消不肯復嫁之也故沮舎之下不可以坐沮舍壊也墻之傍不可以立爲踣也執獄牢者無病執主也厲畏之故不病罪當死者澤計決心之无外思一說治當死者罪已定无憂故肥澤也刑者多壽心無累也刑者宫人也心无情欲之累精神不耗故多壽良醫者常治無病之病故無病治正性神内守故无病也聖人者常治無患之患故無患也治也夫至巧不用劒巧在心手故不用劒善閉者不用關楗善閉其心閉其心故不關揵也淳于髠之告失火者此其淳于髠齊人也告其鄰突將失火使曲突徙薪鄰人不從後竟失火言者不為功救火者焦頭爛額為上客溂不備豫喻凡人不知䂊閉其情欲而恩得人救其禍以清入濁必困辱以濁入清必覆傾君子之於善也猶采薪者見一介掇之見青葱則拔之言无所舍也君子行善亦如之天二氣則成虹地二氣則泄藏隂陽相于二氣也人二氣則成病邪氣千正義故成病隂陽不能且冬且夏隂不能陽陽不能隂冬自為冬夏自為夏也月不知晝日不知夜言不能相兼也善䠶者發不失的善於䠶矣而不善所䠶所䠶者死故曰不善善釣者無所失善於釣矣而不善所釣所釣者魚也於魚不善也故有所善則有不善矣鍾之與磬也近之則鍾音充充大逺之則磬音章磬石也音清明逺聞而章著物固有近不逺逮不如近者今曰稻生於水而不能生於湍瀬之流湍急水也紫芝生於山而不能生於盤石之上根无所植慈石能引鐡及其於銅則不行也行猶使也不能使隨也水廣者魚大山髙者木脩廣其地而薄其德譬猶陶人爲器也揲挺其土而不益厚破乃愈疾愈益也疾速也揲讀揲脉之揲聖人不先風吹不先雷毀不得已而動故無累月盛衰於上則蠃蛖應於下同氣相動動感不可以爲逺月盛則嬴蛖内减故曰蠃蛖應於下月隂精也蠃蛖亦隂也故曰同氣也雖能相感故曰不可為逺執彈而招鳥揮挩而呼狗欲致之顧反走故魚不可以無餌釣也獸不可以虛器召也召猶致也剥牛皮鞹以爲鼓正三軍之衆然爲牛計者不服於軛也狐白之裘天子被之而坐廟堂然爲狐計者不走於澤言物貴於生也亡羊而得牛則莫不利也断指而免頭則莫不利爲也故人之情於利之中則爭取大焉於害之中則爭取小焉將軍不敢白馬爲見識者一說曰凶服故不敢也傳曰晉㐮公与姜戎子衰敗素師於郩言其变凶服也故不敢白馬也亡者不敢夜揭炬爲人見之保者不敢畜噬㺃保城郭居也保饒人也不敢畜噬人㺃也雞知將旦鶴知夜半而不免於鼎爼鸛夜半而鳴也以无知謀不能免於鼎爼以喻將軍當兼五材不可以无權譎山有猛獸林木爲之不斬園有螫蟲藜藿爲之不采言人畏也爲儒而踞里閭儒尚礼義踞里閭非也爲墨而朝吹竽道尚儉不好楽縣名朝歌子不入吹竽非也欲滅迹而走雪中拯溺者而欲無濡是非所行而行所非今夫闇飲者非甞不遺飲也使之自以平則雖愚無失矣是故不同于和而可以成事者天下無之矣和猶適也求美則不得不求美則美矣已自求美名則不得美名也而自損則有美名矣故老子曰数輿无輿也求醜則不得醜求不醜則有醜矣不求美又不求醜則無美無醜矣是謂同天也天无所求也人能尢所求故以之同也申徒狄負石自沉於淵而溺者不可以爲抗中徒狄殷末人也不忍見紂乱故有沉於淵抗髙也髙誕而存鄭誕者不可以爲常事有一應而不可循行髙矯鄭伯之命以十二牛犒秦師而之故曰誕而存鄭誕非正也故曰不可以爲常也人有多言者猶百舌之聲百舌鳥名也能易其舌効百鳥之声故曰百舌也以喻人雖事多言无益於事人有少言者猶不脂之戸也言其不鳴故不脂之喻无声也一說不脂之戸難開閉亦喻人少言語也六畜生多耳目者不詳䜟書著之祥善也多耳目人以為妖哭也喻人有多言而少誠實此之於不祥也百人抗浮不一人挈而趨抗㪯也浮也百人共㪯不如一人持之走便也物固有衆而不少者引車者二六而後之轅三人兩轅六人故謂二六一說十二人事固有相待而成者兩人俱溺不能相拯一人處陸則可矣故同不可相治必待異而後成同謂君所謂可臣亦曰可君所謂否臣亦曰否猶以水済水誰能食之是謂同故不以相治異謂齊君之可替君之否引之當道是謂異也故可以成事也千年之松下有茯苓上有兎絲茯苓千歳松脂也絲生其上而无根一名女蘿也上有叢蓍下有伏聖人從外知內以見知隱也喜武非俠也俠輕喜文非儒也好方非醫也好馬非騶也知音非瞽也知味非庖也此有一槩而未得主名也此六術者皆善之而未純无所適名故曰一槩而未得主名被甲者非爲十歩之内也百步之外則爭深淺深則逹五藏淺則至膚而止矣死生相去不可爲道里言相遠矣楚王亡其猨而林木爲之残楚王莊王旅也猨捷躁依木而処故殘林以求之宋君亡其珠池中魚爲之殫殫尽故澤失火而林憂憂見及也上求材臣殘木上求魚臣乾谷上求揖而下致舩上言絲下言綸綸大繳也上有一善下有二譽上有三衰下有九殺衰殺皆喻踰也傳曰上之所好下尤甚焉故有九殺也大夫種知所以強越而不知所以存身自為越所殺也萇弘知周之所存而不知身所以亡亡為周所殺也知逺而不知近逺謂強越存周也近謂其身也畏馬之辟也不敢辟旁懼車之覆也不敢乗是以虛禍距公利也虚空不孝弟者或詈父母生子者所不能任其必孝也然猶養而長之任保范氏之敗有竊其鍾而走者范氏范吉射范㑹之孫范鞅献子之子昭子也敗者趙簡子伐之故人切其鍾也一曰知伯滅范氏也鎗然有聲懼人聞之遽掩其耳憎人聞之可也自掩其耳悖矣悖惑升之不能大於石也升在石之中夜之不能脩於歲也夜在歲之中仁義之不能大於道德也仁義在道德之包仁義小道德大也在道徳包裹猶升在斛之中夜在歳之內也先針而後縷可以成帷先縷而後針不可以成衣針成幕蔂成城事之成敗必由小生言有漸也幕惟也上曰幕旁曰惟縷非針无以通故冝先也蔂土蘢也始一䕚以上於城故曰亊之成敗必由小生染者先靑而後黒則可先黒而後青則不可工人下而上丹則可下丹而上漆則不可万事猶此所先後上下不可不審審知水濁而魚噞魚短氣黄噞出口於水上形勞則神乱形乱神不治也故國有賢君折衝万里衝兵車所以衝突敵城也言䝨君徳不可伐故能折於逺敵之衡車於千里之外使敵不敢至也魏文侯礼下段干木而秦兵不敢至此之謂也因媒而嫁而不因媒而成媒人以礼成為室家也因人而交不因人而親以德親也行合趨同千里相從雖逺必至趣不合行不同對門不通詩所謂室迹人逺故曰對門不通也海水雖大不受胔芥日月不應非其氣陽燧取火方諸取水氣相應也非此不得故曰不應非其氣也君子不容非其也人不愛倕之手而愛已之指倕讀詩惴惴其栗之惴也倕堯之巧工也雖倕巧人不能以倕巧故愛其手也謂倕手无益於已故自愛其指也不愛江漢之珠而愛已之鉤江漢雖有美珠不爲已用故不愛也鈎釣也可以得魚故愛之也以束薪爲以火煙爲氣以束薪爲朅而走夜行見束薪以爲故去而走以火煙爲氣殺豚烹㺃以火煙爲吉凶之氣殺牲以攘之惑也先事如此不如其後此先事之人也如此不如徐徐出其後也巧者善度知者善豫豫備也羿死桃部不給䠶忌死劎鋒不給搏桃部地名羿夏之諸侯有窮君也爲弟子逢蒙所殺不及攝已而䠶也㨗也慶忌吴王僚之子也要離爲闔閭刺之故死劒不及設其㨗疾之力滅非者戸告之曰我實不與我謏亂謗乃愈起止言以言止事以事譬猶堁而弭塵抱薪而救火止言當以嘿上亊當以今以言止言以事止事猶揚堁止塵康愈起抱薪救火火愈熾也流言雪汙譬猶以涅拭素也流放也雪除也涅黒也素白也矢之於十歩貫兕甲於三百歩不能入魯縞騏一日千里其出致釋駕而僵釋稅僵仆也猶矢於三百歩不能穿魯縞言力竭尽也大家攻小家則爲暴大國并小國則爲賢夏世不能尚德苟任勞力而以辟上折境并兼人囯爲賢也小馬非大馬之也小知非大知之也小馬不可以進道致千里故得与大馬同小知不可以治丗長民故不得与大知同也被羊裘而賃固其事也貂裘而負籠甚可怪也籠土籠也以絜白爲汚辱譬猶沐浴而抒溷薰燧而燒薰自香楚人謂之薰燧也治疽不擇善惡醜而并割之農夫不察苗莠而并耘之豈不虛哉壞塘以取發屋而求狸掘室而求䑕割脣而治齲桀跖之徒君子不與㪯亊所施如是者則桀跖之徒也君子不与也殺戎馬而求弧理援兩鼈而失霊断右臂而爭一毛折鏌邪而爭錐力用智如此豈足髙乎髙猶貴也寧百刺以針无一刺以刀寧一引重无乆持輕寜一月飢无一旬餓飢食不足餓困乏也萬人之蹪愈於一人之隧楚人謂躓為蹟愈勝也隧䧟也有譽人之力儉者春至旦不中貟呈猶讁之察之乃其母也讁責怒也稱譽人力儉呈作不中科貟而責怒也君子視之乃自呈作其母以爲力快以此譽人孰如毁之故諺曰問誰毁之小人譽之此之謂也故小人之譽人反爲損損毁東家母死其子哭之不上西家子見之歸謂其母曰社何愛速死吾必悲哭社江淮謂母爲社社讀雖家謂公爲阿社之社也夫欲其母之死者雖死亦不能悲哭矣謂學不暇者雖暇亦不能學矣言有事務不暇學如此曹人雖閑服无務亦不能學也見窽木浮而知爲舟見飛蓬轉而知爲車見鳥迹而知著書以取之窽穴讀曰科也以非義爲義以非禮爲禮譬猶倮走而追狂人盗財而予乞者竊簡而寫法律蹲踞而誦詩書割而舍之鏌邪不断執而不釋馬截玉馬尾也聖人無止無以歳䝨昔曰愈昨也賢俞猶勝互文言今歳勝於昔歳今日勝於昨日喻聖人自脩進也馬之似鹿者千金天下無千金之鹿玉待礛諸而成器礛諸攻玉之石言物有待賤而貴者也礛廉或直言蓝也有千金之璧而無錙錘之礛諸六銖曰錙八銖曰錘言其賤也受光於照一隅受光於牗照北壁受光於戸照室中無遺物況受光於宇宙乎天下莫不藉明於其前矣由此觀之所受者小則所見者淺所受者大則所照者博四方上下曰宇往古來今曰宙謂四極之内天地之間故天下莫不借明於日月之前江出岷山河出崐崘濟出王屋潁出少室漢出嶓冢已說在地形也分流舛馳注於東海所行則異所歸者一一同也通於學者車軸轉轂之中不運於已與之致千里終而復始轉无窮之源不通於學者迷惑告之以東西南北所居聆聆聆聆猶了了言迷解也背而不得不知凡要背而不得更復或故曰不知凡要也寒不能生寒熱不能生熱不寒不熱能生寒熱故有形出於無未有天地能生天地者也至深微廣大矣未有天地生天地故无形生有形也雨之集無能霑待其止而能有濡集下比其至未能有所霑止者所至故能有濡時矢之發無能貫待其止而能有穿唯止能止衆止止喻矢止乃能穿物一曰止已情欲乃能止婦衆物令不得已呼因髙而爲臺就下而爲池各就其勢不敢更爲聖人用物用朱絲約芻狗爲土龍以求雨芻狗待之而求福求猶得侍芻狗之靈而待福也土龍待之而得食土龍致雨雨而成榖故得待土龍之神而得榖食一說土龍待請雨之所得食酒者也魯人身善制冠妻善織履徃徙於越而大困窮以其所脩而遊不用之郷譬樹荷山上荷水菜芙蕖其莖曰茄其夲曰密其根曰耦其華曰芙蓉其秀者曰菡蓞其寳曰蓮蓮之茂者花花之中心曰薏幽州揔謂之光荷讀如燕人強秦言胡同也而畜火井中橾鈎上山掲斧入淵欲得所求難也方車而蹠越乘桴而入胡方出蹠至桴筏一曰瓠言非其所冝也欲无窮不可得也无求之處也楚王有白蝯王自射之則搏矢而熈熈戲使養由其射之始調弓矯矢未發而蝯擁柱號矣由其楚王之臣養姓調張矯直擁抱號呼幽通賦曰養流睇而蝯號是也有先中中者也有先未中必中之徵精相動也咼氏之壁夏后之璜揖譲而進之以合歡夜以投人則爲怨時與不時不時謂夜咼古和字畫西施之面美而不可說規孟賁之目大而不可畏君形者亡焉生氣者人形之君規畫人形无有生氣故曰君形亡人有昆弟相分者无量多不可計而衆稱義焉夫唯無量故不可得而量也登髙使人欲望臨深使人欲闚處使然也射者使端釣者使人恭事使然也立然後中恭然後得故曰事使然也曰殺罷牛可以贖良馬之死莫之爲也殺牛必亡之数牛者所以殖穀者民之命是以王法禁殺牛民犯禁殺之者誅故曰必亡之数以必亡贖不必死未能行之者矣季孫氏劫公家魯大夫季桓子斯一曰康子肥䝱定公而專其政傳曰禄之去公室孔子說之先順其所爲而後與之入政曰與枉與直如何而不得與直與枉勿與遂往直順其謀而從勿遂大與同小此所謂同汚而異塗者衆曲不容直衆枉不容正故人衆則食狼狼衆則食人欲爲邪者必相明正欲爲曲者必達直公道不立私欲得容者自古及今未甞聞也此以善託其醜託若麗姫欲殺太子申生先稱之於獻公然後得行其害此其也衆議成林無翼而飛衆人皆議平地生林无翼之爲能飛凡人信之以為實然也三人成市虎三人從市中來皆言市中有虎市非虎處而人信以爲有虎故曰言人成市虎一里撓推撓弱一人之人皆有能屈推者人則信之也夫游没者不求沐浴已自足其中矣故食草之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草草食故食草水君故水中故曰不疾失其常也信有非禮而失禮尾生死其梁拄之下此信之非者尾生魯人与婦人私期橋梁之下故尊其誓水至不去没溺而死故曰信之非也孔氏不喪出母此禮之失者礼庻子喪出母孔氏子上名白仲尼曽孫孔汲之子後出子白之母卒於外配曰子上之母死不喪門人問諸子思曰子先君其喪出母乎曰然子不使白何也曰昔吾先君无所失道隆從而降道汚從而汚伋則安能及乎是不爲伋妻是不爲白也母孔氏之不喪出母自子思始故曰孔氏之失也曽子立孝不過勝母之閭墨子非樂不入朝歌之邑曽子立廉不飲盜泉所謂養志者也紂爲象箸而箕子唏見象箸知當復作王枉有王柸必有熊蹯豹胎以極庶侈故箕子爲之驚號啼也魯以偶人葬而孔子歎惡其象人而用之知後世必用殉故孔子爲之長歎也故聖人見霜而知冰見微霜降大寒至必堅氷也有鳥將來張羅而待之得鳥者羅之一目也今為一目之羅則無時得鳥矣今被甲者以備矢之至若使人必知所集則懸一札而已矣事或不可前規物或不可慮卒然不戒而至故聖人畜道以待時道能均化無不禀受故聖人畜養以待時時至而應若武王伐紂矣屯犂牛旣以㹋泱鼻而羈屯醜牛貌犂牛不純色無角㹋無尾泱鼻羈頭而牽生子而犠尸祝齋戒以沈諸河犠者牲尸祭神之主祝祈福祥之辭祀河曰沈河伯豈羞其所從出辭而不享哉詩曰采葑采菲無以下體是論語曰犁牛之子騂且角雖欲勿用山川其舍諸得萬人之兵不如聞一言之當當謂明天時地利知人之言可以不戰屈人之兵得隋侯之珠不若得事之所由得咼氏之璧不若得事之所適由用適宜適也撰良馬者非以遂狐狸將以射麋鹿砥利劒者非以斬縞衣將以斷兕犀故高山仰止景行行止鄉者其人言者髙山我仰而止之人有大行我則而行之故曰鄉者其人見彈而求鴞炙彈可以彈鴞鳥而我因望其求炙也見卵而求晨夜雞知將旦鶴知夜半見其卵因望其夜鳴故曰求晨夜見黂而求成布雖其理哉亦不病暮黂麻之有實者可以爲布因求其成故曰雖其理哉亦不病暮言其早也黂謂傳曰有不爲災之象解其牙不憎人之利之也利猶取也死而棄其招簀不怨人取之招簀死者浴床上称栭怨亦憎互文耳簀讀功績之績也人能以所不利利人則可所不利若子罕不利玉人之寳利若玉人自得玉以爲寳故曰可狂者東走逐者亦東走東走則同所以東走則異溺者入水拯之者亦入水入水則同所以入水者則異異其不溺故聖人同死生愚人亦同死生聖人之同死生通於分理愚人之同死生不知利害所在徐偃王以仁義亡國國亡者非必仁義徐國今下邳徐僮是偃謚居衰亂之世脩行仁義爲楚文王所滅滅者多以不義故曰亡囯不必仁義比干以忠靡其體誅者非必忠也比干以忠諫紂而誅之岀見諌者多以不忠故曰被誅者非必忠故寒者顫懼者亦顫此同名而異實同名於顫異者寒與懼顫讀天寒凍顫之顫字亦自如此明月之珠出於蛖蜄周之簡圭生於垢石珠有夜光明月生於蛖中簡圭大圭美玉出於石中故曰生垢石大蔡神出於溝壑大蔡元之所出地名因名其爲大蔡臧文仲所居蔡是萬乘之主冠錙錘之冠履百金之車六銖曰錙八兩曰錘言賈直少物有賤而在上有貴而在下車或作履也牛皮爲鼓正三軍之衆鼔声氣故可以齊三軍之衆也欲學歌謳者必先徴羽樂風徵南方火羽北方水五音正樂正得失理情性動天地感鬼神莫近於詩樂風者上以風化下下以風刺上故謂之風也欲美和者必先始於陽阿采菱陽阿采菱楽曲之和声百陽阿古之名徘善和也此皆斈其所不斈而欲至其所欲學者燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也燿明芳香明火香餌則蝉魚至以言治囯明其德美其政天下之人如蝉魚歸明火香餌也欲致魚者先通水欲鳥者先樹木水積而魚聚木而鳥集好弋者先具繳與矰繳大綸矰短矢繳所以繫者繳射射注飛鳥詩云弋鳬與鴈也好魚者先具罟與罘罘細網傳曰数罟不入於汗池罘大網詩云施罟濊濊鱣鮪潑潑是也未有无其具而得其利言未見君无道而能得民心也遺人馬而解其羈遺人車而稅其轙轙所以縛衡也所愛者少而所亡者多故里人諺曰烹牛而不鹽敗所爲也亨羹不与監不成羹故曰敗所為礼記曰客絮羮主人辝不能烹知烹為羮也桀有得事謂知作瓦以蓋屋遺後丗也堯有遺道遺失謂不能放四凶用十六相是其一說不傳丹朱而禅舜天下有不之名故曰有遺道也嫫母有所美嫫母古之醜女而行貞正故曰有所美嫫讀摸範之摸西施有所醜西施古之好女也雖容儀光艷未必貞正故曰有所醜也故亡國之法有可隨者治囯之俗有可非者有可隨猶嫫母有所美有可非猶西施有所醜琬琰之玉在洿泥之中雖廉者弗釋琬琰美玉釋舍弊箄甑瓾在袇茵之上雖貪者不搏瓾甑帶搏取瓾讀鼃黽之黽也美之所在雖汚辱丗不能賎惡之所在雖髙隆丗不能貴世不能賤者喻䝨者在下位卑汚之處丗不能貴者喻小人在上位髙顯之處春貸秋賦民皆欣春而子秋豊而收故民欣也春賦秋貸衆皆怨得失同喜怒爲别其時異也爲魚德者非挈而入淵爲蝯賜者非而縁木縦之其所而已喻爲政官方定物能文者居文官能武者居武官故曰縱之其利而巳也貂裘而雜不狐裘而粹雜猶駭粹純也故人莫惡於無常行无常行猶論語人而无恒不可作為巫醫故曰惡矣有相馬而失馬者失猶不知猶良馬猶在相之中良馬有夭壽骨法非能相不知故曰在相之中今人放燒或操火徃益之或接水往救之兩者皆未有功而怨德相去亦逺矣郢人有買屋棟者求大三圍之木郢楚都在今江陵北郢是也楝穩太材而人予車轂跪而度之巨雖可而長不足巨大也長不足言其短蘧伯玉以德化伯玉衛大夫蘧瑗趙簡子將伐衛使史默往視之曰蘧伯王爲政未可以加兵故曰德化也公孫鞅以刑罪所極一也公孫鞅衛公子叔痤之子自魏奔秦相孝公制相坐法故曰以形罪秦封爲商君因曰商鞅商在京兆東南瑗以德化鞅以刑故曰所極一也病者寢席寢卧席蓐醫之用針石巫之用糈藉所救鈞也醫師在男曰覡在女曰巫石針所砥彈人雍痤出其惡血糈米所以享神籍管茅皆所以療病求福祚故曰救鈞狸頭愈䑕雞頭已瘻䑕齧人創狸愈之瘻頭腫疾雞頭水中茭幽州謂之鴈頭亦愈之也䖟散積血斵木愈齲此之推者也推行也膏之殺鼈鵲矢中蝟中亦殺矣爛生繩爛腐漆見蟹而不乾此之不推者也乾燥推與不推非而是是而非孰能通其微天下無粹白狐而有粹白之裘掇之衆白也善斈者若齊王之食雞必食其蹠數十而後足跖雞足踵喻斈取道衆多然後優刀便剃毛至伐大木非斧不剋剋截物固有以㓂適成不逮者視方寸於牛不知其大於羊揔視其體乃知其大相去之逺逺猶多也孕婦見兎而子缺脣見麋而不四目小馬大目不可謂大馬大馬之目眇所謂之眇馬物固有似然而似不然者故決指而身死決傷或斷臂而顧活顧反不可必推厲利劒者必以柔砥柔濡擊鍾磬者必以濡木轂強必以弱輻兩堅不能相和兩強不相服故梧桐断角馬釐截玉言柔勝剛媒但者非斈謾他但成而生不信但猶詐也立慬者非斈争慬立而生不譲故君子不入獄爲其傷恩也不入市爲其侳亷侳辱積不可不慎者也走不以手縛手走不能疾飛不以尾屈尾飛不能逺物之用者必待不用者故使止見者乃不見者也使鼓鳴者不鳴也不鳴乃无聲也甞一臠知一鑊之味有足曰鼎无足曰鑊懸羽與炭而知燥溼之氣燥故炭輕溼故炭重以小朋大見一葉落而知歳之將暮睹瓶中之冰而知天下之寒以近論逺論知也三人比肩不能外出戸户不容故一人相隨可以通天下言不竝也足地而爲迹暴行而為影此易而難履履地迹自成行日中影自生是其易使迹正影直是其難也莊王誅里史孫叔敖制冠浣衣里史倿臣惡人死叔敖自知當見用故制冠浣衣文公棄荏席後黴黒咎犯辭歸晋文棄其臥席之下黴黒者咎犯感其舊物因日臣從君周旋臣之罪多矣臣猶自知之沉君乎請從此亡故曰辭歸故桑葉洛而長年悲也桑葉時旣茹落長年懼命尽故感而悲也鼎錯曰用而不足貴錯小鼎雖日見用不能和五味故不足貴周鼎不爨而不可賤周家大鼎不日炊火以休朱而能和味故曰不可賎物固有以不用而爲有用者不用謂鼎不爨爲用謂調五味地平則水不流重鈞則衡不傾流行傾邪也物之尤必有所感尤過䡖重則衡低昂故日必有所感感動也物固有以不用爲大用者衡行物物所不用然後用之乃知物之輕重故曰以不用爲大用也先倮而浴則可以浴而倮則不可先而後饗則可禮食必祭示有所先饗猶食也先饗而後祭則不可爲不敬故日不可也物之先後各有所宜也祭之日而言狗生取婦夕而言衰麻置酒之日而言上冡皆所不宜渡江河而言陽侯之波陽陵國侯溺死其神能爲大波爲人作害因號陽侯之波舟人所不欲言或曰知其且赦也而多殺人不仁或曰知其且赦也而多活人乃仁人也其望赦同所利害異故或吹火而滅所以吹者異也烹牛以饗其里而罵其東家母德不報而見殆殆危害也文王汙膺鮑申傴背以成楚國之治文王楚武王子熊疵汙膺䧟鮑申楚相慪背僂成治言賢也禆諶出郭而知以成子產之事禆諶鄭大夫謀于野則獲謀于國則否鄭國有難子產載如野與議四國之事故曰成子產之事論語曰禆諶草創之世叔討論之東里子產潤色之侏儒問徑天高于脩人脩人曰不知曰子雖不知猶近之於我故凡問字必於近者脩人長人也冦難至躄者告盲者盲者而走兩人得活得其所能也故使盲者語使躄者走失其所也邢人有鬻其母爲請于買者曰此母老矣幸善食之而勿苦郢楚都鬻賣也食養也此行大不義而欲爲小義者介姦之動以固介甲龜鼈之屬動行貞蟲之動以毒螫貞蟲細腰蜂蜾蠃之屬無牝牡之合曰貞而有毒故能螫讀解釋之釋也熊羆之動以攫搏攫撥熊羆多力故能撥攫有所搏也兕牛之動以觝觸兕獸名有角牛犂牛物莫措其所脩而用其所短也指置治國者若鎒田去害苗者而已今沐者墮髮而猶爲之不止以所去者少所利者多砥石不利而可以利金金刀劍之屬也擏不正而可以正弓擏弓之掩床讀曰檠物固有不正而可以正不利而可以利又正者擏正者弓也不利者砥利者金也力貴斉知貴㨗得之同遫為上齊讀蒜韲之韲斉捷背疾勝之同遟爲下所以貴鏌邪者以其應物而断割也靡勿釋牛車绝轔切楚人謂門切之轔車行其上則断之孟子曰城門之軌非兩馬之力轔讀近蘭急舌言之乃得也爲孔子之窮於陳蔡而廢六藝則感六㙯礼楽射御書数爲醫之不能自治其病病而不就藥則勃矣不擇於事曰勃也淮南鴻烈解卷第十六淮南鴻烈觧卷第十七太尉祭酒臣許愼記上
