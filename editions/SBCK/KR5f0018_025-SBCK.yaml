seq: 25
front:
  text: 說林訓第十七木叢生曰林萬物承阜若林之聚矣故曰林因以題篇也以一出之度制治天下譬猶客之乗舟中流遺其劒遽其舟㧪刻㧪舩板墮劒於中流刻下舩言其於此下失劒㧪讀如左傳襄王出居鄭地氾之氾也暮薄而求之其不知物亦甚矣日暮薄岸而止求求劒於其所刻㧪下故曰不不知物類夫隨一隅之迹而不知因天地以游惑莫大焉隨一問之迹刻㧪之或無有大於此也雖時有所合然而不足貴也譬若旱歳之土龍疾疫之芻靈是為帝者也土龍以求雨芻狗以求福時見貴也曹氏之裂布蛷者貴之然非夏后氏之璜楚人名命為曹今俗間以始織布繋著其旁謂之曹布燒以傅蝫蛷瘡則愈故蛷者貴之半璧曰璜璜以發衆國家之寳故曰然非夏后氏之璜也無古無今無始無終未有天地而生天地至深微廣大矣言其深微廣大故能生天地也足以者淺矣然待所不而後行履持所履而行者則不得行故曰待所不履而後行智所知者褊矣然待所不知而後明狹知所知所不知以成明矣游者以足蹶以手㧊不得其數愈蹶愈敗愈益敗猶没也及其能游者非手足者矣不用手足而白游也鳥飛反郷免走歸窟狐死首丘寒將翔水各哀其所生寒將水鳥哀猶愛也母貽盲者鏡毋予躄者履毋賞越人章甫非其用也賞遺章甫冠越人斷髪無用冠爲椎固百柄不能自㭬目見百歩之外不能自見其眦喻人能有所爲而不能自爲也狗不擇甂甌而食偷其體而顧近其死偷取也顧反則享之故近其死也鳳皇髙翔千仭之上故莫之能致七尺曰仭非聖徳君不致故曰莫之能致也月照天下蝕於詹諸騰蛇游霧而殆於蝍蛆諸月中蝦蟇食月故曰食於詹諸殆猶畏蝍蛆蟋蟀爾雅謂之蜻之大腹也上蛇蛇不敢動故曰殆於蝍蛆也烏力勝日而服於鵻禮能有脩短也烏在日中而見故曰勝日服猶畏鵻禮爾雅謂禆苙秦人謂之祀祝間時農鳴人舍者鴻鳥皆畏之故曰能有脩短也莫壽於殤子而彭祖爲夭矣生死歸殤子去所歸所故曰以為壽彭祖蓋楚先壽四百歳不早歸故曰以為夭論語曰比我於老彭蓋謂是一說彭祖蓋黄帝時斈仙者言不如殤子早歸神明矣短綆不可以汲深器小不可以盛大非其任也任讀勘任之任怒出於不怒爲出於不為不怒乃是怒下為乃是為也視於無形得其所見矣聽於無聲則得其所聞矣言皆易恤无聲故得有聞至味不慊至言不文至樂不至音不叫大匠不斵大豆不具大勇不慊快叫譟呼不斵不自斷削豆簠簋比之器大勇人聞自畏之不復也得道而德從之矣譬若黃鍾之比宫大簇之比商無更調焉更改也以瓦鉒者全以金鉒者跋以玉跓者發鉒謂象金之銅柱餘之鉒鉒者提馬雒家謂之投翩金者金步除䟦者刺䟦走發者疾迅發讀射百發之發是故所重者在外則内為之掘所重謂金与玉掘律氣不安翔逐獸者目不見太山見獸而已嗜慾在外則明所蔽矣蔽者見利之物不見其害也聽有音之音者聾聽無音之音者聽不聾不聽與神明通者操筮者端䇿以問於數安所問之哉策四十九䇿可以占吉凶可以問於數數欲卜筮者也舞者舉節坐者不期而拚皆如一所極同也日出湯谷入干虞莫知其動須臾之閒俛人之頸俛猶戾也人莫欲學御龍而皆欲斈御馬莫欲學治而皆欲斈治人急所用也御龍治不益世用故以御馬治人為急務矣解門以為薪塞井以為臼人之從事或時相似或有也相似似於愚水火相憎彗鼎在其間五味以和鏏小鼎一曰鼎无耳為鏏鏏讀曰彗鏏受水而火炊之故曰在其間骨肉相愛讒賊閒之而父子相危楚平王晉献公是也夫所以養而害所養譬猶削足而適履殺頭而便冠所以養喻讒賊害在養喻骨肉殺亦殺之頭大冠小不相宜削殺其頭以便其冠愚之至頭或作頥昌羊去蝨而來蛉窮昌羊昌蒲蛉窮虽蜒入耳之虫也除小害而致大賊故小快害大利牆之壞也不無也然逾屋之覆不若其无為牆屋之覆為敗屋牆之壞更為土歸於本故曰逾屋之覆璧瑗成噐礛諸之功礛諸治玉之石詩云他山之石可以為錯礛讀一曰亷氏之亷鏌邪断割砥厲之力力亦功互文也狡兔得而獵犬烹髙鳥尽而強弩藏烹猶殺藏猶殘喻不復用也與致千里而不飛無糗糧之資而不飢失火而遇雨失火則不幸遇雨則幸也故禍中有福也鬻棺者欲民之疾病也畜粟者欲歳之荒飢也荒大飢榖不熟水靜則平平則清清則見物之形弗能匿也故可以為正匿猶逃也川竭而谷虚虛无水也丘夷而渊塞夷平塞滿脣竭而齒寒河水之深其壌在山言非一朝一夕鈞之縞也一端以為冠一端以為冠則戴致之則履之知己者不可誘以物物不能惑明於死生者不可却以危危无能懼之故善游者不可懼以渉涉不能溺親莫親於骨莭族之屬連也骨謂一人之身故曰莭族之連也心失其制乃反自害言心失制度則自害身也況䟽逺乎䟽逺喻他人也聖人之於道猶葵之與日也雖不能與終始哉其郷之誠也郷仰誠實官池涔則溢旱則涸涔多雨也江水之原渊泉不能竭竭尽也蓋非橑不能蔽曰輪非輻不能追疾然而橑輻未足恃也金勝木者非以一刀殘林也土勝水者非以一璞塞江也躄者見虎而不走非勇勢不便也傾者易覆也者易軵也幾易助也溼易雨也幾近朝讀軵持之軵近也設䑕者機動釣魚者泛杭任動者車鳴也動發發則得䑕泛釣浮杭動動則得魚任者輦言云我任我輦芻狗能立而不能行蛇牀似麋蕪而不能芳蛇牀臭麋蕪香謂許由無德烏獲無力莫不醜於色醜猶怒曰愧也人莫不奮于其所不足奮厲也以兔之走使大如馬則逮曰歸風言其妄也及其爲馬則又不能走矣冬有雷電夏有霜雪然而寒暑之勢不易小變不足以防大節黃帝生隂陽黄帝古天神也始造人之時化生隂陽上駢生耳目桑林生臂手上駢桑林皆神名此女媧所以七十化也女媧王天下者也七十変弓化也此言造化治世非一人之功終日言必有聖之事百發之中必有羿逢蒙之巧然而世不與也其守節非也非者非其眞也牛彘顱亦骨也而丗弗灼必問吉凶於者以其歷歳乆矣近敖倉者不爲之多飯臨江河者不爲之多飲其滿腹而已敖倉古常滿倉在滎陽北蘭芝以芳未甞見霜芳香鼓造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟇今出人五月望作梟羮亦作蝦蟇羮言物不當為用舌之與齒孰先隴也隴摩尽也錞之與刃孰先也矜下銅鐏也錞不朽而刃先錞讀頓首之頓䋲之與矢孰先直也矢箭今鱓之與蛇之與蠋狀相而爱憎異人爱鱓与畏蛇与蠋故曰異也晉以垂之璧得虞虢在斉俗篇也驪戎以美女亡晉國美女驪姬也亡猶乱聾者不歌無以自樂盲者不無以接物接猶見也觀射者遺其藝藝事書者忘其愛意有所在則忘其所守古之所為不可更則推車至今無蟬匷蝉匷車類讀如孔子射於矍相民之矍使但吹竽使氐厭竅雖中莭而不可聽但古不知吹人但讀燕言鈕同也無其君形者也君官主也與死者同病難為良醫與亡囯同道難與爲謀謀或作豫也爲客治飯而自藜藿名尊於實尊重享仁義之名重於治飯之實也乳狗之噬虎也伏雞之摶狸恩之所加不量其力使景曲者形也形曲則影曲也使響濁者聲也聲濁則響濁也情泄者中易測不閉其情欲發泄于外故其中心測度知也華不時者不可食也華實若今八九月食晚令人病虐此之故曰不食喻人多言不時適不可聼用也蹠越者或以舟或以車雖異路所極一也蹠至極亦至互文耳一同也佳人不同體羙人不同面而皆說於目佳美梨橘栗不同味而皆調於己謂適人有盜而富者富者未必盗有亷而貧者貧者未必亷蔐苗絮而不可爲絮蔐苗荻秀楚人謂之蔐蔐讀敵戰之敵幽兾謂之荻苕也黂不布而可以爲布黂麻之有實者黂讀左傳有蜚不爲災之蜚也出林者不得直道行險者不得履䋲黾道亦直羿之所以射逺中微者非弓矢也造父之所以追速致逺者非轡銜也海内其所出故能大雷雨出於海復隨溝溝還入故曰内其所出輪復其所過故能逺其所過轉不止羊不慕螘螘慕於羊羊羶也醯酸不慕蚋蚋慕於醯酸嘗一臠而知一鑊之味懸羽與炭知燥溼之以小見大以近喻逺十頃之陂可以四十頃畜水曰陂而一頃之陂可以灌四頃大小之衰然衰差也明月之光可以逺望而不可以細書甚霧之朝可以細書而不可以逺望尋常之外畫者謹毛而失貌謹悉微毛留意於小則失其大貌射者儀小而遺大儀望小処而射之故能中事各有冝治䑕穴而壞里閭潰小皰而發痤疽皰面氣也痤疽癰也若珠之有䋶玉之有瑕置之而全去之而虧置其纇瑕榛巢者處林荗安也窟穴者託埵防者便也埵防髙処防隄也王子慶忌足躡麋鹿手搏兕虎置之冥室之中不能搏鼈勢不便也慶忌吳王僚之子也湯放其主而有榮名湯契後十二丗王癸之子履放其主謂伐桀爲民除害故有榮名也崔杼弑其君而被大謗崔杼齊大夫崔野之子弑君齊荘公也所以爲之則同其所以爲之則異所以為則同湯弑君以利與民抒以利与身故目異吕望使老者奮吕望鼓刀釣魚年七十始斈讀書九十為文王作師佐武王伐紂成王封之於齊故老者慕之而自奮厲項託使嬰兒矜以相慕項記年七歳窮難孔子而為之作師故使小兒之疇自矜大也使葉落者風揺之使水濁者魚撓之虎豹之文來射虎豹以有文章來使人射取之蝯狖之捷來乍猨狖屬仰鼻而長尾乍暫疾以其操㨗來使疾繋而取之行一棊不足以見智弹一不足以見悲三寸之管而無當當酒底也天下弗能滿十石而有塞百斗而足矣以篙測江篙終而以水爲測惑矣篙摘舩橈以篙渡江篙没因以江水為盡故曰惑也漁者走淵漁讀論語之語也木者走山所急者存也朝之市則走遇市則歩所求者亡也走讀奏記之奏豹裘而雜不若狐裘之粹粹純白璧有考不得爲寶考釁汚也言至純之難也戰兵死之憎神巫兵死之鬼善行病人巫能祝劾殺之憎神巫憎畏也盜賊之醜吠㺃醜猶惡也無郷之社易爲黍無國之禝易為求福无祀不禋於神而卒祝之故易為黍易從求福鼈無耳而目不可以瞥精於明也不可以瞥瞥之則見也瞽無目目无所見而耳不可以察精於聦也不可以察察之則聞遺腹子不思其父無貌於心也不知父貌不夢見像無形於目也目初不見像故曰无形於目也蝮蛇不可為足虎豹不可使縁木蝮蛇皆有毒螫人不為足為足益甚虎猛獸不可使能縁木也馬不食脂桑扈不啄粟非云廉也桑扈青雀馬不竊脂秦通崤塞而魏築城也魏徙都於大梁聞秦通治崤關知欲來東兼之故築城設守備也飢馬在廐寂然無聲投芻其傍爭心乃生引弓而射非不能發矢引張引也發遣也之為射百分之一也道德可常權不可常故遁不可復亡犴不可再遁逃也獄甞以変故關塞野犴亡逃不可復由其入故曰權不常也環可以喻貟不必以輪絛可以爲繶不必以紃紃亦繶婉轉数也日月不並出狐不二雄神龍不匹猛獸不群鷙鳥不雙循繩而斲則不過懸衡而量則不差衡稱植表而望則不惑損年則嫌於弟益年則疑於兄不如循其理若其當理道當猶實也人不見龍之飛舉而能髙者風雨奉之奉助蠧衆則木折大則牆壞懸垂之有時而隧隧墮枝格之屬有時而㢮㢮落當凍而不死者不失其適死乃為失適不死故曰不失其適也當暑而不暍者不亡適亡迹失之未甞適亡適巳无言不凍不暍何適之有也湯沐具而蟣蝨相弔大厦成而燕雀相賀夏屋樂别也栁下惠見飴曰可以養老盗跖見飴曰可以黏牡見物同而用之異栁下惠魯大夫展无駭之子名字禽家有大栁樹惠德因号桞下惠一曰桞下邑牡門戶籥牡也食而不飲二十二日而化蟬飲而不食三十日而蛻蜉游不食不飲三日而死人食礜石而死食之而不飢魚食巴菽而死䑕食之而不可必推推猶知也瓦以火成不可以得火竹以水生不可以得水瓦得火則被竹得水浸則死矣楊堁而欲弭塵披裘而以翣翼豈若適衣而已哉堁土塵楚人謂之堁翣肩楚人謂之翣也槁竹有火弗鑚不㸐土中有水弗掘無泉掘猶窮也蛖象之病人之寳也蛖大蛤中有珠象牙還以自疾故人得以為寳也人之病將有誰寳之者乎人以利欲爲病无人寳之故曰將有誰寳也爲酒人之利而不酤則竭爲車人之利而不僦則不逹握火提人反先之熱皆一介之人物思自守者不欲使酒人車人得利不酤僦而先自竭先不逹猶以火援人先自爛也鄰之母死往之妻死而不泣有所劫以然也嫌猶哀嫌於情色故曰有所劫迫之然如是也西方之倮囯鳥獸弗辟與爲一也一同也倮囯在西南方一膊炭一膊一挺也掇之則爛萬石俱去之十歩而死百二十斤爲石同氣異積大勇小勇有似於此今有六尺之廣卧而越之下林弗難植而踰之上材弗易勢施異也百梅足以爲百人酸一梅不足以爲一人和喻衆能済少少不能有所成也有以飯死者而禁天下之食有以車爲敗者禁天下之乗則悖矣申生雉晉不絶绳子胥自沉吴不斷水也釣者静之者扣舟罩者抑之罾者舉之爲之異得魚一也者以柴積水中以取魚扣撃魚聞撃舟聲蔵栗下壅而取之讀沙糝今兖州人積栗水薄魚為幽州名之為涔也見象牙乃知其大於牛見虎尾而知其大於貍一節見而百節知也吳伐越隨會稽獨骨節專車見一節大餘節不得小故曰百節知小國不於大國之間畏見嫌也兩鹿不於伏兕之旁畏見食也佐祭者得甞救者得傷䕃不祥之木爲雷電所撲䕃木影也撲撃也或謂家或謂隴或謂笠或謂簦頭蝨與空木之瑟名同實異也頭中蝨空木瑟其音同其實别異也日月欲明而浮雲蓋之蓋猶蔽也蘭芝欲脩而秋風敗之脩長虎有子不能搏攫者輒殺之爲墮武也墮廢也武威之也紐之璽賢者以為佩紐之璽衣印也紐係佩服也土壊布在田能者以爲冨能動者播植嘉榖以為饒冨也予拯溺者金王不若尋常之纆索金玉雖寶非拯溺之具故曰不如尋常之纆索視書上有酒者下必有上有年者下必有月以而取之猶事也蒙塵而眯固其理也爲其不出戸而理之也為不出戸而塵堁眯之非其道屠者羮藿爲車者歩行陶者用缺盆匠人處狹廬爲者不得用用者弗肯爲為者不得用以利動用者不肯為以富寵也轂立三十輻各盡其力不得相害使一輻獨入衆輻皆弃豈能致千里哉夜行者掩目而前其手渉水者解其馬載之舟事有所冝而有所不施橘柚有郷雚葦有叢獸同足者相從遊鳥同翼者相從翔以類聚也田中之潦流入於海附耳之言聞於千里附近也近耳之言謂語附於千里千里知之語曰欲人不知莫如不為蘇歩歩餘行也曰何故人問何故趨曰何趨馳有爲則議多事固苛蘇秦為多事之人故見議見苛也皮將弗覩毛將何顧畏首畏尾身凡有幾畏始神終中身不畏凡有幾何言常畏也欲觀九用之土足無千里之行心無政教之原而欲爲萬民之上也土足無其術故所子曰難也的的者獲提提者射的的明為衆所見故獲提提安言譬若鳥不飛成放道提提安跱故為人所射故大白若辱大德若不足若辱自同於衆人若不足者實若虛也未嘗稼穡粟滿倉未甞桑絲滿囊得之不以道用之必横横放海不受流胔太山不上小人骨有皮曰胔有不義之祥流入海海神蕩而出之故曰不受太山東岳也王者所封禪處不令亂小人得上其上也旁光不升俎旁光胞也俎豆之實唯肩髀而脅助不得外駠駮不入牲義牲以純色也中夏用箑快之至冬而不知去褰衣渉水至陵而不知下未可以應變有山無林有谷無風有石無金林生於山山未必皆有林風出於谷谷未必皆有風金生於石石未必皆有金喻聖人出衆人衆人未必皆聖賢也滿堂之坐視鉤各異滿堂坐人視其鉤各異形於環帶一也鉤与環帶一法也雖異所用者同獻公之賢欺於孋姬殺申生也叔孫之知欺於竪牛三日不食而餓死也故鄭詹入魯春秋曰佞人來佞人來鄭魯鄭文公大夫以齊桓公卒佞使鄭伯朝齊而使朝於楚齊人執之自齊逃至魯魯謂之佞人以方孋竪牛故曰佞人來侫人來君子有酒鄙人鼓缶雖不可好亦不見醜醜惡人性便絲衣帛或射之則被鎧甲爲其所不便以得所便便利輻之入轂各值其鑿不得相通猶人臣各守其職不得相干干亂也甞被甲而免射者被而入水甞抱壷而度水者抱而蒙火可謂不知矣君子之居民上若以腐索御奔馬雍容恐失民之意薄冰蛟在其下蛟魚屬皮有球能害人故曰蛟在其下若入林而遇乳虎言常驚懼恐也化不洛於民民不附善用人者若蚈之足衆而不相害蚈馬蚈幽州謂之秦渠蚈讀蹊徑之蹊也若脣之與齒堅柔相摩而不相敗摩近敗毀清之美始於耒耜清酒周禮齊是讀瓮㼜之㼜也黼黻之美在於杼柚白與黑爲黼青與赤為黻皆文衣也布之新不如紵紵之不如布或善爲新或善爲故善猶宜也䩉在頰則好在顙則醜䩉著頰上窐窐者在顙以槃故醜繍以爲裳則宜以爲冠則譏詩云衮衣繍裳故曰冝譏人譏非之也馬齒非牛蹏檀根非椅枝故見其一本而萬物知知猶别也石生而堅蘭生而芳少自其質長而愈明質性也明猶盛也扶之與提謝之與譲故之與先諾之與己也之與矣相去千里汗準而粉其顙腐䑕在壇楚人謂中庭為壇燒薫於宫入水而憎濡懷臭而求芳雖善者弗能爲工善或作巧再生者不穫華大旱者不胥時落胥時不得秋時而零落也母曰不幸甑終不墮井抽簪招燐有何為驚燐血精似野火招之應聲而至血灑汙人以簪招則不至故曰何驚也使人無度河可中河使無度不可不可言不能也見虎一文不知其武見一毛不知善走水蠆為䗓子子爲水蠆化為䗓䗓青蜓子子結蠆水上到蟲讀亷兔齧爲螚兔所齧草靈在其心中化為螚人讀能而心之惡一兔齧蟲名物之所為出於不意弗知者驚知者不怪怪惑也銅英青金英黃玉英白黂燭捔膏燭澤也燭光捔澤喻光明有明昧也以微知明以外知内象之味不知於口神之貌不著於目捕景之說不形於心皆所不甞見之冬冰可折夏木可結時難得而易失木方荗盛終日采而不知秋風下霜一夕而殫殫盡病熱而強之餐救㬈而飲之寒救經而引其索拯溺而授之石欲救之反為惡惡猶害也雖欲謹亡馬不發戸轔言馬亡不可發戸限而求雖欲豫就酒不懷蓐轔戸限楚人謂之轔轔讀似鄰急氣言乃得之也孟賁探䑕穴䑕無時死必噬其指失其勢孟賁勇士為探䑕於穴故曰失其山雲蒸柱礎潤礎柱下石礩也伏苓掘兔絲死所生者亡故死一家失熛百家皆燒讒夫隂謀百姓暴骸論語曰惡利口之覆家故曰百姓暴骸也粟得水溼而熱甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之湯沐之於河有益不多流潦注海雖不能益猶愈於已一目之羅不可以得鳥無餌之釣不可以得魚遇士無禮不可以得賢兔絲無根而生蛇無足而行魚無耳而聽蟬無口而鳴有然之者也然如是也鶴壽千歳以極其游蜉䖻朝生而暮死盡其楽修短各得其志紂醢梅伯文王與諸侯傋之傋謀桀辜諫者湯使人哭之哭猶弔也任馬不觸木猘狗不自投於河雖聾蟲而不自䧟又況人乎聾无知也愛熊而食之鹽愛而飲之酒雖欲養之非其道熊食鹽而死飲酒而敗故曰非其道也心所毀舟爲枤心所欲毀鍾爲鐸鐸大鈴金口木舌為木鐸金舌為金鐸枤舟尾讀詩㫖枤之杜也管子以小辱成大榮管仲相子纠不能死為魯所囚是其辱卒相桓公以至霸是其大榮也蘇秦以百誕成一誠誠言質的張而弓矢集林木荗而斧斤大非或召之形勢所致者也待利而後拯溺人亦必以利溺人矣利溺人者利人之溺得其利也舟能沉能浮愚者不加足舟舩能載浮物愚者不取加足畏其沉詩云汎汎揚舟載沉載浮是也騏驅之不進引之不止人君不以取道里刺我行者欲與我交訾我貨者欲與我市刺猶非訾毁也以水和水不可食一之瑟不可聽以其失和故不可聽刺專用也駿馬以抑死直士以正窮賢者擯於朝美女擯於宫擯棄也行者思於道而居者夢於牀慈母吟於巷適子懷於荆精相往來赤縣則烏鵲集鷹集則衆鳥散物之散聚交感以然食其食者不毀其器食其實者不折其枝塞其源者竭背其木者枯交畫不暢連環不解其解之不以解暢逹不得逹至交止解連環言此不可解則說德解去也臨河而羡魚不若歸家織網羡願明月之珠蛖之病而我之利虎爪象牙禽獸之利而我之害我猶人也易道良馬使人欲馳飲酒而楽使人欲歌是而行之固謂之斷非而行之必謂之亂斷猶治也矢疾不過二里也歩之遟百舍不休千里可致步行聖人處於隂衆人處於陽聖人行於水衆人行於霜水有形而不可毁故聖人行之行之无迹霜雪履有迹故衆人行之也異音者不可聽以一律異形者不可合於一體合同農夫勞而君子養焉君子囯君養焉以化澤懊休之愚者言而知者擇焉擇可用者而用之也捨木而集于枯不弋鵠而弋烏難與有圖圖謀也者其愚也夤丘無壑泉源不溥言汚小潦水名夤夤之丘无大壑故泉流不得溥尋常之谿灌十頃之澤言有源也見之明白處之如玉石見之闇晦必留其謀王之与石言可别也闇晦不明留猶思謀也以天下之大託於一人之才譬若懸千鈞之重於木之一枝言不能任負子而登牆謂之不祥爲其一人隕而兩人殤貟抱也隕墜也善舉事者若乗舟而悲歌一人唱而千人和言能得衆人之心也不能耕而欲黍不能織而喜采裳無事而求其功難矣有榮華者必有憔悴有羅紈者必有麻蒯言有盛必有衰鳥有沸波者河伯爲之不潮畏其誠也鳥大鵰也翺翔水上扇魚令出沸波攫布食之故河伯深藏於渊畏其精誠為不見故一夫出死千乘不輕主術篇曰兵筴僣故志莫邪為下言匹夫志意出死必故雖大国兵車千乗不輕之也蝮蛇螫人傳以和堇則愈和堇野葛毒藥物固有重而害反爲利者聖人之處亂丗若夏暴而待暮夏日中甚暮涼時言聖人居乱世忍以待涼桑榆之間逾易忍也言乱丗將尽如日在西方桑榆間夕故曰易忍水雖平必有波衡雖正必有差尺寸雖齊必有詭詭不同非規矩不能定方圎非準繩不能正曲直用規矩準绳者亦有規矩準䋲焉準平绳直之人能平直耳故曰亦有規矩準繩焉舟覆乃見善游馬奔乃見良御善㳺故覆舟不溺良御馬奔車不敗故見之嚼而無味者弗能内於喉視而无形者不能思於心形象无形於目不能思之於心兕虎在於後隨侯之珠在於前弗及掇者先避患而後就利隨国在漢東姬姓之侯出遊於野見大蛇斷在地隨侯令醫以續傅断蛇蛇得愈去後大珠報蓋明月之珠因号隨侯之珠丗以為宝也逐鹿者不顧兔決千金之貨者不爭銖兩之價言在大不顧小弓先調而後求勁馬先馴而後求良勁強馴擾人先信而後求能又非信不立也陶人棄索車人掇之屠者棄銷而鍜者拾之所緩急異也百星之明不如一月之光十牖畢開不若一戸之明矢之於十歩貫兕甲及其極不能入魯縞言勢有極太山之髙背而弗見秋毫之未視之可察察則言用明矣山生金反自刻木生蠧反自食人生事反自賊則敗也害也物目然也巧治不能鑄木工匠不能斵金者形性然也白玉不雕羙珠不文質有餘也性自然不復飾故跬歩不休跛鼈千里跬猶咫尺累積不輟可成丘阜輟也城成於土木直於下非有事焉所縁使然凡用人之道若以燧取火䟽之則弗得䟽猶遲也數之則弗中數猶疾也正在䟽數之間得其節火乃生從朝視夕者移從枉準直者虧枉邪聖人之偶物也若以鏡視形曲得其情偶猶周也楊子見逵路而哭之爲其可以南可以北道九逹曰逵其别也墨子見練絲而泣之爲其可以黃可以黑練白其化也趍之相合猶金石之一調相去千歳合一音也金曰鍾石曰磬雖乆不変故曰相去千歳合一音也鳥不干防者雖近弗射鳥燕之屬是也其當道雖逺弗釋當道為作防害者故曰不釋也酤酒而酸買而臭然酤酒買不離屠沽之家故求物必於近之者以詐應詐以譎應譎若被蓑而救火毀瀆而止水乃愈益多西施毛嬙狀貌不可同丗稱其好美鈞也堯舜禹湯法籍殊得民心一也俱一於人聖人者隨時而舉事因資而立功涔則具擢對旱則修土龍擢對貯水器土龍致雨物臨菑之女織紈而思行者爲之悖戾臨菑齊都悖麤惡室有羙容繒爲之纂繹不密緻志有感故纂讀曰凌繹纂之纂徵羽之操不入鄙人之耳徵羽正音小人不知不入其耳於和切適舉坐而善於轉轉其和更作急歌激楚之音非正樂故㪯坐而善之過府而負手者希不有盗心府藏貨所生也故侮人之者過社而揺其枝侮猶病也晉陽處父伐楚以救江故解椊者不在於㭭格在於批伔批擊伔推撃其要矣木大者根欋山髙者基扶其下趾也蹠巨者志逺體大者節䟽狂者傷人莫之怨也嬰皃詈老莫之疾也賊心亡止賊害尾生之信不如隨牛之誕尾坐効信於婦人信之失隨牛髙矯君命為誕雖然以存囯故不如隨牛之誕而又況一不信者乎一猶常況常不為信不為誕乎一或作一一猶待也憂父之疾者子治之者醫論語曰父母唯其疾之憂故曰之者子進獻者柷治祭者庖庖宰也淮南鴻烈解卷第十七淮南鴻烈解卷第十八
