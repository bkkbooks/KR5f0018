front:
  text: 人間訓第十八人間之事凶之中徵得失之端反存亡之幾也清淨恬愉人之性也儀表規矩事之制也知人之性其自養不勃知事之制其㪯錯不或發一端散无竟周八極緫一筦謂之心見本而知末指而睹歸執一而應万握要而治詳謂之術居智所為行智所之事智所秉動智所由謂之道道者置之前而不錯之後而不軒内之尋常而不塞布之天下而不窕是故使人髙賢稱譽己者心之力也使人卑下誹謗己者心之罪也夫言出於口者不可止於人行發於邇者不可禁於逺事者難成而易敗也名者難立而易廢也千里之隄以螻螘之穴漏百尋之屋以突之煙焚突竈突也堯戒曰戰戰慄慄日愼一日人莫蹪於山而蹪於垤蹪躓也垤蟻也是故人者輕小害易微事以多悔患至而後憂之是由病者已惓惓而索良醫也雖有扁鵲俞跗之巧猶不能生也制夫黃帝時醫夫禍之來也人自生之福之來也人自成之禍與福同門利與害為鄰非神聖人莫之能分凡人之舉事莫不先以其知規慮揣度揣商量髙下也而後敢以定謀其或利或害比愚智之所以異也曉自然以為智知存亡之樞機禍福之門戸舉而用之䧟溺於難者不可勝計也使知所以為是者事必可行則天下无不達之塗矣是故知慮者禍福之門戸也動靜者利害之樞機也百事之変化囯家之治乱待而後成是故不溺於難者成是故不可不愼也天下有三危少德而多寵一危也才下而位髙二危也身无大功而有厚禄三危也故物或損之而益或益之而損何以知其然也昔者楚荘王旣勝晉於河雍之間莊王敗晉荀林父之師扵邲邲何雍地也㱕而封孫叔敖而辭不受病疽將死謂其子曰吾則死矣王必封女女必讓肥饒之地而受沙石之閒有寢丘者其地硧石之名醜寝丘今汝南固始也前有垢谷後有㽵五名醜荆人人事鬼也越人禨禨祥人莫之利也孫叔敖死王果封其子以饒之地其子辭而不受謂有寢之丘楚囯之俗功臣二丗而爵禄唯孫叔敖獨存此所謂損之而益也何謂益之而損昔晉厲公南伐楚東伐斉西伐秦北伐燕兵横行天下而无所綣綣屈威服四方而无所詘遂合諸侯於嘉陵氣充志驕淫侈无度暴虐万民内无輔拂之臣外无諸侯之助戮殺大臣親近導䛕明年出遊匠驪氏欒書中行偃劫而幽之欒書中行偃皆大夫諸侯莫之救百姓莫之哀三月而死夫戰勝攻取地廣而名尊此天下之所願也然而终於身死囯亡此所謂益之而損者也夫孫叔敖之請有寢之丘沙石之地所以累丗不奪也晉厲公之合諸侯於嘉陵所以身死於匠驪氏也衆人皆知利利而病病也唯聖人知病之為利知利之為病也夫再實之木根必傷掘藏之家必有殃掘藏謂發家得伏藏无功受財以言大利而反為害也張武敎智伯奪韓魏之地而擒於晉陽張武智伯臣也擒扵晉陽為趙襄子所殺申叔時教荘王封陳氏之後而霸天下申叔時楚大夫也荘王滅陳已乃復之也孔子讀易至損益未甞不憤然而歎曰益損者其王者之事与事或欲以利之適足以害之或欲害之乃反以利之利害之反禍福之門戸不可不察也陽虎為乱於魯陽虎季氏之臣也陽虎季氏專魯国也魯君令人閉城門而捕之得者有重賞失者有重罪圍二市而陽虎舉劒而伯頥伯追門者止之曰天下探之不窮不窮言深逺我將出子陽虎因赴圍而逐揚劒提戈而走門者出之顧反取其出之者以戈椎之攘祛薄腋祛袂出之者怨之曰我非故與子反也為之蒙死被罪而乃反傷我宜矣其有此難也魯君聞陽虎失大怒問所出之門使有司拘之以為傷者受重賞而不傷者被重罪此所謂害之而反利者也何謂欲利之而反害之楚恭王与晉人於鄢陵酣晉人晉厲公恭王傷晉人射恭王中目也而休司馬子反渴而求飲竪陽榖奉酒而進之竪小使也陽穀其名子反之為人也嗜酒而甘之不能绝於口遂醉而卧恭王欲復使人召司馬子反子反辭以心痛王駕而往視之入幄中而聞酒臭㳟王大怒曰今日之不榖親傷不榖不禄也人君謙以自稱也所恃者司馬也而司馬又若此是亡楚國之社稷而不率吾衆也不榖无与復戰矣於是罷師而去之斬司馬子反為僇故竪陽榖之進酒也非欲禍子反也誠爱而欲快之也而適足以殺之此所謂欲利之而反害之者也夫病温而强之食病暍而飲之寒此衆人之所以為養也而良醫之所以為病也恱於目恱扵心愚者之所利也然而有論者之所辟也故聖人先忤而後合衆人先合而後忤有功者又臣之所務也有罪者人臣之所辟也或有功而見疑或有罪而益信何也則有功者離恩義有罪者不敢失仁心也魏將楽羊攻中山楽羊文侯之其子執在城中城中縣其子以示楽羊楽羊曰君臣之義不得以子為私攻之愈急中山因烹其子而遺之鼎羮与其首楽羊循而泣之曰是吾子已爲使者跪而啜三杯使者㱕報中山曰是伏約死節者也不可忍也遂降之爲魏文侯夫開地有功自此之後日以不信此所謂有功而見疑者也何謂有罪而益信孟孫獵孟孫魯大夫也而得麑使秦西巴持㱕烹之麑母隨之而嗁秦西巴弗忍縦而予之孟孫㱕求麑安在秦西巴對曰其母隨而嗁臣誠弗忍竊縱而子之孟孫怒逐秦西巴居一年取以爲子傅左右曰秦西巴有罪於君今以爲子傅何也孟孫曰夫一麑而弗忍又何況於人乎此謂有罪而益信者也故趨舍不可不審也此公孫鞅之所以抵罪於秦而不得入魏也公孫鞅商君也爲秦代魏欺魏公子卭而殺之後有罪走魏魏人不入也功非不大也然而累足无所踐者不義之故也事或奪之而反与之或與之而反取之智伯求地於魏宣子宣子弗欲与之任登曰智伯之強威行於天下求地而弗与是為諸侯先受禍也不若与之宣子曰求地不已為之奈何任登曰与之使喜必將復求地於諸侯諸侯必植耳植耳竦耳而聽也与天下同心而圖之一心所得者非直吾所亡也魏宣子裂地而授之又求地於韓康子韓康子不敢不予諸侯皆又求地於趙襄子襄子弗与於是智伯乃従韓魏圍襄子扵晉陽三囯通謀擒智伯而三分其囯此所謂奪人而反為人所奪者何謂与之而反取之晉獻公欲假道扵虞以伐虢遺虞垂之壁与屈産之乗虞公或扵壁与馬而欲与之道宫之竒諫宫之竒虞臣也曰不可夫虞之与虢若車之有輪輪依於車車亦依輪虞之与虢相恃而勢也若假之道虢朝亡而虞夕從之矣虞公弗聽遂假之道荀息伐虢遂克之荀息晉大夫還反伐虞又拔之此所謂與之而反取者也聖王布德施惠非求其報於百姓也郊望禘甞郊祭大望祭日月星辰山川也禘甞宗廟也非求福於神也山致其髙而雲起焉水致其深而蛟龍生焉君子致其道而福祿歸焉夫有隂德者必有陽報有隂行者必有昭名古有溝防不脩水爲民害禹鑿龍門辟伊闕平治水土使民得陸處百姓不親五品不愼契教以君臣之義父子之親夫妻之辯長幼之序田野不脩民食不足后稷乃敎之辟地墾草糞土種榖令百姓家給人足故三后之後無不王者謂夏殷周有隂德也周室衰禮義廢孔子以三代之道敎導於丗其後繼嗣至今不絶者有隱行也秦王趙政兼吞天下而已趙政始皇生於趙故名趙政智伯侵地而滅商鞅支解季斯車裂李斯上蔡人也為秦相趙髙謂之二世車裂之於雲陽三代種德而王齊桓継絶而霸故樹黍者不穫稷樹怨者無報德昔者宋人好善者三丗不解家無故而黒牛生白犢以問先生先生曰此吉祥以饗神先生凡先人生者也以享神白犢純色可以為犧牲也居一年其父無故而盲牛又復生白犢其父又復使其子以問先生其子曰前聼先生言而失明今又復問之奈何其父曰聖人之言先忤而後合其事未究固試往復問之其子又復問先生先生曰此吉祥也復以饗神歸致命其父其父曰行先生之言也居一年其子又無故而盲其後楚攻宋圍其城楚莊王時圍宋九月當此之時易子而食析骸而炊之丁壯者死老病童皃皆上城牢守而不下楚王大怒城已破諸城守者皆屠之此獨以父子盲之故得無乗城軍罷圍解則父子俱視夫禍福之轉而相生其變難見也近塞上之人有善術者馬無故亡而入胡人皆弔之其父曰此何遽不爲福乎居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不能爲禍乎家富良馬其子好墮而折其髀人皆弔之其父曰此何遽不爲福乎居一年胡人大入塞丁壯者引而戰近塞之人死者十九此獨以跛之故父子相保故福之爲禍禍之爲福化不可極深不可測也或直於辭而不害於事者或虧於耳以忤於心而合於實者髙陽魋或曰髙陽魋宋大夫將爲室問匠人匠人對曰未可也木尚生加塗其上必將橈以生材任重塗今雖成後必敗髙陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮於辭無以對受令而為室其始成竘然善也竘髙壯而後果敗此所謂直於辭而不可用者也何謂虧於耳忤於心而合於實靖郭君將城薛靖郭君齊威王之子也封於薛賔客多止之弗聽靖郭君謂謁者曰無爲賔通言齊人有請見者曰臣請道三言而已過三言請烹郭君聞而見之賔趨而進再拜而興因稱曰海大魚則反走靖郭君止之曰願聞其說賔曰臣不敢以死爲熈熈戯靖郭君曰先生不逺道而至此爲寡人稱之賔曰海大魚網弗能止也釣弗能牽也蕩而失水則螻螘皆得志焉今夫齊君之淵也君失齊則薛能自存乎靖郭君曰善乃止不城薛此所謂虧於耳忤於心而得事實者也夫以無城薛止城薛其於以行乃不若海大魚故物或逺之而近或近之而逺或說聼計當而身䟽或言不用計不行而益親何以明之三囯伐齊圍平陸三囯韓魏趙也括子以報於牛子括子牛子斉臣曰三囯之地不接於我踰鄰囯而圍平陸利不足貪也然則求名於我也請以齊侯往牛子以為善括子出無害子入無害子亦斉臣牛子以括子言告無害子無害子曰異乎臣之所聞牛子曰囯危而不安患結而不解何謂貴智無害子曰臣聞之有裂壤土以安社稷者聞殺身破家以存其囯者不聞出其君以為封疆者牛子不聽無害子之言而用括子之計三國之兵罷而平陸之地存自此之後括子曰以䟽無害子曰以進故謀患而患解圖國而國存括子之智得矣無害子之慮無中於策謀無益於國然而心調於君有義行也今人待冠而飾首待履而行地冠履之於人也寒不能煖煖温風不能障暴不能蔽也然而戴冠履履者其所自託者然也夫咎犯戰勝城濮而雍季無尺寸之功然而雍季先賞而咎犯後存者其言有貴者也故義者天下之所賞也百言百當不若擇趨而審行也或無功而先舉或有功而後賞何以明之昔晉文公將與楚戰城濮問於咎犯曰為奈何咎犯曰仁義之事君子不猒忠信戰陳之事不猒詐偽君其許之而已矣辭咎犯問雍季雍季對曰焚林而獵愈多得獸後必無獸以詐偽遇人雖愈利後亦無復君其正之而已矣於是不聽雍季之計而用咎犯之謀與楚人戰大破之還歸賞有功者先維季而後咎犯左右曰城濮之戰也君行賞先雍季何也文公曰咎犯之言一時之權也雍季之言萬丗之利也吾豈可以先一時之權而後萬丗之利也哉智伯率韓魏二國伐趙圍晉陽決晉水而灌之城下縁木而處懸釡而炊襄子謂於張孟談曰城中力已盡糧食匱乏大夫病為之奈何張孟談曰亡不能存危弗能安無爲貴智臣請試潜行潜行伏出也見韓魏之君而約之乃見韓之君之曰臣聞之脣亡而齒寒今智伯率二君而伐趙趙將亡矣趙亡則君為之次矣不及今而圖之禍將及二君二君曰智伯人為人也粗中而少親我謀而泄事必敗為之奈何張孟談曰言出君之口入臣之耳人孰知之者乎且同情相成同利相死君其圖之二君乃與張孟談隂謀與之期張孟談乃報襄子至其日之夜趙氏殺其守隄之吏決水灌智伯智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前大敗智伯軍敗殺其身而三分其國襄子乃賞有功者而髙赫為賞首群臣請曰晉陽之存張孟談之功也而赫為賞首何也襄子曰晉陽之圍也寡人國家危社稷殆群臣無不有驕侮之心者唯赫不失君臣之禮吾是以先之由此之義者人之大本也雖有戰勝存亡之功不如行義之陸故君子曰美言可以市尊美行可以加人或有罪而可賞也或有功而可罪也西豹治鄴西門豹文侯臣廩無積粟府無儲錢庫無甲兵官無計㑹人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴而大亂子能道則可不能將加誅於子西門豹曰臣聞王主富民霸主冨武亡國富庫今君欲爲霸王者也臣故稸積於民君以為不然臣請城鼓之一鼓甲兵粟米可立具也於是乃城而鼓之一鼓民被甲括矢甲鎧也括箭矢操兵弩而出再鼓輦粟而至鼓駕斗也輦檐也文侯曰罷之西門豹曰與民约信非一日之積也一舉而欺之後不可復用也燕常侵魏八城臣請北撃之以復侵地遂舉兵撃燕復地而後皮此有罪而可賞者解扁為東封解扁魏臣治東封者上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益衆也入何以三倍對曰以冬伐木而積之於春浮之河而鬻之文侯曰民春以力耕暑以強耘秋以斂冬間無事以伐林而積之負軛而浮之河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功可罪者賢主不茍得忠臣不茍利何以明之中行穆伯攻鼓弗能下中行穆伯晉大夫鼓北翟餽聞論曰鼓之嗇夫聞倫知之餽聞倫晉人也請無罷武大夫而鼓可得也穆伯弗應左右曰不折一㦸不傷一卒而鼔可得也君奚爲弗使穆伯曰聞倫爲人佞而不仁若使聞倫下之吾可以勿賞乎若賞之是賞佞人佞人得志是使晉國之武舍仁而為佞雖得鼔將何所用之攻城者欲以廣地也得地而不取者見其本而知其末也秦穆公使孟盟舉兵襲鄭孟盟伯里奚之子也過周以東鄭之賈人髙蹇他蹇他髙之黨相與謀曰日師行數千里數绝諸侯之地其勢必襲鄭凡襲國者以爲無備也今示以知其情必不敢進乃矯鄭伯之命以十二牛勞之三率相與謀三率秦將白乙孟明西乙曰凡襲人者以為弗知今已知之矣守備必固進必無功乃還師而反先軫舉兵撃之先軫大夫也大破之殽鄭伯乃以存國之功賞髙髙辭之曰誕而得賞則鄭國之信廢矣為囯而無信是俗敗也賞一人敗國俗者弗為也以不信得厚賞義者弗為也遂以其屬徙東夷终身不反故仁者不以欲傷生知者不以利害義聖人之思脩愚人之思叕叕矩忠臣者務崇君之德謟臣者務廣君之地何以明之陳夏徵舒弑其君楚莊王伐之陳人聽令莊王已討有罪遣卒戍陳戍守也守欲有陳也大夫畢賀申叔時使於斉反還而不賀莊王曰陳為無道寡人起九軍以討之征暴亂誅罪人群臣皆賀而子獨不賀何也申叔時曰牽牛蹊人之田田主殺其人而奪之牛罪則有之罰亦重矣今君王以陳為無道㒷兵而攻因以誅罪人遣人戍陳諸侯聞之以王為非誅罪人也貪陳國也蓋聞君子不弃義以取利王曰善乃罷陳之戍立陳之後諸侯聞之皆朝於楚此務崇君之徳者也張武為智伯謀曰張武晉人晉六將軍中行文子最弱而上下離心可伐以廣地於是伐范中行滅之矣又敎智伯求地於韓魏趙韓魏裂地而授之趙氏不與乃率韓魏而伐趙圍之晉陽二年三國隂謀同計以擊智氏遂滅之此務為君廣地者夫為君崇德者霸為君廣地者滅故千乗之國行文德者王湯武是也萬乗之國好廣地者亡智伯是也非其事者勿仭也非其名者勿就也無故有顯名者勿處也無功而冨貴者勿居也夫就人之名者廢仭人之事者敗無功而大利者後將為害譬猶縁髙木而望四方也雖偷樂哉然而疾風至未甞不恐也患及身然後之六追之弗能及也是故忠臣事君也計功而受賞不為苟得積力而受官不貪爵禄其所能者受之勿辭也其所不能者與之勿喜也辭而能則匿欲所不能則惑辭所不能而受所能則得無損墮之勢而无不勝之任矣昔者智伯驕伐范中行而克之又劫韓魏之君而割其地尚以為未足遂㒷兵伐趙韓魏反之軍敗晉陽之下身死髙梁之東頭為飲器國分為三為天下笑此不知足之禍也老子曰知足不辱知止不殆可以修久此之謂也或譽人而適足以敗之或毁人而乃反以成之何以知其然也費無忌於荆平王費無忌楚臣復白也曰晉之所以霸者近諸夏也近諸夏囯在諸夏也而荆之所以不能與之爭者以其僻逺也楚王若欲從諸侯不若大城城父而令太子建守焉以來北方王自其南是得天下也楚王恱之因命太子建守城父命伍子奢傅之居一年伍子奢遊人於王側伍子奢遣說於王之左側言太子甚仁且勇能得民心王以告費無忌無忌曰臣固聞之太子内撫百姓外約諸侯斉晉又輔之將以害楚其事已構矣王曰為我太子又尚何求曰以秦女之事怨王王因殺太子建而誅伍子奢此所謂見譽而為禍者也何謂毀人而反利之唐子短陳駢子於斉威王唐子斉大夫也威王欲殺之陳駢子與其屬出亡奔薛孟甞君聞之孟甞君封於薛使人以車迎之至而豢以芻豢黍梁五味之膳日三至冬日被裘夏日服絺紵出則乗牢車駕良馬孟甞君問之曰天子生於斉長於斉夫子亦何思於斉對曰臣思夫唐子者孟甞君曰唐子者非短子者耶曰是也孟甞君曰子何為思之對曰臣之處於斉也糲粢之飯藜藿之羮冬日則寒凍夏日則暑傷自唐子之短臣也以身歸君食芻豢飯黍粢服輕煖乗牢良臣故思之此謂毀人而反利之者也是故毁譽之言不可不審也或貪生而反死或輕死而得生或徐行而反疾何以知其然也魯人有為父報讎於斉者刳其腹而見其心坐而正冠起而更衣徐行而出門上車而歩馬顔色不變其御欲驅撫而止之曰今日為父報讎以出死非為生也今事已成矣又何去之追者曰此有節行之人不可殺也解圍而去之使被衣不暇帶冠不及正蒲伏而走上車而馳必不能自免於千歩之中矣今坐而正冠起而更衣徐徐而出門上車而歩馬顔色不變此衆人所以為死也而乃反以得活此所謂徐而馳遟於歩也夫走者人之所以為疾也歩者人之所以為遟也今反乃以人之所為遟者反為疾明於分也有知徐之為疾遟之為速者則幾於道矣故黄帝亡其珠使離珠剟索之离珠明目剟捷疾利搏善拾於物二人皆黃帝臣也而弗能得之也於是使忽怳而後能得之忽怳黃帝臣也怱怳善亡之人聖人敬小慎微動不失時百射重戒射象禍乃不滋計福勿及慮禍過之同日被霜蔽者不傷愚者有備與知者同功夫爝火在缥烟之中也一指之所能息也塘漏若鼷穴一撲之所能塞也及至火之燔孟諸而炎雲臺孟諸宋大澤云臺髙至云也而水決九江而漸荆州雖起三軍之衆弗能救也夫積愛成福積怨成禍若癕疽之必潰也所浼者多矣浼汚諸御鞅復於簡公諸御鞅斉臣簡公斉君曰陳成常宰予二子者甚相憎也予孔子弟子仕於斉臣恐其構難而危國也君不如去一人簡公不聽居無幾何陳成常果攻宰予於庭中而弑簡公於朝此不知敬小之所生也魯季氏與郈氏雞季氏郈氏皆魯大夫郈氏介其雞介以芥菜塗其雞翅而季氏為之金距金距施今芒於距也季氏之雞不勝季平子怒因侵郈氏之宫而築之郈昭伯怒傷之魯昭公復毁譜也曰禱於襄公之廟舞者二人而已時魯禱先君襄公六佾之舞庭者凡二人也其餘盡舞於季氏季氏之無道無上乆矣弗誅必危社稷公以告子家駒子家駒魯大夫子家駒曰季氏之得衆三家為一三家孟氏叔氏季氏其徳厚其威强君胡得之昭公弗聽使郈昭伯將卒以攻之仲孫氏叔孫氏相與謀曰無季氏死亡無日矣遂興兵以救之郈昭伯不勝而死魯昭公出奔斉故禍之所從生者始於雞定及其太也至於亡社稷故蔡女蕩舟斉師大侵楚齊桓公與蔡姬乗舟姬蕩舟公懼止之公怒歸之蔡蔡人嫁之公伐楚至召陵而勝之也兩人構怨廷殺宰予簡公遇殺身死無後陳氏伐之斉乃無吕兩家雞季氏金距郈氏作難魯昭公出走故師之所處生以楚楚大荆也禍生而不蚤滅若火之得燥水之得濕浸而益大癕疽發於指其痛徧於體故蠧啄剖梁柱蟁䖟走牛羊此之謂也人皆務於救患之備而莫能知使患無生夫得患無生易於救患而莫能加務焉則未可與言術也晉公子重耳過曹曹君欲見其骿脇使之祖而補魚負羈止之曰公子非常也從者三人皆霸王之佐也三人謂偃趙衰胥臣遇之無禮必為國憂君弗聽重耳反國起師而伐曹遂滅之身死人手社稷為墟禍生於而捕魚斉楚欲救曹不能存也聽釐負羈之言則無亡患矣今不務使患無生患生而救之雖有聖知弗能為謀且患禍之所由來者萬端無方是故聖人深居以避辱靜安以待時小人不知禍福之門户妄動而絓羅網雖曲為之備何足以全其身譬猶失火而鑿池被裘而用箑也且塘有萬穴此設隨隄之有万穴塞有十魚何遽無由出室有百戸閉其一盜何遽無從人夫牆之壊也於劒之折必有齧齧缺聖人見之蚤故萬物莫能傷也大宰予朱侍飯於令尹子國子朱子囯皆楚大夫令尹子國啜羮而熱投巵漿而沃之明日太宰子朱辭官而歸其僕曰楚太宰未易得也辭官去之何也子朱曰令尹輕行而簡禮其辱人不難明年伏郎尹而笞之三百郎尹王即官之尹也夫仕者先避之見終始微矣夫鴻鵠之未孚於也一指篾之則靡而無形矣及至其筋骨之已就而羽翮之所成也則奮翼揮䎚䎚六翮之末也凌乎浮雲㫮負青天膺摩赤霄赤霄飛亡翶翔乎忽荒之上析惕乎虹蜺之間雖有勁弩利矰微繳蒲沮之子巧亦弗能加也江水之始出於岷山也可攓衣而越也及至其下洞庭騖石城洞庭在長沙石城在丹陽經丹徒丹徒在㑹稽起波濤潮者涌起運者為濤舟杭一日不能済也是故聖人者常從事於無形之外而不留思盡慮於成事之内是故患禍弗能傷也人或問孔子曰顔回何如人也曰仁人也丘弗如也子貢何如人也曰辨人也丘弗如也子路何如人也曰勇人也丘弗如也賔曰三人皆賢夫子而為夫子役何也孔子曰丘能仁且忍辨且訥勇且怯以三子之能易丘一道丘弗為也孔子知所施之也秦牛缺徑於山中牛缺隱士也而遇盜奪之車馬解其槖笥施其衣被施奪盜還反顧之無懼色憂志驩然有以自得也盗遂問之曰吾奪子財貨劫子以刀而志不動何也秦牛缺曰車馬所以載身也衣被所以揜形也聖人不以所養害其養盜相視而笑曰夫不以欲傷生不以利累形者丗之聖人也以此而見王者必且以我為事也還反殺之此能以知知矣而未能以知不知也能勇於敢而未能勇扵不敢也凡有道者應卒而乏遭難而能免故天下貴之今知所以自行也而未知所以為人行也其所論未之究者也人能由昭昭於冥則幾扵道矣詩曰人亦有言无哲不愚此之謂也事或為之適足以敗之或備之適足以致之何以知其然也秦皇挾録圖挾鋪也秦博士盧生使入海還秦錄圖書於始皇帝見其傳曰亡秦者胡也因發卒五十万使蒙公楊翁子蒙公蒙恬也楊翁子秦將築脩城西屬流沙起隴西臨洮縣北擊遼水遼水遼東東結朝鮮朝鮮楽痕中囯内郡輓車而餉之又利越之犀角象齒翡翠翡赤雀翠青雀珠璣貟者為珠類者為㡬乃使尉屠雎尉屠雎秦將發卒五十万為五軍一軍塞鐔城之嶺鐔城在武陵西南接鬰林一軍守九嶷之塞九嶷在零陵也一軍處畨禺之都畨禺南海一軍守南野之界南野在豫章一軍結餘干之水餘干召竟三年不解甲㢮弩使監禄無以轉餉又以卒鑿渠監禄秦將也鑿通歌水离水之渠也而通糧道以與越人殺西嘔君譯吁宋西嘔趙人譯吁宋臣嘔君名也而越人皆入叢薄中與禽獸處莫肯爲秦虜相置桀駿以爲而夜攻秦人大破之殺尉屠睢伏尸流血數十万乃發適戍以備之當此之時男子不得脩農婦人不得剡麻考縷考成羸弱服格於道大夫箕㑹於衢箕會以箕於衢㑹斂病者不得養死者不得葬於是陳勝起於大澤奮臂大呼天下席卷而至於戲戲地名在新豐劉項㒷義兵隨而定若折槁振落遂失天下禍在備胡而利越也欲知築脩城以備亡而不知築脩城之所以亡也發適戌以備越而不知難之從中發也夫鵲先識歳之多風也去髙木而巢扶枝扶旁大人過之則探鷇嬰兒過之則恌其知備逺難而忘近患故秦之設備也烏鵲之智也或爭利而反強之或從而反止之何以知其然也鲁哀公欲西益宅史爭之以爲西益宅不祥西益宅築舊居之西更以爲田宅不止益哀公作色而怒左右数諫不乃以問其傅宰折睢宰折睢傅名姓曰吾欲益宅而史以爲不祥子以爲何如宰折睢曰天下有三不祥西益宅不与焉哀公大恱而喜頃復問曰何謂三不祥對曰不行礼義一不祥也嗜慾无止二不祥也不強諫三不祥也哀公黙然深念憤然自反遂不西益宅夫史以爭爲可以止之而不知不爭而反取之也知者離路而得道愚者守道而失路夫兒說之巧於閉结无不解兒說宋大夫也非能閉结而盡解之也不解不可解也至乎以弗解之者可与及言論矣或明礼義推道礼而不行或解妄言而反當何以明之孔子行遊馬失食農夫之稼野人怒取馬而繋之子貢往說之卑辭而不能得也孔子曰夫以人之所不能說人譬猶以大牢享野獸大牢三牲以九韶楽飛鳥也予之罪也非彼人之過也乃使馬圉往說之圉養馬者至見野人曰子耕於東海至於西海吾馬之失安得不食子之苗野人大喜解馬而与之說若此其无方也而反行亊有所至而巧不若拙故聖人量鑿而正枘夫歌采菱發陽阿鄙人之不若此延路陽局延路陽局鄙歌曲也非歌者拙也聽者異也故交畫不暢暢申連環不解物之不通者聖人不爭也仁者百姓之所慕也義者衆庶之所髙也爲人之所慕行人之所髙此嚴父之所以敎子而忠臣之所以事君也然世或用之而身死囯亡者不同於時也昔徐偃王好行仁義陸地之朝者三十二國王孫厲謂楚荘王王孫厲楚臣也曰王不伐徐必反朝徐王曰偃王有道之君也好行仁義不可伐王孫厲曰臣聞之大之与小強之与弱也猶石之投卯虎之㗖豚又何疑焉且也為文而不能達其德為武而不能任其力乱莫大焉楚王曰善乃㪯兵而伐徐遂滅之此知仁義而不知丗変者也申茮杜申茮杜皆香申也美人之所懷服也及慚之扵滫滫臭汁也則不能保其芳矣古者五帝貴德三五用義五霸任力今取帝王之道而施之五霸之世是由乗遂人扵榛薄而蓑笠盤旋也今霜降而樹榖冰泮而求穫欲其食則難矣故易曰濳龍勿用者言時之不可以行也故君子終日乾乾夕惕若厲无咎終日乾乾以陽動也夕惕若厲以隂息也因日以動因夜以息唯有道者能行之夫徐偃王為義而滅燕子噲行仁而亡子噲燕王也蘇代子噲讓囯遂専政斉伐燕大敗之噲死也哀公好儒則削哀公魯君代君為墨而殘代君趙之别国滅亡削殘暴乱之所致也而四君獨以為仁義儒墨而亡者遭之時務異也非仁義儒墨不行非其丗而用之則為之擒矣夫㦸者所以攻城也鏡者所以照形也宫人得㦸則以刈葵宫人官侍盲者得鏡則以蓋巵不知所施之也故善鄙不同誹譽在俗趨舍不同逆順在君狂譎不受禄而誅狂譎東海之上人也耕田而食讓不受祿大公以為節虚乱民而誅段干木辭相而顯所行同也而利害異者時使然也故聖人雖有其志不遇其丗僅足以容身何功名之可致也知天之所為知人之所行則有以任於丗矣知天而不知人則无以与俗交知人而不知天則无以与道遊單豹倍丗離俗單豹隱士巖居谷飲不衣絲麻不食五榖行年七十猶有童子之色卒而遇飢虎殺而食之張毅好恭張毅好礼之人過宫室廊廟必趨見門閭聚衆必下斯徒馬圉皆与伉禮不终其壽内熱而死豹養其内而虎食其外毅脩其外而疾攻其内故直意適情堅強賊之以身役物則隂陽食之此皆載務而戲乎其調者也得道之士外化而内不化外化所以入人也内不化所以全其身也故内有一定之操而外能詘伸嬴縮卷舒与物推移故万㪯而不䧟所以貴聖人者以其能龍変也今捲捲然守一節推一行雖以毁碎滅沉猶且弗易者此察扵小好而塞於大道也趙宣孟活飢人於委桑之下而天下稱仁焉荆佽非犯河中之難不失其守而天下勇焉是故見小行則可以論大體矣田子方見老馬於通田子方魏人也通道喟然有志焉以問其御曰比何馬也其御曰此故公家畜也老罷而不為用出而鬻之田子方曰少而貪其力老而弃其身仁者弗為也束帛以贖之罷武聞之知所㱕心矣斉莊公出獵有一蟲㪯足搏其輪問其御曰此何蟲也對曰此謂螳蜋者也其為蟲也知進而不知不量力而䡖敵莊公曰此為人必為天下勇武矣迴車而避之勇武聞之知所盡死矣故田子方隱一老馬隱哀而魏國載之㪯荘公避一螳蜋而勇武㱕之湯敎祝網者而四十國朝昔湯出見四面張網者湯敎去其三面祝曰欲上者上欲下者下无入吾網文王葬死人之骸而九夷㱕之文王治靈臺得死人之骨夜夢死人呼而請葬扵且文王反葬以五大夫之礼武王䕃暍人扵樾下武王哀暍者之故䕃之於樾下樾下衆樹之虚地左擁而右扇之而天下懷其德越王句踐一決獄不辜援龍淵而切其股血流至足以自罰也而戰武士必其死故聖人行之扵小則可以覆大矣審之於近則可以懷逺矣孫叔敖決期思之水而雩婁之野雩婁今廬江是莊王知其可以為令尹也子發辨擊劇而勞佚斉辨次第也擊劇次第罷勞之賞各有斉等也或曰子發辨擊之勞佚斉子發築設勞佚之莭是以楚知可為兵斉同楚國知其可以為兵主也此皆形扵小微而通於大理者也聖人之㪯事不加焉察其所以而已矣今万人調鍾不能比之律誠得知者一人而足矣說者之論亦猶此也誠得其數則无所用多矣夫車之所以能轉千里者以其要在三寸之轄夫人而弗能使也禁人而弗能止也其所由者非理也昔者衛君朝於吴衛君衛侯轉也吴王囚之吴王夫差欲流之於海者者冠蓋相望而弗能止鲁君聞之魯君哀公撤鍾鼓之縣縞素而朝仲尼入見曰君胡為有色鲁君曰諸侯无親以諸侯為親大夫无黨以大夫為黨今衛君朝於吴王吴王囚之而欲流之於海孰衛君之仁義而遭此難也吾欲免之而不能為奈何仲尼曰若欲免之則請子貢行鲁君召子貢授之軍之印子貢辭曰貴无益於解患在所由之道歛躬而行至於吴見太宰噽太宰噽甚恱之欲薦之於王子貢曰子不能行能行說於王奈何吾因子也太宰噽曰子焉知噽之不能也子貢曰衛君之来也衛囯之半日不若朝於晉其半曰不若朝於吴然衛君以為吴可以歸骸骨也故束身以受命今子受衛君而囚之又欲流之於海是賞言朝於晉者而罰言朝於吳也且衛君之來也諸侯皆以為蓍以為蓍以卜朝吴之凶也兆今朝於吴而不利則皆移心於晉矣子之欲成霸王之業不亦難乎太宰噽入復之扵王王報出今於百官曰比十日而衛君之禮不具者死子貢可謂知所以說矣鲁哀公為室而太公宣子諫公宣子魯大夫室大衆与人処則譁少与人処則悲願公之適公曰寡人聞命矣築室不輟公宣子復見曰囯小而室大百姓聞之必怨吾君諸侯聞之必輕吾囯鲁君曰聞命矣築室不輟公宣子復見曰左昭而右穆昭穆先君宗廟為大室以臨二先君之廟得无害於子乎公乃令罷役除版而去之鲁君之欲為室誠矣公宣子止之必矣然三說而一聼者其二者非其道也夫臨河而鈞日入而不能得一儵鱼者非江河鱼不食也所以餌之者非其欲也及至良工執竿投而擐脣吻者能以其所欲而釣者也夫物无不可奈何言物皆可術而治也有人无奈何事有人材所不及无奈之何也鈆之与丹異殊色而可以爲丹者得其数也故繁文辭无益於審其所由而已矣物之相摩近而異門户者衆而難識也故或之而非或不之而是或若然而不然者或不若然而然者諺曰鳶墮腐䑕而虞氏以亡何謂也曰虞氏梁之大冨人也梁今之陳留俊儀也家充盈殷冨金錢无量財貨无貲髙楼臨大路設楽陳酒積博其上游俠相隨而行楼下博上者射朋張中反兩射朋張上祺中之以一反兩也而飛鳶適墮其腐䑕而中游俠游俠相与言曰虞氏冨楽之日乆矣而常有䡖易人之志吾不敢侵犯而乃辱我以腐䑕如此不報无以立務於天下務勢請与公僇力一志悉率徒屬而必以滅其家此所謂之而非者也何謂非而是屈建告石乞屈建楚大夫也石乞白公之黨也曰白公勝爲亂石乞曰不然白公勝卑身下士不敢驕賢其家无筦籥之信関楗之固大斗斛以出輕斤兩以内而乃論之以不冝也屈建曰此乃所以反也居三年白公勝果爲乱殺令尹子椒司馬子期子椒子期皆白公之季父此所謂弗而是者也何謂若然而不然子發爲上蔡令民有罪當刑獄断論定決於令尹前子發喟然有悽愴之心罪人巳刑而不忘其恩此其後子發盤罪威王盤辟也發得罪辟於威王也而出奔刑者遂襲恩者恩者逃之扵城下之廬踹足而怒踹足蹀足曰子發視決吾罪而吾刑吾怨之㦧於骨髓㦧痛使我得其而食之其知猒乎追者皆以爲然而不索其内果活子發此所謂若然而不若然者何謂不然而若然者昔越王句踐卑下吴王夫差請身爲臣妻爲妾奉四時之祭祀而入春秋之貢職委社禝効民力居隱為蔽而為鋒行礼甚卑辭甚服其離叛之心逺矣然而甲卒三千人以擒夫差於姑胥姑胥地名此四䇿者不可不審也夫事之所以難知者以其竄端匿跡立私於公邪於正而以勝惑人之心者也若使人之所懐於内者与所見於外者若合符節則天下无亡囯破家矣夫狐之捕雉也必先卑躰弭耳以待其来也雉見而信之故可得而擒也使狐瞋目植睹植睹枉尾見必殺之勢雉亦知驚惮逺飛以避其怒矣夫人偽之相欺也非直禽獸之詐計也物相似若然而不可従外論者衆而難識矣是故不可不察也淮南鴻烈解卷第十八淮南鴻烈解卷第十九
