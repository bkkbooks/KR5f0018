front:
  text: 泰族訓第二十秦言古今之道万物之指族於一理明其所謂也天設日月列星辰調隂陽張四時日以暴之夜以息之風以乾之雨露以濡之其生物也莫見其所養而物長其殺物也莫見其所䘮而物亡此之謂神明聖人象之故其起福也不見其所由而福起其除禍也不見其所以而禍除逺之則邇延之則踈稽之弗得察之不虛日計无筭歳計有餘夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣日之行也不見其移騏倍日而馳草木為之靡縣熢未轉縣熢邊候見虜㪯熢轉相受行道里最疾者而日在其前故天之且風草木未動而鳥已翔矣鳥巢居知風也其且雨也隂曀未集而鱼已噞矣魚潜居知雨也以隂陽之氣相動也故寒暑燥濕以相從声響疾徐以音相應也故易曰鳴鶴在隂其子和之髙宗諒闇三年不言四海之内寂然无声一言声然大動天下是以天心呿唫者也故一動其本而百枝皆應若春雨之万物也渾然而流沛然而施无地而不澍无物而不生故聖人者懷天心声然能動化天下者也故精誠感於内形氣動於天則景星見黄龍下祥鳯至醴泉出嘉榖生河不滿溢海不溶波故詩云懷柔百神及河嶠岳逆天暴物則日月薄蝕五星失行四時千乗晝㝠宵光山崩川涸冬雷夏霜詩曰正月繁霜我心傷天之与人有以相通也故囯危亡而天文変丗惑乱而虹蜺見万物有以相連精祲有以相蕩也精祲氣之侵入者也故神明之事不可以智巧為也不可以䈥力致也天地所包隂陽所嘔雨露所濡以生万物瑶碧玉珠翡翠玳文彩明朗润澤若濡摩而不玩乆而不渝奚仲不能旅旅部旅也魯般不能造此之謂大巧宋人有以象為其君為楮葉者象象牙也三年而成莖柯豪芒鋒殺顔澤乱之楮華之中而不可知也列子曰使天地三年而成一葉則万物之有葉者寡矣夫天地之施化也嘔之而生吹之而落豈此哉故凡可度者小也可数者少也至大非度之所能及也至衆非数之所能領也故九州不可頃畒也八極不可道里也太山不可丈尺也江海不可斗斛也故大人者与天地合德日月合明与神合靈与四時合信故聖人懷天氣抱天心執中含和不下廟堂而衍四海変習易俗民化而迁善若性諸己能以神化也詩云神之聽之終和且平夫神視之无形聽之无声然而郊天望山川禱祠而求福雩兊而請雨兊說也筮而決事詩曰神之格思不可度思矧可射思此之謂也天致其髙地致其厚月照其夜日照其晝隂陽化列星期非有道而物自然故隂陽四時非生万物也雨露時降非養草木也神明接隂陽和而万物生矣故髙山深林非爲虎豹也大木枝非爲飛鳥也流源千里渊深百仞非爲蛟龍也致其髙崇成其廣大山居木棲巢枝穴藏冰潜陸行各得其所寕焉夫大生小多生少天之道也故丘阜不能生雲雨滎水不能生魚鼈者小也牛馬之氣蒸生蟣虱蟣虱之蒸不能生牛馬故化生於外非生於内也夫蛟龍伏寢於渊而卵剖於陵蛟龍鼈屬也乳扵陵而伏於渊其卵自孕也螣蛇雄鳴於上風雌鳴於下風而化成形精之至也故聖人養心莫善於誠至誠而能動化矣今夫道者藏精於内棲神扵心靜漠活淡訟繆匈中訟容也繆靜也邪氣无所留滯四枝莭族毛蒸理泄則機樞調利百脉九竅莫不順比其所居神者得其位也豈莭柎而毛脩之哉聖主在上位廓然无形寂然无声官府若无事朝廷无人无隱士无軼民无勞役无刑四海之内莫不仰上之德象主之指夷狄之囯重譯而至非戸辨而家說之也推其誠心施之天下而已矣詩曰惠此中囯以綏四方内順而外寕矣大王亶父処邠狄人攻之杖䇿而去百姓攜㓜扶老負釡甑踰梁山而囯乎歧周非令之所能召也秦穆公為野人食駿馬之傷也飲之美酒韓之以其死力報非劵之所責也劵契也密子暴亂制夏商因民之欲也故能因則无敵於天下矣夫物有以自然而後人亊有治也故良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為噐窬木而為舟鑠鐵而為刀鑄金而為鍾因其可也駕馬服牛令雞司夜令狗守門因其然也民有好色之性故有大㛰之礼有飲食之性故有大饗之有喜楽之性故有鍾鼓筦絃之音有悲哀之性故有衰絰哭踊之莭故先王之制法也因民之所好而為之莭文者也因其好色而制㛰姻之礼故男女有别因其喜音而正雅頌之声故風俗不流因其寕家室楽妻子敎之以順故父子有親因其喜朋友而敎之以悌故長㓜有序然後脩朝聘以明貴賎饗飲習射以明長㓜時捜振旅以習用兵也搜簡車馬也出曰治兵入日振旅也入斈庠序以脩人倫此皆人之所有於性而聖人之所匠成也故无其性不可敎訓有其性无其養不能遵道繭之性為絲然非得工女煑以熱湯而抽其统紀則不能成絲卵之化為雛非慈雌嘔煖覆伏累日積乆則不能為雛人之性有仁乂之資非聖王為之法度而教導之則不可使郷方故先王之敎也因其所喜以善因其所以禁奸故刑罰不用而威行如流政令約省而化燿如神故因其性則天下聽从拂其性則法縣而不用昔者五帝三王之莅政施教必用叅五何謂叅五仰取象於天俯取度於地中取法於人乃立明堂之朝行明堂之令明堂布政之宫有十二月之政令也以調隂陽之而和四時之莭以辟疾病之菑俯視地理以制度量察陵陸水澤肥墽髙下之冝立亊生財以除飢寒之患中考乎人德以制礼楽行仁義之道以治人倫而除暴乱之禍乃澄列金木水火土之性澄淸也故立父子之親而成家别清濁五音六律相生之数以立君臣之乂而成囯察四時季孟之序以立長㓜之礼而成官此之謂叅制君臣之義父子之親夫婦之辨長㓜之序朋友之際此之謂五乃裂地而州之分職而治之築城而居之割宅而異之分財而衣食之立大斈而敎誨之夙㒷夜寐而勞力之此治之紀綱已然得其人則㪯失其人則廢堯治天下政教平德润洽在位七十載乃求所属天下之統令四岳揚側四岳㪯舜而薦之堯堯乃妻以二女以其内二女娥皇女英任以百官以其外旣入大麓烈風雷雨而不迷林属於山曰麓堯使舜入林麓之中遭大風雨不迷也乃属以九子堯有九男贈以昭華之玉昭華玉名而傳天下焉以爲虽有法度而朱弗能统也朱堯子也夫物未甞有張而不弛成而不毀者也唯聖人能盛而不衰盈而不虧神農之初作琴也以㱕神及其也反其天心夔之作楽也夔堯典楽臣也皆合六律而調五音以通八風及其衰也以沉湎淫康不顧政治至於滅亡蒼頡之作書以辯治百官領聖万事愚者得以不忘智者得以志逺至其衰也爲奸刻偽書以解有罪以殺不辜湯之作囿也以奉宗廟鲜犞之具生肉爲鮮乾肉爲犞士卒習射御以戒不虞及至其衰也馳騁獵射以奪民時罷民之力堯之㪯禹后稷臯陶政敎平奸宄息獄訟止而衣食足䝨者善而不肖者懷其德及至其末朋黨比周各推其与廢公趨私外内相推㪯奸人在朝而䝨者隱処故易之失也卦書之失也敷楽之失也淫詩之失也辟礼之失也責春秋之失也刺天地之道極則反盈則損五色虽㓪有時而渝茂木豊草有時而落物有降殺不得自若故聖人亊窮而更為法弊而改制非楽変古易常也將以救敗扶衰黜淫済非以調天地之氣順万物之冝也聖人天覆地載日月照隂陽調四時化万物不同无故无新无疏无親故能法天天不一時地不一利人不一亊是以緒業不得不多端趨行不得不殊方五行異氣而皆適調六藝異科而皆同道温惠柔良者詩之風也淳厖敦厚者書之教也淸明條達者易之乂也恭儉尊讓者礼之為也寛裕簡易者楽之化也刺幾辯義者春秋之靡也故易之失易以定凶故也楽之失淫楽変之於鄭声淫也詩之失愚詩人怒怒近愚也書之失拘書有典漠之制拘以法也礼之失忮礼尊尊卑卑尊不下卑故忮也春秋之失訾春秋貶絶不避王人書人之過相訾也六者聖人兼用而財制之失本則乱得本則治其美在調其失在水火金木土榖異物而皆任規矩權衡準绳異形而皆施丹靑膠漆不同而皆用各有所適物各有冝輪貟輿方轅从衡横勢施便也驂欲馳服欲歩驂騑服車中馬也帶不猒新鉤不猒故処地冝也関睢㒷於鳥而君子羙之為其雌雄之不乖居也鹿鳴㒷扵獸君子大之取其見食而相呼也泓之軍敗君獲宋襄公与楚於泓楚人敗之襄公獲也而春秋大之取其不鼔不成列也宋伯姫坐燒而死伯宋共公夫人夜失火待傅母不至不下堂而及大死之也春秋大之取其不踰礼而行也成功立亊豈足多哉方指所言而取一槩焉爾王喬赤松去塵埃之閒離群慝之紛慝惡也及隂陽之和食天地之精呼而出故吸而入新喋虚輕㪯乗雲遊霧可謂養性矣而未可謂孝子也周公誅管叔蔡叔以平囯弭乱可謂忠臣也而未可謂弟也湯放桀武王誅紂以爲天下去殘除賊可謂惠君而未可謂忠臣矣楽羊攻中山未能下中山烹其子而食之以示威可謂良而未可謂慈父也故可乎可而不可乎不可不可乎不可而可乎可舜許由異行而皆聖伊尹伯夷異道而皆仁箕子比干異趨而皆䝨故用兵者或輕或重或貪或廉此四者相反而不可一无也輕者欲發重者欲止貪者欲取廉者不利非其有故勇者可貪進闘而不可令持牢重者可令埴固而不可令凌敵貪者可令進取而不可令守職廉者可令守分而不可令進取信者可令持約而不可令應変五者相反聖人兼用而財使之夫天地不包一物隂陽不生一海不讓水潦以成其大山不讓土石以成其髙夫守一隅而遺万方取一物而弃其餘則其所得者鲜而所治者淺矣治大者道不可以小地廣者制不可以狹位髙者事不可以煩民衆者教不可以苟夫事碎難治也法煩難行也求多難贍也寸而度之至丈必差銖而稱之至石必過石秤丈量徑而寡失简絲数米煩而不察言事當因大法如阅絲数米則煩而无功也故大較易為智曲辯難為惠故无益於治而有益於煩者聖人不為无益扵用而有益於費者智者弗行也故功不猒约事不猒省求不猒寡功約易成也亊省易治也求寡易贍也衆易之扵以任人易矣孔子曰小辯破言小利破義小義破道小見不逹必河以逶蛇故能逺山以陵遟故能髙隂陽无為故能和道以優游故能化夫徹於一亊察於一辭審扵一投可以曲說而未可廣應也蓼菜成行甂甌有稱薪而爨数米而炊可以治小而未可以治大也貟中規方中矩動成獸止成文可以愉舞而不可以陳軍滌盃而食洗爵而飲盥而後饋可以養少而不可以饗衆今夫祭者屠割烹殺剥狗燒豕調平五味者庖也陳簠簋噐方中者為簠圎中者為簋也列樽俎設籩豆者祝也斉明盛服渊默而不言神之所依者尸也宰祝虽不能尸不越樽俎而代之故張瑟者小絃急而大絃緩立事者賤者勞而貴者逸舜為天子彈五絃之琴歌南風之詩而天下治周公肴臑不收於前鍾鼓不解於懸而四夷服趙政晝決獄夜理書趙政秦始皇帝御史冠蓋接於郡縣覆稽趨留戍五嶺以備越築脩城以守胡然奸邪萌生盗賊群居事愈煩而乱愈生故法者治之具也而非所以為治也而猶弓矢中之具而非所以中也黄帝曰芒芒昧昧因天之威与元同氣故同氣者帝同乂者王同力者霸无一焉者亡故人主有伐囯之志邑犬群嘷伐囯逆天之行則時必有大禍雄雞夜鳴庫兵動而戎馬驚戎馬兵馬也雞夜鳴而兵馬起氣之感動也今日解怨偃兵家老甘卧巷无聚人妖菑不生非法之應也精氣之動也故不言而信不施而仁不怒而威是以天心動化者也施而仁言而信怒而威具以精誠感之者也施而不仁言而不信怒而不威是以外皃為之者也故有道以統之法虽少足以化矣无道以行之法虽衆足以乱矣治身太上養神其次養形治囯太上養化其次正法神清志平百莭皆寕養性之本也肌膚充腸腹供嗜欲養生之末也民交讓爭処卑委利爭受寡力事爭就勞曰化上迁善而不知其所以然此治之上也利賞而善畏刑而不為非法令正扵上而百姓服於下此治之未也上丗養本而下丗亊末此太平之所以不起也夫欲治之主不丗出而可与㒷治之臣不万一以万一求不丗出此所以千歳不一會也水之性淖以清窮谷之汚生以青苔青苔水垢也不治其性也掘其所流而深之茨其所決而髙之茨積土填滿也使得循勢而行乗衰而流衰下也虽有腐髊流漸弗能汚也腐髊骨也漸水也其性非異也通之与不通也風俗猶此也誠決其善志防其邪心啓其善道塞其奸路与同出一道則民性可善而風俗可美也所以貴扁鵲者非貴其隨病而調藥貴其擪息脉血知疾之所従生也言人之喘息脉之病可知所以貴聖人者非貴隨罪而鑒刑也貴其知乱之所由起也若不脩其風俗而縦之淫辟乃隨之以刑繩之法法虽殘賊天下弗能禁也禹以夏王桀以夏止湯以殷王紂以殷亡非法度不存也紀綱不張風俗壞也三代之法不亡而丗不治者无三代之智也六律具存而莫能聽者无師曠之耳也故法虽在必待聖而後治律虽具必待耳而後聽故囯之所以存者非以有法也以有䝨人也其所亡者非以无法也以无聖人也晉獻公欲伐虞宫之竒存焉為之寢不安席食不甘味而不敢加兵焉賂以宝玉駿馬宫之竒諫而不而不用越疆而去荀息伐之兵不血刃抱宝牽馬而
