body:
  text: 守不待渠壍而固攻不待衝降而抜得䝨之与失臧武仲以其智存鲁而天下莫能亡也璩伯玉以其仁寕衞而天下莫能危也易曰豐其屋蔀其家窺其戸其无人无人者非无衆庶也言无聖人以統理之也民无廉恥不可治也非修礼乂廉恥不立民不知礼乂法弗能正也非崇善廢醜而向礼乂无法不可以為治也不知礼乂不可以行法法能殺不孝者而不能使人為孔曾之行法能刑窃盗者而不能使人為伯夷之廉孔子弟子七十養徒三千人皆入孝出悌言為文章行為儀表教之所以成也墨子服役百八十人皆可使赴火蹈刃死不還踵化之所致也夫刻肌膚鑱皮革創流血至難也然越為之以求榮也越人以箴刺皮為龍文所以為尊榮之也聖王在上明好以示之經誹譽以尊之親䝨而進之賎不肖而退之无創流血之苦而有髙丗尊之名民孰不从古者法設而不犯刑錯而不用非可刑而不刑也百工维時庶績咸熈礼乂脩而任䝨得也故㪯天下之髙以爲三公一囯之髙以爲九卿一縣之髙以爲二十七大夫一郷之髙以爲八十一元士故知過万人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑明於天道察於地理通於人情大足以容衆德足以懷逺信足以一異知足以知変者人之英也德足以敎化行足以隱乂仁足以得衆明足以照下者人之俊也行足以爲儀表知足以決嫌疑廉可以分財信可使守約作事可法出言可道者人之豪也守職而不廢処乂而不比見難不苟免見利不苟得者人之傑也英俊豪傑各以小大之材処其位得其宜由本流未以重制輕上唱而民和上動而下隨四海之内一心同㱕背貪鄙而向乂理其扵化民也若風之揺草木无之而不靡今使愚敎知便不肖臨䝨虽刑罰民弗従也小不能制大弱不能使強也故聖主者㪯䝨以立功不肖主㪯其所与同文王㪯大公望召公奭而王桓公任管仲隰朋而霸此㪯䝨以立功也夫差用太宰噽而滅秦任李斯趙髙而亡此㪯所与同故其所㪯而治乱可見也察其黨与而䝨不肖可論也夫聖人之屈者以求伸也枉者以求直也故虽出邪辟之道行幽昧之塗欲以直大道成大功猶出林之中不得直道極溺之人不得不濡足也伊尹天下之不治調和五味負鼎俎而行伊尹七十說湯而不用於是負鼎俎調五未僅然後得用五就桀五就湯欲以濁為清以危為寕也周公股肱周室輔翼成王管叔蔡叔奉公子禄父而欲為乱周公誅之以定天下縁不得已也管子周室之卑諸侯之力征夷狄伐中囯民不得寕処故蒙耻辱而不死欲以夷狄之患平夷狄之乱也孔子欲行王道東西南北七十說而无所偶故因衛夫人彌子瑕而欲通其道衞夫人衞靈公夫人南子也彌子瑕衛之嬖臣此皆欲平險除穢由至炤炤動扵而統於善者也夫逐者於其反也而行者於其终也故舜放弟周公殺兄猶之為仁也文公樹米文公晋文公也樹米而欲生之曾子架羊架連架所以備知也猶之為知也當今之丗醜必託善以自為解邪必蒙正以自為辟游不論囯仕不擇官行不辟汚曰伊尹之道也分别爭財親戚兄弟搆怨骨相賊曰周公之乂也行无亷耻辱而不死曰管子之趨也行貨賂趣勢門立私廢公比周而取容曰孔子之術也此使君子小人紛然殽乱莫知其是非者也故百川並流不注海者不爲川谷趨行踳馳不㱕善者不爲君子故善言㱕乎可行善行㱕乎仁乂田子方段干木輕爵禄而重其身不以欲傷生不以利累形李克竭股肱之力領理百官輯穆万民使其君生无廢事死无遺此異行而㱕於善者田子方段干木李克皆魏文侯臣故皆㱕於善張儀蘇秦家无常居身无定君約从衡之亊爲傾覆之謀濁乱天下撓滑諸侯使百姓不遑啓居或从㦯横或合衆弱㦯輔冨強此異行而㱕於醜者也故君子之過也猶日月之蝕何害於明小人之可也猶狗之晝吠鴟之夜見何益於善夫知者不妄發擇善而爲之計乂而行之故事成而功足賴也身死而名足稱也虽有知能必以仁乂爲之本然后可立也知能踳馳百亊並行聖人一以仁乂爲之凖繩中之者謂之君子弗中者謂之小人君子虽死亡其名不滅小人虽得勢其罪不除使人左據天下之圗而右刎喉愚者不為也身貴扵天下也死君親之難視死若㱕乂重於身也天下大利也比之身則小身所重也比之乂則輕乂所全也詩曰愷悌君子求福不回言以信乂為凖绳也欲成霸王之業者必得勝者也能得勝必強者也能強者必用人力者也能用人力者必得人心者也能得人心者必自得者也故心者身之本也身者囯之本也未有得已而失人者也未有失已而得人者也故為治之本務在寕民寕民之本在於足用足用之本在於勿奪時勿奪時之本在於省亊省亊之本在於莭用莭用之本在於反性未有能揺其本而靜其末濁其源而清其流者也故知性之情者不務性之所无以爲知命之情者不憂命之所无奈何故不髙宮室者非爱木也不大鍾鼎者非爱金也直行性命之情而制度可以爲万民儀令自恱五色口嚼滋味耳淫五声七竅交爭以害其性日引邪欲而澆其身夫調身弗能治奈天下何故自養得其莭則養民得其心矣所謂有天下者非謂其履勢位受傳藉稱尊號也言運天下之力而得天下之心紂之地左東海右流沙前交阯後幽都師起容阅至浦水士億有餘万然皆倒矢而射傍㦸而武左左操黄右執白旄以麾之則瓦解而走遂土崩而下紂有南面之名而无一人之德此失天下也故桀紂不爲王湯武不爲放周処鄷鎬之地方不過百里而誓纣牧之野入據殷囯朝成湯之廟表商容之閭封比干之墓解箕子之囚乃折抱毁鼔偃五兵縦牛馬挺曶而朝天下百姓歌謳而樂之諸侯執禽而朝之得民心也闔閭伐楚五戰入郢燒髙府之粟破九龍之鍾楚為大能之以縣鍾也鞭荆平王之墓荆平王殺子胥之父故鞭其墓以復讎舍昭王之宮吴之人楚君舍乎君室大夫舍大夫室也昭王奔隨百姓父兄攜㓜扶老而隨之乃相率而為致勇之寇皆方面奮臂而為之闘當此之時无卒以行列之各致其死吳兵復楚地靈王作章華之臺靈王楚君發乾谿之役靈王伐徐以恐吳次於乾谿外内搔動百姓罷弊弃疾乗民之怨而立公子比弃疾皆靈五之兄弟百姓放臂而去之餓於乾谿食莽飲水莽草枕塊而死楚囯山川不変土地不易民性不殊昭王則相率而殉之靈王則倍畔而去之得民之与失民也故天子得道守在四夷天子失道守在諸侯諸侯得道守在四鄰諸侯失道守在四境故湯処亳七十里文王処礼百里皆令行禁止於天下周之衰也戎伐凡伯于楚丘以㱕凡伯周大夫使於魯而戎伐之楚丘故得道則以百里之地令於諸侯失道則以天下之大畏於兾州故曰无恃其不吾奪也恃吾不可奪行可奪之道而非弑之行无益於恃天下矣凡人之所以生者衣与食也今囚之冥室之中虽養之以芻豢衣之以綺繍不能楽也以目之无見耳之无闻穿穴見雨零則快然而嘆之況開戸發牖从冥冥見炤炤乎従冥冥猶尚肆然而喜又況出室坐堂見日月光見日月光曠然而楽又況登太山履石封以望八荒視天都若蓋江河若帶又況万物在其閒者乎其為楽豈不大哉且聾者耳形具而无能聞也盲者目形存而无能見也夫言者所以通己於人也聞者所以通人於己也瘖者不言聾者不聞旣瘖且聾人道不通故有瘖聾之病者虽破家求醫不顧其費豈獨形骸有瘖聾哉心志亦有之夫指之拘也莫不亊申也心之塞也莫知務通也不明扵也夫六藝之廣崇窮道德之渊深達乎无上至乎无下運乎无極翔乎无形廣於四海崇於太山冨於江河曠然而通昭然而明天地之閒无所繫戾其於以監豈不大哉人之所知者淺而物変无窮曩不知而今知之非知益多也問斈之所加也夫物常見則識之甞為則能之故因其患則造其備犯其難則得其便夫以一出之壽而千之知今古之論虽未甞更也其道理素具可不謂有術乎人欲知髙下而不能敎之用管準則說欲知輕重而无以予之衡則喜欲知逺近而不能敎之以金目則射快金目深目所以望逺近射準也又況知應无方而不窮哉犯大難而不攝見煩缪而不惑晏然自得其爲楽也豈直一說之快哉夫道有形者皆生焉其爲親亦戚矣享榖食氣者皆受焉其爲君亦患矣諸有智者皆斈焉其爲師亦博矣射者数發不中人敎之以儀則喜矣又況生儀者乎人莫不知斈之有益於己也然而不能者嬉戲害人也人皆多以无用害有用故知不博而日不足以鑿池之力耕則田野必辟矣以積土山之髙脩隄防則水用必足矣以食狗馬鴻鴈之費養士則名譽必榮矣以弋獵博弈之日誦詩讀書聞識必博矣故不斈之与斈也猶瘖聾之比於人也凡斈者能明於天下之分通於治乱之本澄心清意以存之見其終始可謂知略矣天之所爲禽獸草木人之所爲礼節制度而爲宫室制而爲舟輿是也治之所以爲本者仁義也所以爲末者法度也凡人之所以事生者本也其所以亊死者末也本末一躰也其兩爱之一性也先本後末謂之君子以末害本謂之小人君子与小人之性非異也所在先後而已矣草木洪者爲本而殺者爲末禽獸之性大者爲首而小者爲尾末大扵本則折尾大扵要則不掉矣故食其口而百莭其本而枝葉美天地之性也天地之生物也有本末其養物也有先後人之扵治也豈得无終始哉故仁義者治之本也令不知事脩其本而務治其末是釋其根而其枝也且法之生也以輔仁義今重法而棄義是貴其冠履而忘其頭足也故仁乂者爲厚基者也不益其厚而張其廣者毁不廣其基而增其髙者覆趙政不增其德而累其髙故滅知伯不行仁乂而務廣地故亡其囯語曰不大其棟不能任重重莫若囯棟莫若德囯主之有民也猶城之有基木之有根根深即本固基美則上寕五帝三王之道天下之綱紀治之儀表也今商鞅之啓塞啓之以利塞之以禁商鞅之術也申子之三符申不害治韓有三符驗之術也韓非之憤韓非說生之憤志張儀蘇秦之従衡蘇秦合六国為従張儀說為衡皆掇取之權一切之術也非治之大本亊之常可博内而丗傳者也子囊北而全楚北不可以為庸子囊楚大夫也北逐走庸常也髙誕而存鄭誕不可以為常今夫雅頌之声皆發於詞本於情故君臣以睦父子以親故韶夏之楽也声浸乎金石润乎草木今取怨思之声施之於絃管聞其音者不淫則悲淫則乱男女之辯悲則感怨思之氣豈所謂楽哉趙王迁流扵房陵秦㓕趙王迁之漢中房陵也思故郷作為山水之嘔山水之嘔歌曲聞者莫不殞涕荆軻西刺秦王无朝燕人太子丹之客也丹怨秦王故遣軻刺之也髙漸離宋意為擊筑而歌於易水之上髙漸離宋意皆太子丹之客也筑曲二十一易水燕之南水也聞者莫不瞋目裂眦髪植穿冠因以此声為樂而入宗廟豈古之所謂樂哉故弁冕輅輿可服而不可好也弁冕冠也大羮之和可食而不可嗜也大羮不和五味朱漏越朱練絲漏穿越琴瑟兩頭也一唱而三歎可聽而不可快也故无声者正其可聽者也其无味者正其足味者也吠声清於耳兼味快扵口非其貴也故亊不本於道德者不可以為儀言不合乎先王者不可以為道音不調乎雅頌者不可以為楽故五子之言五子謂商鞅申子韓非蘇秦張儀也所以便說掇取也非天下之通義也聖王之設政施敎也必察其終始其縣法立儀必原其本末不苟以一亊備一物而已矣見其造而思其功其源而知其流故博施而不竭彌久而不垢夫水出於山而入於海稼生於田而藏於倉聖人見其所生則知其所㱕矣故舜深藏黄金於嶄嵒之山所以塞貪鄙之心也儀狄為酒禹飲而甘之遂䟽儀狄而絶嗜酒所以遏流湎之行也師延為平公鼓朝歌北鄙之音衛靈公宿於濮水之上聞琴音召師涓而寫之葢師延所為紂作朝歌北鄙之音也師曠曰此亡囯之楽也靈公進新声平公平公以問師曠師曠曰纣子師延作靡靡之楽纣亡師延東走自投濮水而死得此音必於濮上也大息而撫之所以防淫辟之風也故民知書而德衰知数而厚衰知券契而信衰知械機而空衰也空質也巧詐藏於中則純白不備而神德不全矣琴不鳴而二十五各以其声應軸不運而三十輻各以其力疾有缓急小大然后成曲車有勞軼動靜而后能致逺使有声者乃无声者也能致千里者乃不動者也故上下異道則治同道則乱位髙而道大者従亊大而道小者凶故小快害義小慧害道小辯害治苟削傷徳大政不險故民易道至治寛裕故下不相賊至中復素故民无匿情商鞅爲秦立相坐之法相坐之法一家有罪三家坐之而百姓怨矣吳起爲楚减爵禄之令減爵者收減群臣之爵禄而功臣畔商鞅之立法也吳起之用兵也天下之善者也然商鞅以法亡秦察於刀筆之跡而不知治乱之本也吳起以兵弱楚習於行陳之亊而不知廟之也晉獻公之伐驪得其女非不善也然而史蘇嘆之晉獻公得驪姬使史蘇占之史蘇曰以銜骨齒牙爲禍也見其四丗之被禍也吳王夫差破斉艾陵勝晉黄地非不捷也庫之所獲爲捷而子胥之見其必擒於越也小白奔莒小白斉桓公也重耳奔曹非不困也而鮑叔咎犯隨而輔之知其可與至於霸也句踐捷於㑹稽脩政不殆謨慮不休知禍之為福也㐮子勝而有色趙襄子勝謂伐狄勝二邑也畏福之為禍也故斉公亡汶陽之田而霸鲁荘公使曹子刦公取汶陽之田公不背信諸侯朝之也知伯兼三晉之地而亡聖人見禍福於重閉之内而慮患於九拂之外者也九拂九曲是折投拂不見処也螈蚕一歳收螈也非不利也然而王法禁之者為其殘桑也離先稻熟而農夫耨之稻米隨而生者為離与稻相似耨之為其少寔不以小利傷大獲也家老異飯而食殊噐而享子婦跣而上堂跪而斟羮非不費也然而不可省者為其害乂也得媒而结言聘纳而取婦絻而親迎非不煩也然而不可易者所以防淫也使民居処相司有罪相斍於以㪯奸非不掇也然而傷和睦之心而仇讎之怨故亊有鑿一孔而生百樹一物而生万葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為濊愚者惑於小利而忘其大害昌羊去蚤蝨而人弗庠者為其來蛉窮也貍執䑕而不可脫於庭者為搏雞也故事有利於小而害於大得於此而亡於彼者故行棊者或食兩而路窮行棊謂大博也或子踦而取勝子踦子對家竒一棊也偷利不可以為行而知術可以為法故仁知人材之美者也所謂仁者爱人也所謂知者知人也爱人則天虐刑矣知人則无乱政矣治由文理則无悖謬之事矣刑不侵滥則无暴虐之行矣上无煩乱之治下无怨望之心則百殘除而中和作矣此三代之所昌故書曰能哲且惠黎民懷之何讙兠何迁有苗讙兠有苗舜所放佞也知伯有五過人之材知伯美鬚長大一材也射御足力也材二材藝畢給三材也功文辯慧四材也強毅果敢五材也而不免於身死人手者不爱人也斉王建有三過人之巧力能引強走先馳馬超能越高而身虜於秦者不知賢也王建任用后勝之計不用淳于越之言也故仁莫大於爱人知莫大於知人二者不立虽察慧捷巧劬禄疾力不免於乱也淮南鴻烈解卷第二十淮南鴻列要略閒詁第二十一太尉祭酒臣許愼記上要略
