body:
  text: 凡鴻列之書二十篇略數其要明其所指字其微妙論其大躰夫作爲書論者所以紀綱道德經緯人事上考之天下揆之地中通諸理雖未能抽引妙之中才繁然足以終始矣揔要舉凡而語不剖判純樸靡散大宗純樸太素也太宗事本也則爲人之惽惽然弗能知也故多爲之辭博爲之說又恐人之離本就末也故言道而不言事則無以與丗浮沉言事而不言道則無以與化游息故著二十篇有原道有俶眞有天文有地形有時則有覽有精神有本經有主術有繆稱有齊俗有道應有汜論有詮言有兵略有山有說林有人閒有脩務有泰族也原道者盧牟六合混沌萬物象太一之容太一之容北極之氣合爲一躰也測窈冥之深以翔虚无之軫軫道畛也託小以苞大守約以治廣使人知先後之禍福動靜之利害誠通其志浩然可以大矣欲一言而寤寤斍時則尊天而保眞欲再言而通則賤物而貴身欲參言而究則外欲而反情執其大指以内洽洽淍五藏瀐濇肌膚被服法則而與之終身所以應待萬方覽耦耦通百變也若轉丸掌中足以自樂也俶眞者窮逐終始之化嬴垀有無之精嬴繞帀也埒摩煩也離别萬物之變合同死生之形使人知遺物反巳審仁義之閒通同異之理至德之統知變化之紀說符妙之中通迴造化之母也造化之母元氣太一初也天文者所以和隂陽之氣理日月之光節開塞之時列星辰之行知逆順之変避忌諱之殃順時運之應法五神之常使人有以仰天承順而不亂其常者也地形者所以窮南北之脩極東西之廣經山陵之形區川谷之居明萬物之主知生之衆列山淵之数規逺近之路使人通迵周備不可動以物不可驚以怪者也時則者所以上因天時下盡地力據度行當合諸人則刑十二節一月為人一節也以為法式終而復始歳終十二月正月始也轉於無極因循倣依以知禍福操舎開塞各有龍忌中国以神之士曰忌北胡南越皆謂之請龍發號施令以時敎期使君人者知所以從事覽者所以言至精之通九天也至微之淪無形也純粹之入至淸也昭昭之通冥也乃始攬物物引覽取撟掇橋取也掇拾也浸想宵浸微視也宵物似也類衆也物之可以喻意象形者乃以穿通窘決瀆壅塞引人之意繫之無極乃以明物之感同氣之應隂陽之合形埒之朕所以令人逺博見者也精神者所以原夲人之所由生而曉寤其形骸九竅取象於天合同其血氣與雷霆風雨比其喜怒與晝宵宵夜寒暑並明審死生之分别同異之跡節動靜之機以反其性命之宗所以使人愛養其精神撫静其魂魄不以物易已而堅守虚无之宅者也夲經者所以明大聖之德通維之道埒略衰丗古今之變以襃先聖之隆盛而貶末丗之曲政也所以使人黜耳目之聦明靜精神之感動樽流遁之樽止也流遁披散也節養性之和分帝王之操列小大之差者也主術者君人之事也所以因作任督責使群臣各尽其能也明攝權操柄以制群下提名提挈也責實考之叅伍所以使人主秉数持要不妄喜怒也其数直施而正邪外私而立公使百官條通而輻湊名務其業人致其功此主術之明也繆者破碎道德之論差次仁義之分略雜人間之事揔同乎神明之德假象取耦以相譬喻断短爲節以應小具所以曲攻論應感而不匱者也匱乏斉俗者所以一群生之短脩同九夷之風氣通古今之論貫万物之理財制礼義之冝擘畫人事之终始者也擘分道應者攬掇遂事之蹤追往古之跡察禍福利害之反考驗乎老莊之術而以合得失之勢者也氾論者所以箴縷縩之間縩綃殺也楔唲齵之郄也薛也揳塞也唲齵錯梧也接徑直施施邪以推夲樸而兆見得失之変利病之文所以使人不妄没扵勢利不誘惑扵事態有符曮晲兼稽時丗之変而与化推移者也詮言者所以譬人事之指解喻治乱之躰也差擇微言之眇詮以至理之文而缝過失之闕者也兵略者所以明勝攻取之数形機之勢詐譎之変躰因循之道操持後之論也持後者不敢為主而為客也所以知陣分爭之非道不行也知攻取坚守之非德不強也誠明其意進退左右无所撃危乗勢以為資淸靜以為常避實就虚若驅羣羊此所以言兵也說山說林者所以竅窕穿鑿百事之壅遏而通行貫扃万物之窒塞者也假譬取象異殊形以領理人之意懈墮结細說捍摶囷摶圓也囷芼也而以明事埒事者也埒兆朕也人間者所以禍福之変察利害之反鑚脉得失之跡標㪯終始之壇也標未也壇場也分别百事之微敷陳存亡之機使人知禍之為福亡之為得成之為敗利之為害也誠喻至意則有以傾側偃仰丗俗之間而无傷乎讒賊螫毒者也脩務者所以為人之扵道未淹味論未深見其文辝反之以淸淨為常恬惔為本則懈隨分斈縦欲適情欲以偷自佚而塞扵大道也今夫狂者无聖人亦无聖人无和以德也狂者无不知禍福也故通而无為也与塞而无為也同其无為則通其所以无為則異故為之浮稱流說其所以能聽所以使斈者孳孳以自幾也幾庶幾也泰族者横八極致髙崇上明三光下和水土經古今之道治倫理之序揔万方之指而㱕之一本以經緯治道纪綱王事乃原心術理情性以館淸平之虚館舎澄澈神明之精澄淸也澈澄别清濁也以与天和相嬰薄嬰繞抱也所以覧五帝三王懷天氣抱天心執中含和德形於内以莙凝天地發起隂陽序四時之正流方綏之斯寕推之斯行乃以陶冶万物游化羣生唱而和動而隨四海之内一心同㱕故景星見景星在月之旁則助月之明也祥風至風不鳴條也黄龍下鳯巢列樹麟止郊野德不内形而行其法藉用制度神祇弗應福祥不㱕四海弗賔兆民弗化故德形扵内治之大本此鴻烈之㤗族也鴻大也烈功也凡二十篇揔謂之鴻烈凡屬書者所以窺道開塞庶後丗使知㪯錯取捨之冝適外与物接而不眩内有以処神養氣宴煬至和而已自楽所受乎天地者也故言道而不明終始則不知所倣依言终始而不明天地四時則不知所避諱言天地四時而不引譬援則不識精微言至精而不原人之神則不知養生之機原人情而不言大聖之德則不知五行之差言帝道而不言君事則不知小大之衰言君事而不為喻則不知動靜之冝以喻而不言俗変則不知合同大指已言俗変而不言往事則不知道德之應知道德而不知丗曲則无以耦万方知氾論而不知詮言則无以從容通書文而不知兵指則无以應卒已知大略而不知譬諭則无以推明事知公道而不知人間則无以應禍福知人間而不知脩務則无以使斈者力欲強省其辝覧揔其要弗曲行區入則不足以窮道德之意故著書二十篇則天地之理究矣人間之事接矣帝王之道備矣其言有小有巨有微有粗指奏卷異各有為語今專言道則无不在焉然而能得本知末者其唯聖人也今斈者无聖人之才而不為詳說則終身顚頓乎混溟之中而不知斍寤乎昭明之術矣今易之乾坤足以窮道通意也八卦可以識凶知禍福矣然而伏戲為之六十四変八八変為六十四卦伏犧示其象周室増以六爻周室謂文王也所以原測淑清之道而逐万物之祖也夫五音之数不過宫商角徴羽然而五鉉之琴不可鼔也必有細大駕和而後可以成曲今龍首者不知其何獸也具其形則不疑矣今謂之道則多謂之物則少謂之術則博謂之事則淺推之以論則无可言者所以為斈者固欲致之不言而已也夫道論至深故多為之辝以抒其情万物至衆故博為之說以通其意辭雖壇卷連漫绞纷逺援所以洮汰滌蕩至意洮汰潤也使之无凝竭厎滯捲握而不散也夫江河之腐胔不可勝数然祭者汲焉大也一杯酒白蠅漬其中匹夫弗甞者小也誠通乎二十篇之論睹凡得要以通九野九野八方中央也俓十門八方上下也外天地捭山川捭屏去也其扵逍遥一丗之間宰匠万物之形亦游矣若然者挾日月而不烑挾至也烑光也潤万物而不耗曼兮洮兮足以覧矣藐兮浩浩曠曠兮可以游矣文王之時紂為天子賦斂无度戮殺无止康梁沉宮中成市康梁耽楽也沉淫酒也成市言集者多作為炮格之刑刳諫者剔孕婦天下同心而苦之文王四丗纍善大王王季文王武王凡四世也脩德行義処歧周之間地方不過百里天下二垂㱕之文王欲以卑弱制強暴以為天下去殘余賊而成王道故太公之謀生焉太公為周陳隂符兵謀也文王業之而不卒武王継文王之業用太公之謀悉索薄賦薄少也賦兵也躬擐甲胄擐貫著也以伐无道而討不義誓師牧野以踐天子之位天下未定海内未輯武王欲昭文王之令德使夷狄各以其賄來貢遼逺未能至故治三年之喪殯文王於兩楹之間殯大歛也兩楹堂柱之間賔主夾之以俟逺方武王立三年而崩成王在褓繈之中未能用事蔡叔管叔輔公子禄父禄父纣之兄子周封之以為殷後使管蔡監之也而欲為乱周公继文王之業持天子之政以股肱周室輔翼成王懼爭道之不塞臣下之危上也故縦馬華山放牛桃林敗鼓折抱搢笏而朝以寕靜王室鎭撫諸侯成王旣壯能從政事周公受封於魯以此移風易俗孔子脩成康之道述周公之訓以教七十子使服其衣冠脩其篇藉故儒者之斈生焉墨子斈儒者之業受孔子之術以為其礼煩擾而不恱恱易也厚葬靡財而貧民服傷生而害亊故背周道而用夏政禹之時天下大水禹身執虆垂以為民先剔河而道九歧剔洩去也九歧河水播歧為九以入海也鑿江而通九路江水通别為九辟五湖使水辟人而相従也而定東海當此之時燒不暇撌撌排去也濡不给扢扢拭也死陵者葬陵死澤者葬澤故節財薄葬間服生焉斉桓公之時天子卑弱诸侯力征南夷北狄交伐中囯中囯之不绝如綫綫细絲也斉囯之地東海而北鄣河地狹田少而民多智巧桓公中囯之患苦夷狄之乱欲以存亡繼绝崇天子之位廣文武之業故管子之書生焉斉景公内好聲色外好狗馬獵射忘㱕好色无辨辨引也作爲路寢之臺族鑄大鍾族衆也撞之庭下郊雉皆呴大鍾聲似雷震雉應而呴鳴也一朝用三千鍾贛鍾十斛也贛賜也一朝賜郡臣之費三万斛也梁丘據子家噲導於左右二人者公臣也導謙也故晏子之諫生焉晩丗之時六囯諸侯谿異谷别水绝山隔各自治其境内守其分地握其柄擅其政令下无方伯上无天子力征爭勝者爲右恃連与囯恃性連与之囯约重致剖信符结逺援以守其囯家持其社稷故縦横脩短生焉申子者韓昭之佐韓晉别囯也地墽民險而介於大囯之间晉囯之故礼未滅韓囯之新法重出先君之令未収後君之今又下新故相反前後相缪百官背乱不知所用故刑名之書生焉秦囯之俗貪狼狼荒也強力寡義而趨利可威以刑而不可化以善可以賞而不可厲以名險而帶河四塞以為固地利形便畜積殷冨孝公欲以虎狼之而吞諸侯故商鞅之法生焉若劉氏之書淮南正自謂也天地之象通古今之論事而立制度形而施冝原道之心合三王之風以儲与扈冶儲与猶攝業扈冶廣大也眇之中精揺靡覧楚人謂精進為精猺靡小皆覧之棄其畛挈楚人謂澤濁爲畛挈也斟其淑靜以统天下理万物應変化通殊非循一跡之路守一隅之指拘繫牽連於物而不与丗推移也故置之尋常而不塞市之天下而不窕窕援也布之天下雖大不窕也淮南鴻烈解卷第二十一
