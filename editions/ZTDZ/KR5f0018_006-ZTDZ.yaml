front:
  text: 淮南鴻烈解卷之六動五
  hash: sha256:1c48185349535ac2062fb36782f1b95360d175c61eb9b7c28edaac4eb44a75c1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_SJB_006-280021c, image: sjb/28/280021c.png}
body:
  text: 太尉祭酒臣許愼記上天文訓下淮南元年冬太一在丙子冬至甲午立春丙子淮南王作書之元年也一曰淮南王長孝文皇帝異母弟也僭號自稱東帝以徒嚴道道死於雍其四子皆爲列侯時人歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容文帝聞之曰以我爲利其土邪皆召四侯而王之是則淮南王安即位之元年以紀時也二隂一陽成氣二二陽一隂成氣三隂粗觕故得氣少陽精微故得氣多一說上得二下得三合爲五故曰合氣而爲音音數五也合氣而爲音合隂而爲陽合陽而爲律故曰五音六律音自倍而爲日律自倍而爲辰故日十而辰十二月日行十三度七十六分度之二十六六或作八二十九日九百四十分日之四百九十九而爲月而以十二月爲歲歲有餘十日九百四十分日之八百二十七故十九歲而七閏日冬至子午夏至卯酉冬至加三日則夏至之日也冬至後三日則明年夏至之日歲遷六日終而復始遷六日今年以子冬至後年以午冬至也壬午冬至甲子受制木用事火煙青木色青也東方七十二日丙子受制火用事火煙赤火色赤也南方七十二日戊子受制土用事火煙黄土中央其色黄七十二日庚子受制金用事火煙白西方金其色白七十二日壬子受制水用事火煙黑北方水其色黑七十二日而歲終庚子受制歲遷六日以數推之七十歲而復至甲子甲子受制則行柔惠挺群禁開闔扇通障塞毋伐木甲木也木王東方故施柔惠蟄伏之類出由户故開闔扇通障塞春木王故毋伐木也丙子受制則舉賢良賞有功立封侯出貨財火用事象陽明識功勞故封建侯出貨財戊子受制則養老鰥寡行粰鬻施恩澤土用事象土長養故施恩澤也庚子受制則繕墻垣脩城郭審群禁飾兵甲儆百官誅不法金用事象金斷割故誅不如法度也壬子受制則閉門閭大搜客禁搜客出新客斷罰刑殺當罪息關梁禁外徙水用事象冬閉固故禁外徙也甲子氣燥濁丙子氣燥陽戊子氣濕濁庚子氣燥寒壬子氣清寒丙子干甲子蟄蟲早出木氣温故早出故雷早行戊子干甲子胎夭卵毈鳥蟲多傷庚子干甲子有兵壬子干甲子春有霜戊子干丙子霆庚子干丙子夷夷傷也夷或電壬子干丙子雹甲子干丙子地動庚子干戊子五穀有殃壬子干戊子夏寒雨霜甲子干戊子介蟲不爲不成爲介蟲也丙子干戊子大旱蓏封熯蓏蔣草也生水土相連持大如薄者也名日封旱燥故熯也壬子干庚子大剛魚不爲不成爲魚甲子干庚子草木再死再生丙子干庚子草木復榮今八月九月時李柰復榮生實是也戊子干庚子歲或存或亡甲子干壬子冬乃不藏不藏地氣發也丙子干壬子星墜墜隕戊子干壬子蟄蟲冬出其鄉庚子干壬子冬雷其鄉季春三月豐隆乃出以將其雨豐隆雷也至秋三月季秋之月地氣不藏乃收其殺百蟲蟄伏靜居閉户殺氣青女乃出以降霜雪青女天神青玉女主霜雷也行十二時之氣以至于仲春二月之夕乃收其藏而閉其寒收歛其所藏而閉之女夷鼓歌以司天和以長百穀禽鳥草木女夷主春夏長養之神也孟夏之月以熟穀禾雄鳩長鳴爲帝侯歲雄鳩蓋布穀也是故天不發其隂則萬物不生地不發其陽則萬物不成天圓地方道在中央日爲德月爲刑月歸而萬物死日至而萬物生遠山則山氣藏遠水則水蟲蟄遠木則木葉槁日五日不見失其位也聖人不與也與猶說也日出于暘谷浴于咸池拂于扶桑是謂晨明拂猶過一日至登于扶桑爰始將行是謂朏明朏明將明也朏讀若朏諾皋之朏也至于曲阿是謂旦明平旦至于曾泉是謂蚤食至于桑野是謂晏食至于衡陽是謂隅中至于昆吾是謂正中昆吾丘在南方至于鳥次是謂小還鳥次西南之山名也鳥所宿止至于悲谷是謂餔時悲谷西南方之大壑言其深峻臨其上令人悲思故曰悲谷也至于女紀是謂大還女紀西北隂地至于淵虞是謂高舂淵虞地名高舂時加戍民碓舂時也至于連石是謂下舂連石西北山名也言將欲㝠下象悉舂故曰下舂連讀腐爛之爛也至于悲泉爰止其女爰息其馬是謂縣車至于虞淵是謂黄昏至于蒙谷是謂定昏蒙谷北方之山名也盧敖所見若上之所也日入于虞淵之汜曙於蒙谷之浦曙明浦涯行九州七舍有五億萬七千三百九里自暘谷至虞淵凡十六所爲九州七舍也禹以爲朝晝昏夜夏日至則隂乘陽是以萬物就而死冬日至則陽乘隂是以萬物仰而生晝者陽之分夜者隂之分是以陽氣勝則日脩而夜短隂氣勝則日短而夜脩帝張四維運之以斗運旋也月徙一辰復反其所正月指寅十二月指丑一歲而匝終而復始指寅則萬物螾螾動生貌律受太蔟太蔟者蔟而未出也指卯卯則茂茂然律受夾鍾夾鍾者種始莢也指辰辰則振之也律受姑洗姑洗者陳去而新來也指巳巳則生已定也律受仲吕仲吕者中充大也指午午者忤也律受蕤賔蕤賔者安而服也指未未昧也律受林鍾林鍾者引而止也指申申者呻之也律受夷則夷則者易其則也德以去矣指酉酉者飽也律受南吕南吕者任包大也指戌戌者滅也律受無射無射入無厭也指亥亥者閡也律受應鍾應鍾者應其鍾也指子子者兹也律受黄鍾黄鍾者鍾已黄也指丑丑者組也律受大吕大吕者旅旅而去也其加卯酉則隂陽分日夜平矣故曰規生矩殺衡長權藏繩居中央爲四時根道曰規始於一一而不生故分而爲隂陽隂陽合和而萬物生故曰一生二二生三三生萬物天地三月而爲一時故祭祀三飯以爲禮喪紀三踊以爲節兵重三罕以爲制以三參物三三如九故黄鍾之律九寸而宫音調調和也因而九之九九八十一故黄鍾之數立焉黄者土德之色鍾者氣之所種也日冬至德氣爲土土色黄故曰黄鍾律之數六分爲雌雄故曰十二鍾以副十二月十二各以三成故置一而十一三之爲積分七十萬七千一百四十七黄鍾大數立焉凡十二律黄鍾爲宫太蔟爲商姑洗爲角林鍾爲徵南吕爲羽物以三成音以五立三與五如八故卵生者八竅律之初生也寫鳳之音故音以八生黄鍾爲宫宫者音之君也故黄鍾位子其數八十一主十一月下生林鍾林鍾之數五十四主六月上生太蔟太簇之數七十二主正月下生南吕南吕之數四十八主八月上生姑洗姑洗之數六十四主三月下生應鍾應鐘之數四十二主十月上生蕤賔蕤賔之數五十七主五月上生大吕大吕之數七十六主十二月下生夷則夷則之數五十一主七月上生夾鍾夾鍾之數六十八主二月下生無射無射之數匹十五主九月上生仲吕仲吕之數六十主四月極不生徵生宫宫生商商生羽羽生角角生姑洗姑洗生應鍾比於正音故爲和應鍾十月也與正音比故爲和和從聲也一曰和也應鍾生蕤賔不比正音故爲繆日冬至音比林鍾浸以濁日夏至音比黄鍾浸以清以十二律應二十四時之變甲子仲吕之徵也丙子夾鍾之羽也戊子黄鍾之宫也庚子無射之商也壬子夷則之角也古之爲度量輕重生乎天道黄鍾之律脩九寸物以三生三九二十七故幅廣二尺七寸古者幅比皆然也音以八相生故人脩八尺尋自倍故八尺而爲尋有形則有聲音之數五以五乘八五八四十故四丈而爲匹匹者中人之度也一匹而爲制秋分蔈定蔈定而禾熟蔈禾穗粟孚甲之芒也定者成也故禾熟讀如詩有猫有虎之猫古文作秒也律之數十二故十三蔈而當一粟十二粟而當一寸律以當辰音以當日日之數十十從甲至癸日故十寸而爲尺十尺而爲丈其以爲量十二粟而當一分分言其輕重分銖也十二分而當一銖十二銖而當半兩衡有左右因倍之故二十四銖爲一兩天有四時以成一歲因而四之四四十六故十六兩而爲一斤三月而爲一時三十日爲一月故三十斤爲一鈞四時而爲一歲故四鈞爲一石其以爲音也一律而生五音十二律而爲六十音因而六之六六三十六故三百六十音以當一歲之日故律歷之數天地之道也下生者倍以三除之上生者四以三除之鍾律上下相生誘不敏也太隂元始建于甲寅一終而建甲戌二終而建甲午三終而復得甲寅之元歲徙一辰立春之後得其辰而遷其所順前三後五百事可舉前後太隂之前後也太隂所建蟄蟲首穴而處鵲巢鄉而爲户太隂在寅朱鳥在卯勾陳在子玄武在戌白虎在酉蒼龍在辰寅爲建卯爲除辰爲滿巳爲平主生午爲定未爲執主陷申爲破主衡酉爲危主杓戌爲成主少德亥爲收主大德子爲開主太歲丑爲閉主太隂在寅歲名曰攝提格其雄爲歲星舍斗牽牛以十一月與之晨出東方東井輿鬼爲對太隂在卯歲名曰單閼單讀明楊之明歲星舍須女虛危以十二月與之晨出東方柳七星張爲對太隂在辰歲名曰執徐歲星舍營室東壁以正月與之晨出東方翼軫爲對太隂在巳歲名曰大荒落歲星舍奎婁以二月與之晨出東方角亢爲對太隂在午歲名曰敦牂歲星舍胃昴畢以三月與之晨出東方氏房心爲對太隂在未歲名曰恊洽歲星舍觜嶲參以四月與之晨出東方尾箕爲對太隂在申歲名曰涒灘歲星舍東井輿鬼以五月與之晨出東方斗牽牛爲對太隂在酉歲名曰作鄂作讀昨歲星舍柳七星張以六月與之晨出東方須女虛危爲對太隂在戌歲名曰閹茂歲星舍翼軫以七月與之晨出東方營室東壁爲對太隂在亥歲名曰大淵獻歲星舍角亢以八月與之晨出東方奎婁爲對太隂在子歲名困敦困讀群歲星舍氐房心以九月與之晨出東方胃昴畢爲對太隂在丑歲名曰赤奮若歲星舍尾箕以十月與之晨出東方觜巂參爲對太隂在甲子刑德合東方宫常徙所不勝合四歲而離離十六歲而復合所以離者刑不得入中宫而徙於木太隂所居曰德辰爲刑德綱曰自倍因柔曰徙所不勝刑水辰之木木辰之水金火立其處凡徙諸神朱鳥在太隂前一鉤陳在後三玄武在前五白虎在後六虛星乘鉤陳而天地襲矣襲和也凡日甲剛乙柔丙剛丁柔以至於癸木生於亥壯於卯死於未三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於巳壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也故五勝生一壯五終九五九四十五故神四十五日而一徙以三應五八徙而歲終凡用太隂左前刑右背德擊鉤陳之衝辰以戰必勝以攻必尅欲知天道以日爲主六月當心左周而行分而爲十二月與日相當天地重襲後必無殃星正月建營室二月建奎婁三月建胃星宜言日明堂月令孟春之月日在營室仲春之月在奎婁季春之月在胃此言星正月建營室字之誤也四月建畢五月建東井六月建張七月建翼八月建亢九月建房十月建尾十一月建牽牛十二月建虚星分度角十二亢九氐十五房五心五尾十八箕十一四分一斗二十六牽牛八須女十二虚十危十七營室十六東壁九奎十六婁十二胃十四昴十一畢十六觜巂二參九東井三十輿鬼四柳十五七星張翼各十八軫十七凡二十八宿也星部地名角亢鄭氐房心宋尾箕燕斗牽牛越須女吴虛危齊營室東壁衛奎婁魯胃昴畢魏觜巂參趙東井輿鬼秦柳七星張周翼軫楚歲星之所居五穀豐昌其對爲衝歲乃有殃當居而不居越而之他處主死國亡太隂治春則欲行柔惠温凉木德仁也故柔凉也太隂治夏則欲布施宣明火德陽也故布施偏明也太隂治秋則欲脩備繕兵金德斷割故脩兵也太隂治冬則欲猛毅剛彊純隂閉固水澤水凍故剛彊也三歲而改節六歲而易常故三歲而一饑六歲而一衰十二歲一康康盛也甲齊乙東夷丙楚丁南夷戊魏巳韓庚秦辛西夷壬衛癸越子周丑翟寅楚卯鄭辰晋巳衛午秦未宋申齊酉魯戌趙亥燕甲乙寅卯木也丙丁巳午火也戊己四季土也庚辛申酉金也壬癸亥子水也水生木木生火毋生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困以勝擊殺勝而無報以專從事而有功以義行理名立而不墮以保畜養萬物蕃昌以困舉事破滅死亡北斗之神有雌雄十一月始建於子月從一辰雄左行雌右行五月合午謀刑十一月合子謀德太隂所居辰爲厭日厭日不可以舉百事堪輿徐行雄以音知雌故爲竒辰數從甲子始子母相求所合之處爲合十日十二辰周六十日凡八合合於歲前則死亡合於歲後則無殃甲戌燕也乙酉齊也丙午越也丁巳楚也庚申秦也辛卯戎也壬子代也癸亥胡也戊戌己亥韓也己酉己卯魏也戊午戊子八合天下也太隂小歲星日辰五神皆合其日有雲氣風雨國君當之天神之貴者莫貴於青龍或曰天一或曰太隂太隂所居不可背而可鄉北斗所擊不可與敵天地以設分而爲隂陽陽生於隂隂生於陽隂陽相錯四維乃通或死或生萬物乃成蚑行喙息莫貴於人孔竅肢體皆通於天地有九重人亦有九竅天有四時以制十二月人亦有四肢以使十二節天有十二月以制三百六十日人亦有十二肢以使三百六十節故舉事而不順天者逆其生者也以日冬至數來歲正月朔日五十日者民食足不滿五十日日減一斗有餘日日益一升有其歲司也攝提格之歲格起言萬物承陽而起也歲早水晩旱稻疾蠶不登登成也菽麥昌民食四升寅在甲曰閼蓬言萬物鋒芒欲出擁遏未通故曰閼蓬也單閼之歲單盡閼止也言陽氣推萬物而起隂氣盡止也歲和稻菽麥蠶昌民食五升卯在乙曰旃蒙在乙言蒙物遏蒙甲而出故曰旃蒙也執徐之歲執蟄徐舒也言伏蟄之物皆散舒而出也歲早旱晩水小饑蠶閉麥熟民食三升辰在丙曰柔兆在丙萬物皆生枝布葉故曰柔兆也大荒落之歲荒大也方萬物熾盛而大出霍然落落大布散歲有小兵蠶小登麥昌菽疾民食二升巳在丁曰强圉在丁言萬物剛盛故曰强圉也敦牂之歲言萬物皆盛壯也敦牂敦盛牂壯也歲大旱蠶登稻疾菽麥昌禾不爲民食二升午在戊曰著雝在戊言位在中央萬物繁養四方故曰著雝也恊洽之歲恊和洽合也言隂欲化萬物和合歲有小兵蠶登稻昌菽麥不爲民食三升未在巳曰屠維在巳言萬物各成其性故曰屠維屠别維離也涒灘之歲涒大灘脩也言萬物皆脩其精氣也歲和小雨行蠶登菽麥昌民食三升申在庚曰上章在庚言隂氣上升萬物畢生故曰上章也作鄂之歲作鄂零落也萬物皆陊落歲有大兵民疾蠶不登菽麥不爲禾蟲民食五升酉在辛曰重光在辛言萬物就成熟其煌煌故曰重光也掩茂之歲掩蔽茂胃言萬物皆蔽冒歲小饑有兵蠶不登麥不爲昌民食七升戌在壬曰玄黓在壬言歲終包任萬物故曰玄黓也大淵獻之歲淵藏獻迎也言萬物終於亥大小深藏窟伏以迎陽歲有大丘大饑蠶開菽麥不爲禾蟲民食三升困敦之歲困混敦沌也言陽氣皆混沌萬物牙孽也歲大霧起大水出蠶稻菽麥昌民食三斗子在癸曰昭陽在癸言陽氣始萌萬物合生故曰昭陽赤奮若之歲奮起也若順也言陽奮物而起之無不順其性也赤陽色歲有小兵早水蠶不出稻疾菽不爲麥昌民食一升正朝一作月夕先樹一表東方操一表却去前表十步以參望日始出北廉日直入又樹一表於東方因西方之表以參望日入北廉則定東方兩表之中與西方之表則東西之正也日冬至日出東南維入西南維至春秋分日出東中入西中夏至出東北維入西北維至則正南欲知東西南北廣袤之數者立四表以爲方一里岠先春分若秋分十餘日從岠北表參望日始出及旦以候相應相應則此與日直也輒以南表參望之以入前表數爲法除舉廣除立表袤以知從此東西之數也假使視日出入前表中一寸是寸得一里也一里積萬八千寸得從此東萬八千里視日萬入入前表半寸則半寸得一里半寸而除一里積寸得三萬六千里除則從此西里數也并之東西里數也則極徑也未春分而直已秋分而不直此處南也未秋分而直已春分而不直此處北也分至而直此處南北中也從中處欲知中南也未秋分而不直此處南北中也從中處欲知南北極遠近從西南表參望日日夏至始出與北表參則是東與東北表等也正東萬八千里則從中北亦萬八千里則從中北亦萬八千里也倍之南北之里數也其不從中之數也以出入前表之數益損之表入一寸寸減日近一里表出一寸寸益遠一里欲知天之高樹表高一丈正南北相去千里同日度其隂北表二尺南表尺九寸是南千里隂短寸南二萬里則無景是直日下也隂二尺而得高一丈者南一而高五也則置從此南至日下里數因而五之爲十萬里則天高也若使景與表等則高與遠等也淮南鴻烈解卷之六
