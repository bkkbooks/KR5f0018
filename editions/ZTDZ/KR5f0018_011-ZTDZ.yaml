  text: 淮南鴻烈解卷之十一動九
  hash: sha256:b8cd05582ea66f46e5930f76e5e2e2dc91668d2781357aba5b0be9ec30bed8c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_SJB_011-280043a, image: sjb/28/280043a.png}
body:
  text: 太尉祭酒臣許愼記上覽㝠訓覽觀幽㝠變化之端至精感天通達無極故曰覽㝠因以題篇昔者師曠奏白雪之音而神物爲之下降風雨暴至平公𤸇病晋國赤地白雪太一五十弦琴瑟樂名也神物即神化之物謂玄鶴之屬來至無頭鬼類操戈以舞也平公晋悼公之子彪也𤸇病篤疾赤地旱也唯聖君能御此異無災耳平公德使薄不能堪故篤病而大旱也庶女叫天雷電下擊景公臺隕支體傷折海水大出庶賤之女齊之寡婦無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明寃結叫天天爲作雷電下擊景公之臺隕壞也毁是公之支體海水爲之大溢出也夫瞽師庶女位賤尚葈權輕飛羽尚主也葈者葈耳菜名也幽冀謂之檀菜雒下謂之胡葈主是官者至微賤也瞽師庶女之位復賤於主葈之官故曰權輕飛羽也然而專精厲意委務積神上通九天激厲至精九天八方中央也以精誠感之由此觀之上天之誅也雖在壙虚幽間遼遠隱匿重襲石室界障險阻其無所逃之亦明矣上天上帝也上帝神明言人有罪惡雖自隱蔽藏猶見誅害也故曰無所逃也武王伐紂渡于孟津陽侯之波逆流而擊陽侯陵陽國侯也其國近水溺死於水其神能爲大波有所傷害因謂之陽侯之波也疾風晦㝠人馬不相見於是武王左操黄鉞右秉白旄瞋目而撝之曰余任天下誰敢害吾意者於是風濟而波罷濟止魯陽公與韓搆難戰酣日暮援戈而撝之日爲之反三舍魯陽楚之縣公也楚平王之孫司馬子期之子國語所謂魯陽文子楚替號稱王其守縣大夫皆稱公故曰魯陽公今南陽魯陽是也酣對戰合樂時也撝日令反却行三舍舍次宿也夫全性保眞不虧其身遭急迫難精通于天若乃未始出其宗者何爲而不成精通于天者謂聖人質成上通爲天所助宗者道之本也謂性不外逸生與道同也夫死生同域不可脅淩勇武一人爲三軍雄武士也江淮間謂士白武彼直求名耳而能自要者尚猶若此又況夫宫天地懷萬物以天地爲宫室懷猶囊也而友造化造化隂陽也與之相朋友含至和直偶于人形外直偶與人同形而内有大道也觀九鑽一知之所不知九謂九天一龜也觀九天之變鑽龜占兆所不知事亦云然也而心未嘗死者乎心未嘗死者謂心生與道同者也不與觀九鑽一等也昔雍門子以哭見於孟嘗君雍門子名周善彈琴又善哭雍門齊西門也居近之因以爲氏哭猶歌也見猶感孟嘗君齊相田文已而陳辭通意撫心發聲孟嘗君爲之增欷歍唈流涕狼戾不可止增重也歍唈失聲也狼戾猶交横也歍讀鴛鴦之鴦也唈讀左傳嬖女人姻姶之姶精神形於内而外諭哀於人心此不傳之道言能以精誠哀悲感傷人心不可學而得之故曰不傳之道也使俗人不得其君形者而效其容必爲人笑君形者言至精爲形也故蒲且子之連鳥於百仞之上蒲且子楚人善弋射者七尺曰仞也而詹何之騖魚於大淵之中此皆得清淨之道太浩之和也詹何楚人知道術者也言其善鉤令魚馳騖來趨鉤餌故曰騖魚得其精微故曰太浩之和也夫物類之相應玄妙深微知不能論辯不能解故東風至而酒湛溢東風木風也酒湛清酒也來物下湛故曰湛木味酸酸風入酒故酒醉而湛者沸溢物類相感也蠶咡絲而商弦絶或感之也老蠶上下絲於口故曰咡絲新絲出故絲脆商於五音最細而急故絶也咡或作珥蠶老時絲在身中正黄達見于外如珥也商西方金音也蠶午火也火壯金囚應商而已或有新故相感者也畫隨灰而月運闕鯨魚死而彗星出或動之也運讀連圍之圍也運者軍也將有軍事相圍守則月運出也以蘆草灰隨牖下月光中令圜畫缺其一面則月運亦缺於上也鯨魚大魚蓋長數里死於海邊魚之身賤也彗星爲變異人之害也類相動也故聖人在位懷道而不言澤及萬民聖人行自然無爲之道故澤及萬民也君臣乖心則背譎見於天神氣相應徵矣日旁五色氣在兩邊外出爲背外向爲譎内向爲珥在上外出爲冠也故山雲草莽水雲魚鱗山中氣出雲似草木水氣出雲似魚鱗旱雲煙火涔雲波水各像其形類所以感之旱雲亢陽氣似煙火涔大滀水也雲出於涔似波水也夫陽燧取火於日方諸取露於月夫讀大夫之夫已說在上一說水火從太極來在人手中非所能說知天地之間巧歷不能舉其數巧工也天地之間物類相感者衆多雖工爲歷術者不能悉舉其數也手徵忽怳不能覽其光言手雖覽得徵物不能得其光一說天道廣大手雖能徵其忽怳無形者不能覽得日月之光也然以掌握之中引類於太極之上太極天地始形之時也上猶初也而水火可立致者隂陽同氣相動也動猶化也此傳說之所以騎辰尾也言殷王武丁夢得賢人使工寫其像旁求之得傅說於傅巖遂以爲相爲高宗成八十一符致中興也死託精於辰尾之星一名策也故至隂飂飂至陽赫赫兩者交接成和而萬物生焉衆雄而無雌又何化之所能造乎所謂不言之辯不道之道也故召遠者使無爲焉遠者四夷也欲致化四夷者當以無爲無爲則夷荒自至也親近者使無事焉近者諸夏也欲親近者當以無事無事則近人自親附之惟夜行者爲能有之夜行喻隂行也隂行神化故能有天下也一說言入道者如夜行幽㝠之中爲能有召遠親近之道也故却走馬以糞而車軌不接於遠方之外却走馬以糞老子辭也止馬不以走但以糞糞曰也行至德之效也一說國君無道則戎馬生於郊無事止走馬以糞田也故兵車之軌不接遠方之外兩輪之間爲軌也是謂坐馳陸沈晝㝠宵明言坐行神化疾於馳傳沈浮㝠明與道合也以冬鑠膠以夏造冰夫道者無私就也無私去也能者有餘拙者不足言以非時鑠膠造冰難成之也天道無私就去能行道功有餘也順之者利逆之者凶譬如隋侯之珠和氏之璧得之者富失之者貧隋侯漢東之國姬姓諸侯也隋侯見大蛇傷斷以藥傅之後蛇於江中銜大珠以報之因曰隋侯之珠蓋明月珠也楚人卞和得美玉璞於荆山之下以獻武王王以示玉人玉人以爲石刖其左足文王即位復獻之以爲石刖其右足抱璞不釋而泣血及成王即位又獻之成王曰先君輕刖而重剖石遂剖視之果得美玉以爲璧蓋純白夜光文玉在春秋前成王不以告故不書也得失之度深微窈㝠難以知論不可以辯說也何以知其然今夫地黄主屬骨而甘草主生肉之藥也以其屬骨責其生肉以其生肉論其屬骨是猶王孫綽之欲倍偏枯之藥而欲以生殊死之人亦可謂失論矣王孫綽蓋周人也曰衛人王孫賈之後也言一劑藥愈偏枯之病欲倍其劑以生已死之人也若夫以火能焦木也因使銷金則道行矣若以磁石之能連鐵也而求其引瓦則難矣物固不可以輕重論也夫燧之取火於日磁石之引鐵蟹之敗漆以蟹置漆中則敗壞不燥不任用也葵之鄉日雖有明智弗能然也然猶明也故耳目之察不足以分物理心意之論不足以定是非故以智爲治者難以持國唯通于太和而持自然之應者爲能有之能有持國之術故嶢山崩而薄落水涸嶢山在雍州也薄落水在馮翊臨晋臨晋山窮相通也一曰薄落涇水也區冶生而淳鈞之劍成區讀歌謳之謳也區越人善冶劍工也淳鈞古大銳劍也紂爲無道左强在側左强紂之諛臣也教紂無道勸以貪淫也太公並世故武王之功立立成由是觀之利害之路禍福之門不可求而得也言其門户不可豫求而得知也忽然來至無形逃也夫道之與德若韋之與革遠之則邇近之則遠革之質象道韋之質象德欲遠去之道反在人側欲以事求之去人已遠也無事者近人有事者遠人不得其道若觀儵魚儵魚小魚也在水中可觀見見而不可得道亦如之故聖若鏡不將不迎將送應而不藏應猶隨也謂鏡隨人形好醜不有藏匿者也故萬化而無傷其得之乃失之其失之非乃得之也自謂得是乃失道者也自謂失道未必不得道也今夫調弦者叩宫宫應彈角角動此同聲相和者也叩大宫則少宫應彈大角則少角動故曰同音相和夫有改調一弦其於五音無所比鼓之而二十五弦皆應此未始異於聲而音之君已形也一弦宫音也音之君也故二十五弦皆和也一說改調一弦不比五音調一聲宫音也故曰未始異於聲也五主於一聲故曰音之君已形君主形見也故通於太和者惛若純醉而甘卧以游其中而不知其所由至也太和謂等死生之和齊窮達之端其中道之中也不自知所至此也純温以淪鈍悶以終若未始出其宗純一也温和也淪没也倫潜伏也鈍悶無情也欲終始於道宗本也若未有其形是謂大通今夫赤螭青虬之游冀州也赤螭青虬皆龍屬也天清地定毒獸不作飛鳥不駭入榡薄食薦梅薦梅草實也狀如桑椹其色赤生江濱也𠾱味含甘步不出頃畝之區而蛇鱓輕之以爲不能與之爭於江海之中𠾱味長美也蛇鱓自以爲能勝赤螭青虬若乃至於玄雲之素朝玄黑也素白也黑雲升合於明朝也隂陽交爭降扶風雜凍雨扶摇而登之降下也扶風疾風也凍雨暴雨也扶摇發動也登上上風雨而去威動天地聲震海内四海之内悉畏之也蛇鱓著泥百仞之中百仞七百尺也渡深曰仞傳曰仞溝洫也熊羆匍匐丘山磛巖虎豹襲穴而不敢咆襲入咆嘷猨狖顛蹶而失木枝狖讀中山人相遺物之遺也狖猨屬也長尾而昂鼻也又況直蛇鱓之類乎鳳凰之翔至德也雄曰鳳雌曰凰爲至德之君而來翔也雷霆不作風雨不興川谷不澹澹溢草木不摇而燕雀佼之以爲不能與之爭於宇宙之間燕雀自以爲能佼健於鳳凰也佼或作詨詨哭也宇屋簷也宙棟梁也易曰上棟下宇也還至其曾逝萬仞之上翺翔四海之外曾猶高也逝猶飛也一曰回也翼一上一下曰翺不摇曰翔外猶表也過崑崙之疏圃飲砥柱之湍瀨䟽圃在崑崙之上過猶歷也砥柱河之隘也在河東大陽之東𣼍𣵡水至疾瀨清皆激𣵡急流邅回蒙汜之渚邅回猶尚佯也蒙汜曰所出之地也池决復入爲渚渚小洲也尚佯冀州之際徑躡都廣入日抑節躡至也都廣東南之山名也衆帝所自上下也言鳳凰過廣都之野送日入於抑節之地言其翔之廣也躡或作絶也徑過絶歷也羽翼弱水暮宿風穴濯羽翼於弱水之上風穴北方寒風從地出也當此之時鴻鵠鶬靍莫不憚驚伏竄注喙江裔注喙喙注地不敢動也裔邊也又況直燕雀之類乎此明於小動之迹而不知大節之所由者也昔者王良造父之御也王良晋大夫御無恤子良也所謂御良也一名孫無政爲趙簡子御死而託精於天駟星天文有王良星是也造父嬴姓伯翳之後飛廉之子爲周穆王御上車攝轡馬爲整齊而歛諧整齊不差歛諧馬容體足調諧也投足調均勞逸若一一同心心怡氣和體便輕畢畢疾也安勞樂進馳騖若滅滅没也言疾也左右若鞭周旋若環左右謂騑驂也步趨之力若被鞭矣一說言掉鞭教諭其易也周旋若環如人志也世皆以爲巧然未見其貴者也若夫鉗且大丙之御此二人太一之御也一說古得道之人以神氣御隂陽也除轡銜去鞭棄策車莫動而自舉馬莫使而自走也但以車馬爲主耳神氣扶之也日行月動星燿而玄運耀有也玄天也運行也電奔而鬼騰進退屈伸不見朕垠朕兆朕也垠形狀也故不招指不咄叱過歸鴈於碣石言其御疾到自息止乃使北歸於碣石之山而中之鴈得之過去也過讀責過之過軼鶤鷄於姑餘自後過前曰軼也姑餘山名在吴也鶤鷄鳳凰之别名也言其御疾自碣石過歸鴈便復東南軼過鶤鷄於姑餘山也騁若飛鶩若絶縱失躡風追猋歸縱履也足疾及箭矢躡蹈也一說失在後不能及故言縱其行疾能及矢言躡追猋及之猋光中有影者忽然便歸皆及此言疾也朝發榑桑日入落棠榑桑日所出也落棠山名日所入也此假弗用而能以成其用者也弗用無爲非慮思之察手爪之巧也嗜欲形於胷中而精神踰於六馬此以弗御御之者也言藏嗜欲之形於胷臆之中踰和也以弗御御之以道術御也昔者黄帝治天下而力牧太山稽輔之力牧太山稽黄帝師孟子曰王者師臣也以治日月之行律律度也治隂陽之氣節四時之度正律歷之數别男女異雌雄明上下等貴賤使强不掩弱衆不暴寡人民保命而不夭安其性命不夭折也歲時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尤君臣調和無尤過也法令明而不闇輔佐公而不阿卿士公正不立私曲從也田者不侵畔漁者不爭隈隈曲深處魚所聚也道不拾遺市不豫賈城郭不關關閉也邑無盜賊鄙旅之人相讓以財言所有余狗彘吐菽粟於路而無忿爭之心於是日月精明星辰不失其行風雨時節五穀登熟虎狼不妄噬鷙鳥不妄搏鳳凰翔於庭翔猶止也麒麟游於郊游行也郊邑外也青龍進駕飛黄伏皂飛黄乘黄也出西方狀如狐背上有角壽千歲皂櫪也諸北儋耳之國莫不獻其貢職皆北極夷國也然猶未及虙戲氏之道也往古之時四極廢九州裂裂分也廢頓也天不兼覆地不周載火爁炎而不滅水浩洋而不息息消猛獸食顓民顓善鷙鳥攫老弱攫撮於是女媧鍊五色石以補蒼天女媧隂帝佐虛戲治者也三皇時天不足西北故補之師說如此斷鼇足以立四極鼇大龜天廢頓以鼇足柱之楚詞曰鼇載山下其何以安之是也殺黑龍以濟冀州黑龍水精也力牧太稽殺之以止雨也濟朝也冀九州中謂今四海之内積蘆灰以止淫水蘆葦也生於水故積聚其灰以止淫水平地出水爲淫水蒼天補四極正淫水涸冀州平狡蟲死顓民生蟲狩背方州抱圓天方州地也和春陽夏殺秋約冬枕方寢繩方榘四寸也寢繩眞身而卧也隂陽之所壅沈不通者竅理之逆氣戾物傷民厚積者絶止之逆氣亂氣也傷害民物之積財故絶止也嘗此之時卧倨倨興眄眄倨倨卧無思慮也倨讀虛曰之虚也眄眄然視無智巧貌也一自以爲馬一自以爲牛其行蹎蹎其視瞑瞑蹎讀填窴之填侗然皆得其和莫知所由生浮游不知所求魍魎不知所往當此之時禽獸蝮蛇無不匿其爪牙藏其螫毒無有攫噬之心考其功烈上際九天下契黄壚上與九天交接下契至黄壚黄泉下有壚土也壚讀繩纑之纑名聲被後世光輝重萬物使萬物有光輝也乘雷車服駕應龍驂青虬駕應德之龍在中爲服在旁爲驂有角爲龍無角爲虬一說應龍有翼之龍也援絶瑞席蘿圖珠絶之瑞應援而致之也羅列圖籍以爲席蓐一說羅圖車上席也黄雲絡前白螭後奔蛇絡讀道路之路也謂車之垂絡也黄雲之氣絡其車白螭導在於前奔蛇騰蛇也從在於後皆瑞應也浮游消摇道鬼神登九天九天八方中央朝帝於靈門在朝於上帝靈門也宓穆休于太祖之下宓寧也穆和也休息也太祖道之大宗也然而不彰其功不揚其聲彰揚皆明隱眞人之道以從天地之固然隱藏也眞人眞德之人固自然也何則道德上通而智故消滅也智固巧詐逮至夏桀之時主闇晦而不明道瀾漫而不修仁義道不復修設故曰瀾漫棄捐五帝之恩刑推蹶三王之法籍是以至德滅而不揚帝道揜而不興興舉也舉事戾蒼天發號逆四時戾反也春秋縮其和天地除其德縮藏也言和氣不復行也言其所施日惡不自知也故曰除其德也仁君處位而不安大夫隱道而不言不爲民所安隱仁義之道不正諫直言也論語曰國無道危行言遜也群臣準上意而懷當準望也懷思也當合也取合主意不復以道正諫也疏骨肉而自容邪人參耦比周而隂謀隂謀私謀也居君臣父子之間而競載橋主而像其意像猶隨也亂人以成其事是故君臣乖而不親骨肉疏而不附植社槁而裂言不禋於神也容臺振而掩覆容臺行禮容之臺言不能行禮故天文振動而敗之犬群嘷而入淵言將滅壞犬失其主故嘷而入淵也一說言犬禍也豕銜蓐而席澳豕銜其蓐席入之澳言豕禍一說銜蓐自藏處也美人挐首墨面而不容首亂頭也草與髮并編爲挐首不修容飭也曼聲吞炭内閉而不歌曼聲善歌也見世亂哀將滅故吞炭自敗音聲閉氣不復動也喪不盡其哀獵不聽其樂言時亂禮壞不盡在哀樂崩故不復聽田獵之樂西老折勝黄神嘯吟西王母折其頭上所載勝爲時無法度黄帝之神傷道之衰故嘯吟而長嘆也飛鳥鍛翼走獸廢脚鍛翼縱翼也廢脚跛蹇也言桀無道田獵煩數鳥獸悉被創夷鍛翼廢脚也山無峻榦澤無洼水峻榦美材也洼水渟水言山澤不以時故也狐狸首穴馬牛放失田無立禾路無莎薠莎薠讀猿猴蹯噪之蹯狀如葴葴如葮也莎草名也金積折廉璧襲無理金氣積聚折其鋒廉也璧文襲重言用之煩數皆鈍無復文理也璧讀辟也磬龜無腹磬空也象磬數鑽以卜故空盡無腹也言桀爲無道不修仁德但數占龜莫得古兆也詩云握粟出卜自何能穀又曰我龜既厭不我告猶是也蓍策曰施易曰再三瀆瀆則不告也晩世之時七國異族諸侯制法各殊習俗晩世春秋之後戰國之末七國齊楚燕趙韓魏秦也齊姓田楚姓芊燕姓姚趙姓趙韓姓韓魏姓魏秦姓嬴故異族也從横間之舉兵而相角蘇秦約從張儀連横南與北合爲從西與東合爲横故曰從横成則秦帝也攻城檻殺覆高危安掘墳墓楊人骸大衝車高重京衝車大鐵著其轅端馬被甲車被兵所以衝於敵城也古者伐不敬取其鯨鯢收其骸尸聚土而瘞之以爲京觀故曰高重壘京觀也除戰道便死路犯嚴敵殘不義百往一反名聲苟盛也言百人行戰皆死一人得還反也一說百人行伐一反得勝耳是故質壯輕足者爲甲卒甲錯也在車曰士步曰卒千里之外家老羸弱悽愴於内厮徒馬圉軵車奉饟厮役徒衆也牛曰放馬曰圉軵推也饟資糧也軵讀楫拊之拊也道馬遼遠霜雪亟集短褐不完短褐處器物之人也短或作短字褐毛布如今之馬衣也不完言民窮也人羸車弊泥塗至膝相携於道奮首於路携引也奮首民疲於役頓化於路僅能摇頭耳言疲困也故曰奮首身枕格而死格榜淋也言收民役賦不畢者榜之於格上不得下故曰枕格而死也所謂兼國有地者伏尸數十萬破車以千百數傷弓弩矛戟矢石之創者扶舉於路故世至於枕人頭食人肉葅人肝飲人血甘之於芻豢甘猶嗜也故自三代以後者天下未嘗得安其情性而樂其習俗保其脩命天而不夭於人虐也虐害所以然者何也諸侯力征天下合而爲一家逮至當今之時天子在上位天子嘆孝武皇帝持以道德輔以仁義近者獻其智遠者懷其德拱揖指麾而四海賔服春秋冬夏皆獻其貢職天下混而爲一混同子孫相代此五帝之所以迎天德也夫聖人者不能生時時至而弗失也輔佐有能黜讒佞之端息巧辯之說除刻削之法去煩苛之事屏流言之迹塞朋黨之門消知能消除知巧之能修太常隳枝體絀聦明去其小聦明并大利欲者也大通混㝠解意釋神漠然若無魂魄使萬物各復歸其根則是所脩伏羲氏之迹而反五帝之道也反復夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至德遺於後世何則至虚無純一而不𡁕喋苛事也𡁕喋猶深筭也言不采取煩苛之事周書曰掩雉不得更順其風言掩雉雖不得當更從其上風順其道理也言可行與不猶當以道德爲本論申商之法失之也今若夫申韓商鞅之爲治也申申不害也韓非也商鞅公孫鞅三子之術皆爲削刻之法也挬拔其根蕪棄其本而不窮究其所由生何以至此也鑿五刑爲刻削乃背道德之本而爭於錐刀之末錐刀之末諭小利言盡爭之也斬艾百姓殫盡太半斬艾百姓以草木諭也不養之也殫病也太半過半也而忻忻然常自以爲治忻忻猶自喜得意之貌也是猶抱薪而救火鑿竇而出水夫井植生梓而不容甕溝植生條而不容舟不過三月必死植謂材也椽杙於溝邊因生爲條木也以諭申韓商鞅之所爲法比於梓條也所以然者何也皆狂生而無其本者也河九折注於海而流不絶者崑崙之輸也折曲潦水不泄瀇瀁極望旬月不雨則涸而枯澤受瀷而無源者瀷雨漬疾流者故曰無源瀷讀燕人强春言勅同也譬若羿請不死之藥於西王母恒蛾竊以奔月姮娥羿妻羿請不死之藥於西王毋未及服之姮蛾盜食之得仙奔入月中爲月精也奔月或作坌肉藥坌肉以爲死畜之肉復可生也悵然有喪無以續之言羿悵然失志若有所喪亡不能復得不死藥以續之也何則不知不死之藥所由生也羿不知不死之藥所由生也申韓商鞅之等不得治之根本如乞藥矣一說羿謂命在藥不知命自在天也故或欲得知不死藥之所由出生也是故乞火不若取燧寄汲不若鑿井淮南鴻烈解卷之十一
