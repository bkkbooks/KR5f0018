  text: 淮南鴻烈解卷之十三動十一
  hash: sha256:7fa47711a6bbcc8e8f7b3edc0b01d44db212b932ac539cedf42fc44bc9ecccf5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0018_SJB_013-280055a, image: sjb/28/280055a.png}
body:
  text: 太尉祭酒臣許愼記上本經訓本始也經常也天經造化出於道治亂之由得失有常故曰本經因以題篇也太清之始也和順以寂漠清靜也太清無爲之始者謂三皇之時和順不逆天暴物也寂漠不擾民質眞而素樸閑靜而不躁推而無故質性也眞不變也素樸精不散也閑靜言無欲也不躁擾故常也在内而合乎道出外而調于義在内者志在心平欲故能合於道出於外者身所履行也行不越規矩故能調義義或作德也發動而成于文行快而便于物發作也動行也文文章也便利也物事也其言略而循理其行悅而順情略約要也悅簡易也悅讀射悅取不覺之悅也其心愉而不僞其事素而不飾愉和也僞虛詐也素樸也飾巧也是以不擇時日不占卦兆擇選也卦八卦也兆契龜之兆也世所以占吉凶也不謀所始不議所終安則止激則行通體于天地同精于隂陽一和于四時一同也明照于日月與造化者相雌雄造化天地也雌雄猶和適也是以天覆以德地載以樂樂生也四時不失其叙風雨不降其虐日月淑清而揚光光明也五星循軌而不失其行五星熒惑太白鎮辰歲星也軌道也循順也當此之時玄元至碭而運照玄天也元氣也碭大也言盛德之君恩仁廣大徧照四海也鳳麟至蓍龜兆鳳麟聖德之世至於門庭著四十九策兆信也善言否臧也甘露下竹實滿流黄出而朱草生滿成也流黄玉也朱草生於庭皆瑞應也機械詐僞莫藏于心莫無也逮至衰世鎸山石鐫猶鑿也求金玉也鍥金玉擿蚌蜃鍥刻金玉以爲器也擿猶開也開以求珠也消銅鐵而萬物不滋不滋長也言盡物類也刳胎殺夭麒麟不游胎獸胎也夭麋子也爲類見害故不來游覆巢毁卵鳳凰不翔鳥未鷇曰卵也鑽燧取火構木爲臺焚林而田竭澤而漁田獵也竭澤漏池也人械不足畜藏有餘械器用也畜積藏餘府庫實也而萬物不繁兆萌牙卵胎而不成者處之太半矣積壤而丘處糞田而種穀掘地而井飲疏川而爲利䟽通築城而爲固拘獸以爲畜則隂陽繆戾四時失叙雷霆毁折電霰降虐氣霧雪霜不霽霽止也而萬物燋夭霜雪之害不止則萬物燋夭不繁茂也菑榛穢聚埒畒菑草曰茂木聚曰榛積之於疆畝芟野菼長苗秀芟殺也菼草也苗稼也不榮而實曰秀也草木之句萌銜華戴實而死者不可勝數乃至夏屋宫駕縣聯房植夏屋大屋也縣聯聯受雀頭箸桷者一曰辟帶也房室也植户植也橑檐榱題橑檐橑也檐屋垂也榱棟也題當也雕琢刻鏤喬枝菱阿芙蓉芰荷阿曲屋也芙蓉藕華也菱角交蓞也荷芙蕖也五采爭勝流漫陸離流漫采色相參和陸離美好貌脩掞曲校夭矯曾橈芒繁紛挐皆屋飾也其讀麥芒之芒挐讀上谷茹縣之茹以相交持公輸王爾無所錯其剞𠜾削鋸公輸巧者一曰魯班之號也王爾古之巧匠也剖巧刺畫盡頭黑邊箋也𠜾𨧱尺削兩刃句刀也剖讀枝尺之枝也𠜾讀詩蹶角之蹶削讀綃頭之綃也然猶未能贍人主之欲也是以松柏菌露夏槁松柏根茂菌露竹筦皆冬生難殺之木當是時夏槁死也刺君作事不時隂陽失序菌讀似綸露讀南陽人言道路之路江河三川絶而不流三川涇渭汧也出於岐山絶竭也故曰不流國語曰何竭而商亡也夷羊在牧夷羊土神殷之將亡見於商郊牧野之地飛蛩滿野蛩蟬蠛蠓之屬也一曰蝗也兖州謂之螣螣讀近殆緩氣言之蛩讀詩受小拱之拱天旱地坼坼燥裂也鳳凰不下句爪居牙戴角出距之獸於是鷙矣句爪鷹鸇之屬也居牙熊虎之屬也距讀拒守之拒民之專室蓬廬無所歸宿專特小室也蓬廬籧篨覆也言小有賔客歸之無所庇宿也凍餓飢寒死者相枕席也言其衆也及至分山川谿谷使有壤界計人多少衆寡使有分數築城掘池設機械險阻以爲備飾職事制服等等差也異貴賤差賢不肖經誹譽行賞罰經書也誹惡譽善賞可賞罰可罰也則兵革興而分爭生民之滅抑天隱虐殺不辜而刑誅無罪於是生矣抑没也言民有滅没夭折之痛天地之合和隂陽之陶化萬物皆乘人氣者也天地合和其氣故生隂陽陶化萬物是故上下離心氣乃上蒸離者不和也君臣不和五穀不爲不爲五穀距日冬至四十六日天含和而未降也懷氣而未揚自立冬到冬至皆未動也隂陽儲與呼吸浸潭包裹風俗儲與猶尚羊無所生之貌也一曰褒大貌也浸潭廣衍故曰包裹風俗也斟酌萬殊旁薄衆宜旁並也薄近也衆物宜適也以相嘔咐醖釀而成育群生咐讀苻命之符醖釀猶和調也是故春肅秋榮冬雷夏霜皆賊氣之所生由此觀之天地宇宙一人之身也以身諭也六合之内一人之制也六合四方上下也是故明於性者天地不能脅也脅恐也審於符者怪物不能惑也審明也符驗也怪物非常人所疑惑也故聖人者由近知遠而萬殊爲一殊異也一同也古之人同氣于天地與一世而優游優游猶委從也當此之時無慶賀之利刑罰之感禮義廉耻不設毁譽仁鄙不立而萬民莫相侵欺暴虐猶在于混㝠之中混大也大㝠之中謂道也逮至衰世人衆財寡事力勞而養不足於是忿爭生是以貴仁仁鄙不齊比周朋黨設詐諝懷機械巧故之心而性失矣諝謀也性失失其純樸之性也是以貴義隂陽之情莫不有血氣之感男女群居雜處而無别是以貴禮禮以别也性命之情淫而相脅脅迫以不得己則不和是以貴樂以樂和之是故仁義禮樂者可以救敗而非通治之至也夫仁者所以救爭也義者所以救失也禮者所以救淫也樂者所以救憂也神明定於天下而心反其初心反其初而民性善初者始也有情也未有情欲故性善也民性善而天地隂陽從而包之則財足而人贍矣貪鄙忿爭不得生焉由此觀之則仁義不用矣道德定於天下而民純樸則目不營於色營惑耳不淫於聲坐俳而歌謡被髮而浮淫雖有毛嬙西施之色不知悅也言尚德也掉羽武象不知樂也掉羽羽舞也武象周武王樂也淫泆無别不得生焉由此觀之禮樂不用也是故德衰然後仁生行沮然後義立沮敗也和失然後聲調禮淫然後容飾是故知神明然後知道德之不足爲也知道德然後知仁義之不足行也道德本仁義末知仁義然後知禮樂之不足脩也仁義大也禮樂小也今背其本而求其末釋其要而索之于詳未可與言至也至至德之道也天地之大可以矩表識也矩度也表影表識知也星月之行可以歷推得也歷術也推求也雷震之聲可以鼓鍾寫也寫猶放斆也風雨之變可以音律知也律知隂陽是故大可覩者可得而量也明可見者可得而蔽也蔽或作察聲可聞者可得而調也色可察者可得而别也夫至大天地弗能含也至微神明弗能領也領理也及至建律歷别五色異清濁清商濁宫味甘苦則樸散而爲器矣立仁義脩禮樂則德遷而爲僞矣脩設也遷移也及僞之生也飾智以驚愚設詐以巧上巧欺上也天下有能持之者有能治之者也有能持之者桀紂之民有能治之者湯武之君也昔者蒼頡作書而天雨粟鬼夜哭蒼頡始視鳥迹之文造書有契則詐僞萌生詐僞萌生則去本趨末棄耕作之業而務錐刀之利天知其將餓故爲雨粟鬼恐爲書文所效故夜哭也鬼或作兔兔恐見取毫作筆害及其軀故夜哭伯益作井而龍登玄雲神棲崑崙伯益佐舜初作井鑿地而求水龍知將决川谷漉陂池恐見害故登雲而去棲其神於崑崙之山也能愈多而德愈薄矣愈益也故周鼎著倕使銜其指以明大巧之不可爲也倕堯之巧工也及周鑄鼎著倕像於鼎使銜其指假令倕在見之伎巧不能復踰但當銜齧其指故曰以明巧之不可爲也一說周人鑄鼎畫像鏤倕身於鼎使自銜其指以戒後世明不當大巧爲也故至人之治也心與神處形與性調靜而體德動而理通隨自然之性而縁不得已之化洞然無爲而天下自和澹然無欲而民自樸無機祥而民不夭不忿爭而養足兼苞海内澤及後世不知爲之者誰何道無姓名自當然也故曰不知誰何也是故生無號死無謚實不聚而名不立實財也道不名故名不立施者不德受者不讓施者不以爲恩德振不足而已受者不讓之則受之不飾辭讓也德交歸焉而莫之充忍也忍不忍也故德之所緫道弗能害也緫一也智之所不知辯弗能解也有智謀者尚不能知但口辯者何不解也不言之辯不道之道若或通焉謂之天府或有也有能通不言之辯不道之道者入天之府藏取焉而不損損減也酌焉而不竭酌猶予竭盡也莫知其所由出是謂瑶光瑶光者資糧萬物者也瑶光謂北斗杓第七星也居中而運歷指十二辰擿起隂陽以殺生萬物也一說瑶光和氣之見者也振困窮補不足則名生名仁名也興利除害伐亂禁暴則成功功武功也世無災害雖神無所施其德上下和輯雖賢無所立其功昔容成氏之時道路鴈行列處容成黄帝時造曆術也鴈行長幼有差也託嬰兒於巢上置餘糧於畮首虎豹可尾虺蛇可蹍而不知其所由然虎豹擾人無害人之心故可牽尾虺蛇不螫毒故可蹍履也時人謂自當然耳故曰不知其所由然逮至堯之時十日並出焦禾稼殺草木而民無所食猰貐鑿齒九嬰大風封豨脩蛇皆爲民害猰讀車軋履人之軋貐讀疾除瘉之瘉也堯乃使羿誅鑿齒於疇華之野鑿齒獸名齒長三尺其狀如鑿下徹頷下而持戈盾羿善射堯使羿射殺之疇華南方澤名也殺九嬰於凶水之上九嬰水火之怪爲人害北狄之地有凶水繳大風於青丘之澤大風風伯也能壞人屋舍羿於青丘之澤繳遮使不爲害也一日以繳繫失射殺之青丘東方之澤名也上射十日而下殺猰貐十日並出羿射去九猰貐獸名也狀若龍首或曰似貍善走而食人在西方也斷脩蛇於洞庭擒封狶於桑林脩蛇大蛇也吞象三年而出其骨之類洞庭南方澤名封狶大豕也楚人謂豕爲狶也桑林湯所禱旱桑山之林萬民皆喜置堯以爲天子於是天下廣陜險易遠近始有道里舜之時共工振滔洪水以薄空桑共工水官名也栢有之後振動也滔蕩也欲壅防百川滔高堙庳以害天下者薄迫也空桑地名在魯也龍門未開吕梁未發江淮通流四海溟涬民皆上丘陵赴樹木龍門河之隘也在左馮翊夏陽北禹所鑿也吕梁在彭成吕縣石生水中禹决而通之民所由得度也故曰吕梁也未發之時水道不通江淮合流四海溟澤無岸畔也舜乃使禹疏三江五湖闢伊闕導瀍澗伊闕山名也禹所開以通伊水故曰闢伊闕在雒陽西南九十里瀍澗兩水名也瀍讀裹纏之纏也平通溝陸流注東海鴻水漏九州乾萬民皆寧其性是以稱堯舜以爲聖晩世之時帝有桀紂爲璇室瑶臺象廊玉牀璇瑶石之似玉以飾室臺也用象牙飾廊殿以玉爲牀言淫役也璇或作旋瑶或作摇言室施機關可轉旋也臺可摇動極土木之巧也紂爲肉圃酒池紂積肉以爲園圃積酒以爲淵也今河内朝歌紂所都也城西有糟丘酒池處是也燎焚天下之財罷苦萬民之力刳諫者剔孕婦王子比于紂之諸父也數諫紂之不道紂剖其心而觀之故曰刳諫者孕孕婦身將就草之婦也紂解剔觀其胞裹故曰剔孕婦也攘天下虐百性於是湯乃以革車三百乘伐桀于南巢放之夏臺革車兵車也南巢今盧江巢縣是也夏臺大臺故作宫也武王甲卒三千破紂牧野殺之于宣室武王周文王之子發也在車曰士步曰卒牧野南郊地名在朝歌城外宣室殷宫名一曰宣室獄也天下寧定百姓和集是以稱湯武之賢由此觀之有賢聖之名者必遭亂世之患也今至人生亂世之中含德懷道拘無窮之智鉗口寢說遂不言而死者衆矣至人至德之人然天下莫知貴其不言也無有貴鉗口不言而死也故道可道非常道至道無名不可道故曰可道者非常道也名可名非常名眞人之名不可得名也著於竹帛鏤於金石可傳於人者其粗也五帝三王殊事而同指異路而同歸五帝黄帝顓頊帝譽帝堯帝舜三王夏禹殷湯周文王同歸同歸修仁義也晚世學者不知道之所一體德之所緫要緫凡也要約也取成之迹相與危坐而說之鼓歌而舞之故博學多聞而不免於惑詩云不敢暴虎不敢馮河人知其一莫知其他此之謂也無兵搏虎日暴虎無舟檝而渡曰馮河言小人而爲政不可不敬則危猶暴虎馮河之必死人皆暴虎馮河立至害也故曰知其一而不知當畏愼小人危亡也故曰莫知其他此不免於惑此之謂也帝者體太一體法也太一天之刑神也王者法隂陽霸者則四時君者用六律秉太一者牢籠天地彈壓山川牢讀星霤楚人謂牢爲霤彈山川令出雲雨後能壓止之含吐隂陽伸曳四時伸曳猶伸引和調之紀綱八極經緯六合覆露照導普汜無私普大也汜衆也無私愛憎言皆公也蠉飛蠕動莫不仰德而生隂陽者承天地之和形萬殊之體含氣化物以成埒類埒形也贏縮卷舒淪於不測贏長也縮烜也卷屈也舒散也淪入也測深也入於不可測盡之深終始虚滿轉於無原轉化歸於無窮之源本也四時者春生夏長秋收冬藏取于有節出入有時開闔張歙不失其叙歙讀曰脅叙次也喜怒剛柔不離其理理道也六律者生之與殺也賞之與罰也子之與奪也子布施也奪取收也非此無道也則四時用六律之君非用此上事其余無他道也故謹於權衡準繩審乎輕重足以治其境内矣權衡平也準法也繩直也是故體太一者明於天地之情通於道德之倫聦明燿於日月精神通於萬物動靜調於隂陽喜怒和于四時德澤施于方外施廷廷於遠方之外名聲傳于後世後世傳聞之也法隂陽者德與天地參參明明與日月並並併也精與鬼神緫緫合也戴圓履方抱表懷繩圓天也方地也表正也繩直也内能治身外能得人能得人之歡心發號施令天下莫不從風風化也則四時者柔而不脆剛而不鞼鞼折也寬而不肆肆緩雖寬不緩過齊非也肅而不悖肅急也雖急不促悖優柔委從以養群類類物類也其德含愚而容不肖無所私愛私邪也用六律者伐亂禁暴進賢而廢不肖扶撥以爲正撥任也扶治也壞險以爲平矯枉以爲直矯正也枉曲也明於禁舍開閉之道乘時因勢以服役人心也役使也帝者體隂陽則侵爲諸夏所侵陵王者法四時則削爲諸夏所侵削傳曰諸侯侵犯王略也霸者節六律則辱爲鄰國所侮辱君者失準繩則廢爲臣所廢絀更立賢故小而行大則滔窕而不親滔窕不滿密也不爲臣下所親附也大而行小則狹隘而不容行小則正狹隘而不容包臣下貴賤不失其體而天下治矣不失其體大行大小行小也天愛其精地愛其平精光明也平正也人愛其情情性也天之精日月星辰雷電風雨也地之平水火金木土也人之清思慮聦明喜怒也故閉四關止五遁則與道淪四關耳目心口遁逸也淪入也是故神明藏於無形精神反於至眞眞身也則目明而不以視耳聦而不以聽心條達而不以思慮委而弗爲和而弗矜矜自大也眞性命之情而智故不得雜焉雜糅也精泄於目則其視明泄猶通也在於耳則其聽聦留於口則其言當當合也集於心則其慮通集止也故閉四關則身無患百節莫苑苑病也苑讀南陽之宛也莫死莫生莫虚莫盈是謂眞人言守其常凡亂之所由生者皆在流遁流遁之所生者五流放也遁逸也大構駕興宫室構連也駕材木相乘駕也延樓棧道雞棲井榦延樓高樓也棧道飛閣複道相通雞棲井榦複屋熒井也刻花置其中也檦標欂櫨以相支持木巧之飾飾巧盤紆刻儼盤盤龍也紆曲屈刻儼浮首虎頭之屬皆屋飾也儼讀嚴然之儼也嬴鏤雕琢詭文回波嬴鏤文章鏤雕畫也玉曰琢皆飾巧也詭文竒異之文也回波若水波也淌游瀷淢菱杼紾抱尚游瀷淢皆文盡擬像水勢之貌也菱芰杼采實紾戾也抱轉也皆壯采相銜持貌也淌讀平敞之敞瀷燕人强春言欶之欶淢讀郁乎文哉之郁美讀楚言杼紾讀紾結之紾抱讀岐嶷之嶷芒繁亂澤巧僞紛挐以相摧錯此遁於木也皆采色形像文章貌挐讀人性紛挐不解之挐鑿汙池之深肆畛崖之遠肆極也崖垠也來谿谷之流飾曲岸之際積牒旋石以純脩碕飾治也牒累純縁也以玉石致之水邊爲脩碕或作旋祐旋石切以牒累流水邊爲脩碕脩碕曲中水所棠處也抑淢怒瀨以揚激波抑止也淢怒水也顓急流也而抑止之故激揚之波起也曲拂邅回以像湡浯拂戾也邅迴轉流也湡番隅浯蒼梧之二國多水江湖環之故多象渠池以自邅迴法而像之也湡讀愚戇之愚也益樹蓮菱以食鼈魚樹種也蓮藕實地菱芰也皆可以養魚鼈蓮讀蓮羊魚之蓮也鴻鵠鷫鷞稻梁饒餘鷫鷞鴈類也一曰鳳之别類也龍舟鷁首浮吹以娱此遁於水也龍舟大舟也刻爲龍文以爲飾也鷁大鳥也畫其象著船頭故曰鷁首也於舟中吹籟與竿以爲樂故曰浮吹以娱高築城郭設樹險阻崇臺榭之隆設施也樹立也一說種樹木以爲險阻今難攻易守也積土高丈曰臺加木曰榭也侈苑囿之大以窮要妙之望侈廣也有墻曰苑無墻曰囿所以畜禽獸也盡極要之觀望也魏闕之高上際青雲大厦曾加擬於崑崙門闕高崇巍巍然故曰魏闕也大厦大屋也曾重架材木相秉架也其高與崑崙山相像也脩爲墻垣甬道相連甬道飛閣複道也南讀踊躍之踊道讀道布之道也殘高增下積土爲山殘墮也增益也接徑歷遠直道夷險接疾也徑行也道之阨者正直之夷平也終日馳騖而無蹟蹈之患此遁於土也大鍾鼎美重器鍾音之君也重器大器蓋鍾鼎也華蟲疏鏤以相繆紾書曰山龍華蟲藻火粉米繆紾相纏結也寢兕伏虎蟠龍連組兕獸名寢伏各有形也蟠龍詰屈相連文錯如織組文也焜昱錯眩照燿煇煌錯雜也眩惑也照燿煇煌焜光澤色貌也偃蹇糾曲成文章雕琢之飾鍛錫文鐃乍晦乍明雕畫也縁錯錫可刷如連珠不可棳故曰乍晦乍明也抑微滅瑕霜文沈居若簞蘧蒢言劍理之美没滅其瑕文鐃如霜皆没身中故曰沈居簞竹蓆蘧蒢葦蓆取其邪文次叙劍饒若此也纏錦經冗以數而疏劍文相句連纏如綺經冗如錦似數如疏文鐃美眩人目此遁於金也煎熬焚炙調齊和之適以窮荆吴甘酸之變荆楚言二國善酸鹹之和而窮盡之焚林而獵燒燎大木鼓橐吹埵以銷銅鐵鼓繫也橐治鑪排橐也埵銅橐口鐵笛埵入火中吹火也故曰吹埵銷鑠靡流堅鍜無厭足曰山無峻榦林無柘梓峻榦長枝也柘桑梓滋生也燎木以爲炭燔草而爲灰野莽白素不得其時槁草白素上掩天光下殄地財此遁於火也殄盡也珍讀曰典也此五者一足以亡天下矣五者之中有一則足以滅亡也是故古者明堂之制下之潤溼弗能及上之霧露弗能入四方之風弗能襲明堂王者布政之堂上圓下方堂四出各有左右房謂之个凡十二所王者月居其房告朔朝歷頒宣其令謂之明堂其中可以叙昭穆謂之太廟其上可以望氣祥書雲物謂之靈臺其外圓似辟雍諸侯之制半天子謂之宫詩云矯矯魯侯在泮獻公也土事不文質也木工不斲樸而已斲或作琢而不雕畫也金器不鏤不錯鏤設文飾也鏤讀婁之婁衣無隅差之削隅角也差邪也古者質皆全幅爲衣裳無有邪角邪角削殺也冠無觚嬴之理觚嬴之理謂若馬目籠相連干也言無者冠文取平直而已也嬴讀指端嬴文之嬴也堂大足以周旋理文堂明堂所以升降揖讓修禮容故曰周旋理文理政事文書也靜潔足以饗上帝禮鬼神以示民知儉節孝經曰宗祀文王於明堂以配上帝也夫聲色五味遠國珍怪瓌異竒物足以變心易志摇蕩精神感動血氣者不可勝計也夫天地之生財也本不過五不過五行之數聖人節五行則治不荒五行金木水火土也水屬隂行火爲陽行木爲燠行金爲寒行土爲風行五氣常行故曰五行凡人之性心和欲得則樂心和不喜不怒欲得無違耳樂斯動動斯蹈蹈斯蕩蕩斯歌歌斯舞歌舞節則禽獸跳矣人之性心有憂喪則悲悲則哀有憂艱難也喪事也亡失所離愛則悲悲則傷哀斯憤憤斯怒怒斯動動則手足不靜靜寧也擗踊哭泣哀以送之也人之性有侵犯則怒怒則血充人欲有侵犯則怒盛血氣充盈以成其勢血充則氣激氣激則發怒發怒則有所釋憾矣釋解也憾恨也故鍾鼓管簫干鏚羽旄所以飾喜也衰絰苴杖苴麻之有實者衰讀曰崔杼之崔也哭踊有節所以飾哀也爲哀所容故曰飾也兵革羽旄金鼓斧鉞所以飾怒也必有其質乃爲之文古者聖王在上政教平仁愛洽上下同心君臣輯睦衣食有餘家給人足父慈慈柔也子孝兄良弟順生者不怨死者不恨有道之世人得其志故生者不怨也皆終其天命故死者不恨天下和洽人得其願夫人相樂無所發貺故聖人爲之作樂以和節之夫人衆人也但中心相樂所以發其恩賜也故聖人爲之作樂以節之猶通制也末世之政田漁重稅關市急征澤梁畢禁網罟無所布耒耜無所設民力竭於徭役財殫於會賦會計計人口數責其稅歛也居者無食行者無糧老者不養死者不葬贅妻鬻子以給上求猶弗能贍贅從嫁也或作賃妻愚夫惷婦皆有流連之心悽愴之志流連猶爛漫失其職業也悽愴傷悼之貌惷讀近貯益之𦙴戇蘢口言之也乃使始爲之撞大鍾擊鳴鼓吹竿笙彈琴瑟失樂之本矣古者上求薄而民用給給足君施其德臣盡其忠父行其慈子竭其孝竭盡也善事父母曰孝也各致其愛而無憾恨其間無憾恨各得其願也夫三年之喪非强而致之非强行致孝子之情也情自發於中聽樂不樂食㫖不甘思慕之心未能絶也三年之思思慕之心未能自絶於哀戚也晚世風流俗敗嗜慾多禮義廢君臣相欺父子疑怨尤充胷思心盡亡盡喪其忠孝思慕之心也被衰戴絰戲笑其中雖致之三年失喪之本也本在哀戚古者天子一畿諸侯一同方千里爲畿方百里爲同各守其分不得相侵分猶界也有不行王道者暴虐萬民爭地侵壤亂政犯禁召之不至令之不行言不行上令者行讀行馬之行禁之不止誨之不變誨教也變更也乃舉兵而伐之戮其君易其黨封其墓類其社有賢者受惡君之誅則封殖其墓若武王伐紂封比干之墓是也祭社曰類以事類祭之也詩云是類是禡也卜其子孫以代之卜擇立其子孫之賢也天子不滅國諸侯不滅姓古之政也晚世務廣地侵壤並兼無已舉不義之兵伐無罪之國殺不辜之民絶先聖之後辜罪也民皆帝王之後故曰絶先聖之後大國出攻小國城守驅人之牛馬傒人之子女傒繫囚之繫讀曰雞毁人之宗廟遷人之重寳血流千里暴骸滿野以贍貪主之欲非兵之所爲生也言兵爲禁暴整亂設不爲作亂生也故兵者所以討暴非所以爲暴也言兵討人之暴亂非所以自爲暴亂也樂者所以致和非所以爲淫也樂蕩人之邪志存人之正性致其中和而已非所爲自淫過也喪者所以盡哀非所以爲僞也喪踊哭泣所以盡孝子之哀情也非所以爲詐僞佯哀戚而已也故事親有道矣而愛爲務道孝道務在愛敬其親朝廷有容矣而敬爲上朝廷之容濟濟也父子主愛君臣主敬故以敬爲上也處喪有禮矣而哀爲主處居也喪禮三年之禮也論語曰喪與其易也寧戚故曰以哀爲主也用兵有術矣而義爲本術數也隂陽天生虛實之數也傳曰天生五材民並用之廢一不可誰能去兵兵之所由來久矣聖人以興亂人以亡廢興存亡昏明之術也故曰以義爲本本立而道行本傷而道廢本立義立也本傷義喪也故曰道廢淮南鴻烈解卷之十三
