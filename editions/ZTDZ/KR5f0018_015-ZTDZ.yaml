body:
  text: 太尉祭酒臣許愼記上主術訓下君人之道處靜以修身儉約以率下靜則下不擾矣儉則民不怨矣下擾則政亂民怨則德薄政亂則賢者不爲謀德薄則勇者不爲死是故人主好鵞鳥猛獸珍怪竒物金玉爲珍詭異爲怪非常爲竒狡躁康荒康安荒亂不愛民力馳騁田獵出入不時如此則百官務亂事勤財匱勤勞匱乏萬民愁苦生業不修矣人主好高臺深池雕琢刻鏤黼黻文章絺綌綺繡寳玩珠玉白與黑爲黼青與赤爲黻絺綌葛也精曰絺麄曰綌五彩具曰繡也則賦歛無度而萬民力竭矣堯之有天下也非貪萬民之富而安人主之位也以爲百姓力征强凌弱衆暴寡於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨不剪采椽不斷大路不畫大路上路四馬車也天子駕六馬不畫不文飾也越席不縁越結蒲爲席也大羹不和不致五味粢食不毇毇細巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下而以爲社稷非有利焉年衰志憫衰老也憫憂也舉天下而傳之舜猶却行而脫蹤也言甚易也衰世則不然一日而有天下之當處人主之勢則竭百姓之力以奉耳目之欲志專在于宫室臺榭陂池苑囿猛獸熊羆玩好珍怪是故貧民糟糠不接於口而虎狼熊羆猒芻豢百姓短褐不完而宫室衣錦繡人主急兹無用之功百姓黎民顦顇於天下黎齊是故使天下不安其性不得安其正性爲詐生也人主之居也如日月之明也天下之所同側目而視側耳而聽延頸舉踵而望也是故非澹漠無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷衆非平正無以制斷是故賢主之用人也猶巧工之制木也制裁大者以爲舟航柱樑舟船也方兩小船並與共濟爲航也小者以爲楫禊修者以爲櫚榱櫚屋垂榱憩也短者以爲朱儒枅櫨朱儒梁上戴蹲跪人也枅讀如鷄也無大小脩短各得其所宜規矩方圓各有所施天下之物莫凶於鷄毒鷄毒鳥頭然而良醫橐而藏之有所用也是故林莽之材猶無可棄者而況人乎今夫朝廷之所不舉鄉曲之所不譽非其人不肖也其所以官之者非其職也鹿之上山獐不能跂也及其下牧堅能追之才有所脩短也是故有大略者不可責以捷巧略行道也有小智者不可任以大功人有其才物有其形有任一而太重或任百而尚輕是故審毫釐之計者必遺天下之大數遺失不失小物之選者或於大事之舉譬猶狸之不可使搏牛虎之不可使搏鼠也今人之才或欲平九州并方外存危國繼絶世志在直道正邪决煩理挐而乃責之以閨閤之禮隩𥥛之間或佞巧小具謟進愉說隨鄉曲之俗卑下衆人之耳目而乃任之以天下之權治亂之機機理是猶以斧劗毛以刀抵木也劗剪也劗讀驚攢之攢也皆失其宜矣宜適人主者以天下之目視以天下之耳聽以天下之智慮以天下之力爭是故號令能下究而臣情得上聞聞猶達也百官修通群臣輻凑也歸君若輻之凑轂故曰輻凑喜不以賞賜怒不以罪誅懼失當也是故威立而不廢聦明先而不弊弊闇法令察而不苛察明也苛煩也耳目達而不闇善否之情日陳於前而無所逆是故賢者盡其智而不肖者竭其力德澤兼覆而不偏群臣勸務而不怠怠懈近者安其性遠者懷其德性生也懷歸也所以然者何也得用人之道而不任己之才者也故假輿馬者足不勞而致千里假或作駕乘舟檝不能游而絶江海絶猶過也夫人主之情莫不欲緫海内之智盡衆人之力然而群臣志達效忠者希不困其身困猶危也使言之而是雖在褐夫芻蕘猶不可棄也言雖賤當也故曰不可棄也使言之而非也雖在卿相人君揄策于廟堂之上未必可用人君謂國君也揄出策謀也言之而非雖責貴罰也是非之所在不可以貴賤尊卑論也是明主之聽於群臣其計乃可用不羞其位不羞其位卑而不用其主言可行不責其辯不責其辯口美辭也闇主則不然所愛習親近者雖邪枉不正不能見也䟽遠則卑賤者竭力盡忠不能知也有言者窮之以辭有諫者誅之以罪如此而欲照海内存萬方是猶塞耳而聽清濁商音宫音濁掩目而視青黄也其離聦明則亦遠矣離去法者天下之度量而人主之準繩也縣法者法不法也設賞者賞當賞也法定之後中程者賞缺繩者誅尊貴者不輕其罰而卑賤者不重其刑言平犯法者雖賢必誅中度者雖不肖必無罪是故公道通而私道塞矣公正也私邪也塞閉也古之置有司也有司蓋有理官士也所以禁民使不得自恣也恣放恣也其立君也所以剬有司使無專行專擅法籍禮義者所以禁君使無擅斷也人莫得自恣則道勝道勝而理達矣故反於無爲無爲者非謂其凝滯而不動也以其言莫從己出也夫寸生於𥢕𥢕生於日日生於形形生於景此度之本也𥢕禾穗𥢕孚榆頭芒也十𥢕爲一分十分爲一寸十寸爲一尺十尺爲一丈政謂之本也樂生於音音生於律律生於風此聲之宗也宗亦本也法生於義義生於衆適衆適合於人心此治之要也要約衆也故通於本者不亂於末覩於要者不惑於詳惑眩法者非天墮非地生發於人間而反以自正反還是故有諸己不非諸人有諸己己有聦明也不非諸人恕人行也無諸己不求諸人言己雖無獨見之明不求加罪於人也所立於下者不廢於上人主所立法禁於民亦自脩之不廢於上言以法也所禁於民者不行於身不正之事不獨行之於身言其正己以正人也所謂亡國非無君也無法也變法者非無法也有法者而不與用無法等等同是故人主之立法先自爲檢式儀表表正故令行於天下孔子曰其身正不令而行其身不正雖令不從故禁勝於身則令行於民矣禁勝於身不敢自犯禁也故能令行於民也聖主之治也其猶造父之御齊輯之于轡御之際而急緩之于脣吻之和正度于胷臆之中而執節于掌握之間節策内得於心中外合於馬志是故能進退履繩繩直正也而旋曲中規曲屈規員取道致遠而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故輿馬不調王良不足以取道君臣不和唐虞不能以爲治執術而御之則管晏之智盡矣明分以示之則蹠蕎之姦止矣盜蹠孔子時人蕎莊蕎楚威王之將軍能大爲盜也夫據除而窺井底雖達視猶不能見其睛睛目童子也借明於鑑以照之則寸之分可得而察也鑑鏡也分毛也一曰疵是故明主之耳目不勞精神不竭物至而觀其象事來而應其化近者不亂遠者治也是故不用適然之數而行必然之道故萬舉而無遺策矣今夫御者馬體調于車御心和于馬則歷險致遠進退周游莫不如志雖有騏驥騄駬之良臧獲御之則馬反自恣而人弗能制矣臧獲古之不能御者魯人也故治者不貴其自是而貴其不得爲非也故曰勿使可欲毋曰弗求勿使可奪毋曰不爭如此則人材釋而公道行矣美者正於度而不足者建於用故海内可一也夫釋職事而聽非譽棄公勞而用朋黨公正則竒材佻長而干次竒材非常之材佻長卒非純賢也故曰干次也守官者雍遏而不進如此則民俗亂於國而功臣爭於朝竒材佻長之人干超其次功勞之臣反不顯烈故爭於朝也故法律度量者人主之所以執下執制釋之而不用不用法律度量也是猶無轡御而馳也群臣百姓反弄其上是故有術則制人無術則制於人爲人所擒制也吞舟之魚蕩而失水則制於螻蟻離其居也魚能吞舟言其大也其居水也猨貁失木而擒於狐狸非其處也其處茂木君人者釋所守而與臣下爭則有司以無爲持位無所爲以持其位也守職者以從君取容隨君之欲以取容媚是以人臣藏智而弗用不用智謀贊佐其上也反以事轉任其上矣賢臣見其不肯爲謀故轉任其上令自制之詩云仲山甫既明且哲以保其身夫貴富者之於勞也達事者之於察也驕恣者之於恭也勢不及君君人者不任能不任用臣智能也而好自爲之則智日困而自負其責也數窮於下則不能伸理行墮於國則不能專制智不足以爲治威不足以行誅則無以與天下交也喜怒形於心者欲見於外則守職者離正而阿上阿曲從也有司枉法而從風風令賞不當功誅不應罪上下離心而君臣相怨也是以執政阿主而有過則無以責之有罪而不誅則百官煩亂智弗能解也毁譽萌生而明不能照也不正本而反自修則人主逾勞人臣逾逸是猶代庖宰剥性而爲大匠斲也與馬競走觔絶而弗能及上車執轡則馬死于衡下故伯樂相之王良御之明主乘之無御相之勞而致千里者乘於人資以爲羽翼也資才是故君人者無爲而有守也有爲而無好也無所私好有爲則讒生有好則諛起謟諛之人乘志而起昔者齊桓公好味而易牙烹其首子而餌之桓公襄公諸兒之子小白虞君好寳而晋獻以璧馬釣之釣取胡王好音而秦穆公以女樂誘之誘惑是皆以利見制於人也制猶擒也故善建者不拔言建之無形也夫火熱而水滅之金剛而火銷之木强而斧伐之水流而土遏之唯造化者物莫能勝也故中欲不出謂之扃外邪不入謂之塞中扃外閉何事之不節外閉中扃何事之不成弗用而後能用之弗爲而後能爲之精神勞則越越散耳目淫則謁竭滅故有道之主滅想去意清虚以待不伐之言不奪之事循名責實使自司任而弗詔責而弗教以不知爲道道常未知以柰何爲寳道貴無形無形不可柰何道之所以爲貴也如此則百官之事各有所守矣有所守言不離扃也攝權勢之柄其於化民易矣衛君役于路權重也衛君出公輒也景桓公臣管晏位尊也管仲輔相桓公晏嬰相景公二君位尊故也怯服勇而愚制智其所託勢者勝也故枝不得大於榦末不得强於本則輕重小大有以相制也若五指之屬於臂搏援攫捷莫不如志言以小屬於大也是故得勢之利者所持甚小其存甚大所守甚約約要也少也所制甚廣是故十圍之木持千鈞之屋五寸之鍵制開闔豈其材之巨小足哉所居要也孔丘墨翟修先聖之術通六藝之論口道其言身行其志慕義從風風化而爲之服役者不過數十人役事使居天子之位則天下徧爲儒墨矣徧猶盡也楚莊王傷文無畏之死於宋也奮袂而越衣冠相連於道遂成軍宋城之下權柄重也莊王楚穆王商臣之子旅也使申舟問聘於齊不假道於宋無畏曰未必襲殺我王曰殺汝伐宋見犀而行不假道於宋華元曰過我而不假道鄙我也鄙我亡也以兵殺其使者亦亡也遂殺之莊王聞之怒故拔袂而起成軍亡宋城故曰權柄重也楚文王好服解冠楚國效之文王楚武王熊達之子熊庇獬豸之冠始今御史冠趙武靈王貝帶鵔翿而朝趙國化之武靈王出春秋後以大貝飾帶胡服鵔翿讀曰私鈚頭曰郭洛帶位銚鎬也使在匹夫布衣雖冠獬冠帶貝帶鵔翿而朝則不免爲人笑也鵔翿讀曰私鈚頭二字三音也夫民之好善樂正不得禁誅而自中法度者萬無一也下必行之令從之者利逆之者凶日隂未移而海内莫不被繩矣繩正故握劍鋒以離北宫子司馬蒯蕢不使應敵北宫子齊人也孟子所謂北宫勇也司馬蒯蕢其先程伯休甫宣王命以爲司馬因爲司馬氏蒯蕢其後也周衰適他國蒯蕢在越以善擊劍聞應猶擊也操其觚招其末則庸人能以制勝觚劍拊招舉也今使烏獲藉蕃從後牽牛尾尾絶而不從者逆也烏獲藉蕃皆多力人若指之桑條以貫其鼻則五尺童子牽而周四海者順也夫七尺之撓而制船之左右者以水爲資橈刺船槔也資用也撓讀煩撓之撓也天子發號令行禁止以衆爲勢也夫防民之所害開民之所利威行也若發減决塘減水減也塘堤也皆所以畜水故循流而下易以至背風而馳易以遠因其勢也桓公立政去食肉之獸食粟之鳥係罝之網三舉百姓說桓齊桓公紂殺王子比干而骨肉怨斮朝涉者之脛而萬民叛再舉而天下失矣故義者非能徧利天下之民利一人而天下從風暴者非盡害海内之衆也害一人而天下離叛故桓公三舉而九合諸侯紂再舉而不得爲匹夫故舉錯不可不審三舉去食肉之獸食粟之鳥係置之網再舉殺比干斮朝涉之脛也人主租歛於民也必先計歲收量民積聚知饑饉有餘不足之數然後取車輿衣食供養其欲高臺層榭接屋連閣非不麗也然民無掘穴狹廬所以託身者明主弗樂不樂其大麗也肥醲甘脆非不美也然民有糟糠菽粟不接於口者則明主弗甘也不甘其肥醲也匡牀蒻席非不寧匡安也蒻細也然民有處邊城犯危難澤死暴骸者明主弗安也不安其匡牀蒻席也故古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不被裘與同寒飢歲登民豐乃始縣鍾鼓陳干戚登成也年穀豐熟也君臣上下同心而樂之國無哀人言皆樂也故古之爲金石管絃者所以宣樂也金鍾石磬管簫也絃琴瑟兵革斧鉞者所以飾怒也觴酌俎豆酬酢之禮所以效善也效致衰絰管履辟踊哭泣所以諭哀也諭明此皆有充於内而成像於外充實及至亂主取民則不裁其力裁度求於下則不量其積男女不得事耕織之業以供上之求事治業事力勤財匱君臣相疾也故民至於焦脣沸肝有今無儲有今日之食而無明日之儲也而乃始撞大鍾擊鳴鼓吹竽笙彈琴瑟是猶貫甲冑而入宗廟被羅紈而從軍旅失樂之所由生矣夫民之爲生也一人跖耒而耕不過十畝跖蹈中田之獲卒歲之收不過畒四石妻子老弱仰而食之時有涔旱災害之患涔久而水潦也有以給上之徵賦車馬兵革之費由此觀之則人之生閔矣闕憂無樂夫天地之大計三年耕而餘一年之食率九年而有三年之畜十八年而有六年之積積委也二十七年而有九年之儲雖涔旱災害之殃民莫因窮流亡也故國無九年之畜謂之不足無六年之積謂之閔急閔憂病急無三年之畜謂之窮乏故有仁君明主其取下有節自養有度則得承受於天地而不離飢寒之患矣若得貪主暴君撓於其下侵漁其民以適無窮之欲則百姓無以被天和而履地德矣天和氣也地德所生植也食者民之本也民者國之本也國者君之本也是故人君者上因天時下盡地財中用人力是以群生遂長五穀蕃植教民養育六畜以時種樹務脩田疇滋植桑麻肥墝高下各因其宜丘陵阪險不生五穀者以樹竹木春伐枯槁夏取果蓏有核曰果無核曰蓏秋畜疏食菜䟽曰䟽穀食曰食冬伐薪蒸大者曰薪小者曰蒸以爲民資資用是故生無乏用死無轉尸轉棄故先王之法畋不掩群掩猶盡也不取麛夭鹿子曰麛麛子曰夭不蒸澤而漁涸澤漉池不焚林而獵爲盡物也豺未祭獸罝罦不得布於野十月之時豺殺獸四面陳之世謂之祭獸也未祭獸罝罦不得施也獺未祭魚網罟不得入於水獺獾也明堂月令孟春之月獺祭魚獺取鯉四面陳之水邊世謂之祭魚未祭不得捕也鷹隼未摯羅網不得張於谿谷立秋鷹摯矣未立秋不得施下鷹或作隽草木未落斤斧不得入山林九月草木節解未解不得伐山林也昆蟲未蟄不得以火燒田十月蟄蟲備藏未蟄不得用撓田也孕育不得殺𪅏卵不得探魚不長尺不得取彘不期年不得食皆爲盡物是故草木之發若蒸氣發生禽獸歸之若流原飛鳥歸之若煙雲有所以致之也故先王之政四海之雲至而脩封疆立春之後四海出雲蝦蟇鳴燕降而達路除道三月之時隂降百泉則脩橋梁十月之時昏張中則務種穀三月昏張星中於南方張南方朱鳥之宿也大火中則種黍菽大火東方倉龍之宿四月建巳中在南方菽豆也虛中則種宿夌盧能方玄武之宿八月建酉中於南方也昴中則收歛畜積伐薪木昴星西方白虎也季秋之月收歛畜積也上告于天下布之民先王之所以應時脩備富國利民實曠來遠者其道備矣實滿也曠空也非能目見而足行之也欲利之也欲利之也不忘於心則官自備矣心之於九竅四支也不能一事焉然而動靜聽視皆以爲主者不忘于欲利之也故堯爲善而衆善至矣桀爲非而衆非來也善積即功成非積則禍極極至凡人之論心欲小而志欲大智欲員而行欲方能欲多而事欲鮮所以心欲小者慮患未生備禍未發戒過愼微不敢縱其欲也詩云惟此文王小心翼翼昭事上帝聿懷多福此之謂也志欲大者兼包萬國一齊殊俗並覆百姓若合一族是非輻凑而爲之轂轂以諭王智欲員者環復轉運終始無端若順連環故曰無端旁流四達淵泉而不竭萬物並興莫不嚮應也應和行欲方者直立而不撓撓弱曲也素白而不污窮不易操通不肆志肆放能欲多者文武備具動靜中儀舉動廢置曲得其宜無所擊戾無不畢宜也擊掌也失破也事欲鮮者執柄持術得要以應衆執約以治廣處靜持中運於璇樞以一合萬若合符者也符約故心小者禁於微也志大者無不懷也多所容也知員者無不知也行方者有不爲也非正道不爲也能多者無不治也治猶作也事鮮者約所持也約要古者天子聽朝公𡖖正諫博士誦詩瞽箴師誦庶人傳語史書其過宰徹其膳猶以爲未足也故堯置敢諫之鼓也欲諫者擊其鼓舜立誹謗之木書其善否於表木也湯有司直之人司直官名不曲也武王立戒愼之鞀欲戒君令愼疑者摇鞀鼓過若毫釐而既已備之也備具也夫聖人之於善也無小而不舉舉用其於過也無微而不改改更堯舜禹湯文武王皆坦然天下而南面焉背屏而朝諸候當此之時鼛鼓而食鼛鼓王者之食樂也詩云鼓鐘伐磬奏雍而徹雍已食之樂也已飯而祭竈行不用巫祝言其卒德蹈正無求於神鬼神弗敢祟山川弗敢禍可謂至貴矣至德之可貴也然而戰戰慄慄日愼一日由此觀之則聖人之心小矣詩云惟此文王小心翼翼昭事上帝聿懷多福其斯之謂歟武王伐紂發鉅橋之粟散鹿臺之錢鉅橋紂倉名也一說鉅鹿漕運之橋栗鹿臺紂錢藏府所積也武王發散以賑疲民封比干之墓比干紂諸父也諫紂之非紂殺之故武王封崇其墓以旌仁也表商容之閭商容殷之賢人老子師故表顯其里𥡆稱篇又云老子業於商容見舌而知守柔矣是也朝成湯之廟成湯殷受命之王言聖人以類相宗解箕子之囚箕子紂之庶兄論語云箕子爲之奴武王伐紂赦其囚執問以洪範封之於朝鮮也使各處其宅田其田無故無新唯賢是親用非其有使非其人晏然若故有之由此觀之則聖人之志大也文王周觀得失徧覽是非堯舜所以昌桀紂所以亡者皆著於明堂著猶圖也於是略智博聞以應無方由此觀之則聖人之智員矣成康繼文武之業守明堂之制觀存亡之迹見成敗之變非道不言非聖人之意不敢言非義不行非仁義不敢履行也言不苟出行不苟爲擇善而後從事焉由此觀之則聖人之行方矣孔子之通智過於萇弘勇服於孟賁足躡郊菟力招城關能亦多矣萇弘周大夫敬王臣也號知大道孟賁勇士也孔子皆能招舉也以一手招城門關端能舉之故曰亦能多也然而勇力不聞人不聞其爲勇力也伎巧不知人不知其有伎巧者專行孝道以成素王事亦鮮矣春秋二百四十二年亡國五十二弑君三十六采善鉏醜以成王道論亦博矣然而圍於匡顔色不變絃歌不輟匡宋邑也今陳襄邑西匡亭是也孔子曰天生德於予匡人其如予何故顔色不變絃歌不止也臨死亡之地犯患難之危據義行理而志不攝分亦明矣犯猶遭攝猶懼然爲魯司寇聽獄必爲斷爲魯定公司寇作爲春秋不道鬼神不敢專己夫聖人之智固已多矣其所守者有約故舉而必榮愚人之智固已少矣其所事者多故動而必窮矣吴起張儀智不若孔墨而爭萬乘之君此其所以車裂支解也夫以正教化者易而必成以邪巧世者難而必敗凡將設行立趣於天下捨其易成者而從事難而必敗者愚惑之所致也凡此六反者不可不察也六反謂孔墨萇弘孟賁吴起張儀也其行相反故曰六反也偏知萬物而不知人道不可謂智偏愛群生而不愛人類不可謂仁仁者愛其類也智者不可惑也仁者雖在斷割之中其所不忍之色可見也不忍智斷割之色見於顔色也智者雖煩難之事其不闇之效可見也内恕反情心之所欲其不加諸人由近知遠由己知人此人智之所合而行也小有教而大有存也小有誅而大有寧也小教之以正故大有存也少責之以義故大有寧也非正則不存非義則不寧也唯惻隱推而行之此智者之所獨斷也故仁智錯有時合合者爲正錯者爲權其義一也府吏守法君子制義法而無義亦府吏也不足以爲政耕之爲事也勞織之爲事也擾擾勞之事而民不舍者知其可以衣食也人之情不能無衣食衣食之道必始於耕織萬民之所容見也物之若耕織者始初甚勞終必利也衆愚人之所見者寡事可權者多愚之所權者少此愚者之所多患物之可備者智者盡備之可權者盡權之此智者所以寡患也故智者先忤而後合忤逆愚者始於樂而終於哀今日何爲而榮乎旦日何爲而義乎此易言也今日何爲而義旦日何爲而榮此知難也問瞽師曰白素何如曰縞然曰黑何若曰黮然援白黑而示之則不處焉人之視白黑以目言白黑以口瞽師有以言白黑無以知白黑故言白黑與人同其别白黑與人異入孝於親出忠於君無愚智賢不肖皆知其爲義也使陳忠孝行而知所出者鮮矣凡人思慮莫不先以爲可而後行之其是或非此愚知之所以異凡人之性莫貴於仁莫急於智仁以爲質知以行之兩者爲本而加之以勇力辯慧捷疾劬録巧敏遲利聦明審察盡衆益也身材未脩伎藝曲備而無仁智以爲表幹而加之以衆美則益其損故不仁而有勇力果敢則狂而操利劍狂猶亂也不智而辯慧懷給則棄驥而不式不知之人辯慧懷給不知所裁之猶棄而或不知所詣也懷佞也雖有材能其施之不當其處之不宜適足以輔僞飾非伎藝之衆不如其寡也故有野心者不可借便勢野外有愚質者不可與利器老子曰國之利器不可以假人也魚得水而游焉則樂塘决水涸則爲螻蟻所食有掌脩其隄防補其缺漏則魚得而利之掌主國有以存人有以生國有人存君魚得水也國厚故人遂生也國之所以存者仁義是也人之所以生者行善是也國無義雖大必亡桀紂是也人無善志雖勇必傷論語曰勇而無禮則亂亂則傷也治國上使不得與焉使不得與亡傷之危是上術也孝於父母弟於兄嫂信於朋友不得上令而可得爲也釋己之所得爲而責于其所不得制悖矣士處卑隱欲上達必先反諸己上達有道名譽不起而不能上達矣取譽有道不信於友不能得譽於友有道事親不說不信於友不能說親朋反不信之也說親有道修身不誠不能事親矣誠身有道心不專一不能專誠道在易而求之難易謂反己先修其本也不修其本而欲得說親誠身之名皆難也故曰道在易而求之難也驗在近而求之遠故弗得也驗效也近謂本遠謂末也故不能得之也淮南鴻烈解卷之十五
